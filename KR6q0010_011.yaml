body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十四世臨濟十世楊岐三世五祖法演禪師法嗣舒州太平佛鑑惠懃禪師郡之懷寧人族汪氏丱歲師廣教圓深試所習得度每以唯此一事實餘二則非真味之有省乃徧參名宿往來五祖之門有年恚祖不為印據與圓悟相繼而往及悟在金山染疾因悔過歸白雲方大徹證師忽至意欲他邁悟勉令挂錫且曰某與兄相別始月餘比舊相見時如何師曰我所疑者此也遂參堂一日聞祖舉僧問趙州如何是和尚家風曰老僧耳聾高聲問將來僧高聲再問州曰儞問我家風我却識儞家風了也即大豁所疑曰乞和尚指示極則祖曰森羅及萬象一法之所印師展拜令主翰墨與圓悟語次悟舉東寺問仰山索珠話至無言可對無理可伸處曰既云收得逮索此珠却云無言可對無理可伸是如何師曰東寺當時索一顆仰山當下傾出一栲栳悟曰兄向時安有此語耶相笑不已明年謁太平清禪師命為第一座會清之黃龍以師繼之法道大播政和初詔住東都智海五年乞歸得旨居蔣山樞密鄧公子常奏賜徽號椹服開堂日上首白槌罷師曰南瞻部洲北單越西瞿耶尼東弗于逮於此觀得可謂妙圓超悟只在如今其或未然遂指問話僧曰且看這僧敗闕問答已乃曰問話且止何必紛紜不見道窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑況祖師心印諸佛本源千聖悟由群生性命非中非外不滅不生在聖在凡無增無減彌綸天地混茫太虗而不知其大鼓爕陰陽陶鑄萬物而不宰其功浩浩然不可以語言造昭昭然不可以寂默通語言求之翻成諍論寂默求之墮於斷滅到此唯聖與聖乃能共知以何為證豈不聞我大宋仁宗皇帝有修心偈曰初祖安禪在少林不傳經教但傳心後人若悟真如理密印由來妙理深敢問諸人如何是真如之性如何是密印妙理假使目連騖子無礙辨才到此也須亡鋒結舌唯有山僧今日幸逢快便為國開堂得路便行豈畏旁觀笑怪舉拂子曰看看豈不是諸人真如之性竪兩指曰豈不是諸人密印妙理於斯薦得同報國恩其或未然別容理論敘謝已復舉二祖安心話遂曰覓心不得乃安心悟了爭如未悟深萬丈寒潭秋月白一聲雲外老猿吟積塵成嶽削鐵成針少室山前無異路遊人來往自崎嶔上堂至道無難唯嫌揀擇桃華紅李華白誰道融融只一色鷰子語黃鸝鳴誰道關關只一聲不透祖師關棙子空認山河作眼睛上堂日日日西沉日日日東上若欲學菩提擲下拄杖曰但看此榜樣上堂鐵非至寶鑄太阿而價直萬金心是塵緣悟真空而頓超十地所以道無邊剎境自佗不隔於毫端十世古今始終不離於當念移南作北一任縱橫坐斷十方一句作麼生道龍袖拂開全體現象王行處絕狐蹤五祖周祥上堂去年今日時紅爐片雪飛今日去年時曹娥讀夜末後一句子佛眼莫能窺白蓮峰頂上紅日繞須彌鳥瑚樹鯨吞麗水犀太平家業在千古襲楊岐上堂橫拄杖曰先照後用竪起曰先用後照倒轉曰照用同時卓一下曰照用不同時汝等諸人被拄杖一口吞盡了也自是儞不覺若向這裏道得轉身句免見一場氣悶其或未然老僧今日失利上堂金烏急玉兔速急急流光七月十無窮遊子不歸家縱歸只在門前立門前立把手牽伊不肯入萬里看看寸草無殘華落地無人拾無人拾一回雨過一回濕上堂舉僧問乾峰十方薄伽梵一路涅槃門未審路頭在甚麼處峰以拄杖一畫云在這裏雲門云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾此二老宿一人向陸地行船一人向針鋒走馬同時同日到長安其中一箇最尖要上堂八月二十五有賓兼有主輥出雪峰毬打動禾山鼓天帝釋搖頭大梵王作舞不透上林關未敢輕相許空生不解此家風惹得岩前華似雨上堂舉世尊有密語迦葉不覆藏乃曰儞尋常說黃道黑評品古今豈不是密語儞尋常折旋俯仰拈匙把筯祗揖萬福是覆藏不覆藏忽然瞥地去也不可知要會麼世尊有密語冬到寒食一百五迦葉不覆藏水洩不通已露贓靈利衲僧如會得一重雪上一重霜僧問如何是祖師西來意曰喫醋知酸喫鹽知鹹云弓折箭盡時如何曰一場懡㦬問不與萬法為侶有是甚麼人曰拶破露拄云歸鄉無路時如何曰王程有限云前三三後三三又作麼生曰六六三十六問承聞和尚親見五祖是否曰鉄牛齧碎黃金草云恁麼則親見五祖也曰我與儞有甚冤讎云只如達磨見武帝意旨如何曰胡言易辨漢語難明云為甚悽悽暗渡江曰因風借便問如何是主中賓曰進前退後愁殺人云如何是賓中主曰真實之言成妄語云如何是賓中賓曰夫子遊行厄在陳云如何是主中主曰終日同行非伴侶云賓主已蒙師指示向上宗乘事若何曰大斧斫了手摩挲問即心即佛即不問非心非佛事如何曰昨日有人問老僧不對云未審與即心即佛相去多少曰近則千里萬里遠則不隔絲毫云忽被學人截斷兩頭歸家穩坐又作麼生曰儞家在甚麼處云大千沙界內一箇自由身曰未到家在更道云學人到這裏直得東西不辨南北不分去也曰未為分外室中以木骰子六隻面面皆書幺字僧纔入擲曰會麼僧擬不擬即打出七年九月八日上堂示眾曰祖師心印狀似鐵牛之機去即印住住即印破直饒不去不住亦未是衲僧行履處且作麼生是衲僧行履處待十月前後奉為諸人注破至後月八日沐浴更衣端坐手寫數書別故舊停筆而化火後門弟子奉靈骨設利塔于本山東京天寧佛果克勤禪師彭之崇寧人族駱氏世宗儒師犀顱月面骨相不凡幼日記千言偶游妙寂寺見佛書三復悵然如獲舊物曰子殆過去沙門也即去家依自省祝髮從文照通講說又從敏行授楞嚴俄得病瀕死歎曰諸佛涅槃正路不在文句中吾欲以聲求色見宜其無以死也遂棄去至真覺勝禪師之席勝方創臂出血指示師曰此曹溪一滴也師矍然良久曰道固如是乎即徒步出蜀首謁玉泉皓次依金鑾信大溈喆黃龍心東林總僉指為法器而晦堂稱他日臨濟一派屬子矣最後見白雲盡其機用祖皆不諾且訶曰汝欲了生死大事何以意氣得耶師不顧趨出抵吳中已而復還祖迎笑曰吾望子久矣即命入侍司會部使有解印還蜀詣祖作禮問佛法大意祖曰不見小艶詩云頻呼小玉元無事只要檀郎認得聲使者惘然師旁侍竊聆忽大悟立告祖曰今日去却膺中物喪盡目前機祖曰佛祖大事非小根劣器所能造詣吾助汝喜師述偈曰金鴨香囊錦繡幃笙歌叢裏醉扶歸少年一段風流事只許佳人獨自知由此所至眾推為上首崇寧中還里省親四眾迓拜成都帥翰林郭公知章請開法六祖更昭覺再出蜀次荊南會無盡居士張公商英以師禮留居碧岩復徙道林樞密鄧公子常奏賜紫服師名政和中詔住金陵蔣山學者無地以容名振京師勑補天寧萬壽上召見褒寵甚渥建炎初又遷金山適駕幸維揚入對賜圓悟禪師改雲居久之復領昭覺上堂曰通身是眼見不及通身是耳聞不徹通身是口說不著通身是心鑒不出直饒盡大地明得無絲毫透漏猶在半途據令全提且道如何展演域中日月縱橫拄一亘晴空萬古春上堂山頭鼓浪井底揚塵眼聽似震雷霆耳觀如張錦繡三百六十骨節一一現無邊妙身八萬四千毛端頭頭彰寶王剎海不是神通妙用亦非法爾如然苟能千眼頓開直是十方坐斷且超然獨脫一句作麼生道試玉須經火求珠不離泥上堂本來無形段那復有脣觜特咸廣稱揚替他說道理且道他是阿誰上堂十五日已前千牛拽不回十五日已後俊鶻趂不及正當十五日天平地平同明同暗大千沙界不出當處可以含吐十虗進一步超越不可說香水海退一步坐斷千里萬里白雲不進不退莫道闍梨老僧也無開口處舉拂子曰正當恁麼時如何有時拈在千峰上劃斷秋雲不放高上堂十方同聚會本來身不昧箇箇學無為頂上用鉗鎚此是選佛場深廣莫能量心空及第歸利劒不如錐龐居士舌拄梵天口包四海有時將一莖草作丈六金身有時將丈六金身作一莖草甚是奇特然雖如此要且不曾動著向上關且如何是向上關鑄印築高壇上堂有句無句超宗越格如藤倚樹銀山鐵壁及至樹倒藤枯多少人失却鼻孔直饒取拾得來已是千里萬里只如未有恁麼消息時如何還透得麼風暖鳥聲碎日高華影重上堂舉步越東勝身退身入西瞿耶回首望北單揑拳觸南閻浮淨地裏看是箇沒量大人正眼觀來猶是麻滓麴末須知四維上下無邊香水海不可說浮幢王剎揑為微塵一一塵中現無邊身說無量法猶只是順機教看窟竉著楔而況提向上鉗錘用作家爐鞴便是徧界德山有棒無下手處徧界臨濟有喝無啟口處徧界金色頭陀有定力無容身處正當恁麼時驀然有箇承當擔荷得趣向得行履得且道向甚麼處著渠山僧有箇著處待說又恐成露布擬不說又却辜負當機說與不說一時拈却最後一句放開話會去也青松下明窻內玉殿珠樓未為對衲帔蒙頭萬事休此時山僧都不會委悉麼天台華頂秀南岳石橋高上堂第一句薦得祖師乞命第二句薦得人天瞻落第三句薦得虎口橫身不是循途守轍亦非革轍移途透得則六臂三頭未透亦人間天上且三句外一句作麼生道生涯只在絲輪上明月扁舟泛五湖僧問雲門道須彌山意旨如何曰推不向前約不退後云未審還有過也無曰坐却舌頭問法不孤起仗境方生提坐具云這箇是境那箇是法曰却被闍梨奪却槍問古人道楖栗橫擔不顧人直入千峯萬峯去未審阿那裏是他住處曰螣虵纏足露布遶身云朝看雲片片暮聽水潺潺曰却須截斷始得云此回不是夢真箇到廬山曰高著眼問不歷化城便登寶所時如何曰滿眼本非色滿耳本非聲云親到寶山空手回時又作麼生曰入荒田不揀問勿謂無心云是道無心猶隔一重關如何是一重關曰十重也有云如何是關中主曰放過一著云作何面自師便喝問猿抱子歸青嶂後鳥𭊷華落碧岩前此是和尚舊時安身立命處如何是道林境曰寺門高開洞庭野殿脚插入赤沙湖云如何是境中人曰僧寶人人滄海珠云此是杜工部底作麼生是和尚底曰且莫亂道云如何是奪人不奪境曰山僧有眼不曾見云如何是奪境不奪人曰闍梨問得自然親云如何是人境俱奪曰収云如何是人境俱不奪曰放問玄沙不過嶺保壽不渡河未審意旨如何曰直超物外云雪峯三度到投子九度到洞山又作麼生曰別是一家春云恁麼則春色無高下華枝自短長曰一任卜度問有句無句如藤倚樹如何得透脫曰倚天長劒逼人寒云只如樹倒藤枯溈山為甚麼呵呵大笑曰愛他底著他底云忽被學人掀倒禪床拗折拄杖又作箇甚麼伎倆曰也是賊過後張弓問無邊身菩薩為甚麼不見如來頂相曰有時恁麼有時不恁麼云如何是和尚頂相曰錯僧禮拜師曰果然果然問明歷歷露堂堂因甚麼乾坤収不得曰金剛手裏八棱棒云忽然一喚便回還當得活也無曰鶖子目連無奈何云不落照不落用如何商量曰放下雲頭云忽遇其中人時如何曰騎佛殿出三門云萬象不來渠獨語教誰把手上高峰曰錯下名言紹興五年八月己酉示微恙趺坐書偈遺眾投筆而逝荼毗舌齒不壞設利五色無數塔于昭覺之側壽七十有三臘五十有四六年三月諡曰真覺塔曰寂照舒州龍門佛眼清遠禪師蜀之臨卭人族李氏為人嚴正寡言年十四圓具常依毗尼師因讀法華至是法非思量分別之所能解持問講者莫能對遂南游江淮首參真覺勝禪師無契棄依太平事祖數載因丐於廬州偶雨足跌仆地煩懣間聞二人交相惡罵諫者曰儞猶自煩惱在師於言下有省及歸侍祖祖見師凡有所問即曰我不如儞儞自會得好或曰我不會我不如儞師愈疑每咨決於元禮首座禮一日見師欲訴意遽引師耳繞圍爐旋行旋告之曰儞自會得好師曰憑公開發乃爾相戲耶禮曰儞他後悟去方知今日曲折耳後典賓海會雨夜讀傳燈錄至破竈墮因緣忽撥火大悟作偈曰刀刀林鳥啼披衣終夜坐撥火悟平生窮神歸破墮事皎人自迷曲淡誰能和念之永不忘門開少人過圓悟聞之問曰青林般土話古今無人出得儞如何會云也有甚難曰只如他道鐵輪天子寰中旨意作麼生云我道帝釋宮中放赦書悟喜曰遠兄便有活人句祖亦然之自是隱居四面大中庵屬天下一新崇寧萬壽寺舒守王公渙之命師開法次補龍門道望尤振學者爭集逾十二年勑居和之褒禪樞密鄧公洵武奏賜師號及紫方袍上堂曰臺山路上過客全稀破竈堂前感恩無地雪埋庭栢冰鏁偃谿雖在南方火爐頭不入他家韲甕裏看看臘月三十日便是孟春猶寒儞等諸人各須努力向前切忌自生退屈上堂卓拄杖曰圓明了知不由心念抵死要道墮坑落壍畢竟如何乃倚拄杖下座上堂泡幻同無礙如何不了悟眼裏瞳人吹叫子達法在其中非今亦非古六隻骰子滿盆紅大眾時人為甚麼坐地看楊州鉢盂著柄新飜樣牛上騎牛笑殺人上堂趙州不見南泉山僧不識五祖甜瓜徹蔕甜苦瓠連根苦上堂一葉落天下春無路尋思笑殺人下是天上是地此言不入時流意南作北東作西動而止喜而悲虵頭蝎尾一試之猛虎口裏活雀兒是何言歸堂去上堂面前過便知是張三李四背後過為甚麼却不見壁這邊便見條臺倚子壁那下為甚麼分疎不得咫尺之間尚爾況十方世界耶參學人若不明此當知參學事卒未在上堂蘇武牧羊辱而不屈李陵望漢樂矣忘歸是在外國在本國佛諸弟子中有者雙足越坑有者聆箏起舞有者身埋糞壤有者呵罵河神是習氣是妙用至於擎叉打地竪拂敲床睦州一向閉門魯祖終年面壁是為人是不為人信知一切凡夫埋沒寶藏殊不丈夫諸人何不擺拖張帆拋江過岸休更釘樁搖櫓何日到家既作曹溪人又是家裡漢還見家裡事麼僧問劫火洞然大千俱壞未審這箇壞不壞曰黑漆桶裡黃金色問道遠乎哉觸事而真如何是道曰頂上八尺五云此理如何曰方圓七八寸問劫火威音前別是一壺天御樓前射獵不是刈茅田提起坐具云這箇喚作甚麼曰正是刈茅田僧便喝師曰猶作主在問僧孤燈獨照時如何僧無對代曰露柱證明聞開靜板聲師乃曰據款結案宣和初以病辭歸蔣山之東堂二年書雲前一日飯食訖趺坐謂其徒曰諸方老宿臨終必留偈辭世世可辭耶且將安往乃合掌怡然趨寂門人函骨歸龍門塔于靈光臺側壽五十四臘四十潭州開福道寧禪師歙溪汪氏子也壯為道人於崇果寺執浴一日將濯足偶誦金剛經至於此章句能生信心以此為實遂忘所知忽垂足沸湯中發明己見後祝髮蔣山依雪竇老良禪師踰二年次參涌泉誠子湖覺開先暹羅漢英三祖宗太平清鐘山佛惠圓通法鏡諸名宿晚至白蓮聞五祖小參舉忠國師古佛淨瓶趙州狗子無佛性話頓徹法源大觀中潭帥席公震請住開福衲子景從上堂曰未離兜率已降王宮未出母胎度人已畢諸禪德日日日從東畔出朝朝雞向五更啼雖然不是桃華洞春至桃華亦滿溪又道毗藍園內右脇降生七步周行四方目顧天上天下唯我獨尊大似貪觀天上月失却掌中珠還知落處麼若知落處方為孝子順孫苟或未然不免重下注脚良久曰天生伎倆能奇怪未上輸他弄一場上堂徧界不曾藏通身無影像相逢莫訝太愚癡曠劫至今無伎倆無伎倆少人知太抵還他肌骨好何須臨鏡𦘕蛾眉上堂摩竭正令未免崎嶇少室垂慈早傷風骨腰囊挈錫辜負平生煉行灰心遞相鈍置爭似春雨晴春山青白雲三片四片黃鳥一聲兩聲千眼大悲看不足王維雖巧𦘕難成直饒便恁麼猶自涉途程且不涉途程一句作麼生道人從汴州來不得東京信僧問蓮華未出水時如何曰人天合掌云出水後如何曰不礙往來看問如何是句到意不到曰瑞草本無根信手拈來用云如何是意到句不到云領取鈎頭意莫認定盤星云如何是意句俱到曰大悲不展手通身是眼睛云如何是意句俱不到曰君向瀟湘我向秦政和三年十一月四日淨髮沐浴次日齋罷小參勉眾行道辭語誠切期初七示寂至日酉時加趺而逝十一闍維獲設利五色歸藏于塔嘉州九頂清素禪師本郡人族郭氏於乾明寺剃染徧扣禪扄晚謁五祖聞舉首山答西來意語倐然契悟述偈曰顛倒顛顛倒顛新婦騎驢阿家牽便恁麼太無端回頭不覺布衫穿祖見乃問百丈野狐話又作麼生曰來說是非者便是是非人祖大悅久之辭歸住青溪太守呂公來瞻大像問曰既是大像因甚麼肩負兩楹曰船上無散工至閣下覩觀音像又問彌勒化境觀音何來曰家富小兒嬌守乃禮敬勤老宿至師問舞劒當咽時如何云伏惟尚亨師詬曰老賊死去儞問我勤理前語問之師叉手揖曰拽破師後遷九頂道播閬中紹興乙卯四月二十四日得微疾書偈遺眾曰木人備舟鐵人備馬丙丁童子穩穩登喝散白雲歸去也竟爾趨寂示眾機語未見彭州大隨南堂元靜禪師後名道興閬之玉山人大儒趙公約仲之子也十歲病甚母禱之感異夢捨令出家師成教大慈寶生院宗裔元祐三年通經得度留講聚有年而南下首參永安恩禪師於臨濟三頓棒話發明次依諸名宿無有當意者聞五祖機峻欲抑之遂謁祖見乃曰我此間不比諸方凡於室中不要汝進前退後竪指擎拳繞禪床作女人拜提起坐具千般伎倆只要儞一言下諦當便是汝見處師茫然退參三載一日入室罷祖謂曰子所下語已得十分試更與我說看師即剖而陳之祖曰說亦說得十分更與我斷看師隨所問而判之祖曰奸則好只是未曾得老僧說話在齋後可來祖師塔所與汝一一按過及到見師來便問即心即佛非心非佛睦州擔板漢南泉斬猫兒趙州狗子無佛性有佛性之語編辟之其所對了無凝滯至紫胡狗話祖遽轉面曰不是云不是却如何曰此不是則和前面皆不是云望和尚慈悲指示曰儞看他道紫胡有一狗上取人頭中取人腰下取人脚入門者好看纔見僧入門便道看狗向紫胡道看狗處下一轉語教紫胡結舌無言老僧鉢口有分便是儞了當處次日入室師默啟其說祖笑曰不道儞不是千了百當底人此語只似先師下底語師曰某何人得似端和尚祖曰不然老僧雖承嗣他謂他語拙者蓋只用遠錄公手段接人故也如老僧共遠錄公便與百丈黃檗南泉趙州輩把手共行纔見語拙即不堪師以為不然乃曳杖渡江適大水泛漲因留四祖儕輩挽其歸又二年祖方許可甞商略古今次執師手曰得汝說須是吾舉得汝舉須是吾說而今而後佛祖秘要諸方關鍵無逃子掌握矣遂創南堂以居之於是名冠寰海成都帥席公且請開法嘉祐未幾徙昭覺遷能仁及大隨上堂曰夫參禪至要不出箇最初句與末後句透得過者參學事畢儻或未然更與儞分作十門各各印證自心還得穩當也未一須信有教外別傳二須知有教外別傳三須會有情說法與無情說法無二四須見性如觀掌中之物了了分明一一田地穩密五須具擇法眼六須行鳥道玄路七須文武兼濟八須摧邪顯正九須大機大用十須向異類中行凡欲紹隆法種須盡此綱要方坐得這曲彔床子受得天下人禮拜敢與佛祖為師若不到恁麼田地只一向虗頭他時異日閻老子未放儞在有則出來大家證據若無不用久立珍重上堂君王了了將師惺惺一回得勝六國平寧上堂舉臨濟參黃檗之語白雲端和尚頌云一拳拳倒黃鶴樓一趯趯翻鸚鵡洲有意氣時添意氣不風流處也風流師曰大隨即不然行年七十老躘蹱眼目精明耳不聾忽地有人欺負我一拳打倒過關東上堂問答已乃曰有祖已來時人錯會只將言句以為禪道殊不知道本無體因體而得名道本無名因名而立號只如適來上座纔恁麼出來便恁麼歸眾且道具眼不具眼若道具眼纔恁麼出來眼在甚麼處若道不具眼爭合便恁麼去諸仁者於此見得倜儻分明則知二祖禮拜依位而立真得其髓只這些子是三世諸佛命根六代祖師命脉天下老和尚安身立命之處雖然如是須是親到始得上堂自己田園任運耕祖宗基業力須爭悟須千聖頭邊坐用向三塗底下行上堂舉雪峰普請自負一束藤中路見一僧來便拋下僧擬取次峰便踏倒歸舉似長生生曰和尚替這僧入涅槃堂始得峰休去雪竇云長生大似東家人死西家助哀也好與一踏師曰雪峰一踏別傳教外雪竇一踏千古無對長生答對失錢遭罪若人點撿得出老僧只呵呵大笑且道笑與踏是同是別良久曰參僧問祖師心印請師直指曰儞聞熱麼云聞曰且不聞寒云和尚還聞熱否曰不聞云為甚麼却不聞師搖扇曰為我有這箇問如何是奪人不奪境曰活捉魔王鼻孔穿云如何是奪境不奪人曰中心樹子屬吾曹云如何是人境兩俱奪曰一釣三山連六鼇云如何是人境俱不奪曰白日騎牛穿市過問蓮華未出水時如何曰好云出水後如何曰好云如何是蓮華曰好僧禮拜師曰與他三箇好萬事一時休問藏天下於天下即不問乃舉拳云只如這箇作麼生藏曰有甚麼難云且作麼生藏曰衫袖裏云未審如何是紀綱佛法底人曰不可是鬼云忽遇殺佛殺祖底來又作麼生支遣曰老僧有眼不曾見問學人乍入叢林乞師指示曰喫粥喫飯莫教放在腦後云終日喫時未甞喫曰負心衲子不識好惡問劫火洞然大千俱壞未審這箇壞也無曰阿誰教儞恁麼問僧進前鞠躬云不審師曰是壞不壞僧無語問如何是山裡禪曰庭前嫩竹先生笋㵎下枯松長老枝云如何是市裡禪曰六街鍾鼓韻鼕鼕即處鋪金世界中云如何是村裏禪曰賊盜消亡蠶麥熟謳謌鼓腹樂昇平問如何是諸佛出身處曰問得甚當云便恁麼去時如何曰答得更奇問因山見水見水忘山山水俱忘理歸何所曰山僧坐却舌頭天地黯黑有一老宿垂語云十字街頭起一間茅廁只是不許人屙僧舉以扣師師曰是儞先屙了更教甚麼人屙宿聞焚香遙望大隨再拜謝之紹興乙卯秋七月大雨雪山中有異象師曰吾期至矣十七日別郡守以次越三日示少恙於天彭二十四夜謂侍僧曰天曉無月時如何僧無對師曰倒教我與汝下火始得翌日還堋口廨院留遺誡蛻然示寂壽七十有一臘四十有七門弟子奉全身歸煙霧四合猿鳥悲鳴八月一日茶毗異香偏野舌本如故設利獲五色者不可計瘞于定光塔之西蘄州五祖表自禪師懷安人初依祖令看德山小參不答話因緣未有省時圓悟為座元師往請益悟云兄有疑處試語我師遂舉五祖所示德山小參不答話悟掩其口云但恁麼看師出揚聲曰屈屈豈有公案只教人看一句底道理有僧謂師曰兄不可如此說首座須有方便因靜坐體究及旬頻釋所疑詣悟禮謝悟云兄始知不欺汝又詣方丈祖迎笑自爾日深玄奧有本小異祖將示寂遺言郡守守命嗣其席衲子四至不可遏師榜侍者門曰東山有三句若人道得即挂搭衲子皆披靡一日有僧擕坐具徑造丈室謂師云某甲道不得只是要挂搭師大喜呼維那於明窻下安排上堂曰世尊拈華迦葉微笑時人只知拈華微笑要且不識世尊僧問如何是祖師西來意曰荊棘林中舞柘枝云如何是佛曰新生孩子擲金盆蘄州龍華道初禪師梓之馬氏子為祖侍者有年住龍華日上堂曰雞見便鬪犬見便齩殿上刎終日相對為甚麼却不嗔便下座師機辯峻捷門人罔知造詣一日謂眾曰昨日離城市白雲空往還松風清耳目端的勝人間召眾曰此是先師末後句有頃脫然而逝漢州無為宗泰禪師涪城人自出關徧游叢社後至五祖告香日祖舉趙州洗鉢盂話俾參祖入室舉此話問師儞道趙州向伊道甚麼這僧便悟去師曰洗鉢盂去聻云儞只知路上事不知路上滋味既曰知路上事路上有甚滋味云儞不知耶又問儞曾游浙否曰未也云儞未悟在師自此凡五年不能對祖一日陞堂顧眾曰八十翁翁輥繡毬便下座師欣然出眾云和尚試輥一輥看祖以手作打仗鼓勢操蜀音唱綿州巴歌曰豆子山打瓦鼓楊平山撒白雨白雨下取龍女織絹得二丈五一半屬羅江一半屬玄武師聞大悟掩祖口曰只消唱到這裏祖大笑而歸祖入寂師還蜀四眾請開法無為遷正法上堂曰此一大事因緣自從世尊拈華迦葉微笑世尊云吾有正法眼藏分付摩訶大迦葉以後燈燈相續祖祖相傳迄至于今綿綿不墜直得遍地生華故號涅槃妙心亦曰本心亦曰本性亦曰本來面目亦曰第一義諦亦曰爍迦羅眼亦曰摩訶大般若在男曰男在女曰女汝等諸人但自悟去這般盡是閑言語遂拈起拂子曰會了喚作禪未悟果然難難難目前隔箇須彌山悟了易易易信口道來無不是僧問如何是佛曰阿誰教儞恁麼問僧擬議師曰了元禮首座七閩人也依祖於白雲凡入室必謂曰衲僧明取緇素好疑之不已一日祖陞堂舉首山新婦騎驢阿家牽語乃曰諸人要會麼莫問新婦阿家免煩路上波吒遇飯即飯遇茶即茶同門出入宿世冤家禮豁如且曰今日緇素分明矣二年祖遷席祖山命分座不就祖歸寂即他往崇寧間再到五祖僧逆問五祖遷化向甚麼處去曰有眼無耳朵六月火邊坐云意旨如何曰家貧猶自可路貧愁殺人或問金剛經云一切善法如何是善法曰上是天下是地中間坐底坐立底立喚甚麼作善法僧無對禮便打後終於四明之瑞岩普融知藏閩之古田人遊方至五祖隨眾入室祖舉倩女離魂話問之有契呈偈曰二女合為一媳婦機輪截斷難回互從來往返絕蹤由行人莫問來時路凡有鄉僧來謁則發閩音誦俚語曰書頭教娘勤作息書尾教娘莫瞌眠且道中間說箇甚麼僧擬對即推出法閦上座久依五祖未有所入一日造室祖問不與萬法為侶者是甚麼人云法閦即不然祖以手指曰住住法閦即不然作麼生於言下啟悟後至東林宣密度禪師席下見其得平實之旨一日拈華繞度禪床一匝背手插香爐中曰和尚且道意作麼生度屢下語皆不契踰兩月遂問閦令試說之閦曰某只將華插香爐中和尚自疑有甚麼事來瑯瑘永起禪師法嗣一人俞道婆金陵人也市油餈為業常隨眾參問瑯瑘以臨濟無位真人話示之一日聞丐者唱蓮華樂云不因柳毅傳書信何緣得到洞庭山忽大悟以餈盤投地夫傍睨云儞顛耶婆掌曰非汝境界往見瑯瑘瑘望之知其造詣問那箇是無位真人婆應聲曰有一無位人六臂三頭努力嗔一擘華山分兩路萬年流水不知春由是聲名藹著凡有僧至則曰兒兒僧擬議即掩門佛燈珣禪師往勘之婆見如前所問珣云爺在甚麼處婆轉身拜露柱珣即踏倒云將謂有多少奇特便出婆曰兒兒來惜儞則箇珣竟不顧安首座至便問甚處來云德山曰德山泰乃老婆兒子云婆是甚人兒子曰被上座一問直得立地放尿安休去甞頌馬祖不安因緣曰日面月面靈光閃電雖然截斷天下衲僧舌頭分明只道得一半音釋閦初六切丱音慣爕蘇恊切嶔音欽耍沙瓦切齧五結切駱音落骰音投創音瘡矍居角切渥於角切楔音屑螣音藤洵音荀歙音攝閬音浪鼇五勞切堋方鄧切瘞依厲切
