body:
  text: 平江府報恩光孝禪寺臣僧正受編青原第十二世雲門六世慧林圓照宗本禪師法嗣東京法雲大通善本禪師族董氏漢仲舒之裔也大父琪父溫皆官于頴遂為頴人母無子禱白衣大士乃得師及長博極羣書然清修無仕官意嘉祐八年與弟善思往京師地藏院選經得度習毗尼東游至姑蘇禮圓照於瑞光照特顧之於是契旨經五稔益躋微奧照令依圓通秀禪師秀時住樓賢師至又盡其要元豐七年渡淮留太守巖久之出住雙林遷淨慈尋被旨徙居法雲上堂良久曰只恁麼休去累他毗耶老人棒喝交馳鈍置德山臨濟紐半破三即不要你話會不觸平常一句作麼生道未能分皂白且莫亂針錐下堂上不見天下不見地逼塞虗空無處回避為君明破即不中且向南山看鼈鼻擲拄杖下座上堂三界有無一切法不能與佛為譬喻老胡從來名邈不得處今日不惜眉毛試為諸人舉看良久拈拄杖卓一下曰數尺冰聲纔卓地一條虬勢欲騰空上空僧家無事實謂高閑困即烹茶寒來向火林間笑傲物外忘懷揮松柄以清談伴煙霞而遣日幕天席地誰是誰非三十年後有人問極則事但向伊道賊過後張弓上堂言無展事語不投機踏翻大海趯倒須彌直得洞山老無隱身之處你等諸人何不救取若救不得雙林為你救看遂喝一喝下座僧問九夏賞勞即不問從今向去事如何曰光剃頭淨洗鉢云謝師指示曰滴水難消問如何是祖師西來意曰你行脚來圖箇甚麼云學人不會曰且待驢年問春山疊亂青春水漾虗碧未審是何境界曰要道有甚麼難云便請曰月似彎弓少雨多風問涅槃心易曉差別智難分如何是差別智曰燈籠吞露柱云學人未委曰佛殿出三門開堂日僧問寶塔元無縫如何指示人曰煙霞生背面星月繞簷楹云如何是塔中人曰竟日無干清世事長年占斷白雲鄉後得旨還乃庵於西湖龍山今號崇德大觀三年十二月甲子屈三指謂左右曰有三日耳至期果加趺而化異禽翔鳴于庭勑塔全身於方諡曰圓定塔名定光壽七十五臘四十七嘉興府本覺法真守一禪師上堂舉拂子曰三世諸佛六代祖師總在這裏還見麼見汝不相當又為說法云無二無二分無別無斷故還聞麼汝又不惺惺一時却往上方香積世界去也𢷾拂子曰退後退後突著你眼睛上堂古者道佛似握拳道如展手乃合掌曰這箇似甚麼若道得許你是箇了事人若道不得莫道不疑好上堂觸目不會道運足焉知路三家村裏築著磕著猶較些子若是佛法禪道拈放一邊去伊分上總使不著為甚麼如此真人面前不得說假上堂拈拄杖曰平戎破虜蓋代功勳只如四海晏清還用得這箇麼良久曰李將軍有嘉聲在不得封侯也是閑僧問如何是祖師西來意曰擔水河頭賣云意旨如何曰欺胡謾漢云勞而無功也曰九年人不識隻履自空回問如何是句中玄曰崑崙騎象藕絲牽云如何是體中玄曰影浸寒潭月在天云如何是玄中玄曰長連床上帶刀眠云向上還有事也無曰放下著常州無錫南禪寧禪師僧問初生孩兒還具六識也無曰水長船高云廬陵米價作麼生酬曰款出囚口紹興府石佛密印曉通禪師上堂曰冷似秋潭月無心合太虗山高流水急何處駐游魚僧問如何是頓教曰月落寒潭云如何是漸教曰雲生碧漢云不漸不頓時如何曰八十老婆不言嫁福州地藏守恩禪師上堂曰古聖道夫說法者當如法說山僧今日如法說似大眾乃垂下一足曰一任諸方貶剝上堂良久曰一境誰相到翛然絕點塵天花莫狼藉吾匪解空人又曰樵夫跣足下層巒大笑漁翁溪上寒山色橫擔市去家家門底透長安僧問如何是佛曰晝眠無益云意旨如何曰早起甚長問善惡不修底人落在甚麼處曰一步一彈指云謝師指示曰回首念觀音問如何是西來祖意曰風吹滿面塵鎮江府金山智覺法慧禪師僧問大修行人還落因果也無曰鴆鳥入水魚皆死毒龍行處草不生法雲圓通法秀禪師法嗣東京法雲佛國惟白禪師初住泗之龜山次遷湯泉法雲建中靖國一年以所集宗門續燈錄三十卷上進稱旨恭承御製序文仍勑其錄入藏頒行天下上堂曰离婁有意白浪徒以滔天罔象無心明珠忽然在掌以手打一圓相召大眾曰還見麼良久曰看即有分上堂拈拄杖示眾曰山僧住持七十餘日未曾拈動這箇而今不免現些小神通供養諸人遂卓拄杖下座上堂過去已過去未來且莫筭正當現在事今朝正月半明月正團圓打鼓普請看大眾看即不無畢竟喚甚麼作月休於天上覔莫向水中尋僧問以心中眼觀身外相如何是心中眼曰紅日照扶桑云如何心外相曰白雲封華嶽溫州僊岩景純禪師初住智廣次擢護國江心僧問不作佛法相見世諦相酬請師速道曰遇唐虞即禮樂逢桀紂即干戈云不是學人問處曰生擒虎兕死怕盲龜問德山棒臨濟喝和尚如何作用曰老僧今日困僧便喝師曰却是你惶惶寧國府廣教守訥禪師圓照上足也世稱訥叔僧問如何是古今常存底句曰鐵牛橫海岸云如何是衲僧正眼曰針劄不入天鉢文慧重元禪師法嗣衛州元豐慧圓清滿禪師上堂曰老胡生下行七步明星現時又說悟并贓捉獲這無端鐵棒三十略輕恕驀拈拄杖曰祖師合喫多少要知麼古今罪犯彌天盡是諸人致得歲旦上堂憶昔山居絕糧有頌舉似大眾饑飡松栢葉渴飲㵎中泉看罷青青竹和衣自在眠大眾更有山懷為君說今年年是去年年上堂喝一喝曰不是道不是禪每逢三五夜皓月十分圓參上堂此劒刃上事須是劒刃上漢始得有般名利之徒為人天師懸羊頭賣狗肉壞後進初機減先聖洪範伱等諸人聞恁麼事豈不寒心由是疑誤眾生墮無間獄苦哉苦哉取一期快意受萬劫餘殃有甚麼死急來為釋子喝曰聵人徒側耳便下座僧問如何是佛曰天寒地冷云如何是道曰不道云為甚麼不道曰道是閑名字問如何是全彰底事曰秋日春風動有座主問維摩默然意旨如何師展手曰會麼云不會師曰也是難師凡見僧乃曰佛法世法眼病空華有僧云翳消華滅時如何曰將謂汝靈利青州定慧法本禪師僧問古人到這裏為甚麼拱手歸降曰理合如是云畢竟如何曰夜眠日走長蘆廣照應夫禪師法嗣真定府洪濟慈覺宗賾禪師上堂曰近日身心頑鈍恰似一片鐵板內無玲瓏機智外無華藻文章誰能打作鄆州針笑殺秦時𨍏輅鑽四楞著地萬事無心雖然看不入畢竟撲不破何也不見道大都好物不堅牢彩雲易散瑠璃脆上堂金屑雖貴落眼成翳金屑既除眼在甚麼處若如是者未出荊棘林中棒頭取證喝下承當正在金峰窠裏上堂樓外紫金山色秀門前甘露水聲寒古槐陰下清風裏試為諸人再指看拈拄杖曰還見麼擊香卓曰還聞麼靠却拄杖曰眼耳若通隨處足水聲山色自悠悠僧問如何是上元境曰燈毬大底大小底小云只如車馬往來成得箇甚麼邊事曰爭似山僧到曉眠問六門未息時如何曰鼻孔裏燒香云學人不會曰耳朵裏打鼓問如何是無功之功曰泥牛不運步天下沒荒田云恁麼則功不浪施也曰雖然廣大神通未免遭他痛棒慶元府雪竇覺印道榮禪師郡之陳氏子也僧問寒山逢拾得時如何曰揚眉飛閃電云更有何事曰開口放毫光云如何是向上一路曰七六八平江府慧日廣燈智覺禪師本郡人族梅氏久游師席未有省晚契機於廣照未幾歸里開法慧日遷城南高峰上堂良久曰休休休徒悠悠釣竿長在手魚冷不吞釣喝一喝下座紹興丁巳秋日將昳呼侍僧令集眾敘平昔參問勉眾辨已躬事引筆書曰南北無寸影東西絕四隣一息故鄉信曉風吹宿雲置筆而逝資聖捷禪師法嗣泉州慧空圓覺大智文宥禪師郡之晉江人族陳氏數歲日記千言熈寧中兄皓上書語犯朝政捕甚急從兄遁羅浮後依資壽思永禪師披削㨗乃永之得法師也因就參之室中垂示漫不省一日問捷古人向開合眼處示密作用有是哉捷叱曰驢前馬後漢有甚用處拈拄杖逐之師大悟捷笑曰這鈍漢餘語未見淨眾梵言首座法嗣西京招提廣燈惟湛禪師出嘉禾倡室王氏七歲依淨嚴院出家有逸才一覧不再目十四得度徧扣禪扄機契淨眾去游京師侍佛國白禪師入對賜號廣燈與椹服自出世招提屢遷巨剎開堂日拈香祝聖罷復拈香曰此一瓣香二十年前雲門山畔若耶淨邊得處有根不同栽接今日爇向爐中供養我越州淨眾院言首座和尚令鐵樹抽枝芬芳無盡遂就座上首白椎曰法筵龍象眾當觀第一義師拍禪床呵呵大笑曰好箇第一義剛被少林禪師一椎打作兩橛即今莫有接得者麼問答在後復曰拈華已錯微笑乖差四七虗傳聲流谷響二三妄指月散溪光五派狂分千枝橫出指鹿為馬認弓作虵首惑安心次迷得髓黃梅席上南北宗開曹溪岸頭東西浪起自爾波瀾競發阡陌支離標路空多無人截斷隨流愈遠誰解歸源棒喝臨機白雲萬里直得黃頭結舌碧眼吞聲如斯話會猶是道途之說被明眼人傍觀一場笑具雖然如是今日為國開堂於第二義門為諸人試通一線竪起拂子曰還委悉麼石女舞成長壽曲木人唱起太平歌上堂忍對春風百鳥啼桃華潛入武陵溪謝郎回棹歸來晚不似秦人一向迷上堂偏不偏正不正那事從來難比並滿天風雨骨毛寒何須更入那伽定卓拄杖下座上堂六塵不惡還同正覺馬上誰家白面郎穿華折柳垂巾角夜來一醉明月樓呼盧輸却黃金宅臂鷹走狗歸不歸娥眉皓齒嗔無力此心能有幾人知黃頭碧眼非相識囉囉哩拍手一下下座上堂直鉤釣鯤鯨曲鉤釣魚鼈古人用力太多所得甚少承天今日沈巨網於滄溟魚龍不選舉長網於大野頭角奚分且道其中還有透網羅底麼良久曰等閑不用擡頭角他日風雲會有時僧問祖祖相傳無間斷師今端的嗣何人曰若耶水急秦望峰高云當年得底分明句今日無私願舉揚曰霜高鷹隼疾舉翼過新羅問如何是和尚家風曰秋風黃葉亂遠岫白雲歸云專為流通也曰即今且作麼生舉僧便喝師便打問如何是招提境曰砌華金布地庭樹碧參空云如何是境中人曰有時開碧眼無處覔黃頭問引退荊州之祖席復登丹嶠之道場如何是不動尊曰浮杯來楚澤飛錫過錢塘云莫便是不動尊麼曰却須緊帩草鞋建炎初終於當湖之南庵今號南塔九峰鑒韶禪師法嗣慶元府大梅祖鏡法英禪師郡之鄞縣人族張氏棄儒試經為大僧肄講延慶凡義學有困於宿德輙以詰師師縱辭辯之為眾所敬忽曰名相迂曲豈吾所宗哉乃更服之九峰峰見器之與語若久在業席因痛劄之師領旨自爾得譽出游京雒所至道俗爭迎判宗留後仲爰以道見交久而益敬奏賜紫衣師名命居襄陽白馬逾二年退休東歸太守迎補大梅法席盛於歐粵宣和改元勑天下僧尼為德士雖主法者聚議無一言以回上心師肆筆解老子詣進上覧謂近臣曰法英所進道德經解言簡理詣於古未有宜賜入道藏流行仍就賜冠珮壇誥世不知師意者往往以其為諛明年秋詔復天下僧尼師獨無改志至紹興初晨起戴樺皮冠披鶴氅執象簡穿朱履使擊鼓集眾陞座召大眾曰蘭芬春谷菊秋籬物必榮枯各有時昔毀僧尼專奉道後平道復僧尼大眾且道僧尼形相作麼生復取冠示眾曰吾頂從來似月圓雖冠其髮不成仙今朝拋下無遮障放出神光透碧天擲之隨易僧服提鶴氅曰如來昔日貿皮衣數載慚將鶴氅披還我丈夫調御服須知此物不相宜擲之舉象簡曰為嫌禪板大無端豈料遭他象簡瞞今日因何忽放下普天致仕老仙官擲之提朱履曰達磨携將一隻歸兒孫從此赤脚走借他朱履代麻鞋休道時難事掣肘化鵬未遇不如鯤𦘕虎不成反類狗擲之橫拄杖曰今朝拄杖化為龍分破華山千萬重復倚肩曰珍重佛心真聖主好將堯德振吾宗端然斂目而逝壽八十餘有刊正錄并易註行于世青原第十二世洞山八世天寧芙蓉道揩禪師法嗣鄧州丹霞子淳禪師劒門人族賈氏幼出家大安寺弱冠為僧初參玉泉芳禪師次扣大溈真如之室後徹證於芙蓉上堂曰乾坤之內宇宙之間中有一寶秘在形山肇法師恁麼道只解指蹤話迹且不能拈示於人丹霞今日擘開宇宙打破形山為諸人拈出具眼者辨取以拄杖卓一下曰還見麼鷺鶿立雪非同色明月蘆花不似他上堂寶月流輝澄潭布影水無蘸月之意月無分照之心水月兩忘方可稱斷所以道昇天底事直須颺却十成底事直須去却擲地金聲不須回顧若能如是始解向異類中行諸人到這裏還相委悉麼良久曰常行不舉人間步披毛帶角混塵泥上堂舉德山示眾曰我宗無語句實無一法為人德山恁麼說話可謂是只知入草求人不覺通身泥水子細觀來只具一隻眼若是丹霞即不然我宗有語句金刀剪不開深深玄妙旨玉女夜懷胎上堂亭亭日午猶虧半寂寂三更尚未圓六戶不曾知暖意往來常在月明前上堂舉北院問青峰洛浦道入荒田不揀信手拈來草何不道作麼生是信手拈來草峰作拈勢師別曰是則是只是未能喫草又甘贄行者接待有僧曰行者接待不易贄云譬如餵驢餵馬明安曰也知行者常行此路師別曰來年與行者買一領直裰僧問牛頭未見四祖時如何曰金菊乍開蜂競採云見後如何曰苗枯華謝了無依宣和己亥春示寂塔全身於洪山之南東京淨因枯木法成禪師嘉興崇德人事詰未詳上堂曰燈籠忽爾笑咍咍如何露柱亦懷胎天明生得白頭女至今游蕩不歸來這冤家好歸來黃花與翠竹早晚為誰栽上堂達磨九年垂一則語直至如今諸方賺舉欲得不賺舉麼香山為汝諸人再舉大龍山高小龍山低香山處中恰好相宜恁麼舉了還得不賺麼良久曰葱嶺罷詢熊耳夢雪庭休話少林春上堂孤峰絕頂靈松上聳於千尋萬里江湖皓月光輝於碧落正當恁麼時野鶴無因措足游魚何處藏形眼睛定動十萬八千擬議之間鄉關阻隔香山今日已是開眼溺床汝等諸人切莫夢中說夢上堂歸源性無二方便有多門但了歸源性何愁方便門諸人要會歸源性麼露柱將來作木杓旁人不肯任從伊要會方便門麼木杓將來作露柱撐天拄地也相宜且道不落方便門一句作麼生道三十年後莫教錯舉上堂知有佛祖向上事方有說話分諸禪德且道那箇是佛祖向上事有箇人家兒子六根不具七識不全是不闡提無佛種性逢佛殺佛逢祖殺祖天堂收不得地獄攝無門大眾還識此人麼良久曰對面不仙陀睡多饒寐語鄧州招提元易禪師潼川銅山稅氏子大觀四年出住招提凡十更名剎上堂曰十方同聚會箇箇學無為此是選佛場心空及第歸大眾只如聞見覺知未甞有間作麼生說箇心空底道理莫是見而不見聞而不聞為之心空耶錯莫是忘機息慮萬法俱捐銷能所以入玄宗泯性相而歸法界為之心空耶錯恁麼也不得不恁麼也不得恁麼不恁麼總不得未審畢竟作麼生還會麼良久曰若寔無為無不為天堂地獄常相隨三尺杖子攪黃河八臂那吒冷眼窺無限魚龍盡奔走捉得循河三脚龜脫取殻鐵錐錐吉凶之兆便分輝借問東村白頭老吉凶未兆若何為休休休古往今來春復秋白日騰騰隨分過更嫌何處不風流咄上堂今朝四月初一衲僧雙眼如漆顧著露柱燈籠平地一聲霹靂驚起金剛出戶半夜荒村失路天明却到門前眼耳鼻中塵土大眾只如金剛眼睛爍破四天下為甚迷却路頭還會麼為憐風月好忘却故園春上堂皓月當空澄潭無影紫微轉處夕陽輝彩鳳歸時天欲曉碧霄雲外石笋橫空淥水波中泥牛駕浪懷胎玉兔曉過西岑抱子金雞夜棲東嶺於斯明得始知夜明簾外別是家風空王殿中聖凡絕跡且道作麼生是夜明簾外事還委悉麼正值秋風來入戶一聲碪杵落誰家上堂舉雪峰示眾云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看大眾雪峰恁麼說話還有出身處也無若道有為甚麼大千法界在一粒之中若道無是甚麼人打鼓普請看若也會得不用周遮其或未然聽取一頌撥動乾坤步轉移南觀北斗有誰知金烏暮向西山急曉逐扶桑半夜飛僧問古者道逈絕無人處聚頭相共舉既是逈絕無人處是誰相共舉曰青山與白雲云只如青山白雲還知有也無曰若知有即有人也云未審是甚麼人證明曰白雲與青山云莫便是和尚為人處麼曰莫錯認問古鏡未磨時如何曰精靈皺眉云磨後如何曰波斯彈指云為甚麼如此曰好事不出門紹興丁巳七月二十五日索筆書偈安然坐寂火後收設利搭于學射山壽山壽八十五長安天寧大用齊璉禪師上堂曰清虗之理佛祖同歸畢竟無身聖凡一體理則如是滿目森羅事作麼生纖塵絕際渠儂有眼豈在旁窺官不容針私通車馬若到恁麼出地始可隨機受用信手拈來妙應無妨當風玄路直得金針錦縫線脚不彰玉殿寶階珠簾未卷正當此時且道是甚麼人境界古渡秋風寒颯颯蘆華紅蓼滿江灣潼川府梅山己禪師僧問如何是法身邊事曰枯木糝華不犯春云如何是法身向上事曰石女不粧眉東京淨因自覺禪師青州人族王氏幼以儒業見知於司馬溫公留門下十餘年事高尚而無意功名一旦落髮從芙蓉游履踐精密契悟超絕崇寧四年出住大乘徽宗皇帝聞其名詔居淨因上堂曰祖師西來特唱此事自是諸人不肯委悉向外馳求投赤水以尋珠詣荊山而覓玉殊不知從門入者不見家珍認影迷頭豈非大錯直得宗門提唱體寂無依念異不生古今無間森羅萬象觸目家風鳥道遼空不妨舉步金雞報曉丹鳳翱翔玉樹華開枯枝結子只有太陽門下日日三秋明月堂前時時九夏要會麼無影樹垂寒㵎月海潮東注斗移西上堂召大眾曰還會麼佛也不信祖也不信只箇自己猶是冤家豈況自餘有甚麼信處大眾且道為甚麼不信不信不信不見道事莫等閑信人須悠久看僧問猊座既登於此日請師一句定乾坤曰大旱連天三尺雨驚人平地一聲雷云知師久韞囊中寶今日當場略借看曰木馬踏開雲外路泥牛耕盡海中田云只這消息今知已何須更問洞中天曰未到潼關即便休問如何是佛法大意曰有問不當頭箇中無說路云學人不會乞師再指曰空劫那邊開得口石人也解皺雙眉福州普賢善秀禪師僧問如何是正中偏曰龍鳴初夜後虎嘯五更前云如何是偏中正曰輕煙籠皓月薄霧鏁寒巖云如何是正中來曰松瘁何曾老華開滿未萠云如何是兼中至曰猿啼音莫辨鶴唳響難明云如何是兼中到曰撥開雲外路脫去月明前襄陽府鹿門法燈禪師成都華陽人族劉氏少依大慈寶範為僧卑聽華嚴得其要棄謁芙蓉容見乃問如何是空劫已前自己師於言下心跡泯然從容進曰靈然一句超群象逈出三乘不假修蓉拊而印之後開法鹿門上堂召大眾曰耳底泉聲眼前山色簷頭雨滴籬畔黃華嗈嗈新鴈唳南雲片片亭梧紅滿地恁麼指示大小分明本色底人便須薦取雖然如是猶落聲色邊事只如不落聲色一句作麼生道還會麼露柱燈籠常對語夜深拈轉太虗空僧問西天解夏以蠟人為驗未審鹿門以何為驗曰雨來山色暗雲出洞中明問虗玄不犯寶鑑光寒時如何曰掘地深埋問如何是逍遙物外底人曰徧身紅爛不可扶持西京天寧禧誧禪師蔡之西平人族宋氏齠齔辭親師開元繼平熙寧六年中經選下髮受具初游講聚洞究入微學徒宗之一日罷講浮食方外僅二十年始蒙記於芙蓉自振法天寧繼徙韶山觀音丹霞上堂曰韶山近日沒巴鼻眼裏聞聲鼻甞味有時一覺到天明不在床上不落地大眾且道在甚麼處諸人於斯下得一轉語非唯救得韶山亦乃不辜行脚其或未然三級浪高魚化龍癡人猶戽夜塘水上堂拈起拄杖曰混然無內外和融上下平喚作清淨法身以拄杖橫按曰天台楖栗木南岳萬年藤喚作圓滿報身卓拄杖一下曰敲空作響擊木無聲喚作千百億化身遂倚拄杖曰三名一體座主家風靠在虗堂俗流見解總不恁麼如何商量擲下拄杖曰驚起木雞啼子夜能教芻狗吠天明僧問如何是君曰宇宙無雙日乾坤只一人云如何是臣曰德分明主化道契物情機云如何是臣向君曰赤心歸舜日盡節報堯天云如何是君視臣曰玄眸凝不瞬妙體鑒旁來云如何是君臣合曰帳符尊賤隔潛信往來通政和五年九月四日忽召主事令以楮囊分而為四眾僧童行常住津送各一既而復曰丹霞有箇公案從來推倒扶起今朝普示諸人且道是箇甚底顧眎左右曰會麼云不會師曰偉哉大丈夫不會末後句遂就寢右脇而化壽五十九夏三十九隆興府泐潭闡提惟照禪師簡之陽安人族李氏幼超邁而惡俗一日授書至性相近也習相遠也遽曰凡聖本一體以習故差別我知之矣即去家趨成都師鹿苑清泰年十九剃染登具泰甞令聽起信於大慈師輒歸臥泰詰之師曰既稱正信大乘豈言說所能了乃虗心游方謁芙蓉於大洪甞夜坐閣道適風雪震薄聞警盜者傳呼過之隨有所得辭去大觀中芙蓉嬰難師自三吳欲趨沂水僕夫迷道師舉杖擊之忽大悟歡曰是地非鼇山也耶比至沂芙蓉望而喜曰紹隆吾宗必子數輩矣因留躬耕湖上累年智證成就出領招提遷甘露三祖宣和壬寅詔補圓通棄去復居泐潭上堂曰古佛道我初成正覺親見大地眾生悉皆成正覺後來又道深固幽遠無人能到㘞沒見識漢好龍頭虵尾便下座上堂過去諸佛已入涅槃了也汝等諸人不應追念未來諸佛未出於世汝等諸人不要妄想正當今日你是何人參上堂伯夷隘柳下惠不恭君子不由也二邊不立中道不安時作麼生拈拄杖曰鴛鴦繡出從君看不把金針度與人上堂太陽門下妙唱彌高明月堂前知音蓋寡不免舟橫江渚棹舉清波唱慶堯年和清平樂如斯告報普請承當擬議之間白雲萬里上堂本自不生今亦無滅是死不得底樣子當處出生隨處滅盡是活生受底規模大丈夫漢直須處生死流臥荊棘林俯仰屈伸隨機施設能如是也無量方便莊嚴三昧大解脫門湯然頓開其或未然無量煩惱一切塵勞嶽立面前寒却古路上堂玄道不可以強為得妙智不可以有心知真諦不可以存我解至理不可以營事為若薦得去迦葉糞埽衣價直百千萬若薦不得輪王髻中寶不直半分錢參上堂古人道隨肢體黜聦明離形去智同於大道正當恁麼時且道是甚麼人刪詩書定禮樂還委悉麼禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉僧問真如界內本無迷悟之因方便門中願示無生之曲曰六六三十六清風動脩竹云洪音一剖驚天地有無情類盡霑恩曰一曲兩曲無人會雨過夜塘秋水深問承師有言雲黯黯處獨秀峰挺出月裏泐潭水光生豈不是寶峰境曰若是寶峰境憑君子細看云如何是境中人曰看取令行時云只如承言須會宗勿自立規矩如何是和尚宗曰須知雲外千峰上別有靈松帶露寒雪下僧問祖意西來即不問時節因緣事若何曰一片兩片三四片落在眼中猶不薦建炎二年正月辛丑晚參舉論曹洞宗旨不絕如線復歎息今之世續慧命者詰朝閉門稱疾安居如常俄書別耆宿中夜戒執事者毋以俗禮治喪侍者請遺偈師笑以褻語答之而逝七日闍維得設利如珠琲舌齒不變提舉馮公溫舒深異其事以二月庚申塔于寺之西峰壽四十五臘二十五建昌軍資聖南禪師聖節上堂顧眎左右曰諸人還知麼夜明簾外之主萬化不渝瑠璃殿上之尊四臣不昧端拱而治不令而行壽逾百億須彌化治大千沙界且道正恁麼時如何行履野老不知黃屋貴六街慵聽靜鞭聲筠州洞山微禪師上堂曰日暖風和柳眼青冰消魚躍浪花生當鋒妙得空王印半夜崑崙戴雪行僧問如何是默默相應底事曰瘂子喫苦瓜大洪恩禪師法嗣隨州大洪淨嚴守遂禪師遂寧蓬溪人族章氏未冠禮南巖自慶為師年二十七落髮進具遠扣師門後密證於洪山出住水南遷大洪上堂召大眾曰一拳拳倒黃鶴樓一踏踏翻鸚鵡洲慣向高樓驟王馬曾於急水打金毬然雖恁麼爭奈有五色絲絛繫手脚三鑐金鏁鏁咽喉直饒鎚碎金鏁割斷絲絛須知更有一重礙汝在且道如何是那一重還會麼善吉維摩談不到目連鶖子看如盲上堂舉昔日有官人問藥山和尚何姓藥山云正是時官人罔措下至知事處問云適來問長老何姓答道正是時的當是姓箇甚麼知事云只是姓韓藥山聞云若六月道正是時不可道我姓熱也又岩頭問講僧見說大德會教是否云不敢岩頭舉拳云是甚麼教僧云是權教岩頭云苦哉我若展脚問你不可道是脚教也師曰奇怪二老宿有殺人刀有活人劒一轉語似石上栽華一轉語似空中挂劒當時若無後語達磨一宗掃土而盡諸人要見二老宿麼寧可截舌不犯國諱
