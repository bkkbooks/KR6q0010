body:
  text: 平江府報恩光孝禪寺臣僧正受編偈頌翠巖真禪師三首占古慶懷南北無知已東西信有緣祖師言不識真宰理方宣性海寬長滿心華靜後圓定山三徑草誰為掃寒煙偶作白雲漫世界清露滴咸秦滄海幾回變衲僧把要津因事三歲孩兒百歲翁你少我老相逢陌路各西東生死交謝琉璃殿上蒼苔色絶人往還明月堂前匝地風我門昌盛法昌遇禪師九首看經半滿藏兮一絡索子細看來特地錯東村王老打張三兩箇善神齊發惡休發惡寒猿昨夜繞窗啼白鳥今朝上虗閣寄昭師兄溪月同觀影異圓嶺雲重鎖故山關烏雞帶月啼天曉芻狗銜華吠斗寒徑直斫開離却易迂回顧鑒入應難龍川露滴層峰外紅日圓暉北上看不勘自破打破虗空不用鎚門頭何假更安錐從他勝有張良計不勘還須失利歸三句第一句無邊大火聚擬議早身灰誰敢當頭第二句龍蟠并虎踞更問毗耶離已落他路布第三句脫却娘生袴直下便承當鐵山橫在路三訣第一訣袖裏三斤鐵忽遇病維摩拈起驀頭楔第二訣六月漫天雪無處避炎蒸渾身冷如鐵第三訣八字無兩人胡僧笑點頭眼中重著屑金山達觀頴禪師一首答問曹洞宗旨洞下門庭理事全白雲巖下莫安眠縱饒枯木生華去送出荒郊不直錢黃龍普覺南禪師二首答張職方夢幻年光過耳順茆庵草座頗相宜日高一鉢和羅飯禪道是非都不知不知猶作不知解解在功成百鳥奔欲絁銜華箇中意江心明月嶺頭雲雲峰悅禪師六首示學者赫日光中誰不了底事堂堂入荒草擔簦負笈苦勞神從門入者非家寶演宗乘提祖教千年枯骨何堪咬南北東西歸去來拈得鼻孔失却口和泥合水五豫有一道千聖不到北走南奔相頭買帽是何之道雲橫碧嶠豫有一辨風生嶽面舉目千差知君不薦是何之辨僧堂佛殿豫有一説善知時節若人會得眼裏漆屑是何之説春寒秋熱豫有一劒寒光若練虎嘯風生飛霞走電是何之劒灰頭土面豫有一機聖凡豈知拈却鼻孔舉起須彌是何之機淵明皺眉開先暹禪師一首寄蓮華峯祥庵主蓮華峰色撑寥沈中有高人眠歲月勞勞塵慮不經心凜凜寒姿天欲雪腰間佩文殊逼佛劒手中握龍猛金膏筆又不肯掃蕩妖氛又不肯點化頑石殷勤問師住山得幾秋報我百年只是三萬六千日芙蓉楷禪師五首妙唱非干舌剎剎塵塵處處談不勞彈子善財參空生也解通消息華雨巖前鳥不銜死蛇驚出草日炙風吹草亂埋觸他毒氣又還乖暗地忽然開死口長安依舊絶人來解針枯骨吟死中得活是非常密用他家別是長半夜髑髏吟一曲冰河紅焰却清涼鐵鋸舞三臺不是宮商調誰人和一場伯牙何所措此曲舊來長古今無間一法元無萬法空箇中那許悟圓通將謂少林消息斷桃華依舊笑春風白雲端禪師四首應真不借情塵我自出安用世人知月好還邀客華開亦詠詩訓徒朝有則鍊句夜忘疲頗似區區者剛然不識伊涉流轉物物理詎可忽逢時各解鳴亂蛙迎雨急孤狖帶霜清歷歷何先後寥寥異性情汨羅嫌醉者病在不分明偶作無華可獻見牛頭靄靄聲光數百秋今日龍門庵裏老依前獨坐冷颼颼贊茶陵郁禪師水月以喻兮古來已多我今不然兮所陳伊何百尺竿頭曾進步溪橋一踏沒山河固不遊方兮何遊之有玄沙保壽兮師與其偶鴈峰之東兮洣川之口三十三秋兮大師子孔舒兮卷兮已而矣依前空瀉洣川水九江相去幾千里父有重牙子無齒謾勞提耳一爐香微煙旋逐松風起保寧勇禪師十首寄端和尚二雲外青山萬萬重有誰千里暗相通明時簸弄乾坤者盡握靈蛇在手中無限栗蓬吞已了百千圈子透難窮有時共入洪波裏盡日漫天是黑風上雲蓋顒和尚二拈將楖栗路縱橫大地清風颯颯生北斗柄斜輕撥轉大唐人眼直須盲憶昔相將決死生死生難決蓋生盲也知不負歸根處到了還從舊路行答舒城范秀才舉手抹太虗光明能燦爛赤腳上刀梯縵縵縵縵縵山居五石女呵呵笑東君信已通羽毛爭叫噪華木競青紅樵唱深雲裏農耕驟雨中祖師門下客特地問家風出家冬景致何處不光輝大地冰凌合漫天雨雪飛松間戴笠去林下拾薪歸盛爇爐中火通宵即當衣隨分度朝晡客來何所須點茶收却盞行飯展開盂暑熱同搖扇天寒對擁爐等間相借問還識老僧無林下無餘事高眠足矌懷舀將鍋裏粥抽出竈中柴坐久慵移榻人來揖上階門前千萬仞誰肯度懸崖卓錫孤峰頂門前滑似苔豐干騎虎去拾得趂牛來倐忽風雲合逡巡境象開相逢語何事搖手任人猜五祖演禪師三首山居床是柴棚席是茅枕頭葛恆半中凹霜天索寬人投宿睡到天明手腳交送分衛者巖縫迸開雲片片半籠幽石半從龍為霖普潤焦枯後却入蘿煙第一重聞角幽幽寒角發孤城十里山頭漸杳冥一種是聲無限意有堪聽與不堪聽淨因枯木成禪師一首示小師思悟維摩不默不良久打破玄關沒窠臼堪嗟幾箇杜波斯問著癡癡不問口黃龍死心新禪師四首死心室死心心死死全心死得全心一室深密把鴛鴦間繡出從教人競覓金針和方侍者頌曹山雲中因緣滿山風雪色凝然鳥道玄玄沒二邊風翅斂時全叶正龍珠耀處却還偏通途辨的誰云妙雙鎖金針理未玄若謂孤峰曾不墮依前流落未生前與方侍者念念向本家本家即心也念念行吾道吾道即性也吾心性無二佛祖更無也贊六祖六祖當年不丈夫倩人書壁自塗糊明明有偈言無物却受他家一鉢盂慧林慈受深禪師一首偶述萬事無如退步眠松床紙帳暖如氈夢中説話無華草況是山僧不會禪泐潭湛堂準禪師五首送雲侍者鳥窠吹布毛老婆為侍者今古道雖同寶峰不然也二月三月時和風滿天下是處百華開遠近山如畫歧路春禽喧高巖春水瀉頭頭三昧門虗明周大野好箇真消息書送汝歸舍衲僧末後句噓是何言歟送利監收開眼合眼道契寰中東行西行禪非物外大仰插鍬叉手靴裏動指頭南泉把鎌刈茅誰人知此意今也道不及古僧僧解數滿肚但尋雪月風華失却昔年活路不能返照回光法界毗盧全露阿呵阿笑倒利頭陀風前月下囉哩囉深夜處分諸火客你看是甚麼火色自贊三我若自贊雲居羅漢我若自毀無主餓鬼贊之不欣毀之不嗔毀譽不動東魯西秦爾圖我真又求我贊我真我贊兩重公案家醜不外揚己德不自談寄之以數六九五十三我已是妄爾更妄寫妄我妄寫兩重虗假欲傳吾真須泯見聞聲色不礙相似十分長蘆祖照和禪師一首題永明智覺壽禪師頂相慧日峰高秋色冷錢塘江靜月華明寒光一爍周沙界筆下看來未十成泐潭闡提照禪師一首自贊自小來打硬佛祖不奈何放藞苴住院殃害殺禪和道行闡提道歌唱闡提歌歡喜入地獄誰菅你閻羅龍門佛眼遠禪師十一首標指五了妄元真問汝貪嗔癡家住在何處我今要與汝各各分頭去好好細思量免被他官府大者名為貪養得二舍弟三郎都一處日夜共活計令汝家戶大使汝善調制子今苦厭我我與子發誓一要子自知二要子依例三要當處生四要歡喜偈與汝善和同一一無凡穢一覺一切了何須去煩翳我是諸佛母十方及三世同居善説世人不識我求我以形容形容不相似徒觀紙上龍若要識得我問取主人翁主人好家業物物要安藏六兄誇藝術三母足溫良南聽善書算北庫多財糧住來但覺久懶去問張主君若一識得與汝同屋梁美容可觀一別海山中十年春草緑相思在方寸顏容皎如玉音書杳不來桃李繁且熟唯有意中人使我眉頭蹙妙容非覩通身無影象脫體露堂堂不話非聲色何曾有短長河沙恆遍現故號法中王優曇華正開嗅著不聞香廷促自爾春日春山裏萬事盡皆春春光照春水春氣結春雲春客春情動春詩春更新唯有識春人萬劫元一春祖師地種華及總頌四地性地本無生因生説有地流傳古至今非愚亦非智種從昔未曾迷於今何所悟只緣種性深更亦無別路華有種有心地因緣華日開要知成果處却笑祖師來總五葉華開後山長水更深亂雲橫谷口遊子謾追尋示衆求心心未諦等人人不來巖華曉來雨寂寞為誰開五色燈光眚所成但除其眚莫除塵若言本眼何曾眚乃是臨河渴死人龍牙言禪師一首張提舉到山有作清世朝賢難會面巖堂語道霜風扇借問何時出帝鄉笑云西蜀烏頭賤阿呵阿誰人薦裴相當年典豫章不惜眉毛又相見咦勝因戲魚靜禪師二十二首擬寒山自述多見擬寒山不然擬拾得沖天各有志擬彼復何益居山山色翠臨水水聲長風華與雪月時處自歌揚頗憶未參禪教中聽十年晝夜數他寶何曾得半錢發志出行腳遍求無病藥及至休歇時依舊沒鞋著行時唯信腳到處便為家午飯隨粗細三衣亂掩遮空名耳裏水微利眼中砂一覺黃昏睡金烏出海涯目述自高吟自高非倨傲高懷肯隨動幽鳥徒輕噪無水定無源有煙必有竈天堂并地獄自作還自報近見一般人堂堂似佛祖入室求知識為明生死事問汝莫是賊當時面如土語言勿生嗔只箇是生死參禪脫生死輒莫被魔使八風一任吹六塵終不污非語亂如麻截斷衆流句仰面看青天立地超佛祖五更一盂粥辰時一頓飯晝夜兩覺眠一日事俱辨毀我還自毀贊我還自贊是非與榮辱紅爐亦金彈良田著力耕自利復利故莫栽荊棘樹子孫沒出路仁者愛安仁狡侫生嫉妬勸汝早回頭翻覆面前莫笑我自述粗言無義理豈為騁文辭因筆寫其志百年呼吸間何用苦較計勸汝莫癡毒無常忽忽至一曲樂升平非關囉哩稜山河俱屬宋雲水且饒僧時擊松風磬長然澗月燈願王似南嶽萬世碧層層十二時半夜子心境俱忘正莾鹵撚轉天關萬象移泥牛入海誰親覩雞鳴丑一聲相報無前後驚覺騰騰夢裏身釋迦老子交橫走平旦寅翠竹黃華拂眼明靈禽異獸爭嘲哄總解回頭轉眼睛日出卯紫霧紅霞騰海島擠排無限利名人出門忘却衣中寶食時辰掌鉢徒勞入市巡若將心受檀那飯也似無功食祿人禺中巳選甚淫坊并酒肆回頭便是出塵人翻笑曼殊携慶喜日南午卓然獨耀無今古糞掃堆頭玉馬嘶琉璃殿上金剛舞日昳未萬樹千峰影斜墜兔角龜毛繞市尋貴賣還思買時貴晡時申一日三分過二分直饒省得來時路到家急急也黃昏日入酉殘霞返照門前柳無聲一曲牧童歸背跨牛兒師子吼黃昏戌角韻鍾聲遐邇一要會聞復翳根除補陀巖上尋彌勒人定亥念念無常剎那快回光省取不遷心坐照十虗誰對待虎丘隆禪師二首送化士分衛大地撮來粟米粒一毫頭上現乾坤居家不離途中事常在途中不出門贊達磨盍國人難挽西携隻履歸只因熊耳月千古冷光輝薦福常庵崇禪師一首讀莊子一受其成形不忘以待盡人生悉如此誰悟此中玄白日無私照青山任意眠松風來不斷泉石自相便路出千峰上雲歸竹徑邊寶華佛慈鑒禪師五首五派臨濟銅頭鐵觜百家冤一喝雙分照用全三尺吹毛定寰宇臨行拋向瞎驢邊雲門三句都將一串穿等間挂向御樓前幾多行客眼定動東海鯉魚飛上天曹洞紫庭黃閣帶春溫寢殿何人侍至尊長愛百司分職處玉鞭敲鐙出金門溈仰一箇撒開千萬箇簸箕解説無生話草堂睡起觜盧都寂子要須原夢破法眼溪光野色浸樓臺一笛遙聞奏落梅風送斷雲歸嶺去月和流水過橋來淨慈月堂昌禪師二首送僧掃盡諸方路布禪到頭窠臼落誰邊臺盤角畔重拈起萬里神光頂後全自贊丹青寫出剩却一箇竇入布衫著著便破土面灰頭那畔行水墨觀音解推磨廣福尚禪師二首離黃龍有作大袖長拖出祖關蛟龍戰罷海濤間寄言白首參玄者休把虗空側點斑次韻答張無垢居士從來高價莫饒伊百戰場中奮兩眉奪角衝關君會也叢林誰敢更相欺長蘆真歇了禪師三首示衆意句難分別風騷路外求提刀空四顧駐步失全牛落眼情塵脫歸根景象幽萬緣俱不到佛祖莫能酬路斷無依著空船載月歸力窮忘一色功盡喪全機密混凝流處融通向背時古帆風靜夜任運應高低不犯清波句澄江浸一鈎棹頭風色靜篷底夜明秋鴈影沉寒水蘆華隱白牛須知耕釣外穩密類難收靈峯古禪師一首題佛鑒禪師語録後流水高山不在絃等間成曲又成篇列瑚樹枝枝好撒水銀珠顆顆圓揮落禪關無少滯增添衲子幾重冤擬於紙上明端的爭似當機自造玄黃龍草堂清禪師一首讀法界觀多中即一一中多浪裏全提水是波波水滅時多一盡日輪當午見星河善權智禪師四首識自宗紫微宸幄緑苔封寂寂無人寢殿重玉漏夜傳尊貴語六宮不許扣金鍾和宏智頌仰山語三機絲不立顯真空斷滅應無箇事同沒底月船乘夜泛無鑐鎖子兩頭通回眸照處猶春雨撒手何時正曉風白髮童兒騎雪馬轉身就父豈同功如今認得正當初月下披雲上寶車暮去朝來誰辨的開門何處不逢渠德山佛性泰禪師五首四時般若日暖風和天地春野華芳草一番新靈山佳致依然在誰是當年微笑人萬木扶疏夏景長園林梅杏嚼紅香山前麥熟還知否一一當機為舉揚飄飄黃葉墜幽庭萬里無雲宇宙清颯颯涼颷生戶外韶陽三句轉分明林木蕭條復本根嚴霜凍雪鎖松門地爐煨火通身暖寒暑到來休更論贊達磨泛舶來梁自普通一鎚擊碎有為功誰云面壁無言説爭奈當門齒露風徑山大慧普覺杲禪師十一首學者請益竹篦雲門舉起竹篦開口知君話墮上方香積不餐甘伏食人涕唾雲門舉起竹篦禪和切忌針錐鸞鳳不棲荊棘𮭗𮭗偏守空池雲門舉起竹篦通身帶水拖泥奉報參玄上士撒手懸崖勿遲雲門舉起竹篦擬議知君亂統直饒救得眼睛當下失却鼻孔雲門舉起竹篦露出心肝五臟可憐猗死禪和猶自魂飛膽喪示鼎需禪人頂門竪亞摩醯眼肘後斜懸奪命符瞎却眼解却符趙州東壁挂葫蘆寄福勝長老真人十八界元空三十一人同姓呂分散遊山各占山三十一人又同處贊普融和尚示無作相擊塗毒鼓行無緣慈誅佛誅祖如是見得普融妙喜未敢相許直下來也如龍似虎一鎚打破太虗空至今一缺無人補李漢老參政寫師頂相求贊這漢沒量罪過不合引惹措大被渠笑裏藏刀殺去吾祖達磨不知有底冤讎一向興災作禍杲上座諾惺惺著莫教話墮唐道人請贊這尊慈無摸索忽地喜忽地惡喜也和氣如春百華開蕚惡也雷電風雲一時俱作似恁麼做處若非阿修羅王即是金仙大覺唐道人緊收却逢人不用展開卷來送在壁角祖傳禪人求贊藞苴全似川僧蕭灑渾如浙客偏向情未生時拈出報慈一隔尊性不定莫可窺測見小時嫌蟭螟眼太寬見大時謂太虗空惑窄似這般底阿師如何受人天供養好與劈腮一摑烏巨雪堂行禪師三首贈禪者句下出諸礙翻身古劒寒欲明如上事須是髑髏乾削東坡宿東林偈溪聲廣長舌山色清淨身八萬四千偈明明舉似人贊佛眼和尚因我得禮你玄沙出窠臼龍門與薦燈後咄護國此庵元禪師二首答虎丘隆禪師佛祖權衡真妙絶一句通明萬機徹縱橫端似走盤珠念念圓融大休歇要須滴滴爛如膿莫學南方半生滅掀然四海浪翻空撼動須彌石崖裂電火影裏分緇素烈焰堆中掬飛雪玲瓏八面生清風皎潔一輪霜夜月無位真人乾屎撅紫真珠帳羅紋結握起吹毛照膽寒撩撥石人驚吐舌全提半提風凜凜奪食驅耕妙無竭棒如雨點聲如雷一劄當機便超越君不見臨濟宗風正令當如此赤骨歷地成活業送化士言前薦得成多事句後承當亦未真截斷兩頭間路布不知誰是透關人道場正堂辨禪師五首送街坊貞女不著娘家服丈夫豈假分時財十杯五盞從何有空奮雙拳趂得來送及禪人馬面夜叉才稽首牛頭獄卒便擎拳洞賓唱箇陶甄理脫殼烏龜飛上天自贊三土豹長老悟處敲誵滑頭勝似蓴菜軟頑何啻黐膠曾被三腳驢子踏得鼻孔成四瞎老婆半夜吹火張聾子日午聞歌畫得這般毫相出生入死降魔有時鼓起龍門浪娑竭龍王不奈何潦倒住持不言規矩聚三百僧説無義語平生要討便宜落水也求乾處欽山方禪師四首四威儀山中行步步踏無生手把過頭杖輕重不多爭山中住生死全無路地獄與天堂總是間家具山中坐松竹大底大時時起清風自唱還自和山中眠祖佛並齊肩神通并妙用盡在枕頭邊靈隱佛海遠禪師五首示無住道人瞎堂有箇不是掃盡衲僧巴鼻驚回陝府鐵牛吞却山河大地寄白石峯體首座白石峯頭衲子多鐵牛吸盡井中波他年布袋重開口佛祖依前不奈何寄道場無庵全和尚雪頂崑崙著意猜十頭羅剎笑顏開鑊湯冷處君先入滸眼橫時待我來示道源大師學佛以悟為則虗詞不入公門君看義之草聖一點入石三分自贊大地一渾身虗空絶四鄰不識柏樹子喚作麻三斤好時十分瀟灑惡時一味藞苴等間牽犂上佛殿乘興鉢盂裏走馬平地撒屎撒尿知他是真是假禪人描邈將來大蟲頭上火把虎丘雪庭淨禪師四首四牛圖龍圖王以寧序本無位次那容橫立階梯體絶名言豈許強生節目玄關跳出何妨土面灰頭金鎖喝開始解披毛戴角隨機攝化應物現形唯一堅密身混入諸塵現古今作牧牛圖皆方便之一瑞耳或黑或白或有或無然皆未能盡善今雪庭道人獨以四牛皆一色白中間二位悟則逆騎迷則順騎前後二位為牛者表父母未生及涅槃時也四皆白者表迷亦不失悟亦不得生亦不來死亦不去露地坦然法身明矣一父母未生空劫那畔世界未成此性已具坦然明白本體純真衆生因妄發生聖人從悲起智頌曰混沌不分處三緣未合時神通難可測佛眼莫能窺坦蕩全軀白安眠露地肥為耽春色好又被業風吹二三緣既合六賊互興捨父逃亡迷己逐物同門出入各不相知向外馳求自生退屈故謂之迷頌曰改換毛衣了從茲不自由只知今日事忘却舊時牛步步雖同轍昂昂不轉頭四山成隔闊相逐沒時休三回頭忽見覿面相逢十二時中全承渠力君臣道合父子相投自利利他續佛慧命故謂之悟頌曰瞥爾家欄裏回頭識得伊不須常管帶取次倒橫騎似客歸家日如兒得母時平田荒草裏吹唱哩囉哩四始終一貫起滅同時終日生而不生終日死而不死廓然絶迹湛爾清虗如金博金似水歸水不斷煩惱而入涅槃不住玄關匪居正位披毛戴角向異類中行此諸佛頓證法門非衆生見聞境界頌曰脫下娘生袴還歸不動尊萬緣具頓罷一路涅槃門大海波瀾息青天絶點雲披毛同異類無剎不分身天童應庵華禪師四首偶作黃檗堂前行正令天童今日驗疏親老來拄杖思分付未見當年喫棒人贊臨濟臨濟禿無眼目討便宜兮不知足高懸羊頭賣狗肉稱頭斤兩惜如玉胸中更有一般毒天輕觸贊此庵十分畫得相似只有一處殽訛佛祖檢點不出從教平地干戈禪人寫師頂相求贊身心一如身外無餘不願成佛亦非凡夫甘作上牢漆捅無心計較錙銖萬古銀山鐵壁更沒者也之乎是則活埋老僧不是則打殺曇慧暗透兩重牢關烈焰不藏蚊蚋博山本禪師二首浴佛今日當年佛降生當年今日不多爭若言八十還歸滅有眼分明特地盲遣僧通嗣書射殺南山老大蟲行人從此路頭通年來獵犬渾無用臥對千峰與萬峰東林卍庵顏禪師七首明道心如墻壁眼如眉月餌煙蓑下釣磯湛湛寒光凝一片波瀾不犯取魚歸與洞照禪人拔出趙州舌頭去却當門荊棘歸家倒臥橫眠冷笑奔南走北示衆二無用頑皮作氣毬誰人躍得上高樓如今潦倒渾無力輥得行時即便休磐陀石上共安居水遠山高一事無唯有多情峰頂月夜深移影到階除贊達磨五乳峰前九年冷坐孤風絶攀名不敢涴斷臂嗣芳賤賣滯貨螟蠕有子負之蜾螺即説呪曰類我類我自贊一來自三川應緣兩浙肩擔華木瓜重簷肚束馬簸箕三篾飯咬鐵釘羹煮木札要是圓悟兒孫喪却楊歧家法姧漢多疑黠兒落節即真非真是相非相龜毛拂子兔角拄杖自歌自舞獨吹獨唱認得師姑是女兒志公不是間和尚國清簡堂機禪師二首送僧造普同塔玉骨本玲瓏挂角羚羊不見蹤特地作亭圖甚麼為憐松竹引清風送育維那克賓一字入公門有理難伸笑殺人隱靜不行興化令他年誰道棒頭親焦山庵體禪師六首白石庵遇作白石居山人不住那伽定拄杖禿却枝鉢盂倒安柄人草覓冤讎虗空懸業鏡喝下劒光寒放行摩竭令忘機絶照剔起遮天眼空王舊話圓氣毬剛似鐵石臼軟如綿苦海無驚浪紅爐斷火煙莊周蝴蝶夢舉世若為原示衆三著腳孤危草不生沒棲泊處等間行臨風闊却噇空口斷送渾家入火坑生獰別是一般村品藻先賢薄後昆掉放孤峰爭合殺棒頭有眼蓋乾坤男兒腳底透長安得坐披衣肯自謾三尺冷光輝夜月一條秋水迸人寒贊達磨萬福西來老骨檛不遵行止渡流沙被人打落當門齒啞子依前喫苦瓜玉泉窮谷璉禪師一首贊月庵這箇老漢渾無縫罅點鐵成金指鹿為馬以張拙秀才語擒縱多口阿師跨三腳驢兒指點諸方話霸遇賤時三世諸佛正眼難窺遇貴時八大龍王亦難酬價阿呵呵也大差只因會春園裏失却眼睛從此惡名滔滔流遍天下高挂虗堂兮如師子全威一任百怪千妖暗中驚訝燈禪燈禪第一不得容易與伊點化咄公安遁庵珠禪師二首題出山相半夜逾城往雪山龍樓鳳閣絶躋攀如今輥出草窠裏一箇間人天地間自贊月色照幽谷泉聲落斷崖水光山色裏一塊爛枯柴劒門分禪庵主七首雜詠參禪雖説做工夫才涉毫芒自取誅幾度見君深問訊養雞意在五更初慣曾放步竿頭去坐却金烏不放東一派天河流不盡桃華滿眼趂春紅露地白牛須打殺紅爐鼓浪立教乾脫然透出縱橫去猶欠平生無病丸展鉢開單休解會橫來直去任生疑隔宵兒子逢親母豈待傍人説是非平地黃金成糞土翻然糞土是黃金直饒用得渾相似畫虎何嘗解咬人隨例拋鈎泛五湖渠船魚滿笑豫無豈知豫布鈎頭餌獨在蒼龍不在魚騰今耀古無私句不比偷心揑合成學海義天無討處見成拈出示禪人酒仙和尚十首雜詠緑水紅桃華前街後巷走百餘遭張三也識我李四也識我識我不識我兩箇拳頭那箇大兩箇之中一箇大曾把虗空一𭣟破摩挲令教却恁麼拈取須彌枕頭臥醒也街裏走醉也街裏走無錢買酒乞來噇昏昏怛怛忘前失後張開兩眼見北斗拈得斗柄酌海水望空直拔瀉入口誤呷火龍歸五臟日午夜半大哮吼隨我來隨我來與你安身法上竿子打筋斗楊子江頭浪最深行人到此盡沈吟他時若到無波處還似有波時用心金斝又聞泛玉山還報頽莫教更漏促趂取月明回一六二六其事已足一九二九我要喫酒長伸兩腳眠一寤起來天地還依舊癡兀兀兀兀癡落華流水自依依酒飽摩挲箇肚皮儂家元是林公兒貴買朱砂畫月算來枉用工夫醉臥緑楊陰下起來強説真如泥人再三叮囑莫教失却衣珠門前緑樹無啼鳥庭下蒼苔有落華聊與東風論箇事十分春色屬誰家秋至山寒水冷春來柳緑桃紅一點動隨萬變江村煙雨濛濛有不有空不空笊籬撈取西北風生在閻浮世界人情幾多愛惡只要喫箇酒子所以倒街臥路死後却産娑婆不願超生淨土何以故西方淨土且無酒酤太史黃山谷道人八首題休堂頭上安頭如何得休殺佛殺祖方得按堵北鬱單越西瞿耶尼事同一家喫飯著衣向上一路千聖眨眼韓信打關張良燒棧贈嗣直弟去日撒手去來時無與階若將來去會一似不曾齋呈永首座奪得胡兒馬便休休嗟李廣不封侯分明射得南山虎子細看來是石頭為慧林沖禪師燒香三昨夜三更狗吠雪東家閉門推出月是渠覺海性澄圓衲子殺人須見血多年破衲不勝針一曲胡笳無古今往日聞韶獨忘味守株人在月西沈西瞿耶尼開靜北單越受粥慧林也唱雲門曲去年臘月二十六贊真如哲禪師即邪是正即藥是病乞水指井乞飯與甑殺人如麻出邪命定尸羅清淨而八萬四千清淨是謂毗盧遮那正法眼藏以平等印封之以僧伽梨蒙之無心者來彈指門開聖凡不盡金鎖生苔丹青回互南北莫露影落千江誰知月處自贊道是魯直亦得道不是魯直亦得是與不是且置且道喚那箇作魯直若是斬釘截鐵一句藏頭白海頭黑音釋簦音登笈其輒切沈音血狖音𣏑汨音密洣莫禮切眚所景切擠音賫騷音搔涴烏臥切螟音冥蠕音零蜾音果螺音裸撾陟瓜切𭣟敕角切斝音假寣音忽
