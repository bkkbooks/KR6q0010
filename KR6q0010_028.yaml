body:
  text: 平江府報恩光孝禪寺臣僧正受編頌古下大溈佛性泰禪師十二首淨果與演化至報慈化問如何是真如佛性曰誰無云云朝三暮四一何少暮四朝三何太多多少未能知數量有無從此見殽訛不殽訛唵囌嚧㗭唎薩婆訶楊歧三脚驢三脚驢子弄蹄行步步蓮華襯足生堪笑艸中尋覓者不知芳樹囀新鶯靈雲悟道玄沙未徹二無星秤子兩頭平拈起應須見得明若向箇中爭分兩知渠錯認定盤星十分風采露堂堂玉蘂瓊華未比量剛被傍人論好醜因茲難嫁與潘郎龍牙問翠微臨濟祖師西來意子卿不下單于拜始末常遵漢帝儀雪後乃知松栢操事難方見丈夫兒罽賓斬師子尊者得人一牛還人一馬有往有來可知禮也侍者報大王來應用從來不覆藏當機何得昧真常只知報道王來也不覺渾身在帝鄉野狐不落因果何曾墮不昧因果何曾脫當堂鏡破兩頭忘掃影滅蹤無摸索無摸索何倚托秋風吹梧桐樹葉鳴嚗嚗廓侍者問德山從上諸聖向甚麼處去商嶺東西路不分兩間茅屋一溪雲師年耳聵知師意人是人非不欲聞有句無句樹倒藤枯意若何溈山開口笑呵呵可怜三尺龍泉劒喚作陶家壁上梭外道問佛有無不問語先墮明鏡當臺雙照破迷雲散盡曉天空杲日團團紅似火倒剎竿多子塔前衣付後更傳何物示於人雙珠迸出剎竿倒直得寒光徹四隣徑山大慧普覺果禪師十首二祖安心覓心無處更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡瞞黃檗噇酒糟身上著衣方免寒口邊說食終不飽大唐國裏老婆禪今日為君都說了不許夜行禾黍不陽艶競栽桃李春翻令力耕者半作賣菙人勘婆天下禪和說勘破爭知趙州已話墮引得兒孫不丈夫人人黠過冷地臥德山托鉢一撾塗毒聞皆喪身在其中總不知八十翁翁入場屋真誠不是小兒嬉風頭稍硬夜半明星當午現愚夫猶待曉雞鳴可怜自屎不覺臭又欲重新拈似人罽賓斬師子尊者殺人須是殺人漢當下一刀成兩段頭臂雖虧劒刃鋒何似秦時𨍏輅鑽一口吸西江一口吸盡西江水甲乙丙丁庚戊己咄咄咄囉囉哩維摩經其施汝者不名福田獨坐許誰知青山對落暉華須連夜發莫待曉風吹產難華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領道場正堂辯禪師十六首達磨見武帝黃金鑿白玉推開開混沌竅透出玄元機達磨分皮髓社舞村歌笑殺人騎牛挑鴨走成羣三盃酒罷歸家去留得猪頭礙塞人女子出定要得他家活計強竿頭須解倒拈槍這邊打鼓那邊拍引得瞿會笑一場圓覺於一切時張果老踏破葫蘆呂洞賓失却寶劒兩箇撒手相逢囊篋更無一線何仙姑鐵笛橫吹解道長江靜如練亮座主參見馬祖弓強難結鴛鴦紐御道那栽栗棘蓬堪笑香嚴饒舌老今年猶勝去年窮野狐不向東山久薔薇幾度華白雲他自散明月落誰家先師無此語行主無人能賽姐姐更是好手騰身百尺竿頭打箇背飜筋斗因我得禮你老鼠齩生鐵十分滋味別貓兒左右看嚥唾也不徹栢樹百寶光攢無兒頂是大神呪最靈奇揭諦波羅僧揭諦石人半夜失烏雞十智同真𦘕得真如活華間試展開黃鶯偷眼不敢下枝來黃龍三關我手何似佛手黃龍鼻下無口當時所見顢頇至今百拙千醜我脚何似驢脚文殊親見無著好箇玻璃盞子不要當面諱却人人有箇生緣從來罪大彌天不是牽犂拽把便須鼎鑊油煎小麥化為蝴蝶春水滿幽㵎江風吹斷雲年年那時節憶著別離人蚯蚓化為百合住山身已老世事任乖張年來無侍者客到自燒香兩女合為一媳婦兩女合為一媳婦古寺基前幢子竪髣髴上有陀羅尼多少行人盡驚怖萬年雪巢一禪師二首外道問佛世尊隻眼通三界外道雙眸貫五天華意正濃桃臉笑春光不在柳梢邊晦堂拳頭背觸人難會憑君子細看片雲纔出洞遮却面前山上封佛心才禪師二首風幡指出風幡俱不是直言心動亦還非夜來一片曹溪月却照儂家舊翠微大禪佛參仰山後到霍山子陵灘水急如弦摸得黃魚縮項鯿提向市中頻索價他家不著半分錢崇覺空禪師一首栢樹打人罵人易勸人休却難不識饒人處急水下高灘南巖勝禪師七首馬祖踏水潦無量妙義皆周匝旋乾轉坤為一合當陽橫按笑中刀猶欠頂門上一踏興化打克賓漢祖拜將務決勝非韓誰敢當茲任赤幡高竪化城降星在盤兮不在秤廓侍者問德山從上諸聖向甚麼處去脚踏清波分華嶽手擎紅日轉重雲徒勞謾費干戈力究竟還歸有道君保壽作街坊見相打有省借路經過無面目因邪打正有拳頭衲僧門下無干涉徒用精金換得鍮金剛經為人輕賤故先世罪業藤蘿荊棘離離艸枯樹無退還不倒敗葉知他疊幾重不消一陣秋風掃侍者報大王來許由臨岸洗耳巢父不飲牛水侍者親入帝鄉趙州只在艸裏狗子無佛性乙巳大人丘叢林為宼讎利牙如劒戟生殺有來由梁山廓庵遠禪師三首女子出定出得出不得定從何處起文殊往梵天罔明輕彈指乘流即行遇坎即止君不見虗築防胡萬里城不知禍起蕭墻裏普化有齋不是風兮不是顛長街短巷走如煙院裏有齋常記得時時挂在口皮邊有句無句呵呵大笑不尋常笑得眉間也放光不是明招重注脚叢林洎合錯商量道場普明琳禪師二首北斗藏身五鳳樓前問洛陽金鞭遙指御街長春風是處華爭發游子年年憶故鄉晦堂拳頭赤體更無藏隱處黃龍未語先分付若將見解上門來他家自有通霄路靈隱佛海遠禪師七首勘婆纔拈折箭斷弦弓隨手雙鵰落碧空打鼓看來君不見萬年松在祝融峰臨濟囑三聖濃雲潑墨忽遮山碎雨跳珠亂入船卷地風來忽吹散望湖樓下水如天風幡不是風幡動亦非人者心自從胡亂後淈腯到如今栢樹靜鞭聲裏駕頭來緊握雙拳打不開打得開雲壓香塵何處是靜鞭聲裏駕頭來楚王城畔楚王城畔水東流獨脚山魈趯氣毬貪看六幺華十八斷頭船子下揚州普眼不見普賢飄飄一鴈落寒空步步追空覓鴈蹤踏破艸鞋跟子斷巍然獨坐大雄峯慈明水盆暑往寒來春復秋夕陽西去水東流將軍戰馬今何在野艸閑華滿地愁本寂靈光觀禪師三首疎山造壽塔冬瓜蘸雪未為淡匠者三文淡最幽淡最幽天共白雲曉水和明月流勘婆趙州勘破老婆時恰似青春三月裏陌上遊人爭看華鷓鴣啼處誰相委僧問黃龍南禪師不去不來時如何曰華嶽三峯頭倒卓云却去却來時如何曰風吹柳絮毛毬輥冰雪肌膚西舍女梳粧巧巧𦘕雙眉傍人筆力強傳寫戶外如何見得伊鼓山蒙庵嶽禪師四首勘婆本是山中人愛說山中話五月賣松風人間恐無價七賢女游屍陀林無根樹子一株山翁不費誅鋤鎚碎千年桃核不須緣木求魚無陰陽地一片明明賣貴買賤死屍無處活埋露出三頭兩面不響山谷一所透出千門萬戶清曉一聲杜䳌勸人不如歸去萬年閑禪師二首世尊拈華雪壓怪松露風高野渡橫將謂眾生苦更有苦眾生乾峯示眾舉一不得舉二相見不須嗔君窮我亦貧謂言侵早起更有夜行人靈巖安禪師四首文殊白槌法王法令沒周遮一片虗凝絕點瑕槌下不開諸聖眼幾多騏驥困鹽車野狐百丈堂前辨野狐紫羅帳裏撒真珠誰家別舘池塘裏一對鴛鴦水上浮國師三喚侍者一段風光𦘕不成洞房深處暢予情頻呼小玉元無事只要檀郎認得聲三平見石鞏解劈當𮌎箭因何只半人為從途路曉所以不全身天童應庵華禪師三首女子出定出得出不得滿面是埃塵愁人莫向愁人說說向愁人愁殺人風幡大海波濤湧千江水逆流龍王宮殿裏不見一人游香嚴上樹故園春色在枝頭惱亂春風卒未休無事晚來江上望三三兩兩釣魚舟鴈山枯木元禪師二首香嚴貧無地無錐未是貧知無尚有守無身儂家近日貧來甚不見當初貧底人竹篦不觸又不背徒勞生擬議開口更商量白雲千萬里東林卍庵顏禪師八首祖師曰佛說一切法為度一切心牛頭菩薩面馬面夜叉頭不作五逆罪快樂百無憂勘婆四海同一家萬口同一舌趙州勘婆子有理向誰說首山竹篦罵他還自罵嗔他還自嗔戒之慎之出乎爾者反乎爾者也雲門露椎鑼攂鼓轉船頭席卷波翻喊激流洗脚上船乘快便順風相送下揚州芭蕉拄杖相罵饒汝接觜相唾饒汝潑水等閑摸著虵頭拍手囉囉哩哩楞嚴妙性圓明離諸名相一錢為本萬錢利富不足而貧有餘換骨奪胎些子藥輸他潘閬倒騎驢南泉油餈騎虎穿市過把火去偷猪主人開眼睡並舍叫失驢臘月火燒山臘月火燒山苦口是黃蓮相將歲除夜竇八布衫穿大可怜把手入黃泉雪竇聞庵宗禪師三首虔侍者石人不怕師子吼須彌頂上飜筋斗滄溟竭盡正二更生鐵崑崙雲外走香嚴擊竹粥飯隨時養病軀本無迷悟可關渠無端擊著庵前竹直至如今在半途二祖得髓弟昆各自逞功能獨有家兄徹骨貧三拜起來無一語鼻孔纍垂蓋上脣善權智禪師五首五王子誕生貴胤生時輪擬空玎璫玉珮處東宮月堂轉側朝君父直扣堯堦却借功朝生學問詩書德行全金門投䇿紫微班台星不自離蓑釣那得寅昏奉聖顏末生貧來今日極清虗悲喜寥寥一物無便欲昇為九包鳳依稀雲樹月巢孤化生帝命傳來下九天禁城中外化新宣回途復妙持金印正令曾無一字傳內生鳳勢龍驤大丈夫天然尊貴六宮殊苔封寶殿無人侍造次凡眸識得無狼山蘿庵溫禪師五首五位正中偏玉兔金烏落二邊丫角童兒騎黑象三更穿過御樓前偏中正過房之子初受命金剛脚下崑崙奴腰間也佩毗盧印正中來無著當年訪善財瑠璃盤裏藏明月異艸山華處處開兼中至不歷僧祇超十地雖然踏著舊家鄉更須知有深深意兼中到天寒大雪長安道五陵才子錦袍新馬蹄亂踏瓊瑤艸國清簡堂機禪師四首魯祖面壁葉落崗頭一望長幾莖喬木倚斜陽曾經巴峻猿啼處鐵打心肝寸斷腸嚴楞吾不見時隔林髣髴聞機杼知有人家在翠微及至入門親見了元來只是小兒戲斬猫青虵提起氣腥臊幾箇男兒有痛毛直下血流猶未覺舉頭還見鐵山高夾山境話東西南北無門戶大地山河不覆藏今夜碧天雲脚盡一鈎月挂幾人腸焦山或庵體禪師七首金剛經三心三清道士無仙骨八教闍梨毀梵書黑添崑崙舞華鼓天親無著暗嗟吁婆子燒庵不見人斑見虎斑筭來莫願見人斑虎斑見後通回避唯有人斑近最難南泉油餈渾身無處著驛路倒騎驢覧盡瀟湘景和船入𦘕圖南泉三世諸佛不知有越鳥巢南枝胡馬嘶北風狸奴并白牯寸步不曾通千山都坐斷萬派盡朝東天王纔合掌那吒撲帝鍾倩女離魂假使百千劫所作業不忘因緣會遇時果報還自受維摩觀身實相觀佛亦然眼空四海恣縱橫鼻孔遼天信脚行拏得電光為火把却來日午打三更三十六萬億一十一萬九千五百同名同號阿彌陀佛竹溪煙絕雨纔通無數深紅間淺紅山店落英春寂寂青旗吹動柳華風玉泉窮谷璉禪師三首德山見龍潭南來本欲破邪說紙燈滅處難分雪踏著秤鎚硬似鐵錯認烏龜喚作鼈新婦騎驢新婦騎驢阿家牽艸裏尋常萬萬千誰在後兮誰在先不須特地苦加鞭麻三斤驢尾猪頭牛脚跡三斤麻子露消息誌公杖頭剪刀尺從來雨下堦頭濕文殊能禪師二首臘月火燒山巢知風穴知雨可憐謝三郎月中自搖櫓麻三斤現前三昧料水打碓漏泄天機失錢遭罪開善密庵謙禪師七首央崛產難賢聖劫來未魯殺而今斷這一刀休果然葛怛𮌎中落笑殺靈山老比丘女子出定四箇沒意智漢做處總無畔岸一狀領過堦前與伊據款結案百丈卷席浩浩長江際碧空片帆高挂便乘風快哉不費纖毫力萬里家鄉咫尺通即心即佛誰家飯挂空梁指與小兒令看解開即是灰囊當下命根便斷非心非佛賣盡田園徹骨貧不知何處可容身樓頭浪蕩無拘撿鐵笛橫吹過洞庭不是心不是佛不是物華嶽三峰翠插天上頭無路可躋攀不知誰有神仙手折取峰頭十丈蓮心不是佛智不是道太平時節歲豐盈旅不賷糧戶不扄官路無人夜無月唱歌歸去恰三更西禪此庵靜禪師一首竹篦千山鳥影滅萬里人跡絕孤舟篛笠翁獨釣寒江雪長蘆且庵仁禪師一首靈雲桃華玄沙未徹多方竊得破衣裳壁倒籬坍沒處藏更有一般無賴漢不曾同伴要分贓淨慈水庵一禪師二首話墮二八佳人美態嬌繡衣輕整暗香飄偷身華圃徐徐立引得黃鶯下柳條慈明水盆家山指出路非遙萬仞嵯峨插碧霄一片白雲橫谷口幾多歸鳥盡迷巢德山涓禪師二首狗子無佛性狗子佛性無門上釘桃符邪魔并百怪一見便消除三聖逢人即出乍雨乍晴山裏寺或來或去洞中雲滿天星月明如晝此境此時誰欲分薦福退庵休禪師四首興化勘同參恰如劊子氣雄豪便向咽喉下一刀五臟肝心皆砉出方知王法不相饒一口吸盡西江水淨躶躶赤洒洒沒可把喏可知禮也廣額屠兒放下屠刀放下屠刀處棒打不回頭雲自帝鄉去水歸江漢流狗子無佛性趙州門前毒虵當路踏著齩你退步退步劒門分禪庵主六首勘婆臺山一路絕纖埃無限英靈被活埋拊掌高歌天地闊趙州親到勘婆來臨濟四喝是非穿鑿不相干四喝諸方莫錯看六道四生平等法牧童吹笛過前山興化勘同參長松不改四時青縱奪當機幾箇明陣敗不禁苕帚掃眼中瞳子面前人女子出定鵲鵶午夜破雲飛寶印無私孰解提若道罔明能出定是人舌入阿鼻風幡非風幡動唯心動踏雪貧兒徹骨寒在聖在凡誰改變蝍蟟嚼碎䥫圍山資壽尼無著道人二首產難不遲一步不疾一刻明眼衲僧如何會得粉骨碎身未足酬一句了然超百億狗子無佛性鐵壁銀山一箭穿過潦倒趙州口能招禍侍郎楊無為居士七首卷席野鴨飛鼻頭裂卷席更來呈醜拙直饒獨坐大雄峰也是天邊第二月擔板漢睦州喚隨卦斷回不回擔板漢如驢井驢井井驢五臺何處不文殊黃面老人任多口未知道得八成無僧問古德如何是三乘教外別傳一句曰東村王老夜燒錢三乘教外別流傳瞎漢多知喚作禪天下衲僧參不到東村王老夜燒錢古德垂語云我喚作火汝不得喚作火我喚作火汝即不可已道了也喚作甚麼藥山云恁麼也不得不恁麼也不得總不得太無端野老焉知天地寬直饒數到八九十家山猶隔一重關四祖問牛頭汝在此作甚麼曰觀心觀者何人心是何物瓦解冰消不勞拈出丞相張無盡居士五首廬陵米價一派青源出少林信衣到此只傳心尋常示眾無人會盡向廬陵米價尋靈照雪中賣笟籬回至一廟前云云寧可饑寒死路邊不勞土地強哀憐滿船家計沈湘水豈藉芒繩十百錢兜率三關其一曰撥艸參玄只圖見性即今上人性在甚麼處陰森夏木杜䳌鳴日破浮雲宇宙清莫對曾參問曾哲情知孝子諱爺名其二曰識得自性方脫生死眼光欲落時作麼生脫人間鬼使符來取天上華冠色正萎好箇轉身時節了莫教閻老等閑知其三曰脫得生死便知去處四大一分時向甚麼處去鼓合東州李大妻西風曠野淚霑衣碧蘆紅蓼江南岸却作張三坐釣磯音釋聵五怪切鯿音鞭淈音鶻腯音突魈音宵玎音丁璫音當驤音泪坍音攤虎伯切晢音錫
