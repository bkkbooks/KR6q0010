body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十六世臨濟十二世楊岐五世文殊心道禪師法嗣潭州楚安慧方禪師郡之醴陵人族許氏年二十事等覺法思越七稔得度崇寧五年具戒謁開福寧道者次依佛鑑鑑指往大別既至職藏司未幾改大別為神𫕟因歸長沙附舟至江口聞呼渡船者有省作偈曰沔水江頭叫一聲此時方得契平生多年不識重相見千聖同歸一路行及寧移居文殊復侍之舉前偈乃蒙印可命為第一座久而開法楚安擢澧之欽山上堂曰臨老方稱住持全無些子玄機開口十字九乖問東便乃答西如斯出世討甚玄微有時拈三放兩有時就令而施雖然如是同道方知且道知底事作麼生直須打翻鼻孔始得上堂達磨祖師在腳底踏不著兮提不起子細當頭放下看病在當時誰手裏張公會看脈李公會使藥兩箇競頭醫一時用不著藥不相投錯錯喫茶去常德府文殊思業禪師世為屠宰一日戮豬次忽洞徹心源即棄業為比丘述偈曰昨日夜叉心今朝菩薩面菩薩與夜叉不隔一條線往見文殊殊曰你正殺豬時見箇甚麼便乃剃頭行腳師遂作鼓刀勢殊喝曰這屠兒參堂去師便下參堂住文殊日上堂舉趙州勘婆話乃曰勘破婆子面青眼黑趙州老漢瞞我不得大溈佛性法泰禪師法嗣潭州慧通清旦禪師蓬之儀巄人族嚴氏初出關至德山值山上堂舉趙州云臺山婆子已為汝勘破了也且道意在甚麼處良久曰就地撮將黃葉去入山推出白雲來師聞釋然翌日入室山問前百丈不落因果因甚麼墮野狐後百丈不昧因果因甚麼脫野狐師曰好與一坑埋却出住嶽之永慶遷慧通上堂曰三世諸佛不知有一一面南看北斗狸奴白牯却知有雲外金毛正哮吼箇中隱顯現全身頭頭透脫無前後撥轉機輪向上關八角磨盤空裏走上堂説佛説祖正如好肉𭃰瘡舉古舉今猶若殘羹餿飯一聞便悟已落第二頭一舉便行早是不著便須知箇事如天普蓋似地普擎師子遊行不求伴侶壯士展臂不借他力佛祖拈掇不起衲僧願見無門迷悟雙忘聖凡路絶且道從上諸聖以何法示人喝一喝曰莫妄想上堂見色明心墮坑落塹聞聲悟道辜負平生直饒聲色純真塵塵入妙坐在光影裏未為究竟直須萬機休罷千聖不携撒手那邊跳出窠臼到這裏亦無人亦無佛大千沙界海中漚一切聖賢如電拂且道釋迦老子向甚麼處出頭良久曰放過一著上堂目前無法垛生招箭意在目前挂箔遮驢鳴非耳目所到出門使是草夾山老子在百草頭上橫身閙市裏打磬諸人還見麼若也不見却歸碧巖去也上堂正眼豁開照破多年山鬼窟腕頭著力拈却門前下馬臺捨重從輕裁長補短奪飢餐於正食猛自知非驅耕牛於正行不借他力住則當頭印破去則截斷腳跟無卓錐之地者萬德來朝赤骨歷地者現成活計然雖如是忽遇其中人來時如何且待別時相見佛性和尚忌日上堂三腳驢子弄蹄行步步相隨不相到樹頭驚起雙雙魚拈來一老一不老為憐松竹引清風其奈出門便是草因喚檀郎識得渠大機大用都推倒燒香勘證見根源糞掃堆頭拾得寶叢林浩浩謾商量勸君莫謗先師好僧問至道無難唯嫌揀擇時如何曰河水從源濁澧州靈巖仲安禪師未詳氏里幼為比丘壯留講聚因閲首楞嚴至知見立知即無明本知見無見斯即涅槃師破讀為知見立句知即無明句本知見無句見期即涅槃句忽開悟棄謁圓悟禪師於蔣山時佛性為座元師扣之即領旨逮性住德山遣師至鍾阜通嗣書圓悟問云千里馳來不辱宗風公案現成如何通信曰覿面相呈更無回互云此是德山底那箇是上座底曰豈有第二人云背後底𡁠師投書悟笑云作家禪客天然有在師曰付與蔣山次至僧堂前捧書問訊首座座云玄沙白紙此自何來曰久默斯要不務速説今日拜呈幸希一鑒座便喝師曰作家座又喝師以書便打座擬議師曰未明三八九不免自沉吟首座作麼生會座無語師以書復打一下時圓悟與佛眼見之悟云打我首座死了也復云所謂龍象蹴踏眼云非也官馬廝躍耳悟令召至云我五百人首座你為甚麼打他云和尚也須喫一頓始得悟顧佛眼吐舌眼云未在却顧師曰空手把鋤頭步行騎水牛意作麼生師鞠躬曰所供並是詣實眼笑云真箇是屋裏人又往見五祖自和尚通法眷書自云書裏説箇甚麼曰文彩已彰云畢竟説箇甚麼曰當陽揮寶劒云近前來這裏不識幾箇字曰莫詐敗自顧侍者云是那裏僧者云此上座向曾在和尚會下自云怪得恁麼滑頭師曰被和尚鈍置來自乃將書於香爐上熏云南無三滿多沒陀南師近前彈指一下自乃啓書回德山日佛果佛眼皆有偈送之未幾而靈巖虗席衲子投牒乞師住持出應其命上堂曰參禪不究淵源觸途盡為留礙所以守其靜默澄寂虗間墮在毒海以弱勝強自是非他立人我量見處偏枯遂致優劣不分照不構用用不離窠此乃學處不玄盡為流俗到這裏須知有殺中透脫活處藏機佛不可知祖莫能測所以古人道有時先照後用且要共你商量有時先用後照你須是箇漢始得有時照用同時你又作麼生抵當有時照用不同時又向甚麼處湊泊還知麼穿楊箭與驚人句不是臨時學得來餘語未見成都府正法灝禪師上堂舉永嘉到曹溪因緣師曰要識永嘉麼掀翻海嶽求知己要識祖師麼撥動乾坤建太平二老不知何處去卓拄杖曰宗風千古播嘉聲成都府昭覺辨禪師上堂曰毫𨤲有差天地懸隔隔江人唱鷓鴣詞錯認胡笳十八拍要會麼欲得現前莫存順逆五湖煙浪有誰爭自是不歸歸便得虎丘紹隆禪師法嗣慶元府天童應庵曇華禪師黃梅人族江氏生而奇傑年十七往東禪院去髮首依水南遂禪師染指法味因遍歷江湖與諸老激揚無不契者至雲居禮圓悟禪師悟一見痛與提策及入蜀指見彰教教移虎丘師侍行未半載頓明大法去謁此庵分座連雲處守以妙嚴請開法繼住衢之明果蘄之德章饒之報恩薦福婺之寶林報恩江之東林建康之蔣山平江之萬壽兩住南康歸宗後居天童上堂曰九年面壁壞却東土兒孫隻履西歸鈍置黃面老子以拄杖一畫曰石牛攔古路一馬生三寅上堂德章老瞎禿從來沒滋味拈得口失却鼻三更二點唱巴歌無端驚起梵王睡喝一喝曰我行荒草裏汝又人深村上堂臨濟在黃檗處三度喫棒底意旨你諸人還得透也未直饒一咬便斷也未是大丈夫漢三世諸佛口挂壁上天下老和尚將甚麼喫飯上堂十五日已前水長船高十五日已後泥多佛大正當十五日東海鯉魚打一棒雨似盆傾直得三千大千世界一切衆生悉皆歡喜謂言打這一棒不妨應時應節報恩不覺通身踊躍遂作詩一首舉似大衆蜻蜓許是好蜻蜓飛來飛去不曾停被我捉來摘却兩邊翼恰似一枚大鐵釘上堂若作一句商量喫粥喫飯阿誰不會不作一句商量屎坑裏蟲子笑殺闍梨拈拄杖曰拄杖子罪犯彌天貶向二鐵圍山且道薦福還有過也無卓拄杖曰遲一刻上堂明不見暗暗不見明明暗雙忘無異流俗阿師野干鳴師子吼師子吼野干鳴三家村裏臭胡猻價增十倍驪龍頷下明月珠分文不直若作衲僧巴鼻甚處得來三十年後換手捶胸未是苦在上堂飯籮邊漆桶裏相唾饒你潑水相罵饒你接觜黃河三千年一度清蟠桃五百年一次開華鶴勒那咬定牙關朱頂王呵呵大笑歸宗五十年前有一則公案今日舉似諸人且道是甚麼公案王節級失却帖上堂參學人切忌錯用心悟明見性是錯用心成佛作祖是錯用心看經講教是錯用心行住坐臥語言三昧是錯用心喫粥喫飯屙屎送尿是錯用心一動一靜一來一往是錯用心更有一處錯用心歸宗不敢與諸人説破何故一字入公門九牛拽不出上堂舉僧問雲門殺父殺母佛前懺悔殺佛殺祖向甚麼處懺悔門云露師曰光孝著一轉語不是老僧見處亦非垂手為人何故豈不見道字經三寫烏焉成馬上堂三十二相八十種好從朝至暮啾啾唧唧説黃道黑不知那裏是二時上堂喫粥喫飯不覺嚼破舌頭血濺梵天四天之下霈然有餘玉皇大帝惡發追東海龍王向金輪峯頂鞠勘頃刻之間追汝諸人作證見也且各請依實供通切忌回避儻若不實喪汝性命上堂趙州喫茶我也怕他若非債主便是冤家倚墻靠壁成羣隊不知誰解辨龍蛇上堂五百力士揭石義萬仞崖頭撒手行十方世界一團鐵虗空背上白毛生直饒拈却膱脂帽子脫却尳臭布衫向報恩門下正好喫棒何故半夜起來屈膝坐毛頭星現衲僧前上堂舉泉大道訪慈明因緣師曰二老漢當時若踏著臨濟向上底我等今日飯也無喫還知薦福落處麼遂卓拄杖喝一喝下座上堂舉雲門大師到乾峰云請師答話峰云到老僧也未門云恁麼那恁麼那峰云將謂侯白更有侯黑師曰二老宿一等相見就中奇特光孝今日為諸人説道理一遍將謂春歸無覓處不知轉入此中來上堂舉僧問雲門不起一念還有過也無門云須彌山師曰雲門道得不妨諦當要且落在第二頭若是明果即不然忽有人問不起一念還有過也無只對他道致將一問來上堂三世諸佛眼裏無筋六代祖師皮下無血明果咬定牙關𨁝跳也出他圈䙡不得何故南泉斬貓兒僧問機不離位用處停機即不問未審機不到處如何通信曰一舉四十九云坐斷十方去也曰你要啞却老僧口那問呈橈舞棹則不問且道婆婆手中兒子甚處得來巖頭扣船舷三下未審意旨如何曰燋磚打著連底凍云當時若問和尚如何祗對他曰一棒打殺云婆生七子六箇不遇知音只這一箇也不消得便擲向水中又且如何曰少賣弄云巖頭當時不覺吐舌意又作麼生曰樂則同歡問如何是清淨法身雲門云華藥欄此意如何曰森沙努眼睛問只這是埋沒自己只這不是辜負先聖去此二途和泥合水處請師道曰玉筯撑虎口云一言金石談來重萬事鴻毛脫去輕曰莫謾老僧好問虗空消殞時如何曰離婁行處浪滔天問人皆畏炎熱我愛夏日長薰風自南來殿閣生微涼時如何曰倒戈卸甲問真淨和尚道頭陀石被莓苔裹擲筆峰遭薜荔纏羅漢院一年度三箇行者歸宗寺裏參退喫茶未審明甚麼邊事曰他是關西子愛説川僧話虎丘忌日拈香曰平生沒興撞著這無意智老和尚做盡伎倆湊泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據雖然一年一度燒香日千古令人恨轉深師於室中能鍛鍊耆叉故世稱大慧與師居處為二甘露門嘗誡徒曰衲僧家著草鞋住院何至如蚖蛇戀窟乎隆興改元六月十三奄然而化春秋六十有一夏臘四十有三塔全身於院之西麓丹霞佛智蓬庵端禪師法嗣福州清涼坦禪師不知何許人也久侍蓬庵深蒙印可屢分座説法住清涼日有僧舉徑山竹篦話請益師示以偈曰徑山有箇竹篦直下別無道理佛殿厨庫三門穿過衲僧眼耳其僧言下有省餘語未見臨安府淨慈水庵師一禪師婺之東陽人族馬氏年十六披削首參雪峰慧照禪師照舉藏身無迹話問之師數日方明呈偈曰藏身無迹更無藏脫體無依便廝當古鏡不勞還自照淡煙和露濕秋光照質之曰畢竟那裏是藏身無迹處師曰嗄照曰無蹤迹處因甚麼莫藏身師曰石虎吞却木羊兒照深肯之去謁東禪用月庵果皆有所投晚依佛智於西禪盡得其道出住慈雲繼遷數剎乾道辛卯始屆淨慈上堂曰圓悟師翁道參禪參到無參處參到無參始徹頭水庵則不然參禪參到無參處參到無參未徹頭若也欲窮千里目直須更上一重樓上堂今晨改旦伏惟首座大衆知事頭首一九二九天寒不出手三九二十七籬頭吹觱篥四九三十六夜眠如路宿屈而復伸展而又縮一夜萬算千思胸中一團麻線睡也睡不熟及至天曉起來腳踏實地頭還戴屋若作佛法商量口啞舌禿若作世諦流布特牛生犢拂子道我悟也山僧道你悟箇甚麼拂子道可憐馳逐天下人六六元來三十六上堂舉法眼示衆云盡十方世界明皎皎地若有一絲頭即是一絲頭師竪起拂子曰還見麼穿過髑髏猶未覺法燈和尚云盡十方世界自然明皎皎地若有一絲頭不是一絲頭師曰夜來月色十分好今日秋山無限清上堂寂然不動感而遂通古人恁麼説話大似預搔待癢若教渠踏著衲僧關棙管取別有生涯喝一喝卓拄杖下座上堂舉僧問雲門如何是超佛越祖之談門云胡餅師曰超談胡餅應時機逐塊知非師子兒敗葉霜風都掃盡古松方見歲寒枝師室中常問學者西天鬍子因甚麼無髭鬚淳熙丙申十二月二十四書偈示寂於嘉禾之光孝壽七十臘五十五湖州道場無庵法全禪師東吳玉峰人族陳氏幼不茄葷十六師邑之東齊道川禪師川嘗謂曰汝十二時中承誰恩力後閲法界觀色即不空以即故空始有趣入及冠祝髮進具入閩禮佛智於西禪命為侍者智後庵居西華師每入室智以狗子無佛性話問之罔對一日與僧語次僧舉五祖頌云趙州露刃劒師至此忽大悟造智室酬對如流令加護智徙育王請嗣其座初説法於宜黃之臺山移白楊西華隆興改元少鄉鄭公作肅守吳興延居虎巖上堂拈拄杖曰汝等諸人箇箇頂天立地肩橫楖栗到處行腳勘驗諸方更來這裏覓箇甚麼才輕輕拶著便言天台普請南嶽遊山我且問你還曾收得大食國裏寶刀麼卓拄杖曰切忌口銜羊角僧問牛頭未見四祖時如何曰天下無貧人云見後如何曰四海無富漢乾道己丑七月二十五且將入寂衆求偈師瞪目下視衆請益堅遂書無無二字棄筆而逝火後設利五色塔于金斗峰壽五十六夏三十八泉州延福寒巖慧升禪師建寧人也上堂喝一喝曰盡十方世界會十世古今都盧在裏許畐畐塞塞了也若乃放開一針鋒許則大海四流巨嶽倒卓黿鼉魚龍蝦蟹蚯蚓盡向平地上湧出波瀾遊泳鼓舞然雖如是更須向百尺竿頭自進一步則步步踏轉無盡藏輪方知道鼻孔搭在上脣眉毛不在眼下還相委悉麼復喝一喝曰切忌轉喉觸諱華藏密印安民禪師法嗣臨安府徑山別峰寶印禪師嘉之龍遊人族李氏自幼通六經而厭俗務乃從德山院清素得度具戒聽華嚴起信既盡其説棄依密印於中峰一日印舉僧問巖頭起滅不停時如何巖吒曰是誰起滅師啓悟即首肯會圓悟歸昭覺印遣師往省因隨衆入室悟問從上諸聖以何接人師竪拳悟曰此是老僧用底作麼生是從上諸聖用底師以拳揮之悟亦舉拳相交大笑而止留三年印俾其徒往昭覺挽歸中峰為第一座久之南下謁佛性泰月庵果草堂清皆契合晚至徑山謁大慧禪師慧問從甚處來曰西川慧曰未出劒門關與汝三十棒了也師曰不合起動和尚慧欣然掃室延之慧南遷師乃西還出住臨卭鳳凰徙廣漢崇慶武信東禪成都龍華眉山中巖復還成都領正法俄再出峽抵金陵留守以保寧延師未幾移居金山遷雪竇淳熙庚子夏勑補徑山上堂曰三世諸佛以一句演百千萬億句收百千萬億句只在一句祖師門下半句也無只恁麼合喫多少痛棒諸仁者且諸佛是祖師是若道佛是祖不是祖是佛不是取捨未忘若道佛祖一時是佛祖一時不是顢頇不少且截斷葛藤一句作麼生道大蟲裹紙帽好笑又驚人復舉僧問巖頭浩浩塵中如何辨主頭云銅砂鑼裏滿盛油師曰大小巖頭打失鼻孔忽有人問保寧浩浩塵中如何辨主只對他道天寒不及卸帽上堂舉南泉和尚到莊莊主預辦迎禮泉云爭知道老僧來排辨如此主云昨夜土地來報泉云老僧修行無力被鬼神破師曰盡道南泉被鬼神破不是好手殊不知王老師當面做賊金山今日新請都莊萬一山僧到莊第一不得鬼語上堂六月初一燒空赤日十字街頭雪深一尺掃除不暇回避不及凍得東村廖胡子半夜著靴水上立上堂日上月下速如電轂又是重新一陽來復湛不搖處暖生寒谷籬落梅華枝枝粲玉賀客街頭亞肩疊足借婆裙子拜婆年不識本來真面目仲冬嚴寒伏惟尊候起居萬福上堂將心除妄妄難除即妄明心道轉迂桶底躍穿無忌諱等間一步一芙蕖師至徑山彌浹孝宗皇帝召對選德殿稱旨入對日賜肩輿於東華門內十年二月上製圓覺經注遣使馳賜命作序師年邁益厭住持十五年冬奏乞庵居得請紹熙元年十一月往見交承智䇿禪師與之言別策問行日師曰水到渠成歸索紙書十二月初七夜雞鳴時九字如期而化奉蛻質反寺之法堂留七日顏色明潤髮長頂溫越十日葬于庵之西岡壽八十有二臘六十有四特諡曰慈辨塔曰智光庵曰別峰昭覺徹庵元禪師法嗣鄂州鳳棲慧觀禪師上堂曰前村落葉盡深院桂華殘此夜初冬節從茲特地寒所以道欲識佛性義當觀時節因緣時節若至其理自彰喝一喝曰恁麼説話成人者少敗人者多音釋灝音浩醴音禮沔音緬澧音禮巄力空切蹴七宿切鞠音菊釃音犁霈音沛膱音織尳音鶻舷音絃嗄所嫁切觱音必篥音栗廖音溜轂音穀
