body:
  text: 平江府報恩光孝禪寺臣僧正受編紀佛祖傳燈曰如來將化預命摩訶迦葉云吾以清淨法眼涅槃妙心實相無相微妙正法今付於汝汝當護持并敕阿難二其傳化無令斷絶廣燈曰大迦葉謂阿難云婆伽婆未圓寂時多子塔前以正法眼藏密付於我我今傳付於汝原是二者蓋體涅槃及阿含等經承述之也爾後祖祖授受凡二十八傳至菩提達磨自達磨五傳而至曹溪曹溪一傳而角立是為青原是為南嶽自青原南嶽不十傳則嶽分矣曰臨濟曰曹洞曰雲門曰溈仰曰法眼其印度佛祖密乘奧旨歲時詳略皆備冠乎傳燈三録之首今茲纂集不復稠疊直自此土初祖菩提達磨以下依次編録垂之無窮獨溈仰法眼數傳而絶者不可得而載焉現在宗師機緣未詳當留以俟來哲六代祖師初祖菩提達磨大士姓剎利帝南天竺國香至王之季子也因二十七祖般若多羅行化其國王與三子迎請供養施以無價寶珠祖知其授道時至顧所施珠問三王子曰此珠圓明有及此否二王子皆云此珠七寶中尊唯大士所對才辨清發稱有理趣祖歎異之及香至歿衆俱號絶獨大士志求出家端坐不動尋辭二兄禮祖足曰某素不顧國位欲以法利物而未得其師久有所待今遇尊者出家決矣願悲智見容祖與披剃受具即說偈付法眼藏仍讖往震旦歲月留難佛法隆替服勤四十餘年逮祖順世遂化本國摧六宗異解由是聲馳五印歲逾五紀度無量衆後值異見王輕蔑三寶俾無相宗首波羅提往詣王所廣開法要王悟入悔謝遂問仁者之師其誰耶曰即王之叔達磨大士也王駭然久之敕令近臣邀至宮掖為懺往咎大士復念震旦緣熟行化時至乃辭祖塔同學及異見王囑付護持王具大舟親率臣屬送至海壖歷歲三周以梁普通元年庚子九月之二十一日始達于南海廣州刺史蕭勵具主禮迎接表奏武帝帝遣使齎詔迎歸京城十月一日抵金陵車駕郊迎延居別殿遂問聖諦機語不契至十九日潛往江北傳燈云祖以丁未普通八年至韶州時刺史蕭昂具禮迎接表奏據明教禪禪正宗記乃曰祖以庚子普通元年至韶州刺史蕭勵迎接具奏蓋蕭昂不曾刺韶州勵乃昂之子也以南北史驗之則當以正宗記為是先是志公修高座寺謂寺主靈觀曰當有大乘菩薩自西而來廣化此國聽吾讖曰仰覩兩扇低腰捻鈎九烏射盡唯有一頭至即不至要假須刀逢龍即住遇水即逃靈觀聞已默而識之十一月二十三日屆于洛陽時後魏孝明正光之元年傳燈云太和十年寓止嵩山少林寺面壁而坐未嘗輒語人莫之測有僧神光者久居伊洛博窮內外之書嘗歎曰孔老之教粗述玄微經論之詮未盡妙理近聞達磨大士住止少林至人不遙當造玄境乃夤夕參承大士閴然屹坐莫聞誨勵光念曰昔人求道敲骨取髓布髮掩泥古尚若此我何人哉其年十二月九日夜天大雨雪光堅立不動遲明積雪齊腰大士見而問曰汝久立雪中當求何事光泣曰惟願慈悲開甘露門廣度羣品曰諸佛無上妙道曠劫精勤難行能行非忍而忍豈以小德小智輕心慢心欲冀真乘無勞勤苦光聞斷其左臂置大士前大士器而謂曰諸佛最初求道為法忘形汝今斷臂吾前求亦可也因為易名曰慧可光曰諸佛法印可得聞乎曰諸佛法印匪從人得光曰我心未寧乞師與安曰將心來與汝安光曰覔心了不可得曰與汝安心竟光即大契悟自後同得開悟者數人魏帝聞其異三詔不至就賜伽梨瓶鉢繒帛等九年欲返天竺命門人各言所得道副等陳所得竟遂顧光囑令綏護說付法偈及讖語傳衣畢與其徒衆往禹門千聖寺止三日為期城太守楊衒之說法歸少林寺端居而逝即李莊永安二年己酉十月五日也帝遣中使何弘簡馳書至梁告哀武帝感悵久之下詔皇太子備誄文偕百官就奠賜寶器一十六事充祭礿絹百束為賻助之禮誄文見寶林傳十二月二十八日魏詔奉全身塔於熊耳山定林寺後三年武帝聞魏使宋雲見之葱嶺手携隻履而歸即以所聞并魏啓壙事製始末行實唐代宗諡曰圓覺大師塔名空觀傳燈云祖以後魏明帝太和十九年丙寅歲卒以史考之太和丙寅較天鑑元年壬午隔一十七年是時梁武帝尚未立又況太和乃孝文帝朝年號明帝朝即無太和之稱唯明教禪師正宗記編年次第與史傳雅合往往集傳燈時以寶林傳為據故差之特甚二祖慧可大士武牢人也生姬氏自承委寄繼闡玄風博求法嗣至北齊天平二年有居士年四十餘不言名氏作禮曰弟子身纏風恙請和尚與懺罪曰將罪來與汝懺士良久曰覔罪性了不可得曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖然之即為剃髮曰是吾寶也可名僧璨乃受具說偈付衣法後三十四載混迹人間隋開皇癸丑三月十有六日因事怡然委順時年一百七歲塔于磁州滏陽東北七十里德宗諡曰大祖禪師三祖僧璨大士未詳族里自謁大祖受度傳法隱于舒之皖公山屬周武破滅佛法往來司空山十有餘載人無知者至開皇十二年有沙彌道信年始十四前禮足云願和尚慈悲乞與解脫法門曰誰縛汝云無人縛曰何更求解脫信於言下大悟巾侍九祀屢以玄微試之即授衣法往羅浮二秋回舊止大業二年十月十五日受士民檀供已復為四衆廣宣心要於法會大樹下合掌屹立而終奉真身塔於山谷寺後玄宗諡曰鑑智禪師覺寂之塔四祖道信大士族司馬氏世居河內後徙蘄之廣濟生而超異於解脫法契如夙昔自續祖位脅不至席者殆六十年隋大業中領徒抵廬陵值羣盜圍城七旬乃解唐武德甲申歲歸住破頭山禪侶雲集一日至黃梅路逢小兒骨相奇偉遂問曰子何姓云姓即有不是常姓曰是何姓云是佛性曰汝無性耶云性空故祖默識之俾侍僧至其舍誘出家母亦知其宿緣殊無難色祖以衣法付之永徽辛亥閏月四日誡門人曰一切諸法悉皆解脫汝等各自護念流化未來言訖安坐而逝壽七十有二奉真身于本山至今塔戶不開儀相如生代宗諡大醫禪師塔曰慈雲五祖弘忍大士蘄之黃梅人出周氏處女以栽松道者假陰而生隨母姓焉既稟大醫之任遂嗣化破頭山咸亨中有慮居士者名慧能來謁祖問曰汝自何來云嶺南曰欲須何事云唯求作佛曰汝嶺南人無佛性安能作佛云人有南北佛性豈然耶祖陰異之令著槽廠逾八月潛以所傳屈眴伽梨說偈付之且曰昔達磨初至人未之信傳衣以明得法今信心已熟衣乃爭端止於汝邊不復傳也兼記所隱之地能禮辭捧衣南邁衆無知者祖自此不復上堂經四載至上元二年忽告衆曰吾今事畢時可行矣即入室安坐而逝壽七十有四塔於黃梅之東山真身迄今不壞代宗諡曰大滿禪師法雨之塔六祖慧能大士盧氏子父行瑫本范陽人也武德三年左䆠新州正觀十二年戊戌二月八日夜子時誕質祥光滿室父亡三歲家貧母李氏徙居南海既長市薪為養一日至邸聞誦金剛經至應無所住而生其心豁然開悟歸告母以為法尋師之意遂往韶州遇高行士劉志略結為友及為尼無盡藏說涅槃妙理延居寶林寺四衆雲集俄成寶坊忽自念曰我求大法豈中道而止耶即抵西山之石室遇智達禪師指見黃梅大滿和尚滿見而器之令入廠下一夕密授衣盂隱于懷集四會之間儀鳳元年正月八日屆南海法性寺夜寓廊廡聞二僧競辨風幡祖為決其疑有法師印宗者嘗講大涅槃經衆所推重服其語異請問勤渠祖以理曉之宗駭然起問何以證此祖直敘得法始末出信衣悉令瞻拜印宗等作禮已復問忍大師付囑如何指授曰唯論見性不論禪定解脫無漏無為又問何故不論禪定解脫曰為是二法不是佛法佛法是不二之法又問何名不二之法曰法師講涅槃經明佛性是不二之法且如高貴德王菩薩白佛言世尊犯四重禁作五逆罪及一闡提等當斷善根佛性否佛言高貴德王菩薩善根有二一者常二者無常佛性非常非無常是故不斷名之不二一者善二者不善佛性非善非不善是故不斷名之不二蘊之與界凡夫見二智者了達其性無二無二之性即是實性故知佛性乃不二之法也印宗聞已起立合掌願事為師且告衆曰此居士者真肉身菩薩也我所講說猶如瓦礫彼所談論譬若精金諸人信否衆皆稽首歸依至十五日會諸名德為之剃落二月八日受滿分戒於智光律師明年春欲還舊隱宗與緇白千餘人送歸寶林韶刺史韋據請於大梵寺普為四衆說心地法門度諸弟子於先天二年七月一日謂門人曰吾欲歸新州速理舟楫時大衆哀慕乞師少留祖乃為說法要遂往國恩寺復為四衆說法有僧從幽州來參禮白言大士佛說三乘法又言最上乘弟子不解願賜慈悲祖告之曰汝須自身心見莫著外法相無有乘法人心量有等見聞轉讀是小乘悟法解義是中乘依法修行是大乘言下識自本心見自本性萬法盡通萬行俱備一切不染離諸見相念念無住建立萬法是名最上乘乘是行義不在口說汝須自修法不相待莫問吾也僧於言下心大啓悟又為道俗開示種種譬喻并讖記日後留難及說偈竟中夜加趺而化異香襲人白虹墜地時八月三日也韶新各崇靈塔爭欲迎請二郡刺史焚香決之遂鎮曹溪以十一月十三日入塔世壽七十有六前後帝王所賜珍具甚夥同信衣藏于塔所憲宗諡曰大聖塔曰元和靈照如上祖師實録詳備見傳廣二燈云傳廣二燈遺録及未詳宗師隆興府鳳棲同安第二代志禪師嗣同安丕侍先同安之久丕將順世上堂謂衆曰多子塔前宗子秀五老峰前事若何如是三舉師出應云夜明簾外排班立萬里歌謠道太平丕曰須是這驢漢始得即以院付師端然而逝師繼席後有僧問凡有言句盡落今時學人上來請師直指曰目前不現句後不迷云向上事如何曰逈然不換標的即乖以湖州宗派并曹洞宗旨考之洞山價出雲居膺膺出同安丕丕出同安志今傳燈等列志在同安威下按威之嗣曰九峰滿威與雲居膺皆嗣洞山若列志在威下誤矣隆興府同安慧敏禪師嗣洞山延初到洞山問諸聖以何為命曰不間斷云還有向上事也無曰有云如何是向上事曰不從間斷師於言下有省住同安日上堂曰若是作家應須如是舉雖然恁麼也是厨寒甑足塵襄陽府廣德第二代義禪師嗣廣德延傳燈誤綜其名僧問如何是古佛心曰千年曆日雖無用犯著依前總滅門問如何是廣德境曰清流無間斷碧樹不曾凋問不闡三乘教如何話祖宗曰誕生王子非修進判斷山河自有人問如何是學人相契處曰方木逗圓孔問時人有病醫王醫醫王有病甚人醫師展手曰與我診候云不會曰須彌徒作藥四海謾為湯問如何是出家幽暢處曰瑞草為氈不覺秋問向上一路千聖不傳和尚還傳否曰鐵丸驀口塞難得解吞人問如何是賓中賓曰蕩子無家計飄蓬歲不知云如何是賓中主曰茆戶挂珠簾云如何是主中賓曰龍樓鋪草座云如何是主中主曰東宮雖至嫡不面聖堯顏問如何是不昏底事曰夜半無燈燭家書歷歷宣問如何是蓬門生貴子曰襴衫不自遮問體妙玄玄為甚麼今人不曉曰四足踞地乾坤黯黑問有室女未嘗嫁娉生得一子姓箇甚麼曰偶然衫子破閫外沒人蹤問懸崖峭峻還具得失也無曰欣逢良便好與一推問如何是不睡眠底眼曰昨夜三更擘不開問如何是密室曰茆茨當大道云如何是密室中人曰歷劫沒人敲問衆星攢夜月時如何曰互影不交光郢州大陽堅禪師嗣靈泉仁傳燈出百丈超下僧問如何是玄旨曰壁上挂錢財問如何是無相道場曰不坐菩提樹懶向雪山游潭州福嚴良雅禪師嗣洞山初居洞山第一座山參次僧出問如何是佛山答曰麻三斤參罷山至寮謂師曰我今日答這僧話得麼云恰值某淨髮山曰你元來作這去就拂袖便出師云這老漢將謂我明他這話頭不得因作偈呈之曰五彩盡牛頭黃金為點額春晴二三月農人皆取則寒食賀新正鐵錢三五百山見深肯之大惠武庫中誤引此頌為洞山初和尚作後人又誤認初和尚麻三斤為價和尚麻三斤為價和尚語二俱訛舛蓋雪竇頌古舉語中但曰洞山故也住福嚴日僧問如何是和尚家風曰入門便見問如何是佛曰臂長衫袖短吉州西峰祥符圓淨雲豁禪師嗣清凉明或出雲居融下郡之永和曾氏子幼棄儒為比丘巡禮方外發明己事晚見清凉出問佛未出世時如何曰雲遮海門樹云出世後如何曰擘破鐵圍山於言下大悟始蒙印可歸住西峰之寶龍雲侶駢集祥符二年真宗皇帝聞其名遣中謁者召至訪問宗要留上苑經時冥坐不食上嘉異賜號圓淨既而辭歸留之不可乃聽珍錫甚隆皆不受加侍者四人命服度弟子十人以詩寵其行四年改寶龍曰祥符亦旌師之居也嘗有問易中要旨者師曰夫神生於無形而成於有形從有以至於無然後能合乎妙圓正覺之道故自四十九衍以至於萬有一千五百二十以窮天下之理以盡天下之性不異吾聖人之教也師示寂之夜鳴鼓告衆仍說偈曰天不高地不厚自是時人不透但看臘月二十五依舊面南看北斗暝然而逝茶毗獲設利五色者無數合靈骨為塔焉壽七十有七臘五十懷安軍雲頂德敷禪師嗣護國遠嘗問護國直截根源佛所印摘葉尋枝我不能時如何曰罷攀雲樹三秋果休弄碧潭孤月輪師乃頓釋所疑遂返雲頂衆請住持成都帥請就衙升座時有樂營使禮拜起回顧階前下馬臺云一口吸盡西江水淨且置請和尚吞却階前下馬臺師展兩手唱曰細抹將來營使猛省潭州北禪懷感禪師嗣石門徹僧問如何是諸聖為人底句曰紅輪輝萬戶光燭本無心問師唱誰家曲曰石戶不留心洞玄通妙的問如何是佛曰尺短寸長襄陽府石門紹遠禪師嗣石門徹僧問四方八面來時如何曰赤腳波斯鼻嗅天問如何是祖師西來意曰石牛攔古路木馬驟高樓鳳翔府青峰義誠禪師嗣石門徹僧問三際不生是何人境界曰白雪連雪嶽明月混漁鈎云未審向上更有事也無曰有云如何是向上事曰靈光爍破琉璃色大地明來絶點痕問如何是青峰家風曰向火喫甜瓜筠首座者嗣石門徹太原人也自至石門逾三十年叢林慕之有僧請喫茶次乃問如何是首座為人一著子曰適來猶記得云郎今又如何曰好生點茶來一日荷鋤入園僧問三身中那一身去作務師拄鋤而立僧曰莫便當也無師𢹂鋤便行襄陽府石門聰禪師嗣大陽堅僧問大陽遷化向甚麼處去曰騎牛不戴帽正坐不偏行潭州神鼎洪諲禪師嗣首山念族扈氏襄水人也自游方一衲以度寒暑嘗與數耆宿至襄沔間有僧舉論宗乘頗博捷會飯于野店中而論說不已師謂曰三界唯心萬法唯識唯識唯心眼聲耳色是甚麼人語云法眼偈也曰其義如何云唯心故根境不相到唯識故聲色樅然曰舌味是根境否云是師以筯策菜置口中含胡而言曰何謂相入耶一座驚顧莫能加答師曰路途之樂終未到家見解入微不名見道參須實參悟須實悟閻羅大王不怕多語僧拱而退後返長沙隱于衡嶽三生藏有湘陰豪貴來游福嚴即師之室見其氣貌間靜一鉢挂壁餘無長物傾愛之遂拜跪請曰神鼎乃我家植福之地久乏宗匠願師俱往何如師笑而諾之即以己馬負師至十年始成叢席一朽床為說法座其甘枯淡無比又以德臘俱高諸方尊仰之如古趙州上堂舉洞山云貪嗔癡太無知賴我今朝識得伊行便打坐便捶分付心王子細推無量劫來不解脫問汝三人知不知師曰古人恁麼道神鼎即不然貪嗔癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來元解脫何須更問知不知上堂舉古龍牙頌曰一云金峰學道如鑽火逢煙未可休直待金星現歸家始到頭師曰神鼎即不恁麼學道如鑽火逢煙即便休莫待金星現燒腳又燒頭且道神鼎恁麼道為當違古人順古人別有道理汝道恁麼去底人好恁麼來底人好到這裏須具衲僧眼始得莫受人瞞珍重上堂風不鳴條雨不破塊即且止作麼生打得箇翻車筋斗到梵大去若有出來作箇伎倆有麼莫教帝釋惡發後有僧入室云某甲當時出來左轉一轉便歸衆師曰莫教帝釋惡發又作麼生云知恩者少負恩者多曰築著鼻孔僧問魚鼓未鳴時如何曰看天看地云鳴後如何曰捧鉢上堂問輪回六道底人畢竟如何曰不願成佛云為甚麼不願成佛曰佛亦不究竟云請師一言曰昨日猶記得今朝話無門問匹馬單槍時如何曰神鼎打退鼓云畢竟事如何曰想你不是這手腳問撥塵見佛時如何曰佛亦是塵問如何是和尚家風曰飢不擇食問殺父殺母佛前懺悔殺佛殺祖向甚處懺悔曰水長船高問布以七淨華浴此無垢人既是無垢人為甚麼却浴曰清淨亦不立劒門慈雲重謐禪師嗣首山念僧問如何是和尚家風師竪起拂子僧云究竟如何曰煎茶煮水云好日多同曰休更忉忉問如何是祖師西來意曰紅輪輝萬戶緑水繞青山鎮江府金山瑞新禪師嗣福昌善後住天聖上堂曰德山一棒當甚麼英雄金山只重他解偷楚號而斫楚營臨濟一喝當甚麼嘍囉金山只重他奪賊刀殺賊自餘天下老和尚並是攻墻割壁都市白拈動便納敗闕且未見一箇是盜狐白裘底手腳金山恁麼剖判諸方聞得無不努唇胖觜何也如今即是覺苑含春風習習菩提樹上華蔟簇豈知迦葉有宗風盡把玄微為眼目致使金山這裏土曠人稀相逢者少然性已習成難為改革金山乍可凍殺餓殺終不肯著他鶻臭布衫以所為善知識者擘金鎖於病猿碎衣珠於醉客尚未免止濼棲蘆不可向葛藤社裏說心說性說玄說妙去也金山終不事悠悠一言道合死即休大鵬展翅蓋十洲籬邊之物鳴啾啾上堂世間所貴者和氏之璧隋侯之珠天聖喚作驢屎馬糞出世間所貴者真如解脫菩提涅槃天聖喚作𡱰沸碗鳴且道恁麼說話落在甚麼處故不是取捨心重信邪倒見諸人要知麼猛虎不顧凡上肉洪爐豈鑄囊中錐僧問吾有大患為吾有身父母未生未審此身在甚麼處曰曠大劫來無處所若論生滅盡成非云恁麼則周遍十方心不在一切處曰泥裏撼樁廬山開先善暹禪師嗣德山遠臨江人也遍游師席以明悟為志依德山日值山上堂顧視大衆曰師子顰伸象王回顧師猛省因入室陳所見山曰子畢竟作麼生會師回顧云後園驢喫草山然之後至雪竇竇與語鋒投喜其超邁目曰海上橫行暹道者遂命分座四方英衲敬畏之一日舉令出世師至夜書二偈於壁遁去偈曰不是無心繼祖燈道慚未廁嶺南能三更月下離雪竇眷眷無言戀碧層二十餘年四海間尋師擇友未嘗間今朝得到無心地却被無心趂出山晚年衆請滋甚遂闡法開先以慰道俗之望上堂曰德山先師道落葉霜風青黃間紅爾也何也片西片東衲僧家謂之無味之談若雜揉不分則一切渾成若離披去也則一彼一此是以祖師道不是風動不是幡動還有見祖師底麼於此未證不惜眉毛為汝說破但請孤運其照各究其源謂之落葉歸根諸禪德佛法事大開先說得天華亂墜於汝諸人分上著一點不得何故如人上山各自努力僧問師唱誰家曲宗風嗣阿誰曰一月在天問如何是祖師西來意曰洛陽城古云學人不會曰少室峰高問年窮歲盡時如何曰依舊孟春猶寒問雨雪連天為甚麼孤峰露頂曰有甚遮掩處其開堂語要具在續燈濠州南禪聰禪師嗣北禪感僧問如何是大道根源曰雲興當午夜石虎叫連霄潭州道吾詮禪師嗣石門遠僧問達磨未來時如何曰番人不展陳漢地沒胡蹤云來後如何曰八方歌道泰一國賀無私鄧州廣濟方禪師嗣石門遠僧問如何是佛曰騎牛趂春草背却少年爺問寶劒未磨時如何曰烏龜鵮黑豆云磨後如何曰庭柱掛燈籠音釋喟丘愧切抉一決切粹子骨切考與考同核下革切攟舉蘊切托音隻駙音附揆巨癸切鈇音府鉞音越籟音賴趑音茲趄千余反藁古老切葉音攝下葉縣同郢以并切琛丑林切暹音纖濠音豪讖楚禁切蔑音滅駭下揩切掖音亦勵音厲齎箋西切閴苦鵙切屹魚乙切雨主遇切繒疾陵切綏音雖衒音縣誄力水切礿音藥賻音附熊音雄壙苦謗切諡音示姬音基磁音慈滏扶雨切靳音其脅乞業切廠齒雨切眴音舜瑫徒刀切闡齒善切礫音歷夥音禍謠音姚甑子孕切暢丑亮切黮乙減切娉匹正切攢祖丸切訛五禾切舛尺兖切駢蒲眠切瞑莫定切諲音因扈音戶沔音緉樅音窗策音頰胖蒲謗切濼音歷𡱰音篤顰音頻遁徒困切糅女救切鵮苦咸切
