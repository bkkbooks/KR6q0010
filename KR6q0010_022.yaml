body:
  text: 平江府報恩光孝禪寺臣僧正受編聖君太宗皇帝以聖極真諦而廣闢度門間發元機鮮克如對者如幸相國府見僧看經上問看底是甚麼經云仁王經上曰既是朕經為甚却在卿手裏僧無對雪竇明覺重顯禪師後嘗代對曰皇天無親唯德是輔幸開寶塔問僧卿是甚人云塔主上曰朕之塔為甚麼卿作主僧無對明覺代對曰盍國咸知因僧見上問卿居甚處云廬山臥雲庵上曰朕聞臥雲深處不朝天為甚到此僧無對明覺代對曰難逃至化僧入對次奏云陛下還記得麼上曰甚處相見來奏云靈山一別直至如今上曰卿以何為驗僧無對明覺代對巳貧道得得而來京寺回祿藏經悉為煨燼僧欲乙宣賜召問昔日摩騰不燒如今為甚却燒僧無對明覺代對曰陛下不忘付囑上嘗夢神人報云請陛下發菩提心因早朝宣問左右街菩提心作麼生發街無對明覺代對曰實謂今古罕聞智寂大師進三界圖上問朕在那一界中寂無對保寧仁勇禪師嘗代對曰陛下何處不稱尊一日朝罷擎鉢問丞相王隨曰既是大庾嶺頭提不起為甚麼却在朕手裏隨無對慈明楚圓禪師後嘗代對曰陛下有力白雲端禪師拈曰且道腕頭有力主天下有力試請斷看真宗皇帝臨御以來歷覽貝文探賾祖教乃於華嚴曉然自得嘗製偈曰寂寂太虗空湛湛如秋水拂拭本無塵不屬張王李因建智海勝藍偉冠都下廣延禪衲馳詔正覺本逸禪師主之逸至入對稱旨賜前偈令和逸謝恩已𨤲為四章一曰寂寂太虗空何人達此宗本來無一物佛祖永潛蹤二曰湛湛如秋水此心誰可委唯有悟空人相逢只彈指三曰拂拭本無塵青天月一輪堂堂無罣礙全露法王身四曰不屬張王李從來自家底山河及大地通身無不是上大悅乃錫正覺號仁宗皇帝垂佛心以治天下四夷來王欲隆宗教乃詔僧懷璉入對便殿命升座稱旨賜號大覺禪師製詩頌褒之餘二十首及提綱語二篇璉嘗進偈中有圓相上因製頌二章賜璉曰今伏覩淨因長老於禪偈內畫圓相此人人皆有除鈍根下愚人不曉裏面無安排鼻孔處呵呵又一重案底寡學淺近敢吟頌一首一曰接引本無言出沒任往還元無添減處但同秋月圓二曰愚蒙全不會上聖卒難知三十年年後更添一暈兒令璉箋注璉注已并進三偈乞歸林下上注璉頌一首仍宣諭曰山即如如體也將安歸乎令再住京國且興佛法璉頌曰千蔟雲山萬壑流上曰佛法廣大非只渠壑也歸心終老此峰頭上曰不止峰頭更審細莫錯也朝昏但祝堯多壽上曰但是含生皆同天壽也一炷檀煙滿石樓上曰遍法界白煙灰息也璉復進二頌稱謝有曰中使傳宣出禁闈再令臣此住禪扉青山未許藏千拙白髮將何補萬幾霄露恩波方湛湛林泉情味苦依依堯仁況是如天闊應任孤雲自在飛二十日賜羅扇一把題元寂頌於其上又嘗製修心頌曰初祖安禪在少林不傳經教但傳心後人若悟真如性密意由來妙理深明年春璉堅辭上從之特賜御容一軸以示不忘之意徽宗皇帝踐祚之初留神禪奧詔芙蓉道楷禪師住持法雲以問宗要二年佛國禪師惟白奏所集宗門續燈録三十卷上賜其序政和三年夏四月嘉州道傍有大樹風雷所摧一僧晏坐樹內髭髮被體指爪繞身本州以事具奏獲旨令迎至京師供養時西天總持以金磬出其定乃問何代僧曰我東林遠法師之弟也因遊峩眉不記時代遠無恙否持曰遠法師晉人也去世七百年矣遂不復語持曰師欲何歸曰陳留縣即復入定帝命繪其像頒行天下并製三頌一曰七百年前老古錐定中消息許誰知爭如隻履西歸去生死徒勞木作皮二曰藏山於澤亦藏身天下無藏道可親寄語莊周休擬議樹中不是負趨人三曰有情身不是無情彼此人人定裏身會得菩提本無樹不須辛苦問盧能高宗皇帝以神武平海內三教一致尤宅心少林之道潛龍時差侍臣韓子扆往天寧寺命主僧佛果禪師克勤升堂勤據座説偈二章曰善因招善果種穀不生豆大福德人修大福德人受八萬四千波羅蜜一毫端上已圓成棒頭喝下承當得高步毗盧頂上行時靖康元年三月二十五日也越三日復命升堂勤遂舉天竺有王者嘗往見一祖師即請説法祖曰大王來時好道去如來時王歎伏勤拈曰佛法是世法世法即佛法直道而行風行草偃若未委悉重説偈言去也至簡至易最尊最貴往還千聖頂𩕳頭世出世間不思議彈指圓成八萬門一超直入如來地韓録三偈以進上題其後曰靖康改元四月初一觀佛果禪師善偈理趣高妙云二年即皇帝位未幾幸維揚十一月詔勤詣行在引對至闕下上遣中使八人翊之賜座上曰朕一一記得昨過泗洲見普照佛心長老稱是師弟子朕亦素知師禪道高妙可得聞乎勤曰陛下以仁孝治天下率土生靈咸被光澤雖草木昆蟲各得其所此佛祖所傳之心也此心之外無別有心若別有心非佛祖之心矣上大喜曰可賜圓悟禪師號勤謝畢上曰師居金山何如勤曰臣老且病願歸林下上曰不可天下名山惟師擇居之勤固辭上曰何山可住勤曰願投老雲居上從其請勤復奉曰陛下既以佛心而化育生靈萬稽首臣亦當傳佛心宗以酬覆壽賜茶罷傳宣引謁五府經夕奉旨五府以次就雍熙寺請開堂演法孝宗皇帝道自生知性由天縱在普安潛藩一聞徑山佛日宗杲禪師之道委內都監往問要旨杲作偈以獻及建邸復令內侍齎束帛等命杲就山為衆説法大書妙喜庵三字仍製贊賜之杲演成四偈以呈上甚喜歎即皇帝位詔杲引對杲稱疾乃特賜大慧禪師一日因門司黃彥節舉傳燈録所載二十二祖摩拏羅偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂上即悟其奧乾道庚寅冬景德靈隱禪寺虗席詔僧慧遠住持辛卯春召見上舉不與萬法為侶問遠是甚麼人語遠以龐居士奏之語繁不録壬辰秋召入東閣上曰前日在此閣靜坐忽思向所舉不與萬法為侶因緣朕從這裏有箇見處遠曰不與萬法為侶陛下作麼生會上曰四海不為多遠曰一口吸盡西江水又且如何上曰亦未曾欠缺繼賜佛海禪師癸巳春駕幸其寺御方丈見遠畫像問曰是誰遠曰臣之陋質學者寫以求贊上曰此是畫底那箇是真底遠鞠躬奏曰春氣和融恭惟聖躬萬福上大笑至東廓觀畫壁次遠奏曰此乃歷代高僧上曰如今有否遠曰西廓底筆尤工淳熙丙申春僧德光奉旨補居靈隱寺冬十一月召對便殿光舉靈雲見桃華悟道偈曰三十年來尋劒客幾回葉落又抽枝自從一見桃華後直至如今更不疑奏曰那裏是他不疑處上曰空手牽鐵牛上曰若問長老如何祗對光曰千聞不如一見光復舉溈山問香嚴汝試向父母未生已前道一句看香嚴無對上曰朕有一語光曰如何是父母未生已前一句上曰昨夜今朝又明日示光偈曰大暑流金石寒風結凍雲梅華香度遠自有一枝春未幾賜佛照禪師號庚子秋延徑山主僧寶印於選德殿上曰三教聖人本同這箇道理印奏曰譬如虗空東西南北初無二也上曰但聖人所立門戶各別爾孔子以中庸設教印曰非中庸之教何以安立世間故華嚴亦不壞世間相而成出世間法法華云治世語言資生産業皆與實相不相違背上曰今之士夫學孔氏者多只攻文字不見夫子之道不識夫子之心唯釋迦老子不以文字教人直指心源開示衆生各令悟入此為殊勝也印曰非獨今之學者不見夫子之道當時十哲如顏子號為且體盡其平生力量只道得箇瞻之在前忽焉在後如有所立卓爾竟捉摸未著而夫子分明八字打開與諸弟子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也以此而觀夫子未嘗回避諸弟子而諸弟子自蹉過也昔張商英丞相云惟吾學佛然後能知儒上曰朕意亦謂如此印曰臣近見陛下賜德光長老御扎曰今俗人乃有以禪為虗空以語為戲論其不知道也如此切中今日流俗之病蓋流俗例以佛法為清淨寂滅之教遂引莊老之説以合佛意以臣所觀莊老立地處止做得經論中二乘人見解上曰如何見得印曰墯肢體黜聰明形固可使如稿木心固可使如死灰便是二乘人灰心滅智厭身如桎梏棄時如雜毒所以去大乘人遠矣大乘人衆生度盡方證菩提正如伊尹有一夫不被其澤若己推而內之溝中又云豫天民之先覺者也將以斯道覺斯民也此便是大乘人履踐處上然之嘗製布袋和尚贊曰袋貯乾坤杖挑日月藞藞苴苴僧中之傑憨憨癡癡𫭫中之絶令行兮一棒一條痕逗機兮殺人須見血別別分明一點紅爐雪又嘗遊戲於圓覺大光明藏中備覽諸經發於淵默疏其至奧警悟人天如釋清淨慧章至一切障礙即究竟覺則曰菩薩初發心時名始覺圓覺成就名究竟覺今見諸障即究竟覺者蓋已入佛地無一切差別心也釋得念失念無非解脫則曰得念是無念失念是有念佛知諸念本空了無得失故皆得解脫釋成法破法皆名涅槃則曰進修曰成毀謗為破佛知諸法本空了無成壞故皆名涅槃釋智慧愚癡通為般若則曰智慧者已悟之性愚癡者未悟之性究其本源同一佛性故曰通為般若釋菩薩外道所成就法同是菩提則曰菩薩外道所立之法雖有邪正之殊皆是菩提覺性釋無明真如無異境界則曰真妄一體性本解脫釋諸戒定慧及淫怒癡俱是梵行衆生國土同一法性則曰涅槃經云我以佛眼遍觀三界有情無情一切人法悉皆究竟究竟者即法性也釋地獄天宮皆為淨土則曰佛知善惡二報皆如空華故謂苦樂二境皆為淨土釋有性無性齊成佛道則曰有性三乘也無性闡提也佛眼觀之悉皆是佛釋一切煩惱畢竟解脫則曰佛謂煩惱本空故云畢竟解脫釋法界海慧照了諸相猶如虗空此名如來隨順覺性則曰法界海慧者佛之智慧如法界之廣如大海之深故也其慧光照了諸相如太虗空廓然無礙方為佛之隨順覺性如孔子之無可無不可是也賢臣上丞相王隨居士嘗謁首山省念禪師得言外之旨自爾踐履益深竟明大法至臨終日書偈曰畫堂燈已滅彈指向誰説去住本尋常春風掃殘雪殿院李琛居士嘗謁福嚴雅禪師與論倩女離魂話未終雅曰隨他去也公曰師意如何雅曰切忌向倩女處著到公領悟曰元來却在這裏雅哂之翌日同入藏院時雪竇顯禪師為藏主公曰便是藏主那顯曰是公曰藏中還説著下官麼顯曰目前可驗公曰驗底事作麼生顯曰不消一劄公擬議顯曰且請殿院歸寮喫茶坐次嵐霧忽起雅曰殿院遊山恰阻煙霧公曰靈峰聖迹為甚麼却有這箇顯曰下方無公擬對雅曰藏主壯觀福嚴顯曰和尚且莫開眼公曰作家作家顯曰殿院尊重時有道士秀才到院公曰三教中那教最尊顯起側立公曰有口何不道取顯曰對天子難言公曰休休便起顯曰適來造次公喝之文定公張方平居士字安道知滁州曰嘗遊琅瑘山周行廊廡不忍去旋抵藏院有感流涕指梁間經函曰此吾前身事也令取而視之乃所書楞伽經始二卷齊沐續之與前書無少異前身為此寺知藏書未終而卒誓再書故也焚香展讀佛語心品至贊偈曰世間離生滅猶如虗空華智不得有無而興大悲心遂洞明己見書偈曰一念存生滅千機縛有無神鋒輕舉處透出走盤珠暮年出此經示東坡居士仍以其事語之坡題其後刻之浮玉山龍遊寺修撰曾會居士幼與雪竇重顯禪師同舍及冠異途天禧間值於淮甸公遂引中庸大學參以楞嚴符宗門語句質顯顯曰這箇尚不與教乘合況中庸大學耶學士要徑捷理會此事乃彈指一下曰但恁麼薦取公於言下領旨天聖初公守四明以書幣迎師補雪竇既至公曰某近與清長老商量趙州勘婆子話未審端的有勘破處也無顯曰清長老道箇甚麼曰又與麼去也顯曰清長老且放過一著學士還知天下衲僧出這婆子圈䙡不得麼公曰這裏別有箇道處趙州若不勘破婆子一生受屈顯曰勘破了也公大笑顯領衆入城緣化欲見之閽者以謁禁告師以偈寄公曰碧落煙凝雪乍晴住山情緒寄重城使君道在未相見空戀甘棠影裏行公答曰勞勞世務逐遊沈一性澄明亘古今目擊道存無阻隔何須見面始知心即請公見問曰道存無阻因甚入來不得顯曰他日見別處長老學士不請舉向伊公曰舉著又何妨顯曰山僧罪過公曰好好顯應喏喏郎中許式居士守隆興時從洞山聰禪師或曰足公山主得正法眼一日與泐潭澄上藍溥坐次澄問聞郎中道夜坐連雲石春栽帶雨松當時答洞山甚麼話公曰今日放衙早澄曰聞答泗州大聖在揚州出現底是否公曰別點茶來澄曰名不虗傳公曰和尚早晚回山澄曰今日被上藍破便喝公曰不奈船何打破戽斗公至上藍僧堂問首座年多少座曰六十八公曰僧臘多少座曰四十七公曰聖僧得幾夏座曰與虗空同受戒公拍床板首曰下官喫飯不似首座喫鹽多參政呂慧卿居士字吉甫於法界觀研味有年後看李長者合論心地豁然説偈曰欲見文殊久馳心向五臺誰知黃卷上指出妙光來都尉李遵勗居士字用和探索宗要有年聞慈照所舉因緣頓明大法述偈曰參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管照詰而印之後作照塔銘其自敘問道始末曰豫早欽風而虎溪世之福地也會師退位以素緣熟乃走胥命駕百舍重研道將迎意遂有王城之入創茲寺居之獲陪巾屨之侍諦求眉髓之論師嘗諭房孺問徑山禪可學乎曰此大丈夫事非將相之所能為一旦聞舉一喝耳聾三日之話如處蔀室霩爾而頓明如對靈山聽然而微笑自此敘弟子禮或外館開供妙談渴聞旋請入都留閣旬浹或命駕香剎時問輕安服勤左右六周歲籥于是確求歸隱者數四咸緩以他語貴其延居亦嘗微露風指謂吾償汝宿緣祖禰有記事著傳録今不可泄云云銘曰離四句絶百非嘗以肅國大長公主誕辰命慈照石霜葉縣就第演法最後葉縣登座拈拄杖拗折擲地便下座公笑曰老作家手段終別照曰都尉亦不得無過一日與堅上座送別公問近離上黨得屆中都方接麈談遽回虎錫指雲屏之翠嶠訪雪嶺之清流未審此處彼處的的事作麼生堅曰利劒拂開天地靜霜刀才動斗牛寒公曰恰值今日耳聵堅曰一箭落雙雕公曰上座為甚麼著草鞋睡堅以衣袖一拂公低頭曰今日可謂降伏也堅曰普化出僧堂又圓禪師未出世時謁公公使童子問曰道得即與上座相見圓曰今日特來相看公又令童子問曰文刊白字當道種青松圓曰不因今日節餘日定難逢童子又出曰都尉言恁麼則與上座相見去也圓曰腳頭腳底公乃出揖坐復問我聞西河有金毛師子是否圓曰甚處得這箇消息來公便喝圓曰野干鳴公又喝圓曰恰是公大笑同留數日乃辭公曰如何是臨歧一句圓曰好自將息公曰恁麼則不異諸方也圓曰都尉見處作麼生公一放你二十棒圓曰專為流通公拊掌圓曰瞎公曰好去圓曰喏喏圓歸唐明未幾公遣章介二師訊之圓於書尾畫雙足寫來僧名以答之公作偈寄曰黑毫千里餘金槨示雙趺人天都莫測珍重赤鬚胡楊文公會次遂問釋迦六年苦行成得箇甚麼邊事公曰簷折方知柴束重其造入妙密應機無滯類此及疾篤命邀圓圓至公畫此相并書偈曰世界無依山河匪礙大法微塵須彌納芥拈起幞頭解下腰帶若覔生死問取皮袋圓見乃問如何是都尉本來佛性公曰今日熱如昨日却問圓臨行一句作麼生道圓曰本來無罣礙隨處任方圓公曰晚來困倦更不答話圓曰無佛處作佛有尼道堅謂曰衆生見劫盡大火所燒時都尉切宜照顧主人翁公曰大師與我煎一服藥來尼無對公曰這師姑藥也不會煎語罷投枕未安而逝公於天聖中以所集宗門廣燈録三十卷繳進上製序冠其卷首仍賜入大藏流行英公夏竦居士字子喬自契機於石門慈照蘊聰禪師一名谷隱日與老衲遊偶上藍溥禪師至公問百骸潰散時那箇是長老自家底溥曰前月二十離鄿陽公休去溥却問百骸潰散時那箇是相公自家底公便喝溥曰喝則不無畢竟那箇是相公自家底公對以偈溥休認風前第一機太虗何處著思惟山僧苦要通消息萬里無雲月上時溥曰也是弄精魂節使李端願居士兒時在館舍常閲禪書長雖婚宦之然篤志祖道遂於後圃築室類蘭若邀達觀曇頴禪師處之朝夕咨參至忘寢食頴一日視公曰非示現力豈致爾哉奈無箇所入何公問曰天堂地獄畢竟是有是無請師明説頴曰諸佛向無中説有眼見空華太尉就有裏尋無手摣水月堪笑眼前見窂獄不避心外聞天堂欲生殊不知欣怖在心善惡成境太尉但了自心自然無惑公進曰心如何了頴曰善惡都莫思量公曰不思量後心歸何所頴曰且請太尉歸宅公曰只如人死後心歸何所頴曰未知生焉知死公曰生則某已知之頴曰生從何來公罔措頴起揕其𮌎曰只在這裏更擬思量箇甚麼公曰會得也穎曰作麼生會公曰只知貪程不覺蹉路頴拓開曰百年一夢今朝方省有本小異既而説偈曰三十八歲瞢然無知及其有知何異無知滔滔汴水隱隱隋堤師其歸矣箭浪東馳禮部楊傑居士字次公號無為歷參諸名宿晚從天衣義懷禪師遊懷每引老龐機語令研究深造後奉祠泰山雞一鳴覩日如盤湧忽大悟因以有男不婚有女不嫁之偈別曰男大須婚女長須嫁討甚間工夫更説無生話書以寄懷懷稱善後會芙蓉楷禪師公曰與師相別幾年楷曰七年公曰學道來參禪來楷曰不打這鼓笛公曰恁麼則空遊山水百無所能也楷曰相別未久善能高鑒公大笑嘗以履一緉惠齊曉山主曰菖蒲海內有一犀牛鼻孔遼天不知向背被崔崙兒入水牽向一鈎截斷自後頭角不全憨皮別無用處海上老商裁為隻履祖師歸去只得半邊蔥嶺使還空傳消息至今七百來年未曾踏著完全在縱使背法堂著去未免止宿草庵直饒頂上戴來也救貓兒不得今日無為子布施與黃梅齊曉山主莫不舉足下足皆是道場東行西行無非佛事雖然如是向道衲僧腳跟未曾夢見在且道如何得與履相應去挂向千年葛藤上洞庭湖內與人看辭世偈曰無一可戀無一可捨大虗空中之乎者也將錯就錯西方極樂中書李林宗居士久參宗師未契後會益首座於南嶽公乃虗心扣之遂問意欲出塵今未出請師端的決疑情益曰作麼生是出塵底意公罔措益召曰會麼公猛省呈偈曰心鏡從來瑩黃河本自深只因師問後砂石化為金益曰正趨地獄公曰人我無相胡為地獄益曰汝今何在曰見祗對次益曰只此是黃金公曰眼中添屑益大笑公便禮拜簽判劉經臣居士字興朝少以逸才登仕版於佛未之信年三十二會東林照覺總禪師與語啓迪之乃敬服因醉心祖道既而抵京師謁慧林沖禪師於僧問雪竇如何是諸佛本源答曰千峰寒色語下有省歲餘官雒幕就參韶山果禪師將罷官辭果果囑曰公如此用心何愁不悟爾後或有非常境界無量歡喜宜急收拾若收拾得去便成法器若收拾不得則有不寧之疾成失心之患矣未幾復至京師趨智海依正覺逸禪師請問因緣逸曰古人道平常心是道你十二時中放光動地不自覺知向外馳求轉疏轉遠公益疑不解一夕入室逸舉傳燈所載波羅提尊者見香至國王問何者是佛提曰見性是佛之語問公公不能對疑甚遂歸就寢熟睡至五鼓覺來方追念間見種種異相而表裏通徹六根震動天地回旋如雲開月現喜不自勝忽憶韶山臨別所囑之言姑抑之逗明趨逸悉以所得告逸為證據且曰更須用得始得公曰莫要履踐否逸厲聲曰這箇是甚麼事却説履踐公默契乃作發明心地頌八首及著明道諭儒篇以警世詞曰明道在乎見性余之所悟者見性而已孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四支於安佚也性也楊子曰視聽言貌思性所有也有見於此則能明乎道矣當知道不遠人人之於道猶魚之於水未嘗須臾離也唯其迷己逐物故終身由之而不知佛曰大覺儒曰先覺蓋覺此耳昔人有言曰今古應無墜分明在目前又曰大道只在目前要且目前難覩欲識大道真體不離聲色言語又曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止欲識佛去處只這語聲是此佛者之語道為最親者立則見其參於前也在輿則見其倚於衡也瞻之在前也忽焉在後也取之左右逢其原也此儒者之語道最邇者奈何此道唯可心傳不立文字故世尊拈華而妙心傳於迦葉達磨面壁而宗旨付於神光六葉既敷千華競秀分宗列派各有門底故或瞬目揚眉擎拳舉指或行棒下喝竪拂拈槌或持叉張弓輥毬舞笏或拽石般土打鼓吹毛或一默一言一吁一笑乃至種種方便皆是親切為人然只為太親故人多罔措瞥然見者不隔絲毫其或沈吟迢迢萬里欲明道者宜無忽焉祖祖相傳至今不絶真得吾儒所謂念而不發開而弗違者矣余之有得實在此門反思吾儒自有其道良哉孔子之言默而識之一以貫之故目擊而道存指掌而意喻凡若此者乃合宗門之妙旨得教外之真機然而孔子之道傳之子思子思傳之孟子孟子既沒不得其傳而所以傳於世者特文字耳故余之學必求自得而後已幸余一夕開悟凡目之所見耳之所聞心之所思口之所談手足之所運動無非妙者得之既久日益見前每以與人人不能受然後知其妙道果不可以文字傳也嗚呼是道也有其人則傳無其人則絶余既得之矣誰其嗣之乎終余之身而有其人耶無其人耶所不可得而知也故既為記頌歌語以流播其事而又著此篇以諭吾徒云比部孫居士遺其名因楊歧會禪師來謁值視斷次公曰某為王事所牽何由免離會指曰委悉得麼公曰望師點破會曰此是比部弘願深廣利濟群生公曰未審如何會示以偈曰應現宰官身廣弘悲願深為人重指處棒下血淋淋公因此有省節推朱炎居士嘗問義江禪師云未審此身死後此心何住江曰此身未死此心何住公契旨述偈曰四大不須先後覺六根還向用時空難將語默呈師也只在尋常語默中江曰更須吐却音釋琛尺今切勗吁玉切鮮息淺切腕烏貫切𨤲陵之切暈音運繪音會扆於豈切燾大到切黜尺律切桎音質梏姑沃切內與納同藞盧下切疏音疏倩倉甸切哂式忍切甸音奠幣音弊閽音昏棠音堂溥音普戽荒故切研五堅切蔀音部籥音藥聵五怪切摣莊加切揕知林切崙盧昆切雒與洛同
