body:
  text: 平江府報恩光孝禪寺臣僧正受編青原第十三世雲門七世投子證悟修顒禪師法嗣鄧州香嚴海印智月禪師不知何許人也久參證悟深達法源自京師出居頴之薦福紹聖三年移香嚴上堂曰判府吏部此日命山僧開堂祝聖紹續祖燈只如祖燈作麼生續不見古者道六街鍾鼓響𭽸𭽸即處鋪金世界中池長芰荷庭長柏更將何法演真宗恁麼說話也是事不獲已有旁不肯底出來把山僧拽下禪床痛打一頓許伊是箇本分衲僧若未有這箇作家手腳切不得草草匆匆勘得腳跟下不實頭沒去處卻須倒喫薦福手中钁柄莫言不道僧問法雷已震選佛場開不昧宗乘請師直指曰三月三日時千華萬華拆云普天匝地承恩力覺苑仙葩一夜開曰切忌隨他去金山智覺法慧禪師法嗣常州報恩寶月覺然禪師越之嵊縣鄭氏子上堂曰學者無事空言須求妙悟去妙悟而事空言其猶逐臭耳然雖如是罕逢穿耳客多遇刻舟人紹興六年五月旦誡其徒曰世緣易染道業難辦汝等勉之語卒而逝長蘆淨照崇信禪師法嗣東京慧林慈受懷深禪師壽春六安人族夏氏生而祥光現舍文殊行堅禪師遙見疑火也詰且知師始生堅歎曰非凡兒往訪之師見堅輒笑母張氏許出家十四割愛冠祝髮後四年訪道方外崇寧初往嘉禾依淨照於資聖照舉良遂見麻谷因緣問曰如何是良遂知處師即洞明照徙長蘆命首衆政和初儀真守吏部季公釜以城南資福邀師屨滿戶外蔣山佛鑑勤禪師渡江行化見之茶退師引巡寮至千人街坊鑑問既是千人街坊為甚麼只有一人師曰多虗不如少實鑑曰恁麼那師𧹞然偶朝廷以資福為神霄宮因棄往蔣山留西庵陳請益鑑曰資福知是般事便休曰某實未穩望和尚不外鑑舉倩女離魂話反覆窮之大豁疑礙呈偈曰只是舊時行李處等間舉著便殽訛夜來一陳狂風起吹落桃華知幾多鑑拊几曰這底豈不是活祖師意未幾被旨居焦山閲四稔詔住慧林靖康改元丐歸不聽秋再辭乃允徑之天台石橋尋徙靈巖久之勑補蔣山未數月退居洞庭之包山復應王氏請為圓覺第一祖上堂曰不是境亦非心喚作佛時也陸沉箇中本自無階級切忌無階級處尋總不尋過猶深打破雲門飯袋子方知赤土是黃金上堂古者道忍忍三世如來從此盡饒饒萬禍千殃從此消默默無上菩提從此得師曰會得此三種語了好箇不快活漢山僧只是得人一牛還人一馬潑水相唾插觜廝罵卓拄杖曰平出平出上堂雲自何山起風從甚㵎生好箇入頭處官路少人行上堂昔有人獲一塊鐵鑄作一座方響人聞之便生逸樂之情謂之樂器後將方響打作一口磬人聞之便生善此後因人從軍却將磬鑄成一口劒人見之便生驚怖更後時又將劒鑄成一尊佛人見之便生歸向諸仁者大都只是一塊鐵因甚麼起得許多驚喜善惡之念試思之僧問甚麼人不被無常吞曰只恐他無下口處云恁麼則一念通玄箭三尸鬼失姧也曰汝有一念定被他吞了云無一念時如何曰捉著闍梨問知有道不得時如何曰啞子喫蜜云道得不知有時如何曰鸚鵡喚人僧禮拜師叱曰這傳語漢問如何是佛曰面黃不是真金貼云如何是佛向上事曰一箭一蓮華僧作禮師彈指三下紹興二年四月望為衆小參僧問末後句師良久曰後五日看至二十日果示微疾竟爾告終壽五十六臘三十六火浴戒體光分五色獲設利者無數竹石草木煙所及處纍纍如綴珠穴土為坑隨钁亦有之分靈骨塔于包山之顯慶思溪之圓覺平江府光孝證悟如璝禪師建寧魏氏子開堂日僧問如何是蘇臺境曰山橫師子秀水接太湖清云如何是境中人曰衣冠皇宋後禮樂大周前師凡見僧必問曰近日如何僧擬對即拊其背曰不可思議及將示寂衆集復曰不可思議乃合掌而終紹興府天衣如哲禪師族里未詳自退席寓平江之萬壽飲啖無擇人多侮之有以瑞岩喚主人公語問者師答以偈曰瑞巖長喚主人公突出須彌最上峰大地掀翻無覓處笙歌一曲𦘕樓中一日曰吾行矣令拂拭所乘笋輿乃書偈告衆曰道在用處用在死處時人只管貪歡樂不肯學無為敘平昔參問勉衆進修已忽竪起拳曰諸人且道這箇落在甚麼處衆無對師揮案一下曰一齊分付與秋風遂入輿中端坐而逝實紹興庚辰八月二十三日也火葬日闔郡捧香薪送者擁道師蛻身搖動咸謂其復生婺州智者法銓禪師上堂曰要扣玄關須是有節操極慷慨斬得釘截得鐵硬剝剝地漢始得若是隈刀避箭碌碌之徒看即有分以拂子擊禪床下座臨安府徑山妙空智訥禪師僧問牛頭未見四祖時是何曰坐久成勞云見後如何曰不妨我東行西行保寧覺印子英禪師法嗣臨安府鹽官廣福惟尚禪師自幼南詢至泗州依覺印於普照一日請方丈問云南泉斬猫兒意旨如何曰須是南泉始得印即以前語詰之師不能對至僧堂忽大悟曰古人道從今日去更不疑天下老和尚舌頭信有之矣述偈呈印曰須是南泉第一機不知不覺驀頭錐覿面若無青白眼還如𮭗𮭗守空池舉未絶印竪拳曰正當恁麼時作麼生師掀倒禪床印遂喝師曰賊過後張弓便出住廣福日室中問僧提起來作麼會又曰且道是箇甚麼要人提起餘語未見慶元府雪竇法寧禪師衢之西安人族社氏父母禱金華聖者一夕夢梵僧入家乃生弱冠祝髮志慕游歷因閲趙州語默契心源及見覺印言其所得印特稱之後八坐道場上堂曰百川異流以海為極森羅萬象以空為極四聖六凡以佛為極明眼衲僧以拄杖子為極且道拄杖子以何為極有人道得山僧兩手分付儻或未然不知間倚禪床畔留與兒孫指路頭甘露德顒禪師法嗣楊州光孝亢禪師僧問如何是和尚家風曰七顛八倒云忽遇客來如何祗待曰生鐵蒺䔧劈口𡎺法雲佛國惟白禪師法嗣東京慧林月印惠海禪師初住湯泉上堂曰黃金地上具眼者未肯安居荊棘林中本分底留伊不得只如去此二途作麼生是衲僧行履處良久曰舉頭煙靄裏依約見家山上堂顧視大衆拍禪床一下曰聊表不空便下座僧問師唱誰家曲宗風嗣阿誰曰黃金地上玉樓臺云如何是祖師西來意曰三月洛陽人戴華楊州建隆原禪師姑蘇洞庭人族夏氏初得法於甘露顒禪師後機契於佛國以步武高妙侍國入禁中升座問答稱旨賜金襴伽梨自京回蔣山值佛鑑上堂師出問如何是蔣山境鑑抗聲曰你次第問我境中人耶師便禮拜歸衆鑑大喜端明蔡公襄請開法建隆後住洞庭翠峰上堂拈拄杖曰買帽相頭依模𦘕樣從他野老自顰眉志公不是間和尚卓拄杖下座上堂舉僧問鏡清明教新年佛法有無師曰新年景物漸舒蘇佛法徒勞論有無得失是非都喪却波斯鼻孔自來粗僧問大覺世尊昔於波羅奈國轉四諦法輪建隆今日開堂未審轉那箇法輪曰千江同一月萬戶盡逢春云法輪轉處達者皆知旃檀爇時香風匝地曰寒山拊掌拾得呵呵開先心印智珣禪師法嗣廬山開先宗禪師上堂曰一不做二不休捩轉鼻孔捺下雲頭禾山解打鹽官鼓僧繇不寫戴嵩牛廬陵米投子油雪峰依舊輥雙毬夜來風送衡陽信寒鴈一聲霜月幽元豐惠圓清滿禪師法嗣福州雪峰圓覺宗演禪師恩州人也上堂曰道箇直下便會早是枝生節外更若舉古明今笑殺德山臨濟驀拈拄杖召衆曰且道德山臨濟有甚麼長處卓一卓喝一喝曰曾經大海休誇水除却須彌不是山上堂遣迷求悟不知迷是悟之鉗鎚愛聖憎凡不知凡是聖之爐鞴只如聖凡雙泯迷悟俱忘一句作麼生道半夜彩霞籠玉像天明峰頂五雲遮僧問不慕諸聖不重己靈時如何曰款出囚口云便恁麼會去時如何曰換手推胸問如何是大善知識心曰十字街頭片瓦子辭衆日僧問如何是臨岐一句曰有馬騎馬無馬步行云途中事作麼生曰賤避貴雪竇道榮禪師法嗣福州雪峰大智禪師僧問如何是祖師西來意師銜拂柄示之僧云此是香嚴底和尚又作麼生師便喝僧大笑師叱曰這野狐精夾山自齡禪師法嗣潭州石霜法聰禪師僧問如何是君王劒曰四塞輸降款梯山入貢來云如何是諸侯劒曰瞻之仰之云如何是百官劒曰四海煙塵淨六合一家昌云如何是和尚劒曰理長即就育王真戒曇振禪師法嗣慶元府嶽林真禪師上堂曰古人道初秋夏末合有責情三十棒嶽林則不然靈山會上世尊拈華迦葉微笑正當恁麼時好與三十棒何故如此太平時節強起干戈教人吹大法螺擊大法鼓舉步則金蓮𨇾蹀端居則寶座巍峩梵王引之於前香華繚繞帝釋隨之於後龍象駢羅致令後代兒孫遞相倣斆三三兩兩皆言出格風標劫劫波波未肯歸家穩坐鼓脣搖舌宛如鐘磬笙竿奮臂點𮌎何啻稻麻竹葦更逞游山玩水撥草瞻風人前說得石點頭天上飛來華撲地也好與三十棒且道坐夏賞勞如何酬獎良久曰萬寶功成何厚薄千鈞價重自低昂招提廣燈惟湛禪師法嗣嘉興府華亭觀音禪師遺其名僧問如何是佛曰半夜烏龜火裏行云意作麼生曰虗空無背面僧禮拜師便打青原第十三世洞山九世丹霞子淳禪師法嗣真州長蘆真歇清了禪師左綿安昌人族雍氏襁褓入寺見佛喜動眉睫咸異之年十一依聖果清俊歷七稔試法華得度往成都大慈習經論領大意出蜀至沔漢扣丹霞入室次霞問如何是空劫時自己師擬對霞曰你閙在且去一日登鉢盂峰豁契悟徑歸見霞方侍立次霞掌曰將謂你知有師欣然拜之翌日霞上堂曰日照孤峰翠月臨溪水塞祖師玄妙訣莫向寸心安便下座師直前云今日升座更瞞某不得也霞曰你試舉我今日升座看師良久霞曰將謂你瞥地師便出後游五臺之京師浮汴抵長蘆謁祖照禪師一語契投命為侍者踰年分座宣和三年照稱疾退院四年秋經制陳公璋請師繼席衲子憧憧堂盈千七百衆建炎末自儀真游四明之補怛洛迦山又之丹丘天峰受閩中象骨請紹興初勑住育王從溫之龍翔禪其律居移徑山及崇先新寺上堂曰我於先師一堂下伎倆俱盡覔箇開口處不可得如今還有恁麼快活不徹底漢麼若無銜鐵負鞍各自著便上堂鹽決定鹹醋決定酸大家知有這滋味因甚麼却喚作割茅刈草底人還知他家未穩處麼不行尊貴路爭踏上頭關上堂久默斯要不務速說釋迦老子待要款曲賣弄爭奈未出母胎已被人破且道覷破箇甚麼瞞雪峰不得上堂上孤峰頂過獨木橋驀直恁麼行猶是時人腳高腳低處若見得徹不出戶身遍十方未入門常在屋裏其或未然趂涼般取一轉柴上堂天曉濃霜白依然境未分出門無所辨華鳥寂無聞正恁麼時作麼生是虗不墮位要須擊起冰河焰莫使凝然凍不回上堂道得第一句不被拄杖子瞞識得拄杖子猶是途路中事作麼生是到地頭一句上堂處處覓不得只有一處不覓自得且道是那箇一處良久曰賊身已露上堂口邊白醭去始得入門通身紅爛去方知有門裏事更須知有不出門底復曰喚甚麼作門僧問三世諸佛向火𦦨裏轉大法輪還端的也無師大笑曰我却疑著云和尚為甚麼却疑著曰野華香滿路幽鳥不知春問不落風彩還許轉身也無曰石人行處不同功云向上事作麼生曰妙在一漚前豈容千聖眼僧禮拜師曰即恐不恁麼問不求諸聖不重己靈時如何曰古鏡臺前荒草秀云便恁麼去時如何曰金烏銜片玉二十一年九月壬子慈寧皇太后幸寺命開堂垂箔聽法賜金襴銀帛等月末示疾十月旦太后遣中使宣醫候問從容而別即加趺而逝龕留七日太后降香錫金以侑齊祭塔全身于院西桃華塢壽六十四臘四十五二十三年秋諡曰悟空塔名淨照慶元府天童宏智正覺禪師隰之隰川人族李氏母夢五臺一僧解環與環其右臂乃孕遂齊戒及生師右臂特起若環狀七歲日誦千言祖寂父宗道久參佛陀遜禪師遜嘗指師謂其父曰此子道韻勝甚非塵埃中人苟出家必為法器十一得度於淨明本宗十四具戒逾三年渡河之洛坐夏少室秋至香山謁枯木成禪師染指法味即造丹霞霞問如何是空劫已前自己云井底蝦蟆吞却月三更不借夜明簾曰未在更道師擬議霞打一拂子曰又道不借師於言下釋然作禮霞曰何不道取一句云某今日失錢遭罪霞曰未暇打得你且去時年二十三霞領大洪師掌箋記宣和三年命首衆得法者已數人四年過圓通時真歇初住長蘆遣僧邀至衆出迎見其衣舄穿弊且易之真歇俾侍者易以新履師却曰吾為鞋來耶衆聞心服懇求說法居第一座六年出住泗之普照次補太平圓通能仁及長蘆天童而天童屋廬湫隘師至創闢一新衲子爭集萬指餘上堂曰黃閣簾垂難傳家信紫羅帳合暗撒真珠正恁麼時視聽有所不到言詮有所不及如何通得箇消息去夢回夜色依稀曉笑指家風爛熳春上堂心不能緣口不能議直須退步荷擔切忌當頭觸諱風月寒清古渡頭夜船撥轉琉璃地上堂空劫有真宗聲前問己躬赤窮新活計清白舊家風的的三乘外寥寥一印中却來行異類萬派自朝東上堂句裏明宗則易宗中辨白則難良久曰還會麼凍雞未報家林曉隱隱行人過雪山上堂今日是釋迦老子降誕之辰長蘆不解說禪與諸人盡箇樣子只如在摩耶胎時作麼生以拂子𦘕此相曰只如以清淨水浴金色身時又作麼生復𦘕此相曰只如周行七步目顧四方指天指地成道說法神通變化智慧辨才四十九年三百餘會說青道黃指東畫西入般涅槃時又作麼生乃盡此相復曰若是具眼衲僧必也相許其或未然一一歷過始得僧問如何是向去底人曰白雲投壑盡青嶂倚空高云如何是却來底人曰滿頭白髮離岩谷半夜穿雲入市云如何是不來去底人曰石女喚回三界夢木人坐斷六門機問一絲不著時如何曰合同船子並頭行云其中事作麼生曰快刀快斧斫不入問布袋頭開時如何曰一任填溝塞壑問清虗之理畢竟無身時如何曰文彩未痕初消息難傳際云一步密移千聖外通身放下劫壺空曰誕生就父時合體無遺照云理既如是事又作麼生曰歷歷才回通化事十方機應又何妨云恁麼則塵塵皆現本來身去也曰透一切色超一切心云如理如事又作麼生曰路逢死蛇莫打殺無底籃子盛將歸云入市能長嘯歸家著短衫曰木人嶺上歌石女溪邊舞師住持以來受無貪而施無厭歲艱食竭己有及贍衆之餘賴全活者數萬日常過午不食紹興丁丑九月謁郡僚及檀度次謁越師趙公令詪與之別十月七日還山翌日辰巳間沐浴更衣端坐告衆顧侍僧索筆作書遺育王大慧禪師請主後事仍書偈曰夢幻空華六十七年白鳥煙沒秋水天連擲筆而逝龕留七日顏貌如生爪髮漸長奉全軀塔于東谷僧臘五十有三其生前所遺髮齒設利綴之如珠或髮貫其中至今以誠心求者必得戊寅春諡宏智塔妙光隨州大洪慧照慶預禪師上堂曰進一步踐他國王水草退一步踏他祖父田園不進不退正在死水中還有出身之路也無蕭騷晚籟松叉短游漾春風柳線長上堂舉船子囑夾山云直須藏身處無蹤跡無蹤跡處莫藏身吾在藥山三十年只明此事今時人為甚麼却造次丹山無彩鳳寶殿不留冠有時憨有時癡非我途中爭得知處州治平湡禪師上堂曰優游實際妙明家轉步移身指落霞無限白雲猶不見夜乘明月出蘆華焦山枯木法成禪師法嗣太平州吉祥法宣禪師上堂曰離四句絶百非德山棒猶鈍臨濟喝還遲七佛已前消息子相逢何待更揚眉諸仁者若作無事商量正落闡提群隊若作佛法領解又是特地新條而今直須撥開向上一竅坐斷千聖舌頭運出自己家珍始有衲僧巴鼻儻不如是滿口嚼冰霜逢人向誰說僧問如何是祖師西來意曰久旱無甘雨田中稻穗枯云意旨如何曰今年米價貴容易莫嫌粗台州天封子歸禪師上堂以拄杖卓一下召大衆曰八萬四千法門八字打開了也見得麼金鳳夜棲無影樹峰巒才露海雲遮上堂天封一語時時直與莫挂𮌎襟切須記取台州護國守昌禪師上堂拈拄杖卓曰三十六旬之開始七十二候之起元萬拜迎和氣之時東帝布生成之令直得天垂瑞彩地雍貞祥微微細雨洗寒空淡淡春光籠野色可謂應時納祐慶無不宜盡大地人皆添一歲敢問諸人且道那一人年多少良久曰千歲老兒顏似玉萬年童子𩯭如𮈔鄧州丹霞普月禪師初住汝州寶應次遷丹霞上堂曰威音已前誰當辨的然燈而後孰是知音直饒那畔承當未免打作兩橛縱向這邊行履也應未得十全良由杜口毗耶已是天機漏泄任使掩室摩竭終須縫罅離披休云體露真常直是純清絶點說甚皮膚脫落自然獨運孤明雖然似此新鮮未稱衲僧意氣直得五眼齊開三元洞啓從此竿頭絲線自然不犯波瀾須明轉位回機方解入垂手所以道任使板齒生毛莫教眼睛顧著認著則空花繚亂言之則語路參差既然如是敢問諸人不犯鋒釯一句又且如何道得良久曰半夜烏龜眼豁開萬象曉來都一色東京妙慧尼淨智大師慧光宣和三年春勑住妙慧上堂舉趙州勘婆話乃曰趙州舌頭連天老婆眉光覆地分明勘破歸來無限平人瞌瞎石門元易禪師法嗣吉州青原齊禪師長樂人族陳氏年二十八辭父兄從雲蓋智禪師出家執事首座寮座一日秉拂罷師前曰某竊聞首座所說莫曉其義伏望慈悲指示座諄諄誘之使究無著說這箇法踰兩日有省以偈呈曰說法無如這箇親十方剎海一微塵若能於此明真理大地何曾見一人座駭然因語智得度遍扣諸方後至石門深蒙器可出住青原僅十二年示寂日說偈遺衆曰昨夜三更過急灘灘頭雲霧黑漫漫一條拄杖為知己擊碎十關與萬關紹興府天衣法聰禪師上堂曰幽室寒燈不假挑虗空明月徹雲霄要知日用常無間烈焰光中發異苗裝普賢大士開光明次師登梯乘筆顧大衆曰道得即為下筆衆無對師召侍者曰與老僧牢扶梯子遂點之遂寧府香山尼佛通大師遺其名因誦蓮經有省往見石門乃曰成都喫不得也遂寧喫不得也門拈拄杖打出通忽悟曰榮者自榮謝者自謝秋露春風好不著便門拂袖歸方丈尼亦不顧而出由此道俗景從得法者衆淨因自覺禪師法嗣東京華嚴真懿慧蘭禪師上堂曰達磨大士九年面壁未開口已前不妨令人疑著却被神光座主一腳手忙亂便道吾本來茲土傳法救迷情一華開五葉結果自然成當時若有箇漢腦後有照破古今底眼目手中有截斷虗空底鉗鎚才見道便與驀胸搊住一華五葉且拈放一邊作麼生是儞傳底法待伊開口便與掀倒禪床直饒達磨全機也倒退三千里免見千古之下負纍兒孫慧嚴今日豈可徒然非唯重整頽綱且要為諸人雪屈遂拈拄杖橫按召大衆曰達磨大師向甚麼去也擲拄杖下座中秋雨下上堂家家啓戶待嬋娟豈謂風雲翳碧天以手打一圓相曰賴得箇中消息在團團不動照三千上堂拈拄杖曰靈山會上喚作拈華少室峰前名為得髓從上古德只可傍觀末代宗師盡皆拱手華嚴今日不可逐浪隨波擬向萬仞峰前點出普天春色會麼髑髏無喜識枯木有龍吟天寧禧誧禪師法嗣西京熊耳慈禪師上堂曰般若無知應緣而照山僧今日撒屎撒尿這邊放那邊屙東山西嶺笑呵呵幸然一片清涼地剛被熊峰染汙他染汙他莫瞅瞅泥牛木馬盡呵叱過犯彌天且莫論再得清明又何日還會麼來年更有新條在惱亂春風卒未休寶峰闡提惟照禪師法嗣江州圓通青谷真際德止禪師金紫徐公閩中之季子也世居歷陽師雙瞳紺碧神光射人十歲未知書多喜睡其父目為懵然子暨成童強記過人學文有奇語弱冠夢異僧授四句偈已而有以南安岩主像遺之者即傍所載聰明偈自是持念不忘後五年隨金紫將漕西洛一夕忽大悟連作數偈一曰不因言句不因人不因物色不因聲夜半吹燈方就枕忽然這裏已天明時闡提主招提寺已與往來一日詣寺提望見拊掌笑曰曹洞之宗賴子振矣師嘯歌自若衆莫測之乃力求出家父弗許欲以官授之曰某方將脫世網不著三界豈復刺頭於利名中耶請移授從兄珏遂祝髮受具未數載名振京師宣和三年春徽宗皇帝特賜號真際俾居圓通上堂曰山僧二十年前兩目雙盲了無所覩唯是聞人說道青天之上有大日輪照三千大千世界無有不遍之處籌䇿萬端終不能見二十年後眼光漸開又值天色連陰濃雲亂湧四方觀察上下推窮見雲行時便於行處作計較見雲住時便於住處立箇窠臼正如是問忽遇著箇多知漢問道莫是要見日輪麼何不向高山頂上去山僧却徵他道那裏是高山頂上他道紅塵不到處是諸仁者好箇端的消息還會麼長連床上佛陀耶上堂昨夜黃面瞿曇將三千大千世界來一口吞盡如人飲湯水蹤跡不留應時消散當爾時諸大菩薩聲聞羅漢及與一切衆生盡皆不覺不知唯有文殊普賢瞥然覷見雖然得見渺渺茫茫恰似向大洋海裏頭出頭沒相似諸人且道是甚麼消息若也檢點得破許他頂門上具一雙眼紹興乙亥夏某月五日有異讖次日泊然示寂闍維煙氣所及悉成設利塔司空山又分窆疊石原壽五十六臘三十二其偈頌流行者幾數百篇台州真如道會禪師上堂曰空劫中事自肯承當日用全彰有何滲漏正好歸家穩坐任他雪覆青山不留元字挂懷誰顧波翻水面且道正不立玄偏不附物一句如何舉似機絲不挂梭頭事文彩縱橫意自殊興國軍智通大死翁景深禪師台之仙居人族王氏自幼不羣年十八依廣度院德芝披削始謁淨慈象禪師一日曰思而知慮而解皆鬼家活計興不自遏聞寶峰名尊當世往求入室峰曰直須斷起滅念向空劫已前掃除玄路不涉正偏盡却今時全身放下放盡還放方有自由分師聞頓領厥旨峰擊鼓告衆曰深得闡提大死之道後學宜依之因號大死翁建炎改元開法智通上堂曰來不入門去不出戶來去無痕如何提唱直得古路苔封𦏪羊絶迹蒼梧月鎖丹鳳不棲所以道藏身處沒蹤跡沒蹤跡處莫藏身若能如是去住無依了無向背還委悉麼而今分散如雲鶴儞我相忘觸處玄上堂火裏靈苗秀無根遍界生諸人如體悉千里共途行若也未然放出連天荊棘直教大地崢嶸僧問如何是大死翁道曰不落正偏圓云如何是大死翁德曰深山藏不得獨露有乖疏問如何是正中偏曰黑面老婆披白練云如何是偏中正曰白頭翁子著皂衫云如何是正中來曰屎裏翻筋斗云如何是兼中至曰雪刃籠身不自復云如何是兼中到曰崑崙夜裏行云向上還有事也無曰捉得烏龜喚作鱉云乞師再垂方便曰入山逢虎臥出谷鬼來牽云何得干戈相待曰三兩線一斤麻紹興初歸住寶藏岩以事民其服至壬申二月示微恙乃曰世緣盡矣三月十三留兄滋家寫遺書別道舊鄰里為衆小參仍說偈曰不用剃頭何須澡浴一堆紅焰千足萬足雖然如是且道向上還有事也無遂斂目而逝世壽六十有三坐夏四十有五衡州華藥智朋禪師四明人族黃氏未冠為僧依寶峰有年無省因為衆持鉢峰自題其像曰雨洗淡紅桃蕚嫩風搖淺碧柳絲輕白雲影裏怪石露流水光中古木清噫儞是何人師即禮辭持以還浙至南徐焦山展挂次枯木成禪師見之歎曰今日方知此老親見先師來師聞即契悟有本小異遂曰元來恁麼地成曰汝作麼生會師曰春生夏長秋收冬藏成曰直須保任師應喏紹興初出住華藥次遷清涼上堂曰海風吹夢嶺猿啼月敢問諸人是何時節恁麼會得無影樹下任遨遊其或未然三條椽下直須打徹後退居四明之瑞岩建康帥再以清涼挽之明守亦勉其行師不從作偈送使者曰相煩專使入煙霞灰冷無湯不點茶寄語甬東賢太守難教枯木再生華未幾終於端岩衢州烏巨癡憨如懿禪師上堂曰至道休存佛祖言更須放下莫論禪未彰文彩全提妙暗裏虗明徹底圓大洪智禪師法嗣紹興府天章樞禪師上堂召大衆曰春將至歲已暮思量古往今來只是箇般調度凝眸昔日家風下足舊將岐路勸君休莫莾鹵眨上眉毛須薦取東村王老笑呵呵此道今人棄如土大洪淨嚴守遂禪師法嗣隨州大洪慶顯禪師僧問須菩提岩中宴坐帝釋雨華和尚新據洪峰有何祥瑞曰鐵牛耕破扶桑國迸出金烏照海門云未審是何宗旨曰尉斗煎茶銚不同音釋誧音普嵊音盛釜音父𨇾蘇協切蹀徒篋切沔音緬憧音衝侑禹救切隰音習湫在九切詪音艮懵武亘切甬音乏音勇耳劄
