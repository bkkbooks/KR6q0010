body:
  text: 平江府報恩光孝禪寺臣僧正受編雜著蔣山佛慧泉禪師默庵歌并序余熙寧九年春自杭之千頃移居是院因其方丈缺爾遂闢半軒結草庵於巖石之下以為宴息之所是年十二月庵成命名曰默蓋取摩竭掩室毗耶杜口之義也未幾有客造余曰師之庵成矣庵之義著矣而師方且嘮嘮萃徒侶引遊士分燈而啓暗濬源而導深謂其興悲拯物開蒙發蔽則亦至矣而名為默其亦妄乎余謂客曰子是知默而不知其所以默也子居吾語汝夫默者佛祖之真猷含靈之大本也本之正則處暄而常寂本之繆則趣理而厭塵然喧寂正繆雖名數繁然皆不離吾之至默也故西竺聖人佛者應緣感物金文玉句殆不勝紀而卒謂乎無説蓋明此也後之人暖昧斯道謂語為語而謂默為默縱謂語默一體而亦不知體為何物也徒憤心口蹈之而不詳用之而不辨揚揚然自以為得復曰彼默傳者斷空絶言而已矣吾佛之道豈然哉於戲是豈識吾佛之道也余學乎默者於默也安能盡之今是庵而且名之者蓋思古人之不可以跂及也而亦有所驚也客去復為歌曰庵之基兮不崩而不騫庵之形兮似月而孤圓上無其際兮傍無其邊中無其極兮下亦如然斯古今兮未聞其變遷西來之人兮強謂其相傳嗟余之不敏兮實亦紹焉念道之將墜兮欲扶危而持顛彼昏者何知兮乃拘空而滯偏棄旃檀古幹兮慕螻蟻之腥羶還鄉路絶兮嗟荊棘之參天空華易落兮悲短景之難延昔人不偶兮亦梁逐而魏還顧余之微兮今復何言結茅宴處兮其樂闐闐朝昏兀兀兮飢餐而困眠九年冷坐兮斯人可憐魯祖面壁兮藩籬未堅諗老敗軍兮徒展戈鋋三斗山茶兮聊思共煎伊人不來兮吾意日懸伊人既至兮凝寂異喧喧之至理兮乃默之源吾無己兮為若重宣松風之飂飂兮巖溜濺濺峰巒之崷崒兮浮黛而凝煙竹皎皎兮桂魄而𫕟穿几席英英兮白雲而晝聯春夏兮層颸與百華而鬪妍秋冬兮擁爐視黃葉之翩翩斯物物兮舉妙以談玄伊迷徒兮剛欲而棄捐全體見成兮不勞雕鐫忽爾回光兮乃聖乃賢真風既復兮捨而忘筌野老歌吟兮幸斯言之未愆熙微幽徑兮蘇駮苔纏此處同歸兮千年萬年劫火洞然兮此不可然重閣之後兮寒山之前吳山師子端禪師睡辭夫人處世身有四儀身之四儀唯臥最奇人間萬慮俱遣名利富貴都不能知翻思釋迦老子不知人之好宜却教我晝則勤心修習善法初夜後夜事勿有廢中夜誦經以自消息莫以睡眠因緣令一生空過若教老僧當時親見領向靈山頂上大松樹下塊石枕頭大家一時打睡驀地起來知道睡中有此滋味放牛歌牛牛牛休休休更莫牽犂拽杷任經冬夏春秋無繩無索無準無鈎朝來放向荒郊去杳杳無蹤休復休易説夫易之道幽玄難會問著時流指天説地窮他二儀未分已前只言太始太極混沌一氣清濁才分之後不離乾坎艮震巽離坤兌出來十字街頭撞著南山張二問他上代祖翁却道離鄉日久子孫不知次第法昌遇禪師寄徐龍圖歌孺子從來心性惡不是德山誰敢撲法昌一句沒人知信手拗折瑚枝也大奇五十年來尋不得顧鑒咦翻身躍倒畫須彌拽下虗空為井蓋作地衣一等師子兒他時若見毗耶老腦後錐頭角分明辨大溈答徐龍圖歌法昌有條老鱉鼻生得來來沒向背藏身露影恰似無觸著令人身粉碎那箇驢更奇異兩耳纍垂四腳著地正恁麼來為蛇出氣蛇不惜命近前噴嚏和那老驢總不靈利保寧勇禪師贈洪井朱道人歌來來去去未嘗休選甚南頭與北頭一錢為本萬錢利善解看樓便打樓不妨好手著甚來由君不見歸耕有疇歸釣有舟不如騎取箇無眼耳鼻底水牯牛向三家村裏東倒西儽擺尾搖頭清溪萬頃月印中流不收玉粒不擲金鈎悠悠又阿誰管你趙官家世界天下有三百六十州泐潭真淨雲庵文禪師送雅禪者往石城作丐歌雞不鵮無功之食水長船高物歸乎有道之心泥多佛大德山呵佛罵祖曾遭巖頭僧堂前領過臺山路上老婆有箇趙州不出門勘破獨有雲門古錐有口不妨道火火本無火承言者紛紛自我不然也非言道不通非言理不果理事通達人利生無不可既然也却不解臨時建立又不解逐旋包褁但可日日用好心殊不知反遭惡禍末法衆生知恩者能有幾箇雅禪者為你老婆葛藤得麼寶峰闡提照禪師和陸德先尚書歌大道坦然兮殊不用功殊不用功兮何必研窮豁虗離礙兮從空背空不守自性兮雖同不同百無所依兮自西自東照體獨立兮滿目清風廓落大度兮無不包容全身異類兮觸處皆通勸徒銘身心無拘動寂無知如大死人無倚無依無拘者寬無知者安無內無外無定無觀無適無莫無造無作無去無來無好無惡一道清虗萬法如如愚極成智智極成愚超諸數量孰云比況淨盡不留無法可尚識不可識智不可知誰家之子兀然巍巍巍巍不存根塵頴脫如憨如癡落落魄魄不惜口業為子説破笑殺闍梨山僧罪過龍門佛眼遠禪師坐禪銘心光虗映體絶偏圓金波匝匝動寂常禪念起念滅不用止絶任運滔滔何曾起滅起滅寂滅現大迦葉坐臥經行未嘗間歇禪何不坐坐何不禪了得如是始號坐禪坐者何人禪是何物而欲坐之用佛覓佛佛不用覓覓之轉失坐不我觀禪非外術初心閙亂未免回換所以多方教渠靜觀端坐收神初則紛紜久久恬淡虗間六門六門稍歇於中分別分別才生已成起滅起滅轉變從自心現還用自心反觀一遍一反不再圓光頂戴靈𦦨騰輝心心無礙橫該竪入生死永息一粒還丹變金成汁身心客塵透漏無門迷悟且説逆順休論細思昔日冷坐尋覓雖然不別也大狼藉剎那凡聖無人能信匝地忙忙大須謹慎如其不知端坐思惟一日築著伏惟伏惟黃龍佛壽靈源清禪師無生常住真歸告賢劫第四尊釋迦文佛直下第四十八世孫惟清雖從本覺應緣出生而了緣即空初無自性氏族親里莫得而詳但以正因一念為所宗承是廁釋迦之遠孫其號靈源叟據自了因所了妙性無名字中示稱謂耳亦臨濟無位真人傅大士之心王類矣亦正法眼藏涅槃妙心唯證乃知餘莫能測者歟所以六祖問讓和尚甚麼處來曰嵩山來祖曰甚麼物恁麼來曰説似一物即不中祖曰還假修證否曰修證即不無污染即不得祖曰即此不污染是諸佛之護念汝既如是吾亦如是茲蓋獨標清淨法身以遵教外別傳之宗而揀云報化非真佛亦非説法者然非無報化大功大用謂若解通報化而不頓見法身別滯污染緣乖護念旨理必警省耳夫少室道行光騰後裔則有雲門偃奮雄音絶唱於國中臨濟玄振大用大機於天下皆得正傳世咸宗奉惟清望臨濟九世祖也今宗教衰喪其未盡絶滅者唯二家胤派斑斑有焉然名多愧實顧適當危寄而朝露身緣勢迫晞墜因力病釋俗從真敘如上事以授二三子吾委息後當用依稟觀究即不違先聖法門而自見深益慎勿隨末法所尚乞空文於有位求為銘志張飾説以浼吾至囑至囑因自所敘曰無生常住真歸告且繫之以銘銘曰無涯湛海瞥起一漚亘乎百年曷浮曷休廣莫清漢欻生片雲有無起滅隱顯何分了茲二者即見實相十世古今始終現量吾銘此旨昭示汝曹泥多佛大水長船高泐潭湛堂準禪師贈奇松頭歌種松道者道情孤往箇茅庵事事無屋內鋤頭三兩枘煙熏一隻醋葫蘆問渠禪回首指山前問渠道戴箇篛笠去鋤草再三再四再問渠拍手呵呵笑欲倒却言昔日老雲門參見睦州陳長老龍牙言禪師送務紳禪者分衛歌豁靈明開正道脫却多年尳臭破布襖頂門一劄眼睛便定動如今識得無能老天真智現非作造卷衲携笻下雲嶠直去廬陵化有緣萬戶一作室千門須遍到禾山鼓清平調俯仰順從心一照那邊若遇本色人點著皆知妙不妙子莫學石頭老書信不通行太早得箇清源鈯斧兒南臺石上鋤荒草示曇清侍者牧牛歌儂家牧箇白牛年來可縱可收不用鼻頭絭索任渠放蕩林丘風清月瑩蹤迹難儔香嚴罷鞭杖石鞏放繩頭跨入白雲深處遊直得通身無影象時吹木笛有來由小牛兒莫容易淺草平田且隨意勿今逐隊上高坡筋力未能登嶮巇傍水依山養令頭角完備叱豈不見狸奴白牯解作師子遊戲勝因戲魚靜禪師拄杖歌誰人無一條拄杖我家收底醜模樣徹頭徹尾節目深從生至老筋骸壯不須修何須漆體段自然成箇格或行或坐儘隨身或倚或携還任力拋一拋卓一卓三界魔王頓驚愕雨雲雷電匝長空展盡神通難揣摸有時收有時用縱奪臨機恣拈弄儻蒙上士入門來一棒打教知癢痛説道理沒人情動著教伊禍患生休誇昔日化龍勢謾説當年解虎聲挑日月吞乾坤劃開一路涅槃門大丈夫兒須執捉一言不契命難存薦福常庵崇禪師和陶潛歸去來辭歸去來兮一念相應名曰歸既以此處為我家何外物而可悲審靈靈而自到會了了而堪追在我而無非我其非我而孰非矧我性之有常如我身之能衣問行人而未悟即迷荒而細微全身不動乃馳乃奔一塵廓然見此法門塵塵有光剎剎儼存唯此多旨匪壺匪鐏樂歸來以自得向萬化以開顏居常庵以默照念懶拙之可安將寒暑以為用勞生死而何關借夢幻以遊戲統思慮而全觀今無心以放曠適有趣而來還其至至以無外等空空以盤桓歸去來兮請悟此以勝遊不動步而到家胡自苦兮多求了千生之活計聆毫髮以忘憂無寸土而耕鋤實萬頃而千疇假道浮囊寄夢扁舟或山丘以城郭或城郭而山丘非變化以能融豈神通而同流善寂滅而莫任起三摩而寧休已矣乎只將煩惱正與時舉體不任焉爾留堂堂歷歷宜知之愚智未嘗間螻蟻亦可期幸有田而可種何不及時而耕耔師吉祥而問已從無言而賦詩本如如以獨耀證夫親而將誰疑常庵賦山之前水之後崷崒乎煙雲之上縹渺乎松竹之杪或作間會靈迹以託化樂幽居而養浩茲固野人之自得豈心口之所較雖復異心口於思議即聞見於是否破滯著於二乘闢圓常於非道然非造詣深妙與識並遷浮雲易散夜壑匪堅豈獨苟初步之不正矧修途之能前乃欲超生死之大患出有無之深源是猶照螢光於捺落指慧日於尼乾則亦沉荒於黑暗之下淪墮於矯妄之邊顧衣珠之有在是寶刀之終還者矣若夫撒手高巖箭峰中鏑全機全用混塵混迹瞥爾不到遼然難及喪妙用於剎那超情塵於毫忽類春夢之展轉若空華之出沒謂無有以不無言有有而非實妙無無之成病妙有有之成賊四句消融百非條直暢靈𢙿而適悅開玄路而安逸故能隨所而為樂非居而居一邀清風於修竹聽吟猿於石室廓然寥然以語以默非禪非誦非忘非憶然後乘萬化之用等衆類之歸以會夫一瞬又胡我胡物司空山歌司空山在雲外時人到得方自在我今隨力幸登臨四顧巍巍無向背絶遮攔難比況千山萬山齊恃仰九夏炎炎雪正飛三冬颯颯華初放春不榮秋不落隱隱昭昭倚寥廓直下人間咫尺間欲上之人難措腳人迹絶野境寬觸事無能懶散便有時向日巖前坐有時乘困日高眠不學禪不修道只麼騰騰恣顛倒百種無求箇野人隨分隨緣能作造不從他不覓己一句靈靈萬緣裏自從識得祖師關歷歷明明此為始無妙名無忌諱來者向渠只麼是任你千般與萬般何曾出得箇些子分明説報知音目炙風吹不用尋須彌南畔相逢著積翠臺邊旨更深旨更深誰會得東村王老眼前黑李四張三不信伊問盡鄰家轉疑惑轉疑惑不較多為君吟作司空歌宮商角徵任吹唱角徵宮商爭奈何座右銘得之在此失之在此得之失之孰爾為己己自不形堂堂爾名名由實有唯實爾靈非一非異猶空隨器全空在空在空全器的的自知空器何依匪空匪器不二而誰海慧獨照空器俱妙妙在無私全心了了一句全提凡聖同機悟不自悟迷不自迷影響萬化苦樂三界誰知不知無在不在唯我行之我不自欺如夜復晝日新日為功不自有唯我持久與物同波唯我為守守之非緣唯我自堅千佛同訓一志無遷上封佛心才禪師坐禪儀夫坐禪者端心正意潔己虗心疊足加趺收視反聽惺惺不昧沈掉永離縱憶事來盡情拋棄向靜定處正念諦觀知坐是心及返照是心知有無中邊內外者心也此心虗而知寂而照圓明了了不墮斷常靈覺昭昭揀非虗妄今見學家力坐不悟者病由依計情附偏邪迷背正因枉隨止作不悟之失其在斯焉若也斂澄一念密契無生智鑑廓然心華頓發無邊計執直下消磨積劫不明一時豁現如忘忽記如病頓瘳內生歡喜心自知當作佛即知自心外無別佛然後順悟增修因修而證證悟之源是三無別名為一解一行三昧亦云無功用道便能轉物不離根塵信手拈來互分主伴乾坤眼淨今古更陳覿體神機自然符契所以維摩詰曰不起寂滅定而現諸威儀是為宴坐也然當知水澄月現鏡淨光全學道之人坐禪為要苟不爾者修途輪轉汩沒四生酸鼻痛心難以自默聊書大槩助發真源果不廢修即同參契冶父川禪師參玄歌一尺水一丈波妙高峰頂笑呵呵七步周行渾屬我不妨間唱太平歌靈利漢不消多法門廣大遍周沙若能當處分明了只在如今一剎那莫求真休覓假真假中間都放下晃晃威光爍太虗不知誰是知音者讚不欣徒説謗三際無心俱掃蕩正體堂堂一物無是佛是魔俱一棒小根聞説暗攢眉繩上生蛇又更疑撥轉面前關棙子只許當人獨自知阿呵呵大圓覺流出菩提遍寥廓鬼面神頭幾百般無瑕鏡裏皆消却君不見覿面相逢機掣電直饒天眼不能觀點著不來真死漢勸君參參徹靈明自己禪善財不用南方去黑白分明在目前勸君信信心戰退魔軍陳此是華嚴最上乘森羅萬象皆相應勸君修六門通達任優遊寒山拾得才相見指點豐干哂未休火風催四山逼那時要見君端的有箇真空解脫門千眼大悲何處覓有時放有時收唯有知音暗點頭杏華村裏如相見跳出溈山水牯牛有時喜有時嗔無位真人迸面門殷勤為説西來意暮樓鍾鼓月黃昏有時唱有時歌顛言倒語不奈何聲聲盡出娘生口不屬宮商一任他有時默有時笑懵懂鐵鎚無孔竅輕輕觸著便無明只這無明元是道有時行有時坐露影藏身成兩箇不獨張三會打油細觀李四能推磨無縫塔見無因巍巍本自隱深雲國師樣子應難造不覺鋒稜露一層無底鉢手中擎百千沙界裏頭盛大庾嶺頭提不起都緣著力太多生沒底船不曾漏千重雪浪皆能透只憑一箇把稍人誰管狂風連地吼無鑐鎖孰安排鎖斷重關絶往來巨靈擡手空勞力唯有無心便得開無毫拂是何物擊碎狐疑山鬼屈一喝唯言三日聾誰憐大辨翻成訥無孔笛最難吹角徵宮商和不齊有時品起無生曲截斷行雲不敢飛無根樹直侵雲枝條密蓋乾坤劫火洞然燒不得利刀斬處亦無痕無面目擔板漢玩水遊山無侶伴迦葉門前倒剎竿文殊劒上全身現日面佛乾屎橛八兩半斤誰辨別七斤衫子恰相當鎮州休更稱蘿蔔野鴨飛鸞對舞三箇孩兒抱華鼓趙老曾看半藏經靈雲一見桃華悟真實語報君知不用思量不用疑春來決定千華秀冬盡長天片雪飛頭頭漏世真消息那箇休心辨端的眼橫鼻直一般般不離當處休尋覓古佛言祖師説千聖路頭同一舌他日人天匝地來那時方表而今決開善密庵謙禪師答陳知丞書某啓欣審官舍多暇焚香靜默坐進此道何樂如之參禪如應舉應舉之志在乎登第若不登第而欲功名富貴光華一世者不可得也參禪之志在乎悟道若不悟道而欲福德智慧超越三界者不可得也竊嘗思悟道之為易登第之為難何故學術在我與奪在彼以我之所見合彼之所見不亦難乎是以登第之難也參究在我證入在我以我之無見合彼之無見不亦易乎是以悟道之為易也然參禪者衆悟道者寡何也有我故也有我則不能證入亦易中之難也讀書者衆及第者亦衆何也見合故也見合則推而應選是難中之易也故見合為易無我為難無我為易無無為難無無為易亦無無無為難亦無無無為易亦無無無亦無為難亦無無無亦無為易和座子撞翻為難故龐居士云煉盡三山鐵鎔銷五嶽銅豈欺人哉因筆及此庶火爐邊團圝頭説無生話時聊發一笑劒門分禪庵主雜句諸人放下坐禪山僧一向妄想喫盡甘草黃連幾度春生夏長汝等諸人知不知知與不知坐禪妄想復是誰遊魚吞餌去何時水面歸我貴師兄悟本心不貴師兄機辨深鳳凰不棲荊棘林貓兒爭解捕麒麟驪珠撲碎亘天明殺活咸歸劒下親問言有理不能伸到此須當是箇人侍郎楊無為居士了了堂記了了堂瑘瑘詮公之所建也有二野叟登堂而議其名一叟曰了心則能了法了己則能了人己未了則人與己迷心未了則法從心惑了了之義得非是歟一叟曰不然吾聞萬法本空一心非有心既非有不待了而已圓法既本空不待了而常寂了有所了困于方隅了無所了始謂之達了了之旨其在是矣二叟疑而質于無為子無為子不答俄而歌曰山堂曉兮白雲飛山堂暮兮白雲歸青松老兮明月溪了不了兮誰與知二叟矍然相顧而去詮公乃記之于石治平二年三月十有九日也太史黃公山谷道人跨牛庵銘維水牯牛頭角堂堂以作意力遍行道場舉頭看月終不觀指浮鼻渡河蹴踏源底三界為田衆生為稻由我深耕世無寸草我跨此牛無繩與鞭要下即下馬後驢前翠巖真禪師語録序石霜山中有三角虎孤遊獨坐萬木生風至於千里無人草深一丈有一人撩其頭而得道是為黃龍慧南有一人履其尾而得道是為翠巖可真南之子孫江西湖南若揭日月而真得子晚所乳之子是為溈山道人慕哲林棲谷隱堅密深靜霜露果熟諸聖推出枯木朽株雲行雨施然後翠巖之道光明蓋翠巖之入石霜適遭一吼凡聖情盡參承咨決徹佛徹祖行住坐臥亘古亘今如行川之水無不盈之科似走盤之珠無可留之影十聖三賢當路亦須草偃風行四方八面俱來無不投戈散地金章玉句具在可知然明月夜光多逢桉劒陽春白雪難為賞音維黃龍罷參之客必遣之曰百鍊精金直須入翠巖爐韛今坐鎮諸方龍吟虎嘯者無不稱翠巖室中之句以接大根器凡夫而叢林號為真點胸者蓋同門數老雖目視耽耽文彩炳煥似從慈明法窟中來實不解石霜上樹之機耳各夢同床不妨殊調冷灰𪹼豆聊為解嘲云丞相張無盡居士金剛經三十二分説非法無以談空非會無以説法萬法森然曰因一心應感曰由故首之以法會因由分從空起慧請答雙彰故受之以善現起請分宗絶正邪乘無大小隨三根而化度簡異説而獨尊故受之以大乘正宗分得宗而行不住於相故受之以妙行無住分行行皆如謂之實見故受之以如理實見分見而信之善根深固故受之以正信希有分無得之得是名真得無説之説是名真説故受之以無得無説分無得無説怖於沈空一切諸佛皆從此出故受之以依法出生分果雖有四相本無二故受之以一相無相分清淨心生是名淨土莊嚴諸相即非莊嚴故受之以莊嚴淨土分有為之福限量有窮無為之福殊勝無比故受之以無為福勝分是經所在天龍敬事故受之以尊重正教分至道無名假之方便以是名字行者受持故受之以如法受持分聞經解義深悟實相故受之以離相寂滅分受持讀誦自利利他功德無邊不可稱量故受之以持經功德分恆沙罪業一念消除果報不虗豈經多劫故受之以能淨業障分本來無我安得有人為度彼人故權立我故受之以究竟無我分一眼攝五眼一沙攝恆河沙一世界攝多世界一心攝若干心故受之以一體同觀分遍周法界一化普通七寶福田寧如四句故受之以法界通化分三身具足諸相圓成人法俱忘即非具足故受之以離色離相分終日談空不談一字若云有説即謗如來故受之以非説所説分無上正知實無少法法無所得正遍歷然故受之以無法可得分一法存心情生高下淨心修善法法何窮故受之以淨心行善分施寶如山山非無盡大身妙智斯即寶山故受之以福智無比分化門建立未脫筌蹄以要言之實無所化故受之以化無所化分色見聲求是行邪道於茲妙契獨露真常故受之以法身非相分相而無相空且不空亘古亘今孰云斷滅故受之以無斷無滅分大心成忍本自無貪世福甚多云何有受故受之以不受不貪分去來坐臥無不如如故受之以威儀寂靜分信心不斷斯即微塵信寶遍充是名世界界塵一合法爾如然故受之以一合離相分四見俱非是名四見故受之以知見不生分一念發心獲福亦爾應身化物豈得已哉真佛流通能事畢矣故受之以應化非真分終焉此經第十分應無所住而生其心大帝本云應生無所住心三十二分無法可得平等王本云衆生深信分語雖小異意亦大同不必易也東林善法堂記元祐二年七月八日廬山東林禪寺善法堂成其為間七其高為丈者五深而為尺者九十其廣十有一丈六年三月無盡居士自河北來東林徒衆七百人以弼恩度而為上首皆於現在老人照覺禪師親近供養深得法要決擇邪正消隕知解一心精進扶竪宗教於是以弼等和南稽首白居士言我此善法堂蓋嘗走四方求士大夫紀録營建昭示來世終無一人能承當者何以故此堂雄麗難形摹故我師説法難湊泊故今居士適至是我山中天龍藥叉人非人等三歲守護以待居士也居士其舍諸居士曰汝等説法與過去諸佛異非我名言意識之所測度吾無得而記焉何以故毗盧遮那佛説十住品於須彌頂上帝釋於其殿內安置普光明藏師子之座説十行品於夜摩天宮時分天王於其殿上化作寶蓮華師子之座説十回向品於兜率陀天知足天王於其殿上敷摩尼藏師子之座天住於佛住而未離乎住故説法乎地中之天而忉利是矣其座則安置之而未至於化者也行行皆真而超然絶俗故説法乎空中之天而夜摩是矣其座則化之而未至於敷者也化則依空矣而非所以入有也真則自利矣而非所以利他也心也回真而入俗運智而行悲使上而超之可以出乎欲頂下而即之可以同乎萬物故説法乎天中之天而兜率是矣其座敷而布之則安置能化蓋有不足言者矣古佛之説法也觀根之時依土立義可以科可以釋今子之師建潭潭之堂巍巍之座法鼓在左杖拂在右以忉利言之乎則無住為住以夜摩言之乎則無行為行以兜率言之乎則本自無向今亦無回雖然嘗試為汝議乎其涯彼妙湛靈明曠虗粹精莫之與將莫之與迎未始有夢而未始有覺也未始有淳而未始有漓也未始有壞而未始有成也未始有污而未始有淨也膠膠以生林林以形生死苦樂之變循環乎去來諸佛為之種種譬喻方便為之説三乘為之説五教河沙句偈不足以勝其情而奪其識其究竟也以清淨法眼涅槃妙心無相實相正法眼藏撥去文字教外別傳囑付飲光宛轉傳授以至今日當法堂未建法座未登掣電呈機猶成第二學人上來頗復何用然則建斯堂也登斯座也法竟可説乎法竟不可説乎且夫居其堂正則知其位正知其位正則知其眼正知其眼正則知其根正知其根正則知其識正知其識正則知其塵正知其塵正則知其耳正知其耳正則知其鼻正知其鼻正則知其舌正知其舌正則知其身正知其身正則知其意正如是乃至十方虗空八萬四千陀羅尼門莫不皆正古之所謂此處最吉祥者其意在此其亦是乎而自少室之後曹溪以來散之四方分為五派師異訓人殊習祖師之道微矣請略言之月裏麒麟溪邊石笋寒松庭柏日裏看山雨聲鳩聲迷逢達磨撥塵見佛漁父棲巢吐舌退身擡眸一瞬舉拳竪指擊拂敲床叉手當𮌎展開雙掌或謂之曰道眼或謂之曰根塵或謂之曰向上或謂之曰末後斯皆順風揚灰於馳突之場浚渠流惡於眢廢之井禪師於是也大奮迅定駕無礙慧主賓問答縱奪取與庶幾乎惑者有解而執者有破垢者有滌而病者有瘳然則有其事者則必有其理有其實者則必有其名莊嚴妙善而不可不建者堂也方便誘誨而不可不説者法也垂信示後而不可不為者記也東林衆以記纍吾亦不善乎東林律寺改為十方其本末具於余語録序茲得以略云時歲四月二十四日記音釋濬音峻於戲與嗚呼同跂音仚還音旋飂音留崷自秋切崒才律切颸楚飢切音題鵮竹咸切適音的魄音託尳音鶻絭音勸鞏音拱耔音茲徵竹里切廖音抽蹴七宿切舍與捨同眢音剜枘而鋭切釋柄也人未有不以文字語言相授者今七佛偈是其一也乃若中夏則三十萬年之前包犧氏作已畫八卦造書契為文字權輿至釋迦之興固亦無異今一大藏教可謂富矣乃獨於最後舉華示其上足弟子迦葉迦葉欣然微笑不立文字不形語言謂之正法眼藏然師舉華而傳弟子一笑而受既書之木葉旁行之間矣亦未見其與古聖異也豈謂之文而非文謂之言而非言耶昔有景德傳燈三十卷者蓋非文之文非言之言也燈既傳矣自一而千萬烏有窮盡故廣之於天聖續之於靖國然二家所著皆草創趣成凡例不立詳簡失中雖聖若賢臣之事有不具者獨旁見間出於諸祖章中識者以為恨吳僧正受始著普燈凡十有七年成三十卷前日之恨毫髮無遺矣尤為光明崇顯者我祖宗之明詔睿藻一語半偈裒集登載皆有據依足以傳示萬世寶為大訓其有功於釋門最大方上之御府副在名山又以其別本示遊俾得紀述梗槩于後遊自隆興距嘉泰五備史官今雖告老待盡山澤猶於祖宗遺事思以塵露之微求足山海不自知其力之不逮也嘉泰四十三月乙酉太中大夫充寶謨閣待制致仕山陰縣開國子食邑五百戶賜紫金魚袋陸遊謹書嘉泰普燈録跋傳云廣云續云燈固燈也其如光燭有偏何耿耿餘輝殘𦦨並收無遺者虗中燈而普然二楞板于茲既淹矣此録尚無國本頃歲適出劂氏手余意廓如就觀國字舊點有艷曲未盡有旁訓絶無措大不合正焉補焉狐之媚必呂猿之蟲必啼醜拙不別此世惑者守株緣木以覓兔魚不惟風之始也而已寶林梅峯信敬跋
