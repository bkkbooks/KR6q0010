body:
  text: 平江府報恩光孝禪寺臣僧正受編諸方廣語西蜀仁王欽禪師示衆曰若據德山嚴令豈容一箇上來暫依百丈規繩且許諸人立地山僧恁麼開口已是不善隄防忽若衆中有箇解倒行此令底衲僧出來喝散大衆掀倒禪床搊下階來豈不遭他毒手而今既無恁麼底漢教山僧坐地對了諸人說箇甚麼即得若是叢林法則禪苑清規自是諸人知有底事何用山僧苦口相勸自餘無非發明自己決擇死生在衣線下斯為急要雖然這一段事莫非當人自知皮下有血向己躬下猛省得來瞥地有箇悟入處始知不自外來不從人得若未得箇端的悟入處只是向人口角頭尋言逐句刺頭入經裏論求玄覓妙猶如入海算沙捫空追響只益疲勞終無了日殊不知大覺老人為見衆生根器不等出來立箇權實法門隨機設教應疾施方盡是譬喻表顯之談要諸智者以譬喻得解故有大乘小乘半字滿字由漸入頓從始暨終說染說淨揀凡揀聖莫非發明這一段事所以道三世諸佛之所證蓋證此也如來為一大事出現蓋為此也三藏十二部一切修多羅蓋詮此也所謂一切衆生妙圓覺心本無生滅圓同大虗如淨琉璃內含寶月如大明鏡照了萬殊光體無二如大摩尼寶珠映於五色隨方各現如百千燈光照一室其光圓滿無壞無雜然後便依這裏立箇體用則有三種土三種身於淨妙國土中則有報身佛解脫國土中則有化身佛所謂身依義立土據體論法性身法性土究竟得來猶是教家極則未離光影邊事到這裏直得言思路絶無可指陳乃云始從光耀土終至跋提河如是二十間未嘗談一字於是回紫金山攬七寶几瞬青蓮目顧視迦葉迦葉微笑乃普告大衆云吾有正法眼藏涅槃妙心付與摩訶大迦葉為第一祖教外別傳於五百歲後與大地衆生直證妙心由是佛佛授手祖祖相承達磨爰來此方神光由茲得髓自是曹溪已後列派分宗無非宏法為人延佛慧命其間忽若遇箇上上根輩一聞千悟直下無疑如芥投針絲毫不錯或向一棒一喝下明或於一機一境上會自然脫略窠臼不滯見聞似這般漢聞甚深法如清風屆耳瞥然而過聞百千諸佛出世如不聞相似豈況教伊向經論裏推尋於人口角頭取辨出來眼卓朔地似箇識蹤獵犬喚一聲便知落處選甚挂角𦏪羊賣蹤狡兔聞聲見影去便拏來只是千人萬人中不得一箇半箇所以後代祖師又不免別通線路曲為中下之機於第二義門東引西樓看他還會也無有時就他六根門頭指箇常光獨露底向伊道靈光洞照逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛且要他從這裏趣入便有沒意智漢才聞恁麼說話便向自己色身內髑髏前認箇昭昭靈靈底隱隱地似一面古鏡如一顆明珠亘古亘今照天照地殊不知這箇你若識不破正是無始劫來出驢胎入馬腹底是名無始劫來生死本癡人喚作本來人雖然如是也怪他不得何故且如靈山會上百萬之衆其間智如鶖子辨若滿慈尚乃茫然不知落處豈況乾慧禪客無聞比丘教理未嘗措懷玄道無由契悟是以近代參學人才入門來便呈箇自己見解云不離當處常湛然覓則知君不可見又云六般神用空不空一顆圓光色非色有底但叉手當胸張目直視云在這裏各把箇死蛇頭有甚麼提掇處或但於一切法空處會將去謂一切諸法本來空寂故云無明實性即佛性幻化空身即法身幻身終歸敗壞法身本體恆然但於理性明將來聲色裏透出去直得綿綿密密不漏絲毫純是真空更無別法又有一般擔板禪和不明回互之機只認箇平實語句但見山是山水是水僧是僧俗是俗板頭只是板頭拄杖只是拄杖移易他絲毫地位不得皆是自不具眼未遇作家於法於人不能甄別由是發明不徹悟入乖差次第相承過非一二師眼不正弟子見邪承授麁浮致斯得失良由不辨佛祖正脉各逐己見開張令後學未識旨歸但望風而言參請更有十年二十年向江湖上走自號飽參遍歷諸家門戶謂祖師言句自有來由從上機緣各有淺深把諸家相似語比類排布録作大𠕋小冊藏衣單下不令人見到處把作宗門玄旨或則先明道眼因緣次過擇法眼話然後透聲透色拂跡忘情或有見來參者便舉箇修山主頌與他理論要見一切諸法不離本心大地虗空非心外法所以撲落非他物縱橫不是塵山河及大地全露法王身方明盡大地是箇真實人體盡大地是箇解脫門盡大地是毗盧一隻眼盡大地是自己法身恁麼見得心外無法法實自心一切處總恁麼也或說空劫已前自己日用自己不行鳥道直透龍門言尊貴邊事則忌觸諱當頭於異類中行要須披毛戴角或明一色轉位回機及去及盡然後於枯木上更糝些子華始得或示學者但𦘕作圓相或全明全暗或半暗半明或偏或正或點或破百數十箇度樣子一一須辨得下始得或但一切法本無自性亦無自己所以祖師云本來無一物何處有塵埃但恁麼會得徹去不為一切諸法所礙其餘更有甚麼事如上許多見解皆是情存滲漏各護師承殊不知宗師家出一言半句乃是方便門中垂手為人初非自立門風為一宗說話後代兒孫忘了祖翁各認箇爺互立宗旨便將他古人一問一答盡作自受用三昧要得如擊石火閃電光但莫入陰界擬議一向高禪將去或棒喝扶持好晴好雨好燈籠好露柱拂袖便行禮拜出去則無不甚深無不解脫此蓋言其大略爾若論三玄三要四種料揀五位君臣三種滲漏內紹外紹王種臣種同詮性海轉側流注法身有二種病三種光如斯之類不可備舉有底才聞說著總一味作建立會却便道諸佛未出世祖師未西來時還有恁麼說話也無便舉僧問趙州如何是玄中玄州云闍梨玄來多少時僧云玄來久矣州云儞若不得老僧幾乎玄殺便將這箇話印定了也有云古人玄妙之設豈徒然哉若恁麼會則三玄五位皆為施設要須就裏一一明辨出來方見臨濟洞山用處有舉僧問雪峰臨濟四喝意旨如何峰云他家宗旨我所未知汝尋臨濟下兒孫問之僧後問南院仍舉雪峰所遣之意南院大展坐具望南方禮拜云雪峰古佛又以此語印定了也又安可以古人一期救弊之語為定論哉不見道恁麼也不得不恁麼也不得恁麼不恁麼總不得若是頂門具眼底自解出脫設若把一大藏教都作建立會却也怪他不得祖師機緣一一就裏明辨出來亦總由他你有甚麼擬議處豈可互立知解各認門風便道諸家宗旨各有長處亦不必議他底如兩異姓人隔壁住彼此各不相知閨閣裏事一般是甚麼說話不見臨濟大師道一切處無非是道流歸舍處恁麼見得便能於一剎那間入染入淨入凡入聖入彌勒樓閣入毗盧法界處處游履國土須知是箇無依道人乘境出來且不是有莫作有見不是無莫作無見不是佛莫作佛見不是法莫作法見且不是你無始時來生死報本又不是你髑髏前昭昭靈靈底又不是你六根門頭攀緣遍計底直須見得透頂徹底和會得來總是一家裏事更無如許殽訛等見解方能為一切人去黏解縛出釘楔若具恁麼手段只將平生參得多知多解築向肚皮袋裏飽齁齁地向人家叢林板頭喫了飯坐禪觀行舌持上齶把捉念漏不令放起是外道法祖師云你若住心看靜舉心外照攝心內澄凝心入定如是之流皆是造作忽若一且被些福緣推出來便即點胸自負爭人爭我爭勝爭負恣意亂統貶剝諸方這家說平實那家只掠虗有宗一向滯著語言有宗坐在無事閣裏一向開大口道天下無人及乎被明眼人靠著見得他自無眼目不識好惡有時是處又即拋却不是處強作主宰如說藥人真藥現前自不能辨只是學得虗頭到處開眼鼓弄聾俗誑呼無知便有瞎禿子白衣輩十箇五箇蔟著他如蒼蠅聞臭肉相似便聚頭鬪唼將去才經久久臭氣過了見無可噆依前散去到這裏也須回頭識羞始得這箇事且不是你說得底道理直饒你說得天華亂墜頑石點頭也是口頭辨更須就你覓箇履踐處且不是持戒忍辱方便行檀入定修禪強勞精進又不是隨緣消舊業更莫造新殃便當得去須知親近般若有四種藏鋒之用親近以自治藏鋒之用以治物古來住山老衲蛇虎就手而食歸宗禪師見蛇即芟為兩段取性和尚凡見蟲蛇盡皆打殺拋却云取性取性玄沙見虎僧云和尚沙云是你靈潤法師山行野燒迅飛而來衆皆避之法師安步徐行曰心外無火火實自心為火可逃無由免火火至自滅到這箇田地且不是修證得底道理也不是煉得身心如枯木石頭寒灰死火無些子氣焰逼著他便得恁麼地且莫錯你若要得於一切處自由自在直須具大無畏如師子游行不求伴侶方得名為大自在故教中云譬如人畏時非人得其便如是弟子畏生死故色聲香味觸法得其便也已離畏者一切五欲不能為也然雖恁麼忽若有箇飢來喫飯困即打眠底聞恁麼說話也不用起來與你辨論只是喉嚨裏作箇吽吽聲也須更疑著他在珍重泐潭真淨文禪師示衆喝一喝舉拂子曰㖿㖿盡十方世界若凡若聖若僧若俗草草若木盡向拂子下成佛作祖無前無後一時解脫還有不解脫者麼設有命若懸絲遂拊掌曰知音者少所以此箇事論實不論虗參須實參悟須實悟若纖毫不盡總落魔界豈不見古人道平地上死人無數過得荊棘林是好子如今人多是得箇身心寂滅前後際斷一念萬年去休去歇去古廟裏香爐去冷湫湫地去便為究竟殊不知却被此勝妙境界障蔽自己正知見不能現前神通光明不能發露或又報箇平常心是道以為極則天是天地是地山是山水是水僧是僧俗是俗大盡三十日小盡二十九依草附木不覺不知一向迷將去忽問他我手何似佛手便道是和尚手我腳何似驢腳便道是和尚腳人人盡有生緣處那箇是上座生緣處便道某是某州人是何言歟且莫錯會好凡百施為須要平常一路子以為穩當定將去合將去更不敢別移一步怕墮坑落塹長時一似雙盲底人行路一條拄杖子寸步拋不得緊把著憑將去步步依倚一日若道眼豁開頓覺前非拋却杖子撤開兩手十方蕩蕩七縱八橫東西南北無可不可豈可一向倚他門戶傍他行腳有甚快活自己畢竟如何不見雲門大師道而今天下老和尚多是師承學解路布葛藤印板上打來模子裏脫出當人若是明去何不一切臨時又不見臨濟大師云我這裏是活祖師西來意把來便用立處皆真他不說古又如何今又如何這語得那語不得那裏是虗這裏是實你與我拈出絲毫許實底道理來看此蓋當人眼不開自無見處一向承虗接響百般忌諱自纏自縛直饒聞恁說當下忽然見得倜儻分明去也是棺木裏瞪眼如今還有無師智自然智不與萬法為侶者炟赫底丈夫漢䶥齖齖千變萬化見我恁麼胡言漢語便好近前驀口摑拽下倚子擲向三門外喝散大衆豈不快哉還有麼良久曰若無且看老僧騎案山跳入你諸人眼睛裏七顛八倒呵佛罵祖去也復喝一喝下座天寧芙蓉楷禪師示衆曰夫出家者為厭塵勞求脫生死休心息念斷絶攀緣故名出家豈可以等間利養埋沒平生直須兩頭撒開中間放下遇聲遇色如石上栽華見利見名似眼中著屑況從無始以來不是不曾經歷又不是不知次第不過翻頭作尾止於如此何須苦苦貪戀如今不歇更待何時所以先聖教人只要盡却今時能盡今時更有何事若得心中無事佛祖猶是冤家一切世事自然冷淡方始那邊相應你不見隱山至死不肯見人趙州至死不肯告人匾擔拾橡栗為食大梅以荷葉為衣紙衣道者只披紙玄太上座只著布石霜置枯木堂與人坐臥只要死了你心投子使人辦米同煮共餐要得省取你事且從上諸聖有如此榜樣若無長處如何甘得諸仁者若也於斯體究的不虧人若也不肯承當向後深恐費力山僧行業無取忝主山門豈可坐費常住頓忘先聖付囑今者輒欲略斆古人為住持體例與諸人議定更不下山不赴齊不發化主唯將本院莊課一歲所得均作三百六十分日取一分用之更不隨人添減可以備飯則作飯作飯不足則作粥作粥不足則作米湯新到相見茶湯而已更不煎點唯置一茶堂自去取用務要省緣專一辦道又況活計具足風景不疏華解笑烏解啼木馬長鳴石牛善走天外之青山寡色耳畔之鳴泉無聲嶺上猿啼露濕中宵之月林間鶴唳風回清曉之松春風起時枯木龍吟秋葉凋而寒林華散玉階鋪苔蘚之紋人面帶煙霞之色音塵寂爾消息宛然一味蕭條無可趣向山僧今日向諸人面前說家門已是不著便豈可更去升堂入室拈槌竪拂東喝西棒張眉努目如癎病發相似不唯屈沈上座況亦辜負先聖你不見達磨西來到少室山下面壁九年二祖至於立雪斷臂可謂受盡艱辛然而達磨不曾措了一詞二祖不曾問著一句還喚達磨作不為人得麼喚二祖做不求師得麼山僧每至說著古聖做處便覺無地容身慚愧後人軟弱又況百味珍羞遞相供養道我四事具足方可發心只恐做手腳不迭便是隔生隔世去也時光似箭深為可惜雖然如是更在他人從長相度山僧也強教你不得諸仁者還見古人偈麼山田脫粟飯野菜淡黃齏喫則從君喫不喫任東西伏惟同道各自努力珍重黃龍死心新禪師示衆僧問大參小參為甚麼人曰只為愚人云忽遇智人又作麼生曰愚人云智與愚是一是二曰無人知此意令我憶南泉又僧問如何是奪人不奪境曰死中有活云如何是奪境不奪人曰活中有死云如何是人境兩俱奪曰死中恆死云如何是人境俱不奪曰活中恆活乃曰夫小參者謂之家教何謂家教譬如人家有三箇五箇兒子大底今日幹甚事小底今日幹甚事是與不是晚間歸來父母一一處斷叢林中亦復如是院門今日幹甚事是與不是住持人當一一處斷觀今之時節叢林淡薄人根狹劣不可說也有一般破落戶長老馳書遠信這邊討院住那邊討院住才討得院子便揀箇好日入院又道我是長老方丈裏自在受快活這般底喚作地獄滓如今叢林中若論參禪固是難得其人我看見你這一隊漢在這裏心憤憤口悱悱道我會禪會道入方丈裏趂口快撐兩轉語便行不是這般道理又有一般漢影影響響認得箇頑空便道只是這箇事又有一般道見虗空裏光影又有一般道無有不是者錯了也救不得了也這般底只宜色身安樂莫教一頓病打在延壽堂內如落湯螃蟹手忙腳亂見神見鬼這邊討巫師那邊討醫博卜凶卜吉問好問惡你不見我佛如來為三界醫王四生慈父醫一切衆生心病只為你不信自心向外馳求被邪魔魍魍入你心中做得許多見解要識你自心麼如太陰當晝天下皆明那裏更有暗處若到這箇田地亦無吉凶爻象亦無是非好惡便能向是非頭上坐是非頭上臥乃至淫坊酒肆虎穴魔宮盡是當人安身立命之處只為你無量劫來業識濃厚心中蹺蹺踦踦繘繘繂繂信之不及便被世間愛情纏縛得來七顛八到江南人護江南人廣南人護廣南人淮南人護淮南人向北人護向北人湖南人護湖南人福建人護福建人川僧護川僧浙僧護浙僧道我鄉人住院我去贊佐他一朝有箇不周旋翻作是非到處說苦哉苦哉恁麼行腳掩彩殺人鈍置殺人苦是箇漢一劃劃斷多少自由自在若也劃不斷處處被愛之所縛愛色被色縛愛院被院縛愛名被名縛愛利被利縛愛身被身縛你何不退步思量你這臭皮袋子有甚麼好處當時只為你有一念愛心便入母胎中愛父精母血交搆成一塊膿團母喫熱時便愛鑊湯地獄母喫冷時便受寒冰地獄及至撞從母胎裏出來受寒受熱受飢受飽受病受苦煎煎迫迫直至今日只為你不能返觀便有許多是非生滅我生你死你死我生生生死死死死生生隨業受報無有休時近來又有一般奴狗受雇得錢買度牒剃下狗頭披佛袈裟奴郎不辨菽麥不分入吾法中破壞吾法一向裝裹箇渾身捼腰捺胯胡揮亂要做大漢大漢不恁麼做要做大漢麼須是退步莫面前背後奴脣婢舌嫌好道惡說這裏飲食豐厚那裏寮舍穩便不消得如此諸上座人身難得佛法難聞此身不向今生度更向何生度此身你諸人要參禪麼須是放下著放下箇甚麼放下箇四大五蘊放下無量劫來許多業識向自己腳根下推窮看是甚麼道理推來推去忽然心華發明照十方剎可謂得之於心應之於手便能變大地作黃金攪長河為酥酪豈不暢快平生莫只管𠕋子上念言念語討禪討道禪道不在𠕋子上縱然念得一大藏教諸子百家也只是間言語臨死之時總用不著古人悟了方求明師決擇去其砂石純一真實稱斤定兩恰如人開雜貨鋪相似無種不有來買甘草便將甘草與他來買黃連便將黃連與他不可買黃連將甘草與他又似你有一塊金將入紅爐裡鍛鍊鍊來鍊去鍊得熟也方上鉗鎚打作瓶盤叉釧瓶重幾兩盤重幾兩一一分明然後却將此瓶盤叉釧鎔成一金喚作一味平等法門若不如此盡是儱侗真如顢頇佛性你還會麼你還信麼山僧適來答這僧四轉語死中有活活中有死死中恆死活中恆活將此四轉語驗天下衲僧且道天下衲僧將甚麼驗黃龍良久云大體還他肌骨好不塗紅粉也風流本覺法真一禪師示衆云宗師為人只與汝拈破情解令汝自悟譬如金在礦中治者只是與汝烹鍊除其礦穢而已若是金體則是本有非人造作得來又如磨瑩寶珠只是去其塵垢而已若光彩是珠體上本來自有亦非人能與之學者自不向前體究只管望人說破將謂是教得說得驢年得會麼又曰學道猶如鑽火一鑽須緊如一鑽若得熱相現前切要加功不可停息若停息則廢却前功無由得火龍牙和尚頌云學道如鑽火逢煙且莫休參學之士到情識伎倆盡處百不會如平地上有氣死人相似如熱相現前却須向前體究忽然有箇省處此即真實也若一念退即要悟無因矣又曰學道之人多是不解用心一向背馳不能返照如人觀射不應觀垛須看箭發處始得今時人被語脉裏轉却良為此也又曰禪家語言不尚浮華唯要朴實直須似三家村裏納稅漢及嬰兒相似始得相應他又豈有許多般來此道正要還淳返朴不用聰明不拘文字今時人往往嗤笑禪家語言鄙野所謂不笑不足以為道又云古者道自己眼若不開鑽人釋迦老子肚裏去屙下來只是箇解行底屎橛有般漢雖在宗師會下全不肯做工夫久後到別處便云我從某人法席下來及乎問著黑漫漫地更有般底見他從尊宿處參學底人到別處納敗闕便并其師輕薄云不會為人彼師佛法元來只如此不道當人自打不徹昔日洛浦久為臨濟侍者一日辭去游方濟云我有一頭赤梢鯉魚搖頭擺腦直往南方去也及到夾山拜起正身而立山曰雞棲鳳巢非其同類出去云自遠趨風乞師一接曰目前無闍梨此間無老僧浦便喝山曰住住闍梨不得草草匆匆雲月是同溪山各異截斷天下人舌頭則不無爭教無舌人解語浦茫然山便打遂留夾山臨濟聞云可惜一頭赤梢鯉魚向韲甕裏浸殺臨濟可是不解為人彼師佛法只如此也不見道一兩所滋根苗有異切不可容易望風擬議他尊宿大有因果在又曰古人雖則遍參知識承嗣燒香只為最初發明之師非是別底不如此人揀人承嗣蓋不忘本也今時見人曾參某人却不承嗣却承嗣某人便謂前人不如彼人生輕重心又有般底或受他摩捋或希他勢望便忘本逐勢既負慚怍欲釋人非返生毀謗如斯之輩閻羅王未放你在古人接得弟子却指令承嗣他人則睦州與雲門大愚與臨濟是也不似今時勾𭺗人家男女硬斷送與三間屋子令承嗣他若總如此佛法豈得殊勝敗壞宗門有現世報者自不省耳云云泐潭湛堂準禪師示衆僧問金剛經中道一切賢聖皆以無為法而有差別未審如何是無為法曰水底泥牛吼火中木馬嘶云為甚麼却有差別曰春力無高下華枝自短長云這箇是教意如何是祖師西來意曰煙村三月裏別是一家春云恁麼則祖意教意了不相干曰有不是無云若然者施主霑恩去也曰但知隨例餐䭔子僧禮拜師乃曰井底烏龜頭帶雪七六五四三二一神通隱顯百千門一一皆從此經出遂以拂子擊禪床一下曰豈不是從此經出又喝一喝曰豈不是從此經出是以過現未來一切諸佛三千二大人相八十種隨形好十力四無所畏十八不共法若不從此經出即不能成就地前地後一切菩薩歷三祇涉五位斷二障明一心自利利他修行進趣若不依此經即不能成就一切緣覺一切聲聞觀十二緣空悟四諦真理得八解脫證六神通若不依此經即不能成就乃至西天此土諸代祖師古往今來一切知識種種建立種種施為至如禾山打鼓雪峰輥毬臨濟三玄洞山五位巴陵銀碗裏盛雪雲門北斗裏藏身隱顯縱橫千差萬別若不依此經即不能成就是故金剛經中說一切諸佛阿耨菩提之法皆從此經出但是世出世間一切諸法未有不從此經出者佛之與法且拈放一邊且那箇是此經莫是以兩手舒空作展經勢麼莫是叉手當胸進身三步麼又莫道最初是如是我聞末後是信受奉行麼又莫是但莫著他文字語言麼又莫是但向料掉沒交涉處道一句便得麼若作如是見解大似隔靴𭺗癢若不作如是見解畢竟作麼生遂以拂子擊禪床一下云須是恁麼明得苟能如是明得於曉夕日用之間未有一處而不聞法是以金剛經中道在在處處即為有佛一切法皆是佛法恁麼見得一任三門頭舍掌佛殿裏燒香寮舍裏橫拈倒把左卷右舒擲去拋來朝讀暮誦這一卷經若是展去也竪窮三際橫變十方周沙界之羣生遍剎塵之品類包羅萬有統括二儀無一法而不明無一法而不顯可謂是法門重疊如雲起於長空行解分披似華鋪於錦上言言見諦情忘於二十七疑句句朝宗妙契於三十二分有而不有空而不空明法界則一體同觀說去來則威儀寂靜窮微盡妙豈不極於斯矣其卷去也更討甚麼一點墨經頭邊只有一箇以字不成八字不是不知是箇甚麼字設使須菩提解空第一到這裏也只得目瞪口呿憶得昔日有一僧問睦州云經頭以字不成八字不是未審是箇甚麼字睦州乃彈指一下云會麼僧云不會州云上來表讚無限聖因蝦䗫𨁝跳上梵天蚯蚓驀過東海大衆且道睦州當時為這僧說這箇字不說這箇字若道說因甚麼睦州却問這僧云會麼若也明得不唯使施主罪滅福生亦乃自家平生慶快其或未明三德六味施佛及僧復喝一喝曰珍重太平佛鑒勤禪師示衆衆集師曰還委悉麼若也委悉功不浪施如或未然彼此鈍置欲知此事覿面相呈未語已前早是蹉過如金翅鳥王入阿盧大海擊開雪浪直取龍吞眼睛定動之間早已喪身失命況乃低頭卜度識路追尋何啻白雲萬里靈鋒寶劒常露現前亦能殺人亦能活人沙門眼目函蓋世界把定乾坤永無絲毫許滲漏所以此事一塵才起大地全收在天地而不在天地所以為蓋為載其實未嘗蓋載在日月而不在日月所以能為照為照其實未嘗照臨在海嶽而不在海嶽所以能為高為深其實未嘗高深在陰陽而不在陰陽所以能生能殺其實未嘗生殺在雨露而不在雨露所以能為濕為潤其實未嘗濕潤在雷霆而不在雷霆所以能鼓動庶物其實未嘗鼓動在衲僧而不在衲僧且道能箇甚麼切忌道著室中兄弟纍纍求說久坐看話無所趣向欲得半月十日普請入室一次舉覺古今因緣提掇殽訛貴得有所滋益既然相諾豈謂起動在上尊宿兄弟曲賜見臨言詞鄙俚無可釆聽殊深愧悚然此間為入室兄弟說話言語似乎太殺近前幸望諸宿德亮察不以見疑即為幸甚每見學道兄弟有者不求省悟唯務言說要會他古人因緣豈非大錯他古人只是一期對病施方隨機發藥遂有如許多葛藤路門如標月指頭敲門瓦子意只是假扣開門因標見月儻得門開月現瓦子指頭何用之有所以諸佛出世隨宜說法廣設多門如握空拳以止悲啼之子學道兄弟若無省悟設使智如流水辨若懸河倒念得一大藏教於這事上轉沒交涉參須實參悟須實悟研窮教徹底去不是今日下得一轉語明日過得一則因緣古今因緣數若河沙有甚休歇畢竟不明心地如何了達生死只如達磨初來時未有許多因緣為甚有人悟道不可道他是聖人我是凡夫這箇事上不論凡聖優劣是以古今因緣大似世間地符關契相似山河大地廣闊無邊於中置得少許田園物産便以立箇關契分箇界分投官押印深藏篋笥以為己有忽若一朝踏著皆屬自己從前地符關契何用佛法大海廓周沙界不屬方隅參學之人見不透脫於情識上自分界分咬得一言半句以為奇特於宗師邊相求印證宗師家事不獲已以冬瓜印子印定自此一人傳一人以為究竟忽若一朝金剛眼開照破四天下說甚麼聲色道眼識情唯心說甚麼權實平常差別異智都盧是箇甚麼明眼漢沒窠臼突然地蕩蕩無依七縱八橫一切臨時把來便用我為法王於法自在誰肯倚他門戶傍他墻壁奉勸兄弟但明心地莫愁不會因緣古今因緣也不道一時不看但將一則去看得透千則萬則皆同若道會得這一則未會那一則決定未是試與你舉尋常大家知底因緣和會將來看是同是別只如釋迦世尊王宮降誕才出母胎叫一聲見人不會遂一手指天一手指地云天上天下唯我獨尊且道明箇甚麼邊事後於涅槃會上拈一枝華以青蓮目顧視迦葉迦葉微笑世尊遂云吾有正法眼藏涅槃妙心分付摩訶迦葉又是甚麼道理莫是與前來不同麼武帝問達磨如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識又是箇甚麼道理二祖禮拜依位而立磨云汝得吾髓喚作兩般得麼六祖一日云汝等諸人速理舟楫吾欲歸新州僧云和尚去了幾時回祖云葉落歸根來時無口不可也是別有道理麼只如馬大師一喝百丈三日耳聾還別著得箇道理得麼其他德山棒臨濟喝雪峰輥毬俱𦙆竪指道吾作舞祕魔擎叉丹霞燒木佛趙州勘婆子種種多端較量將來與釋迦老子一手指天一手指地如合符契毫髮無差有般底見人恁麼說話便道但明取道眼因緣其他微細儱侗會却便休殊不知自是你儱侗只箇道眼因緣名字千錯萬錯了也有底道若恁麼只如洞山五位君臣三種滲漏臨濟四料簡近代浮山九帶薦福兩種自己不可也只是一同古人因甚有許多類聚編排殊不知正是一同只為一同所以古人類聚編排若是開悟之士觀來毫髮無異情解之流萬別千差是以古人云鎔瓶盤叉釧為一金攪酥酪醍醐為一昧若是微底漢也不必如此瓶盤叉釧本是一金酥酪醍醐元是一味何須鎔攪又見一般兄弟認得箇昭昭靈靈動轉施為便道會了也到處要人印證揚眉眴目合掌擎拳一棒一喝皆是我心全體恁麼來開口便是且道還當也不當可謂百千大海棄之唯認一浮漚體目為全潮此事無限量不可思議之事豈可將有作思惟限量情識擬議測度得及豈不見教中道如取螢火燒須彌山縱經塵劫終不能著又道有作思惟從有心起皆是六塵妄想緣氣非實心體又道虗妄浮心多諸巧見不能成就圓覺方便正是此矣然則真妄同源妄因真立其奈少有窮徹根源多是緣枝逐葉返成弄影底漢果若窮徹法源動靜去來皆如來藏如或未然只是認賊為子其家財寶終不成就返被情塵業識蔽塞靈源妙智光明不能發露大用不得現前大丈夫自有彌天意氣匝地威風威音不遙彌勒不後忽若道眼頓開坐斷毗盧頂𩕳不見有祖佛出世天下老和尚瞻仰有分恁麼說話對諸作者面前大似炫耀見知塵瀆清聆然通心之士言外見意情妄之流未免輕笑記得天柱開山崇慧禪師云祖師西來似賣卜漢見你不會為你鑽破卦文吉凶才生在你分上一時自看時有僧問如何是賣卜底人曰出門便不中也若是山僧即不然祖意西來似鴉鳴相以吉凶將兆報人先知世人不會却謂鴉鳴喚作妖送凶於人返遭斥逐鴉儻不鳴吉凶自定雖本用好心不得奸報忽有箇出來道適來說今古因緣無許多般事如今却作恁麼說話豈非語自相違但向伊道這裏別有好處待你作老鴉我却向你說久立天寧佛果圓悟勤禪師心要示隆知藏曰有祖以來唯務單傳直指不喜帶水拖泥打露布列窠窟鈍置人蓋釋迦老子三百餘會對機設教立世垂範大段周遮是故最後徑捷省要接最上機雖自迦葉二十八世少示機關多顯理智至於付授之際靡不直面提持如倒剎竿碗水投針示圓光相執赤幡把明鑒說如鐵橛子傳法偈達磨破六宗與外道立義天下太平翻轉我天你狗皆神機迅捷非擬議思惟所測暨到梁游魏尤復顯言教外別行單傳心印六代傳衣所指顯著逮曹溪大鑑詳示說通宗通歷涉既久具正眼大解脫宗師變革通途俾不滯名相不墮理性言說放出活卓卓地脫灑自由妙機遂見行棒行喝以言遣言以機奪機以毒攻毒以用破用所以流傳七百來年支分派別各擅家風浩浩轟轟莫知紀極然鞠其歸著無出直指人心心地既明無絲毫隔礙脫去勝負彼我是非知見解會透到大休大歇安穩之場豈有二致所謂百川異流同歸于海要須是箇向上根器具高識遠見有紹隆佛祖志氣然後能深入閫奧徹底信得及直下把得住始可印證堪為種草捨此切宜寶祕慎詞勿作容易放行也五祖老師平生孤峻少許可乾嚗嚗地壁立只靠此一著常自云如倚一座須彌山豈可落虗弄滑頭瞞人把箇沒滋味鐵酸䭑劈頌拈似學者令咬嚼須待渠桶底子脫喪却如許惡知惡見胸次不挂絲毫透得淨盡始可下手鍛鍊方禁得拳躍然後示以金剛王寶劒度其果能踐履負荷淨然無一事山是山水是水更應轉向那邊千聖籠羅不住處便契乃祖以來所證傳持正法眼藏及至應用為物仍當驅耕夫牛奪飢人食證驗得十成無滲漏即是本家道流也摩竭陀國親行此令少林面壁全提正宗而時流錯認遂尚泯默以為無縫罅無摸索壁立萬仞殊不知本分事恣情識搏量便為高見此大病也從上來事本不如是巖頭云只露目前些子箇如擊石火閃電光若措不得不用疑著此是向上人行履處除非知有莫能知之趙州喫茶去祕魔擎叉雪峰輥毬禾山打鼓俱胝一指歸宗拽石玄沙未徹德山棒臨濟喝並是透底直截剪斷葛藤大機大用千差萬別會歸一源可以與人解黏去縛若隨語作解即須與本分草料譬如十斛驢乳只以一滴師子乳悉皆迸散要腳下傳持相繼綿遠直須不徇人情勿使容易乃端的也末後一句始到牢關誠哉是言透脫死生提待正印全是此箇時節唯踏著上頭關棙子底便諳悉也隆公知藏湖湘投機往還北山十餘年真探賾精通本色衲子遂舉分席訓徒已三載豫被睿旨移都下天寧欲得法語以表道契因為出此數段宣和六年十二月中浣佛果老僧書龍門佛眼遠禪師示衆曰如今直下信道是也已名不唧𠺕者況更不能直下信得又堪作甚麼直下信道是何名不唧𠺕者從前許多時甚麼處去來須知已失一橛了也便見從前不了底却成分外之見我觀從上古人有從迷得悟者所有流布皆是從迷得悟法門有悟了知迷者所以流布皆是悟了知迷法門有無迷無悟者所以流布皆是無迷無悟法門其次來迷外得悟者亦甚多固不足道況不知悟亦不了迷此正是凡夫也從上南泉歸宗諸人方喚作無迷無悟之見如今學者也趂口說無迷無悟又何曾到來不得容易出言蓋為你有疑在我今問你一件事初入母胎時將得甚麼物來你來時並無一物只有箇心識又無形無貌及至死時棄此五蘊擔子亦無一物只有箇心識如今行腳入衆中者箇是主宰也如今問你受父母氣分精血執受名為我身始於出胎漸漸長成此身皆屬我也且道屬你不屬你若道屬你初入胎時並不將一物來此箇父母精血幾時屬你又只合長在百年依舊拋却死尸又何曾屬你若言不屬見今一步也少不得罵時解嗔痛時能忍作麼生不屬你得試定省看道是有是無管取分疏不下蓋為疑根不斷道有來初生時漸長至三歲五歲乃至二十時決定不移到四十五十而此身念念遷謝念念無常決定喚作有不得道無來種種運為皆解作得道無且不得昔有一人因行失路宿一空屋中夜有一鬼負一死尸至續有一鬼來云是我尸前鬼云我在彼處將來後鬼強力奪之前鬼云此中有客子可證二鬼近前云此尸是誰將來客子思惟道二鬼皆惡必有一損我我聞臨死不妄語者必生天上遂指前鬼曰是這鬼將來後鬼大怒去客子四肢前鬼愧謝曰你為我一言之證令你肢體不全遂將死尸一一補却頭首心腹又被後鬼所取前鬼復一一以尸補之二鬼遂於地爭食其肉淨盡而去於是客子眼前見父母身體已為二鬼所食却觀所易之身復是何物是我耶非我耶有耶無耶於是心大狂亂奔走至一精舍見一比丘具述前事比丘曰此人易可化度已知此身非有也乃為略說法要遂得道果汝等諸人只說參禪舉因緣便喚作佛法此是禪髓何不恁麼疑來參取會得麼你身不是無有是心有身則未嘗有無是心無身則未嘗無你會得麼更說箇心亦不有亦不無畢竟不是你本有今無本無今有斷常見解久立泐潭闡提照禪師示衆曰諸公好熱熱一上了又寒一上寒寒熱熱煎迫人太煞你若己事已明時寒也從他寒熱也從他熱若是己事未明時寒時寒殺人熱時熱殺人且道不寒不熱時人在甚麼處佛在甚麼處無佛亦無衆生佛只是覺義謂之自覺覺他覺行圓滿要得會麼只如你被虱咬便是自覺知咬他人亦復如是便名覺他又知我與衆生本來平等是名覺行圓滿那裏更有佛來你輩而今參禪只是學佛學佛是心外法故名外道是名邪見豈不見釋迦如來云我於過去世見然燈佛實無一法可得又觀音菩薩云我於過去世見古觀音豈更別有佛來你輩而今不要別見你但張上座見古張上座李上座見古李上座便沒人奈得你何十二時中不得自由只為愛學佛去便被這死尸四大五蘊礙殺你所以寶峰切切教你如大死底人去便不費多心力若能如大死人便不見有四大乃至七大性自滅七大者地水火風空識覺是也空大者是你禪和子坐到一念不生前後際斷物我俱忘唯見空無所有被空性一包却便不見有四而空無自性因性立空又坐之已久不見有空大只有箇曉事底人便喚作識大今時人做工夫到這裏便喚作本來面目便依法身此正是認賊為子若遇寶峰教你一時放下若能一時放下便待從生至老也只做得箇老爛禪和亦是依教理行果修行且不是教外別傳所謂教理行果者從上諸聖說底名言謂之教依名言趣向謂之理依名言所行謂之行依名言所證謂之果然未免生受但依寶峰如大死人時更不見有唾涕膿血濕潤之體便無水大又不見有溫暖并動轉施為便無火大風大更不見有前後際斷物我俱忘便無空大更不見有曉事底人便無識大更不見有自覺覺他覺行圓滿便無覺大七大既空三十二相八十種紫磨金色那理得來所以道本覺妙明性覺明妙亦喚作法身無相猶如虗空你若知法身便屬報身便有著衣喫飯般屎送尿便屬化身不見永嘉大師道三身四智體中玄八解六通心地印又云了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂若是寶峰即向你道了了見如大死人亦無喜亦無嗔直是全身行異類處處相逢處處真久立開善密庵謙禪師解夏示衆曰先聖立箇結夏謂之護生禁足三月安居晚學初機修行辨道潔淨三業四威儀中無令過失敢問大衆且作麼生修作麼生行若道有法可修可行便成欺誑若道無一法可修可行又如何得安穩去不見昔有僧問一老宿如何是修行宿曰見性是修行往往叢林中見這般說話便以為尋常殊不知他古人實證實悟到竟究處只據本分答他無許多華巧也不行棒亦不下喝又不道蝦䗫𨁝跳上梵天蚯蚓驀過東海總不如此只平白向他道見性是修行也不妨真實且作麼生是你諸人性又作麼生見這些子事直是好笑未見時千難萬難及乎見了無易得恁地易因思舊日有箇同參兄弟久在老和尚身畔參禪崖到那伎倆盡處只是不能得透每日入室問他時只答道不會有箇後生笑他參禪許多年只道得箇不會同參聞得甚叵耐他道小鬼頭你未出世時我已三度去霍山廟裏退牙了也好教你知後來參得禪了到庵中相聚一日因舉勇和尚頌古山僧舉頌五通仙人話云無量劫來曾未遇如何不動到其中莫言佛法無多子最若瞿曇那一通山僧愛他道如何不動到其中既不動如何到吽吽這裏便是交加處間不容髮難也只在這裏易也只在這裏須是箇沒量漢始得同參却問因甚麼道最苦瞿曇那一通山僧却向他道你未出世時我已向霍山廟裏三度退牙了也相對不覺呵呵大笑自然打著南邊動北邊如此方喚作見性三世諸佛見你迷却此性枉被輪回所以興慈運悲廣說三乘十二分教如將蜜果換苦葫蘆淘汝諸人業根本無實事為你有箇衆生見便將箇佛來淘你為你有箇無明見便將箇菩提來淘你為你有箇生死見便將箇涅槃來淘你你若無許多見則佛亦不用出世亦不用說法亦不用說見性亦不用說修行蓋此性上本無佛亦無衆生本無菩提亦無煩惱本無涅槃亦無生死所以古人道無三界可出無菩提可求無佛祖可成無衆生可度淨裸裸亦灑灑沒可把雖無可把却能現佛現衆生現菩提現煩惱現涅槃現生死你莫看他現底未現時是箇甚麼所以臨濟和尚云學道人須要得真正見解若得真正見解生死不滯去住自由不用求他殊勝殊勝自至如此方喚作修行不是別法教你修行若別有法盡屬三乘因果次第非本來佛古人謂之情存聖量解在果因未能逾越聖情過諸影迹若能一念緣起無生超彼三乘權學等見山僧今夏修行有無量功德凡解夏之日謂之衆僧自恣日有缺犯無缺犯須恣自己意對佛披露今夜不免對人天大衆前一一披露去也好事大家知分明聽取自結夏後聞當山慈覺臥疾即過來問疾又黃亭衆信作水陸請普說赴其普說歸來送慈覺茶毗迤邐受開善請入院開堂賓客往還迎來送去勞勞地直到今日且道是佛法是世法是見性是不見性是修行是不修行到這裏如何定當往往十箇有五雙定當不出因記得鵝湖和尚上堂云莫道未了底人浮逼逼地設使了得底人明得知有去處尚乃浮逼逼地雲門下來舉此話問首座意作麼生座云浮逼逼地門云首座在此久住頭白齒黃作這箇語話座云未審上座又作麼生門云要道即得見即便見若不見莫亂道座云只如堂頭道浮逼逼地又作麼生門云頭上著枷腳下著杻座云恁麼則無佛法也門云此是文殊普賢大人境界師曰大小雲門前頭赫殺人後頭笑殺人山僧當時若見便向他道且莫惡口你諸人聞恁麼道又不得去這裏摶量直須實頭到這田地始得若實到這田地方知他雲門落處即知鵝湖落處既知鵝湖落處即知開善落處既知開善落處即知當人自性落處既知當人自性落處未可便休更須參三十年待別有生涯始得為甚麼如此不見道蛇頭却要重揩癢萬萬千千出一毫以拂子擊禪床一下徑山別峰印禪師示衆曰直截簡徑廣大明白底一段大事諸人自打之繞自求葛藤遂見紛紛紜紜曲曲屈屈卒了不下拈拂子曰見麼屈曲了也擊禪床曰紛紜了也直饒機如掣電辨似懸河分疏得行趂赴得到不如還我第一頭來今早室中初無奇特亦無玄妙只問兄弟荔枝因甚麼赤十箇有五雙莫擬如何祗對只這求話會欲祗對底是大病也鼻孔在老僧手裏豈是要你答轉語施一伎倆合得也便道是也莫道會盡古今會盡差別會盡大機大用石火雷光父子君臣擒縱殺活只箇裏一點不明則許多皆沒交涉更說甚麼大話豈不見黃面老子道松直棘曲鵠白烏玄皆了元由敢問大衆松因甚麼直棘因甚麼曲鵠因甚麼白烏因甚麼玄有一般杜撰底便道差別因受差別報我且問你松造甚麼因棘受甚麼報管你分疏不下又有一般道松自然直棘自然曲鵠自然白烏自然玄此是西天九十六種中自然外道見解也又有一般喚作唯心便引三界唯心萬法唯識以為證據我且問你既是一心為甚麼有曲有直有玄有白又是分疏不下又有一般道萬法本間唯人自閙起許多分別作甚麼我且問你喚曲作直得麼喚白作玄得麼又亦分疏不下諸兄弟如上惡知惡見皆是不了元由自打之繞自求葛藤不曾到簡徑直截處廣大明白處豈不見白雲驀展手曰因甚麼喚作手且道白雲意在甚麼處又如何祗對宗門下無有不管底法無有不透底事問著便要七穿八穴不問一點也瞞他不得此是本分參學人分上事莫道喝一喝打一棒蹉過了也直下便是只管口皮上轟將去肚皮裏元黑漫漫地且得沒交涉昔趙州見僧忽策火起問云不要喚作火喚作甚麼這老漢擔枷過狀而多少開口不得被他換了眼睛也又僧問多福如何是多福一叢竹曰一莖兩莖斜云學人不會曰三莖四莖曲古人不妨簡徑不妨綿密後人喚作問竹答竹問本答木有甚麼交涉晦堂和尚初自南雄來負文章慧辨一肚皮依雲峰悅禪師三年並無近傍處又依南禪師二年下盡工夫亦無近傍處遂棄去不願參禪往山主院中過夏因閲傳燈録至適來僧問多福一叢竹因緣驀然頓悟親見二師相為處遂徑歸黃檗才展坐具南曰子入吾室矣且道晦堂見箇甚麼便恁麼不同所以道參禪人切忌向語脉裏轉却晦堂又嘗請益南禪師云大事本來如是和尚何用教人看話頭百計搜尋南曰若不如此令汝究尋到無心處自見自肯吾即埋沒汝也諸兄弟此是古人腳踏實地處吐氣出來無不的確無不諦當而今要會這荔枝因甚麼赤亦須自見自肯與他晦堂趙州白雲把手共行則松直棘曲鵠白烏玄以至天地日月山川草木鳥獸人民四聖六凡皆穿透矣要道便道要拈便拈更不借他鼻孔出氣也果然恁麼則返觀向來蹉過多少好事了也莫有不蹉過底麼在舍只言為客易臨淵方覺取魚難音釋搊側九切𪙁音查齖音干橡辭兩切蹺去延切踦去奇切繘音橘繂音律捼儒追切𣫝當作煙脛切塗音荼博音團策音頰
