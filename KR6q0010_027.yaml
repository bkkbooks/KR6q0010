body:
  text: 平江府報恩光孝禪寺臣僧正受編頌古上法昌遇禪師七首法身螺螄吞大象石虎咬番馬驚起段家龍踏落雲屋瓦廬陵米價烏龜三眼赤祥麟一角尖騰雲生暮雨溪月夜明簾風幡不是風兮不是幡黑花貓子面門斑夜行人只貪明月不覺和衣渡水寒麻三斤火麻皮子若何分臘雪煎茶解醉君更有路行人未到野華含笑舊枝春三玄體中玄獨角泥牛水上眠轉身觸破澄潭月巫山頂上浪滔天用中玄征人帶甲眠春華風掃盡黃葉落階前句中玄遠道絶人煙甜瓜甜似蜜苦瓠苦如蓮蔣山佛慧泉禪師三首龐居士云此是選佛場心空及第歸幞頭塵土靴襴破選佛場中無兩箇若道心空及第歸頂上一椎難放過金剛經云於是中無實無虗菩提無實亦無虗幾箇男兒是丈夫丹冗不歸金鸑鷟碧潭空浸玉蟾蜍石霜虔侍者石霜會裏擇高才上首貪程去不回只愛寒灰無焰起不能枯木放華開虔侍者亦堪哀先師意旨雖明得未免長拖破草鞋翠巖真禪師七首百丈再參馬祖踏著船頭把釣竿浪粗風緊得魚難翻思幾處解雲雨只見四方雲出山臨濟栽松帶礪山河畫土疆漢高殿下有張良千言萬語無人會又逐流鶯過短墻首山答佛法大意楚王城畔水東流南地禪僧北地遊眼目直教從淺辨權衡爭奈出常流金篦為子挑除翳驢上穿靴背打毬玄沙三種病人一二三見聞覺更是誰頓銷礫華蔟蔟處鷓鴣啼草薰薰時鴛鴦飛玄沙老玄沙老賴遇當年欠一著諦當之言徒唯然中間樹子半零落馬祖即心即佛後云非心非佛百萬雄兵出將軍獵渭城不間弓矢力斜漢月初生麻三斤如何是佛麻皮三斤咄大地茫茫愁殺人野狐百丈野狐語至言粗怛薩阿竭吾有吾廬白雲端禪師十二首外道問佛萬丈寒潭徹底清錦鱗夜靜向光行和竿一掣隨鈎上水面茫茫散月明二祖安心終始覓心無可得寥寥不見少林人滿庭舊雪重知冷鼻孔依前搭上脣勘婆干戈中立太平基塊雨條風勝古時婆子為君勘破了趙州腳迹少人知三頓棒一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流無位真人春風浩浩喧天地是處山藏煙靄裏無位真人不可尋落華又見隨流水臨濟將示寂囑三聖劈破泰山雷未猛照開滄海月非光瞎驢滅却正法眼直得哀鳴滿大唐德山見龍潭明暗相凌不足云絲毫有解未為親紙燈忽滅眼睛出打破大唐無一人麻三斤斤兩分明不付君眼中瞳子莫生嗔百年三萬六千日得欣欣處且欣欣汝是慧超一文大光錢買得箇油餈喫向肚裏了當下便不飢芭蕉拄杖雲蓋鵬和尚與雙泉雅禪師向火次舉此話鵬擬開口雅以火筯一𢷾鵬豁然有省與奪雙行驗正邪才爭拄杖便忘家驀然鐵棒如風至失却從前眼裏華洗鉢盂梅華落盡杏華披未免春風著出褫一氣不言含有象萬靈何處謝無私北斗裏藏身五陵公子遊華慣未第貧儒自古多冷地著他人富貴等間不奈幞頭何保寧勇禪師十三首達磨見武帝燒得通紅打一鎚周遭無限火星飛十成好箇金剛鑽攤向門前賣與誰清淨行者不入涅槃生平疏逸無拘檢酒肄茶坊信意遊漢地不收秦不管又騎驢子下揚州不與萬法無侶風吹日炙露尸骸泣問山人覓地埋忍俊不禁多口老陰陽無處可安排日面佛月面佛蒲團上端坐針眼裏穿線西風一陳來落葉兩三斤仰山打破溈山鏡溈山古鏡仰山提日上東方月照西撲落不知誰拾得秋風索索草萋萋臨濟問黃檗佛法大意雷電喧轟海嶽昏一家愁閉雨中門狂風忽起烏雲散白日滿天星斗分臨濟囑三聖出門握手再叮嚀往往事從叮囑生夜逈路長休把火大家吹殺暗中行須彌山萬仞峰頭立大乖須臾眨眼落懸崖通身不損毫毛者天上人間安敢埋漸源吊慰終日挨門復倚樓幾回明鏡照梳頭一從事却潘郎後也解人前不識羞大隨龜露足藏頭可笑奇千年誰謂是靈龜雨傾不解乘流去浮木相逢又幾時靈雲悟道玄沙未徹萬年松下忽相逢樹鳴條浩浩風堪笑晚來無處覓崔嵬和雨在雲中大禪佛半夜於僧堂前叫云我悟也夜半高聲似少神箇中明白有疏親如今隨例傳其響也道師姑是女人芭蕉拄杖你有面前枯取去如無背後奪將來可憐黑漆光生底擊著千門萬戶開泐潭真淨雲庵文禪師八首柏樹庭前柏樹子我道不如松枯枝折落地打著去年棕吹布毛鳥窠吹布毛紅日午方高趙王因好劒滿國人帶刀保壽開堂探騎飛來捧下寧瞎人翻滿鎮州城太平本是將軍致不許將軍見太平狗子無佛性言有業識在誰云意不深海枯終見底人死不知心臨濟參黃檗後到大愚資糧更不著些些岐路年深恐轉賒直下痛施三頓棒夜來依舊宿蘆華便言黃檗無多法大丈夫見豈自乖肋下三拳明有信不從黃檗付將來百丈再參馬祖客情步步隨人轉有大威光不能現突然一喝三日聾那吒眼開黃檗面野狐不落藏鋒不昧分要伊從此脫狐身相逢盡道休官去林下何曾見一人淨因枯木成禪師二首達磨見武帝間將一段秦川錦裁作人間巧婦衣幾度著來呈伎倆暗中曲調少人知三頓棒山藤六十輕分付肋下三拳已太遲堪笑不能知痛癢上堂猶道拂蒿枝慧林慈受深禪師四首溈山一日坐次仰山從外而入溈山以兩手握拳相交示之仰山便作女人拜溈山曰如是如是佳人十八正嬌癡一曲當前舞柘枝只有玉郎知雅態更無人道柳如眉女子出定長江輥底浪如銀秋日白蘋紅蓼新莫怪扁舟到彼岸行船猶在把梢人麻三斤洞山麻三斤斤兩不謾人語稀難問事貌古易傳神世尊生下一火鑄成金彈子團圝都不費鉗鎚拈來萬仞峰頭放打落天邊白鳳兒雪峰妙湛慧禪師一首二祖安心覓心不得得心安安得心來有幾般好把山藤贈二十免教千古弄泥團泐潭湛堂準禪師七首楞嚴吾不見時老胡徹底老婆心為阿難陀意轉深韓幹馬嘶青草渡戴嵩牛臥緑楊陰黃龍三關我手佛手十八十九雲散月明癡人夜走我腳驢腳放過一著龐公笊籬清平木杓人人生緣北律南禪道吾打鼓華亭撑船洗鉢盂之乎者也衲僧鼻孔大頭向下若也不會問取東林王大姐勘婆行路難行路難最難難是過臺山唯有趙州公驗正昂頭掉臂總間間提婆達多受罪好笑提婆達多入捺落十小劫波然得三禪妙樂吹布毛須還鳥窠泐潭闡提照禪師五首南泉斬貓縮水酒越濃負心人越窮鐵剛刀自利不用苦磨礱草鞋頭戴今何在我見牽來劈面春女子出定小樹子傍山栽華從葉裏開枝高攀不得和樹折將來巴陵雞寒上樹梨華一枝春帶雨金色頭陀笑不語龍宮海藏月明前織女姮娥相對舞笑者笑舞者舞十方無虗空大地無寸土南泉為馬祖忌日設齋垂語千尺絲輪直下垂一波才動萬波隨江上晚來堪盡處漁人披得一簑歸曹山去亦不變異齋時一鉢飯飯後一覺睡睡起去放尿洗手成變異太平佛鑑勤禪師七首達磨見武帝始聞阿閣一聲鐘日暖蒼龍睡正濃再擊鳳凰臺上鼓夜半祥鸞未飛舞帝基永固如磐石胡僧枉費平先力回指少林歸去來春風一陳華狼藉日面佛月面佛東街柳色拖煙雨西巷桃華相映紅左顧右盻看不足一時分付與春風世尊升座一輪明月挂天心四海生靈荷照臨何必西風撼丹桂碧霄重送九秋音離四句絶百非美如西子離金閣嬌似楊妃倚玉樓猶把琵琶半遮面不令人見轉風流十身調御捉賊分明要見贓十身調御下禪床曾經巴峽猿啼處鐵作心肝也斷腸三聖逢人即出城南措大騎驢子市北郎君跨馬兒各各四蹄俱著地三春同到月明池南泉示衆云文殊起佛見法見貶向二鐵圍山彩雲影裏仙人現手把紅羅扇遮面無人著眼看仙人却看隨後紅羅扇天寧佛果圜悟勤禪師七首德山小參不答話大冶烹金忽雷驚春草木秀發光輝日新不費纖毫力擒下夭麒麟全威殺活得自在千古照耀同氷輪話作兩橛句中眼活龍頭蛇尾以指喻指撞著露柱瞎衲僧塞斷咽喉無出氣擬議尋思隔萬山咭嘹舌頭三萬里女子出定大定等虗空廓然誰辨的女子與瞿曇據令何調直師子奮迅兮搖乾蕩坤象王回旋兮不資餘力孰勝孰負誰出誰人雨散雲收青天白日君不見馬駒踏殺天下人臨濟未是白拈賊須彌山石笋抽條泥牛吼月誰料同舟自胡越應機涌出須彌盧一念不生何處雷無處雪金剛寶劒當頭截麻谷持錫到章敬又到南泉如是不是去却藥忌擬犯封疆全軍失利杖頭突出古菱華舉世風流出當家透網金鱗以何為食百草頭出沒三界外遨遊從布漫天網虗下鈎鼇鈎搖麟振𩮻撼乾坤兀目昂頭洪浪噴棒雨點唱雷奔肯將爭戰定功勳麻三斤鐘在扣谷受響池印月鏡含僧曾非展事投機豈是預搔待癢點鐵成金舉直措枉一箭雕一雙一摑血一掌君不見疏而不漏兮恢恢天網雲門示衆云人人盡有光明在夜明簾外千峰秀鸞鏡臺前萬象虗掃蹤滅迹不立錙銖誰為佛殿誰是香厨敲出鳳凰五色髓擊碎驪龍明月珠龍門佛眼遠禪師五首俱胝指老大宗師竪指頭一生用得最風流玄沙拗折無人會年來年去冷颼颼玄沙三種病人玄沙三種病人有理不在高聲引得香嚴老子却來樹上懸身野狐醉眠醒臥不歸家一身流落在天涯祖佛位中留不住夜來依舊宿蘆華溈山撼門扇三下春至百華開朱顏安在哉可憐園裏色不入鏡中來罽賓斬師子尊者楊子江頭楊柳春楊華愁殺渡頭人一聲羌笛離亭晚君向瀟湘我向秦開福寧禪師三首女子出定抹粉塗杯恰我呆神頭鬼面舞三臺千千萬萬人窺看子細不知誰見來風幡非風幡動唯心動猶涉廉纖強指陳大地未曾添寸土不知誰是點頭人風頭稍硬風頭坐斷進還難衲子相將不易看未到潼關天已曉不堪回首望長安大隨南堂靜禪師六首即心即佛即心即佛鐵牛無骨戲海獰龍摩天俊鶻西江吸盡未為奇火裏生蓮香𩖼𩖼狗子無佛性趙州狗子無佛性七佛如來合掌聽須彌岋崿舞三臺海水騰波行正令野狐長蛇偃月鐵旗鐵鼓坐斷乾坤輝騰今古曾騎鐵馬入重城手握金鞭賀太平女子出定懷藏日月八面玲瓏袖裏金鎚鮮血通紅香風𩖼𩖼華雨濛濛兵隨印轉處萬里長虹將逐符行時些子神通僧問琅瑘清淨本然清淨本然云何忽生山河大地大小琅瑘禪師借人鼻孔出氣出得氣有巴鼻昨夜那吒生八臂無縫塔皎潔天心月朧遍九垓三秋黃葉落二月牝丹開每覩南來鴈常詬北方五臺均提童子報拾得在天台龍牙言禪師九首趙州衫趙州老對面人難曉一歸何處青州布襖金銀琉璃硨磲瑪瑙靈雲桃華春風二月半桃華紅爛熳靈雲到處逢衲僧著眼看看看短棹孤舟誰居彼岸仰山推枕子田中插鍬床上推枕千手千眼不審不審百丈再參馬祖風雲會合又相期覿面難明第一機霹靂一聲天地逈西河師子却生兒柏樹庭前柏樹子不是祖師心莫執一時見便忘千古音雲門放洞山三頓棒二汗馬功勞要立身將軍一等掃邊塵全身只待英雄士不遇英雄愁殺人查渡湖南涉路歧雲門不惜兩莖眉萬古碧潭空界月再三撈摝始應知有句無句仰之彌高鑽之彌固昭昭明明如藤倚樹大笑呵呵跨白牛碧雲繚繞無尋處斬貓當日臨崖看滸眼至今觀水憶南泉趙州頭戴草鞋去漁翁腰帶好牽船勝因戲魚靜禪師四首勘婆二婆子只知指路雞犬被人偷去直待趙州勘了這回緊閉門戶趙州老老大大不解山中打坐自言去勘婆了倒被婆子勘破犀牛扇扇上犀牛從古畫索來既破要元牛縱教戴子重描出不是當時那一頭四不遷心墳時起掐珠不念佛開眼不見色喫飯誰擇日任東西南北薦福常庵崇禪師二首風幡浪靜風恬正好看秋江澄徹碧天寬漁人競把絲輪擲不見冰輪蘸水寒趙州三不度金佛不度爐窮源有處無木佛不度火渾崙咬不破泥佛不度水何處不是你真佛屋裏坐趙州言是禍水牯會耕田黃牛能拽磨寶華佛慈鑑禪師二首世尊拈華拈華親付老頭陀平地俄興一丈波後代釘樁搖櫓者竹篙量水轉殽訛樓子和尚悟道你若無心我也休鴛鴦帳裏懶擡頭家童為問深深意笑指紗窗月正秋淨慈月堂昌禪師四首忠國師問紫璘供奉草作何色慣使渡頭船如今不記年愛他風浪惡方是趂粗錢秀才讀千佛名經千佛居何處題詩黃鶴樓感恩并積恨終日在眉頭盤山光非照境光非照境境非存光境俱忘復是痕百鳥不來春已老落華流水繞江村丹霞燒木佛慣行私路乍赴公筵幞頭腳短腰帶夸圓不是伴郎來勸酒誤他年少覓青氈天童宏智覺禪師一首野狐一尺水一丈波五百生前不奈何不落不昧商量也依前撞人葛藤窠阿呵呵會也麼若是你灑灑落落不妨我哆哆和和神歌社舞自成曲拍手其間唱哩囉華嚴真懿蘭禪師五首五位正中偏拈轉虗空過那邊夜半金雞生鐵卵明明誰辨暗中圓偏中正曉月梳雲華弄影石人驚起夢魂消帶雪烏雞回鳳嶺正中來玉兔團天耀九垓萬古碧潭無影像紅爐焰裏雪華開兼中至錦縫金針雙鎖備靴頭線綻足知音有耳不臨流水流兼中到眼裏雙瞳齊喝道少室山前鐵馬駒三便喫盡無根草上方益禪師二首臨濟見普化喫生菜草裏相逢兩赤眉交鋒一陳疾如飛東西旗號渾相似試問何人得勝歸香嚴上樹狹路轉身難東西盡是山行人不到處風定落華間淨因蹣庵成禪師四首夾山境話古路雪深覆好山雲更遮鴈聲天外急遊子夜還家德山托鉢巫峽山頭窈窕女朝為行雲暮為雨王孫一見空斷腸便作紅霞隱身去女子出定文殊頭白罔明頭黑女子冶容瞿曇是賊山僧不犯鋒鋩直下并贓捉獲龍牙問翠微臨濟佛法大意駕與青龍不解騎人人盡道阿師癡爛泥中有傷人刺三度曾施陷虎機黃龍死心新禪師二首秀才問長沙千佛黃鶴樓前法戰時百千諸佛竪降旗渠無國土居何處留得多才一首詩魯祖面壁魯祖垂慈不用功逢僧面壁顯家風若遇上乘同道者請續此句木庵瓊首座二首達磨見武帝掩耳不及忽雷奔天低尺五兩傾盆葉隨流水歸何處牛帶寒鴉過別村世尊一日坐次見二人舁豬乃問這箇是甚麼云佛具正遍知為甚麼豬也不識世尊曰也要問過捨筏懷兼濟逢耕更問津却將未歸意説與欲行人欽山方禪師二首乾峰示衆云法身有三種病二種光三種病兮二種光衲僧於此共商量商量得到無疑地野草間華滿地香燒木佛覿面難藏最上機家風千古為人施銀山鐵壁重重透賴有丹霞院主知南華昺禪師二首僧問清平有漏無漏笊籬木杓錢貫井索打瓦鑽龜徒勞卜度休卜度麒麟只有一隻角僧問雪竇明覺如何是佛曰四山圍繞狂狗逐塊瞎驢趂隊只許我知不許你會文殊道禪師四首野狐石崇富貴籛鏗壽潘嶽容儀子建才但願東風齊著力一時吹入我門來勘婆三月春光上國遊祥雲瑞氣鎖龍樓親從宣德門前過更問行人覓汴州狗子無佛性狗子佛性無老蚌吐明珠西川鳴杜宇江南啼鷓鴣燒木佛彭祖八百乞延壽秦皇登位更求仙昨向天津橋上過石崇猶自送窮船龍牙囌嚧才禪師二首溈山百年後向山前檀越家作一頭水牯牛去翻手書空字已成忙忙人向兩頭爭屈原不是尋漁父千古誰人論獨醒玄沙白紙踏翻漁艇成家業笑出蘆華月正圓地闊天長三幅紙同風千里為重宣何山佛燈珣禪師五首南泉示衆文殊起佛見法見鴛鴦繡出世無雙好手元來更有強呈罷各歸香閣去金針難把度蕭郎德山入門便棒入門便棒沒商量拶出紅流便廝當不是奴奴情淡薄無錢難作好兒郎臨濟入門便喝張公未醉李公扶從此嘉聲滿道途却被金剛開口笑誰能愛你護身符央崛取世尊指頭急行緩步無前後渾踏長安路一條央崛回頭知住處便能平步出雲霄華冠不用娘生指鬚髮寧煩費力搖好似移華兼蝶至等間買石得雲饒外道問佛露影藏身問世尊瞿曇一點不加文迷雲舒卷從斯入十倍精神減八方龍翔竹庵圭禪師六首女子出定不假文殊神通休要罔明彈指爾時靈山會中女子從定而起國師三喚侍者世路風波不見君一回見面一傷神水流華落知何處洞口桃源別是春趙州勘婆劈面三拳連腮七掌盡大地人不知痛癢趙州七斤衫夜半墨漆黑提得一箇賊點火照來看元是王大伯南泉油餈近在口皮邊遠過河沙國世間多少人不得油餈喫罽賓斬師子尊者船子下揚州浮萍逐水流一聲河滿子千古動悲愁大溈牧庵忠禪師三首女子出定稱鎚落井只有稱衡兩兩相憶分物不平方始取出稱鎚忽又失却稱衡始去鄰家借覓衡上不曾釘星休休重者從他重輕者從他輕新婦騎驢柳惲江頭賞白蘋小風吹處曉煙輕漁翁坐釣秋亭月翻憶苕溪説性情非心非佛二月春光景氣浮少年公子御街遊銀床踞坐傾杯樂三箇孩童打馬毬鳥巨雪堂行禪師五首達磨見武帝西天屠子氣雄豪欺負神洲罪莫逃武帝當頭輕一拶果然提起活人刀風幡不是風幡動天生李老君出胎頭上髮寸寸白如銀陳操尚書驗衲僧一語離窠窟千生出蓋纏夜來風雪惡木折古巖前二祖安心金不博金水不洗水二祖腦後露腮達磨當門無齒夫妻相打到官官問你有誰證見各云有親兒證見兒到官欲證父不得證母不得生死自憐同室穴因何中路隔關山一朝忽得親兒證躍踏方知蓋覆難音釋蟾時占切蜍常如切褫音池柘音蔗咭巨吉切嘹力吊切𩮻音獵罽居例切岋魚及切崿五各切滸音虎掐苦洽切舁音餘籛音箋惲音蘊
