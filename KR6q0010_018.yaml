body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十六世臨濟十二世楊岐五世徑山大慧普覺宗杲禪師法嗣福州西禪懶庵鼎需禪師長樂人族林氏幼舉進士有聲年二十五因讀遺教經忽曰幾為儒冠誤欲去家母難之以親迎在期師乃絶之曰夭桃紅杏一時分付春風翠竹黃華此去永為道伴竟依保壽樂禪師為比丘探賾方外踰十年歸里庵于窮谷之麓佛心挽師出山首衆于鹿溪紹興初大惠來洋嶼師謁之一日入室惠問內不放出外不放入正恁麼時如何師即大徹慧曰此正是汝放身命處未幾慧移小溪令分座由是得聲泉守請開法延福後退處洋嶼八年挽居東西禪上堂曰太虗挂劒用顯吾宗按坐神威如何近傍縱具回天轉地電卷星馳底手段要且不堪勍敵而今還有別休咎者麼便請從東過西不妨水雲自若如其稍涉遲回直是一槌粉碎喝一喝下座上堂懶翁懶中懶最懶懶説禪亦不重自己亦不重先賢又誰管你地又誰管你天物外翛然無箇事日上三竿猶更眠上堂衆方集定師曰靈利人不勞再舉便下座元宵上堂心如皎月連天照性似寒潭徹底清無價夜光人不識夢中虗度幾千春竪拂子曰阿呵呵燈光王如來向這拂子頭上放大光明照大千界未審諸人還見麼若也見得青春無虗度若也未見有眼如盲見與不見拈放一邊忽若毗嵐風起驟雨傾盆正恁麼時且道燈光王如來在甚麼處喝一喝曰莫瞌睡好上堂舉僧問趙州如何是古人言州云諦聽諦聽師曰諦聽即不無切忌喚鐘作甕僧問釋迦彌勒猶是他奴未審他是阿誰曰明破即不堪開堂日僧才出師曰住住今日不答話僧擬進語師喝曰退後退後不堪為種草問幽鳥語喃喃辭雲入亂峰時如何曰暗寫愁腸寄與誰云恁麼則不離當處常湛然覔即知君不可見曰莫豚沸室中問僧萬法歸一一歸何處云新羅國裏曰我在青州作一領布衫重七斤聻云今日親見趙州曰前頭見後頭見僧乃作斫額勢師曰上座其處人云江西曰因甚麼却來這裏納敗闕僧擬議師便打紹興癸酉七月望升堂勉衆激礪凡數百言翌日語門弟子吾世緣盡矣遂書曰十四十五明明已露更問如何西天此土囑首座安永曰汝善保任努力為人言畢而逝世壽六十有二僧臘三十有七福州東禪蒙庵思嶽禪師事敘未見入院上堂曰大地茫茫恁麼廣闊窮山漠漕隨分幽深為衲僧法戰之場報佛祖冤讎之處盡力道得一棒一條痕盡力道不得一掌一手血如以眼見則復耳聞如以心知則復智證是故謂之智證三昧亦是文殊普賢大人境界若也於此共相委悉大千沙界一毫收百億毛頭輥繡毬直是通身還有眼不風流處也風流上堂蛾羊蟻子説一切法墻壁瓦礫現無蕩身見處既精明聞中必透脫所以雪峰和尚凡見僧來輥出三箇木毬如弄雜劇相似賢沙便作斫牌勢卑末謾道將來普賢今日謗古人千佛出世不通懺悔這裏有人謗普賢定入舌地獄且道謗與不謗者是誰心不負人面無慚色上堂達磨來時此土皆知梵語及乎去後西天悉會唐言若論直指人心見性成佛大似羚羊挂角獵犬尋蹤一意乖疏萬言無用可謂來時他笑我不知去後我笑他唐言梵語親分付自古齊僧怕夜茶上堂臘月初歲云徂黃河凍已合深處有嘉魚活鱍鱍跳不脫又不能相煦以濕相濡以沫慚愧菩薩摩訶薩春風幾時來解此黃河凍令魚化作龍直透桃華浪會即便會癡人面前且莫説夢上堂即心即佛非心非佛不是心不是佛不是物通身無影象遍界不曾藏喚作一物即不中敢保老兄未徹在恁麼説話開人眼瞎人眼若也不會天寒日短三人共兩碗且道為諸人説對古人話還會麼禮繁即亂上堂二祖償宿債萬法絶對待一心無礙浮山有九帶十方虗空圓陀陀無量法門百雜碎若言其有非內非外若言其無無在不在智與理冥境與神會如牛拽磨似水打碓三千里外逢人東倒西儡十字街頭遇賤則貴還會也無蘇噓蘇嚧上堂僧問如何是初日分以恆河沙等身布施曰從苗辨地因語識人云如何是中日分復以恆河沙等身布施曰築著磕著云如何是後日分亦以恆河沙等身布施曰向下文長付在來日復曰一轉語如天普蓋似地普擎一轉語舌頭不出口一轉語且喜沒交涉要會麼慚愧世尊面赤不如語直大小嶽上座口似磉盤今日為這問話僧講經不覺和注腳一時説破便下座泉州教忠晦庵彌光禪師閩之長樂人族李氏兒時寡言笑聞梵唄則喜十五依幽巖文慧禪師十八圓頂猶喜閲群書一日曰既剃髮染衣當期悟徹豈醉於俗典耶遂出嶺謁圓悟禪師於雲居次參黃檗祥高庵悟機語皆契以淮楚盜起歸謁佛心會大慧寓廣因往從之慧謂曰汝在佛心處所得者試舉一二看師舉佛心上堂拈普化公案云佛心即不然總不恁麼來時如何劈脊便打從教遍界分身慧曰汝意如何云某不肯他後頭下箇注腳慧曰此正是以病為法師毅然無信可意慧曰汝但揣摩看師竟以為不然經旬因記海印信禪師拈曰雷聲浩大雨點全無始無滯趨告慧慧以舉道者見琅瑘并賢沙未徹語詰之師對已慧笑曰雖進得一步只是不著所在如人斫樹根下一刀則命根斷矣汝向枝上斫其能斷命根乎今諸方浩浩説禪者見處總如此何益於事其榻岐正傳三四人而已師慍而去翌日慧問汝還疑否云無可疑者曰只如古人相見未開口時已知虗實或聞其語便識淺深此理如何師悚然汗下莫知所詣慧令究有句無句慧過雲門庵師侍行一夕問曰某到這裏不能得徹病在甚處慧曰汝病最癖世醫拱手何也別人死了活不得汝今活了未曾死要到大安樂田地須是死一回始得師疑之愈深後入室慧問喫粥了也洗鉢盂了也去却藥忌道將一句來云裂破慧震威喝曰你又説禪也師大悟慧撾鼓告衆曰龜毛拈得笑咍怡一擊萬重關鎖開慶快平生在今日孰云千里賺吾來師亦以頌呈之曰一拶當機怒雷吼驚起須彌藏北斗洪波浩渺浪滔天拈得鼻孔失却口邵武黃端夫創庵乞師住持留二年東歸分座於鼓山參政李公邴以教忠迎開法閲十年移龜山上堂曰有句無句如藤倚樹放憨作麼及至樹倒藤枯句歸何處情知汝等諸人卒討頭鼻不著為甚麼如此只為分明極翻令所得遲上堂夢幻空華何勞把捉得失是非一時放却擲拂子曰山僧今日已是放下了也汝等諸人又作麼生復曰侍者收取拂子上堂卓拄杖喝一喝曰不是坐來頻勸酒自從別後見君稀便下座上堂一物不將來兩肩擔不起直下便承當坐在屎窖裏還有獨脫出來底麼設有也是黃龍精僧問文殊為甚麼出女子定不得曰山僧今日困云罔明為甚麼却出得曰令人疑著云恁麼則擘開華嶽千峰秀放出黃河一派清曰一任卜度問如何是向上事曰七十三八十四師住龜山歲餘以疾歸雲門庵紹興乙亥二月八日剃沐更衣告衆右脅而逝十五日闍維獲設利五色門人慧空頂歸教忠六月八日建塔于山之陽福州玉泉曇懿禪師嘗久依圓悟自謂不疑紹興初出住興化祥雲法席頗賸大慧入閩知其所見未諦致書令來師遲遲慧小參且痛斥仍榜告四衆師不得已破夏謁之慧鞫其所證既而曰汝恁麼見解敢嗣圓悟老人耶師退院親之一日入室慧問我要箇不會禪底做國師師云我做得國師去也慧喝出居無何語之曰香嚴悟處不在擊竹蕩俱胝得處不在指頭上師乃頓明後住玉泉為慧拈香繼省慧於小溪慧升座舉雲門一日拈拄杖示衆曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧見拄杖但喚作拄杖行但行坐但坐總不得動著慧曰我不似雲門老人將虗空剜窟竉驀拈拄杖曰拄杖子不屬有不屬幻不屬空卓一下曰凡夫二乘緣覺菩薩盡向這裏各隨根性悉得受用唯於衲僧分上為害為冤要行不得行要坐不得坐進一步則被拄杖子迷却路頭退一步則被拄杖子穿却鼻孔只今莫有不甘底麼試出來與拄杖子相見如無來年更有新條在惱亂春風卒未休正當恁麼時合作麼生下座煩玉泉為衆拈出師登座敘謝畢遂舉前話曰適來堂頭和尚恁麼批判大似困魚止濼病鳥棲蘆若是玉泉即不然拈挂杖曰拄杖子能有能無能幻能空凡夫二乘緣覺菩薩卓一下曰向這裏百雜碎唯於衲僧分上如龍得水似虎靠山要行便行要坐便坐進一步則乾坤震動退一步則草偃風行且道不進不退一句作麼生道良久曰間持經卷倚松立笑問客從何處來下座舉衆拜之或出圓悟下饒州薦福悟本禪師江之湖口人初住博山上堂曰高揖釋迦不拜彌勒者與三十拄杖何故為他只會步步登高不會從空放下東家牽犁西家拽杷者與三十拄杖何故為他只會從空放下不會步步登高山僧恁麼道還有過也無衆中莫有點檢得出者麼若點檢得出須彌南畔把手共行若點檢不出布袋裏老鴉雖活如死上堂釋迦掩室於摩竭淨名杜口於毗耶須菩提喝無説以顯道釋梵絶視聽而雨華大衆這一隊不唧𠺕漢無端將祖父田園私地結契一時華擘了也致令後代兒孫千載之下上無片瓦遮頭下無卓錐之地博山當時若見十字路頭掘箇無庭坑喚來一時埋却免見遞相鈍置何謂如此不見道家肥生孝子國霸有謀臣福州西禪此庵守淨禪師敘語未詳上堂曰談玄説妙撒屎撒尿行棒行喝將鹽止渴立主立賓華擘宗乘設或總不恁麼又是鬼窟裏坐到這裏山僧已是打退鼓且道諸人尋常心憤憤口悱悱合作麼生莫將間學解埋沒祖師心上堂坐斷毗盧頂須是沒量大人若是沒量大人不坐毗盧頂上堂若也單明自己不悟目前此人有眼無足若也只悟目前不明自己此人有足無眼直得眼足相資如車二輪如鳥二翼正好勘過了打上堂今朝臘月九窮漢外邊走雖然不還家却是他好手既是不還家因甚麼却道他好手陋巷不騎金色馬回途却著破襴衫上堂九夏炎炎大熱木人汗流不輟夜來一兩便涼莫道山僧不説以拂子擊禪床下坐上堂若欲正提綱直須大地荒欲來衝雪刃未免露鋒鋩當恁麼時釋迦老子出頭不得即不問你諸人只如馬鐙裏藏身又作麼生話會上堂道是常道心是常心汝等諸人聞山僧恁麼道便云我會也大盡三十日小盡二十九頭上是天腳下是地耳裏聞聲鼻裏出氣忽若四大海水在你頭上毒蛇穿你眼睛蝦蟆入你鼻孔又作麼生上堂文殊普賢談理事臨濟德山行棒喝東禪一覺到天明偏愛風從涼處發咄上堂佛祖頂上有破天大路未透生死關如何敢進步進步不進步大千沒遮護一句絶言詮那吒擎鐵柱開堂日拈香罷師就座南堂和尚白槌云法筵龍象衆當觀第一義師隨聲便喝曰此是第幾義久參先德已辨來端後學有疑何妨請問僧問阿難問迦葉世尊傳金襴外別傳何物迦葉喚阿難阿難應諾未審此意如何曰切忌動著云只如迦葉道倒却門前剎竿著又作麼生曰石牛橫古路云只如和尚於佛日處還有這箇消息也無曰無這箇消息云爭奈定光金地遙招手智者江陵暗點頭曰莫將庭際柏輕比路傍蒿僧禮拜師乃曰定光金地遙招手智者江陵暗點頭已是白雲千萬里那堪於此未知休設或於此便休去一場狼藉不少還有檢點得出者麼如無山僧今日失利問佛佛授手祖祖相傳未審傳箇甚麼曰速禮三拜問永嘉道不見一法即如來方得名為觀自在此意如何曰獼猴弄黐膠云千江有水千江月萬里無雲萬里天曰胡猻繫露柱問不施寸刃請師相見曰逢強即弱云何得埋兵掉鬪曰只為闍梨寸刃不施云未審向上還有事也無曰有云如何是向上事曰敗將不斬問古佛堂前甚麼人先到曰無眼村翁云未審如何趣向曰楖栗橫擔建寧府開善密庵道謙禪師本郡人遺其氏具戒遊東都於圓悟會中師事大慧逮慧補徑山師侍行未幾遣之零陵致訊紫巖居士於中途倐然契悟既回慧特為印可歸隱仙州山四衆雲集法席鼎盛寶學劉公彥修請居開善上堂曰去年也有箇六月十五今年也有箇六月十五去年六月十五少却今年六月十五今年六月十五多却去年六月十五多處不用減少處不用添既不用添又不用減則多處多用少處少用乃喝一喝曰是多是少良久曰箇中消息子能有幾人知上堂洞山麻三斤將去無星稱子上定過每一斤恰有一十六兩二百錢重更不少一釐正與趙州殿裏底一般只不合被大愚鋸解稱鎚却教人理會不得如今若要理會得但問取雲門乾屎橛上堂有句無句如藤倚樹撞倒燈籠打破露拄佛殿奔忙僧堂回顧子細看來是甚家具咄只堪打老鼠上堂諸人從僧堂裏恁麼上來少間從法堂頭恁麼下去並不曾差了一步因甚麼却不會良久曰只為分明極翻令所得遲上堂舉馬大師道即心即佛師曰錯又道非心非佛師曰錯南泉道不是心不是佛不是物師曰錯若人破得此三箇硬塞許他參學中著得箇眼其或未然毗嵐風忽起驚著梵王睡慶元府育王大圓遵璞禪師長溪人幼同玉泉懿問道圓悟數載建炎初還里佐懿於莆中祥雲紹興甲寅春大慧居洋嶼師往訊之入室次慧問三聖興化出不出為人不為人話你道這兩箇老漢還有出身處也無師於慧膝上打一拳慧曰只你這一拳為三聖出氣為興化出氣速道速道師擬議慧便打復謂曰你第一不得忘了這一棒後因慧室中問僧曰德山見僧入門便棒臨濟見僧入門便喝雪峰見僧入門便道是甚麼睦州見僧便道現成公案放你三十棒你道這四箇老漢還有為人處也無僧云有慧曰劄僧擬議慧便喝師聞遽領微旨大慧欣然許之出世機語未見溫州鴈山能仁枯木祖元禪師七閩長樂人族林氏初謁雪峯預次依佛心才皆已機喫及親大慧於雲門庵夜坐次睹僧剔燈始棄前證有偈曰剔起燈來是火歷劫無明照破歸堂撞見聖僧幾乎對面蹉過不蹉過是甚麼十五年前奇特依前只是這箇慧亦以偈贈之曰萬仞崖頭解放身起來依舊却惺惺飢餐渴飲渾無事那論昔人非昔人紹興己巳春出住能仁上堂曰有佛處不得住踏著稱鎚硬似鐵無佛處急走過腳下草深三尺三千里外逢人不得錯舉北斗挂須彌恁麼則不去也棒頭挑日月摘楊華摘楊華眼裏瞳人著繡靴卓拄杖下座上堂觀音菩薩買胡餅放下却是饅頭雲門大師只見錐頭利不見鑿頭方能仁即不然初三十一上堂鴈山枯木實頭禪不在尖新語句邊背手忽然摸得著長鯨吞月浪滔天江州東林卍庵道顏禪師潼川飛烏人族鮮于氏世為名儒少依淨安諫律師試經得度與正聱頭結友南遊凡名緇宿衲無不扣見唯疑圓悟門庭不類諸方悟時住金山師親之無所投一日浣衣次忽有得乃曰天知地知你知我知更莫漏泄天機往悟傍將述所證悟不顧異日見之詬曰汝以學解自負意氣凌人臘月三十日能自負否師慚汗俯首悟復謂曰儕輩中如杲者即大慧汝當就其磨礱師益不悅悟還蜀師願侍行悟曰不可我嘗囑汝依杲汝欲決擇大事詎宜以間氣介𮌎中耶仍以書致慧曰顏川彩繪已畢但欠點眼耳他日嗣其後未可量也久之慧奉旨住徑山師趨謁質疑朝夕方大契悟分座接納會正歸住雲頂邀師西還正遷無為命繼席次徙下山薦福及報恩白楊晚居東林上堂曰一葉落天下秋一塵起大地收鳥窠吹布毛便有人悟去今時學者為甚麼却大識自己良久曰莫錯怪人好上堂欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處會取還識得麼欲得不招無間業莫謗如來正法輪上堂諸人知處良遂總知良遂知處諸人不知作麼生是良遂知處乃曰鸕語鶴上堂仲冬嚴寒三界無安富者快樂貧者飢寒不識玄旨錯認定盤何也牛頭安尾上北斗面南看上堂一滴滴水一滴滴凍天寒人寒風動幡動雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾不出諸人十二時中尋常受用上堂元𫕟已過化主出門六羣比丘各從其類此衆無復枝葉純有貞實如是增上慢人退亦佳矣麒麟不為瑞鸑鷟不為榮麥秀兩岐禾登九穗總不消得但願官中無事林下棲禪水牯牛飽臥斜陽擔板漢清貧長樂粥足飯足俯仰隨時筯籠不亂攙匙老鼠不咬甑箄山家活計淡薄長情不敬功德天誰嫌黑暗女有智主人二俱不受良久曰君子愛財取之以道上堂去年寒食後今年寒食前日日是好日不是正中偏上堂客舍久留連家鄉夕照邊簷懸三月雨水沒兩湖蓮鑊漏燒燈盞柴生滿竈煙已忘南北念入望盡平川上堂向上一竅八面玲瓏覿面一機全身擔荷是則金鍮難掩非則玉石俱焚擬議不來銀山粉碎總不恁麼又且如何是非不挂娘生口自有旁人話短長上堂一塵起大地收一葉落天下秋甲己之年丙作首乙庚之歲戊為頭上堂栴檀林無雜樹鬱密深沉師子住所以栴檀叢林栴檀圍繞荊棘叢林荊棘圍繞一人為主兩人為伴成就萬億國土士農工商若夜叉若羅剎見行魔業優哉遊哉聊以卒歲僧問香嚴上樹話意旨如何曰描不成畫不就云李陵雖好手爭奈陷番何曰甚麼處去來問如何是佛曰汝是元固僧近前云喏喏師曰裩無襠袴無口問如何是佛曰志公和尚云學人問佛何故答志公和尚曰志公不是間和尚云如何是法曰黃絹幼婦外孫韲臼云是何章句曰絶妙好辭云如何是僧曰釣魚船上謝三即云何不直説曰賢沙和尚云三寶已蒙師指示向上宗乘事若何曰王喬詐仙得仙僧呵呵大笑師乃叩齒隆興甲申五月二十三日遍辭道俗示寂於昭覺火浴後設利甚富歸葬雲頂壽七十一臘五十四潭州大溈寶禪師上堂曰喚作竹篦則觸不喚作竹篦則背直須師子咬人莫學韓獹逐塊阿呵呵會不會金剛腳下鐵崑崙捉得明州憨布袋上堂千般言萬種喻只要教君早回去夜來一片黑雲生莫教錯却山前路咄真州靈巖東庵了性禪師上堂曰勘破了也放過一著是衲僧破草鞋現修羅相作女人拜是野狐精魅打箇圓相虗空裏下一點是小兒伎倆攔腮贈掌拂袖便行正是業識茫茫無本可據直饒向黑豆未生已前一時坐斷未有喫靈巖拄杖分敢問大衆且道為人節文在甚麼處還相委悉麼自從春色來嵩少三十六峰青至今上堂一葦江頭楊柳春波心不見昔時人雪庭要識安心土鼻孔依前塔上脣竪起拂子曰祖師來也還見麼若也見得即今薦取其或未然此去西天路迢迢十萬餘僧問人天交接如何開示曰金剛手裏八稜棒云忽被學人橫穿凡聖擊透玄關時又作麼生曰海門橫鐵柱問如何是獨露身曰壯丹華下睡貓兒建康府蔣山一庵善直禪師德安雲夢人初住白兆次居保寧蔣山上堂曰諸佛不曾出世人人鼻孔遼天祖師不曾西來箇箇壁立千仞高揖釋迦不拜彌勒理合如斯坐斷千聖路頭獨步大千沙界不為分外若向諸佛出世處會得祖師西來處承當自救不了一生受屈莫有大丈夫承當大丈夫事者麼出來與保寧爭交其或未然不如拽破好便下座師每以安州人解廝撲之語示衆劒州萬壽自護禪師上堂曰古者道若人識得心大地無寸土萬壽即不然若人識得心未是究竟處且那裏是究竟處拈拄杖卓一下曰甜瓜徹蒂甜苦瓠連根苦潭州大溈了庵景暈禪師上堂曰雲門一曲臘月二十五瑞雪飄空積滿江山塢峻嶺寒梅華正吐手把須彌槌笑打虗空鼓驚起驕梵鉢提冷汗透身如雨忿怒阿修羅王握拳當胸問云畢竟是何宗旨咄少室峯前亦曾錯舉臨安席靈隱誰庵了演禪師上堂曰面門拶破天地懸殊打透牢關白雲萬里饒伊兩頭坐斷別有轉身三生六十劫也未夢見在喝一喝下座泰州光孝草庵致遠禪師上堂舉女子出定乃曰從來打鼓弄琵琶須是相逢一會家佩玉鳴鸞歌舞罷門前依舊夕陽斜建寧府竹原宗元庵主郡之建陽人族連氏少號儒林秀傑年二十八悟世虗假乃禮西峯道聳舍縫腋而緇之徑趨大惠入室次慧舉巖頭見德山語問之師所疑頓釋久之分座西禪丞相張公浚師三山以數院迎居不就歸舊里結茆號衆妙園宿衲皆集士夫交請開法一無所從示衆曰若究此事如失却鎖匙相似只管尋來尋去忽然撞著噁在這裏開箇鎖了便見自家庫藏一切受用無不具足不假他求別有甚麼事示衆諸方為人抽釘楔我這裏為人漆釘著楔諸方為人解黏去縛我這裏為人加繩加索了送向深潭裏待他自去理會示衆主法之人氣吞宇宙為大法王若是釋迦老子達磨大師出來也教伊叉手向我背後立地直得寒毛卓堅亦未為分外一日舉世尊生下一手指天一手指地云天上天下唯我獨尊乃曰見怪不怪其怪自壞淳熙丙申十月初為衆普説勉勵學者修書別知己復遺囑訓諸徒至初十揮偈而寂闍維設利盈溢斂遺骨窆于園之右岡壽七十七夏五十近禮侍者三山人也侍大慧最久嘗默究竹篦話無所入一日入室罷求指示慧曰你是福州人我説箇喻向你如將名品荔枝和皮殼一時剝了以手送在你口裏只是你不解吞禮不覺失笑曰和尚吞却即禍事後問禮前日吞了底荔枝只是你不知滋味禮曰若知滋味轉見禍事溫州淨居尼妙道世居延平尚書黃公裳之女也幼絶嗜好每夜坐忘身父伺其言用無少隙積二十年授以僧服遍謁諸名宿時大慧來居洋嶼道即之值慧為衆入室問僧不是心不是佛不是物是箇甚麼道聞頓領厥旨慧可之劒守以福興盡禮迎補遷後毗陵資聖徙淨居慧之法嗣始自道也開堂日乃曰問話且止直饒有傾湫之辨倒嶽之機衲僧門下一點用不著且佛未出世時一事全無我祖西來便有許多建立列剎相望星分派列以至今日纍及兒孫遂使山僧於人天大衆前無風起浪向第二義門通箇消息語默該不盡底彌亘大方言詮説不及處遍周沙界通身是眼覿面當機電卷星馳如何湊泊有時一喝生殺全威有時一喝佛祖莫辨有時一喝八面受敵有時一喝自救不了且道那一喝是生殺全威那一喝是佛祖莫辨那一喝是八面受敵那一喝是自救不了若向這裏薦得堪報不報之恩脫或未然山僧無夢説夢去也拈起拂子曰還見麼若見被見刺所障擊禪床曰還聞麼若聞被聲麼所惑直饒離見絶聞正是二乘小果跳出一步蓋色騎聲全放全收主賓互換所以道欲知佛性義當觀時節因緣敢問諸人即今是甚麼時節蕩蕩仁風扶聖化熙熙和氣助升平擲拂了下座上堂舉僧問米胡自古上賢還達真正理也無胡曰達僧云只如真正理作麼生達曰當時霍光賣假銀城與單于時甚麼人作契書道曰福興當時若見只對他道自從胡亂後三十年不少鹽醬尼問如何是佛曰非佛云如何是佛法大意曰骨底骨董問言無展事語不投機時如何曰未屙已前墮坑落塹問古人道楞嚴經中五十種魔如今盡大地人參禪更高也出他魔界不得和尚還出得也未曰不入這保社平江府資壽尼無著道人妙總丞相蘇公頌之孫女也年三十許厭世浮休脫去緣節咨參諸老已入正信作夏徑山大慧升堂次舉藥山初參石頭後見馬祖因緣總聞豁然省悟慧下座不動居士馮公楫隨至方丈云某理會得適來和尚所舉公案慧曰居士如何云恁麼也不得囌嚧娑婆訶不恁麼也不得㗭哩娑婆訶恁麼不恁麼總不得囌嚧㗭哩娑婆訶慧舉似總總曰曾見郭象注莊子識者云却是莊子注郭象慧見其語異復舉巖頭婆子話問之總答偈曰一葉扁舟泛渺茫呈橈舞掉別宮商雲山海月都拋却羸得莊周蝶夢長慧休去馮公疑其所悟不根後過無錫招至舟中問云婆生七子六箇不遇知音只這一箇也不消得便棄在水中老師言道人理會得且如何會曰已上供通並是詣實馮公大驚慧拄牌次總入慧問古人不出方丈為甚麼却去莊上喫油餈云和尚放妙總過妙總方敢通箇消息慧曰我放你過你試道看云妙總亦放和尚過慧曰爭奈油餈何總喝一喝而出於是聲聞四方隆興改元舍人張公孝祥來守是郡以資壽挽開法入院日上堂曰宗乘一唱三藏絶詮祖令當行十方坐斷二乘聞之怖走十地到此猶疑若是俊流未言而諭設使用移星換斗底手假施攙旗奪鼓底機闕猶是空拳豈有實義向上一路千聖不傳學者勞形如猿捉影靈山付囑俯徇時機演唱三乘各隨根器始於鹿野苑轉四諦法輪度百千萬衆山僧今日與此界他方乃佛乃祖山河大地草木叢林現前四衆各轉大法輪交光相羅如寶絲網若一草一木不轉法輪則不得名為轉大法輪所以道於一毫端現寶王剎坐微塵裏轉大法輪乘時於其中間作無量無邊廣大佛事周遍法界一為無量無量為一小中現大大中現小不動步遊彌勒樓閣不反聞入觀音普門情與無情性相平等不是神通妙用亦非法爾如然於此倜儻分明皇恩佛恩一時報足且道如何是報恩一句天高羣象正海闊百川朝上堂舉雲門示衆云十五日已前即不問十五日已後道將一句來自代云日日是好日乃曰日日是好日佛法世法盡周畢不須特地覔幽玄只管鉢盂兩度濕上堂黃面老人橫説竪説權説實説法説喻説建法幢立宗旨與後人作榜樣為甚麼却道始從鹿野苑終至跋提河於是二中間未嘗説一字點檢將來太似抱贓叫屈山僧今日人事忙冗且放過一著便下座尼問如何是奪人不奪境曰野華開滿路遍地是清香云如何是奪境不奪人曰茫茫宇宙人無數幾箇男兒是丈夫云如何是人境俱不奪曰處處緑楊堪繫馬家家門底透長安云如何是人境兩俱奪曰雪覆蘆華舟橫斷岸人境已蒙師指示向上宗乘事若何總便打秦國夫人計氏法真自寡處屏去紛華常蔬食習有為法因大慧遣謙禪者致問其子魏公魏公留謙以祖道誘之真一日問謙徑山和尚尋常如何為人謙曰和尚只教人看狗子無佛性及竹篦子話只是不得下語不得思量不得向舉起處會不得向開口處承當狗子還有佛性也無無只恁麼教人看真遂諦信於中夜起坐以前話究之洞然無滯謙辭歸真親書入道槩略作數偈呈慧其後曰終日看經文如逢舊識人莫言頻有礙一舉一回新音釋邴音丙迎魚慶切嶼音敘勍音擎翛音蕭喃女咸切蛾音鵝徂昨胡切煦況羽切儡薄猥切唄音敗毅魚既切揣初委切慍委粉切癖音僻窖音教鞫音菊剜一丸切寵力董切濼音尾切鐙都鄧切聱五交切詬許候切儕士皆切礱音籠音慈穗繪音會鸑音嶽鷟食角切箄音篦韲相稽切獹音盧舍與捨同
