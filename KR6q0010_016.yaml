body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十五世臨濟十一世楊岐四世太平佛鑑慧勤禪師法嗣常德府文殊心道禪師眉之丹稜人族徐氏年三十得度具戒遊成都從師授唯識論自以為至有同齊詰之曰三界唯心萬法唯識今目前境象樅然心識安在師愕立遂出關依谷隱顯禪師歷十祀周流江淮抵舒之太平遇鑑小參舉趙州柏樹子話至覺鐵觜云先師無此語莫謗先師好因疑之求挂錫以宴寂為務一夕理前話豁如夢覺趨丈室擬敘所悟鑑首肯後命分座政和二年襄守遊公定夫請師開法天寧未幾擢大別文殊上堂曰師子顰伸象王哮吼雲門北斗裏藏身白雲因何喚作手三世諸佛不能知狸奴白牯却知有且道作麼生是他知有底事雨打梨華蛺蝶飛風吹柳絮毛毬走上堂拈拄杖直上指曰恁麼時刺破憍尸迦腳跟卓一下曰恁麼時卓碎閻羅王頂骨乃指東畔曰恁麼時穿過東海鯉魚眼睛指西畔曰恁麼時塞却西王母鼻孔且道總不恁麼時如何今年雨水多各宜頻曬眼宣和改元下紹改僧為德士上堂祖意西來事今朝特地新昔為比丘相今作老君形鶴氅披銀褐頭包蕉葉巾林泉無事客兩度受君恩所以欲識佛性義當觀時節因緣且道即今是甚麼時節毗盧遮那頂戴寶冠為顯真中有俗文殊老叟身披鶴氅且要俯順時宜一人既爾衆人亦然大家成立叢林喜得群仙衆會共酌迷仙酎同唱步虗詞或看靈寶度人經或説長生不死藥琴彈月下指端發太古之音棊布軒前妙著出神機之外進一步便到大羅天上退一步却入九幽城中只如不進不退一句又作麼生道直饒羽化三清路終是輪回一幻身二年九月復僧上堂不挂田衣著羽衣老君形相頗相宜一年半內間思想大底興𮕱各有時我佛如來預讖法之有難教中明載無不委知較量年代正在于茲魔得其便惑亂正宗僧改俗形佛更名字妄生邪解刪削經文鐃鈸停音鉢盂添足多般矯詐欺罔聖君賴我皇帝陛下聖德聖明不忘付囑不廢其教特賜宸章頒行天下仍許僧尼重新披削實謂寒灰再焰枯木重榮不離俗形而作僧形不出魔界而入佛界重鳴法鼓再整頽綱迷仙酎變為甘露瓊漿步虗詞翻作還鄉曲子放下銀木簡拈起尼師壇昨朝稽首擎拳今日和南不審只改舊時相不改舊時人敢問大衆舊時人是一箇是兩箇良久曰秋風也解嫌狼藉吹盡當年道教灰建炎三年春示衆舉臨濟入滅囑三聖因緣師曰正法眼藏瞎驢滅臨濟何曾有是説今古時人皆妄傳不信但看後三月至閏三月賊鍾相叛其徒欲奉師南奔者師曰學道所以了生死何避之有賊至師端坐自若賊扣而不答即舉槊殘之血皆白乳賊駭引席覆之而去壽七十二臘四十二塔于文殊五髻峯韶州南華知昺禪師蜀之永康人也久從佛鑑始蒙印可繼住太平法席鼎盛後奉旨居南華上堂曰此事最希奇不礙當頭説東鄰田舍翁隨例得一橛非唯貫聲色亦乃應時節若問是何宗八字不著人擊禪牀下座上堂日日説時時舉似地擎山爭幾許隴西鸚鵡得人鄰大都只為能言語休思惟帶伴侶智者聊聞猛提取更有一般也大奇貓兒偏解捉老鼠上堂以拄杖向空中攪曰攪長河為酥酪蝦蟹猶自眼搭眵卓一下曰變大地作黃金窮漢依前赤胳𩪸為復自家無分為復不肯承當可中有箇漢荷負得行多少人失錢遭罪再卓一下曰還會麼寶山到也須開眼勿使忙忙空手回上堂春光爛熳華爭發子規啼落西山月憍梵鉢提長吐舌底事分明向誰説啞潭州龍牙囌嚧智才禪師龍舒人族施氏年十八師事靈隱院道詮以試經下髮初謁三祖宗禪師次依佛鑑鑑一見曰異日大弘楊歧之道當在爾躬後見死心靈源圓悟皆冥符前記由是道聲四播潭帥服師之名以嶽麓延請開法踰三月遷龍牙欽宗皇帝登位衆官請上堂祝聖已就座拈拄杖卓一下曰朝奉疏中道本來奧境諸佛妙場適來拄杖子已為諸人説了也於斯悟去理無不顯事無不周如或未然不免別通箇消息舜日重明四海清滿天和氣樂升平延祥拄杖生歡嘉擲地山呼萬歲聲擲拄杖下座上堂彈指一下曰彈指圓成八萬門剎那滅却三祗劫若也見得行得健即經行困即歇若也不會兩箇鸕扛箇鱉示衆舉死心和尚小參曰若論此事如人家有三子第一子聰明智慧孝養父母接待往來主掌家業第二子頑狡猾貪淫嗜酒倒街臥巷破壞家業第三子盲聾喑啞菽麥不分是事無能只會喫飯三人中黃龍要選一人用更有四句死中有活活中有死死中常死活中常活將此四句驗天下衲僧師曰喚甚麼作四句三人姓甚名誰若也識得與黃龍把手並行更無纖毫間隔如或未然不免借水獻華去也三人共體用非用四句同音空不空欲識三人并四句金烏初出一團紅師每登座凡有所問皆答曰囌嚧故叢林稱之居龍牙十三載以清苦蒞衆衲子敬畏大帥席公震遷住雲溪經四稔紹興戊午八月望俄集衆付寺事仍書偈曰戊午中秋之日出家住持事畢臨行自己尚無有甚虗空可覔其垂訓如常二十三日再集衆示問曰涅槃生死盡是空花佛及衆生並為增語汝等諸人合作麼生衆皆下語不契師喝曰苦苦復曰白雲湧地明月當天言訖囅然而逝火浴日緇白會送者數千人慟震林壑獲設利五色者夥併靈骨塔於寺之西北隅世壽七十有二臘戒四十有二慶元府蓬萊鄉禪師上坐曰有句無句如藤倚樹且任諸方點頭及乎樹倒藤枯上無衝天之計下無入地之謀靈利漢這裏著得一雙眼便見七縱八橫舉拂子曰看看一曲兩曲無人會雨過夜堂秋水深上堂杜鵑聲裏春光暮滿地落花留不住琉璃殿上絶行蹤誰人解插無根樹舉拄杖曰這箇是無根底且道解開華也無良久曰只應連夜雨又過一年春上堂蓬萊突兀無遮護鐵壁銀山無入處有時關棙一時開放出毒蛇當大路參禪人早回顧莫待臨時生怕怖荊棘林中暗坐時百尺竿頭須進步三十三人老古錐象轉龍蟠曾指注休指注成露布蚊子上鐵牛無你下觜處上堂舉法眼道識得凳子周匝有餘雲門道識得凳子天地懸殊師曰此二老人一人向高高山頂立一人向深深水底行然雖如是一不是二不成落花流水裏啼鶯間亭雨歇夜將半片月還從海底生湖州何山佛燈守珣禪師郡之安吉人族施氏甫冠師寶梵院道才剃染即謁徑山常悟禪師久之隨往隱靜悟問曰登天不假梯遍地無行路時如何云清光何處無悟稱善師退謂同衣曰一語偶投非解脫法棄參廣鑑行瑛禪師不契遂造太平隨衆咨請彌扣彌深始知所見未出常情乃封其衾曰此生若不徹去誓不展此於是晝坐宵立逾七七日鑑忽上堂謂衆曰森羅及萬象一法之所印師聞頓悟尋語鑑鑑詰曰靈雲道自從一見桃華後直至如今更不疑如何是他不疑處云莫道靈雲不疑只今覔箇疑處了不可得曰賢沙道諦當甚諦當敢保老兄未徹在那裏是他未徹處云深知和尚老婆心切鑑然之師拜起呈偈曰終日看天不舉頭桃華爛熳始擡眸饒君更有遮天網透得牢關即便休鑑囑令護持是夕厲聲謂衆曰這回珣上座穩睡去也鑑移蔣山命分座説法出住廬陵之禾山退藏故里道俗迎居天聖後徙何山及天寧上堂曰轢𨍏鑽住出斧佛祖出頭未輕與縱使醍醐滿世間你無寶器如何取阿呵呵神山打鑼道吾作舞甜瓜徹蒂甜苦瓠連根苦上堂舉婆子燒庵話師曰大凡扶宗立教須是其人你看他婆子雖是箇女人宛有丈夫作略二十年篩油費醬固是可知一日向百尺竿頭做箇失落直得用盡平生腕頭氣力自非箇俗漢知機洎乎巧盡拙出然雖如是諸人要會麼雪後始知松柏操事難方見丈夫心上堂如來禪祖師道切忌將心外邊討從門所得即非珍特地埋藏衣裏寶禪家流須及早撥動祖師關棙抖擻多年布襖是非毀譽付之空竪闊橫長渾恰好君不見寒山老終日嬉嬉長年把掃人問其中事若何入荒田不揀信手拈來草參僧問如何是賓中賓曰客路如天遠𬾃門似海深云如何是賓中主曰長因送客處憶得別家時云如何是主中賓曰相逢不必問前程云如何是主中主曰一朝權祖令誰是出頭人云賓主已蒙師指示向上宗乘事若何曰向上問將來云如何是向上事曰大海若知足百川應倒流僧禮拜師曰珣上座三十年學得底師入院日謂衆曰兄弟如有省悟處不抅時節請來露箇消息雪夜有僧扣方丈門師起秉燭震威喝曰雪深夜半求決疑情因甚麼威儀不具僧顧視衣裓師逐出院每曰先師只年五十九吾年五十六矣來日無多紹興甲寅解制退天寧之席謂雙槐居士鄭績曰十月八日是佛鑑忌則吾時至矣丐還鄣南十月四日鄭公遣弟僧道如訊之師曰汝來正其時也先一日不著便後一日蹉過了吾雖與佛鑑同條生終不同條死明早可為我尋一雙小船子來如云要長者要高者曰高五尺許越三日雞鳴端坐如平時侍者請辭世偈師曰不曾作得言訖而逝十一月四日闍維舌根不壞郡人陳師顏以寶函藏其家門弟子奉靈骨塔于普應院之側隆興府泐潭明禪師上堂舉趙州訪茱萸探水因緣師曰趙老雲收山嶽露茱萸雨過竹風清誰家別館池塘裏一對鴛鴦畫不成又舉德山托鉢話曰從來家富小兒嫡偏向江頭弄畫橈引得老爺把不住又來船上助歌謠台州寶藏本禪師上堂曰清明已過十餘日華雨闌方寸深春色惱人眠不得黃鸝飛過緑楊陰遂大笑下座住烏鎮壽聖日大慧禪師行化至師上堂敘謝畢乃曰鮑老當年笑郭郎郭郎舞袖太郎當及乎鮑老當場舞鮑老郎當勝郭郎下座大慧炷香拜之吉州大中祥符清海禪師初見佛鑑鑑問三世諸佛一口吞盡何處更有衆生可教化此理如何師擬進語鑑喝之師忽領旨述偈曰實際從來不受塵箇中無舊亦無新青山況是吾家物不用尋家別問津鑑曰放下著師禮拜而出漳州淨衆佛真了璨禪師泉南羅氏子上堂顧四衆曰昨夜安排得兩段禪末後一句也用不著今朝打鼓升堂一句也未嘗安排但見諸人蔟蔟上來山僧不免胡説亂説鬍張三黑李四箇箇解唱囉囉哩雖然如是入著光孝門未免穿過髑髏換了眼睛參上堂重陽九日菊華新一句明明亘古今楊廣橐駝無覔處夜來足迹在松陰隆興府谷山海禪師上堂一舉不再説已落二三相見不揚眉翻成造作設使動絃別曲告往知來見鞭影便行望剎竿回去腳跟下好與三十棒那湛更向這裏撮摩石火收捉電光工夫枉用渾間事笑倒西來碧眼胡卓拄杖下座龍門佛眼清遠禪師法嗣溫州龍翔竹庵士圭禪師成都人族史氏世宗儒師妙齡明敏年十三求為僧父母難之輒不食伯父使從其志依城下大慈宗雅剃染心醉楞嚴逾五秋南遊謁玉泉勤雲蓋智百丈肅靈源清有年始登龍門即以平時所得白佛眼眼曰汝解心已極但欠著力開眼耳遂職堂司一日侍立次問云絶對待時如何曰如汝僧堂中白椎相似師罔措眼至晚抵堂司師復以前話問之眼曰間言語師於言下大悟眼曰今無復言政和末和守錢公景述請開法天寧次遷褒禪東林及西山繼徙聖泉鼓山尋奉詔移鴈蕩能仁紹興乙丑蒙恩補江心龍翔上堂曰萬年一念一念萬年和衣泥裏輥洗腳上床眠歷劫來事只在如今大海波濤湧小人方寸深拈起拄杖曰汝等諸人未得箇入頭須得箇入頭既得箇入頭須有出身一路始得大衆且作麼生是出身一路良久曰雪壓難摧澗底松風吹不動天邊月卓挂杖下座上堂萬機不到眼見色耳聞聲一句當堂頭戴天腳踏地你諸人只知今日是五月初一殊不知金烏半夜忙忙去玉兔天明上海東以拂子擊禪床下座上堂明明無悟有法即迷諸人向這裏立不得諸人向這裏住不得若立則危若住則瞎直須意不停玄句不停意用不停機此三者既明一切處不須管滯自然現前一切處不須照顧自然明白雖然如是更須知有向上事久雨不晴咄上堂一葉落天下秋欲窮千里目更上一層樓一塵起大地收嘉州打大像陝府灌鐵牛明眼漢合作麼生良久曰久旱簷頭句橋流水不流卓拄杖下座上堂今朝八月二十五老禪問你諸人且道是八月二十五不是八月二十五若道不是是何言歟若道是瞞上座即得爭奈諸聖眼何乃擊禪床下座上堂見見之時見非是見見猶離見見不能及落華有意隨流水流水無情戀落華諸可還者自然非汝不汝還者非汝而誰長恨春歸無覔處不知轉入此中來喝一喝曰三十年後莫道能仁教壞人家男女上堂僧問如何是祖師西來意曰東家點燈西家暗坐云未審意旨如何曰馬便搭鞍驢便推磨僧禮拜師曰靈利衲僧只消一箇遂曰馬搭鞍驢推磨靈利衲僧只消一箇縱使東家明點燈未必西家暗中坐西來意旨問如何多口何師自招禍問如何是第一義曰你問底是第三義問狗子還有佛性也無趙州道無意旨如何曰一度著蛇咬怕見斷井索問燕子深談實相善説法要此理如何曰不及鴈銜蘆問如何是佛曰華陽洞口石烏龜問魯祖面壁意旨如何曰金木水火土羅睺計都星問有句無句如藤倚樹時如何曰作賊人心虗云國師三喚侍者又作麼生曰打鼓弄胡猻鼓破胡猻走丙寅七月十八日召法屬長老宗範付後事遺偈曰前三十一中九下七老人言盡處龜哥眼睛赤次日沐浴更衣申令聲大鐘亥至衆集處就座泊然趨寂茶毗送者均獲設利奉靈骨塔于鼓山壽六十四臘五十一南康軍雲居高庵善悟禪師洋之興道人族李氏年十一去家業經得度有夙慧聞沖禪師舉武帝問達磨因緣如獲舊物遽曰我既廓然何聖之有沖異其語勉之南詢蒙授記於龍門一日有僧被蛇傷足佛眼問曰既是龍門為甚麼却被蛇咬師即應曰果然現大人相眼益器之初住吉之天寧遷雲居七稔敕徙金山以疾辭得免上堂曰少林面壁懷藏東土西天歐阜升堂充塞四維上下致使山巍巍而砥掌平水昏昏而常自清華非艷而結空果風不搖而片葉零人無法而得咨問佛無心而更可成野淡飯廷時日任運隨緣道自靈畢竟如何日午打三更遂寧府西禪文璉禪師郡之長江人族張氏天姿頴邁幼從鄉先生趙嗣業頗通儒趙以遠大期之師飄然有出塵志徑依崇福院希澄年二十三剃髮詣成都表言講席聽圓覺起信深得其旨會圓悟歸昭覺往依之久無所入遂東下謁谷隱顯洞山淵復無所證晚抵龍門宴坐忘寢食佛眼憐其為道之篤一夕携師縱步至普現坡下顧師曰望州亭與汝相見了也烏石嶺與汝相見了也師於言下證無生忍佛眼翌日登堂對衆印之道譽籍甚閲三年以母老丐還眼贈以偈曰烏石嶺望州亭意未舉道先成十年辛苦遊江海此日言歸不問程桑梓無別路行藏在守護果熟自然香記取來時步復書曰禪者璉上人操心珠入龍岫得之還故丘不忘本也仍率罷參宿衲數十餞之於是泝流歸肆業築堂高隱靖康元郡守更西禪律居迎師開法上堂曰一向恁麼去直得凡聖路絶水泄不通鐵蛇鑽不入鐵鎚打不破至於千里萬里鳥飛不度一向恁麼來未免灰頭土面帶水拖泥唱九作十指鹿為馬非唯辜負先師亦乃埋沒己靈敢問大衆且道恁麼去底是恁麼來底是芍藥華開菩薩面棕櫚葉散夜叉頭上堂諸方浩浩談玄每日撞鐘打鼓西禪無法可説勘破燈籠露柱門前不置下馬臺免被傍人來借路若借路須照顧腳下若參差邯鄲學唐步上堂心生種種法生森羅萬象縱橫信手拈來便用日輪午後三更心滅種種法滅四句百非路絶直饒達磨出頭也是眼中著屑心生心滅是誰木人携手同歸歸到故鄉田地猶遭頂上一鎚上堂正月孟春猶寒直下言端語端拈起衲僧鼻孔穿開祖佛心肝知有者達磨不來東土二祖不往西天不知有者誰知當面蹉過迢迢十萬八千山僧為你重説偈言大衆莫教辜負孟春猶寒上堂舉外道問佛今日説甚麼法曰説定法明日又問今日説甚麼法曰不定法云昨日為甚麼定今日為甚麼不定曰昨日定今日不定師曰作日與今日説定説不定寰中天子敕塞外將軍令外道當年入夢鄉直至如今猶未省僧問師子未出窟時如何曰爪牙已露云出窟後如何曰龍頭蛇尾云出與未出時如何曰正好喫棒問以一重去一重即不問不以一重去一重時如何曰闍梨有許多工夫紹興十四年十一月忽示疾二十八日端坐訓徒手書命本院書記希秀嗣法住持捐囊資益田瞻衆囑纍訖有請以頌者師曰先師龍門最後垂範嘗曰無世可辭無法可説無頌可留吾豈負先師意耶語卒而化壽七十二臘五十一隆興府黃龍牧庵法忠禪師四明人族姚氏七歲師鄞縣國寧道英十九試經得度習台教悟一心三觀之旨而未能泯迹歷扣名緇至龍門覩水磨旋轉發明心要述偈曰轉大法輪目前包裹更問如何水推石磨呈佛眼眼曰其中事作麼生云澗下水長流眼曰我有末後一句待分付汝師即掩耳而出乃之廬山於同安枯樹中絶食清坐宣和間湘潭大旱禱不應師躍入龍淵呼曰業畜當雨一尺雨隨至居南嶽後洞木食澗欲侶虎豹猿狖二十年著正心論十卷每跨虎出遊儒釋望塵而拜紹興甲寅秋樞密折公彥質染疏親往以勝業力挽開法師嘉其勤渠乃赴未幾移南木雲蓋謝事復應二聖越壃及大溈之請晚居黃龍上堂曰張公喫酒李公醉子細思量不思議李公醉醒問張公恰使張公無好氣無好氣不如歸家且打睡上堂今朝正月半有事為君斷切忌兩眼睛被他燈火換上堂我有一句子不借諸聖口不動自己舌非聲氣呼吸非情識分別假使淨名杜口於毗耶釋迦掩室於摩竭大似掩耳偷鈴未免天機漏泄直饒德山入門便棒臨濟入門便喝若向牧庵門下檢點將來只得一橛千種言萬般説只要教君自家歇一任大地虗空七凹八凸僧問如何是佛曰莫向外邊覓云如何是心曰莫向外邊尋云如何是道曰莫向外邊討云如何是禪曰莫向外邊傳云畢竟如何曰靜處薩婆訶問大衆臨筵請師舉唱師竪起拂子僧云乞師再垂方便師擊禪床一下己巳十一月示少恙至望丈室後有白氣二道搖曳而出師遽曰吾期至矣令集衆囑付殆盡引筆書偈而寂塔于香原洞掩壙罷大雪獨覆區所壽六十臘四十七衢州烏巨雪堂道行禪師括蒼人族葉氏父仲諶仕二千石捿心祖道號見獨居士母陶氏夢苾芻抵其室而孕既生莊重警敏甫志學有出塵志然書考屢前列間從天寧微禪師遊於言下知歸以出家陳父母乃聽年十九禮普照覺印英禪師授僧伽梨首謁指源潤禪師無所入徑之龍門質其所得佛眼諭曰到真實不疑方有語話分師無對一日舉賢沙築著腳指師契悟即趨方丈眼曰悟即不無要是千里之起足若向箇裏扶持起來甚生次第事令侍右踰八周辭省親郡守侍御黃公葆光結庵於黃堂後圃力致之建炎二年中散徐公康國來守是郡堅請開法於壽寧次遷法海天寧烏巨大播玄風後名藩賢侯以甲剎迎之者八師悉辭諸方益加尊仰紹興戊辰鄱陽守陳公璹命樞蜜何公若編修趙公廉裔躬往虔請師不得已而從之上堂曰會即便會玉本無瑕若言不會碓觜生花試問九年面壁何如大會拈華南明恁麼商確也是順風撒沙參上堂雲籠嶽頂百鳥無聲月隱寒潭龍珠自耀正當恁麼時直得石梁忽然大悟石洞頓爾心休虗空開口作證溪北石僧點頭諸人總在這裏瞌睡笑殺陝府鐵牛上堂佛説三乘十二分頓漸偏圓癡人面前不得説夢祖師西來直指人心見性成佛癡人面前不得説夢臨濟三玄雲門三句洞山五位癡人面前不得説夢南明恁麼道還免得遭人檢責也無所以古人道石人機似汝也解唱巴歌汝若似石人雪曲也應和還有和雪曲底麼若有喚來與老僧洗腳上堂通身是口説得一半通身是眼用得一橛用不倒處説有餘説不到處用無盡所以道當用無説當説無用用説同時用説不同時諸人若也擬議西峰在你腳底到國清衆請上堂句亦剗意亦剗絶毫絶釐處如山如嶽句亦到意亦到如山如嶽處絶毫絶𨤲忽若拶通一線意句俱到俱不倒俱剗俱不剗直得三句外絶牢籠六句外無標的正當恁麼時一句作麼生道傾蓋同途不同轍相將携手上高臺上堂舉趙州示衆云老僧除却二時齋粥是雜用心處師曰今朝六月且行者擊鼓長老升堂你諸人總來這裏雜用心上堂舉僧問雲門如何是驚人句門云響師曰雲門答這僧話不得便休却鼓粥飯氣以當平生示衆黃梅雨麥秋寒恁麼會太無端時節因緣佛性義大都須是髑髏乾二十一年春示疾門弟子教授注公喬年至省候師以後事委之示以偈曰識則識自木心見則見自本性識得本心本性正是宗門大病注曰爛泥中有刺莫道不疑好乃二月九日也黎明沐浴易服加趺而逝郡守躬營後事道俗瞻禮歎未曾有十七日闍維𮌎腋出銀液不斷皆五色設利也煙所至纍然綴之人得以市齒舌不壞建窣堵波於寺之西壽六十三夏四十五撫州白楊法順禪師綿之魏城人族文氏神觀秀發齠時夜視如晝父母異之捨出家依鹽泉香積奉禪師年十八落髮受具崇寧初遍遊禪會抵襄陽造谷隱靜覺之室留數載聞佛眼説法龍門即之一日眼上堂舉傅大士心王銘曰水中鹽味色裏膠青只聞其有不見其形師於言下有省後觀寶藏迅轉頓明大法趨丈室作禮呈喝曰頂有異峰雲冉冉源無別派水冷冷遊山未到山窮處終被青山礙眼睛眼笑而可之龍圖蔣公璨出守是那服師大名以白楊迎居衲子蜂集上堂曰好事堆堆疊疊來不須造作與安排落林黃葉水堆去橫谷白雲風卷回寒鴈一聲情念斷霜鐘才動我山摧白楊更有過人處盡夜寒爐撥死灰忽有箇衲僧出來道長老少賣弄得恁麼窮乞相山僧只向他道却被你道著上堂我手何似佛手天上南星北斗我腳何似驢腳往事都來忘却人人盡有生緣箇箇足方頂圓大愚灘頭立處孤月影射深灣會不得見還難一曲漁歌過遠灘示衆染緣易就道業難成不了目前萬緣差別只見境風浩浩凋殘功德之林心火炎夕燒盡菩提之樹道念若同情念成佛多時為衆一似為身彼此事辦不見他非己是自然上敬下恭佛法日日現前煩惱時時解脫師律身清苦自住山出入杖笠獨行而已歲序因袖刺賀郡守嘗仆雪中有偈曰垂老住山寺參官走道途前村雪嶺上𨈀倒沒人扶紹興己未五月十一日感微疾夜聞曉鐘遂憑陵喝之侍僧趨省已坐亡矣闍維收設利目睛齒舌數珠同靈骨塔于寺之西壽六十四臘四十七南康軍雲居法如禪師丹丘臨海人族胡氏依護國瑞禪師祝髮登具備參浙右諸宗匠晚至龍門以平日所證白佛眼眼曰此皆學解非究竟事欲了生死當求妙悟師駭然諦信一日命主香積以道業未辨固辭眼勉曰姑就職其中大有人為汝説法未幾晨興開厨門望見聖僧契所未證入白佛眼眼曰這裏還見聖僧麼師詣前問訊叉手而立眼曰向汝道大有人為汝説法師禮拜示衆機語未見南康軍歸宗真牧正賢禪師潼川郪縣人族陳氏世為名儒幼從三聖海澄為苾芻具滿分戒遊成都依大慈秀公習經論凡典籍過目成誦義亦頓曉秀稱為經藏子正覺顯禪師見之令著鞭荷負大法會圓悟禪師來居昭覺悟勉之南詢乃謁死心靈源湛堂皆蒙委寄遂扣佛眼一日入空眼舉殷勤抱得旃檀樹語聲未絶師即頓悟眼曰經藏子漏逗了也自是與師商確淵奧亹亹無盡眼稱善因手書真牧二字授之紹興己巳歸宗虗席郡侯以禮請堅臥不應寶文李公懋嘗問道於師同屬宮強之乃就上堂曰且第一句如何道汝等若向世界未成時父母未生時佛未出世時祖師未西來時道得已是第二句且第一句如何道直饒你十成道得未免左之右之卓拄杖下座上堂良久召大衆曰作麼生若也擬議賢上座瞞你諸人去也打地和尚嗔他祕魔巖主擎箇叉兒胡説亂道遂將一摑成韲粉散在十方世界還知麼舉拂子曰而今却在拂子頭上説一切智智清淨無二無二分無別無斷故還聞麼閻老子知得乃云賢上座你若相當去不妨奇特或不相當總在我手裏只向他道閻老子你也退步摸索鼻孔看擊禪床下座僧問久點斯要已泄真機學人上來請師開示曰耳朵在甚麼處云一句分明該萬象曰分明底事作麼生云台星臨照枯木回春曰換却你眼睛湖州道場正堂明辨禪師本郡人族俞氏年十九事報本蘊禪師圓顱受具辭謁徑山妙湛慧禪師慧移補淨慈因與月堂昌翠巖宗往扣保寧璣禪師及諸名宿晚依佛眼眼問從上祖師方册因緣許你會得忽舉拳曰這箇因何喚作拳師擬對眼築其口曰不得作道理於是頓去知見遂作禮眼曰這鈍漢師笑而趨出後造道林參圓悟禪師深蒙印可既而旋里父母亡乃廬其墓待制葛公勝仲訪師議論警合守郡日檄徐簿敦濟以天聖致請師遁古墓中使者往返數四後為吏所迹不得辭久之左亟葉公夢得以積善命為第一祖謝事庵居作頌古百首繼住何山衆數千指又遷道場徙衛林為鼻祖上堂曰猛虎口邊拾得毒蛇頭上安排更不釘樁搖櫓回頭別有生涯婆子被我勘破了大悲院裏有村齊上堂淨五眼湧金春色晚得五力吹落碧桃華唯證乃知難可測卓拄杖曰一片何人得流經十萬家上堂三祖道但莫憎愛洞然明白當時老僧若見便與一摑且道是憎耶是愛耶近來經界稍嚴不許詭名挾佃解夏上堂十五日已前不得去少林雙履無藏處十五日已後不得住桂子天香和雨露正當十五日又且如何阿呵呵風流不在著衣多育王遺書至上堂黃龍頭角從來異不與今時歲月爭復妙回途何處去月明終夜照虗堂嗚呼無示老人道傳龍岫德播寰中居常吒吒呀呀時塞斷天下人舌頭有時玲玲瓏瓏時通透卓長靈鼻孔驢腳行時收佛手誰是知音拳頭舉處覔生緣了無向背三十載入泥入水今年五月十三日始見長人回途大地覔無蹤只有衲僧知去處山僧今日盡施三昧大展神通直得蕩蕩地絶絲毫巍巍然無背面猶覔他蹤迹不得適來為甚麼却道衲僧知去處還道得麼拄杖子忍俊不禁為你諸人道去也卓一下曰春前得雨華開早秋後無霜葉落遲上堂舉僧問投子大死底人却活時如何子云不許夜行投明須到師曰我疑千年蒼玉精化為一片秋水骨海神欲護護不得一旦鰲頭忽擎出上堂舉須菩提持鉢維摩詰家滿盛香飯云汝能謗於佛毀於法不入衆數乃可取食須菩提不知是義置鉢而去師曰當時若有箇漢倒拈蝎尾逆捋虎鬚擺手出荊棘林才見他道謗於佛毀於法不入衆數乃可取食但對他道賢賢易色事父母能竭其力事君能致其身與朋友交言而有信直饒淨名老人也須倒退三千里上堂華開隴上綻柳堤邊黃鶯調叔夜之琴芳草入謝公之句何必聞聲悟道見色明心非唯水上覔漚已是眼中著屑擘開𮌎曰汝等當觀吾紫磨金色之身今日則有明日則無大似無風起浪全不知羞且道今日事作麼生好箇迷逢達磨不知誰解承當雙槐居士鄭參議入山上堂佛鑑腦後眼不親瞎却何山珣佛燈佛燈照破四天下又被禹功吹滅却從茲大地黑漫漫物物拈來總一般試問一般何所似蓮華在水葉長乾禹功參議中大使斾俯臨既是屋裏人方説屋裏話不欲世諦飾詞浼瀆台聽今日到這裏所以楊歧門下鍋子大小枸柄短長鼻孔輕重一時被他覷見了也汝等諸人各自照顧雖然如是要且有一處未知端的且道道場八功德池水深多少有幾箇赤捎鯉魚且寬數日方知底裏始信道場逐日吞却三箇四箇吐却七箇八箇豈不見百靈和尚問龐居士曰居士得力句還曾舉似人麼云曾舉來曰舉似阿誰龐以手指胸云龐公龐却問百靈阿師得力句還曾舉似人麼曰曾舉來云舉似阿誰靈戴笠子便行龐云善為道路師曰龐公大似堂前開飯店經紀屋裏人百靈正如馬前相撲步步不虧今日忽有人問道場如何是參議見佛燈得力句只向道上士由山水中仁坐竹林渠若云曾舉似人麼只向道立行方回也文才比仲壬上堂舉溈山問仰山天寒人寒話師曰一問一答玉線交羅雲錦段成了無滲漏若也見得方知溈仰父子唱拍相隨其或未然更為諸人頌出吹盡風流大石調唱出富貴黃鍾宮舞腰催拍月當曉更進蒲萄酒一鍾上堂舉僧問趙州狗子還有佛性也無州云無師曰若於這一句下見得千句萬句一時百雜碎遂喝曰切忌立地作夢且道畢竟如何狗子佛性有毗盧愛飲彌勒酒狗子佛性無文殊醉倒普賢扶扶到家中全酩酊胡言漢語罵妻孥僧問蓮華未出水時如何曰七尺八尺云出水後如何曰三尺四尺問如何是祖師西來意曰毒蛇無角最威獰云便恁麼會時如何曰梁山務長云只如教意又作麼生曰長江滾不休問如何是曹洞宗曰鶴宿梧枝云如何是雲門宗曰木馬上金梯云如何是溈仰宗曰目前無異草云如何是臨濟宗曰我終不向你説問如是何佛師乃鳴指三下問語點涉離微如何通不犯曰橫身三界外獨脫萬機前云只如風冗道長憶江南三月裏鷓鴣啼處百華香又作麼生曰説這不唧𠺕漢作麼云嫩竹搖金風細細百華鋪地日遲遲曰你向甚麼處見風冗云眼裏耳裏絶瀟灑曰料掉沒交涉問蓮華未出水時如何曰未過冬至莫道寒云出水後如何曰未過夏至莫道熱云出與未出時如何曰三十年後不要錯舉問如何是佛曰無柴猛燒火云如何是法曰貧做富裝裹云如何是僧曰賣扇老婆手遮日云如何是和尚栗棘蓬曰不答此話云為甚麼不答師大笑曰吞不進吐不出問如何是一喝如金剛王寶劒曰古墓毒蛇頭戴角云如何是一喝如踞地師子曰虗空笑點頭云如何是一喝如探竿影草曰石人拍手笑呵呵云如何是一喝不作一喝用曰布袋裏豬頭云四喝已蒙師指示向上還有事也無曰有云如何是向上事曰鋸解稱鎚隨聲便喝佛眼禪師忌師拈香曰龍門和尚闡提潦倒不信佛法滅除禪道拶破毗盧向上關貓兒洗面自道好一炷沉香爐上然換手槌𮌎空懊惱遂搖手曰休懊惱以坐具搭肩上作女人拜曰莫怪下房媳婦觸忤大人好室中垂問曰貓兒為甚麼愛捉老鼠又曰板鳴因甚麼狗吠紹興二十七年二月上浣遊寺之西原指地謂侍僧令役工治小塔三月旦示少恙翌日衛侯遣醫來師笑曰藥能愈人世無死者寄語衛公佐國厚自重初六日侍僧告塔將就師遣擊鼓集衆師登座拈拄杖於左邊卓一下曰三十二相無此相於右邊卓一下曰八十種好無此好僧瑤一筆畫成志公露出藁草又卓一下顧大衆曰莫懊惱直下承當休更討下座歸方丈儼然趺坐而逝壽七十有三夏五十有四火後收靈骨設利藏所建之塔曰仙人山潭州方廣深禪師僧問一法若有毗盧墮在凡夫萬法若無普賢失其境界未審意旨如何曰富嫌千口少貧恨一身多世奇首座者成都人也遍依師席晚造龍門一日因請益次大豁所疑眼命分座奇固辭曰此非細事也如金針刺眼毫髮若差睛則破矣願生生居學地而自煅煉眼尤尚之暮年學者力請不容辭因説偈曰諸法空故我心空我心空故諸法同諸法我心無別體只在而今一念中且道是那一念衆罔措奇喝一喝而終溫州淨居尼慧溫示衆舉法眼上堂云三通鼓罷蔟蔟上來佛法人事一時周畢溫曰山僧道三通鼓罷蔟蔟上來拄杖不在苕帚柄聊與三十音釋稜盧登切樅音愕逆各切氅齒兩切讖楚禁切槊音朔啞於雅切音慈喑音音囅丑忍切珣音荀衾區音切𨍏達各切抖音斗擻音叟裓古得切泐音勒褒補刀切剃丈九切棕祖紅切泯音敏凹於交切凸徒結切藩方煩切鄱蒲禾切璹音孰剗楚限切液音亦灣烏還切郪音妻亹音尾擎渠京切摑吉獲切韲箋西切櫓音魯呀虗加切捋郎括切擘博厄切滲所禁切唧子栗切掉徒弔切闡齒善切潦音老藁古老切
