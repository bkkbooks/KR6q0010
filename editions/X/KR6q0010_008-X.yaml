body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十三世臨濟九世楊岐二世白雲守端禪師法嗣蘄州五祖法演禪師綿之巴西人族鄧氏年三十五始棄家祝髮受具往成都習唯識百法論因聞菩薩入見道時智與理冥境與神會不分能證所證西天外道嘗難比丘曰既不分能證所證却以何為證無能對者外道貶之令不鳴鍾鼓反披袈裟三藏弉法師至彼救此義曰如人飲水冷暖自知乃通其難師曰冷暖則可知矣作麼生是自知底事遂質本講曰不知自知之理如何講莫疏其問但誘曰汝欲明此當往南方扣傳佛心宗者即負笈出關由京師渡淮浙所見尊宿無不以此語咨決所疑終不破後謁浮山圓鑑禪師鑑舉如來有密語迦葉不覆藏令究之及朞一日謂曰子來何晚吾老矣恐虗度子光陰可往依白雲此老雖後生吾未識面但見渠頌臨濟三頓棒話有過人處必能了子大事師澘然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片閑田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事未幾雲至語師曰儞知一件事麼云不知曰近日有數禪客自廬山來皆有悟入處教伊說亦說得有來由舉因緣問伊亦明得教伊下語亦下得只是未在師聞愕眙曰既悟了說亦說得明亦明得如何却未在狐疑七日忽偃息洞然昭徹曰元來恁麼地其胸中珍惜到此盡去走見白雲雲為手舞足蹈師亦一笑而已雲一日示眾曰古人道如鏡鑄像像成後鏡在甚麼處眾下語不契舉以問師師近前問訊曰也不較多雲笑曰須是道者始得乃命分座開示方來初住四面遷白雲晚居東山上堂曰古人道我若向你道即禿却我舌若不向你道即啞却我口且道還有為人處也無四面有時擬為你吞却只被當門齒礙擬為你吐却又為咽喉小且道還有為人處也無乃曰四面自來柳下惠上堂結夏無可供養大眾作一家醼管顧諸人遂擡手曰囉邏招囉邏搖囉邏送莫怪空疎伏惟珍重上堂白雲不會說禪三門開向兩邊有人動著關棙兩片東扇西扇上堂一向恁麼去路絕人稀一向恁麼來辜負先聖去此二途祖佛不能近設使與白雲同生同死亦未稱乎生何也鳳凰不是凡閒物不得梧桐誓不栖上堂千峰列翠岸柳垂金樵父謳歌漁人鼓舞笙簧聒地鳥語呢喃紅粉佳人風流公子一一為汝諸人發上上機開正法眼若向這裏薦得金色頭陀無容身處若也不會喫粥喫飯許你七穿八穴上堂此箇物上拄天下拄地皖口作眼皖山作鼻太平退身三步放你諸人出氣上堂狗子還有佛性也無也勝貓兒十萬倍上堂太平淈𣸩漢事事盡經徧如是三十年也有人讚歎且道讚歎箇甚麼好箇淈𣸩漢上堂難難幾何般易易沒巴鼻好好催人老默默從此得過這四重關了泗州人見大聖參上堂你等諸人見老和尚鼓動脣吻竪起拂子便作勝解及乎山禽聚集牛動尾巴却將作等閑殊不知簷聲不斷前旬雨電影還連後夜雷謝監收上堂人之性命事第一須是欲得成此先須防於若是真人上堂有佛處不得住換却你心肝五臟無佛處急走過留聲三千里外逢人不得錯鴈過舉出門便錯恁麼則不去也種粟却生豆摘楊華摘楊華不覺日又夜爭教人少年上堂悟了同未悟歸家尋舊路一字是一字一句是一句自小不脫空兩歲學移步湛水生蓮華一年生一度上堂舉陸亘大夫問南泉和尚弟子家中有一片石也曾坐也曾臥擬鐫作佛得麼曰得云莫不得麼曰不得師召大眾曰夫為善知識須明決擇為甚麼他人道得也道得他人道不得也道不得還知南泉落處麼白雲不惜眉毛與你注破得又是誰道來不得又是誰道來你若更不會老僧為你作箇樣子乃舉手曰將三界二十八天作箇佛頂金輪水際作箇佛脚四大洲作箇佛身雖然作此佛兒子了你諸人却在那裏安身立命大眾還會也未老僧作第二箇樣子去也將東弗于逮作一箇佛南贍部洲作一箇佛西瞿耶尼作一箇佛北單越作一箇佛草木叢林是佛蠢動含靈是佛既恁麼又喚甚麼作眾生還會也未不如束弗于逮還他東弗于逮南贍部洲還他南贍部洲西瞿耶尼還他西瞿耶尼北鬱單越還他北鬱單越草木叢林還他草木叢林蠢動含靈還化蠢動含靈所以道是法住法位世間相常住既恁麼你又喚甚麼作佛還會麼忽有箇漢出來道白雲休寐語大眾記取這一轉語僧問承師有言山前一片閑田地只如威音王已前未審甚麼人為主曰問取寫契書人云和尚為甚倩人來答曰只為你教別人問云與和尚平出去也曰大遠在問如何是佛曰口是禍門又曰肥從口入問一代時教是箇切脚未審切那箇字曰鉢囉娘云學人只問一字為甚麼却答許多曰七字八字問如何是臨濟下事曰五逆聞雷云如何是雲門下事曰紅旗閃爍云如何是曹洞下事曰馳書不到家云如何是溈仰下事曰斷橫古路僧禮拜師曰何不問法眼下事僧云留與和尚師曰巡人犯夜問如何是和尚家風曰鐵旗鐵鼓云只有這箇為復別有曰採石渡頭看云忽遇客來將何祇待曰龍肝鳳髓且待別時云客是主人相師曰謝供養問如何是先照後用曰王言如絲云如何是先用後照曰其出如綸云如何是照用同時曰舉起軒轅鑑尤頓失威云如何是照用不同時曰金將火試問佛未出世時如何曰大憨不如小憨云出世後如何曰小憨不如大憨問牛頭未見四祖時如何曰頭上戴纍垂云見後如何曰青布遮前云未見時為甚麼百鳥銜華獻曰富與貴是人之所欲云見後為甚麼不𭊷華獻曰貧與賤是人之所惡問如何是佛曰露胸跣足云如何是法曰大赦不放云如何是僧曰釣魚船上謝三郎問四面無門山嶽秀箇中時節若為分曰東君知子細徧地發萌芽云春去秋來事宛然也曰纔方搓彈子便要揑金剛一日顧問門人曰諸子已後如何荷負吾宗佛鑑曰彩鳳舞丹霄佛眼曰鐵虵橫古路佛果舉足曰看脚趯師曰滅吾宗者克勤也崇寧三年六月二十五日上堂辭眾曰趙州和尚有末後句你作麼生會試出來道看若會得去不妨自在快活如或未然這好事作麼說良久曰說即說了也只是諸人不知要會麼富嫌千口少貧恨一身多珍重時山門有土木之役躬往督之且曰汝等勉力吾不復來矣歸丈室淨髮澡身迄旦吉祥而化是夕山摧石隕四十里內巖谷震吼闍維設利如雨塔于東山之南壽八十餘南嶽第十三世臨濟九世翠巖二世大溈真如慕喆禪師法嗣東京智海普融道平禪師仙都人族許氏嘗師事泉萬卷會荊公請泉居蔣山師與之偕往命掌牋記辭謁真如於大溈聞舉洗鉢盂話倐然啟悟述偈曰七顛八倒業識忙忙螺江回首處笑殺謝三郎趙璧與燕金寶環并玉珮拈起兔角鎚一時俱擊碎如詰之無爽於是聲名四馳後六生道場四被詔旨上堂曰山僧不會佛法為人總沒來由或時半開半合或時全放全收還如萬人叢裏冷地掉箇石頭忽然打著一箇方知觸處周流上堂趙州有四門門門通大道玉泉有四路路路透長安門門通大道畢竟誰親到路路透長安分明進步看拍膝一下曰歲晚未歸客西鳳門外寒上堂舉盤山示眾曰似地擎山不知山之孤峻如石含玉不知玉之無瑕古人恁麼說話大似抱賊叫屈普融門下人人慷慨生擒虎兕活捉獰龍眼裏著得須彌山耳裏著得大海水遂拈拄杖曰不是向人誇伎倆丈夫標致合如斯卓拄杖下座靖康初謝事歸黃州栢子山建炎改元十月二日示化隆興府泐潭景祥禪師建昌南城人族傅氏父翼為永豐令母上官氏夢絳幡皂纛擁一偉丈夫至稱塞上將軍已而出胎因以塞上公名之及長警敏強記愽覽常夜夢持刀刺人一日睡中神人授以偈後不復夢適永豐下世追念罔極非出世間法無以報聞有琦禪師說法于靈鷲往聽頓有省發依琦剃染受具乃之遠方至大溈久而開悟日常留侍盡其機用溈既趨寂歸隱臨川越十年列剎迎居槩不就大觀四年偶泐潭虗席府座以書幣三邀不得已而應命上堂舉鏡清和尚示眾曰若據令而行碧眼老胡不得無過若盡令而行須閉却僧堂門倩人守院始得時有僧問盡令而行時如何曰汝欲散眾那師曰寶峰今日舉話不得動著留與諸方檢點至節上堂世謂君子道長小人道消消底向甚麼處去長底自何而來所以道若言其有無物可守若言其無觸應萬途若言其新自古夙因若言其故物不能汙是故在鳥鳥鳴在獸獸鳴在天同天處人同人遂拈拄杖曰且道在這裏同箇甚麼良久曰祖室傳來行正令撥發蘆芽徧地春中秋上堂靈山話曹溪指放過初生斫額底未問龍眠老古錐昨夜三更轉向西正當恁麼時有人問如何是月向明暗未分處道得一句便與古人共出一隻手如或未然寶峰不免依模𦘕樣應箇時節乃打一圓相曰清光萬古復千古豈止人間一夜看僧問如何是祖師西來意曰十箇指頭八箇了問我手何似佛手曰金鍮難辨云我脚何似驢脚曰黃龍路險云人人有箇生緣如何是和尚生緣曰把定要津不通凡聖室中問僧達磨西歸手擕隻履當時何不兩隻都將去云此土也要留箇消息曰一隻脚在西天一隻脚在東土著甚來由僧無語問僧唯一堅密身一切塵中現如何是塵中現底身僧指香爐云這箇是香爐師曰帶累三世諸佛生陷地獄僧罔措師便打問僧布袋閙裏撒開作麼生會云某不會曰鐵銚但言鐵銚木履但言木履眼前蹉過彌勒天宮討甚麼屎遂推出師不安行有僧問和尚近日尊候如何曰土地前燒二陌紙著師常叉手夜坐如對大賓初坐手與趺綴至五鼓必齊膺因號祥叉手其莊肅若此建炎初荷䇿游天台郡守聞于朝以詔居浮山紹興二年十月七日集眾言別侍僧請偈師曰幸無去來何偈之有即加趺而逝火後目睛齒舌不壞獲設利五色其徒分塔于浮山泐潭潭州東明仁仙禪師開堂日僧問世尊出世梵王前引帝釋後隨和尚出世有何祥瑞曰任是百千諸佛一時趕向水牯欄裏云有何祥瑞曰山僧不曾眼華廬山東林正覺自遵禪師上堂曰十五日已前放過一著十五日已後未可商量正當十五日試道一句看良久曰山色翠穠春雨歇栢庭香擁木蘭開泗州普照明悟曉欽禪師上堂曰引手撮空展轉莫及飜身擲影徒自勞形當面拈來却成蹉過畢竟如何拍禪床曰洎合錯商量僧問師唱誰家曲宗風嗣阿誰曰東邊更近東云溈山的子智海親孫也曰却笑傍人把釣竿和州光孝慧蘭禪師不知何許人也自號碧落道人嘗以觸衣書七佛名叢林稱為蘭布裩一日擬草庵歌示眾其辭曰吾結庵兮非世寶通身盡是無生艸本來基址坦然平四維上下無邊表庵中人匪生老妙用縱橫無作造不村不郭不深山暑往寒來俱不到問此庵在何處父母未生好薦取掣電之機儻未分穿雲陟嶺反相誤住庵人何面目混沌初分堪委曲此時一著太分明不解依前打瓦卜或言大等閑收向針鋒界或言小森羅普印毫端杪或言貴覿面指陳無可示或言賤萬斛驪珠終不換或言顯爍迦羅眼覤難見或言隱塞破虗空光烱烱欲識庵中舊日人大千沙界俱銷殞建炎末逆虜犯淮執師見酋長長曰聞我名否師曰我所聞者唯大宋天子之名長恚令左右以鎚擊之鎚至輒斷壞長驚異延麾下敬事之經旬師索薪自焚無敢供者親拾薪成龕怡然端坐煙焰一起流光四騰虜跪伏灼膚者眾火絕得五色設利併其骨而北歸所執僧尼悉得自便和人至今詠之吉州光孝慧曉禪師僧問若能轉物即同如來露柱是物請和尚轉曰不放落華隨水去云因甚麼如此曰恐招凡客入山潭州福嚴寘禪師上堂曰禪嚴山上雲舒卷任朝昏忽爾落平地客來難討門上堂舉趙州問僧近離甚麼處云雪峰曰雪峰近日有何言句云和尚嘗示眾道盡大地是沙門一隻眼汝等諸人向甚麼處屙曰汝回去麼云便行曰我寄汝一鍬子去師曰如今諸方商量趙州寄鍬子與雪峰便是剗却那屙底我當時若問這僧汝回去麼云便行只向他道我寄你一副鉢孟去你又如何商量潭州東明遷禪師久侍真如晚居溈山真如庵忠道者高其風每叩之一日閱首楞嚴次忠問如我按指海印發光佛意如何曰釋迦老子好與二十棒云為甚麼如此曰用按指作麼云汝暫舉心塵勞先起又作麼生曰亦是海印發光雪竇法雅禪師法嗣衢州光孝慈覺普印禪師泉之晉江許氏子室中問僧父母未生已前在甚麼處行履僧擬對即打出或曰達磨在你脚下僧擬著亦打出或曰道道僧擬開口復打出青原第十三世雲門七世法雲大通善本禪師法嗣潭州雲峰祖燈志禪師南粵人族陳氏母因雷震而生五歲授書至未知生焉知死怳如夢覺歸以出家告父母未冠為僧謁大通於雙林一夕登大士殿作禮既而經行於善惡不思中尋即開悟住雲峰日上堂曰休去歇去一念萬年去寒灰枯木去古廟裏香爐去一條白練去大眾古人見處如日暉空不著二邊豈墮陰界堪嗟後代兒孫多作一色邊會山僧即不然不休去不歇去業識忙忙去七顛八倒去十字街頭閙浩浩地聲色裏坐臥去三家村裏盈衢寒路荊棘裏游戲去刀山劍樹劈腹剜心鑊湯爐炭皮穿骨爛去如斯舉唱大似三歲孩兒輥繡毬上堂一切聲是佛聲塗毒鼓透入耳朵裏一切色是佛色鐵蒺蔾穿過眼睛中好事不如無便下座上堂孟冬薄寒且道寒作何色上堂盡乾坤大地是箇熱鐵團汝等諸人向甚麼處下口良久曰吞不進吐不出上堂瘦竹長松滴翠香流風疏月度炎凉不知誰住原西寺每日鍾聲送夕陽上堂聲色頭上睡眠虎狼羣裏安禪荊棘林內飜身雪刃叢中游戲竹影掃堦塵不動月穿潭底水無痕上堂良久曰吾道一以貫之話作兩橛上堂不是風動不是幡動衲僧失却鼻孔是風動是幡動分明是箇漆桶兩段不同眼暗耳聾㵎水如藍碧山華似火紅上堂僧問如何是西來意曰築著額頭磕著鼻云意旨如何曰驢䭾馬載云向上還有事也無曰朝到西天暮歸唐土云謝和尚答話曰大乘砑郎當僧退師乃曰僧問西來意築著額頭磕著鼻意旨又如何驢馱并馬載朝到西天暮歸唐大乘恰似砑郎當何故沒量大人被語脉裏轉却遂拊掌大笑下座僧問丹霞燒木佛院主為甚麼眉鬚墮落曰一人傳虗萬人傳實云恁麼則不落也曰兩重公案云學人未曉特伸請益曰筠袁虔吉頭上插筆問德山入門便棒意旨如何曰束杖理民云臨濟人門便喝又作麼生曰不言而化云未審和尚如何為人曰一刀兩段問無縫鐵門請師一啟曰進前三步云向上無關請師一閉曰退後一尋云不開不閉又作麼生曰吽吽便打問雪峰輥毬意旨如何曰千鈞之弩云禾山打鼓又作麼生曰老不歇心臨安府淨慈寶印楚明禪師百粵人族張氏祝髮後謁大通通夢日月並出曉則師至稱楚明上座通陰奇之令參堂久而契悟出住淨慈大播祖道左丞蒲公宗孟奏以師名上堂曰若論此事如散鋪寶貝亂堆金玉昧己者自甘窮困有眼底信手拈來所以道閻浮有大寶見少得還稀若人將獻我成佛一餉時乃拈拄杖曰如今一時呈似普請大眾高著眼擲拄杖下座上堂祖師道吾本來茲土傳法救迷情一華開五葉結果自然成淨慈當時若見恁麼道用黑漆拄杖子一棒打殺埋向無陰陽地上令他出氣不得何故叵耐他瞞我唐土人眾中莫有為祖師出氣底麼出來和你一時埋却東京慧林常悟禪師僧問若不傳法度眾生舉世無由報恩者未審傳箇甚麼法曰開宗明義章第一問達磨未來時如何曰省得草鞋錢云來後如何曰重疊關山路真州長蘆祖照道和禪師興化仙游人族潘氏少警敏博學從伯父往京師累舉不第遂師天清釋迦院德璋以資慈聖光獻皇后恩例得度登具謁淨因臻圓通秀秀謝世適大通繼居師就參之一日以硫黃續火釋然契悟籌室一鎮四眾雲趨上堂曰一二三四五六碧眼胡僧數不足泥牛入海過新羅木馬迎風到天竺天竺茫茫何處尋補陀巖上問觀音普賢拍手呵呵笑歸去去兮秋水深上堂觀身實相觀佛亦然這裏見得黃面瞿曇隱身無地其或渺漫不分照顧眉毛鼻孔上堂良久曰還會麼大施門開便請單刀直入寶所在近莫教空手而回三十年後自看記敗睦州道底上堂欲渡巨海必假方舟櫓棹俱全風帆兩便夜觀星月書視雲山萬里之遙一瞬可到莫有洗脚上船底麼遂曰人心盡畏波濤嶮未必波濤嶮似心僧問無遮聖會還有不到者麼曰有云誰是不到者曰金剛脚下鐵崑崙問不許夜行投明須到意旨如何曰羊頭車子推明月云便恁麼去時如何曰鐵門路嶮問教外別傳未審傳箇甚麼曰鐵彈子問一槌兩當時如何曰踏藕得魚歸問百城游罷時如何曰前頭更有趙州關宣和六年八月七日書偈端坐而化茶毗得設利五采合靈骨塔於摩尼峰下壽六十八臘四十五湖州道場有規禪師婺之金華人族姜氏幼有逸才自薙髮趨師席後徹證於大通上堂曰種田博飯地藏家風客來喫茶趙州禮度且道護聖門下別有甚麼長處良久曰尋常不放山泉出屋底清池冷照人上堂拈拄杖曰還見麼窮諸玄辯若一毫置於太虗竭世樞機似一滴投於巨壑德山老人雖則焚其疏鈔也是賊過後張弓且道文彩未彰以前又作麼生理論三千劒客今何在獨許莊周致太平化士出問促裝已辨乞師一言曰好看前路事莫比在家時云恁麼則三家村裏十字街頭等箇人去也曰照顧打失布袋湖州道場顏禪師上堂曰世尊按指海印發光遂拈拄杖曰莫妄想便下座有僧登五鳳樓冥坐數日光𦦨透戶師聞曳杖往扣之僧舉目師以杖擊之逐出寺鄭州資福寶月法明禪師上堂曰若論此事譬如伐樹得根灸病得穴若也得根豈在千枝徧斫若也得穴不假六分全燒遂卓拄杖曰這箇是根那箇是穴擲下拄杖曰這箇是穴又喚甚麼作根咄是何言歟福州雪峰妙湛思慧禪師錢塘人族俞氏俞氏方貴且富師抗志慕出家為童子大通見之與語如流即與染削讀圓覺至知幻即離不作方便離幻即覺亦無漸次豁然自契求證於通通曰汝試向未開口時道一句來師震威一喝而出通大笑於是道聲藹著次謁真淨淨一見知非凡材留三年力烹煉之因歸禮大通則曰未始有異也第人各行之耳故道俗爭挽出住霅川道場法席不減二本之盛繼徙徑山淨慈詔居京師智海又移補顯親黃檗雪峰上堂曰一法若通萬緣方透拈拄杖曰這裏悟了提起拄杖海上橫行若到雲居山頭為我傳語雪峰和尚咄上堂布大教網摝人天魚護聖不似老胡拖泥帶水只是見兔放鷹遇麞發箭乃高聲召眾曰中上堂昔日藥山早暮不參動經旬月一日大眾集藥山便掩却方丈諸禪德彼時佛法早自淡薄論來猶較些子如今每日鳴鼓陞堂忉忉怛怛地問者口似紡車答者舌如霹靂總似今日靈山慧命殆若懸絲少室家風危如疊卵又安得箇慨然有志扶竪宗乘底衲子出來喝散大眾非唯耳邊靜辨當使正法久住豈不偉哉如或捧上不成山僧到行此令以拄杖一時趂退上堂眼睫橫亘十方眉毛上透青天下徹黃泉且道鼻孔在甚麼處良久曰劄上堂妙高山頂雲海茫茫少室岩前雪霜𪷤𪷤齊腰獨立徒自苦疲七日不逢一場𢣾㦬別峰相見落在半途隻履西歸遠之遠矣卓拄杖下座上堂大道只在目前要且目前難覩欲識大道真體今朝三月十五不勞久立建炎改元上堂天地之大德曰生聖人之大寶曰位今上皇帝踐登寶位萬國歸仁艸木禽魚咸被其德此猶是聖主應世邊事王宮降誕已前一句天下人摸索不著上堂一切法無差雲門胡餅趙州茶黃鶴樓中吹玉笛江城五月落梅華慚愧太原孚上座五更聞鼓角天曉弄琵琶喝一喝下座上堂南詢諸友踏破艸鞋絕學無為坐消日月凡情易脫聖解難忘但有纖毫皆成滲漏可中為道似地擎山應物現形如驢覷并縱無計較途轍已成若論相應轉沒交涉勉諸仁者莫錯用心各自歸堂更求何事僧問古殿無燈時如何曰東壁打西壁云恁麼則撞著露柱也曰未敢相許問九夏賞勞即不問從今向去事如何曰光剃頭淨洗鉢云謝師指示曰滴水難消師住持四十餘年所至衲子不下萬指未嘗干謁而檀信嚮風紹興甲子罷寺居東庵明年秋絕食清坐出二指示門人曰更兩日在至期易衣儼然而逝時七月甲寅也壽七十五塔全身於東庵臨安府上天竺慈辯從諫講師處之松陽人也具大知見聲播講叢於止觀深有所契每與禪衲游嘗以道力扣大通通一日作書寄之諫發緘覩黑白二圓相乃悟答偈曰黑相白相擔枷過狀了不了兮無風起浪若問究竟事一作相如何洞庭山在太湖上後拈香嗣之金山法印寧禪師法嗣吉州禾山用安禪師僧問蓮華未出水時如何曰魚挨鼈倚云出水後如何曰水仙頭山戴好手絕躋攀云出與未出時如何曰應是乾坤惜不教容易看甘露傳祖仲宣禪師法嗣平江府妙湛尼慈鑑大師文照溫陵人族董氏十七得度徧迹祖闈獲證甘露郡守陳公師錫聞其名命居妙湛後五遷道場皆革律為禪吳中尼剎禪林寔始於照也太宰鄭公居仁奏賜號并紫方袍上堂曰靈源不動妙體何依歷歷孤明是誰光彩若道真如實際大似好肉剜瘡更作祖意商量正是迷頭認影老胡四十九年說夢即且止僧堂裏憍陳如上座為你諸人舉覺底還記得麼良久曰惜取眉毛好瑞巖有居禪師法嗣台州萬年處幽禪師上堂曰先聖行不到處凡流恰到凡流既到先聖莫知到與不到知與不知總置之一壁只如僧問乾峰十方薄伽梵一路涅槃門未審路頌在甚麼處峰以拄杖一畫曰在這裏且道此老與他先聖凡流相去幾何南山虎齩石羊兒須向其中識生死淨因佛日岳禪師法嗣福州鼓山禪鑒體淳禪師上堂曰養由弓矢不射田蛙任氏絲輪要投溟渤發則穿楊破的得則脩鯨巨鼈隻箭既入重城長竿豈釣淺水而今莫有吞鈎齧鏃底麼若無山僧卷起絲輪拗折弓箭去也擲拄杖下座本覺法真守一禪師法嗣台州天台如庵主久依法真因看雲門東山水上行語發明己見歸隱故山侶猿鹿五馬聞其風遣使逼令住持如作偈曰三十年來住此山郡符何事到林間休將𤨏𤨏塵寰事換我一生閑又閑遂焚其廬竟不知所止平江府西竺尼法海寶文呂嘉之姑也首參法雲秀禪師後領旨於法真言下諸名儒屢挽應世堅不從殂日說偈曰霜天雲結霧山月冷涵輝夜接故鄉信曉行人不知屆明坐脫音釋疏音疎潸音刪愕五各切胎與之切淈下沒切腯音突兕徐姉切纛音毒又音導穠音農酋自秋切砑音訝殂昨胡切
