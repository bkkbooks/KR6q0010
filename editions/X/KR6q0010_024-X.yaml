body:
  text: 平江府報恩光孝禪寺臣僧正受編應化聖賢千歲寶掌和尚中印度人也周威烈十二年丁卯降神受質左手握拳至七歲祝髮乃展因名寶掌魏晉間東游此土入蜀禮普賢留大慈常不食日誦般若等經千餘卷有詠之者曰勞勞玉齒寒似迸巖泉急有時中夜坐堦前神鬼泣一日謂眾曰吾有願住世千歲今年六百二十有六故以千歲稱之次游五臺徙居祝融之華嚴黃梅之雙峰廬山之東林尋抵建鄴會達磨入梁師就扣其旨開悟武帝高其道臘延入內庭未幾如吳有偈曰梁城遇導師參禪了心地飄零二浙游更盡佳山水順流東下由千𭎸至天竺往鄮峰登太白穿鴈蕩盤於翠峰七十二庵回赤城憩雲門法華諸暨里浦赤符大巖等處反飛來棲之石竇有行盡支那四百州此中偏稱道人游之句時貞觀十五年也後居浦江之寶嚴與朗禪師友善每通問遣白犬馳往朗亦以青猿為使令故題朗壁曰白犬㘅書至青猿洗鉢回師所經處後皆成寶坊顯慶二年正旦手塑一像至九日像成問其徒慧雲曰此肖誰雲曰與和尚無異即澡浴易衣趺坐謂雲曰吾住世已一千七十二年今將謝世聽吾偈曰本來無生死今亦示生死我得去住心他生復來此頃時囑曰吾滅後六十年有僧來取吾骨勿拒言訖而逝入滅五十四年有刺浮長老自雲門至塔所禮曰冀塔洞開少選塔戶果啟其骨連環若黃金浮即持往秦望山建窣堵波奉藏以周威烈丁卯至唐高宗顯慶丁巳攷之實一千七十二年抵此土歲歷四百餘僧史皆失載開元中慧雲門人宗一者甞勒石識之扣冰藻先古佛建寧新豐翁氏子母夢比丘風神炯然荷錫求宿人指謂曰是辟支佛已而孕生於武宗會昌之四年香霧滿室彌日不散年十三求出家父母許之依烏山興福行全為師咸通乙酉落髮受具初以講說為眾所歸棄謁雪峰真覺禪師手𢹂鳬茈一包醬一器獻之峰曰包中何物云鳬茈曰何處得來云泥中得曰泥深多少云無丈數曰還更有麼云轉深轉有又問器中何物云醬曰何處得來云自合得曰還熟也未云不較多峰異之曰子異日必為王者師後自鵝湖歸溫嶺結庵今為永豐寺繼居將軍巖二虎侍側神人獻地為瑞巖院學者爭集甞謂眾曰古聖修行須憑苦節吾今夏則衣楮冬則扣冰而浴故世人號為扣冰古佛太傅章公仔鈞聞師道譽躬迎瞻禮未幾捨第為寺夫人練氏以子孫爵問之答以十世後如其言住靈曜日上堂曰四眾雲臻教老僧說箇甚麼便下座有僧燒炭積成火龕云請師入此修行曰真玉不隨流水化瑠璃爭奪眾星明云莫只這便是麼曰且莫認奴作郎云畢竟如何曰梅華臘月開刺史陳公誨於建安顯親寺之溪西範鐵為三大佛既成飯僧告眾曰有能為贊者當得奉之眾皆默然師居座末起對曰百年陳鐵一朝成佛誨大喜即跪奉以歸鐵陳之小名也天成戊子應閩主之召延居內堂敬拜曰謝師遠降賜茶次師提起橐子曰大王會麼云不會曰人王法王各自照了留十日以疾辭至十二月二日沐浴陞堂告眾而逝王與道俗備香薪蘇油茶毗之祥耀滿山獲設利五色塔於瑞巖正寢壽八十有五臘六十有三諡曰妙應法威慈濟師之苦節異行他心慧眼備見于本錄云酒仙遇賢和尚姑蘇長洲林氏子母夢吞大珠而孕生多異祥貌偉怪口客雙拳七歲甞沈大淵而衣不潤遂去家師嘉禾永安可依三十剃染圓具往參錢塘龍𠕋珠禪師發明心印回居明覺院唯事飲酒醉則成歌頌警道俗因號酒仙初自錢塘歸執鐵鎚路見瓦甓即擊或問所謂曰世路不平故碎之耳建隆間創葺殿宇動費數百萬莫知其所得之由繼改三門遣匠取石柱於洞庭工久不獲即登山呼酒仙有頃石泐後泛江風將覆舟篙人大恐師解袈裟為帆風即轉有虎入城見師跪伏師撫摩虎遂去郡守梅公初不識師夢與之語及見果如所夢益加禮敬凡經酒家退則座客常滿以是日常俟至聽其所需師將順世往其家曰平時飲汝酒未甞酬直今酬之可富三世因見石臼遂嘔而羃之曰閱三日可開三日啟封結如雞子乃酒黃也是歲疫盛沃以酒服者無不愈其家遂富郡人有疾覓符不與者不救符後書陳僧二字祥符二年上元凌晨浴罷就室合拳右舉左張其口而化三七日身不欹唇色如故寺僧欲髹之其徒曰非師意也遂火葬收骨塑其像壽八十八臘五十八南安巖自嚴尊者泉之同安人族鄭氏世傳定光如來之應身年十一棄家依建興臥像寺契緣為童子十七圓梵相之廬陵謁西峰雲豁禪師即證心法通宿命辭居黃石巖及盤古山皆虵虎窟師至乃為使令人以雨暘男女禱者輒應比戶像而事之有沙彌無利性作禮求偈師為書曰大智發於心於心何處尋成就一切義無古亦無今令誦之未踰月過目成誦凡所述作若隱語於後題贈以之中四字師服飾純白帽首以布跡既著所屬聞於朝詔甚嘉之丞相王欽若參政趙安仁以下獻詩師置之不視淳化乙卯正月六日集眾曰汝等當知妙性廓然本無生滅示有去來更疑何事吾此日生今正是時遂吉祥而化閱世八十有二坐夏六十有五諡曰定光圓應禪師法華志言大士壽春許氏子也弱冠游東都繼得度於七俱𦙁院留講聚之久一日讀雲門錄忽契悟未幾宿命遂通獨語笑口吻囁嚅日甞不輟世傳誦法華經因以名之每入市則褰裳而趨或舉手畫空佇立良久或從屠沽飲啖無擇然讖禍福輒應於是名播朝野至和三年仁宗皇帝以國嗣未立夜因焚香默禱曰翌日化城殿具齋虔請法華大士願俯臨無却清旦上道衣凝立以待俄馳奏有僧言法華者自右掖門徑趨將至寢殿侍衛莫阻上笑曰朕請而來也有頃至登御榻加趺受供將去上曰朕以儲嗣未立大臣咸以為言侵尋晚景嗣息有無法華其一決之師索筆連書十三十三字凡數十行擲筆無他語皆莫測其意後英宗皇帝登極在濮邸諸王之數實居十三始符前讖丞相呂許公問佛法大意曰本來無一物一味總成真集仙王質問如何是祖師西來意曰青山影裏潑藍起寶塔高吟撼曉風又云請法華燒香曰未從齋戒覓不向佛邊求國子助教徐嶽問如何是祖師西來意曰街頭東畔底云某未會曰三般人會不得僧問世有佛否曰寺裏文殊有問師凡耶聖耶舉手曰我不在此住慶曆戊子十一月二十三日將化謂人曰我從無量劫來成就逝多國土分身揚化今南歸矣語畢右脇而寂知足智華道者開封人也傳失其氏世務農母孕二年餉父田間生於林下濯於河兒曰無冰我是時紅光燭天太史以產異人奏令物色得師乃育於近臣家襁褓能語往事三歲起趺坐知其苾蒭也及長與圓梵相覆體止一衲祁寒隆暑莫能侵日食或倍二十人不飽水漿不入口二三月不飢一臥必三載坐立如之未甞讀誦辨才無礙未甞修真而頂出白光忽張目大呼而非怒終日言笑而非喜每告人吉㐫禍福不差毫𨤲居京都時五府以次爭延之間語人曰天平白雲是吾歸處崇寧初持拂歌笑出夷門強挽不回東來姑蘇天平之白雲寺緇素景從有以佛法問者不答以偈請者則大書此𠀇以示政和中奄然而逝闍維其胃腸瑩徹若瑠璃骨碧者如玉黃者如金設利無數道俗以所化之地為塔奉藏鑿壙三尺得紫石函題其上曰知足道場眾乃益異入塔日地為之震郡守上其事賜金襴紫伽棃諡淨行大師塔曰明因風法華亡其名東京張氏子也於開寶寺得度誦法華不輟所居無定世稱風法華有以休咎問之所答若讖過則有驗及化乃歌曰歸去來兮歸去來不去泗州不五臺脫下舊鞋著新鞋舊鞋即時磨滅盡新鞋不肯踏塵埃新鞋即似舊鞋樣替新換舊人莫猜去時光明道中去來時平坦路上來今生多少舊相識幾人似我却重回歌絕而逝李通玄長者不知何許人或曰唐宗子殆文殊普賢之幻有也開元七年一云十七年隱於太原壽陽方山之土龕初至虎為負經而神龍化泉天女給侍夜則齒光代燭間食棗栢因號棗栢大士甞以華嚴大教抉微剔奧論而明之曲折萬旋如水赴海會釋十門妙盡經旨總四十卷目曰華嚴論其首敘曰夫有情之本依智海而為源含識之流總法身而為體只為情生智隔想變體殊達本情亡知心體合今此大方廣佛華嚴經者明眾生之本際示諸佛之果源其為本也不可以功成其為源也不可以行得功亡本就行盡源成源本無功能隨緣自在者即此毗盧遮那也以本性為先智隨根應大悲濟物以此為名依本如是設其教澤滂流法界以潤含生於是寄位四天示形八相菩提場內現蘭若以始成普光法堂處報身之大宅普賢長子舉果得於藏身文殊小男創啟蒙於金色以海印三昧周法界而降靈用普眼法門覩塵中之剎海依正二報身土交參因果兩門體用相徹以釋天之寶網彰十剎以重重取離垢之摩尼明十身而隱隱無邊剎境自他不隔於毫端十世古今始終不移一作離於當念其為廣也以虗空而為量其為小也處極微而無跡十方無卷匪虧小相之中纖塵不舒含十方而非礙智海果德乃殊分於五位之門常住法堂示進修於九天之上此方如是十剎皆然聖眾如雲海會相入聖凡不等狀多鏡以納眾形彼此無妨若千燈而共一室此經總有四十品之勝典互開果復之智門百萬億之妙言咸舉佛華之行海十身十會闡十十之法門十處十万啟十十之通辨一云啟十通而疏十辨十現品內示因果以結始終給孤園中利人天而明法界目連鶖子隔眎聽於對顏六千比丘啟十明於路上覺城東際五眾咸臻古佛廟前同登十智善財發明導首用彰來眾齊然又成五位法門具德行其軌範令使啟蒙易達解行無疑還信首文殊之前正證妙峰之頂經過五眾成一百一十之法門至慈氏之園結會一生之佛果返視文殊之初友明以果同因後入普賢之妙身彰體用圓極此經名大方廣佛華嚴經者大以無方為義方以理智為功廣則毫剎相容佛乃體用無作華喻行門可樂能敷理事之功嚴即依正莊嚴經即貫穿縫綴世主妙嚴品者類會同流法門均隔為品此經總有四十品之勝典此品建初故稱第一是故言大方廣佛華嚴經世主妙嚴品第一釋此一部之經總作十門分別第一明依教分宗第二明依宗分教第三明教義差別第四明成佛同別第五明見佛差別第六明說教時分第七明淨土權實第八明攝化境界第九明因果延促第十明會教始終云云以十八年或作二十八年三月二十八日論成竟爾趨寂是日飛走悲鳴白虹貫天四眾擁觀歎未曾有壘石葬千山北清泰中村民撥石得連環金骨扣之如簧天福三年再造石塔瘞于山之東七里始剏屋廬號昭化院皇朝初閩僧志寧以其論義分布經中是為合論至元祐戊申歲無盡居士張商英漕江左出按壽陽因齋戒至謁於破屋之下散帙間得華嚴修行決疑論四卷疾讀數紙疑情頓釋乃移文令廢淫祀置長者像為民祈福十月七日治地八日白光現於山南父老扣頭悲淚曰不知長者之福吾土也請併院新之施心雲起不唱而和無盡甞記其實云呂巖真人字洞賓京川人也唐末三舉不第偶於長安酒肆遇鍾離權授以延命術自爾人莫之究甞游廬山歸宗書鍾閣壁曰一日清閑自在身六神和合報平安丹田有寶休尋覓對境無心莫問禪未幾道經黃龍師覩紫雲成蓋疑有異人乃入謁值龍陞堂龍見意必呂公也欲誘而進厲聲曰座傍有竊法者呂毅然出問一粒粟中藏世界半升鐺內煑山河且道此意如何龍指曰這守屍鬼呂曰爭柰囊有長生不死藥曰饒經八萬劫終是落空亡呂薄訝飛劒脅之劒不能入遂再拜求指歸龍詰曰半升鐺內煑山川即不問你如何是一粒粟中藏世界有本小異呂於言下頓契作偈曰棄却瓢囊摵碎琴如今不戀水中金自從一見黃龍後始覺從前錯用心龍囑令加護後謁潭之智度覺禪師有曰余游韶郴東下湘江令見覺公觀其禪學精明性源淳潔促膝靜坐收光內照一衲之外無餘衣一鉢之外無餘食達生死岸破煩惱殻方今佛衣寂寂兮無傳禪理懸懸兮幾絕扶而興者其在吾師乎聊作一絕奉記達者推心方濟物聖賢傳法不離真請師開說西來意七祖如今未有人皇祐間至西湖淨慈即圓照本禪師室照見之乃曰黃龍道底呂曰錢大不要饒舌便出圓照乃錢王後身也見楊無為圓照贊時往來接化京華而人鮮遇有偈曰獨自行來獨自坐無限世人不識我唯有橋東老樹精分明知道神仙過有老宿見此偈問禪者曰既是神仙為甚麼却被樹精覰破宣和中抵四明金鵝寺顧方丈蕭然頃有童子出呂問此何寥寥童云莫道寥寥虗空也不著呂嘉其言題詩於壁曰方丈有門出不鑰見箇山童赤雙脚問伊方丈何寥寥報道虗空也不著聞此語何欣欣主翁豈是尋常人我來謁見不得見渴心耿耿生埃塵歸去也波浩渺路入蓬萊山杳杳相思為上石樓時雪晴海闊千峰曉張用成真人字平叔天台人也熈寧己酉至成都有授以丹砂者久之功乃成且曰吾形雖固而本源真覺之性有所未究豈宜自怠遂探佛書讀傳燈有省著悟真篇警於世甞作禪宗歌頌其自敘曰此恐學道之人不通性理獨修金丹於性命之道未備則運心不普物我難齊又焉能究竟圓通逈超三界故首楞嚴經言十種仙皆是人中鍊心堅固服餌壽千萬歲不修正覺報盡還來散入諸趣彌勒菩薩金剛經頌有云饒經八萬劫終是落空亡故此悟真篇先以神仙命術誘其修鍊次以諸佛妙用廣其神通後以真如空性遣其幻妄而歸於究竟空寂之本源矣近有黃冠謂呂公見黃龍初無是說乃釋輩欲神其禪宗耳苟以平叔方之則呂公參問可見古今服藥鍊形之士不為不多獨二公不以功成自居回心祖道殆出三界其下於二公者為如何哉吁拾遺未詳法嗣者福州東山雲頂禪師泉南人遺其氏以再下春闈往雲臺大吼寺剃染具戒即謁大愚芝神鼎諲諸名衲後見羅漢下尊宿始徹己事道學有聞叢林稱為頂三教出住東山遷數剎上堂曰一句函蓋乾坤不離毛吞巨海一句截斷眾流不離斬釘截鐵一句隨波逐浪不離目機銖兩若是通玄上士出言坐斷天下老和尚舌頭若不到這裏進前築著鼻孔退後墮坑落壍各自知時打草鞋行脚去上堂召大眾曰諸佛說法似擲劒揮空祖師傳心如著鞋上樹天下老和尚指注徧大地盡是葛藤更說無心是道乃同死漢直得山河大地與自己無差坐在法身處見聞不脫光影似搖生死茫然如何辨主直須透過如水入水如風入風拋擲自由開合不成孔竅為妙九龍觀道士并三士人請上堂儒門畫八卦造契書不救六道輪迴道門朝九皇鍊真氣不達三祇劫數我釋迦世尊洞三祇劫數救六道輪迴以大願攝人天如風輪持日月以大智破生死若劫火焚秋毫入得我門者自然轉變天地幽察鬼神使須彌鐵圍大地大海入一毛孔中一切眾生不覺不知我說此法門如虗空俱含萬象一為無量無量為一若人得一即萬事畢珍重上堂夢中作大梵王位不如醒後一縣尉種種勞筋骨何似展脚睡明得自己無許多般若未明自己假饒如今一身現得十身盧舍那佛使雷音徧眾剎化佛滿世間俱是夢中事須知向上一叚函蓋乾坤耀古騰今靈光不礙入生入死與物推移救度無量眾生出三界牢獄散壞無量諸魔宮殿息滅無量諸煩惱火便共釋迦彌勒同坐一華老僧如此說箇化門且要人天小果生希奇之念若據迦葉門下從來無這般說話華嚴大會上堂廣大寶乘住四衢文殊前引普賢扶肥壯白牛甚有力一念徧游無卷舒世尊御也四十九年三百六十餘會演大乘經有十箇三千大千世界微塵數偈一四天下微塵數品其諸餘部帙不可勝言使大海須彌為筆墨未能書寫得盡世尊又說過五十六億萬年後有彌勒佛出世悲臻末劫劫海無涯佛海無際非口所宣非心所測皆是世尊度脚買靴之說看風使帆之義世尊又說有大法眼藏付囑迦葉且未有世尊迦葉時此法眼藏在甚麼處安著若有人知得落處出來說看僧問如何是乾元境曰千峰寒色云如何是境中人曰二尊不並化問如何是毗盧師曰口吐陰陽宣造化云超然逈出威音外也曰須作披毛帶角人去始得問如何是有漏曰破屋云如何是無漏曰古井問如何是祖師西來意曰孤舟載明月云意旨如何曰來往照閻浮俗士問三道寶階曲為初機向上一路請師直指曰高皇斬白虵當年用此劒云不背一切人不向一切人也曰頭在這裏尾在那邊問昔日相如題柱未是作家今日橋成請師下筆曰彩氣夜常動精靈日少逢云荊山有玉鑒在卞和曰洪州斬冬瓜滿江皆是血問月落碧潭時如何曰仙人禮枯骨云轉變後如何曰北邙山下俗士問如何是即色是空曰春虵入竹筒云暫時調直也曰從地獄出更作畜生問如何是和尚日用事曰我喫飯汝受飢云法法不相到又作麼生曰汝作罪我皆知問如何是和尚一枝拂曰打破修行窟云恁麼則本來無一物也曰知無者是誰云學人罪過曰再思可矣俗士問洞山道有一物上拄天下拄地未審是甚麼物曰擔鐵枷喫鐵棒云天地黑山河走曰閻老殿前添一鬼北邙山下臥千年士叫快活快活師曰也是野狐吞老鼠問如何是佛曰舉世無相以如何是道曰清風拂白月京洛和尚不知何許人久居嵩少後廬舒蘄之間甞沮座下童行習讀唯令參究適李後主以試經選僧得度者眾諸童慍見曰和尚止某等誦經今何望師占偈曰比擬將心合太虗免教和氣有親疎誰知道德渾無用今日為僧貴識書刺史聞以偈而主悉方其服婺州雲幽重惲禪師今曰法雲初謁雪峰存禪師次依石霜諸禪師乃開悟旋里隱居蔽形唯一衲後住雲幽上堂曰雲幽有一語入門便相與汝若諦審來我即途中去上堂雲幽一隻箭虗空無背面射去遍十万要且無人見時有僧出問如何是和尚一隻箭曰盡大地人無髑髏建寧府千山智榮禪師侍三教頂禪師之久未有所證脇不至席者數年一日飯後至鍾閣經行聞忽雷而悟述偈曰一震驚天地轟轟不是聲何勞勤苦覓時至自然明以所見白頂頂曰此乃觀音入道之門也宜自護持出住等覺衲子蜂集雙溪布衲如禪師因嵩禪師戲以詩悼之曰繼祖當吾代生緣行可規終身常在道識病懶尋醫貌古筆難邈情高世莫知慈雲布何處孤月自相宜師讀罷舉筆答曰道契平生更有誰閬鄉於我最心知當初未欲成相別恐誤同參一首詩投筆坐亡於六十年後塔戶自啟其真容儼然舒州海會如新禪師僧問承師有言橫說竪說猶未知向上關棙子如何是向上關棙子曰賴遇孃生臂短問𦏪羊挂角時如何曰恁麼來恁麼去云為甚麼如此曰只見好笑不知為甚了如此舒州投子通禪師僧問達磨未來時如何曰兩岸唱漁歌云來後如何曰大海涌風波問如何是孤峰頂上節操長松曰能為萬象主不逐四時凋問如何是和尚這裏佛法曰東壁打西壁舒州海會通禪師僧問如何是和尚為人一句曰清光滿目云學人不會曰茶灰抹土問如何是佛法大意曰柿桶蓋椶笠云學人不曉曰行時頭項戴坐則挂高壁舒州四面懷清禪師初住蘄口興化僧問臨濟三玄似石女向波中作舞雲門關棙閃爍如子過新羅去此二途興化當行何令曰道甚麼云恁麼則和尚與古人出氣師以拄杖打禪床曰若不點破將謂山僧磕睡處州法海立禪師因朝廷有旨革本寺為神霄宮師陞座謂眾曰都緣未徹所以說是說非蓋為不真便乃分彼分此我身尚且不有身外烏足道哉正眼觀來一場笑具今則聖君垂旨更僧寺作神霄佛頭上添箇冠兒筭來有何不可山僧今日不免橫擔拄杖高挂鉢囊向無縫塔中安身立命於無根樹上嘯月吟風一任乘雲仙客駕鶴高人來此呪水書符叩牙作法他年成道白日上昇堪報不報之恩以助無為之化只恐不是玉是玉也大奇然雖如是且道山僧轉身一句作麼生道還委悉麼擲下拂子竟爾趨寂郡守具奏其事奉旨改其寺曰真身汝州天寧明禪師改德士日師登座謝恩畢乃曰木簡信手拈來坐具乘時放下雲散水流去寂然天地空即斂目而逝成都府保福贊禪師郡之唐氏子住保福日僧問如何是閬州境曰錦屏天下秀凌水月中清云祖意教意是同是別曰兩輪日月並光輝一合乾坤同覆載蜀中仁王欽禪師僧問如何是佛曰聞名不如見面云如何是祖師西來意曰閙市裏弄胡猻云如何是道曰大蟲看水磨神照本如法師甞以經王請益四明尊者者震聲曰汝名本如即領悟作偈曰處處逢歸路頭頭達故鄉本來成現事何必待思量本嵩律師因無為居士楊傑請問宣律師所講毗尼性體嵩以偈答曰情智何甞異犬吠虵自行終南的的意日午打三更臨安府上天竺證悟圓智講師台城人族林氏年二十四剃染依白蓮僊法師入室問具變之道僊指行燈曰如此燈者離性絕非本自空寂理則具矣六凡四聖所見不同變則在焉智不契後因掃地誦法華至知法常無性佛種從緣起始諭旨白僊僊然之自領徒以來甞患本宗學者囿於名相膠於筆錄至以天台之傳為文字之學南宗鄙之乃謁護國此庵元禪師夜語次智舉東坡宿東林偈云也不不易到此田地庵曰尚未見路徑何言到耶云只如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有這箇消息曰是門外漢耳云和尚不吝可為說破曰却只從這裏猛著精彩捕看若覰捕得他破則亦知本命元辰落著處智通夕不寐及曉鐘鳴去其秘畜以前偈別曰東坡居士大饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人持以告此庵庵曰向汝道是門外漢智禮謝未幾有化馬祖殿瓦者求語發揚智書曰寄語江西老古錐從教日灸與風吹兒孫不是無料理要見冰消瓦解時此庵見之笑曰須是這闍梨始得金陵鐵索山主遺其名僧問久嚮鐵索未審作何面目主打露柱僧云謝見示主曰你據箇甚麼便恁麼道僧却打露柱主曰且道索在甚麼處僧作量勢主曰今日遇箇同參泐潭山前一老僧庵居有年未甞言參問獨秀宏禪師初來主此山僧聞書偈附樵者邀宏飯偈曰瓦甑炊陳粟瓷罌煑薺苗不嫌山昧薄必赴老夫招宏讀之曰山前有此老兒耶乃振䇿獨往言笑終日僧翌旦乃逝溫州爭居尼圓機出郡之戴氏唐景雲中得度甞習定於大日山石窟一日忽念曰法性湛然本無去住厭喧趣寂豈為達耶乃往參雪峰禪師峰問甚處來云大日山曰日出也未云若出則融却雪峰曰汝名甚麼云圓機曰日織多少云寸絲不挂遂禮拜而退峰召曰袈裟拖地機纔整衣峰曰又道寸𮈔不挂機頓領深旨世傳圓機乃永嘉大師之女弟甞同遊方以景雲歲月考之是矣第所見雪峰非真覺也永嘉既到曹溪必嶺下雪峰耳溫州陳道婆者甞遍扣諸名宿後於長老山淨禪師語下發明有偈曰高坡平頂上盡是採樵翁人人盡懷刀斧意不見山華映水紅音釋藻音早惲許慎切鄮音茂礴音泊澡音早𥦑蘇骨切攷考同識音志炯音迴仔音茲球音求甓扶歷切羃音覓髹音休𦙁張尼切囁而涉切嚅音儒輟陟劣切褰去䖍切掖音亦儲音除濮音卜邸音底襁居兩切褓音保祁音歧殆音待鶖音秋簧音黃瘞猗厲切脅虗業切摵所六切郴尹林切鮮是淺切鑰音藥闈音圍度音鐸邙音亡𦏪音鈴囿音又
