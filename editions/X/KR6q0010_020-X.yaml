body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十六世臨濟十二世楊岐五世龍翔竹庵土珪禪師法嗣南康軍雲居頑庵得昇禪師蜀之廣漢德陽人族何氏年十七依崇果寺二十得度習講久之棄謁文殊道禪師講問佛法省要殊示偈曰契丹打破波斯寨奪得寶珠村裏賣十字街頭窮乞兒腰間挂箇風流袋師擬對殊曰莫錯乃退參三年方得旨趣往見佛性機不投入閩至鼓山禮覲次便問國師不跨石門句意旨如何竹庵應聲喝曰閑言語師即領悟命師分座說法紹興辛酉丞相魏國張公浚擁旄閩中請開法石門遷明教及報恩開先上堂曰久雨不晴一箭兩垛鼻孔一時沒爛且道是誰之過賴得老趙州出來為你勘破且道勘破箇甚麼日輪天子現扶桑誰管西來閑達磨上堂萬仞崖頭打一推待渠絕後復穌來活鱍鱍禪須自悟萬重關鏁一時開僧問應真不借三界高超即不問如何是無位真人曰聞時富貴見後貧窮云擡頭須掩耳側掌便翻身曰無位真人在甚麼處云老大宗師話頭也不識曰放你三十棒乾道己丑九月二十五集眾示偈而化七日茶毗獲設利同靈骨藏于三生塔壽七十四夏五十四通州狼山蘿庵慧溫禪師七閩人族鄭氏甫二十禮靈鳳主僧以巽落髮受具謁棲賢初百丈栖水南遂雲居舒上封才南昌原晚依竹庵於東林未幾庵謝事復謁高庵悟南華昺草堂清皆蒙賞識會竹庵徙閩之乾元師歸省次庵問情生智隔想變體殊不用停囚長智道將一句來師乃釋然述偈曰拶出通身是口何妨罵雨呵風昨夜前村猛虎齩殺南山大虫庵首肯紹興辛未冬出住宣城寶勝後四居望剎上堂曰釋迦老子四十九年坐籌幃幄彌勒大士九十一劫帶水拖泥凡情聖量不能剗除理照覺知猶存露布佛意祖意如將魚目作明珠大乘小乘似認橘皮為猛火諸人須是豁開胷襟寶藏運出自己家珍向十字街頭普施貧乏眾中忽有箇靈利漢出來道美食不中飽人喫出僧却向他道幽州猶自可最苦是新羅護國此庵景元禪師法嗣台州國清簡堂行機禪師郡之仙居人族楊氏風姿挺異器識宏遠年二十五棄妻拏往顯慶寺圓顱受具乃依國清光禪師去游諸席晚契證於此庵出住莞山次遷江之圓通太平之隱靜天台之萬年再居隱靜後處國清上堂曰單明自己樂是苦因趣向宗乘地獄劫住五日一參三八普說自揚家醜更苦問理問事問心問性克由叵耐若是英靈漢窺藩不入據鼎不嘗便於未有生佛已前轉得身却於今時大官路上捷行闊步終不向老鼠窟草窠裏頭出頭沒若也根性陋劣要去有滋味處齩嚼遇著義學阿師遞相錮鏴直饒說得雲興雨現也是蝦蟆化龍下梢依舊喫泥喫土堪作甚麼上堂仲秋八月旦庭戶入新凉不露風骨句愁人知夜長上堂無隔宿恩可參臨濟禪有肯諾意難續楊岐派窮廝煎餓廝炒大海只將折筯攪你死我活猛火然鐺煑佛喋恁麼作用方可撑門拄戶更說聲和響順形直影端驢年也未夢見上堂似鏡長明猶是真常流注圓悟禪師云今時覓一箇半箇似鏡長明底亦難得那堪打破鏡來恁麼說話是則別有清規一期見來大似乞兒見小利殊不知打破鏡來正是貼肉汗衫若到隱靜門下二俱失利何故體才相似可克家箇地不容通水泄上堂此一段事若道是有與賊為伴若道是無曠野藏身總不恁麼漭漭蕩蕩朝行三千暮行八百忽若眼開方知驢脣先生不是泗州大聖高宗皇帝慶典請就使廳祝聖陞座問答罷師乃曰教中道譬如琴瑟箜篌雖有妙音若無妙指終不能發今日天下禪流為太上皇帝崇慶七十演妙音發妙指驚雷掣電聳動聽觀已自祝聖了也便恁散去未見末後殷勤記得世尊一日敷座而坐須菩提前白佛言希有世尊大眾且道此之希有以端坐為希有以尊重福相為希有以所說為希有若以端坐為希有世尊何甞不端坐若以尊重福相為希有何獨此日若以所說為希有佛未開唇動舌一字元無將甚麼作希有遂喝一喝曰此之希有在朕兆已前語言未通之際一破方為希有此名根本法輪亦名正法眼藏亦名真如解脫亦名般若妙心亦名大圓鏡智平等性智妙觀察智成所作智在華嚴經中男子身中入正定女人身中從定出為希有維摩經中五百長者子各献寶蓋合成一蓋為希有涅槃經中大地震動天花紛紛為希有般若經中包含內空外空內外空統攝欲界色界無色界為希有法華經中佛放眉間光現諸希有事為希有一大藏教不可悉說若開第二義門於世間品類之中物物皆有希有所謂黃河以清為希有麒麟出現為希有鳳凰來儀為希有河出圖洛出書為希有今日太上皇帝崇慶七十壽過五帝之上為天中天作王中王為希有臣僧行機向河清海晏之時祝地久天長之筭為希有如上所說盡是世間之希有大眾還知向上出世間之希有麼復喝一喝曰四大海水可知滴數諸須彌山可知斤兩釋尊壽命無量無邊於此見得徹不妨太上與釋尊壽命齊年更無優劣其或未然暫輟玉皇天上位端居德壽福生宮僧問三聖問雪峰透網金鱗未審以何為食峰云待汝出網來即向汝道意旨如何曰同途不同轍云三聖道一千五百人善知識話頭也不識峰云老僧住持事繁又作麼生曰前箭猶輕後箭深云只如雪竇道可惜放過好與三十棒這棒一棒也較不得直是罕遇作家意又作麼生曰陣敗說兵書云這棒是三聖合喫雪峰合喫師以拂子擊禪床曰這裏薦取淳熈庚子五月六日無疾端坐握拳而終闍維設利甚夥瘞靈骨于國清寺之西南隅壽六十八臘四十三鎮江府焦山或庵師體禪師丹丘黃巖人族羅氏年十五去家師妙智院守威弱冠為沙彌登具後會蹣庵成禪師抵其院與語挽歸典客去游浙右此庵開法真如歸參禮一日經行殿廡聞庵怒叱知事所疑頓豁翌日入室庵指師曰是子今日茅廣矣及此庵奄世護國因結茅白石峰為終計佛海遠禪師移國清邀師分座授徙衲子宗仰出住吳門之覺報徙澄照焦山上堂舉臨濟示眾云一喝如踞地師子一喝如金剛王寶劒一喝如探竿影草一喝不作一喝用師曰這箇公案天下老宿拈掇甚多第恐皆未盡善焦山不免四棱著地與諸人分明注解一徧如何是踞地師子咄如何是金剛王寶劒咄如何是探竿影草咄如何是一喝不作一喝用咄若也未會拄杖子與焦山吐露看卓一下曰笑裏有刀又卓一下曰毒虵無眼又卓一下曰忍俊不禁又卓一下曰出門是路更有一機舉話長老也理會不得上堂年常浴佛在今朝目擊迦維路不遙果是當時曾示現宜乎惡水驀頭澆上堂熱月須搖扇寒來旋著衣若言空過日大似不知時上堂古德道祖師九年面壁為訪知音若恁麼會喫鐵棒有日在又古德云祖師九年面壁何不慚惶若恁麼會更買草鞋行脚三十年師曰祖師九年面壁一似不曾若恁麼會日日香華夜夜燈上堂道生一無角鐵牛眠少室一生二祖父開田說大義二生三梁間紫鷰語呢喃三生萬物男兒活計離窠窟多處添少處減大虫怕喫生人膽有若無實若虗爭掩驪龍明月珠是則是只如焦山坐斷諸方舌頭一句作麼生道肚無偏僻病不怕冷油拍禪床下座僧問如何是即心即佛曰鼎州出獰爭神云如何是非心非佛曰閩蜀同風云如何是不是心不是佛不是物曰窮坑難滿問起滅不停時如何曰謝供養問我有沒絃琴久居在曠野不是不會彈未遇知音者知音既遇未審如何品弄曰鐘作鐘鳴鼓作鼓響云雲門放洞山三頓棒意旨如何曰和身倒和身儡云飯袋子江西湖南便恁麼去又作麼生曰淚出痛腸云真金須是紅爐煅白玉還他妙手磨曰添一點也難為室中常舉帚柄問學者曰依稀苕帚柄髣髴赤斑虵眾皆下語不契有僧請益師示以頌曰依稀苕帚柄髣髴赤斑虵棒下無生忍臨機不識爺淳熈己亥八月朔示微疾四日染翰別郡守曾公逮夜半書偈付侍僧戒遺諸山書復書偈辭眾至鐘鳴趨寂龕留七日塔全軀於石公山壽七十有二臘五十有二常州華藏湛堂智深禪師武林人也佛涅槃日上堂曰兜率降生雙林示滅掘地討天虗空釘橛四十九年播土揚塵三百餘會納盡敗闕盡力布網張羅未免喚龜作鼈末後拘尸城畔槨示雙趺旁人冷眼看來大似弄巧成拙卓拄杖曰無這箇道理千古之下誰把口說且道是甚麼道理癡人面前切忌漏洩靈隱佛海慧遠禪師法嗣慶元府東山全庵齊己禪師卭之蒲江人族謝氏年二十五遽脫塵鞅往法輪寺下髮聽圓覺久之棄游關外謁佛海於蟠龍盡其機用海未之許一日五參出問未審如何是佛海曰齊己你問箇甚麼師於言下大悟遂禮拜海曰這漢今日大似方木逗著圓孔於是名振叢席初住鵝湖遷居廣慧徙東山上堂舉修山主偈曰是柱不見柱非柱不見柱是非已去了是非裏薦取召大眾曰薦得是移華兼蝶至薦得非擔泉帶月歸是也好鄭州梨勝青州棗非也好象山路入蓬萊島是亦沒交涉踏著秤磓硬似鐵非亦沒交涉金剛寶劒當頭截阿呵呵會也麼知事少時煩惱少識人多處是非多蓮社會道友請上堂漸漸雞皮鶴髮父少而子老看看行步躘踵疑殺木上座直饒金玉滿堂照顧白拈賊豈免衰殘老病正好著精彩任汝千般快樂渠儂合自由無常終是到來歸堂喫茶去唯有徑路修行依舊打之遶但念阿彌陀佛念得不濟事復曰啞這條活路已被善導和尚直截指出了也是你諸人朝夕在徑路中往來因甚麼當面蹉過阿彌陀佛這裏薦得便可除迷倒障拔猶豫箭截疑惑網斷癡愛河伐心稠林浣心垢濁正心諂曲絕心生死然後轉入那邊擡起脚向佛祖履踐不到處進一步開却口向佛祖言詮不到處說一句喚回善導和尚別求徑路修行其或準前捨父逃走流落他鄉撞東磕西苦哉阿彌陀佛淳熈丙午秋退居天童示少恙寄古爐瓶別育王佛照德光禪師乃書偈而逝撫州疎山歸雲如本禪師台城人也上堂久雨不晴戊在丙丁通身泥水露出眼睛且道是甚麼眼睛卓拄杖曰林間泥滑滑時叫兩三聲上堂舉丹霞燒木佛話乃曰李四有錢不解飲張三解飲又無錢相招豐樂樓中看不怕寒威雪滿天覺阿上人日本國藤氏子也十四得度受具習大小乘有聲二十九屬商者自中都回言禪宗之盛阿奮然拉法弟金慶航海而來歲餘始至乾道辛卯夏也袖香拜靈隱佛海禪師海問其來阿輒書而對復書曰我國無禪宗唯講五宗經論國主無姓氏號金輪王以嘉應改元捨位出家名行真年四十四王子七歲令受位今已五載度僧無進納而講義高者賜之某等仰服聖朝遠公禪師之名特詣丈室禮拜願傳心印以度迷津且如心佛及眾生是三無差別離相離言假言顯之禪師如何開示海曰眾生虗妄見見佛見世界阿書云無明因何而有海便打即命海陞座決疑明年秋辭游金陵抵長蘆江岸聞鼓聲忽穎悟始知佛海垂手旨趣旋靈隱述五偈敘所見辭海東歸偈曰航海來探教外傳要離知見脫蹄筌諸方參遍草鞋破水在澄潭月在天其一掃盡葛藤與知見信手拈來全體現腦後圓光徹太虗千機萬機一時轉其二妙處如何說向人倒地便起自分明驀然踏著故田地倒裹幞頭孤路行其三求真滅妄元非妙即妄明真都是錯堪笑靈山老古錐當陽拋下破木杓其四竪拳下喝少賣弄說是論非入泥水截斷千差休指注一聲歸笛囉囉哩其五海稱善書偈贈其行阿少親文墨善諸國書至此未數載徑躋祖域其於華語能自通淳熈乙未與其國僧統遣僧訊海副以水晶降魔杵及數珠二臂綵扇二十事貯以寶函壬寅夏王請住持其國叡山寺復遣僧通嗣書時海已入寂矣何山佛燈守珣禪師法嗣婺州義烏稠巖了贇禪師上堂舉趙州狗子無佛性話乃曰趙州狗子無佛性萬疊青州藏古鏡赤脚波斯入大唐八臂那吒行正令咄西禪文璉禪師法嗣遂寧府西禪第二代希秀禪師上堂曰秋光將半暑氣漸消鴻鴈橫空點破碧天似水猿猱挂樹撼翻玉露如珠直饒對此明機未免認龜作鼈且道應時應節一句作麼生道野色併來三島月溪光分破五湖秋雲居高庵善悟禪師法嗣婺州雙林用禪師郡之金華人族戴氏年十四往智者寺出家試所習得度乃遊江表初謁長蘆信保寧璣甘露卓後至龍門久之高庵過廬陵天寧遷雲居師隨至一日庵陞座舉僧問投子如何是十身調御投子下禪床叉手而立師聞罔知所詣歸坐紙帳中因垂手褰帳忽悟由是往來三佛會下皆蒙肯諾初住閩之中際次居東西二禪後補天寧雙林上堂曰拈槌竪拂祖師門下將黃葉以止啼說妙談玄衲僧面前望梅林而止渴際山今日去却之乎者也更不指東畫西向三世諸佛命脉中六代祖師骨髓裏盡情傾倒為諸人說破良久曰啼得血流無用處不如緘口過殘春台州萬年無著道閑禪師郡之黃巖人族洪氏年二十六師芭蕉庵主以中選籍名九峰興善院得度未久歷諸老之門晚至歐峰機語頓契紹興壬戌以天台太平興國為萬年報恩光孝勑師居之上堂曰全機敵勝猶在半途啐同時白雲萬里纔生朕兆已落二三不露鋒鋩成何道理且道從上來事合作麼生誣人之罪以罪加之上堂蕩蕩無迂曲明明透古今曉雲籠碧岫殘葉落疎林脫體全收放當堂定淺深饒君親薦得未是我智音上堂舉臨濟侍德山次山云今日困濟云這老漢寐語作麼山便打濟掀倒禪床雪竇云二員作者具碎同時眼有啐同時用雪竇擬向饑鷹爪下奪肉餓虎口裏爭餐敢謂德山臨濟俱是瞎漢有人辨得天下橫行師曰然則栴檀薝蔔氣不相饒鸑鷟麒麟瑞無私出為甚麼雪竇道俱是瞎漢選佛若無如是眼假饒千載亦奚為上堂舉乾峯示眾云舉一不得舉二放過一著落在第二雲門出眾云昨日有人從天台來却往徑山去峰曰典座來日不得普請師曰相見不須瞋君窮我亦貧謂言侵早起更有夜行人丁卯九月壬申書偈而寂福州中際能禪師嚴陵人也往來龍門雲居有年未有所證一日普請擇菜次高庵忽以猫兒擲師懷中師擬議庵攔𮌎踏倒於是大事洞然所至宗匠倒屣紹興甲子春入閩抵中際歲餘遂繼席上塔曰萬古長空一朝風月不可以一朝風月昧却萬古長空不可以萬古長空不明一朝風月且如何是一朝風月人皆畏炎熱我愛夏日長薰風自南來殿閣生微涼會與不會何忌承當僧問國師三喚侍者意旨如何曰路側轉身難云萬象之中獨露身又作麼生師舉拳示之南康軍雲居普雲自圓禪師綿之巴西人族雍氏年十九以試經被僧服留教苑五祀出關南下謁谷隱顯開福寧百丈古始詣龍門一日於廊廡間覩繪胡人有省夜白高庵庵舉法眼偈曰頭戴貂鼠帽腰懸羊角錐語不令人會須得人譯之復筴火示之曰我為汝譯了也於是大法明了呈偈曰外國言音不可窮起雲亭下一時通口門廣大無邊際吞盡楊岐栗棘蓬庵遣師依佛眼眼謂曰吾道東矣紹興丁巳出住薦福遷雲居上堂舉僧問雲門如何是透法身句門云北斗裏藏身師曰南北東西萬萬千乾坤上下兩無邊相逢相見呵呵笑屈指擡頭月半天大溈牧庵法忠禪師法嗣成都府信相戒修禪師上堂舉馬祖不安師曰兩輪舉處煙塵起電急星馳擬何止目前不礙往來機正令全施無表裏丈夫意氣自衝天我是我兮你是你寶峰擇明禪師法嗣漢州無為隨庵守緣禪師本郡人族史氏年十三病目因去家依棲禪慧目能禪師圓具出峽至寶峯一日峯上堂舉永嘉曰一月普現一切水一切水月一月攝遂舉拂子曰看看千江競注萬派爭流若也素善行舟便諳水脉遂可優游性海笑傲煙波其或未然且歸巖下坐更待月明時師聞釋然領悟翌日詣方丈陳所得峰首肯留五年西歸寓中巖郡守邵公溥挽師開法棲禪遷無為中巖上堂曰以一統萬一月普現一切水會萬歸一一切水月一月攝展則彌綸法界收來毫髮不存雖然收展殊途此事本無異致但能於根本上著得一雙眼去方見三世諸佛歷代祖師盡從此中示現三藏十二部一切修多羅盡從此中流出天地日月萬象森羅盡從此中建立三界九地七趣四生盡從此中出沒百千法門無量妙義乃至世間工巧諸伎藝盡現行此事所以世尊拈華迦葉便乃微笑達磨面壁二祖於是安心桃華盛開靈雲疑情盡淨擊竹作響香嚴頓忘所知以至盤山於肉案頭悟道彌勒向魚市裏接人誠謂造次顛沛必於是經行坐臥在其中既有如是奇特更有如是光輝既有如是廣大又有如是周徧你輩諸人因甚麼却有迷有悟要知麼幸無偏照處剛有不明時上堂綠暗紅稀日蜂忙蝶困時本來真面目一點不曾移㘞上堂舉趙州示眾云至道無難唯嫌揀擇纔有語言是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問既不在明白裏護惜箇甚麼曰我亦不知云和尚既不知為甚麼道不在明白裏曰問事即得禮拜了退師曰世間無物可羅籠獨立嵯峨萬仞峰忽若有人猛推落騰身雲外不留蹤烏巨雪堂道行禪師法嗣饒州薦福退庵休禪師上堂曰恁麼也不是不恁麼也不是針眼裏跳出赤梢鯉魚變化昇騰神通游戲直饒雨似盆傾不是不是上堂風動耶幡動耶風鳴耶鈴鳴耶非風鈴鳴非風幡動此土與西天一隊黑漆桶誑惑世間人看看滅胡種山僧不奈何趂後也打鬨瓠子曲彎彎冬瓜長儱侗上堂結夏時左眼半斤解夏時右眼八兩謾云九十日安居贏得一肚皮妄想直饒七穴八穿未免山僧拄杖雖然如是千鈞之弩不為鼷鼠發機上堂先師尋常用腦後一鎚卸却學者胷中許多詰曲當年克賓維那曾中興化此毒往往天下叢林喚作超宗異目非唯辜負興化亦乃克賓受辱若是臨濟兒孫終不依草附木資福喜見同參今日傾腸倒腹遂卓拄杖喝一喝曰還知先師落處麼猗死禪和如麻似粟上堂言發非聲是箇甚麼色前不物莫亂針錐透過禹門風波更險咄信州龜峰晦康慧光禪師建寧人也上堂數日暑氣如焚一箇渾身無處安著思量得也是煩惱人這箇失是煩惱更有己躬下事不明便是煩惱所以達磨大師煩惱要為諸人吞却又被咽喉小要為諸人吐却又被牙齒碍取不得捨不得煩惱九年若不得二祖不惜性命往往轉身無路煩惱教死所謂祖禰不了殃及兒孫後來蓮華峰庵主到這裏煩惱不肯住南嶽思大到這裏煩惱不肯下山更有臨濟德山用盡自己查梨煩惱鉢盂無柄龜峰今日為他閑事長無明為你諸人從頭點破卓拄杖一下云一人腦後露腮一人當門無齒更有數人鼻孔沒半邊不勞再勘你諸人休向這裏立地瞌睡殊不知家中飯籮鍋子一時失却了也你若不信但歸家點檢看真州長蘆且庵守仁禪師上堂曰百千三昧無量妙門今日且庵不惜窮性命只做一句子說與諸人乃卓拄杖下座上堂雲從龍風從虎吹散江村寒露雨麗天杲日絕纖埃有路明明吞佛祖物見主眼卓竪天邊白鴈送寒歸籬下黃華香半吐上堂卓拄杖召大眾曰這般曲調豈屬宮商不是知音徒勞側耳且庵今日待為諸人吹一曲舞一拍還有擊節者麼若有乾闥婆王性命難存若無贏得一場懡㦬音釋珪音圭郯音談昺音丙珣音荀贇於倫切績則歷切浚音峻孥音奴呢音元喃女咸切啞音亞叡音銳褰去虔切貂音凋㘞戶臥切
