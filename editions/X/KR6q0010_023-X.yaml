body:
  text: 平江府報恩光孝禪寺臣僧正受編賢臣下文公楊億居士字大年幼舉神嬰及壯負才名而未知有佛一日過同僚見讀金剛經笑且罪之彼讀自若公疑之曰是豈出孔孟之右乎何甚因竊閱數板懵然始少敬信後會翰林李公維勉令參問及由秘書監出守沙州首至廣慧謁元璉禪師璉接見公便問布鼓當軒擊誰是知音者璉曰來風深辨公曰恁麼則禪客相逢只彈指也璉曰君子可入公應喏喏璉曰草賊大敗夜語次璉曰秘監曾與甚人道話來公曰某曾問雲巖諒監寺兩箇大蟲相齩時如何諒曰一合相某曰我只管看未審恁麼道還得麼璉曰這裏即不然公曰請和尚別一轉語璉以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裏走金毛師子變作狗擬欲將身北斗藏應須合掌南辰後復杼其師承密證寄李維翰林語見僧寶廣慧傳中既而過門問道者無虗日悉隨機應之甞為眾曰此事大難委悉釋迦老子於三七日中思惟如是事便道我寧不說法疾入於涅槃帝釋梵王殷勤三請不得已而許之始自鹿野苑終於拘尸城中間四十九年作大佛事說三乘十二分教如瓶注水末後於靈山會上謂大眾曰吾正法眼已付摩訶大迦葉又云四十九年間未嘗說一字是甚麼道理於諸人分上著一字脚不得為諸人各各有奇特事在若喚作奇特事早不中了也我道釋迦是敗軍之將迦葉是喪身失命底人汝等諸人作麼生會不見道涅槃生死是夢言佛及眾生為增語直須恁麼會取不要向外馳求若也不明乖張不少居翰苑日慈明楚圓禪師為唐明嵩和尚持書至公問對面不相識千里却同風圓曰某奉院門請公曰真箇謾語圓曰前月離唐明公曰適來悔伸一問圓曰作家公便喝圓曰恰是公又喝圓以手畫一畫公吐舌曰真龍象也圓曰是何言歟公召典客令別點茶復曰元來是家裏人圓曰也不消得公良久又問如何是圓上座為人一句圓曰切公曰恁麼則長裙新婦拖泥走圓曰誰得似內翰公曰作家作家圓曰放內翰二十棒公拊膝曰這裏是甚麼所在圓拍手曰也不得放過公大笑復問專使還記得唐明和尚當時悟底因緣麼圓曰也曾見舉來公曰請不吝慈悲圓遂舉聞僧問首山如何是佛法大意山云楚王城畔汝水東流公曰只如此語意旨如何圓曰水上挂燈毬公曰恁麼則辜負古人去也圓曰疑則別參公曰三脚蝦䗫飛上天圓曰一任𨁝跳公哂之取辭日公曰某有一轉語寄上座往唐明處還得否圓曰明月照見夜行人公曰却不相當去也圓曰更深猶自可午後更愁人公曰開寶寺前金剛近日為甚麼汗出圓曰知公曰上座臨行豈無為人底句圓曰重疊關山路公曰恁麼則隨上座去也圓噓一聲公曰真師子兒大師子吼圓曰放去又扶來公曰某適來失脚倒地又得家童扶起圓曰有甚了期公大笑因微恙問環大師曰某今日忽違和大師慈悲如何醫療環曰丁香湯一椀公便作吐勢環曰恩受成煩惱環為煎藥次公叫曰有賊環下藥於公前叉手側立公瞠目眎之曰少叢林漢環拂袖而出又一日問曰某四大將欲離散大師如何相救環乃槌胷三下公曰賴遇作家環曰幾年學佛法俗氣猶未除公曰禍不單行環作噓噓聲公尋書偈付左右令來早送達李都尉偈曰漚生與漚滅二法本來齊欲識真歸處趙州東院西李見遂曰泰山廟裏賣紙錢亟跨馬至公始熟睡李撼之已逝矣朝野聞之莫不歎慕後廣慧於公諱日設位供養爇香次有僧問從來弟子供養師今日為甚麼師供養弟子璉曰恩來義住僧曰恁麼則令人轉憶龐居士也璉曰兩彩一賽僧噓一聲璉乃奠茶顧其僧曰鈍置老僧驢漢自餘機語見乎它集清獻公趙抃居士字悅道年四十餘擯去聲色系心宗教會佛慧法泉禪師號泉萬卷來居衢之南禪公曰親之泉未甞容措一詞後典青州政事之餘多宴坐忽大雷震驚即契悟作偈曰默坐公堂虗隱几心源不動湛如水一聲霹靂頂門開喚起從前自家底泉見笑曰趙悅道撞彩耳富鄭公初於宗門未有所趣公勉之書曰伏惟執事富貴如是之極道德如是之盛福壽康寧如是之備退休閑逸如是之高其所未甚留意者如來一大事因緣而已能專誠求所證悟則它日為門下賀也公年七十有二以太子少保致仕而歸親舊里民遇之如故作高齊以自適題偈見意曰腰佩黃金已退藏箇中消息也尋常世人欲識高齊老只是柯村趙四郎復曰切忌錯認臨夢遺泉書曰非師平日警誨至此必不得力矣泉悼以偈曰仕也為瑞歸歟世作程人間金粟去天上玉樓成慧劒無纖缺冰壺徹底清春風瀫水路孤月破雲明郎中張僅居士甞戲問桂府義禪師曰某如今剃却頭還做得長老也無義以手摩頂召曰郎中公應喏義曰會麼公曰不會義曰干頭甚麼事公恍然有得太傅高世則居士字仲貽號無功初依芙蓉道楷禪師求指心要楷令去其所重扣己而參一日忽造微密呈偈曰懸崖撒手任縱橫大地虗空自坦平照壑輝巖不借月庵頭別有一簾明太史黃庭堅居士字魯直號山谷以般若夙習雖膴仕澹如也出入宗門未有所向好作艶詞甞謁圓通秀禪師秀呵曰大丈夫翰墨之妙甘施於此乎秀方戒李伯時工𦘕馬事公誚之曰無乃復置我於馬腹中耶秀曰汝以艶語動天下人婬心不止馬腹正恐生泥犂中耳公悚然悔謝由是絕筆惟孳孳於道著發願文痛戒酒色但朝粥午飯而已往依晦堂祖心禪師乞指徑捷處心曰只如仲尼道二三子以我為隱乎吾無隱乎爾者太史居常如何理論公擬對心曰不是不是公迷悶不已一日侍心山行次時巖桂盛放心曰聞木犀華香麼公曰聞心曰吾無隱乎爾遂釋然即拜之曰和尚得恁麼老婆心切心笑曰只要公到家耳有本小異久之如雲巖謁死心新禪師隨眾入室新見張目問曰新長老死學士死燒作兩堆灰向甚麼處相見公無語新約出曰晦堂處參得底使未著在後左官黔南道力愈勝於無思念中頓明死心所問報以書曰往年嘗蒙苦苦提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退矣謫官在黔南道中晝臥覺忽然廓爾尋思被天下老和尚謾了多少惟有死心道人不肯乃是第一相為也不勝萬幸後作晦堂塔銘曰某夙承記莂堪任大法道眼未圓而來瞻窣堵實深宗仰之歎乃勒堅珉敬頌遺美云先是晦堂訃音至公設伊蒲塞供拈香說偈曰海風吹落楞伽山四海禪徒著眼看一把柳絲收不得和風搭在玉闌干中大吳中立居士字德夫居晦堂入室次堂謂曰平生學解記憶多聞即不問你父母未生已前道將一句來公擬議堂以拂子擊之即領深旨連述三偈呈之其後曰咄這多知俗漢齩盡古今公案忽於狼藉堆頭拾得蜣蜋糞彈明明不直分文萬兩黃金不換等閑拈出示人只為走盤難看咦堂答曰水中得火世還稀看著令人特地疑自古不存師弟子如今却許老胡知荊公王安石居士字介甫丁母難讀書定林往來蔣山從贊元禪師游一日問元祖師意旨元不答公益扣之元曰公於般若有障者三其近道之質一更須一兩生來恐純熟公曰願聞其說元曰公受氣剛大世緣深以剛大氣遭深世緣必以身任天下之重懷經濟之志用舍不能則心未平以未平之心持經世之志何時能一念萬年哉人多怒而學問尚理於道為所知愚此其三也特視名利如脫髮甘澹泊如頭陀此為近道且當以教乘滋茂之可也公再拜後於首楞嚴深得其旨又甞問真淨克文禪師曰諸經皆首標時處獨圓覺不然何也文曰頓乘所演直示眾生日用見前不屬古今老僧即今與相公同入大光明藏游戲三昧互為主賓非關時處又曰一切眾生皆證圓覺而圭峰易證為具謂譯人之訛其義是否文曰圓覺可易則維摩亦可易也維摩曰亦不滅受而取證證與證義有何異哉蓋眾生現行無明三昧即是如來根本大智圭峰之說但知其具耳公即領解提刑郭祥正居士字功甫號淨空喜泉石而不羨紛華因謁白雲守端禪師值端說法以上大人一篇示眾公切疑後聞小兒誦之有省書報白雲雲答偈曰藏身不用縮頭斂跡何須收脚金烏半夜遼天玉兔趕他不著元祐中往衢之南禪謁泉萬卷請陞堂公趨前拈香曰海邊枯木入手成香爇向爐中橫穿香積如來鼻孔作此大事須是對眾白過始得雲居老人有箇無縫布衫分付南禪禪師著得不長不短進前則諸佛讓位退步則海水澄波今日顰伸六種震動遂召曰大眾還委悉麼有意氣時添意氣不風流處也風流泉曰遞相鈍置公曰因誰致得崇寧初到五祖拜演禪師命演舉揚演就座公復趨前拈香曰此一辨香爇向爐中供養我堂頭法兄禪師伏願於方廣座上擘開面門放出先師形相與他諸人描邈何以如此白雲巖畔舊相逢往日今朝事不同夜靜水寒魚不食一爐香散白蓮風演拍禪床一下僧出問云云丞相富弼居士字彥國由清獻公警勵之後不舍晝夜力進此道聞證悟脩顒禪師主投子法席冠准甸往質所疑會顒為眾登座見其顧眎如象王回旋公微有得因執弟子禮趨函丈命侍僧請為入室顒見即曰相公已入來富弼猶在外公聞汗流浹背即大悟尋以偈寄圓照本禪師曰一見顒公悟入深夤緣傳得老師心東南謾說江山遠目對靈光與妙音後奏顒得證悟師名遣子普送至顒上堂謝語有曰彼一期之誤我亦將錯而就錯公偈偈贊曰萬木千華欲向榮臥龍猶未出滄溟彤雲彩霧呈嘉瑞依舊南山一色青內翰蘇軾居士字子瞻號東坡宿東林日與照覺常總禪師論無情話有省黎明獻偈曰溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人未幾抵荊南聞玉泉皓禪師機鋒不可觸公擬抑之即微服見皓皓問尊官高姓公曰姓秤乃秤天下長老底秤皓喝曰且道這一喝重多少公無對於是尊師之後過金山有寫公照容者公戲題曰心似已灰之木身如不繫之舟一作眼似初生犢牛問汝平生功業黃州慧州瓊州黃門侍郎蘇轍居士字子由元豐三年以罪謫高安會黃檗全禪師於城寺全嗣老南熟視公曰君靜而慧苟存心宗門何患不成此道公識之因習坐數求決於全無契後有省聰禪師來居壽聖公以此事往間聰不答公又扣之聰徐徐謂曰吾圓照未甞以道語人吾今亦無語子公於是得言外之妙有偈見于家集云正言王居士名犯欽宗廟諱依晦堂心禪師數載無所入元祐中漕江西辭晦堂乃問嗣師得甚深法者何人曰雲巖死心新老因即之問曰某常聞三緣和合即生又聞即死即生何故有奪胎而生者某所疑也望師明決新曰且如正言作運使所到處即居其位還疑之否曰不疑新曰復何疑也由是頓去封滯樞密徐俯居士字師川號東湖每侍先龍圖謁法昌及靈源語論終日公聞之藐如也及法昌歸寂在笑談間公異之始篤信此道後丁父憂念無以報罔極即命靈源至孝址說法源登座問答已乃曰諸仁者只如龍圖平日讀萬卷書如水傳器涓滴不遺且道尋常著在甚麼處而今捨識之後這著萬卷書底又却向甚麼處著公聞灑然有得遂曰吾無憾矣源下座問曰學士適來見箇甚麼便恁麼道公曰若有所見則鈍置和尚去也源曰恁地則老僧不如公曰和尚是何心行源大笑靖康初為尚書外郎與朝士同志者挂鉢於天寧寺之擇木堂力參圜悟悟亦喜其見地超邁一日至書記寮指悟頂相曰這老漢脚跟猶未點地在悟面曰甕裏何曾走却鼈公曰且喜老漢脚跟點地悟曰莫謗他好公休去丞相張商英居士字天覺號無盡年十九入京赴春闈抵向氏家向預夢神人報明日接相公凌晨公至向異之勞問勤腆後妻以女一日入寺見僧拂拭藏經梵夾肅莊皆金字公乃怫然曰吾孔聖之教反不如胡人之書夜坐書室吟哦至三鼓向呼曰夜深何不睡去公以前意對曰正此著無佛論向曰既無佛何用論之公疑其言遂已後訪一同列見佛龕前經乃問何書云維摩詰經公信手開閱至此病非地大亦不離地大處嘆曰胡人之語能爾耶因借歸讀之向問看者何書公曰維摩詰所說經向云可熟讀然後著無佛論公知其為誚始留心祖道元祐六年奉使江左由東林謁照覺總禪師敘論久之乃曰南昌諸山誰可與語總曰兜率悅玉溪喜公下車至八月按部過分寧諸禪迓之公請俱就雲巖寺陞堂有偈曰五老機緣共一方神鋒名向袖中藏明朝老將登壇看便請橫戈戰一場悅最後登座其提綱語要盡貫穿前列公大喜遂入兜率抵擬瀑亭公問此是甚處悅曰擬瀑亭公曰捩轉竹筒水歸何處悅曰目前薦取公佇思悅曰佛法不是這箇道理及夜話悅曰某無夢十年矣前五夜夢身立孤峰頂有日輪出于東方而公之來豈東方慧輪乎徐以所見真淨及素首座事語公公罔措悅因舉德山托鉢話令熟究之公悵然不寐至五鼓忽垂脚飜溺器猛省即造悅寢召曰某已捉得賊了也悅曰贓物在甚麼處公扣門三下悅曰且去來日相見翌旦投偈曰鼓寂鐘沈托鉢回巖頭一拶語如雷果然只得三年活莫是遭他授記來悅首肯書長偈付之囑曰參禪為命根未斷依語生解如是之法公已深知然有至微極細之魔使人不覺不知墮在區宇更宜著便公感甚邀至建昌道中求悅一一窺察之成十偈以誌其事悅依韻酬之是歲書雲日悅澡浴示徒說偈而化訃至公哭而慟及大拜乞諡悅號真寂禪師遣親持文祭其塔崇寧中寓江寧戒壇重閱雪竇拈古至百丈再參馬祖因緣云大冶精金應無變色投卷曰審如此言豈得臨濟法道有今日也以偈寄智海普融平禪師曰馬師一喝大雄峰聲入髑髏三日聾黃檗聞知驚吐舌江西從此振宗風仍舉似圓悟克勤禪師時住碧巖勤為點破公喟然曰始知宗師垂手處果不可以意得肯哉即下拜政和乙未秋大慧禪師宗杲自龍安謁公時為湛堂侍者公立問曰上座只恁麼著草鞋遠來杲曰某數千里行乞而至公曰年多少曰二十四公曰水牯牛年多少曰兩箇公曰甚麼處學得這虗頭來杲曰今日親見相公公曰念汝遠來且坐喫茶纔坐復問上座此來有何事杲起稟曰泐潭和尚示寂茶毗睛齒數珠不壞舍利盈溢山中耆宿皆願得相公大手筆為作塔銘激礪後學得得遠來瀆鈞聽公曰某被罪于此未甞為人作文字今有一問問上座若道得即與做塔銘若道不得贈公裹足歸龍安參禪去杲曰請相公垂問公曰聞準老眼睛不壞是否杲曰是公曰我不問這箇眼睛杲曰未審相公問甚麼眼睛公曰金剛眼睛杲曰若是金剛眼睛在相公筆頭上公曰恁麼則老夫為他點出光明令他照天照地去也杲趨階曰先師多幸謝相公作塔銘公大笑以宣和四年十一月邌明口占遺表命子弟書之俄取睡枕擲門窻上聲如雷震眾驚眎之已薨矣享年七十有七文定公胡安國居士字康侯號草庵久依上封得言外之旨崇寧中過藥山有禪人舉南泉斬猫話問公公以偈答曰手握乾坤殺活機縱橫施設在臨時滿堂兔馬非龍象大用堂堂總不知又寄上封有曰祝融峰似杜城天萬古江山在目前須信死心元不死夜來秋月又同圓大夫王居士遺其名以喪偶厭世相即慕南宗於元豐慧圓清滿禪師言下知歸滿一日謂曰子乃今之陸亘也公便掩耳既而回壇山之陽縛茅自處者三十載脇未甞至席偶歌曰壇山裏日何長青松嶺白雲鄉吟烏啼猿作道場散髮採薇歌又笑從教人道野夫狂左亟范冲居士字致虗由翰苑守豫章過圓通謁圓機道旻禪師茶罷曰某宿世作何福業今生墮在金紫囊中去此事稍遠旻呼內翰公應喏旻曰何遠之有公躍然曰乞師再垂指誨旻拊膝一下公擬對旻曰見即便見擬思即差公乃豁如中亟盧航居士與旻禪師擁爐次公問諸家因緣不勞拈出直截一句請師指示旻厲聲揖曰看火公急撥衣忽大悟公謝曰灼然佛法無多子旻喝曰放下著公應喏喏左司都貺居士問旻禪師曰是法非思量分別之所能解當如何湊泊旻曰全身入火聚公曰畢竟如何曉會旻曰驀直去公沈吟旻曰可更喫茶麼公曰不必旻曰何不恁麼會公契旨曰元來太近旻曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處旻曰咦猶有這箇在公曰乞師再垂直指旻曰便恁麼去鐺是鐵鑄公頓首謝之郡王趙令衿居士字表之號超然任南康政成事簡多與禪衲遊公堂間為摩詰丈室適圓悟禪師奉旨來居甌阜公欣然就其鑪錘悟不少假公固請悟曰此事要得相應直須是死一回始得公默契甞自疏之其略曰家貧遭劫誰知盡底不存空屋無人幾度賊來亦打悟見囑令加護紹興庚申冬公與汪內翰藻李參政邴曾侍郎開詣徑山謁大慧禪師慧聞至令行者擊鼓為眾入室公欣然袖香趨之慧曰趙州洗鉢盂話居士作麼生會公曰討甚麼碗拂袖便出慧起搊住曰古人向這裏悟去你因甚麼却不悟公擬對扣揓之曰討甚麼碗公曰還這老漢始得給事馮楫居士字濟川自壯扣諸名宿最後居龍門從佛眼清遠禪師再歲一日同遠經行法堂偶童子趨庭吟曰萬象之中獨露身遠拊公背曰好聻公於是契入紹興丁巳除給事中會大慧就靈隱開堂慧下座公挽之曰和尚每言於士大夫此生決不作這蟲豸今日因甚麼却納敗闕慧曰盡大地是箇杲上座你向甚麼處見他公擬對慧便打公曰是我招得越月特匃祠坐夏徑山榜其室曰不動軒一日杲陞堂舉藥山問石頭和尚云三乘十二分教某甲粗知承聞南方直指人心見性成佛實未明了伏望慈悲示誨頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得你作麼生山罔措頭曰子緣不在此可往江西見馬大師去山至馬祖處亦如前問祖曰有時教伊揚眉瞬目有時不教伊揚眉瞬目有時教伊揚眉瞬目者是有時教伊揚眉瞬目者不是山大悟杲拈罷公隨至方丈曰適來和尚所舉底因緣某理會得杲曰你如何會公曰恁麼也不得囌嚧娑婆訶不恁麼也不得㗭唎娑婆訶恁麼不恁麼總不得囌嚧㗭唎娑婆訶杲不顧後出知卭州移帥瀘南所至宴晦無倦甞自詠曰公事之餘喜坐禪少曾將脇到床眠雖然現出宰官相長老之名四海傳至二十三年秋乞休致預報親知期以十月三日報終至日令後廳置高座見客如平時至辰巳間降堦望闕肅拜請漕使攝郡事著僧衣履踞高座囑諸官吏及道俗各宜向道扶持教門建立法幢遂拈拄杖按膝蛻然而化漕使請曰安撫去住如此自由何不留一頌以表罕聞公張目索筆書曰初三十一中九下七老人言盡龜哥眼赤復斂目竟爾長往建炎後而名山巨剎教藏多不存公累以己俸印施凡一百二十八藏用祝君以康兆民門人蒲大聘甞誌其事云有語錄頌古行於世公施經有偈曰我賦躭痂癖有財貯空虛不作子孫計不為車馬連不充玩好用不買聲色娛置錐無南畝片瓦無屋廬所得月俸給唯將𦢌梵書萬里遣迎介崎嶇涉長途奉安大剎中開示諸迷徒庶機披閱者咸得入無餘古佛為半偈尚乃捨全軀我今以財施痛楚不侵膚以我較古佛苦樂萬倍殊所以不惜財非是稟性愚借問借財人終日較錙銖無常忽地到寧免生死無龍圖王蕃居士字觀復留昭覺日聞開靜板聲有省問南堂元靜禪師曰某有箇見處纔被人問著却開口不得未審過在甚處靜曰過在有箇見處却問公朝斾幾時到任曰去年八月四日靜曰自按察幾時離衙公曰前月二十靜曰為甚麼道開口不得公深領教授謝鳳居士字子儀號休休未詳參問因疾甚子弟舃遺像公見援筆題曰我心之憂日月如流仰箭必墜覆水難收蝮毒在手火然著頭天下輕於兩臂此身同乎一漚身與物孰重心與身孰優兼儒釋老之學非內外中之求一既不著三何由收殊途同歸萬壑交流道並行而不悖聊卒歲以優游一藥對病豈問乎君臣狼虎一味適口豈擇乎藜藿珍羞孰為瞿聃孰為孔周雖任重而道遠未甞休而未甞不休故曰休休停筆而逝待制潘良貴居士字義榮年四十回心祖闈所至挂鉢隨眾參扣後依佛燈守珣禪師久之不契因訴曰某只欲死去時如何珣曰好箇封皮且留著使用而今不了不當後去忽被他換却封皮卒無整理處又以南泉斬猫兒話問曰某看此甚久終未透徹告和尚慈悲珣曰你只管理會別人家猫兒不知走却自家狗子公於言下如醉醒珣復曰不易公進此一步更須知有向上事始得如今士夫說禪說道只依著義理便快活大率似將錢買油餈喫了便不飢其餘便道是瞞他亦可笑也公唯唯侍郎張九成居士字子韶號無垢未第因客談楊文公呂微仲諸名儒所造精妙皆由禪學而至也於是心慕之聞寶印楚明禪師道傳大通居淨慈即之請問入道之要明曰此事唯念念不捨久久純熟時節到來自然證入復舉趙州栢樹子話令時時提撕公久之無省辭謁善權清禪師問曰此事人人有分箇箇圓成是否清曰然公曰為甚某無箇入處清於袖中出數珠示之曰此是誰底公俛仰無對清復袖之曰是汝底則拈取去纔涉思惟即不是汝底公悚然未幾留蘇氏舘一夕如廁以栢樹子話究之聞蛙鳴釋然契入有偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭脚痛有玄沙屆明謁法印一禪師機語頗契適私忌就明靜庵供雲水主僧惟尚禪師纔見乃展手公便喝尚批公頰公趨前尚曰張學錄何得謗大般若公曰某見處只如此和尚又作麼生尚舉馬祖陞堂百丈卷席話詰之敘語未終公推倒卓子尚大呼張學錄殺人公躍起問傍僧曰汝又作麼生僧罔措公歐之顧尚曰祖禰不了殃及兒孫尚大笑公獻偈曰卷席因緣也大奇諸方聞舉盡攢眉臺盤趯倒人星散直漢從來不受欺尚答曰從來高價不饒伊百戰場中奪兩眉奪角衝關君會也叢林誰敢更相欺紹興癸丑魁多士復謁尚於東庵尚曰浮山圜鑑云饒你入得汾陽室始到浮山門亦未見老僧在如何公指侍僧曰蝦蟆窟裏討甚蛟龍丁巳秋大慧禪師董徑山學者仰如星斗公閱其語要歎曰是知宗門有人持以語尚恨未一見及為禮部侍郎偶參政劉公請慧說法于天竺公三往不值暨慧報謁公見但寒暄而已慧亦默識之尋奉祠還里至徑山與馮給事諸公議格物慧曰公只知有格物而不知有物格公茫然慧大笑公曰師能開諭乎慧曰不見小說載唐人有與安祿山謀叛者其人先為閬守有𦘕像在焉明皇幸蜀見之怒令侍臣以劒擊其像首時閬守居陝西首忽墮地公聞頓領深旨題不動軒壁曰子韶格物妙喜物格欲識一貫兩箇五百慧始許可後守邵陽丁父難過徑山飯僧秉鈞者意與慧議及朝政遂竄慧衡陽令公居家守服服除安置南安丙子春蒙恩北還道次新淦而慧適至與聯舟劇談宗要未甞語往事于氏心傳錄曰憲目嶺下侍舅氏歸新淦因會大慧舅氏令拜之憲曰素不拜僧舅氏曰汝姑扣之憲知其甞執卷遂舉子思中庸天命之謂性率性之謂道修道之謂教三句以問慧曰凡人既不知本命元辰下落處又要牽好人入火坑如何聖賢於打頭一著不鑿破憲曰吾師能為聖賢鑿破否慧曰天命之謂性便是清淨法身率性之謂道便是圓滿報身修道之謂教便是千百億化身憲得以告舅氏曰子拜何辭繼鎮永嘉丁丑秋匃祠枉道訪慧於育王作妙喜泉記越明年慧得旨復領徑山謁公於慶善院曰某每於夢中必誦語孟何如慧舉圓覺曰由寂靜故十方世界諸如來心於中顯現如鏡中像公曰非老師莫聞此論也其頌黃龍三關語曰我手何似佛手天下衲僧無口縱饒撩起便行也是鬼窟裏走諱不得我脚何似驢脚又被呞膠黏著翻身直上兜率天已是遭他老鼠藥吐不出人人有箇生緣處鐵圍山下幾千年三災直到四禪天這驢猶自在旁邊煞得工夫公甞設心六度不為子孫計因取華嚴善知識日供其二回食以飯緇流又甞供十六大天而諸位茶杯悉變為乳書偈曰稽首十方佛法僧稽首一切護法天我今供養三寶天如海一滴牛一毛有何妙術能感格試借意識為汝說我心與佛天無異一塵才起大地隔儻或塵銷覺圓淨是故佛天來降臨我欲供佛佛即現我欲供天天亦現佛子若或生狐疑試問此乳何處來狐疑即塵塵即疑終與佛天不相似我今為汝掃狐疑如湯沃雪火消冰汝今微有疑與惑子便到新羅國參政李邴居士字漢老醉心祖道有年聞大慧排默照為邪公疑怒相半及見慧示眾舉趙州庭栢垂語曰庭前栢樹子今日重新舉打破趙州關特地尋言語敢問大眾既是打破趙州關為甚麼却特地尋言語良久曰當初只道茆長短燒了方知地不平公領悟謂慧曰無老師後語幾蹉過後以書咨決曰某近扣籌室伏蒙激發蒙滯忽有省入顧惟根識暗鈍平生學解盡落情見一取一捨如衣壞絮行草棘中適自纏繞今一笑頓釋所疑欣幸可量非大宗匠委曲垂慈何以致此自到城中著衣喫飯抱子弄孫色色仍舊既亡拘執之情亦不作奇特之想其餘夙習舊障亦稍輕微臨行叮嚀之語不敢忘也重念始得入門而大法未明應機接物觸事未能無礙更望有以提誨使卒有所至庶無玷於法席矣又書曰某比蒙誨答備悉深旨某自驗者三一事無逆順隨緣即應不留胷中二宿習濃厚不加排遣自爾輕微三古人公案舊所茫然時復瞥地此非自昧者前書大法未明之語蓋恐得少為足當廣而充之豈別求勝解耶淨勝現流理則不無敢不銘佩寶學劉子羽居士字彥脩出知永嘉問道於大慧禪師慧曰僧問趙州狗子還有佛性也無趙州道無但恁麼看公後乃於栢樹子上發明有頌曰趙州栢樹太無端境上追尋也大難處處綠楊堪繫馬家家門底透長安提刑吳偉明居士字元昭久參真歇了禪師得自受用三昧為極致後訪大慧於洋嶼庵隨眾入室慧舉狗子無佛性話問之公擬答慧以竹篦便打公無對遂留咨參一日慧謂曰不須呈伎倆直須啐地折嚗地斷方敵得生死若只呈伎倆有甚了期即辭云道次延平倐然契悟連書數頌寄慧皆室中所問者其頌不是心不是佛曰不是心不是佛不是物通身一具金鏁骨趙州親見老南泉解道鎮州出蘿蔔門司黃彥節居士字節夫號妙德於大慧一喝下疑情頓脫慧以衣付之甞舉首山竹篦話至葉縣近前奪得拗折擲向堦下曰是甚麼山曰瞎公曰妙德到這裏百色無能但記得曾作蠟梅絕句曰擬嚼枝頭蠟驚香却肖蘭前村深雪裏莫作嶺梅看參政錢端禮居士字處和號松窻從護國此庵景元禪師發明己事後於宗門旨趣一一極之淳熈丙申冬簡堂行機禪師歸住平田法席鼎盛公遂與往來丁酉秋微恙修書召機及國清瑞巖主僧有訣別之語機與二禪詣榻次公起趺坐言笑移時出萬緡遺三剎即書曰浮世虗幻本無去來四大五蘊必歸終盡雖佛祖具大威德力亦不能免這一著子天下老和尚一切善知識還有跳得過者無蓋為地水火風因緣和合暫時湊泊不可錯認為己有大丈夫磊磊落落當用處把定立處皆真順風使帆上下水皆可因齋慶贊去留自在此是上來諸聖開大解脫一路涅槃門本來清淨空寂境界無為之大道也今吾如是豈不快哉塵勞外緣一時掃盡荷諸山垂顧咸願證明伏惟珍重置筆顧簡堂曰某坐去好臥去好堂曰相公去便了理會甚坐與臥耶公笑曰法兄當為祖道自愛遂斂目而逝內翰曾開居士字天游久參圓悟暨往來大慧之門有日矣紹興辛未佛海慧遠禪師補三衢光孝公與超然居士趙公訪之問曰如何是善知識遠曰燈籠露柱貓兒狗子公曰為甚麼贊即歡喜毀即煩惱遠曰侍郎時未除翰苑曾見善知識否公曰某三十年參問何言不見遠曰向歡喜處見煩惱處見公擬議遠震聲便喝公擬對遠曰開口底不是公罔然遠召曰侍郎向甚麼處去也公猛省遂點頭說偈曰咄哉瞎驢叢林妖㜸震地一聲天機漏泄有人更問意如何拈起拂子劈口截遠曰也只得一橛知府葛郯居士字謙問號信齋少擢上第玩意禪悅首謁無庵全禪師求指南全以即心即佛因緣令究之久無所契請曰師有何方便使某得入全曰居士大無厭生已而佛海來居劒池公因從游乃舉無庵所示之語靖為眾普說海發揮之曰即心即佛眉拖地非佛非心雙眼橫蝴蝶夢中家萬里子規枝上月三更留旬日而後反一日舉不是心不是佛不是物㸌爾頓明頌曰非心非佛亦非物五鳳樓前山突兀艶陽影裏倒翻身野狐跳入金毛窟金肯之即遣書頌呈海海報曰此事非紙筆可既居士能過我當有所聞矣遂復至虎丘海迎之曰居士見處止可入佛境界入魔境界猶未得在公加禮不已海正容曰何不道金毛跳入野狐窟公乃痛領甞問諸禪曰夫婦二人相打通兒子作證且道證父即是證母即是或庵體禪師著語曰小出大遇淳熈六年守臨川八年感微疾一夕忽索筆書偈曰大洋海裏打鼓須彌山上聞鍾業鏡忽然撲破翻身透出虗空召僚屬示之曰生之與死如晝與夜無足怪者若以道論安得生死若作生死會則去道遠矣語畢端坐而化正月二十七日也侍郎李浩居士字德遠號正信幼閱首楞嚴經如游舊國志而不忘登第後聞應庵曇華禪師時住明果與大慧之道為二甘露門乃造明果投誠入室華揕其胷曰侍郎死後向甚麼處去公駭然汗下華喝出公退參不旬日竟躋堂奧以偈寄同參嚴康朝教授曰門有孫儐鋪家存甘贄妻夜眠還早起誰悟復誰迷華見稱善有鬻胭脂者亦久參應庵頗自負公贈之偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來這裏喫拳頭華益稱之通判趙善期居士未詳參問甞舉韶州乳源和尚示眾云西來的的意也不易舉唱時有僧出源劈脊便打云如今是甚麼時節汝出頭來便歸方丈公頌曰西來的的意何如舉唱多憐在半途勾賊到門還破賊信知身佩辟兵符朝奉俞南仲居士字彥若號大山乾道間子澂仕三山公與偕往聞乾元安永禪師為眾衲所歸欲謁之會永遷黃檗來辭公就以平日咨參求決永曰所言皆當止欠一味藥耳既去公甚以為疑永甞賸稱寄居李倅楶造詣高妙因修敬李舉南泉斬貓話示之仍為頌曰提處分明斬處親落華飛絮撲行人頭戴草鞋出門去四月圓荷葉葉新公究數月有省謂其子曰我和得此偈了也子請其所以公極力拊掌三下李聞之曰且喜打透漆桶自爾智證成就年七十有二屬疾有至省問則隨機開諭一日邀僧命看華嚴僧欲歸請經公曰此自有經僧取經擬展卷公笑曰幾時得了且只誦多心經僧方誦心經公起趺坐泊然而逝公之高祖守尚書屯田郎中汝尚字退翁元豐七年秋與其室黃氏相期先後亡故墓表有曰夫人則沐浴而化退翁則隱几而終甞作發願偈曰我死願作修行僧出處常與善知識生身永斷塵中緣世世踐履菩薩道其契悟機緣未詳附見于此音釋懵莫孔切瞠音撑薨呼肱切瀫音斛孳音茲黔音鉗窣蘇骨切𧏙去羊切蜋音良舍與捨同浹子恊切姓秤去聲藐亡角切䫌匹米切向式亮切腆它典切怫扶弗切誚才笑切溺與尿同伻普耕切邌音犂搊楚尤切𢮁於許切豸池爾切瀘音盧痂音加蕃音藩蝮孚六切悖音勃叛音畔淦音紺啐子律切揕知鴆切楶音節膴音武與音預
