body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十四世臨濟十世翠巖三世智海普融道平禪師法嗣東京淨因佛慈蹣庵繼成禪師袁之宜春人族劉氏冠以愽學知名崇寧中入貢于宗伯不第慨然有出塵志師仰山普禪師得度去依雲蓋老智得其大略往扣普融深明旨要融力稱之尋往玉泉分座名震舊京宣和六年春詔住右街顯忠寺久而徙淨因高宗皇帝潛邸時賜御書扇面二十一事及賜錢飯僧命陞座建炎初居天台華頂紹興間移閩中秀峰上堂拈拄杖曰清淨本然云何忽生山河大地看看富樓那穿過釋迦老子鼻孔釋迦老子鑽破虗空肚皮且道山河大地在甚麼處擲下拄杖召大眾曰虗空翻筋斗向新羅國裏去也是儞諸人切忌認葉止啼刻舟尋劒上堂太陽門下日日三秋從東過西明月堂前時時九夏指鹿為馬會麼珊瑚枝枝撐著月上堂茫茫盡是覓佛漢舉世難尋閑道人棒喝交馳成藥忌了亡藥忌未天真上堂崑崙奴著鐵袴打一棒行一步爭似火中釣鼈日裏藏水陰影問翻魍魎虗空縛殺麻繩上堂踞坐曰擒虎兕剉於菟坐斷千聖路頭打破群魔境界還有如是衲僧麼時有僧問不求諸聖不重己靈時如何曰一釣便上云學人會也曰休將披地竹擬比拂雲松云爭奈上無攀仰下絕己躬曰一任撑天拄地僧禮拜師拍禪床下座一日同法真慈受圓悟十法師洎四禪諸講千僧赴太尉陳公良弼府伊蒲塞供徽宗皇帝私幸觀之太師魯國公與焉有善華嚴者乃賢首宗之義虎也對眾問諸禪曰吾佛設教自小乘至於圓頓掃除空有獨證真常然後萬德莊嚴方名為佛甞聞禪宗一喝能轉凡成聖則與諸經論似相違背今一喝若能入吾宗五教是為正說若不能入是為邪說諸禪視師師曰如法師所問不足三大禪師所酬淨因小長老可以使法師無惑也師召善善應諾師曰法師所謂愚法小乘教者乃有義也大乘始教者乃無義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空或作空而不有有而不空義也如我一喝非唯能入五教至於工巧技藝諸子百家悉皆能入師震聲喝一喝問善曰聞麼云聞曰汝既聞此一喝是有能入小乘教須臾又問善曰聞麼云不聞曰汝既不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲消汝復道無道無則元初實有道有則而今實無不有不無能入終教我有一喝之時非有是有因無故有無一喝之時非無是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫徧虗空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善乃起再拜師復謂曰非唯一喝為然乃至語默動靜一切時一切處一切事一切物契理契機周遍無餘聞者靡不歎仰皇帝顧謂近臣曰禪宗玄妙深極如此淨因才辯亦罕有也近臣奏云此宗師之緒餘耳癸亥秋終于秀峰祥異甚眾潭州南巖法輪達宗彥孜禪師處之龍泉陳氏子也上堂曰若是諦當漢通身無隔礙舉措絕毫釐擺手出紅塵撥開向上竅當頭劄定不犯鋒棱轉握將來應用恰好絲毫不漏函蓋相應任是諸佛諸祖著寒毛卓竪會麼喫茶去僧問如何是不涉煙波底句曰皎皎寒松月飄飄谷口風云萬差俱掃蕩一句截流機曰點僧云到師曰借人面具舞三臺問如何是佛曰白額大虫云只如洞山道麻三斤又作麼生曰毒虵鑽露柱云學人不曉曰踏著始驚人衡州開福崇哲禪師邵州人族劉氏於新化廣福寺得度徧踵叢席晚見普融深得法忍出住開福上堂曰妙體堂堂觸處彰快須回首便承當今朝對眾全分付莫道儂家有覆藏擲拂子召侍者曰因甚打下老僧拂子上堂山僧有三印更無增減剩覿面便相呈能轉凡成聖諸人還知麼若也未知不免重重注破一印印空日月星辰列下風一印印泥頭頭物物顯真機一印印水捩轉魚龍頭作尾三印分明體一同看來非赤又非紅互換高低如不薦青山依舊白雲中僧問一水吞空遠三峰峭壁危猊臺重拂拭共喜主人歸未審到家如何施設曰空手捻雙拳云意旨如何曰突出難辨泐潭景祥禪師法嗣台州鴻福德昇禪師衡陽人幼選經得度即依泐潭密授法印上堂曰諸人恁麼上來墮在見聞覺知恁麼下去落在動靜施為若也不去不來正是鬼窟活計如何道得出身底句若也道得則分付拄杖子若道不得依而行之卓拄杖下座建寧府萬壽惠素禪師郡之浦城人族黃氏年二十七依南峰俊禪師下髮持頭陀行閱三載辭謁圓悟草堂諸宗匠尋詣寶峰頓悟心法服勤久之龍圖祖公秀實聞府座以萬壽固請師不得辭上堂僧問劫火洞然大千俱壞未審這箇還壞也無大隨云壞修山主云不壞未審孰是孰非師曰一壞一不壞笑殺觀自在師子驀齩人狂狗盡逐塊復曰會麼云不會師曰漆桶不快便下座一日有僧來作禮師問甚處來云和尚合知某來處曰湖南擔屎漢江西刈禾客云和尚真人天眼目某在大溈充園頭東林作藏主師打三棒喝出紹興二十三年六月朔沐浴趺坐書偈曰昨夜風雷忽爾露柱生出兩指天明笑倒燈籠拄杖依前扶起拂子𨁝跳過流沙奪轉胡僧一奪隻履於是儼然而逝壽七十有九臘五十有三慶元府香山道淵禪師本郡人上堂曰酒市魚行頭頭寶所鴉鳴鵲噪一一妙音卓拄杖曰且道這箇是何佛事狼藉不少上堂香山有箇話頭彌滿四大神洲若以佛法批判還如認馬作牛諸人既不作佛法批判畢竟是甚麼道理擊拂子曰無鑐鏁子不厭動搖半夜枕頭要須摸著珍重隆興府泐潭惟足禪師上堂曰奔流渡刃疾焰過風已是子過新羅倒拈蝎尾逆捋虎鬚作死馬醫了移星換斗倒嶽傾湫却較些子咦足上座前言不副後語便下座慶元府啟霞德宏禪師衡陽人徧游師席後契悟於泐潭出住烏回次遷啟霞上堂曰上士相逢擊石火迸出流星眨眼過是渠成佛已多時堪笑癡禪黑處坐阿呵呵冥然作夢幾時休守却飯籮空忍餓建寧府開善木菴道瓊首座信之上饒人叢林以耆德尊之泐潭亦謂其飽參分座日甞舉隻履西歸語謂眾曰坐脫立亡倒化即不無要且未有逝而復出遺履者惟復後代兒孫不及祖師惟復祖師剩有這一著子乃大笑曰老野狐紹興庚申冬信守以超化革律為禪迎為第一祖瓊語專使曰吾初無意人間欲為山子正其宗派耳然恐多不能往受請已取所藏寶峰繪像與木庵二字仍書偈囑清泉亨老寄得法弟子慧山偈曰口觜不中祥老子愛向叢林鼓是非分付雪峰山首座為吾痛罵莫饒伊顧專使曰為我傳語侍郎行計迫甚不及修答聲絕而化時十月十六日也景淳知藏梅州人於化度寺得度往依寶峰入室次峰問陝府鉄牛重多少淳叉手近前云且道重多少峰曰尾在黃河北頭枕黃河南善財無鼻孔依舊向南參淳擬議峰便打忽頓徹巾侍有年竟隱居林壑甞作偈曰怕寒懶剃髼鬆髮愛暖頻添榾柮柴破衲伽梨撩亂搭誰能勞力強安排信州懷玉用宣首座四明人族彭氏幼為僧徑趨叢室侍泐潭於黃檗一日自臨川持鉢歸值潭晚參有云一葉飄空便見秋法身須透閙瞅瞅宣聞領旨潭為證據後依大慧慧亦謂其類已以是名卿鉅公以列剎禮迎不就甞頌大愚答佛話曰鋸解秤鎚出老杜詩紅稻殘鸚鵡顆碧梧棲老鳳凰枝光孝碧落慧蘭禪師法嗣慶元府蘆山無相法真禪師江南後主之裔也於和之東城廣聖圓具飫游叢社即光孝之室遂舉臨濟參黃檗因緣問之師擬對孝震聲一喝師聞竟死偷心乃蒙記莂留一宿而退由此名重一時出住興教遷薦福及蘆山上堂曰蘆峰深處無人到門前雪壓枯松倒板聲驚起夢中人一條古路清風掃上堂欲明向上事須具頂門眼若具頂門眼始契出家心既契出家心常具頂門眼要會頂門眼麼四京人著衣喫飯兩浙人飽暖自如通玄峰頂香風清華發蟠桃三四株青原第十四世雲門八世淨慈寶印楚明禪師法嗣溫州靈巖德宗禪師會稽人族李氏於大善寺得度為城下都表白去趨寶印之席清苦為志日唯一食久乃開悟未幾聞文關西道化盛行往謁文見稱賞印聞迎歸為第一座聲名籍籍溫守以靈巖遣使命住持堅臥不答閉戶絕糧屢日而後就學侶雲萃入院日僧問如何是靈巖境曰地從三島裏分出門向雙峰中處開會方臘嘯聚眾奔逃師端坐怡然賊至拜敬而去宣和辛丑六月二十三日應供次偶中油毒病革門人請以酒進藥師叱曰有生則有死可破戒而逃死乎乃揮偈曰一住二十四年隨宜建立因緣如今去也何時節風在青松月在天飲目而化臨安府淨慈象禪師上堂古者道一翳在眼空華亂墜拈拄杖曰淨慈拈起拄杖豈不是一翳在眼百千諸佛總在拄杖頭現丈六紫磨金色之身乘其國土遊歷十方說一切法度一切眾豈不是空華亂墜即今莫有向拄杖未拈已前坐斷得底麼出來與淨慈相見如無切忌向空本無華眼本無翳處著到乃擲拄杖下座福州雪峰海月隆禪師上堂曰一不成二不是口喫飯鼻出氣休云北斗藏身說甚南山鼈鼻家財運出任交關勸君莫競錐頭利長蘆祖照道和禪師法嗣鎮江府甘露達珠禪師福之長樂人妙齡得度一鉢游方高行異倫叢林尊仰出住甘露上堂曰聖賢不分古今惟一可謂火就燥水流濕鑿井而飲耕田而食大眾東村王老去不歸紛紛黃葉空狼藉沂州天寧明禪師僧問靈雲見桃華悟道還端的也無曰窮有所自云只如玄沙道諦當甚諦當敢保老兄未徹意作麼生曰疑殺天下人臨安府靈隱圓智法淳禪師上堂曰吾心似秋月碧潭清皎潔師喝曰寒山子話墮了也諸禪德皎潔無塵豈中秋之月可比靈明絕待非照世之珠可倫獨露乾坤光吞萬象普天匝地耀古騰今且道是箇甚麼良久曰此夜一輪滿清光何處無臘八上堂舉祖照和尚云半夜逾城喚不回雪山深處絕纖埃蘆芽穿膝尋常事一見明星眼豁開先師恁麼說話盡善盡美要且未有出身一路山僧見處也要諸人共知半夜逾城景象虗雪山深處觜盧都直饒一見明星悟已是當時不丈夫明眼衲僧一任眨剝雪峰妙湛思慧禪師法嗣臨安府淨慈佛行月堂道昌禪師霅之寶溪人族吳氏母感異夢而生六歲從鹿苑證大德十三祝髮逾二年謁妙湛於道場聞舉須彌山話言下知歸湛戒其藏器於身復示以雪竇為道日損偈令洞究一日始徹證淵微亟往告湛湛為助喜於是以徧參為志率時輩俊傑如聞庵宗正堂辯偕游淮楚湖湘間依長靈卓保寧璣圓悟勤諸大宗師咸器賞之尤於圓悟室中問答無滯特加前席命典翰拂衣不顧歸省湛於淨慈俾掌藏為眾說法道聲藹著時年二十三久之湖守以何山從妙湛勾有道者住持以師應命未幾補穹窿瑞光遷育王建炎中退席跨黃犢游天台紹興初居閩中大吉徙秀峰龜山方來萬指詔移金陵蔣山蔣山新經戎嬧師至一新之復奉旨擢徑山靈隱庚辰冬上表乞行度牒辛巳春蒙放行是年退藏靈泉乾道丙戌秋適淨慈闕主法衲子荷包懇師座乞師振之王公炎入山禮請遂不得辭上堂曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道礙他銅盤不打老鼠所以抽身入遷從屋裏來扱教臺凳穩聊且勸三杯兄呼弟喚殷勤處留得兒孫辨劫灰上堂未透祖師關千難與高難既透祖師關千難與萬難未透時難即且置既透了因甚麼却難放下笊籬雖得價動他杓柄大無端上堂與我相似共儞無緣打翻藥銚傾出爐煙還丹一粒分明在流落人間是幾年咄上堂雁過長空影沉寒水雁無遺蹤之意水無沉影之心若能如是正好買草鞋行脚所以道動則影現覺則冰生不動不覺正在死水裏薦福老人出頭不得即且置育王今日又作麼生向道莫行山下路果聞猿呌斷膓聲歲旦上堂舉拂子曰歲朝把筆萬事皆吉忽有箇漢出來道和尚這箇是三家村裏保正書門底為甚麼將在華王座上當作宗乘只向他道牛進千頭馬入百疋僧問大用現前不存軌則時如何曰張家兄弟太無良云恁麼則一切處皆是去也曰莫唐突人好問心生則法生心滅則法滅只如心法雙忘時生滅在甚麼處曰左手得來右手用問如何是從上宗門中事曰一畝地云便恁麼會時如何曰埋沒不少問擎頭戴角來時如何曰老僧只管看云看後如何曰自起自倒云和尚還出得麼曰𭊷取一莖草來僧擬議師曰著甚死急問如何是諸佛本源曰屋頭問路云向上還有事也無曰月下拋塼問如何是十身調御曰喫水論噎師以智證精徹操履高邈埀手之際不少假透關之土多望崖而退紹興之來叢林殆欲委地師力扶之以正教化餘五十年而王公大臣有過門者將迎未甞埀堂甞謂眾曰吾欲得真實慕道之士令大徹大悟起雲門一派俾天下向吾教者知有此宗則人自然如水赴壑豈為枉道而涉叢林耶辛卯正月二十擊鼓辭眾遠近咸集無不泣留侍者請偈至再師呵曰圓照大通與先師皆不作此態即瞑目而逝後七日塔全身於寺之東巘號曰常樂壽八十有三臘六十有九臨安府徑山照堂了一禪師上堂曰參玄之士觸境遇緣不能直下透脫者蓋為業識深重情妄膠固六門未息一處不通絕點純清含生難到直須入林不動草入水不動波始可順生死流入人間世諸人要會麼以拄杖一畫曰只向這裏薦取福州大吉法圓禪師上堂竪拂子曰描不成𦘕不就吞熱鐵圓解開大口吉山報應如斯自笑人間罕有鎮江府金山了心禪師上堂曰佛之一字孰云無木馬泥牛滿道途倚徧欄干春色晚海風吹斷碧珊瑚還有同聲相應同氣相求者麼百鳥不來樓閣閉只聞夜雨滴芭蕉福州石松祖天禪師僧問如何是一心不生曰七縱八橫云如何是萬法無咎曰一場漏逗報恩寶月覺然禪師法嗣嘉興府資聖元祖禪師僧問紫金蓮捧干輪足白玉毫輝萬德身如何是佛曰拖槍帶甲云貫華千偈雖殊品標月還歸理一如如何是法曰元豐條紹興令云林下雅為方外客人間堪作火中蓮如何是僧曰披席把椀慧林慈受懷深禪師法嗣臨安府靈隱寂室慧光禪師錢塘夏候氏子為人克苦凡四坐道場三奉詔旨上堂曰不用求真何須息見倒騎牛兮入佛殿羗笛一聲天地空不知誰識瞿曇面僧問飛來峰頂山色示清淨法身合㵎橋邊溪聲演廣長舌相正當恁麼時如何是雲門一曲曰芭蕉葉上三更雨云一句全提超佛祖滿筵朱紫盡知音曰逢人不得錯舉台州國清愚谷妙印禪師上堂曰滿口道得底為甚麼不知有十分知有底為甚麼滿口道不得且道殽訛在甚麼處若也知得許你照用同時明闇俱了其或未然道得道不得知有不知有南山石大虫解作師子吼台州國清垂慈普紹禪師上堂曰靈雲悟桃華賢沙傍不肯多少癡禪和擔雪去填井今春華又開此意誰能領端的少人知華落春風靜泉州九座慧邃禪師上堂曰九座今日向孤峰絕頂駕一隻鐵船截斷天下人要津教他揮篙動棹不得有箇錦標子且道在甚麼人手裏舉拄杖曰看看向道是龍剛不信等閑奪得始驚人慧林月印慧海禪師法嗣廬山萬杉壽堅禪師相州人也歲旦上堂曰有一人不拜歲不迎新寒暑不能侵其體聖凡不能混其跡從來鼻孔遼天誰管多年曆日大眾且道此人即今在甚麼處卓拄杖曰咄咄咄沒處去廬山萬杉壽隆禪師自繼兄堅禪師之席學者四至一夕小參敘語畢復曰不免舉箇公案辭別大眾良久曰青山無限好猶道不如歸聲輟而卒眾愕眙時方仲夏如焚留七日神色無少變火後設利如雨開先宗禪師法嗣筠州黃檗惟初禪師毗陵錦溪人族蔡氏妙齡捨家試經得度即詣開先先問十方智者皆入此宗只如此宗作麼生入師擬對先喝曰你纔開口堪作甚麼師悚然曰願師指示先曰譬如習射念念只在紅心眼無異盻手不虗拈箭發離弦管取中的於是豁然領解出住黃檗上堂曰我見宗大哥平生槁默危坐所謂朽木形骸未甞口角譊譊將佛祖言教以當門庭只要當人歇得十成自然不向這殻漏子上著到時有僧問既不向這殻漏子上著到未審如何保任曰無儞用心處曰和尚豈無方便曰𨫼餅既無汁壓沙那有油潭州嶽麓海禪師僧問進前三步時如何曰撞頭磕額云退後三步時如何曰墮坑落壍云直得不進不退時又作麼生曰立地死漢雪峰圓覺宗演禪師法嗣福州鳳山道沼禪師上堂曰如來正眼列祖真規向出聖凡超諸有表不是目前法莫生種種心起滅不相知箇中無向背既無向背如何湊泊徹底若能無見見舉頭方證不空空福州西禪慧舜禪師真定府人也上堂曰五日一參三八普說千說萬說橫說竪說忽有箇衲僧出來道說即不無爭奈三門頭兩箇不肯山僧即向他道瞎漢若不得他兩箇西禪大似不遇知音上堂今朝清旦萬事成辦直饒只麼休去已是生枝引蔓且道截斷葛藤一句作麼生道臥水鐵牛歸北嶺雙趺單枕雁南飛上堂說不得處作麼生舉舉不得處作麼生會會不得處作麼生明明不得處作麼生透良久曰乞火和煙得擔泉帶月歸箇中如未委紅日曉來輝香嚴海印智月禪師法嗣鄧州香嚴倚松如璧禪師撫之臨川人族饒氏舊名節字德操業儒起家自妙齡飽於學優於才工於搜抉高於志節深為人所知然連蹇場屋不弟後走京師以詩文鳴上庠故一時名士皆與之遊丞相曾公布聞其名延為上客一日上書陳利害曾不納去之鄧依俞公彥明留數月因館僕占對異常竊恠之謂僕曰汝其有以語我來僕徐對曰某向守舍無所用心聞隣寺海印長老有道價往請一轉語體究忽爾覺悟身心泰然無它也顧僕曰汝能是我乃不能何哉徑往扣印旬餘忽掣鏁而悟印印之以偈師作書報友人呂公本中舍人曰某自去年十二月二十八日於海印老人處請話咨决從此日日去參正月半間瞥然有箇省處奇哉奇哉世間元來有此不可說不可說不可說無量無邊勝事佛言一大事因緣豈欺我哉便向山河大地草木叢林墻壁瓦礫雞鳴狗吠著衣喫飯舉手動足處一一見本來面目始悟無始以來生死顛倒為物所轉到這裏如燈破暗一時失却豈不是無量大緣乎於是棄婚宦盡發囊橐市之與僕同祝髮僕名如琳尊為兄已而偕琳遍參諸名宿所至蒙肯可歸結茆香嚴之鶻壁賢士大夫初聞師圓顱太息曰吾黨中失一國士重為四海惜襄守趙公岍以天寧挽師開法衲子爭集檀信委施無虗日方盛而棄去鄧師王公仲癡請居香嚴未幾復棄去道俗遮留不可遂隱於故廬示眾曰變化密移何太急剎那念念一呼吸八萬四千方便門且道何門不可入入不入曉來雨打芭蕉濕殷勤更問箇中人門外堂堂相對立聞木鳥鳴說偈曰剝剝剝裏面有蟲外面多少茫茫瞌睡人頂後一推猶未覺若不覺更聽山僧剝剝剝餘語未見惜其錄非衲子所編今唯文集行於世建炎三年四月旦書偈遺眾無疾而逝士庶致祭不輟五月旦奉全身塔于曰崖之下世壽六十有五夏臘二十有七音釋蹣音盤泐音勒琂音言璘音隣於音烏菟音徒與去聲眨音劄髼音蓬鬆音松榾音骨柮音咄飫音瘀扱初洽切巘魚蹇切譊女交初岍口強切音紀切
