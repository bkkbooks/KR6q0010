body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十四世臨濟十世黃龍三世泐潭應乾禪師法嗣楚州勝因咸靜禪師郡之山陽人族高氏甫冠落髮受具游講肆慨然曰義學豈吾事哉乃去謁名宿晚契悟於泐潭望重江湖凡三董名剎住勝因日嘗臨池為堂以燕息名曰戲魚故叢林雅以稱焉上堂曰游遍天下當知寸步不曾移歷盡門庭家家竈底少煙不得所以肩笻帩履乘興而行掣鈎沉絲任性而住不為故鄉田地好因緣熟處便為家今日信手拈來從前幾曾計較不離舊時科段一回舉著一回新明眼底瞥地便回未悟者識取面目且道如何是本來面目良久曰前臺華發後臺見上界鐘聲下界聞以拂子擊禪床下座上堂氣候欲流金炎威將鑠石扇子搖明月雲片聳奇峰蠶成繭而麥漸收笋抽簪而梅已熟薰風習習逝水滔滔鵲噪森松鶯啼修竹觀音勢至文殊普賢有願必從無剎不現正當今日人天會上還有得見底麼如無聽取崇寧老從頭說向公上堂匣中寶劒袖裏金鎚時節既彰莫辭拈出擊開關鎖斬斷葛藤令他跳出生死門驀過荊棘路人人似生師子箇箇如活大蟲休教著布過他州直待還鄉衣晝錦上堂舉世尊在摩竭陀國為衆說法是時將欲白夏乃謂阿難曰諸大弟子人天四衆我常說法不生敬仰我今入因沙臼室中坐夏九旬忽有人來問法之時汝代為我說一切法不生一切法不滅言訖掩室而坐師召衆曰釋迦老子初成佛道之時大都事不獲已才方成箇保社便生退倦之心勝因當時若見將釘釘却室門教伊一生無出身之路免得後代兒孫遞相倣斆不見道若不傳法度衆生是不名為報恩者擊拂子下座後晦處漣之天寧云微疾書偈曰弄罷影戲七十一載更問如何回來別賽置筆儼然而逝茶毗收設利靈骨建塔奉藏臘五十二潭州龍牙宗密禪師豫章人虎丘隆禪師游方尚及親見上堂曰休把庭華類此身庭華落後更逢春此身一往知何處三界茫茫愁殺人福州雪峰有需禪師興化甫田洪氏子上堂曰山僧尋常不欲潑水向諸人耳裏撒砂向諸人眼裏何故水若入耳終壞耳根砂若入眼必為眼翳若是皮下有血漢聞恁麼道便好瞥地去若能如是三世諸佛覔他蹤跡不得十聖三賢階級他不得一大藏教說他不著為甚麼如此只為他聖凡情盡數量管他不得於衲僧分上早不著便了也那堪向老胡口頭盛將涕唾向口中咂啖如人患瘧喫鹽梅相似雖則一期引發津液豈知他日抵債去在福州東禪祖鑑從密禪師汀州人也上堂曰開口不是禪合口不是道踏步擬進前全身落荒草慶元府天童普文禪師郡之萬齡人族畢氏幼穎悟未冠得度往南屏聽台教因為檀越修懺摩有問曰公之所懺罪為自懺耶為他懺耶若自懺罪罪性何來若懺他罪他罪非汝烏能懺之師不能對遂改服游方造泐潭足才踵門潭即呵之擬問即曳杖逐之一日忽呼師至丈室曰我有古人公案要與你商量師擬進語潭遂喝師豁然領悟乃大笑潭下繩床執師手曰汝會佛法耶師便喝復托開潭大笑於是名聞四馳學者宗仰後歸桑梓留天童掩關却掃者八年寺偶虗席群僚命師開法恐其遁預遣吏候于道故不得辭受請日上堂曰咄哉黃面老佛法付王臣林下無情客官差逼殺人莫有知心底為我免得麼若無不免將錯就錯便下座師凡見僧來必叱曰楖栗未擔時為汝說了也且道說箇甚麼招手洗鉢拈扇張弓趙州柏樹子靈雲見桃華且擲放一邊山僧無恁麼間唇吻與汝打葛藤何不休歇去拈拄杖逐之宣和六年三月二十沐浴升堂說偈遺衆脫然示寂偈曰寶杖敲空觸處春箇中消息特彌綸昨宵風動寒巖冷驚起泥牛耕白雲壽七十七臘五十八江州圓通圓機道旻禪師世稱古佛興化仙遊人族蔡氏母夢吞摩尼寶珠有孕生五歲足不履口不言母抱遊西明寺見佛像遽履地合爪稱南無佛仍作禮人大異之及宦學大梁依景德寺德祥出家熙寧二年以試經得度遍往參激皆染指親溈山哲禪師最久晚慕泐潭往謁潭見默器之師陳歷參所得不蒙印可潭舉世尊拈華迦葉微笑語以問復不契後侍潭行次潭以拄杖架肩長噓曰會麼師擬對潭便打有頃復拈草示之曰是甚麼亦擬對潭遂喝於是頓明大法作拈華勢曰這回瞞旻上座不得也潭挽曰更道更道師曰南山起雲北山下雨即禮拜潭首肯建中靖國出住灌溪三年謝去未幾居圓通以符道濟禪師之記學者嚮臻朝廷聞其道會宰臣復為之請錫以命服與圓機號上堂曰諸佛出世無法與人只是抽釘拔楔除癡斷惑學道之士不可自謾若有一疑如芥子許是汝真善知識喝一喝曰是甚麼切莫刺腦入膠盆上堂拈拄杖示衆曰看看這箇變作執金剛神被金甲持叉當門而立佛來魔來天來人來被喝云道得也叉下死道不得也叉下死直得釋迦㔃耳彌勒攢眉自餘依草附木無主孤魂孰敢正眼著咄饒他氣宇如王也是冬行夏令上堂把定乾坤照破髑髏即且從你如何道得雲龍亨會句良久曰袖頭打領腋下剜襟福嚴專使至僧問如何是把得住底句曰巍巍石耳峰云如何是把不住底句曰渺渺𬾃溪水云去則不去時如何曰三峰指天云去則便去時如何曰一驢兩觜云恁麼則小出大遇也曰舌拄上齶問如何是佛曰狗銜赦書云如何是祖師西來意曰黃鶴樓前鸚鵡洲政和二年建窣堵波于西峰之麓庵其傍明年十月九日乞旨以嫡子守慧繼席朝廷從之退藏西庵緇白愈敬四年十月九日粥罷忽集衆書偈已趺坐垂誡二百餘言其略曰至道虗寂逈脫根塵光境俱忘靈機絶待真常任運寧屬去來應用無方不存格則牢關敲磕電激難通直須鐵眼頓開可以死生無間自茲訣別可葬全身三百年後當興佛事臨行一著不落見知折半破三好好薦取隨聲拊膝一下端然而逝世壽六十有八僧臘五十門人如其誡奉全身入窣堵波有聚師平日所遺鬚髮者火之收設利甚富郡守上其事諡妙空之塔慶元府二靈知和庵主蘇臺玉峰人族張氏兒時嘗習坐垂堂堂傾父母意其必死師瞑目自若因使出家年滿得度趨謁泐潭潭見乃問作甚麼師擬對潭便打復喝曰你喚甚麼作禪師驀領旨即曰禪無後無先波澄大海月印青天又問如何是道曰道紅塵浩浩不用安排本無缺少潭深然之次謁衡嶽辨禪師辨尤器重元符間抵四明遂留中峰有僧來禮拜師曰近離甚處云天童曰太白峰高多少僧以手斫額作望勢師曰猶有這箇在云却請庵主道師却作斫額勢僧擬議便打師剛毅志高少偕天童交禪師問道盟曰他日吾二人宜踞孤峰絶頂目視霄漢為世外之人不可作今時籍名官府屈節下氣於俗子者交爽盟交至師竟不出正言陳公闢書堂為庵延師咨參居三十年殊無長物唯二虎侍其右一日威於人以偈遣之宣和七年四月十二趺坐終于此山陳公嘗狀師行實及示寂異跡甚詳仍塑其像二虎侍之至今存焉投子廣鑑行瑛禪師法嗣紹興府慈氏瑞仙禪師郡之餘姚人年二十去家以試經披削習毗尼因覩戒性如虗空持者為迷倒師謂戒者束身之法也何自縛乎遂探台教又閲諸法不自生亦不從他生不共不無因是故說無生疑曰又不自他不共不無因生畢竟從何而生即省曰因緣所生空假三觀抑揚性海心佛衆生名異體同十境十乘轉識成智不思議境智照方明非言詮所及棄謁承天英天童交白牛鄉保寧璣佛鑑勤龍門遠死心新三祖宗洞山微皆有機語始至投子鑑問鄉里甚處云兩浙東越曰東越事作麼生云秦望峰高鑑湖水闊曰秦望峰與你自己是同是別云西天梵語此土唐言曰此猶是叢林祗對畢竟是同是別師便喝鑑便打師曰恩大難酬便禮拜後歸里開法慈氏上堂曰吾心似秋月碧潭清皎潔無物堪比倫教我如何說堪嗟古人心難與今人說語與時人同意與時人別語同人盡知意別少人別今人不會古人意今日教我如何說直饒會得寒山意秋月碧潭猶未徹如何得徹去此夜一輪明皎潔縱目觀瞻不是月是箇甚麼咄上堂舉德山托鉢話乃曰棚頭鼓未鳴部樂未抹搶竿木逞伎倆著忙出定場懡㦬便回去一段最光揚室中嘗問僧三箇橐馳兩隻腳日行萬里趂不著而今收在玉泉山不許時人亂斟酌諸人向甚麼處與仙上座相見潭州大溈海評禪師上堂曰燈籠上作舞露柱裏藏身森沙神惡發崑崙奴生嗔喝一喝曰一句合頭語萬劫墮迷津象田梵鄉禪師法嗣慶元府雪竇持禪師郡之盧氏子壯棄俗為僧遍造禪關晚謁象田始悟心要上堂曰休將碧落中秋節來並曹溪無相月冷淡非關玉兔光虗明直透銀蟾冗圓不圓缺不缺一道靈光無間歇照人何處不分明直下承當眼添屑本無生亦無滅只有休心最親切採石江頭弄影時謫仙到此空顛蹶咄上堂悟心容易息心難息得心源到處間斗轉星移天欲曉白雲依舊覆青山僧問中秋不見月時如何曰更待夜深看云忽若黑雲未散又且如何曰爭怪得老僧紹興府石佛益禪師上堂曰一葉落天下秋一塵起大地收一法透萬法周且道透那一法遂喝曰切忌錯認驢鞍橋作阿爺下頷便下座黃龍死心悟禪師法嗣吉州禾山超宗慧方禪師臨江人族龔氏少依禪居寺十七試經得度歷參名宿後契機於死心執侍十有四年以大法託之心去世師跡晦而價愈崇宣和中開法隆慶次補禾山上堂舉拂子曰看看只這箇在臨濟則照用齊行在雲門則理事俱備在曹洞則偏正叶通在溈山則暗機圓合在法眼則何止唯心然五家宗派門庭施設則不無直饒辨得倜儻分明去猶是光影邊事若要抵敵生死則霄壤有隔且超越生死一句又作麼生道良久曰洎合錯下注腳上堂死心先師每舉隻履西歸話以問衲子而實難明諸方或謂之隱顯或謂不可有兩箇或謂唯此一事實若也恁麼殊未識祖師意旨諸人要見麼濁中清清中濁勿謂麒麟生隻角西行東向路不差大用頭頭如啐莫莫玄要靈機休卜度臨安府崇覺空禪師姑孰人也上堂曰十方無壁落四面亦無門淨裸裸赤灑灑沒可把遂舉拂子曰灌溪老漢向十字街頭逞風流賣惺惺道我解穿真珠解玉版濄亂絲卷箇絹淫坊酒肆瓦合輿臺虎冗魔宮那吒忿怒遇文王興禮樂逢桀紂逞干戈今日被崇覺觀見一場懡㦬上堂崇覺門下莫有體悟三空心明八解底衲僧麼若無則辜負己靈若有喚來與崇覺提鞋挈杖便下座潭州上封祖秀禪師常德興陽何氏子上堂曰枯木巖前夜放華鐵牛依舊臥煙沙儂家鞭影重拈出擊拂子曰一念回心便到家遂喝一喝下座嘉州九頂寂惺慧泉禪師成都靈泉人族張氏自幼業儒嘗從真覺勝禪師游有省即辭親師中江資教希則崇寧改元得度學楞嚴踰三祀既極其要南下謁玉泉勤大洪恩谷隱顯未能深到聞死心受晦堂囑付其門庭壁立多詬罵諸方即往謁踰數年未能徹證令親慧宣首座一日與宜食餈次偶舉公安二聖嘗遺履長數尺於富室倉廩間事及干祿射利網捕偷兒等輩禱之皆遂其志豈正直所用心哉宣不答師辨不已宣以筯揖之即領悟曰今日食餈方得其味心聞然之後笑謂師曰吾老矣欲得一孝順子分付活計奈汝兄弟頻來反倒何云不彎射羿弓何以報深德心復笑曰賊賊巾侍六載以母老西歸初受香於廣漢之龜山成都之保福繼四董名剎上堂曰若論此事譬夫望中秋月色十分圓滿正當滿時缺向甚麼處去洎乎十六十七漸漸復缺圓滿之相又却向甚麼處去若云月體本無圓缺我信是人未識其月學道之人亦復如是正當迷時悟向甚麼處去及乎悟後迷却向甚麼處去若云本無迷悟我信是人未達其道還委悉麼百尺竿頭天欲暮急須進步問曹溪上堂昔日雲門有三句謂函蓋乾坤句截斷衆流句隨波逐浪句九頂今日亦有三句所謂飢來喫飯句寒即向火句困來打睡句若以佛法而論則九頂望雲門直立下風若以世諦而論則雲門望九頂直立下風二語相違且如何是九頂為人處僧問心迷法華轉心悟轉法華未審意旨如何曰風暖鳥聲碎日高華影重問如何是無生路曰五里復五里云向上還有事也無曰一步一徘徊紹興乙丑九月十六沐浴淨髮書偈囑纍已復曰叢林事例今則為昔趙州道底好屈好屈侍僧曰和尚五十年手段至此當如何師曰明破即不中擲筆叉手而逝茶毗設利五色門人合靈骨塔于寺之西原壽六十有七臘四十有三嘉興府華亭性空妙普庵主漢州人遺其氏久依死心獲證乃抵秀水追船子遺風結茆青龍之野吹鐵笛以自娛多賦詠士夫俊衲得其言必珍藏建炎初徐明叛道經烏鎮肆殺戮民多逃亡師獨荷䇿而往賊見其偉異疑必詭伏者問其來師曰吾禪者欲抵密印寺賊怒欲斬之師曰大丈夫要頭便斫取奚以怒為吾死必矣願得一飯以為送終賊奉肉食師如常齊出生畢乃曰孰當為我文之以祭賊笑而不答師索筆大書曰嗚呼惟靈勞我以生則大塊之過役我以壽則陰陽之失乏我以貧則五行不正困我以命則時日不吉吁哉至哉賴有出塵之道悟我之性與其妙心則其妙心孰與為鄰上同諸佛之真化下合凡夫之無明纖塵不動本自圓成妙矣哉妙矣哉日月未足以為明乾坤未足以為大磊磊落落無量無礙六十餘年和光混俗四十二臘逍遙自在逢人則喜見佛不拜笑矣乎笑矣乎可惜少年即風流太光彩坦然歸去付春風體似虗空終不壞尚享遂舉筯飫餐賊徒大笑食罷復曰劫數既遭離亂我是快活烈漢如今正好乘時便請一刀兩段乃大呼斬斬賊方駭異稽首謝過令衛而出烏鎮之廬舍免焚實師之慧也道俗聞之愈敬有僧覩師見佛不拜歌逆問曰既見佛為甚麼不拜師掌之曰會麼云不會師又掌曰家無二主紹興庚申冬造大盆冗而塞之修書寄雪竇持禪師曰吾將水葬矣壬戌歲持至見其尚存作偈嘲之曰咄哉老性空剛要餧魚鱉去不索性去只管向人說師閲偈笑曰待兄來證明耳令遍告四衆衆集師為說法要仍說偈曰坐脫立亡不若水葬一省柴燒二免開壙撒手便行不妨快暢誰是知音船子和尚高風難繼百千年一曲漁歌少人唱遂盤坐盆中順潮而下衆皆隨至海濵望欲斷目師取塞戽水而回衆擁觀水無所入復乘流而往唱曰船子當年返故鄉沒蹤跡處妙難量真風遍寄知音者鐵笛橫吹作散場其笛聲嗚咽頃於蒼茫間見以笛擲空而沒衆號慕圖像事之後三日於沙上趺坐如生道俗爭往迎歸留五日闍維設利大如菽者莫計二鶴徘徊空中火盡始去衆奉設利靈骨建塔于青龍壽七十二臘五十三嚴州鐘山道隆首座桐廬董氏子於鐘山寺得度自游方所至耆衲皆推重晚抵黃龍死心延為座元心順世遂歸隱鐘山慕陳尊宿高世之風掩關不事事日鬻數籰自適人無識者手常穿一襪凡有禪者至提以示之曰老僧這襪著三十年了也有寺僧戲問云如何是無諍三昧師便掌揚州齊謐首座本郡人也死心稱為飽參諸儒屢以名山致之不可後示化於潭之谷山異跡頗衆門人嘗繪其像請贊為書曰箇漢灰頭土面尋常不欲露現而今寫出人前大似虗空著箭怨怨可惜人間三尺絹空室道人智通者龍圖范峋女也幼聰慧長歸丞相蘇頌之孫悌未幾厭世相還家求祝髮父難之遂清修因看法界觀頓有省連作二偈見意一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊次曰物我元無異森羅鏡像同明明超主伴了了徹真宗一體含多法交參帝網中重重無盡處動靜悉圓通後父母俱亡兄涓領分寧尉通偕行聞死心名重往謁之心見知其所得便問常啼菩薩賣却心肝教誰學般若曰你若無心我也休又問一雨所滋根苗有異無陰陽地上生箇甚麼曰一華五葉後問十二時中向甚麼處安身立命曰和尚惜取眉毛好心打曰這婦女亂作次第通禮拜心然之於是道聲籍甚後為尼名永久挂錫姑蘇之西竺緇白日夕師問得其道者頗衆俄不疾書偈趺坐而終有明心録行於世佛果禪師為之序靈源佛眼皆有偈贊之黃龍靈源惟清禪師法嗣舒州真乘靈峰慧古禪師郡之宿松人族項氏早年試經得度首謁靈源源令看踈山造塔話倐然領契源難之無爽由是知名出住真乘遷光孝淨光二剎上堂送諸路化主次乃曰梵語比丘此云乞士何謂乞士上從諸佛乞法以資慧命下從檀越乞食以資色身乞食資色身也則千門萬戶貴賤隨緣折我幔之幢益他人之善乞法資慧命也則三椽位坐寂照凝神內忘智照之勤外息大患之本倐然與群有永分混爾與太虗同體更有一人亦不大智上來亦不大悲下化當堂不正坐不赴兩頭機在凡凡莫能測在聖聖莫能知十方收不得三世莫能該且道喚渠作甚麼即得龍向洞中𭊷雨出蝶從華裏採香歸上堂瞻仰尊顏巾子峰寂然不動證圓通善財別後無消息落日樓臺一笛風紹興丙辰八月十九示寂塔于黃巖之方山潭州上封佛心才禪師七閩長溪人族姚氏幼得度受具游方至大中依海印隆禪師有老宿居几右閲華嚴金師子章師旁視至一毛頭師子百億毛頭一時現因疑之會海印為參徒請益罷擲拄杖曰了即毛端吞巨海始知沙界一微塵師猛省通夕不寐逮曉語老宿宿曰吾不如汝然可謁東林總必了于大事師至東林總已歸寂乃依死心久之往參靈源於黃龍留三年源每以向上事激之無所湊泊偶讀古洞山録豁如也作偈曰徹徹大海乾枯虗空迸裂四方八面絶遮攔萬像森羅齊漏泄後分座真乘應上封之命遷道林退歸閩中居大乘乾元靈石鼓山上堂曰達磨未來懷藏至寶頂髻有珠達磨既來卞和刖足楊朱途窮來與未來何處得這箇消息還知麼擬議之間知君罔措上堂一法有形該動植百川湍激競朝宗昭琴不鼓雲天淡想像毗耶老病翁維摩病則上封病上封病則拄杖子病拄杖子病則森羅萬像病森羅萬像病則凡之與聖病諸人還覺病本起處麼若也覺去情與無情同一體處處皆同真法界其或未然甜瓜徹蒂甜苦瓠連根苦紹興間說偈遺衆泊然示寂隆興府黃龍通照德逢禪師郡之靖安人族胡氏師生有龐眉年十七從上藍晉禪師下髮往依靈源即明深旨宣和初江守徐公任道請居天寧三年遷黃龍六年詔住京師天寧皇叔祖仲恭表賜命服師名上堂舉夾山境話師曰法眼徒有此語殊不知夾山老漢被這僧輕輕拶著直得腳前腳後設使不作境話會未免猶在半途僧問人天普集龍象交參學人上來請師說法曰枯木無橫枝鳥來難措足潭州法輪應端禪師南昌人族徐氏少依化度善月圓顱登具謁真淨文禪師機不諧至雲居會靈源分座為衆激昂師扣其旨然以妙入諸經自負源嘗痛劄之師乃援馬祖百丈機語及華嚴宗旨為表源笑曰馬祖百丈固錯矣而華嚴宗旨與箇事喜沒交涉師憤然欲他往因請辭及揭簾忽大悟汗流浹背源見乃曰是子識好惡矣馬祖百丈文殊普賢幾被汝帶纍由此譽望四馳名士夫爭挽應世皆不就政和末大師張公司成以百丈堅命開法師不得已始從上堂舉大隨劫火洞然話遂曰六合傾翻劈面來暫披麻縷混塵埃因風吹火渾間事引得游人不肯回壞不壞隨不隨徒將聞見強針錐太湖三萬六千頃月在波心說向誰僧問如何是賓中賓曰芒鞋竹杖走紅塵云如何是賓中主曰十字街頭逢上祖云如何是主中賓曰御馬金鞭混四民云如何是主中主曰金門誰敢擡眸云賓主已蒙師指示向上宗乘又若何曰昨夜霜風刮地寒老猿嶺上啼殘月東京天寧長靈守卓禪師泉南人族莊氏冠游京師於天清寺試經得度至三衢謁南禪雅禪師次依東吳定慧式禪師通華嚴奧妙聞靈源開法太平道鳴四方即往造值夜參適中其病遂猛省投誠入室源鍛以差別機智且戒其緘默餘十年辭謁佛鑑命分座舒守孫公傑以甘露請開法後徙天寧上堂曰三千劒客獨許莊周為甚麼跳不出良醫之門多病人因甚麼不消一劄已透關者更請辨看上堂譬如眼根不自見眼性自平等無平等者便恁麼去無孔鐵鎚聊且安置直得入林不動草入水不動波也是一期方便若也籬內竹抽籬外笋㵎東華發㵎西紅更待勘過了打僧問丹霞燒木佛院主為甚麼眉鬚墮落曰猫兒會上樹云早知如是終不如是曰惜取眉毛問如何是衲衣下事曰天旱為民愁問佛未出世時如何曰絶毫絶𨤲云出世後如何曰填溝塞壑云出與未出相去幾何曰人平不語水平不流宣和五年十二月二十七奄然示寂闍維日皇帝遣中使賜香持金盤求設利爇香罷盤中鏗然視之五色者數顆大如豆使者馳還上見大悅而京城傳為盛事信州博山無隱子經禪師歲旦上堂曰和氣生枯枿寒雲散遠郊木人占吉兆夜半露龜爻諸禪德龜爻露處文彩已彰便見一年十二月月月如然一日十二時時時相似到這裏直似黃金之黃白玉之白自從𨇁大劫來未嘗異色還見麼其或未然且徇張三通節序從教李四𩯭蒼浪隆興府百丈以栖禪師興化人也上堂曰摩騰入漢達磨來梁途轍既成後代兒孫開眼迷路若是箇惺惺底終不向空裏採華波中捉月謾勞心力畢竟何為山僧今日已是平地起骨堆諸人行時各自著精彩看邵州光孝曇清禪師上堂曰殺父殺母佛前懺悔殺佛殺祖不消懺悔為甚不消懺悔且得冤家解脫溫州光孝德周禪師信之上饒人族璩氏於景德尊聖院染削問道有年後至靈源聞舉少林面壁頓悟述二偈以呈源許之自爾名流江浙上堂曰舉體露堂堂十方無罣礙千聖不能傳萬靈咸頂戴擬欲共商量開口百雜碎只如未開口已前作麼生咄上堂回互不回互見沒可覩透出祖師關踏斷人天路阿呵呵悟不悟落華流水知何處紹興甲戌九月十三集衆說偈而逝黃龍草堂善清禪師法嗣隆興府黃龍上堂道震禪師金陵人族趙氏少依覺印英禪師為童子英移居泗之普照適淑妃擇度童行師得圓具久之辭謁丹霞淳禪師一日與論洞上宗旨師呈偈曰白雲深覆古寒巖異草靈華彩鳳𭊷夜半天明日當午騎牛背面著靴衫淳器之師自以為礙棄依草堂一見契合日取藏經讀之一夕聞晚參鼓步出經堂舉頭見月遂大悟亟趨方丈堂望見即為印可初住曹山次遷廣壽黃龍上堂曰舉箇古人因緣問闍梨闍梨不得作古會若作古會失却當面眼舉箇即今因緣問闍梨闍梨不得作今會若作今會障却闍梨本來眼假饒不失不障非古非今猶是藥病相治止啼之說只如透脫一句闍梨還道得也無若道不得直待羅漢峰深談實相即向汝道上堂眼見色時耳便聾耳聞聲處眼無功朝來不耐靈禽報樹上楊梅似火紅上堂雷聲震地室內不聞天鼓游光攬不盈手靈利漢直下便了何須撞入膠盆若更問龜毛有幾莖兔角長多少直饒你一钁钁斷雲山我亦不向汝道上堂黑漢賣炭不識稱上星狂子疑頭將謂頭在鏡忽然省悟非邪非正山河大地久成正覺釋迦老子未有佛性上堂少林冷坐門人各說異端大似衆盲摸象神光禮三拜依位而立達磨云汝得吾髓這黑面婆羅門腳跟也未點地在上堂石人問枯椿何時汝發華枯椿怒石人何得口吧吧石人呵呵笑枯椿吐異葩紅霞輝玉象白玉碾金沙借問通玄士何人不到家台州萬年雪巢法一禪師大師襄陽郡王李公遵勉之玄孫也世居開封祥符縣母夢一老僧至而産師年十七試上庠從祖仕淮南欲官之不就將棄家事長蘆慈覺𧷤禪師翁弗許母曰此必宿世沙門願勿奪其志未幾慈覺沒大觀改元禮靈巖通照願禪師祝髮登具依願十年迷悶不能入圓悟禪師住蔣山見曰此法器也悟奉詔徙京師天寧師侍行靖康末自天寧至踈山一語之及大法頓明紹興七年泉守寶文劉公彥修請居延福後四遷巨剎上堂曰衲僧正法眼照破鐵圍山四方并八面尖角更團圝雙椎轟法鼓一擊透玄關乾坤收不得留與後人看既是乾坤收不得後人作麼生看要會麼門庭開處無施設松檜風生助寂寥上堂拈拄杖曰拄杖子有時作出水蛟龍萬里雲煙不斷有時作踞地師子百年妖怪潛蹤有時心法兩忘照體獨立有時照用同時主賓互用以拄杖畫曰延福門下總用不著且道延福尋常用箇甚麼卓拄杖喝一喝下座上堂仰面不見天低頭不見地古劒髑髏前大海波濤沸二十八年春退席長蘆歸天台萬年之觀音院才浹日忽示微疾囑門人具龕釘內至三月四日書偈曰今年七十五歸作庵中主珍重觀世音泥蛇吞石虎入龕趺坐別衆曰吾不能聽諸方來此寐語即自扄鑰有頃主事令匠者啓龕捫之肉猶未冷八日塔於觀音院之後臘五十二福州雪峰東山慧空禪師本郡人族陳氏十四圓頂即游方遍謁諸老晚契悟於草堂紹興癸酉開法雪峰受請日上堂曰俊快底點著便行癡鈍底推挽不動便行則人人歡喜不動則箇箇生嫌山僧而今轉此癡鈍為俊快去也彈指一下曰從前推挽不出而今出從前有院不肯住而今住從前嫌佛不做而今做從前嫌法不肯說而今說出不出住不住即且置敢問諸人做底是甚麼佛空王佛耶然燈佛耶釋迦佛耶彌勒佛耶說底又是甚麼法根本法耶無生法耶世間法耶出世間法耶衆中莫有道得底麼若道得山僧出世事畢如或未然逢人不得錯舉喝一喝下座上堂舉雲門示衆云只這箇帶纍殺人師曰雲門尋常氣宇如王作恁麼說話大似貧恨一身多山僧即不然只這箇快活殺人何故大雨方歸屋裏坐業風吹又繞山行然雖如是也是乞兒見小利且不傷物義一句作麼生道上堂一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流俊哉俊哉快活快活一似十七八歲狀元相似誰管你天誰管你地心王不妄動六國一時通罷拈三尺劒休弄一張弓自在自在快活快活恰似七八十老人作宰相相似風以時雨以時五植萬民安竪起拄杖曰大衆這兩箇并山僧拄杖子共作得一箇衲僧到雪峰門下但知隨例餐鎚子也得三文買草鞋喝一喝卓拄杖下座僧問和尚未見草堂時如何曰江南有云見後如何曰江北無戊寅三月十三示寂於東庵壽六十三臘四十八慶元府育王野堂普崇禪師本郡人也示衆舉巴陵和尚道不是風動不是幡動不是風幡又向甚麼處著有人為祖師出氣出來與巴陵相見雪竇和尚道風動幡動既是風幡又向甚麼處著有人為巴陵出氣出來與雪竇相見師曰非風非幡無處著是風是幡無著處遼天俊鶻悉迷蹤踞地金毛還失措阿呵呵悟不悟令人轉憶謝三郎一𮈔獨鈎寒江雨青原惟信禪師法嗣潭州梁山歡禪師僧問大衆雲臻請師開示曰天靜不知雲去處地寒留得雪多時云學人未曉玄言乞師再垂方便曰一重山後一重人成都府正法希明禪師漢之綿竹人弱冠從馬溪廣禪師下髮登具南游至夾山依曉純禪師咨參有省棄謁芙蓉楷梁山歡歡指見青原師抵青原一日原入室舉拳以示師契悟原拊而印之踰年歸隱故居郡守以延祚補處次遷彭之曲尺解制上堂曰林葉紛紛落乾坤報早秋分明西祖意何用更馳求若恁麼會得始信佛祖之道本自平夷大解脫門元無關鑰彌綸宇宙逼塞虗空量不可窮智莫能測若也未明此旨不達其源任是百劫薰功千生煉行徒自疲苦了無交涉若深明此旨洞達其源乃知動靜施為經行坐臥頭頭合道念念朝宗祖不云乎迷生寂亂悟無好惡得失是非一時放却如是則誰迷誰悟誰是誰非自是諸人獨生異見觀大觀小執有執無己靈獨耀不肯承當心月孤圓自生違背何異家中捨父衣內忘珠致使菩提路上荊棘成林解脫空中迷雲蔽日山僧今日幸值衆僧自恣化主還山諸上善人得得光訪不可緘默隨分葛藤曲為今時少開方便也須是諸人著眼各自諦觀若更擬議尋思白雲萬里遂拈拄杖曰於斯明得靈山一會儼在目前其或未然更待來晨分付祖庵主者不知何許人也見青原之後縛屋衡嶽間餘三十年人無知者偶遣興作偈曰小鍋煮菜上蒸飯菜熟飯香人已饑一補飢瘡了無事明朝依樣𦘕猫兒由是衲子披榛扣之無盡居士張公力挽其開法不從竟終于此山昭覺紹覺純白禪師法嗣成都府信相正覺宗顯禪師潼川飛烏人族王氏少為進士有聲嘗晝掬溪水為戲至夜思之遂見水冷然盈室欲汲之不可而塵境自空曰吾世網裂矣往依昭覺得度具滿分戒後隨衆咨參覺一日問師高高峰頂立深深海底行汝作麼生會師於言下頓悟曰釘殺腳跟也覺拈起拂子云這箇又作麼生師一笑而出服勤七祀南游至京師歷淮浙晚見五祖演和尚於海會出問未知關棙子難過趙州橋趙州橋即不問如何是關棙子祖曰汝且在門外立師進步一踏而退祖曰許多時茶飯元來也有人知滋味明日入室祖云你便是昨日問話底僧否我固知你見處只是未過得白雲關在師珍重便出時圓悟為侍者師以白雲關意扣之悟云你但直下會取師笑曰我不是不會只是未諳待見這老漢共伊理會一上明日祖往舒城師與悟繼往適會於興化祖問師記得曾在那裏相見來師曰全火祗候祖顧悟曰這漢饒舌自是機緣相契遊廬阜回師以高高峰頂立深深海底行向所得之語告之祖曰吾嘗以此事詰先師先師云我曾問遠和尚遠云猫有歃血之功虎有起尸之德非素達本源不能到也師給侍之久祖鍾愛之後辭西歸為小參復以頌送云離鄉四十餘年一時忘却蜀語禪人回到成都切須記取魯語時覺尚無恙師再侍之名聲藹著遂出住長松遷保福信相上堂舉仰山問中邑如何是佛性義曰我與你說箇譬喻汝便會也譬如一室有其六窗中有一箇獼猴外有人喚云狌狌獼猴即應如是六窗俱喚俱應仰乃禮拜却云適來蒙和尚指示某有箇疑處曰你有甚麼疑云只如獼猴睡時又作麼生邑下禪床把住曰狌狌我與你相見師曰諸人要見二老麼我也與你說箇譬喻中邑大似箇金師仰山將一塊金來使金師酬價金師亦盡價相酬臨成交易賣金底更與貼稱金師雖然暗喜心中未免偷疑何故若非細作定是賊贓便下座僧問三世諸佛六代祖師總出這圈䙡不得如何是這圈䙡曰井欄脣大溈祖瑃禪師法嗣眉州中巖慧日雲能禪師本郡人族呂氏年二十二於村落一富室為校書偶游山寺見禪𠕋閲之似有得即裂冠圓具一鉢游方首參寶勝澄甫禪師所趣頗異至荊湖謁永安喜真如哲德山繪造詣益高逮抵大溈溈問上座桑梓何處曰西川云我聞西川有普賢菩薩示現是否師曰今日得瞻慈相云白象何在曰爪牙已具云還會轉身麼師提坐具繞禪床一匝溈云不是這箇道理師趨出一日溈為衆入室問僧黃巢過後還有人收得劒麼僧竪起拳溈云菜刀子僧云爭奈受用不盡溈喝出次問師黃巢過後還有人收得劒麼師亦竪起拳溈云也只是菜刀子師曰殺得人即休遂近前攔𮌎築之溈云三十年弄馬騎今日被驢子撲後還蜀庵於舊址應四衆之請出住報恩等剎厭於世務結茆賴姥曰慧目竟終老焉師道望顯著行解相應又以慈忍接人為士大夫耆衲宗仰上堂曰龍濟道萬法是心光諸緣唯性曉木無迷悟人只要今日了師曰既無迷悟了箇甚麼咄上堂舉雪峰一日普請般柴中路見一僧遂擲下一塊柴云一大藏教只說這箇後來真如哲道一大藏教不說這箇據此二尊宿說話是同是別山僧即不然竪起拂子曰提起則如是我聞放下則信受奉行室中問崇真氈頭如何是你空劫已前父母真領悟云和尚且低聲遂獻投機頌云萬年倉裏曾飢饉大海中住儘長渴當初尋時尋不見如今避時避不得師為印可一日與黃提刑奕碁次黃問數局之中無一局同千著萬著則故是如何是那一著師提起碁子示之黃佇思師曰不見道從前十九路迷殺幾多人師住持三十餘載凡說法不許録其語臨終書偈趺坐而化闍維時暴風忽起煙所至處皆雨設利道俗斸其地皆得之心舌不壞塔于慧目懷安軍雲頂寶覺宗印禪師上堂曰古者道識得凳子周匝有餘又道識得凳子天地懸殊山僧總不恁麼識得凳子是甚麼間家具一日普說罷師曰諸子未要散去更聽一頌乃曰四十九年一場熱閧八十七春老漢獨弄誰少誰多一般作夢歸去來兮梅梢雪重言訖下座扶䇿行數步屹然而化兜率真寂從悅禪師法嗣撫州疏山了常禪師上堂曰等間放去佛手掩不住特地收來大地絶纖埃向君道莫疑猜處處頭頭見善財槌下分明如得旨無限勞生眼自開僧問如何是疏山為人底句曰懷中玉尺未輕擲袖裏金鎚劈面來隆興府兜率慧照禪師南安郭氏子上堂曰龍安山下道路縱橫兜率宮中樓閣重疊雖非天上不是人分到者心安全忘諸念善行者不移雙足善入者不動雙扉自能笑傲煙蘿誰管坐消歲月既然如是且道向上還有事也無良久曰莫教推落巖前石打破下方遮日雲開堂日僧問如何是第一義諦曰槌下分付云第二義門又作麼生曰千家簾幕春光在幾處園林秀色新法雲佛照果禪師法嗣筠州洞山辨禪師上堂曰不是心不是佛不是物鑽天子遼天鶻不度火不度水不度爐離弦箭發沒回途直饒會得十分去笑倒西來碧眼胡東京慧海儀禪師上堂曰無相如來示現身破魔兵衆絶纖塵七星斜映風生處四海還歸舊主人諸仁者大迦葉靈山會上見佛拈華投機微笑須菩提聞佛說法深解義趣涕淚悲泣且道笑者是笑者是不見道萬派橫流總向東超然八面自玲瓏萬人膽破沙場上一箭雙雕落碧空上堂舉溈山坐次仰山問和尚百年後有人問先師法道如何祗對溈曰一粥一飯仰曰前面有人不肯又作麼生溈曰作家師僧仰便禮拜溈曰逢人不得錯舉師曰自古及今多少人下語道嚴而不威恭而無禮橫按拄杖竪起拳頭若只恁麼却如何知得他父子相契處山僧今日也要諸人共知莫分彼我彼我無殊困魚止濼病鳥棲蘆逡巡不進泥中履爭得先生一卷書西蜀變法師者遺其氏里幼為苾芻通大小乘佛照謝事居景德師適至問照曰禪家言多不根何也照曰汝習何經論曰諸經粗知頗通百法照曰只如昨日雨今日晴是甚麼法中收師懵然照舉癢和子擊曰莫道禪家所言不根好師憤曰昨日雨今日晴畢竟是甚麼法收中照曰第二十四時分不相應法中收師恍寤即禮謝後歸蜀居講會以直道示徒不泥名相而衆多引去遂說偈罷講曰衆賣華兮獨賣松青青顏色不如紅算來終不與時合歸去來兮翠靄中由是隱居二十年道俗追慕青命演法笑答偈曰遁迹隱高峰高峰又不容不如歸錦里依舊賣青松衆列拜悔過兩川講者爭依之泐潭湛堂文準禪師法嗣隆興府雲巖典牛天游禪師成都人族鄭氏世為鴻儒嘗兩與貢籍不第慨然慕丹霞祝髮受具浮峽而下謁名宿於諸席後至泐潭潭方自吳中回首衆一日普說衆集潭曰諸人苦苦就準上座覓佛法遂拊膝曰會麼雪上加霜又拊膝曰若也不會豈不見乾峰示衆云舉一不得舉二放過一著落在第二師聞脫然穎悟潭對衆為印可於是道聲四播去游淮浙未幾旋豫章廬於泐潭之前障目曰典牛庵出住雲蓋徙雲巖上堂卓拄杖曰久雨不晴劄金烏飛在鐘樓角又卓一下曰猶在殼得卓曰一任衲僧名邈上堂馬祖一喝百丈蹉過臨濟小廝兒向糞掃堆頭拾得一雙破草鞋胡喝亂喝師震聲喝曰喚作胡喝亂喝得麼上堂象骨輥毬能已盡玄沙斫牌伎亦窮還知麼火星入袴口事出急家門上堂三百五百銅頭鐵額木笛橫吹誰來接拍時有僧出師曰也是賊過後張弓潭州三角智堯禪師上堂曰揑土定千鈞稱頭不立蠅箇中些子事走殺嶺南能還有薦得底麼直饒薦得也第二月文殊宣能禪師法嗣常德府德山瓊禪師受請日上堂曰作家撈籠不肯住呼喚不回頭為甚麼從東過西自代曰後五日看慧日文雅禪師法嗣隆興府九仙祖鑑法清禪師嚴陵人也上堂曰萬柳千華暖日開一華端有一如來妙談不二虗空藏動著微言遍九垓笑咍咍且道笑箇甚麼笑覺苑腳跟不點地上堂自古至今叢林道丹霞燒木佛院主眉鬚墮落大衆會麼萬仞崖頭曾借路百千禪侶盡生疑只因滿眼多𡾟嶮不識天然却問誰參上堂舉睦州示衆云汝等諸人未得箇入頭處須得箇入頭處既得箇入頭處不得忘却老僧明明向汝道尚自不會何況蓋覆將來師曰睦州恁麼道意在甚麼處其或未然覺苑下筒注腳張僧見王伴王伴叫張僧昨夜放牛處嶺上及前村溪西水不飲溪東草不吞教覺苑如何即得會麼不免與麼去遂以兩手按空下座僧問如何是奪人不奪境曰惺惺寂寂云如何是奪境不奪人曰寂寂惺惺云如何是人境兩俱奪曰惺惺惺惺云如何是人境俱不奪曰寂寂寂寂云學人今日買鐵得金去也曰甚麼處得這話頭來師度夏池之天寧以伽梨覆頂而坐侍郎曾公開問曰上座仙鄉甚處曰嚴州云與此間是同是別師拽伽梨下地揖曰官人曾到嚴州否曾罔措師曰待官人到嚴州時却向官人道平江府覺海法因庵主郡之嵎山人族朱氏年二十四被緇服進具游方至東林謁慧日日舉靈雲悟道機語問之擬對日曰不是不是豁有所契占偈曰巖上桃華開華從何處來靈雲才一見回首舞三臺日曰子所見雖已入微然更著鞭當明大法師承教居廬阜三十年不與世接叢林尊之建炎中盜起江左順流東歸邑人結庵命居緇白繼踵問道嘗謂衆曰汝等飽持定力無憂晨炊而事于求也晚年放浪自若稱五松散人龍牙梵言禪師法嗣筠州洞山擇言禪師僧問如何是十身調御投子下禪床立未審意旨如何曰腳跟下七穿八穴道林一禪師法嗣潭州大溈大圓智禪師四明人也上堂舉南泉道三世諸佛不知有狸奴白牯却知有師曰三世諸沸既不知有狸奴白牯又何曾夢見灼然須知向上有知有底人始得且作麼生是知有底人喫官酒臥官街當處死當處埋沙場無限英靈漢堆山積嶽露尸骸音釋瑛音英周音周瑃音椿泐音勒瞥匹蔑切衣於既切於宜切繭古典切咂音匝聞音問哲音哲楔音屑㔃租悅切欑祖九切齶逆各切麓音鹿懡亡果切蹶音厥覆敷救切啐音卒濄音戈挈詰結切餈音慈羿妍計切磊魯猥切飫依據切戞訖黠切菽式竹切籰越縛切繪音會峋音荀翛音叔髻音計刖五刮切厖莫江切浹即協切劈匹力切刮古脫切鍛都玩切枿牙葛切椿朱江切吧音巴庠音祥願音願轟呼宏切狌音生歃音霎與音預繢胡對切凳丁鄧切閧胡貢切濼音力懵莫孔切癢餘兩切𡾟虗宜切
