body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十五世臨濟十一世楊岐四世天寧佛果圓悟克勤禪師法嗣卷下臨安府徑山大慧普覺宗杲禪師宣城人族奚氏夙有英氣年十三試入鄉校一日偶同舍見謔師怒即以硯投之誤中廣文帽償金而歸曰大丈夫讀世間書曷若究出世法即詣東山慧雲院事慧齊明年剃髮具毗尼偶閲古雲門録恍若舊習往依廣教理禪師棄游四方從曹洞諸老宿既得其說去登寶峰謁湛堂準禪師準一見異之俾侍巾裓指以入道捷徑師橫經無所讓準呵曰汝曾未悟病在意識領解則為所知障準疾革囑師曰吾去後常見川勤必能盡子機用勤即圓悟準卒師趨謁無盡居士求準塔銘無盡延之名師庵曰妙喜且篤令見圓悟師至天寧值悟升堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然如何是諸佛出身處熏風自南來殿閣生微涼師聞豁然神悟踰月悟謂曰也不易你到這田地只是可惜你死了不能活又却不疑言句是為大病不見道懸崖撒手自肯承當絶後再穌欺君不得須信有這箇道理延為擇木堂侍者日同士大夫入室至數次擇木乃朝士止息處悟每舉有句無句如藤倚樹問之師擬對悟曰不是經半載問曰聞和尚當時在五祖曾問這話不知五祖如何答悟俯首師曰和尚當時對人天大衆問之如今說亦何妨悟不得已謂曰我問有句無句如藤倚樹時如何祖曰描也描不成𦘕也𦘕不就忽遇樹倒藤枯時如何祖曰相隨來也師於言下去盡知見悟曰始知吾不汝欺遂命掌翰墨著臨濟正宗記付之未幾令分座室中握竹篦以驗學者叢林浩然歸重名振京師右丞呂公舜徒奏錫紫衣佛日之號會女真之變其酋欲取禪僧十數人師在選得免趨吳門虎丘度夏因閲華嚴至菩薩登第七地證無生法忍其向所請問湛堂央崛摩羅持鉢至産婦家因緣曉然洞明聞圓悟詔住雲居詣之復為第一座為衆授道譽望益尊後留古雲門庵學者雲集久之入閩結茅於長樂洋嶼從之得法者十有三人徙居小溪庵圓悟在蜀囑右丞張魏公浚曰杲首座真得法髓苟不出無支臨濟宗者魏公還朝以徑山迎之道法之盛冠于一時衆二千餘皆諸方俊乂侍郎張公九成亦從之游灑然契悟一日因議及朝政與師連禍師恬然紹興辛酉五月毀衣牒屏居衡陽乃裒先德機語間與拈提離為三帙目曰正法眼藏凡十年移居梅陽又五年高宗皇帝特恩放還明年春復僧伽梨四方虗席以邀率不就後奉朝命居育王逾年有旨改徑山道俗歆慕如初時孝宗皇帝為普安郡王時遣內都監入山謁師師作偈為獻及在建邸復遣內知客詣山供五百應真請師說法親書妙喜庵三字并製贊寵寄之上堂曰祖師道一心不生萬法無咎無咎無法不生不心能隨境滅境逐能沉境由能境能由境能大小祖師却作座主見解徑山即不然眼不自見刀不自割喫飯濟饑飲水定渴臨濟德山特地迷枉費精神施棒喝除却棒拈却喝孟八郎漢如何止遏上堂舉僧問利山衆色歸空空歸何所曰舌頭不出口云為甚麼如此曰內外一如故師曰事存函蓋合理應箭鋒拄須還利山始得若是徑山即不然或問衆色歸空空歸何所芍藥華開菩薩面棕櫚葉散夜叉頭為甚麼如此但辨肯心必不相賺上堂拈拄杖卓一下喝一喝曰德山棒臨濟喝今日為君重拈掇天何高地何闊休向糞掃堆上更添搕𢶍換却骨洗却腸徑山退身三步許你諸人商量且道作麼生商量擲下拄杖喝一喝曰紅粉易成端正女無錢難作好兒郎上堂正月十四十五雙徑椎鑼打鼓要識祖意西來看取村歌社舞上堂舉僧問風穴古曲無音韻如何和得齊曰木雞啼子夜芻狗吠天明這黃面浙子恁麼答話也做他臨濟兒孫未得在今日或有人問徑山古曲無音韶如何和得齊只向他道木雞啼子夜芻狗吠天明上堂舉僧問臨濟如何是三眼國土曰我共汝入淨妙國土著清淨衣說法身佛又入無差別國土著無差別衣說報身佛又入解脫國土著光明衣說化身佛師顧視大衆曰還見臨濟老漢麼若也未見徑山為你指出法身報身化身咄哉魍魎妖精三眼國中逢著笑殺無位真人上堂久雨不曾晴豁然天地清祖師門下事何用更施呈上堂舉僧問五祖牛頭未見四祖時為甚麼百鳥銜華獻曰富與貴是人之所欲云見後為甚麼不銜華獻曰貧與賤是人之所惡師曰師翁恁麼答話雖則善赴來機爭奈語驚時聽徑山亦有兩轉語要與師翁相見牛頭未見四祖時為甚麼百鳥銜華獻茆屋上安刎見後為甚麼不銜華獻佛殿裏掘東司上堂舉僧問六祖黃梅意旨甚麼人得曰會佛法人得云和尚還得否曰我不得云和尚為甚麼不得曰我不會佛法大衆還見祖師麼若也不見徑山為你指出蕉芭蕉芭有葉無子忽然一陳狂風起恰似東京大相國寺裏三十六院東廊下北角頭王和尚破袈裟畢竟如何歸堂喫茶上堂舉圓通秀禪師示衆曰少林九年冷坐剛被神光覷破如今玉石難分只得麻纏紙裏這一箇那一箇更一箇若是明眼人何須重說破徑山今日不免狗尾續貂也有些子老胡九年話墮可惜當時放過致令默照之徒鬼窟長年打坐這一箇那一箇更一箇雖然苦口叮嚀却似樹頭風過結夏上堂文殊三處安居志公不是間和尚迦葉欲行正令未免眼前見鬼且道徑山門下今日事作麼生下座後大家觸禮三拜上堂僧問有麼有麼庵主竪起拳頭還端的也無師便下座歸方丈上堂舉趙州洗鉢盂話乃曰諸方拈掇甚多下注腳亦不少未曾有一人分明說破妙喜今日為諸人分明說破喫粥了便洗鉢盂且道還曾指示無黑豆從來好合醬比丘尼定是師姑上堂才方八月中秋又是九月十五拈拄杖卓曰唯有這箇不遷擲下曰一衆耳聞目覩上堂舉五祖舉僧問趙州如何是祖師西來意曰庭前柏樹子恁麼會便不是了也如何是祖師西來意庭前柏樹子恁麼會方始是要識五祖師翁麼腦後見腮莫與往來孝宗皇帝在建邸時遣內知客入山供養羅漢祝聖請上堂乃曰欲識佛性義當觀時節因緣時節若至其理自彰敢問大衆作麼生是自彰底道理舉起拂子曰還見麼擊禪床曰還聞麼聞見分明是箇甚麼若向這裏提得去皇恩佛恩一時報足其或未然徑山打葛藤去也復舉起拂子曰看看無量壽世尊在徑山拂子頭上放大光明照不可說不可說又不可說佛剎微塵數世界中轉大法輪作無量無邊廣大佛事其中若凡若聖若正若邪若草若木有情無情遇斯光者皆獲無上正等菩提所以諸佛於此得之具一切種智諸大菩薩於此得之成就諸波羅蜜辟支獨覺於此得之出無佛世現神通光明諸聲聞衆洎夜來迎請五百阿羅漢於此得之得八解脫具六神通天人於此得之增長十善修羅於此得之除其憍慢地獄於此得之頓超十地餓鬼傍生及四生九類一切有情於此得之隨其根性各得受用無量壽世尊放大光明作諸佛事已竟然後以四大海水灌彌勒世尊頂與授阿耨多羅三藐三菩提記當於補處作大佛事無量壽世尊有如是神通有如是自在有如是威神到這裏還有知恩報恩者麼若有出來與徑山相見為汝證明如無聽取一頌十方法界至人口法界所有即其舌只憑此口與舌頭祝吾君壽無間歇億萬斯年注福源如海滉漾永不竭師子窟內産狻猊鸑鷟定出丹山穴為瑞為祥遍九垓草木昆蟲盡歡悅稽首不可思議事喻若衆星拱明月故今宣暢妙伽陀第一義中真實說圓悟禪師忌師拈香曰這箇尊慈平昔強項氣壓諸方逞過頭底顢頇用格外底儱侗自言我以木槵子換天下人眼睛殊不知被不孝之子將斷貫索穿却鼻孔索頭既在徑山手裏要教伊生也由徑山要教伊死也由徑山且道以何為驗遂燒香曰以此為驗僧問達磨西來將何傳授曰不可總作野狐精見解云如何是粗入細曰香水海裏一毛孔云如何是細入粗曰一毛孔裏香水海問古鏡未磨時如何曰火不待日而熱云磨後如何曰風不待月而涼云磨與未磨時如何曰交問不與萬法為侶者是甚麼人待汝一口吸盡西江水即向汝道意作麼生曰釘釘膠黏問一法若有毗盧墮在凡夫萬法若無普賢失其境界去此二途請師速道曰脫殼烏龜飛上天問高揖釋迦不拜彌勒時如何曰夢裡惺惺問大修行底人還落因果也無前百丈云不落因果為甚麼墮野狐身曰逢人但恁麼舉云只如後百丈道不昧因果為甚麼脫野狐身曰逢人但恁麼舉云或有人問徑山大修行底人還落因果也無未審和尚向他道甚麼曰向你道逢人但恁麼舉問明頭來時如何曰頭大尾顛纖云暗頭來時如何曰野馬嘶風蹄撥剌云明日大悲院裏有齊又作麼生曰雪峯道底問過去心不可得現在心不可得未來心不可得如何曰親言出親口云未審如何受持曰但恁麼受持決不相賺問我宗無語句實無一法與人時如何曰五味饡稱鎚問心佛俱忘時如何曰賣扇老婆手遮日問教中道塵塵說剎剎說無間歇未審以何為舌師拍禪床右角一下僧云世尊不說說迦葉不聞聞也師拍禪床左角一下僧云也知今日令不虗行曰識甚好惡師室中問僧不是心不是佛不是物你作麼生會僧云領師曰領你屋裏七代先靈僧便喝師曰適來領而今喝干他不是心不是佛不是物甚麼事僧無語師打出僧請益夾山境話聲未絶師便喝僧茫然師曰你問甚麼僧擲舉師連打喝出師才見僧入便云不是出去僧便出師曰沒量大人被語脉裏轉却次一僧入師亦云不是出去僧却近前師曰向你道不是更近前覓箇甚麼便打出復一僧入云適來兩僧不會和尚意師低頭噓一聲僧罔措師打曰却是你會老僧意問僧我前日有一問在你處你先前日答我了也即今因甚麼瞌睡僧云如是如是師曰道甚麼僧云不是不是師連打兩棒曰一棒打你如是一棒打你不是舉竹篦問僧曰喚作竹篦則觸不喚作竹篦則背不得下語不得無語速速道道僧云請和尚放下竹篦即與和尚道師放下竹篦僧拂袖便出師曰侍者認取這僧著又舉問僧僧云甕裏怕走却那師下禪床擒住曰此是誰語速道僧云實不敢謾昧老師此是竹庵和尚教某恁麼道師連打數棒曰分明舉似諸方師年邁求解辛巳春得旨退居明月堂隆興改元一夕星殞于寺西流光赫然尋示微恙八月九日學徒問安師勉以宏道徐曰吾翌日始行至五鼓親書遺奏又貽書辭紫巖居士侍僧了賢請偈復大書曰生也只恁麼死也只恁麼有偈與無偈是甚麼熱大擲筆委然而逝平明有蛇尺許腰首白色伏于龍王井欄如義服者即山之昭濟示現也四衆哀號皇帝聞而歎惜丞相以次致祭者沓來門弟子塔全身於明月堂之側壽七十有五夏五十有八詔以明月堂為妙喜庵諡曰普覺塔名寶光淳熙初賜其全録八十卷隨大藏流行台州護國此庵景元禪師永嘉楠溪人族張氏年十八依靈山希拱為僧習台教歷三易衣夏淨慈謁圓悟於鐘阜未幾睹二僧𨵃死心小參語曰既迷須得箇悟既悟須識悟中迷迷中悟迷悟雙忘却從無迷悟處建立一切法師拂袖行至殿廡洞然曉悟即以所證白悟悟弗許師沂流從之匪勞剪拂嘗侍悟入對維揚賜椹服及悟歸蜀以法衣付之太秀居士龍學耿公廷禧守括蒼尊其道請開法南明留二年退居永嘉護國憲使明公槖太守呂公丕問以連雲邀之三請克至法社大興而括蒼叢林實由師振次遷真如護國上堂曰威音王已前這一隊漢錯七錯八威音王已後這一隊漢落二落三而今這一隊漢坐立儼然且道是錯七錯八落二落三還定當得出麼舉拂子曰吽吽上堂拈拄杖橫按曰有時瞋有時喜有時觀音面有時夜叉觜或現鼠尾龍頭或現鼠頭龍尾偏要檢非不曾檢是何故是金不博金是水不洗水卓拄杖曰梢公自應喏只你是直符滿船都是鬼參浴佛上堂這釋迦老子初生下來便作箇笑具一手指天一手指地云天上天下唯我獨尊後來雲門大師道我當時若見一棒打殺與狗子喫却貴圖天下太平尚有人不肯放過却道讚佛讚祖須是雲門始得且道那裏是讚他處莫是一棒打殺處是麼且喜沒交涉今日南明乍此住持只得放過若不放過盡大地人並皆乞命始得如今事不獲已且問大衆向佛殿上每人與他一狗何故豈不見道乍可違條不可越例以拂子擊禪床下座上堂野干鳴師子吼張得眼開得口動南星蹉北斗召曰大衆還知落處麼金剛階下蹲神龜火裏走師在西山為西堂耿龍學請就淨光升座靈峰古禪師舉茶陵郁和尚悟道頌曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵又舉白雲端和尚見楊岐日令舉此頌岐大笑雲疑之因問其故時方歲暮岐曰汝見昨日打驅儺者麼云見曰汝一籌不及渠雲益疑之云意旨如何曰渠愛人笑汝怕人笑雲大悟請前南明和尚為衆判斷師乃曰諸禪德楊歧大笑眼觀東南意在西北白雲悟去聽事不真喚鐘作甕檢點將來和楊歧老漢都在架子上將錯就錯若是南明即不然我有明珠一顆切忌當頭蹉過雖然覿面相呈也須一鎚打破舉拂子曰還會麼棊逢敵手難藏行詩到重吟始見功僧問三聖道我逢人即出出則不為人意旨如何曰八十翁翁嚼生鐵云興化道我逢人即不出出則便為人又作麼生曰須彌頂上浪翻空問蓮華未出水時如何曰一任摸索云出水後如何曰有眼如盲問天不能蓋地不能載是甚麼物曰無孔鐵鎚云天人群生類皆承此恩力也曰莫妄想問三世諸佛說不盡底句請師速道曰眨上眉毛問昔年三平道場重興是日圓悟高提祖印始自師傳如何是臨濟宗曰殺人活人不眨眼云目前抽顧鑑領略者還稀如何是雲門宗曰頂門三眼耀乾坤云未舉先知未言先見如何是溈仰宗曰推不向前約不退後云三界唯心萬法唯識如何是法眼宗曰箭鋒相擲不相饒云建化何妨行鳥道回途復妙顯家風如何是曹洞宗曰手執夜明符幾箇知天曉云向上還有路也無曰有云如何是向上路曰黑漫漫地僧便喝師曰貪他一粒粟失却半年糧紹興乙丑冬示微疾丙寅正月九日請西堂曇華禪師為座元繼集主事付囑殆盡示訓如常俄握拳而逝學者悲慕茶毗得五色設利齒舌右拳無少損二月二日塔于寺東劉阮洞前壽五十三臘三十五台州鴻福子文禪師上堂曰不昧不落作麼會會得依前墮野狐一夜凉風生𦘕角滿船明月泛江湖上堂鈎錐不到處千眼頓開箭鋒不及時萬機併會無邊差別智三昧總持門喝一喝則日照天臨打一棒乃雲行雨施拈却面前案山子倒轉舌頭試為我道一句看若道不得三十年後莫道見鴻福來福州玄沙僧昭禪師上堂曰天上無彌勒地下無彌勒且道彌勒在甚麼處良久曰夜行莫踏白不是水便是石上堂撥轉關棙透出情塵截斷古今露箇面目理事俱到敲唱雙行直得泥牛哮吼露柱驚忙佛殿走出三門金剛開口大笑且道笑箇甚麼遂曰自家屋裏事難為說向人以拂子擊禪床下座平江府南峰雲辨禪師本郡人也壯年棄妻孥入閩依瑞峰章禪師圓顱旋里謁穹窿圓禪師中夜忽有得述二偈呈圓圓曰子雖得入未至當也切宜著鞭乃辭扣諸席後造圓悟值入室才踵門悟曰看腳下師打露拄一下悟曰何不著實道取一句云師若搖頭弟子擺尾悟曰你試擺尾看師翻筋斗而出悟大笑由是知名歸住城西之思憶移小湖之觀音晚居南峰僧問如何是奪人不奪境曰霸王到烏江云如何是奪境不奪人曰築壇拜將云如何是人境兩俱奪曰萬里山河獲太平云如何是人境俱不奪曰龍吟霧起虎嘯風生云向上還有事也無曰當面嗟過僧云真箇作家師曰白日鬼迷人一日入城與道俗行至十郎巷有問巷在這裏十郎在甚麼處師奮臂曰隨我來臨安府靈隱佛海慧遠禪師眉之眉山人族彭氏世業儒年十三因兄從釋師問曰出家何為兄曰求解脫法師曰如是我亦可為遂白母宋氏願偕往母欣然遂事藥師院宗辨為僧詣大慈習經論四年去依靈巖徽禪師久之微有契會圓悟領昭覺師即之聞悟普說忽頓悟仆於衆衆掖之乃曰吾夢覺矣至暮與悟問答無滯悟大喜以偈贈之自此機鋒峻發紹興乙卯春眉守以象耳命師開法不就是歲圓悟順世師東下抵淮南出住蟠龍遷琅瑘又移婺普濟衢定業光孝郡王趙公令襟侍郎曾公開皆問道於師後居南臺未幾過天台歷護國國清鴻福三寺尚書沉公介守平江以虎丘久廢邀師振之乾道乙丑敕居崇先明年被旨補靈隱孝宗皇帝召入禁中與酬酢其道愈尊癸巳春特賜佛海禪師上堂曰道絶名言法離聞見打破虗空成七八片直饒錮鏴完全也是由基副箭上堂昨夜來報五參正值老僧洗腳起來抖擻精神末上輸他一著上堂天道虧盈地道變盈鬼神害盈人道惡盈老僧本貫眉州眉山縣人事行年癸未十二月十六日巳時建生自小出家橫草不拈竪草不把路轉山回君自看南不龜頭北不廈上堂滴水冰生分外寒凍雲環合鎖峰巒根塵不昧心珠露眨上眉毛子細看上堂新歲有來由烹茶上酒樓一雙無兩腳半箇有三頭穿出神難辨相逢鬼見愁倒吹無孔笛促拍舞凉州咄上堂好是仲春漸暖那堪寒食清明萬疊雲山聳翠一天風月為鄰在處華紅柳緑湖天浪穩風平山禽枝上語諄諄再三瑣瑣碎碎囑付叮叮嚀嚀你且道他叮嚀囑付箇甚麼卓拄杖曰記取明年今日依舊寒食清明上堂舉僧問睦州以一重去一重即不問不以一重去一重時如何州曰昨日栽茄子今朝種冬瓜師曰問者善問不解答答者善答不解問山僧今日向飢鷹爪下奪肉猛虎口裏橫身為你諸人說箇樣子登壇道士羽衣輕呪力雖窮法轉新拇指破開天地暗蛇頭攧落鬼神驚僧問十二時中教學人如何用心曰蘸雪喫冬瓜問浩浩塵中如何辨主曰木狗頭邊鐮切菜云莫便是和尚為人處也無曰研槌撩撩飥問即心即佛時如何曰頂分丫角云非心非佛時如何曰耳墜金環云不是心不是佛不是物又作麼生曰禿頂修羅舞柘枝問東山水上行意旨如何曰初三十一不用擇日問文殊是七佛之師為甚麼出女子定不得曰擔頭不挂針問昔有一秀才作無鬼論論成時有一鬼叱曰你爭奈我何意作麼生師以手斫額曰何似生僧云只如五祖以手作鵓鳩觜云谷呱呱又且如何曰自領出去問庵內人為甚麼不知庵外事曰拄杖橫挑鐵蒺䔧問不與萬法為侶者是甚麼人曰腳踏轆轤一日鳴鼓升堂師潛坐帳中侍僧尋之師忽撥開帳曰只在這裏因甚麼不見僧無對師曰大斧斫三門問僧一大藏教是惡口如何是本身盧舍那僧云天台普請南嶽游山師升座別曰阿耨達池深四十丈濶四十丈乙未秋師示衆曰淳凞二年閏季秋九月旦閙處莫出頭冷地著眼看明暗不相干彼此分一半一種作貴人教誰賣柴炭向你道不可毀不可讚體若虗空沒涯岸相喚相呼歸去來記取明年正月半都下喧傳之果於丙申得辛後一日感微疾至上元揮偈安坐而化偈曰拗折稱鎚掀翻露布突出機先鴉飛不度留七日顏色不異是月二十五日塔全身於寺之烏峰送者幾萬人世壽七十四僧臘五十九成都府正法建禪師上堂曰兔馬有角牛羊無角絶毫絶𨤲如山如嶽針鋒上師子翻身藕竅中大鵬展翼等間突過北俱盧日月星辰一時黑溫州雁山靈峰堂中仁禪師洛陽人也少依東京奉先院出家宣和初賜牒於慶基殿落髮進具後往來三藏譯經所諦窮經論特於宗門未之信時圓悟詔居天寧凌晨謁之悟方為衆入室師見敬服奮然造前悟曰依經解義三世佛冤離經一字即同魔說速道師擬對悟劈口擊之因墜一齒即大悟竟留天寧由是師資契合請問無間自南渡隆興初開法大覺遷中天竺次徙靈峯上堂曰九十春光已半過養花天氣正融和海棠枝上鶯聲好道與時流見得麼然雖如是且透聲透色一句作麼生道金勒馬嘶芳草地玉樓人醉杏花天上堂舉狗子無佛性話乃曰二八佳人刺繡遲紫荊花下囀黃鸝可憐無限傷春意盡在停針不語時淳熙甲午四月八日孝宗皇帝詔入賜座說法皇帝遂舉不與萬法為侶因緣俾拈提師拈罷頌曰稱鎚搦出油間言長語休腰纏十萬貫騎鶴上揚州癸亥中升堂告衆而逝台州天封覺禪師上堂曰無生國裏未是安居萬仞崖頭豈容駐足且望空撒手直下翻身一句作麼生道人逢好事精神爽入火真金色轉鮮成都府昭覺道祖首座初見圓悟於即心是佛語下發明久之悟命分座一日為衆入室餘二十許人祖忽問曰生死到來如何回避衆無對祖擲下拂子奄然而逝衆皆愕眙亟以聞悟悟至召曰祖首座祖張目視之悟曰抖擻精神透關去祖點頭竟爾趨寂南康軍雲居宗振首座丹丘人也依圓悟於雲居一日因仰瞻鐘閣倐然契證有詰之者振酬以三偈其後曰我有一機直下示伊青天霹靂電卷星馳德山臨濟棒喝徒施不傳之妙於汝何虧悟見大悅竟以節操自高道望愈重嘗書壁曰住在千峰最上層年將耳順任騰騰免教名字挂人齒甘作今朝百拙僧覺庵道人祖氏建寧游察院之姪女也幼志不出適留心祖道趨圓悟之席於悟示衆語下了然明白悟曰更須揚却所見始得自由祖答偈曰露柱抽橫骨虗空弄爪牙直饒玄會得猶是眼中沙令人本明亡其族里號明室自機契圓悟遍參名宿皆蒙印可紹興庚申二月望親書三偈寄呈泐潭草堂清禪師微露謝世之意至旬末別親里而終草堂跋其偈後為刊行大慧禪師亦嘗垂語發揚偈曰不識煩惱是菩提若隨煩惱是愚癡起滅之時須要會過新羅人不知不識煩惱是菩提淨華生淤泥人來問我若何為喫粥喫飯了洗鉢盂莫管他莫管他終日癡憨算海沙要識本來真面目便是祖師一木叉道不得底叉下死道得底也叉下死畢竟如何不許夜行投明須到成都府范縣君者𡠉居歲久常坐而不臥聞圓悟被旨歸住昭覺往禮拜請示入道因緣悟令看不是心不是佛不是物是箇甚麼久無所契范泣告悟曰和尚有何方便令某易會悟曰却有箇方便遂令只看是箇甚麼後有省曰元來恁麼地近那音釋㑃於效切襟音今謔虗約切剃他計切珵音呈裓古得切穌素姑切酋自秋切崛渠勿切嶼音序𢶍蘇答切歆許金切貂音凋滉胡廣切狻素官切猊音倪鸑音嶽鷟食角切槵音患饡作管切楠音南椹食荏切遡音素歐音區儺音那眨側洽切窿音隆錮音固鏴音路抖音斗擻音叟諄章倫切蘸莊陷切鐮音簾呱音孤搦女白切愕五各切眙音怡𡠉音狸
