body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十五世臨濟十一世楊岐四世開福道寧禪師法嗣潭州大溈月庵善果禪師信之鉛山人族余氏幼孤依七寶元浹下髮游方至鵝湖聞二童子戲語師有省遂至雲居一日有僧自黃龍來問死心室中如何為人云每舉雲門話墮因緣問學者子那裏是話墮處師聞心大慶快即趨黃龍蒙印可死心謝事乃往開福語尤契命分座福垂入寂以麈尾授師師力辭福曰大法末運賴汝以興無拒福歿師憩湘西會佛果禪師住道林命典藏為衆秉拂師提綱罷舉乾峰示衆云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從天台來却往徑山去峰云典座來日不得普請師曰乾峰平地生堆韶石因風起浪雖然合水和泥千古叢林榜樣既是叢林榜樣為甚麼合水和泥要會麼不入洪波裏爭見弄潮人佛果為擊節自爾有聞郡守曾公孝序以上封請師出世繼補道吾福嚴徙閩中黃檗及東西禪晚居大溈兩住福嚴上堂曰奚仲造車一百輻拈却兩頭除却軸以拄杖打一圓相曰且莫錯認定盤星卓一卓下座上堂八月秋何處熱向上事時時說撥轉天關放回地軸即不問且道黃金為地白銀為屋是甚麼人居止良久曰巍巍聖德遇三皇歷歷清光吞二曜上堂言語道斷物我皆如義路不生風雲會合直得玄關大啓正眼流通匝地光輝呈祥顯瑞然雖恁麼且應物無私一句作麼生道喝一喝曰頭頭無取捨處處絶親踈上堂是法不可示言詞相寂滅擊破太虗空萬里一條鐵諸禪德適來話頭道甚麼若也見得功不浪施其或未然只知犯重障菩提不見如來真祕訣擊禪床下座謝供頭上堂解猛虎頷下金鈴驚羣動衆取蒼龍冗裏明珠光天照地山僧今日到此讚歎不及汝等諸人合作麼生竪起拂子曰眨上眉毛速須薦取擲拂子下座僧問達磨九年面壁時如何曰魚行水濁云二祖禮三拜為甚麼却得其髓曰地肥茄子大云只如一華開五葉結果自然成明甚麼邊事曰賊以贓為驗云有時乘好月不覺過滄洲曰闍梨無分問如何是月庵曰丹青𦘕不成云如何是月庵家風曰生鐵鑄就問有句無句如藤倚樹時如何曰驗盡當行家云樹倒藤枯句歸何處又作麼生曰風吹日炙云溈山呵呵大笑聻曰波斯讀梵字云道吾推倒泥裏溈山不管此意又且如何曰有理不在高聲云羅山道道吾是撮馬糞漢又作麼生曰多口阿師云今日足見老師七通八達曰仰面哭蒼天僧禮拜師曰過問蓮華未出水時如何曰乾坤無異色云出水後如何曰遍界有清香紹興壬申正月十三寢疾書別知舊十九集大衆勉令進道書偈已談笑而逝二月八日奉全身塔于寺之西峰壽七十四臘五十八五祖表自禪師法嗣蘄州龍華高禪師上堂曰象王行師子住赤腳崑崙眉卓竪寒山拾得笑呵呵指點門前老松樹且道他指點箇甚麼忽然風吹倒時好一堆柴大隨南堂元靜禪師法嗣簡州南巖勝禪師上堂舉拂子示衆曰識取鈎頭意莫認定盤星會麼即心即佛幾人知立雪齊腰只得皮四海浪平龍玩寶儘他螻蟻撼須彌非佛非心絶謂情玄途鳥道急回程爍迦羅眼存機變莫守寒巖異草青心佛物兮俱不是坐斷舌頭除藥忌橫拈倒用總由他活捉魔群穿却鼻擲拂子下座上堂召大衆曰護生須是殺殺盡始安居會得箇中意分明在半途且道到家一句又作麼生釋迦彌勒沒量大看來猶只是他奴僧問放行五位即不問把定三關事若何曰橫按鏌鎁全正令云把定三關蒙指示放行五位又如何曰太平寰宇斬癡頑云恁麼則南巖門下土曠人稀曰靈利衲僧只消一點云自古自今同生同死時如何曰家賊難防云今日學人小出大遇去也師便打曰須是老僧打你始得僧禮拜師曰切忌詐明頭常德府梁山廓庵師遠禪師合川魯氏子上堂曰今朝二月半百華開爛熳雲繞翠峰頭鶯啼楊柳岸觀音借路行文殊分主伴獨有解空人支笻渾不管直饒天外雨華飛翻覆都來是這漢且道如何是這漢喫茶去上堂舉達磨見武帝師曰堯風舜日兩依依一片虗凝截萬機何必胡僧親付囑如人飲水自家知上堂五日一番升座拈出現成行貨大衆普請商量恰是老僧罪過既是大衆商量因甚麼恰成老僧罪過不見道常在於其中經行及坐臥上堂舉楊歧三腳驢子話師召大衆曰揚其湯者莫若撲其火壅其流者莫若杜其源此乃智人之明鑒佛法之至論正在斯焉這因緣如今叢林中提唱者甚多商量者不少有般底只道宗師家無必固凡有所問隨口便答似則也似是則未是若恁麼只作得箇乾無事會不見楊歧用處乃至祖師千差萬別方便門庭如何消遣又有般底只向佛邊會却與自己沒交涉古人道凡有言句須是一一銷歸自己又作麼生又有般底一向只作自己會棄却古人用處唯知道明自己事古人方便却如何消遣既消遣不下却似抱橋柱澡洗要且放手不得此亦是一病又有般底却去腳多少處會若恁麼會此病最難醫也所以他語有巧妙處參學人卒難摸索才擬心則差了也前輩謂之楊歧宗旨須是他屋裏人到恁麼田地方堪傳授若不然者則守死善道之謂也這公案直須還他透頂徹底漢方能了得此非止禪和子會不得而今天下叢林中出世為人底亦少有會得者若要會麼直向威音那畔空劫已前輕輕著提起便行捺著便轉却向萬仞峰前進一步可以寵古今坐斷天下人舌頭如今還有恁麼者麼有則出來道看如無更聽一頌三腳驢子弄蹄行直透威音萬丈坑雲在嶺頭間不徹水流㵎下大忙生湖南長老誰能會行人更在青山外嘉州能仁默堂悟禪師上堂舉趙州訪二庵主師曰一重山盡一重山坐斷孤峰子細看霧卷雲收山嶽靜楚天空闊月輪寒合州鈎魚臺石頭自回庵主郡之石照人世為石工嘗參禮報恩璉禪師求安心法璉諭之因棄家為道人一日於大隨出石次心光頓發往見南堂蒙印可堂授以僧服後庵居學者從之示衆曰參禪學道大似井底叫渴相似殊不知塞耳塞眼回避不及且如十二時中行住坐臥動轉施為是甚麼人使作眼見耳聞何處不是路頭若識得路頭便是大解脫路方知老漢與你證明山河大地與你證明所以道十方薄伽梵一路涅槃門諸仁者大凡有一物當途要見一物之根源一物無處要見一物之根源見得源源源無所源所源既非何處不圓諸禪德你看老漢有甚麼勝你處諸人有甚麼不如老漢處還會麼太湖三萬六千頃月在波心說向誰彭州士溪智陀子言庵主綿之彰明人初至大隨聞舉石頭和尚示衆偈倐然領旨歸隱士溪懸崖絶嶽間有石若蹲異獸言鑿以為室中發異泉無涸溢四衆訝之居三十年化風盛播室成日作偈曰一擊石庵全縱橫得自然清凉無暑氣涓潔有甘泉寬廓含沙界寂寥絶衆緣箇中無限意風月一床眠劒門南修造者淳厚之士自大隨一語契投服勤不怠歸謁崇化贇禪師坐次贇以宗門三印問之南曰印空印泥印水平地寒濤競起假饒去就十分也是靈龜曳尾淨因蹣庵繼成禪師法嗣台州瑞巖佛燈如勝禪師上堂曰人人領略釋迦箇箇平欺達磨及乎問著宗綱束手盡云放過放過即不無只如女子出定趙州洗鉢盂又作麼生話會鶴有九皋難翥翼馬無千里謾追風無為軍冶父實際道川禪師姑蘇玉峰人為懸之弓級聞東齊謙首座為道俗演法遂從之習坐不倦一日因是不職尉笞之師於杖下大悟辭依謙謙為改名道川且曰汝舊呼狄三今名道川川即三耳此去能竪起脊梁了辨箇事其道如川之增若放倒則依舊狄三也師銘於心建炎初圓頂游方至天峰蹣庵與語鋒投庵稱善歸憩東齊道俗愈敬有以金剛般若經請問者師為頌之今盛行於世隆興改元殿撰鄭公喬年漕淮西適冶又虗席迎開法上堂曰群陰剝盡一陽生草木園林盡發萠唯有衲僧無底鉢依前盛飯又盛羹上堂舉雪峯一日登座召衆云看看東邊底又云看看西邊底汝若要會拈拄杖擲下云向這裏會取師曰東邊了復西觀拄杖重重話歲寒帶雨一枝華落盡不煩公子倚闌干青原第十五世雲門九世雪竇明禪師法嗣密州𡺸山寧禪師上堂曰有時孤峰頂上嘯月眠雲有時大洋海中翻波走浪有時十字街頭七穿八穴諸人還相委悉麼樟樹華開盛芭蕉葉最多僧問全身放下時如何曰既是全身何消放下云直是步步不將來心心無處所曰亦無步步云不見道直須步步踏著曰落在功勛云不涉功勛爭得到這裏曰庭前樹子一任風吹云而今四海清如鏡暢快漁翁把鈎輪曰不見鯨鯢上玉鈎淨慈月堂佛行昌禪師法嗣臨安府五雲悟禪師苕溪人謁月堂於何山入室次堂舉雲門須彌山問之擬對堂以拂子擊其口師即契悟命為侍者後謁諸方皆𫎇許可月堂被旨居靈隱師歸省堂延為座元未幾出住五雲宿衲所向上堂謂衆曰月堂老漢道行不見行是箇甚麼坐不見坐是箇甚麼著衣時不見著衣是箇甚麼喫飯時不見喫飯是箇甚麼山野雖與他同床打睡要且各自做夢何故行見行坐見坐著衣時見著衣喫飯時見喫飯無有不見底道理亦無箇是甚麼諸人且道老漢底是五雲底是拈拄杖卓一下曰桃紅李白薔薇紫問著春風總不知乾道戊子秋回冷泉為西堂十二月望示微疾至二十四夜請堂頭首座龍華本禪師為衆普說敘師出處及得法師未開堂故也躬起爇香至四鼓危坐不動侍僧清隱請偃息師曰更少時鐘鳴報我鐘既鳴書三偈付隱一遺龍華以二別月堂顧隱曰更寫一紙辭衆如何隱曰諾復大書曰倒跨楊歧三腳驢拗折雲門一條杖禪流更擬問如何江西十八灘俱漲隱曰莫更有在師斂手而逝龕留五日顏如生目微開時國使入山觀者如市火浴目睛舌本身根不壞瑞巖寂室惠光禪師法嗣臨安府中天竺癡禪元妙禪師雙溪東陽人族王氏年十二去家圓具習台教去依寂室於國清聞舉索命話師有省撫屏大笑辭謁西禪淨禪師淨使職堂司一日舉興化打克賓公案問師師曰知恩方解報恩淨打曰多人作此見解師頓領及寂室詔補靈隱擢為第一座自開法靈石凡四坐道場上堂曰靈石說禪粗操動著七顛八倒觀妙理玄言恰似屎坑視諸佛祖師猶如糞掃罵詈懵懂禪和排斥杜撰長老有時讚歎使一一人人面前喜歡有時耻剝教一一人人肚裏煩惱雖然九凸十凹鬪湊將來恰好敢問大衆且道那裏是恰好處提拄杖曰還見麼直饒向這裏見得倜儻分明須知更有一處未免殽訛遂橫按曰還委悉麼東籬綻黃菊秋雨滴青莎上堂黃昏雞報曉半夜日頭明驚起雪師子瞪開紅眼睛上堂去年梅今歲柳顏色馨香喝一喝良久曰若不得這一喝幾乎道著依舊且道道著後如何眼睛突出上堂舉南泉喫油餈師曰南泉肚裏飽齁齁莊主雖饑解點頭侍者只聞歌樂響不知洪飲在高樓僧問如何是截斷衆流句曰佛祖開口無分云如何是函蓋乾坤句曰匝地普天云如何是隨波逐浪句曰有時入荒草有時上孤峰隆興改元師以足疾退藏𭬥李李氏庵明年七月作書偈別參政周公葵及道俗問侍者立秋近遠以十一日對至期書偈而逝火浴舌睛齒顱不化設利璨然歸塔于寺之稽留峰壽五十有四嶽麓海禪師法嗣荊門軍玉泉思達禪師僧問如何是一印印空曰萬象收歸古鑑中云如何是一印印水曰秋蟾影落千江裏云如何是一印印泥曰細觀文彩未生時圓覺曇禪師法嗣撫州靈巖圓日禪師嘉興崇德人年二十六投千金妙冲為頭陀數暮落髮不善書唯務宴寂夜設香鼎於前昏睡即引指爇之不兩月盡一指後聞維那白犍椎發明往依圓覺有年辭扣諸方歸侍次問云文殊與三十二菩薩各說不二法門維摩默然敘語未終覺喝曰你擬向䭾然處垛根那所疑冰釋命分座隆興初住靈巖後居圓覺上堂曰悟無不悟得無不得九年面壁空勞力三腳驢兒跳上天泥牛入海無蹤跡為甚麼如此九九八十一上堂舉南泉示衆曰馬大師說即心即佛王老師不恁麼不是心不是佛不是物師曰倒腹傾腸幾箇知更無絲髮可相依直饒徹底承當去也落他家第二機青原第十五世洞山十一世天童大休宗珏禪師法嗣慶元府雪竇足庵智鑒禪師上堂曰世尊有密語迦葉不覆藏一夜落華雨滿城流水香雪竇聞庵嗣宗禪師法嗣泰州如皋廣福微庵道勤禪師邑之俞氏子上堂曰祖師正令不通水泄放一線開露柱饒舌寒時須寒熱時須熱無缺無餘應時應節一切成現休強分別才入思惟便成剩說不入思惟只得一橛是則金剛眼睛不是則黃泥土揑上堂舉僧問同安如何是和尚家風曰金雞抱子歸霄漢玉兔懷胎向紫微云忽遇客來將何祗待曰金果早朝猿摘至玉華晚後鳳銜來師曰廣福即不然有問如何是和尚家風只向道翠竹叢邊歌款乃碧巖深處臥煙蘿忽遇客來將何祗待沒底籃兒盛白月無心碗子貯清風善權法智禪師法嗣紹興府超化藻禪師開爐日上堂曰雪滿寒窗燒盡丹霞木佛冰交野渡凍殺陝府鐵牛直得寒灰發焰片雪不留任運縱橫現成受用諸禪德要會麼衲帔蒙頭坐冷暖了無知南嶽第十六世臨濟十二世黃龍五世光孝果慜禪師法嗣廣德軍光孝初首座分座日示衆舉風幡話至仁者心動處乃曰祖師恁麼道賺殺一船人今時衲僧不可也恁麼會既不恁麼會畢竟作麼生良久曰六月好合醬切忌著鹽多祥符立禪師法嗣湖南報慈淳禪師上堂曰青眸一瞬金色知歸授手而來如王寶劒而今開張門戶各說異端可謂古路坦而荊棘生法眼正而還自翳辜負乃祖埋沒己靈且道不埋沒不辜負正法眼藏畢竟如何話會有吐露得底試出來道看如無擔取詩書歸舊隱野華啼鳥一般春育王無示介諶禪師法嗣南劒州西巖宗回禪師雙溪人久依無示深得法忍紹興己巳春寺僧以茶禁聞有司吏捕知事師謂衆曰此事不直之則罪坐於我若自直彼復得罪不忍為也令擊鼓升堂師遂登座說偈曰縣吏追呼不暫停爭如長往事分明從前有箇無生曲且喜今朝調已成言訖瞑目而逝餘語未見台州萬年心聞曇賁禪師永嘉人上堂曰一見便見八角磨盤空裏轉一得永得辰錦朱砂如墨黑秋風吹渭水已落雲門三句裏落葉滿長安幾箇而今被眼瞞竪拂子曰瞞得瞞不得總在萬年手裏還見麼華頂月籠招手石斷橋水落捨身巖僧問百丈卷席意旨如何曰賊過後張弓高麗國坦然國師少嗣王位欽鄉宗乘因海商方景仁抵四明録無示語歸師閲之啓悟即棄位圓顱作書以語要及四威儀偈令景仁呈無示示答曰佛祖出興於世無一法與人實使其自信自悟自證自到具大知見如所見而說如所說而行山河大地草木叢林相與證明其來久矣後復通嗣書獻其國所賜磨衲袈裟山錦拜褥青磁香爐等洎開堂語録其書略曰生死海廣劫殫罔通得遇本分宗師以三要印子驗定其法實謂龜盲值浮木孔耳慶元府天童慧航了朴禪師七閩人行實未詳上堂曰酷暑如焚不易禁炎炎赫赫欲流金夜明簾外無人到靈木迢然博緑陰上堂久雨不晴半睡半醒可謂與天地合其德日月合其明四時合其序鬼神合其吉凶遂喝曰住住內卦已成更求外象卓拄杖曰適來擲得雷天大壯如今變作地火明夷上堂牛皮鞔露柱露柱啾啾叫燈籠佯不知虗明還自照殿脊老刎聞得呵呵笑三門側耳聽就上打之繞譬如十日菊開徹阿誰要阿呵呵未必秋香一夜衰尉斗煎茶不同銚室中問僧賊來須打客來須看只如三更夜半人面似賊賊面似人作麼生辨臨安府龍華無住本禪師廣德人上堂舉雲門大師拈起胡餅云我只供養兩浙人不供養向北人衆無語自代云天寒日短兩人共一碗師曰韶陽老漢言中有響痛處著錐檢點將來翻成毒藥諸人要會麼半在河南半河北一片虗疑如墨黑冷地思量愁殺人叵耐雲門這老賊老賊下座更不巡堂道場普明慧琳嗣師法嗣臨江軍東山吉禪師因李朝請與甥薌林居士向公子諲訪之遂問家賊惱人時如何師曰誰是家賊李竪拳師曰賊身已露云和尚莫誣罔人好曰贓證現在李無語師示以偈曰家賊惱人孰奈何千聖回機只為他遍界遍空無影跡無依無倚絶籠羅賊賊猛將雄兵收不得疑殺天下老禪和笑翻閙市古彌勒休休不用將心向外求回頭瞥爾賊身露并贓捉獲世無儔世無儔真可仰從茲不復誇伎倆貼貼安立業時萬象森羅齊拊掌後首衆於閩之開元食時停筯而化音釋昕許斤切音耆諶時壬切浹即協切輻音福頷尸感切眨音劄足止切鏌音莫鎁音耶捺女點切陟教切璉力展切涸曷各切溢音逸贇於倫切翥章庶切蹣謨官切漕在到切勛音熏鯢音倪爇儒劣切歧音祁拗於絞切懵毋總切懂行董湊千候切倜他力切殽何交切瞪抽庚切餈才咨切齁呼𬾃切顱音盧居言切欵音乃音藹閩音民鞔摸官切啾即由切刎音吻薌音香諲音因誣音巫
