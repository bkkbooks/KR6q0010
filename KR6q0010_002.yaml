body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十世臨濟六世汾陽善昭禪師法嗣袁州南源慈明楚圓禪師族李氏全之清湘人少為書生年二十二依城南湘山隱靜寺得度其母有賢行使之遊方聞汾陽道望往謁焉陽顧而器之經二年未容入室見必罵詬及所聞皆流俗鄙事一夕訴曰自至法席不蒙指示歲月飄忽己事未明有失出家之利語未卒陽叱曰是惡知識敢販我舉杖逐之師擬伸救陽忽掩其口乃大悟曰是知臨濟道出常情僧寶傳敘師見汾陽時朝廷方問罪河東道路艱行易服類廝養之語以師行實訂之乃生於雍熙丙戌入滅於寶元己卯河東平八年而師始生寂音失於討論矣服役七稔去謁唐明嵩神鼎諲洞山聰暨登楊李二公之門機語契投於是法道大振宜春守黃公宗且請開法南源次遷道吾石霜福嚴興化都尉李侯遵勗奏賜命服徽號上堂日若向言中取則埋沒宗風直饒句下精通敢保此人未悟所以山青水緑雀噪鴉鳴萬派同源海雲自異未來諸佛口似燈籠過去諸佛應病施方現在諸佛墮坑落塹且不落凡聖一句作麼生道良久曰矢上加尖上堂藥多病甚網細魚稠便下座上堂道吾打鼓四大部洲同參拄杖橫也挑括乾坤鉢盂轉也覆却恆沙世界且問諸人向甚麼處安身立命若也知得北俱盧洲喫粥喫飯若也不知長連床上喫粥喫飯上堂上來也步步登高下去也通身無礙所以道有時先敲後唱有時先唱後敲有時敲唱同時有時敲唱不同時所以王登寶殿野老謳歌如今還有謳歌者麼良久曰木人雖舉手石女不擡頭咄上堂法身無相應物現形竪起拄杖曰這箇是拄杖阿那箇是法身這箇葛藤且止僧堂佛殿穿入汝等諸人鼻孔裏去也四大海水在汝頭上海龍王在汝指甲下汝等還覺麼若覺去晝行三千夜行八百腳下煙生頭上火起若也不覺飢來喫飯困來眠卓拄杖下座上堂以拄杖擊禪床召大衆曰還聞麼不見道一擊忘所知更不假修持諸方達道者咸言上上機香嚴恁麼悟去分明悟得如來禪祖師禪未夢見在且道祖師有甚麼長處若向言中取則誤賺後人直饒棒下承當辜負先聖萬法本間唯人自閙所以山僧居福嚴只見福嚴境界晏起早眠有時雲生碧嶂月落寒潭音聲鳥飛鳴般若臺前桫欏華香散祝融峰畔把瘦笻坐磐石與五湖衲子時話玄微灰頭土面住興化只見興化家風迎來送去車馬駢闐漁唱瀟湖猿啼嶽麓絲竹歌謠時時入耳復與四海禪人日談禪道歲月都忘且道居深山住城郭還有優劣也無試道看良久曰是處是彌勒無門無善財僧問如何是道曰踏著不嗔云如何是道中人曰𮌎馱背負問如何是祖師西來意曰渾家送上渡頭船問如何是佛曰水出高源問如何是異類中人曰頭長腳短云謝師指示曰半幅封全云直恁麼去也曰闍梨鼻孔為甚麼在山僧手裏僧無語師便打問山深覓不得時如何曰口能招禍問東湧西沒時如何曰尋問夜靜獨行時如何曰三把茆問寶劒未出匣時如何曰響云出匣後如何師噓一聲問閙中取靜時如何曰頭枕布袋問牛頭未見四祖時如何曰堆堆地云見後如何曰堆堆地問一得永得時如何曰抱石投河問達磨未來時如何曰物逐人興問佛祖不立時如何曰舌上生茆問古人封白紙意旨如何曰家貧路富問蓮華未出水時如何曰水深蓋不得云出水後如何曰不礙往來看云華開後如何曰南北馨香云結子後如何曰餧魚餧鱉問如何是禪曰鼻孔入地問己事未明以何為驗曰玄沙曾見雪峰來云意旨如何曰一生不出嶺問久昧衣珠請師指出曰草賊大敗云走透無路也曰腳踢不動以寶元二年正月五日沐浴加趺而逝壽五十四夏三十二筠州大愚守芝禪師族王氏太原人也幼棄家依潞州承天寺試法華得度從賢首諸師嘗講金剛般若名滿三河學者宗之時昭禪師出世汾水因往觀聞其語異遂投誠入室未及閫疑情頓釋乃蒙印可出住高安大愚後遷南昌翠巖開堂日問答罷乃曰問話且止山僧道薄人微素無德行叨承密諫諸官僚同伸堅請升於此座上答皇恩國祚永安法輪常轉大衆且法輪作麼生轉欲得會麼須彌山上倒翻身却來堂中疊足坐阿呵呵是甚麼飯籮裏坐却受餓和泥合水恁麼過上士聞之熙熙下士聞之肯可子細思量却成口過要會麼一六三四二直言四七一桃李火中開黃昏候日出久立尊官伏惟珍重上堂德山入門便棒臨濟入門便喝一棒一喝若雙峰而互出賓主未辨恓恓而萬里望鄉關照用雙行擬議而千差塞路到這裏如何話會棒喝齊施早已賒古今皆贊出周遮二途不涉憑何説南海波斯進象牙上堂舉雪竇云一問一答總未有事在假饒盡乾坤大地草木叢林都為衲僧異口同音致百千問難不消老僧彈指一下並乃高低普應前後無差師曰翠岩即不然盡乾坤大地微塵化為衲僧各致一問問問各別却向伊道許多衲僧皮下還有血麼上堂一擊響玲瓏喧轟宇宙中知音才側耳項羽過江東恁麼會得恰認得箇驢鞍橋作阿爺下頷上堂翠岩路滑徒勞佇思又曰翠岩路嶮巇舉步涉千溪更有洪源水滔滔在嶺西擊禪床下座僧問如何是洪州境曰出入敲金鐙朱衣對錦屏云如何是境中人曰朝去暮歸問如何是祖師西來意曰天寒日短講金剛經僧問如是信解不生法相意旨如何時有狗臥繩床前師踢之狗去乃問解麼云不解曰若解即成法相嘉祐初示寂塔于西山滁州琅瑘廣照慧覺禪師敘語見續燈上堂曰剪除狂冠掃蕩攙搶猶是功勳邊事君臣道合海晏河清猶是法身邊事作麼生是衲僧本分事良久曰透網金鱗猶滯水回途石馬出紗籠上堂本來無一物壓殺世間人直饒便分明坐在糞坑裏作麼生是透脫一路妙音觀世音梵音海潮音上堂拈拄杖曰盤山道向上一路滑南院道壁立千仞嶮臨濟道石火電光鈍琅瑘有定乾坤底句各各高著眼高著眼卓拄杖下座上堂舉僧問馬祖如何是佛曰即心是佛云如何是道曰無心是道云佛與道相去多少曰佛如展手道似握拳師曰古人方便即不可山僧這裏也有些子若無人買山僧自賣自買去也如何是佛岩前多瑞草如何是道澗下絶靈苗佛與道相去多少數片白雲籠古寺一條緑水繞青山上堂汝等諸人在我這裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峰獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為五處若通方名導師汝等諸人若到諸方遇明眼作者與我通箇消息貴得祖風不墜若是常徒即便寢息何故裸形國裏誇服飾想君太煞不知時僧問如何是無縫塔曰永鎮紅霞裏云如何是塔中人曰常伴白雲眠問如何是沙門行曰左手畫方右手畫圓問如何是賓中賓曰手攜書劒謁明君云如何是賓中主曰卷起珠簾無可覩云如何是主中賓曰三更過孟津云如何是主中主曰獨坐鎮寰宇問如何是佛曰銅頭鐵額云意旨如何曰鳥觜魚腮問蓮華未出水時如何曰貓兒戴紙帽云出水後如何曰狗子著靴行舒州法華全舉禪師未詳族里號舉道者所造高邈汾陽稱之自并汾謁諸名宿靡不與酬酢咸推為飽參住法華未幾遷白雲海會上堂曰語漸也返常合道論頓也不留朕迹直饒論其頓返其常也是抑而為之上堂釋迦不出世達磨不西來佛法遍天下談玄口不開上堂心不是佛智不是道且道是甚麼刻舟尋劒膠柱調絃僧問如何是本來宗曰密室不通風却問僧你作麼生會云不會師曰春日櫻桃朵朵紅問智識不到處如何曰三門不曾開云誰是知音者曰口似鼻孔問如何是祖師西來意曰唇紅齒白問如何是佛曰手不如腳又曰蘆芽穿膝一日與僧山行僧問香林道老僧三十年來不能打成一片便遷化此意如何曰老僧亦恁麼復曰會麼云乞師指示師曰香林成一片老僧亦恁麼不待此月終重為子決破至月末示寂蘄州龍華曉愚禪師辭汾陽至五祖戒禪師處戒問不落唇吻一句作麼生道云老老大大話頭也不照顧戒便喝師亦喝戒拈棒師拍手便出戒曰闍梨闍梨話在師將坐具搭肩上竟不顧後住龍華上堂曰摩騰入漢已涉繁詞達磨西來不守己分山僧今日恁麼道也是為他間事長無明便下座撫州踈山曉珠禪師僧問如何是佛曰五彩畫鴛鴦問如何是透法身句曰皮穿肉綻云畢竟如何曰雀噪鴉鳴葉縣省禪師法嗣舒州浮山圓鑑法遠禪師族王氏鄭之圃田人年十九遊并州見三交嵩禪師求出世法嵩顧其犀骨插腦目光射人且異之曰汝當剃染墮三寶數乃可授法云法有僧俗乎曰殊不知僧能續佛壽命師欣從未幾遇嵩為衆入室一僧請問趙州柏樹子因緣嵩詰之師旁侍忽契悟進具後謁汾陽葉縣皆蒙印可天禧中至大陽明安安與語遂以衣履命師求人續洞上宗旨元豐辛酉出住舒之太平興國次徙姑蘇天平晚住浮山受請日上堂有僧出禮拜師曰大獵之家豈藉狐兔雖然如是小慈妨大慈便打僧起問大善知識言無所墮有出人眼如何是出人眼曰黃河九曲云恁麼則真善知識曰陝府鐵牛乃曰諸仁者欲得英俊麼仍須四事具備方顯宗師蹊徑何謂也一者祖師巴鼻二具金剛眼睛三有師子爪牙四得衲僧殺活拄杖得此四事縱橫變熊任運卷舒高聳人天壁立千仞儻不諧此守死善道者敗軍之兆何故棒打石人貴論實事所以到這裏得不修江耿耿大野雲凝緑竹含煙青山鎖翠風雲一致水月齊觀一句該通已彰殘朽上堂諸佛出世建立化門不離三身智眼亦如摩醯首羅三目何故一隻水泄不通緇素難辨一隻大地全開十方通暢一隻高低一顧萬類齊瞻雖然若是本分衲僧陌路相逢別具通天正眼始得所以道三世諸佛不知有狸奴白牯却知有且道狸奴白牯知有箇甚麼事要會麼深秋簾幕千家雨落日樓臺一笛風上堂天得一以清地得一以寧帝王得一以治天下衲僧得一禍患臨身擊禪床下座上堂大丈夫擬欲絶裂陳索霸主升騰麼第一不得螣蛇繞足路布纏身高著眼睛勿存依挂設使澄瀾渺邈同風而未可停舟雲月彌天隱顯兮豈披圓照儻或言超表略事越機諧觸目荒榛論年放曠簷前捧日未是高明狹路分歧寧同大轍應是從前會解平昔見知自負依他宜須退步直須乾嚗嚗地水灑不著便是咬一粒米著一片衣腳踏實地自不欺謾輒莫朝雲暮雨變化不開春茂秋凋仇讎不動平生慷慨事合如斯山僧今日恁麼道大似鞏縣茶瓶上堂垂慈則有法無法不垂慈古人道末後一句始到牢關把斷要津不通凡聖尋常向你諸人道任從天下樂欣欣我獨不肯如靈龜負圖自取喪身之兆鳳縈金網趨霄漢以何期須於旨外明機莫向言中取則是以石人機似汝也會唱巴歌汝若似石人雪曲也應和僧問三世諸佛不知有意旨如何曰弄巧成拙云狸奴白牯却知有又作麼生曰鈍鳥逆風飛問衆手淘金誰是得者曰入水見長人問如何是面前事曰鼻孔云如何是向上事曰眼睛問金鏃慣調曾百戰鐵鞭多力恨無讎學人上來請師端的曰誅龍之劒豈可揮蛇僧噓噓師曰而今大有如君者不到烏江未肯休問路逢達道人不將語默對未審將甚麼對曰玉樹夜凋零不待狂風掃問從上諸聖傳不到處請師道曰番人愛裹雕鼠帽云斬新日月特地乾坤曰鐵鞭遙指賀蘭山師暮年休於會聖岩敘佛祖奧義作九帶曰佛正法眼帶佛法藏帶理貫帶事貫帶理事縱橫帶屈曲垂帶妙叶兼帶金針雙鎖帶平懷常實帶學者既已傳誦師曰若據圓極法門本具十數今此九帶已為諸人説了更有一帶還見得麼若也見得親切分明却請出來對衆説看説得分明許汝通前九帶圓明道眼若見不親切説不相應唯依吾語而為己解則名謗法諸人到此如何衆無語師叱之而去末篇論南華真經曰莊子與惠子遊於濠梁之上莊子曰倏魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰汝安知魚樂云者既已知吾知之而問我我知之濠上也郭象注曰凡相知者果可以此知彼不待是魚然後知魚也師曰郭象於魚猶髣佛矣且魚以水為命見於水即見於魚所謂色心不二彼我無差其或離岸見水則水外別有岸也水岸既立二法迭失魚水各異乃亂天之經逆物之情其或情不逆經不亂均順天和魚相忘於江湖人相忘於道術見岸即水見水即魚天地一指萬物一馬空同實相一體無諸不待水而水不待岸而岸不待魚而魚然後知魚水也首楞嚴經曰如來藏中性水真空性空真水清淨本然周遍法界隨衆生心應所知量又曰於一毫端現寶王剎豈惟魚水矣又經曰一即一切一切即一無異相無別相前後際斷如此而無處不魚無處不水豈待遊濠梁之上然後知魚水哉石門慈照蘊總禪師法嗣一名谷隱鎮江府金山達觀曇穎禪師錢塘人也族丘氏於隆興寺得度神宇凜然嘗通內外墳典出遊師席首謁大陽明安問洞上所立偏正君臣當明何事曰父母未生時事云如何體會曰夜半正明天曉不露師忙然乃往石門理前語云未審師意如何曰不道不是但口門窄滿口説未盡耳云如何是父母未生時事曰糞墼子云如何是夜半正明天曉不露曰牡丹華下睡貓兒師愈疑一日以石頭執事元是迷契理亦非悟問之門曰你道此語是藥語是病語云是藥語門叱曰汝尚以病為藥豈知祖師透脫意師聞灑然云如何受用曰語不離窠臼焉能出蓋纏師歎曰才涉唇吻便落意思皆是死門終非活路即再拜禮辭初住舒之爐峰次遷因聖隱靜暨雪竇金山上堂舉身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃又道菩提本無樹明鏡亦非臺本來無一物何假拂塵埃師曰此二尊宿同床打睡各自做夢喫茶去上堂諸方鈎又曲餌又香奔湊猶如蜂抱王因聖這裏鈎又直餌又無猶如水底捺葫蘆舉拄杖作釣魚勢曰深水取魚長信命不曾將酒祭江神擲拄杖下座上堂舉長沙岑和尚與仰山玩月次仰云人人盡有這箇只是用不得沙云恰是倩汝用去仰云師叔作麼生用沙踏倒仰山山云一似箇大蟲師曰仰山喚作大蟲因聖道似箇狂狗上堂山僧門庭別已改諸方轍為文殊拔出眼裏楔教普賢休嚼口中鐵勸人放開髂蛇手與汝斫却繫驢橛駐意擬思量喝曰揑揑參上堂始從鹿野苑終至跋提河於是二中間未嘗説一字師曰世尊只知靈龜曳尾後人不覺見兔守株上堂萬里長途去不回此人空道已心灰若從因聖門前過須解逢春却再來僧問如何是向去底人曰從歸青嶂裏不出白雲來云如何是却來底人曰自從遊紫陌誰肯隱青山問如何是奪人不奪境曰家裏已無回日信路邊空有望鄉牌云如何是奪境不奪人曰滄海盡教枯到底青山直得碾為塵云如何是人境兩俱奪曰天地尚空秦日月山河不見漢君臣云如何是人境俱不奪曰鶯囀千林華滿地客遊三月草侵天問如何是和尚家風曰伸手不見掌云忽遇仙陀客來又作麼生曰對面千里問師唱誰家曲宗風嗣阿誰曰臨濟云恁麼則谷隱的子也曰德山問亡僧遷化向甚麼處去曰驢胎馬腹云以何為驗曰種如是因獲如是果問臨濟入門便喝德山入門便棒未審和尚如何為人曰靈雲見桃華云莫是和尚為人處也無曰趙州對柏樹問如何是長法身曰拄杖長六尺云如何是短法身曰算子短三寸云恁麼則法身有二去也曰更有方圓在問馬大師一喝百丈三日耳聾意旨如何曰我平生不曾著人喝一生耳聾云如何領會曰近來又眼暗太子少保李公端願嘗館之內園日夕問道故公卿求發藥者隨機開示悉令契入其辨才無礙王文康公夏英公諸鴻儒咸事以師禮録其語曰登門集嘉祐四年除夜遣侍者持書別揚州刀景純學士明旦當行厚自愛刀發緘駭然急遣吏馳書報之船將抵岸師欣然登座敘出世本末及謝其輔贊者囑令進修遂舉監寺賢公補處下座讀力學士書畢大衆擁至丈室加趺而逝五年元日也世壽七十有五僧臘五十有三荊南府竹園法顯禪師僧問萬法歸一一歸何所曰水深不見底云如何湊泊曰須是本行人問如何是道曰交橫十字云如何是道中人曰往往不相識唐州大乘遵禪師侍慈照日嘗問古人索火意旨如何曰任他滅云滅後如何曰初三十一云恁麼則好時節也曰汝見甚麼道理云今日一場困照便打師即大悟有頌曰索火之機實快哉藏鋒妙用少人猜要會我師親的旨紅爐火盡不添柴青原第十世雲門四世雪竇明覺重顯禪師法嗣紹興府天衣義懷禪師永嘉樂清陳氏子也世以漁為業母夢星殞于屋乃孕及産尤多吉祥兒時坐船尾父得魚付師貫之師不忍乃私投江中父怒笞師恬然如故長遊京師依景德寺為童行天聖中試經得度自言法華所記之後去謁金鑾善葉縣省微有契晚至姑蘇禮明覺於翠峰峰問汝名甚麼云義懷曰何不名懷義云當時致得曰誰為汝立名云受戒來十年矣曰汝行腳費却多少草鞋云和尚莫瞞人好曰我也沒量罪過汝也沒量罪過你作麼生師無語峰打曰脫空謾語漢出去入室次峰曰恁麼也不得不恁麼也不得恁麼不恁麼總不得師擬議峰又打出如是者數四徐為水頭因汲水折擔倐悟作投機偈曰一二三四五六七萬仞峰頭獨足立驪龍頷下奪明珠一言勘破維摩詰峰聞拊几稱善後七坐道場化行海內嗣其法者悉龍象上堂舉法眼道升元閣為御街裏人説法師曰諸人還知崇壽佛殿上刎昨夜三更大笑一聲三門頭金剛咄云你笑箇甚麼我笑茫茫宇宙人空延歲月兀兀度時道德不修衣食斯費忽然築著閻羅老子禍事禍事上堂枯桑知天風海水知天寒金色頭陀見處不真雞足山中與他看守衣鉢三千大喻八百小喻大似泥裏洗土塊四十九年三百六十餘會摩竭提國猶較些子德山臨濟雖然丈夫爭似罽賓國王一刀兩段如今若有箇人鼻孔遼天山僧性命何在良久曰太平本是將軍致不許將軍見太平上堂夜來寒霜凜冽黃河凍結陝府鐵牛腰折盡道女媧煉石補天爭奈西北一缺如今欲與他補却又恐大地人無出氣處且留這一竅與大地人出氣參上堂虗明自照不勞心力上士見之鬼神茶飯中下得之狂心頓息更有一人切忌道著上堂光透日月明暗不收智出聖凡賢愚不歷所以道不在低頭思量難得良久曰是甚麼上堂須彌頂上不扣金鐘畢鉢巖前無人聚會山僧倒騎佛殿諸人反著草鞋朝遊檀特暮到羅浮拄杖針筒自家收取僧問天不能蓋地不能載未審是甚麼人曰掘地深埋云此人還受安排也無曰土上更加泥問大修行人還具因果也無曰只聞人作鬼不見鶴成仙云古人又作麼生曰且識前話問如何是古佛機曰得問牛頭未見四祖時如何曰長江無六月云見後如何曰一年一度春室中問僧無手人能行拳無舌人能解語忽然無手人打無舌人無舌人道箇甚麼又曰蜀魄連霄叫鵽𩾗終夜啼圓通門大啓何事隔雲泥晚年以疾居池陽杉山庵門弟子智才住臨平之佛曰迎歸侍奉才如蘇城未還師速其歸及鍾門師已書偈遺衆才問卵塔已成如何是畢竟事師舉拳示之遂就寢推枕而寂偈曰紅日照扶桑寒雲遮華嶽三更過鐵圍拶折蒼龍角壽七十二夏四十六塔全身於寺東之原師嘗設百問勘驗學者今載其二又托古今尊宿契悟因緣號通明集盛行於世崇寧中諡振宗大師嶽州君山顯升禪師上堂曰大方無外含裹十虗至理不形圓融三際高超名相妙體全彰逈出古今真機獨露握驪珠而鑑物物物流輝擲寶劒以揮空空空終迹把定則摩竭掩室淨名杜詞放行則拾得搖頭寒山拊掌且道是何人境界拈拄杖卓一下曰瞬目揚眉處憑君子細看平江府洞庭水月慧金典座慶曆中之四明依明覺聞舉須彌山話默有契一日欲往訊遇之殿軒覺問汝名甚麼云慧金曰阿誰惠汝金云容少間去方丈致謝曰即今聻云這裏容和尚不得覺休去於是衆所推敬命掌香積後告別覺述偈送之曰野水輕舟乘興分流秋光不盡誰也爭求握松為柄未極折柳贈行豈休休休百川駭浪兮空悠悠它日復寄以偈曰老衲枯藤一一分天涯無侶道方存因思龍朔年中事負石高風不易論此二偈與書刻之水月洞山曉聰禪師法嗣南康軍雲居曉舜禪師入道機語見續燈録上堂曰聞説佛法兩字早是污我耳目諸人未跨雲居門腳跟下好與三十棒雖然如是也是為衆竭力上堂舉夾山示衆道百草頭上薦取老僧閙市裏識取聖人雲居即不然婦搖機軋軋兒弄口㗻㗻上堂諸方有弄蛇頭撥虎尾跳大海劒刃裏藏身雲居這裏寒天熱水洗腳夜間脫襪打睡早朝旋打行纏風吹籬頭倒喚人夫劈篾縛起北禪智賢禪師法嗣隆興府法昌倚遇禪師臨漳高亭人也族林氏幼棄家依郡之崇福得度有大志自受具遊方名著叢席浮山遠禪師嘗指謂人曰此後學行腳樣子也辭遠謁芭蕉庵主又謁圓通興化諸名宿機語見僧寶傳留北禪最久於是師資敲唱妙出一時晚至西山眷雙嶺深邃捿息三年始應法昌之請上堂曰你若退身千尺我便當處生芽你若覿面相呈我便藏身露影你若春池拾礫我便撒下明珠直得水灑不著風吹不入如箇無孔鐵錘相似且道法昌還有為人處麼遂曰利刀割肉瘡猶合惡語傷人恨不消上堂春山青春水緑一覺南柯夢初足携笻縱步出松門是處桃英香馥郁因思昔日靈雲老三十年來無處討如今競愛摘楊華紅香滿地無人掃上堂拈起拄杖曰我若拈起你便喚作先照後用我若放下你便喚作先用後照我若擲下你便喚作照用同時忽然不拈不放你向甚麼處卜度直饒會得倜儻分明若遇臨濟德山便須腦門著地且道伊有甚麼長處良久曰曾經大海休誇水除却須彌不是山上堂舉大地雪漫漫春來依舊寒説禪説道易成佛作祖難法昌道大地雪漫漫春來便不寒到頭成佛易却是説禪難有一般人聞恁麼説鼻孔冷笑道有甚麼難朝到西天暮歸唐土南山起雲北山下雨甘草甜黃檗苦魚入深淵鳥捿高樹拈起拄杖達磨眼睛放下數珠釋迦鼻孔若是這箇禪三家村裏臭口老婆也解説得成佛則未在你且道畢竟那箇是禪遂曰直得額頭汗出上堂靈山會上三乘行位解脫法身正是乞兒殘飯祖師西來直指人心見性成佛正是祭鬼神茶飯汝等若見如經蠱毒之鄉更莫著著則禍生法昌這裏有一般茶飯尋常不曾拈出今日事不獲已將供養諸人他時若到諸方受用殷繁切須記取法昌今日供養遂作一圓相擲拄杖下座上堂夜半烏雞誰捉去石女無端遭指注空王令下急搜求唯心便作軍中主雲門長驅溈山隊伍列五位槍旗布三玄戈弩藥山持刀青原荷斧石鞏彎弓禾山打鼓陳排雪嶺長蛇兵屯黃檗飛虎木馬帶毛烹泥牛和角煮賞三軍犒師旅打葛藤分露布截海揚塵橫山簸土擊玄關除徼路多少平人受辛苦無邊剎海競紛紛三界聖凡無覓處無覓處還知否昨夜雲收天宇寬依前帶月啼高樹上堂間來只麼坐拍手誰賡和回頭忽見簸箕星水墨觀音解推磨拍手一下曰還會麼八十翁翁雖皓首看看不見老人容上堂法昌今日開爐行腳僧無一箇唯有十八高人緘口圍爐打坐不是規矩嚴難免見諸人話墮直饒口似稱鎚未免燈籠勘破不知道絶功勳妄自修因證果喝曰但能一念回光定脫三乘羈鎖黃龍南禪師至上堂拏雲擭浪數如麻點著銅睛眼便華除却黃龍頭角外自餘渾是赤斑蛇法昌小剎路遠山遙景物蕭疏遊人罕到敢謂黃龍禪師曲賜光臨不唯泉石增輝亦乃人天欣悅然雲行雨施自古自今其奈爐鞴之所鈍鐵猶多良醫之門病者愈甚瘥病須求靈藥銷頑必藉金錘法昌這裏有幾箇垛根阿師病者病在膏肓頑者頑入骨髓若非黃龍老漢到來總是虗生浪死拈拄杖曰要會麼打麵還他州土麥唱歌還是帝鄉人僧問古鏡未磨時如何曰却須磨取云未審如何下手曰鏡在甚麼處僧遂作一圓相師便打曰這漆桶碌甎也不識問二龍爭珠時如何曰法昌小出大遇云忽然傾湫倒嶽又作麼生師便打冬夜與感首座喫果子師拈起橘曰這箇滋味何似黃龍云更須嘗過始得曰驗人端的處下口便知音云末代禪師多虗少實又拈槖子曰這箇作麼生嘗云須是和尚始得曰一箇槖子早不奈何云饒人不是癡漢歲夜喫湯次感云昔旦北禪分歲曾烹露地白牛和尚今夜分歲有何施設曰﨟雪連山白春風逼戶寒云大衆喫箇甚麼曰莫嫌冷淡無滋味一飽能消萬劫飢云未審是甚麼人置辨曰無慚愧漢來處也不知哲首座至師曰山深路遠何煩訪及云仁義道中不為分外曰將得甚麼來哲叉手近前師曰只這箇為別有哲展坐具師曰前頭較些子後頭打不著哲曰且容某人事曰近離甚處云雲居曰峰頂事作麼生云多少人疑著師卓拄杖曰宏覺鼻孔何似這箇云草賊大敗曰這僧話頭也不識云和尚問甚麼曰我問你宏覺鼻孔云又道不識話頭曰不謬為翠巖弟子一日哲問和尚室中尋常開示機緣願聞一兩則曰暗裏抽橫骨明中坐舌頭你作麼生云和尚本是雲門宗胄為甚麼舉洞上因緣師乃踢出一隻鞋哲便休晦堂心禪師至坐次師曰近日法席可煞興盛云家家觀世音曰還有咬人師子麼云爐鞴之所鈍鐵猶多曰聞汝室中有拳頭話是否云家醜莫外揚師拈起钁曰何如我這箇云真不掩偽曰生死界中使那箇即是云不勞懸石鏡天曉自雞鳴曰恁麼討人驢年去龍圖徐公禧布衣時與師往來為法喜之遊及將化前一日作偈遺之曰今年七十七出行須擇日昨夜問龜哥報道明朝吉徐覽偈聳然邀靈源清禪師同往師方坐寢室以院務誡知事曰吾住此山二十三年護惜常住每自蒞之今行矣汝輩著精彩言畢舉拄杖曰且道這箇分付阿誰徐與靈源皆屏息遂擲杖投床枕臂而化福州廣因擇要禪師上堂曰王臨寶位胡漢同風紉半破三佛殿倒卓藏身句即不問你透出一字作麼生道拈拄杖曰春風開竹戶夜雨滴華心上堂古者道只恐為僧心不了為僧心了總輸僧且如何是諸上座了底心良久曰漁翁睡重春潭闊白鳥不飛舟自橫僧問如何是祖師西來意曰長安東洛陽西云如何是佛曰福州橄欖兩頭尖問佛未出世時如何曰隈岩傍壑云出世後如何曰前山後山開先善暹禪師法嗣東京智海第一代正覺本逸禪師敘語見續燈上堂曰憶得老僧年七歲時於村校書處得一法門超情離見絶妙絶玄爰自染神逾六十載今日輒出普告大衆若欲傳持宜當諦聽遂曰寒原耕隴罷牽犢負薪歸此夜一爐火渾家身上衣諸禪德逢人不得錯舉上堂觀乎乾坤之內洪荒之間人人有腳要行便行要住即住不由別人箇箇有口欲開即開欲合便合豈假他力正恁麼時非今非古非理非事非凡非聖非迷非悟包羅沙界籠二儀三世如來分疏不下諸大祖師提唱不起德山臨濟有棒有喝不敢施行鶖子滿慈有智有辨無門測度然雖如是若到這裏須是眼裏有筋眼裏無筋還同天瞽又須皮下有血知痛知癢痛癢不知何殊土木直饒有眼有筋知痛知癢正好打草鞋行腳若到諸方莫教打破洛浦遍參底上堂古者道接物利生絶妙外甥終是不肖他家自有兒孫將來應用恰好諸禪德還會麼菜園墻倒晴方築房店籬穿雨過修院宇漏時隨分整兒孫大小盡風流上堂舉暹和尚道寒寒地爐火暖間坐蒲團説迦葉不是談達磨無端此也彼也必然一般師召大衆曰迦葉甚處不是達磨那裏無端若點撿得出彼之二老一場懡㦬若點檢不出三十年後莫道不被人瞞好僧問如何是道曰龍吟金鼎虎嘯丹田云如何是道中人曰吐故納新云道與道中人相去多少曰骨鶴顛崖上沖天味米民問如何是佛曰東涌西沒云如何是道曰七顛八倒云如何是法曰你問我答云如何是禪曰不方不圓云便恁麼去時如何曰靈利人難得青原第十世洞山六世大陽明安警玄禪師法嗣郢州興陽清剖禪師不知何許人嘗為大陽園頭種瓜次陽問甜瓜何時得熟云即今熟爛了也曰揀甜底摘來云與甚麼人喫曰不入園者云未審不入園者還喫也無曰汝還識伊麼云雖然不識不得不與陽笑而去住興陽日上堂曰西來大道理絶百非句裏投機全乖妙旨不已而已有屈祖宗豈況忉忉有何所益雖然如是事無一向且於唱教門中通一線道大家商量僧出問娑竭出海乾坤震覿面相呈事若何曰金翅鳥王當宇宙箇中誰是出頭人云忽遇出頭時又作麼生曰似鶻提鳩君不覺髑髏前驗始知真云恁麼則叉手當𮌎退身三步也曰須彌座下烏龜子莫待重遭點額痕問從上諸聖向甚麼處去也曰月照千江靜孤燈海底明鄭金部問和尚甚時開堂曰不歷僧祇數日月未生前惠州羅浮如禪師至大陽日陽問上座是甚處人云益州曰此去多少云五千里曰你恁麼來還曾踏著麼云不曾踏著曰汝解騰空那云不解騰空曰爭得到這裏云步步不迷方通身無辨處曰汝得超方三昧耶云聖心不可得三昧豈彰名陽曰如是如是汝應信此即本體全彰理事不二善自護持復州乾明機聰禪師僧問如何是佛法大意曰此問不虗問如何是東禪境曰定水不曾離舊岸紅塵爭敢下波來襄陽府白馬歸春禪師僧問如龜藏六時如何曰布袋裏弓箭問如何是佛法大旨曰善狗帶牌潭州福嚴審承禪師因丞相參次亡其姓乃問如何是祖師西來意師指庭際柏樹示之如是者三丞相有省作偈曰出沒間雲滿太虗從來真相一塵無重重請問西來意唯指庭前柏一株舒州投子義青禪師青社人也族李氏續燈曰王氏非甫七齡穎異往妙相寺出家試經得度習百法論未幾歎曰三祇塗遠自困何益哉乃入洛五載聽華嚴於義若貫珠嘗讀諸林菩薩偈至即心自性遽省曰法離文字寧可講乎即棄遊宗席時圓鑑禪師居會聖巖一夕夢畜青色俊為吉徵屆且師來鑑禮延之三年一日問曰外道問佛不問有言不問無言世尊良久如何師擬對鑑掩其口師了然開悟遂禮拜鑑曰汝妙悟玄機耶云設有也須吐却時資侍者旁立曰青華嚴今日如病得汗師回顧曰合取狗口若更忉忉我即便歐服勤又三載禮辭鑑以大陽衣履付之書偈送曰須彌立太虗日月輔而轉群峰漸倚他白雲方改變少林風起叢曹溪洞簾卷金鳳宿龍巢宸苔豈車碾復指依圓通秀禪師師至棲賢無所參問唯嗜睡而已執事白秀云堂中有僧日睡當行規法秀曰是誰云義青上座曰未可待與按過秀即曳杖入堂見師正睡乃擊床呵曰我這裏無間飯與上座喫了打眠師云和尚待教某何為曰何不參禪去云美食不中飽人喫曰爭奈大有人不肯上座云待肯堪作甚麼曰上座曾見甚麼人來云浮山曰怪得恁麼頑賴遂握手相笑歸方丈由是道聲籍甚熙寧六年至龍舒道俗迎住白雲次遷投子以符慈濟禪師之記上堂召大衆曰若論此事如鸞鳳沖霄不留其迹羺羊挂角那覓乎蹤金龍不守於寒潭玉兔豈棲於蟾影其或主賓若立須威音世外搖頭問答言陳仍玄路傍提為唱若能如是猶在半途更乃凝眸不勞相見上堂宗乘若舉凡聖絶蹤樓閣門開別戶相見設使卷簾悟去豈免旁觀春遇桃華重增眼病所以古人道向上一路千聖不傳諸仁者既是不傳為甚麼鐵牛走過新羅國裏遂喝曰達者須知暗裏驚僧問師唱誰家曲宗風嗣阿誰曰威音前一箭射透兩重山云如何是相傳底事曰全因淮地月得照郢陽春云恁麼則入水見長人也曰只知荊玉異那辨楚王心僧禮拜師以拂子擊之復曰更有問話者麼如無彼此著便元豐五年五月一日中夜索筆書偈曰兩處住持無可助道珍重諸人不須尋討投筆泊然奄息闍維多靈典獲設利五色以閏月同靈骨塔于寺北三峰庵壽五十一臘三十七音釋詬許候切諲音因塹七艷切謳音甌桫素何切欏音羅駢蒲眠切闐音田麓音鹿謠音姚馱音陀餧於偽切躍他力切潞音路閫苦本切巇音羲鐙丁鄧切蹊音兮絶子悅切嚗音剝鞏音拱鏃子木切雕音刁倏音條墼音擊楔音屑緘古咸切殞羽敏切鑾盧丸切刎武粉切罽居例切媧古花切鵽丁滑切𩾗音刀托之石切喎苦禾切劈普擊切馥音伏犒口到切簸補過切羈居宜切拏女加切擭一虢切或作咬五狡切陟教切鶖音秋罥音畎歐於口切羚音靈郢以并切
