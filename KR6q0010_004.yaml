body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十二世臨濟八世黃龍普覺慧南禪師法嗣一隆興府黃龍寶覺祖心禪師南雄始興人族塢氏為書生有聲年十九目盲父母禱圓通大士許出家即覩物乃依龍山寺慧全明年試經唯師獻詩得奏名剃染繼住龍山以律身不嚴幾逢橫逆遂入叢林謁雲峰悅禪師留三年告悅將去悅特指見南禪師時住積翠往居四年無所入一日傾湯誤注手指豁如夢覺知有而機不發南抑之師復雲峰悅已謝世就止石霜因讀傳燈至僧問多福如何是多福一叢竹曰一莖兩莖斜云學人不會曰三莖四莖曲於是頓證二師垂手處徑回積翠方展坐具南曰子始入吾室矣師禮謝乃謁翠巖真泐潭月皆器之自爾名冠叢社南以熙寧二年歸寂郡守及龍圖徐公禧挽師嗣居上堂曰大凡窮生死根源直須明取自家一片田地教伊去處分明然後臨機應用不失其宜只如鋒鋩未兆已前都無是箇非箇瞥爾𪹼動便有五行金木相生相尅胡來漢現四姓雜居各任方隅是非鋒起致使玄黃不辨水乳不分疾在膏肓難為救療若不當陽曉示窮子無以知歸欲得大用現前便可頓忘諸見諸見既盡昏霧不生大智洞然更非他物珍重上堂擊禪床曰一塵才舉大地全收諸人耳在一聲中一聲遍在諸人耳若是摩霄俊鶻便合乘時止濼困魚徒勞激浪上堂不與萬法為侶即是無諍三昧便恁麼去爭奈絃急則聲促若能向紫羅帳裏撒真珠未必善因而招惡果上堂有句無句如藤倚樹且任諸人點頭及乎樹倒藤枯上無衝天之計下無入地之謀靈利漢這裏著得一隻眼便見七蹤八橫舉拂子曰看太陽溢目萬里不挂片雲若是覆盆之下又爭怪得老僧上堂若也單明自己不悟目前此人有眼無足若悟目前不明自己此人有足無眼據此二人十二時中常有一物蘊在𮌎中物既在𮌎不安之相常在目前既在目前觸途成滯作麼生得平穩去祖不言乎執之失度必入邪路放之自然體無去住僧問達磨九年面壁意旨如何曰身貧無被蓋云莫辜負他先聖也無曰闍梨見處又作麼生僧畫一圓相師曰𪈏雀不離窠僧禮拜師曰更深猶自可午後始愁人問未登此座時如何曰一事全無云登後如何曰仰面觀天不見天師住持十有二年性真率不樂事務凡五辭乃退揭其室曰晦堂衲子源源而來揮之不去士夫慕風求開發者衆因托教門祖宗言句及儒道經書作徵問辨通如論語曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣師曰吾道既一則可以統貫萬差之事當其一貫萬事之中可容其見若容其見則不為一若不見時萬事顯然一何形狀苟能見達忠恕之道可得而明道德經出生入死章曰生之徒十有三死之徒十有三人之生動之死地亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不避兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地焉師曰十中有三三者何耶其三三者蓋取九數以為生生之攝用也有何所以不盈十數若盈十數形器所拘則不能明出生入死既不能明出生入死寧逃兕虎投角措爪所以其一不用而用而能善用非數而數而能善數夫何故以其無死地也既知無死則見無生無生無死則可以明出生入死可謂生而無生死而無死非獨入軍不被甲兵蹈火履水而無焦溺亦皆如之請問既有其生不無其死何由得歸無死之地維摩經曰此室常以金色光照晝夜無異不以日月所照為明師曰若以金色光照為明現居之室轉流晝夜若以日月所照為明現居之室晝夜流轉識是非眼入是非看元符三年十一月十六中夜入滅命門人黃公庭堅主後事茶毗日鄰峰為秉炬火不續黃顧師之得法上首新禪師曰此老師有待於吾兄也新以喪拒黃強之新執炬召衆曰不是餘殃纍及我彌天罪過不容誅而今兩腳捎空去不作牛兮便作驢以火炬打一圓相曰只向這裏雪屈擲炬應手而爇壽七十有六臘五十有五窆于普覺塔之東賜號寶覺筠州黃檗真覺惟勝禪師梓之中江人族羅氏居講聚時偶以扇勒窗櫺有聲忽憶教中道十方俱擊鼓十處一時聞因大悟白本講講令參問徑往黃檗值上堂踞座曰鐘樓上念讚床腳下種菜若人道得分半院與伊師出答曰猛虎當路坐檗大悅徐以法席付之諸方宗仰其示衆機語見續燈隆興府泐潭洪英禪師邵武人也族陳氏幼頴邁一目五行及長棄儒得度訪道曹山依雅禪師久之辭登雲居眷其勝絶殆終于此山因閲華嚴十明論乃證宗要即詣黃檗檗與語達旦曰荷擔大法盡在爾躬厚自愛所至議論奪席晚遊西山與勝首座棲雙嶺熙寧改元分座廬山圓通學者歸之二年冬開法石門久之遷泐潭開堂日問答罷乃曰問也無窮答也無盡問答去來於道轉遠何故況為此事直饒棒頭薦得不是丈夫喝下承當未為達士那堪更向言中取則句裏馳求語路尖新機鋒捷疾如斯見解盡是埋沒宗旨玷污先賢於吾祖道何曾夢見只如我佛如來臨般涅槃乃云吾有正法眼藏涅槃妙心付囑摩訶大迦葉迦葉遂付阿難暨商那和修毱多大士諸祖相繼至於達磨西來直指人心見性成佛不立文字語言豈不是先聖方便之道自是當人不信却自迷頭認影奔逐狂途致使竛竮流浪生死諸禪德若能一念回光返照到自己腳跟下褫剝究竟將來可謂洞門豁開樓閣重重十方普現海會齊影便乃凡聖賢愚山河大地以海印三昧一印印定更無纖毫透漏山僧如是舉唱若是衆中有本色衲僧聞之實謂掩耳而歸笑破他口大衆且道本色衲僧門下一句作麼生道良久曰天際雪埋千尺石洞門凍折數株松上堂釋迦老子當時一手指天一手指地云天上天下唯我獨尊釋迦老子旁若無人當時若遇箇明眼衲僧直教他上天無路入地無門然雖如是也須是銅鈔鑼裏滿盛油始得問逢場作戲時如何曰紅爐拋出鐵烏龜云當軒布鼓師親擊百尺竿頭事若何云山僧不作這活計三年六月知事紛爭止之不已初九日謂衆曰領衆不肅正坐無德吾有愧於黃龍令集衆敘行腳始末復曰吾滅後火化以骨歸普同塔明生死不離清衆也語終而逝壽五十有九夏四十有三蘄州開元子琦禪師泉之惠安人族許氏九歲依開元智訥二十二試經剃染具戒精楞嚴圓覺棄謁翠巖真禪師問佛法大意真唾地曰這一滴落在甚麼處師捫膺曰學人今日脾疼真解顏辭參積翠歲餘盡得其道乘間侍南商確古今適大雪南指曰斯可以一致苕帚否對曰不能然則天霽日出雲物解駮豈復有哉知有底人於一切言句如破竹雖百節當迎刃而解詎容聲於擬議乎一日南遣僧逆問老和尚三關語如何師厲聲曰你理會久遠時事作麼南聞益奇之於是名著叢席南歿四祖演禪師命分座室中垂語曰一人有口道不得姓字為誰傳至東林總禪師總歎曰琦首座如鐵山萬仞卒難逗他語脈未幾以開元為禪林請師為第一世機語未見湖州報本慧元禪師上堂僧問諸佛所説法種種皆方便是否曰是云為甚麼諸法寂滅相不可以言宣曰且莫錯會僧以坐具一畫師喝曰諸法寂滅相不可以言宣今之學者方見道不可以言宣便擬絶慮忘緣杜塞視聽如斯見解未有自在分諸人要會寂滅相麼出行不見一纖毫滿目白雲與青嶂潭州雲蓋守智禪師劒之龍津人族陳氏幼依劒浦林重院年二十三得度進具已至豫章大寧時法昌遇禪師韜藏西山師聞其飽參即之遇問曰汝何所來云大寧又問三門夜來倒汝知麼師愕云不知遇曰吳中石佛大有人不曾得見師惘然即展拜遇使謁翠巖真禪師雖久之無省且不舍寸陰及謁黃龍於積翠始盡所疑留五年復謁英邵武於同安積翠歿首衆於石霜遂開法道吾徙雲蓋上堂曰昨日高山看釣魚步行騎馬失却驢有人拾得駱駝去重賞千金一也無若向這裏薦得不著還草鞋錢上堂緊帩履水靴踏破湖湘月手把鐵蒺䔧打碎龍虎穴翻身倒上樹始見無生滅却笑老瞿壘彈指超彌勒上堂唯一堅密身一切塵中現雲蓋今日千山茂鳥獸嘶鳴百草競發萬木抽枝盡是諸佛箇箇真如汝等諸人遊山玩水直須急著眼睛莫被伊瞞上堂舉趙州問僧向甚處去云摘茶去州曰間師曰道著不著何處摸索背後龍鱗面前驢腳翻身筋斗孤雲野鶴阿呵呵僧問鼓聲才罷大衆臨筵祖意西來請師舉唱曰雨過路頭乾云祖意既如是家風事若何曰腦後合掌云全因今日曰謝汝到來問有一無絃琴不是世間木今朝負上來請師彈一曲師拊膝一下僧云金風颯颯和清韻請師方便再垂音曰陝府出鐵牛元祐初退居西堂不出山三十年政和四年周公穜守潭遣長沙令佐以詭計邀至開福齋罷鳴鼓問其故曰請師住持此院遂不得辭時年九十矣五年三月七日升座説偈曰未出世口如驢觜出世後頭似馬杓百年終須自壞一任天下十度歸方丈安坐良久乃化闍維得設利五色經旬撥灰燼猶得之坐六十六夏隆興府泐潭真淨雲庵克文禪師陝之閿鄉人族鄭氏世多名卿師生而挺異讀書知要事後母失愛因遊方至復之北塔聞廣禪師説法泣而師之二十五試所習得度受具講演名著伊洛義學者宗之偶遊龍門至殿廡見入定比丘像幡然語其儔曰我所負者如吳道子畫人物雖妙盡一時然終非活者於是棄遊湘潭治平二年坐夏大溈聞舉僧問雲門佛法如水中月是否曰清波無透路釋然頴悟徑之積翠翠問從甚麼處來云溈山曰恰值老僧不在云未審向甚麼處去曰天台普請南嶽遊山云若然者學人亦得自在去也曰腳下鞋是何處得來云廬山七百錢唱得曰何曾自在來師指云何曾不自在來翠異之顧其機鋒莫觸唯英邵武與之階熙寧八年住筠之聖壽擢居洞山後謝事東遊至金陵王荊公以師禮迎之施第為寺命開山奏賜真淨號未幾還高安庵于九峰越六秋徙歸宗泐潭開堂日拈香祝聖問答罷乃曰問話且止只知問佛問法殊不知佛法來處且道從甚麼處來垂一足曰昔日黃龍親行此令十方諸佛無敢違者諸代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者無異即且置印在甚麼處還見麼若見非僧非俗無偏無黨一一分付若不見而我自收遂收足喝一喝曰兵隨印轉將逐符行佛手驢腳生緣老好痛與三十棒而今會中莫有不甘者麼若有不妨奇特若無新長老謾你諸人去也故我大覺世尊昔日於摩竭陀國十二月八日明星現時豁然悟道大地有情一時成佛今有釋子沙門某於東震旦國大宋筠陽城中六月十三日赫日現時又悟箇甚麼以拂子畫曰我不敢輕於汝等汝等皆當作佛上堂天地與我同根萬物與我一體腳頭腳尾橫三竪四北俱盧洲火發燒著帝釋眉毛東海龍王忍痛不禁轟一箇霹靂直得傾湫倒嶽雲黯長空十字街頭廖胡子醉中驚覺起來拊掌呵呵大笑云筠陽城中近來少賊乃拈拄杖曰賊賊上堂道泰不傳天子令行人盡唱太平歌五九四十五莫有人從懷州來麼若有不得忘却臨江軍豆豉上堂世尊拈華迦葉微笑拈拄杖曰洞山拈起拄杖子你諸人合作麼生擊香卓下座上堂裩無襠袴無口頭上青灰三五斗趙州老漢少賣弄然則國清才子貴家富小兒驕其奈禾黍不陽艷競栽桃李春翻令力耕者半作賣華人上堂佛法兩字直是難得人有底不信自己佛事唯憑少許古人影響相似般若所知境界定相法門動即背覺合塵黏將去脫不得或學者如印印泥𮞏相印授不唯自誤亦乃誤他洞山門下無佛法與人只有一口劒凡是來者一一斬斷使伊性命不存見聞俱泯却向父母未生前與伊相見見伊才向前便為斬斷然則剛刀雖利不斬無罪之人莫有無罪底麼也好與三十拄杖上堂今日供養羅漢夜來四方高人諷誦妙法蓮華經安樂行品一遍大衆作麼生是安樂行擬心早不安樂了也乃喝一喝曰豈不是安樂行如何是透法身句北斗裏藏身豈不是安樂行如何是祖師西來意庭前柏樹子豈不是安樂行如何是超佛越祖之談胡餅豈不是安樂行以至僧俗大衆一一清淨光明住持豈不是安樂行乃至一佛二菩薩一一羅漢一一辟支佛無不清淨實相住持所為安樂行也大衆唯有髻中寶珠不妄與之雖然不與亦人人具足十二時中光明炟赫阿誰欠少還會麼歸堂喫茶復喝一喝下座解夏上堂以拂子擊禪床曰天地造化有陰有陽有生有殺日月照臨有明有暗有隱有顯江河流注有高有下有壅有決明主治化有君有臣有禮有樂有賞有罰佛法住世有頓有漸有權有實有結有解結也四月十五日十方法界是聖是凡若草若木以拂子左邊敲曰從這裏一時結舉起曰總在拂子頭上還見麼遂喝曰解也七月十五日十方法界若草若木乃聖乃凡以拂子右邊敲曰從這裏一時解舉起曰總在拂子頭上還見麼遂喝曰只如四月十五日已前七月十五日已後且道是解是結復舉拂子曰總在拂子頭上還見麼遂喝曰諸高德此三喝中有一喝是金剛王寶劒有一喝是踞地師子有一喝是探竿影草若人一一辨得始見臨濟大師道出常情黃檗被掌大愚遭築雖相去三二百年許你親為的子然後大開不二妙門權諸祖道摧邪顯正扶宗立教整頓頽綱縱大知見耀大法眼不動本際決勝魔軍遂喝曰更須知有一喝不作一喝用到這裏須是具爍迦羅眼向未屙已前驀提得去諸高德且道提得箇甚麼良久喝一喝下座僧問新豐吟雲門曲舉世知音能和續大衆臨筵願清耳目師以右手拍禪床一下僧云木人拊掌石女揚眉師以左手拍禪床一下僧云猶是學人疑處師曰何不腳跟下薦取僧以坐具一拂師曰爭奈腳跟下何問遠遠馳符命禪師俯應機祖令當行也方便指羣迷曰深云深意如何曰淺云教學人如何領會曰點問馬祖下尊宿一箇箇阿轆轆地唯有歸宗老較些子黃龍下兒孫一箇箇硬剝剝地只有真淨老師較些子學人恁麼還扶得也無曰打疊面前搕𢶍却云若不同床睡焉知被底穿師不答僧云這箇為上上根人忽遇中下之流如何指接師亦不答僧云非但和尚懡㦬學人亦乃一場敗闕曰三十年後悟去在問承古有言衆生日用而不知未審不知箇甚麼曰道云忽然知後如何曰十萬八千僧提起坐具云爭奈這箇何師便喝崇寧改元休於雲庵十月旦示疾望乃愈出道具散諸徒翌日中夜沐浴更衣趺坐衆請説法師示以偈及遺誡宗門大略言卒而逝越七日火葬焰成五色白光上騰煙所及成設利道俗千餘人咸得之分靈骨塔于泐潭新豐壽七十有八隆興府上藍順禪師上堂曰夏日人人把扇搖冬來以炭滿爐燒若能於此全知曉塵劫無明當下消上堂舉勘婆話師乃曰趙州問路婆子答云恁麼去皆云勘破老婆婆子無你雪處同道者相共舉舒州三祖法宗禪師上堂曰架梯可以攀高雖升而不能達河漢鑄鍬可以掘鑿雖利而不到風輪其器者費功其謀者益妄不如歸家坐免使走塵壤大衆那箇是塵壤祖佛禪道僧問如何是正法眼曰泥裏有刺云如何是道曰老僧落第二云如何是禪曰你且莫少叢林南安軍雪峯道圓禪師南雄人也依積翠日宴坐下板時一僧論野狐話一云不昧因果也未脫得野狐身一云不落因果又何曾墮野狐來師聞之悚然因詣積翠庵涉澗猛省述偈曰不落不昧僧俗本無忌諱丈夫氣宇如玉爭受囊藏被蓋一條楖栗任縱橫野狐跳入金毛隊南見為助喜出住雪峰上堂舉風幡話師曰不是風兮不是幡白雲依舊覆青山年來老大渾無力偷得忙中些子間隆興府祐聖法𡨢禪師潮陽鄭氏子晚見黃龍深蒙印可上堂曰此事如醫家驗病方且雜毒滿腹未易攻治必瞑眩之藥而後可瘳就令徇意投之適足狂惑增其沈痼求其己病不亦左乎法堂前草深於心無愧崇寧三年十二月六日泊然坐逝南康軍清隱潛庵清源禪師豫章人族鄧氏依洪巖處信得度具戒參武泉常雲居舜泐潭月疑未決始趨黃龍一日聞舉洞山初和尚見雲門因緣遂失笑龍問胡為而笑云笑黃面浙子憐兒不覺醜自是容為侍者閲七年精徹奧妙叢林稱之初住西山次遷清隱上堂曰寒風激水成冰杲日照冰成水冰水本自無情各各應時而至世間萬物皆然不用強生擬議上堂先師初事棲賢諟泐潭澄歷二十年宗門奇奧經論玄要莫不貫穿及因雲峰指見慈明則一字無用遂設三關語以驗學者而禪者如葉公畫龍龍現即怖建炎三年八月五日示寂于撫之漳江壽九十八臘七十八廬山歸宗志芝庵主臨江人也壯為苾芻依黃龍於歸宗遂領深旨有偈曰未到應須到到了令人笑眉毛本無用無渠底波俏未幾龍引退芝陸沈千衆一日普請罷書曰茶芽蔍蔌初離焙笋角狼忙又吐泥山舍一年春事辦得間誰管板頭低由是衲子親之芝不懌結茅絶頂作偈曰千峰頂上一間屋老僧半間雲半間昨夜雲隨風雨去到頭不似老僧間有本小異竟終于此山楊歧方會禪師法嗣舒州白雲守端禪師衡陽人族葛氏續燈云周氏非幼事翰墨惡俗務冠依茶陵郁禪師披削往參雲蓋顒禪師顒歿楊歧繼焉歧見之與語終夕一日忽問受業師為誰云茶陵郁和尚曰吾聞伊過溪有省作偈甚奇能記否師誦云我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵歧笑而趨起師愕視不寐黎明咨詢之適歲暮歧曰汝見昨日打驅儺者麼云見曰汝一籌不及渠師復駭云意旨如何曰渠愛人笑汝怕人笑師大悟巾侍久之嘉祐四年辭遊廬阜圓通訥禪師一見自謂不及舉住承天聲名籍甚又遜居圓通次徙法華龍門興化海會所至衆如雲集開堂日問答已乃曰昔日靈山會上世尊拈華迦葉微笑世尊道吾有正法眼藏分付摩訶大迦葉次第流傳無令斷絶至于今日大衆若是正法眼藏釋迦老子自無分將箇甚麼分付將箇甚麼流傳何謂如此況諸人分上各各自有正法眼藏每日起來是是非非分南分北種種施為盡是正法眼藏之光影此眼開時乾坤大地日月星辰森羅萬象只在面前不見有毫釐之相此眼未開時盡在諸人眼睛裏今日已開者不在此限有未開者山僧不惜手為諸人開此法眼藏看舉手竪兩指曰看看若見得去事同一家若也未然山僧不免重説偈言諸人法眼藏千聖莫能當為君通一線光輝滿大唐須彌走入海六月降嚴霜法華雖恁道無句得商量大衆既是滿口道了為甚麼却無句得商量喝一喝曰分身兩處看上堂乾坤之內宇宙之間中有一寶祕在形山大衆眼在鼻上腳在肚下且道寶在甚麼處遂曰人面不知何處去桃華依舊笑春風上堂竪起拄杖曰鋒刃上𨁝跳橫按曰微塵裏走馬勞勞去復來箇是惺惺者擲拄杖下座上堂不曾迷莫求悟為甚麼從上來却有師承祖嗣若也會得入鄉隨俗若也不會餓死首陽山然雖如是入水見長人上堂今日至節一陽生於此日拈起拄杖召大衆曰且道這箇作麼生若也見得且恁麼應時納祐若數至大年朝前頭大有雪在所以承天尋常十度發言九度休何謂如此當門不用栽荊棘後代兒孫惹著衣然雖如是三十年後太公釣魚參上堂古者道將此深心奉塵剎是則名為報佛恩圓通即不然時挑野菜和根煮旋斫生柴帶葉燒上堂江月照松風吹到這裏還有漏網者麼良久曰皇天無親上堂釋迦老子有四洪誓願云衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成法華亦有四洪誓願飢來要喫飯寒到即添衣困時伸腳睡熱處愛風吹上堂日消萬兩黃金法華門下不著直饒不直半分錢正入得法華門未升得法華堂未入得法華室且道甚麼人升得法華堂入得法華室乃曰眼有三角頭峭五嶽上堂今日也是這箇明日也是這箇作麼生是那箇漆桶參堂去淨空居士郭功甫訪師上堂夜來枕上作得箇山頌謝功甫大儒直要與天下有鼻孔衲僧脫却著肉汗衫莫言不道遂曰上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也上堂古人留下一言半句未透時撞著鐵壁相似忽然一日覷得透後方知自己自是鐵壁如今作麼生透復曰鐵壁鐵壁僧問如何是佛曰鑊湯無冷處云如何是佛法大意曰水底按葫蘆云如何是祖師西來意曰烏飛兔走問不求諸聖不重己靈未是衲僧分上事如何是衲僧分上事曰死水不藏龍云便恁麼去時如何曰賺殺你熙寧五年遷化壽四十八建康府保寧仁勇禪師四明人族竺氏容止淵秀齠為大僧通台教俄黲服依雪竇明覺顯禪師顯意其可任一日誚之師憤悱即往依泐潭踰紀疑情未泮聞楊歧移雲蓋能鈐鍵學者直造丈室一語未及頓明心印出住保寧餘二十年大揚祖道上堂曰塵塵爾剎剎爾山是山水是水彌勒不入樓閣善財不須彈指以手一畫曰微塵世界冰消瓦解且道彌勒善財在甚麼處若向這裏參徹去不妨在處稱尊若也不見客路如天遠侯門似海深上堂立春日打春牛一棒兩棒千頭萬頭雪華深處辨不得頂門有眼空悠悠拍手曰囉囉哩惱亂春風卒未休上堂秋風涼松韻長未歸客思故鄉且道誰是未歸客何處是故鄉良久曰長連床上有粥有飯上堂舉三聖云我逢人即出出則不為人興化道我逢人即不出出則便為人師曰此二尊宿恁麼為人猶在半途保寧今日路見不平拈拄杖下座大衆一時走散擲下歸方丈上堂天上無彌勒地下無彌勒打破太虗空如何尋不得垂下一足曰大衆向甚麼處去也上堂祖師門下絶人行深嶮過千萬仞坑垂手不能空費力任他堂上緑苔生上堂若説佛法供養大衆未免眉鬚墮落若説世法供養大衆入地獄如箭射去此二途且道保寧今日異説甚麼三寸舌頭無用處一雙空手不成拳上堂齧鏃之機猶是鈍當鋒點的未為親那吒十面十眸動無相靈光翳日輪咄上堂拈起拄杖曰宮商角徵羽金木水火土卓一下曰卦上吉凶分三日後看取上堂看看山僧人舌地獄去也以手拽舌曰阿㖿㖿上堂古人底今人用今人底古人為古今無背面今古幾人知㖿嗚咿一九與二九相逢不出手上堂以兩手畫一圓相擘開捺膝曰渾崙擘不破三人共兩箇滋味信全無有誰吞得過吞得過且恁麼吞不過莫亂做上堂有手腳無背面明眼人看不見天左旋地右轉拍膝曰西風一陳來落葉兩三片上堂風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成羣四箇作隊窈窈窕窕飄飄颻颻向南北東西折得梨華李華一佩兩佩再受保寧請上堂拍手三下指口搖手三下便下座上堂智不到處切忌道著道著則頭角生大衆頭角生了也是牛是馬上堂無漏真淨云何是中更容他物喝曰好人不肯做須要屎裏臥上堂恁麼來傾湫倒嶽恁麼去填溝塞壑總不恁麼錯錯上堂吞却乾坤大地開口何處出氣永嘉一宿曹溪至今猶未瞥地上堂十目視十手指一不成二不是會麼寒鷹未舉首俊已沖霄僧問昔年雲外人皆委今日當場略借看曰山僧愛嗔不愛喜云斬新日月特地乾坤曰恰似不相逢問如何是佛曰近火先焦云如何是道曰溺泥有刺云如何是道中人曰切忌踏著問靈山指月曹溪話月未委保寧門下如何曰嗄問先德道寒風凋敗葉猶喜故人歸未審誰是故人曰楊歧和尚遷化久矣云正當恁麼時更有甚麼人為知音曰無眼村翁暗點頭問如何是保寧境曰主山頭倒卓云如何是境中人曰鼻孔無半邊問如何是佛曰自屎不覺臭問蓮華未出水時如何曰半陰半陽云出水後如何曰七零八落翠巖可真禪師法嗣潭州大溈真如慕哲禪師臨川人族聞氏未總角禮建昌永安圓覺律師試所習得度剛簡有識以荷法為志翠巖處衆曰師得與從遊幾二十載雖羣居常尊以師禮岩謂人曰三十年後哲子必大作佛事岩歿塔于西山師心喪三年去依黃檗遊湘中時謝公師直守潭慕其名以嶽麓禮迎之纍日方就遷慧光大溈紹聖改元奉驛召引對延和殿稱肯錫紫服真如號尋補大相國寺上堂曰古者道一釋迦二元和三佛陀自餘是甚麼碗脫丘慧光即不然一釋迦二元和三佛陀總是碗脫丘諸人還知慧光落處麼若也知去許你具鐵眼銅睛若也不知莫謂幾經風浪險扁舟曾向五湖遊上堂不用思而知不用慮而解廬陵米價高鎮州蘿蔔大上堂阿喇喇是甚麼翻思破竈墮杖子才擊著方知辜負我以拄杖擊香卓一下曰墮墮上堂十方同聚會箇箇學無為此是選佛場心空及第歸慧光門下直拔超升不歷科目諸人既到這裏風雲布地牙爪已成但欠雷聲燒尾如今為你諸人震忽雷去也以拄杖擊禪床下座僧問大通智勝佛十劫坐道場為甚麼不得成佛道曰苦殺人問牛頭未見四祖時如何曰寒毛卓竪云見後如何曰額頭汗出問如何是教外別傳一句曰翻譯不出師自分座至終室中唯問學者洗鉢盂話上人如何會僧擬對師即以手托曰歇去二年十月八日無疾説偈別衆良久示寂偈曰昨夜三更風雷忽作雲散長空前溪月落闍維設利大如豆斗許目睛齒爪不壞門弟子分塔于京潭蔣山覺海贊元禪師法嗣邵州丞熙應悅禪師撫之宜黃戴氏子上堂曰我宗無語句徒勞尋路布現成公案已多端那堪更涉他門戶覿面當機直下提何用波吒受辛若咄明州雪竇法雅禪師僧問舉人不問西來意乞師方便指迷情曰霹靂過頭猶瞌睡云謝師答話云再三啓口問何人云爭奈學人未禮拜何曰休鈍置定慧海印超信禪師法嗣平江府穹隆智圓禪師本郡人族沈氏未冠依能仁曇卿下髮習台教授譯梵棄謁甘露夫禪師及保寧真淨之室始發明後依海印一日汲水浣衣忽大悟與印咨答若符契留侍再閏遂首衆於和之開聖出住慶善移穹隆上堂曰三月晚春華正紅馨香惹得亂羣蜂只知妄計競頭採不覺從前造化空上堂福臻不説禪無事日高眠有問祖師意連擉兩三拳大衆且道為甚麼如此不合惱亂山僧睡師性真率雖僕夫亦與偶坐室中唯蒲團紙帳而已有求示衆語者師答曰汝覓上堂語我今重為舉莫向句中求箇裏全不許圓悟禪師行化至蘇城詣山炷香拜之宣和甲辰五月中浣語門人曰吾翊且行矣漏盡沐浴端坐而終茶毗設利五色無數合遺骨建窣堵波於西北隅壽六十九臘五十二音釋𡨢音居塢音塢肓音荒參音森兕徐姊切窆保驗切褫音耻駮布角切舍與捨同穜音同陝音閃閿音文本作閺瘳音抽廖音溜徇辭閏切俏音峭蔍音鹿蔌音速驅音區儺音那誚才笑切窈音杳窕音掉擉初朔切
