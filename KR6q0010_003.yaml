body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十一世臨濟七世南源慈明楚圓禪師法嗣隆興府黃龍普覺慧南禪師信之玉山人族章氏童齠深沈年十一去家師事定水智鑾嘗侍鑾行次見祠廟輒杖擊而往十九落髮受具遠遊至廬山依歸宗寶棲賢諟逾三秋渡淮謁三角澄久之分座雲峰悅禪師勉趨石霜至中道聞石霜不事事因寓福嚴時賢禪師命典記室賢歸寂適慈明繼席師出迎之悚然及聞其説法乃貶剝諸方盡為邪解皆師歷參所契證者遂幡然曰大丈夫心膂之間豈可自為疑礙造室求發藥明揖坐師固辭哀懇明曰書記參雲門禪必善其旨如放洞山三頓棒是合喫不合喫云合喫曰吾始疑不堪汝師今乃可使拜之復曰洞山三頓棒即且置那裏是趙州勘破婆子處師擬對明擊其口師大悟述偈呈之留月餘辭去時年三十五初住同安次擢歸宗黃檗黃龍得大法者七十有九人然在積翠庵所接者多衲子趨風相與交武竭蹙于道初受請日三角遣僧來審師提唱之語有曰智海無性因覺妄而成凡覺妄元虗即凡心而見佛便爾休去將謂同安無折合隨汝顛倒所欲南斗七北斗八僧歸舉似澄澄不懌俄聞開堂為慈明嗣澄誓之而三角徒侶棄去者過半上堂問答罷乃曰未登此座一事全無才登此座便有許多問答敢問大衆只如一問一答還當宗乘也無若言當去一大藏教豈無問答為甚道教外別傳傳上根輩若言不當適來許多問答圖箇甚麼行腳人當自開眼勿使後悔若論此事非神通修證之能到非多聞智慧之所談三世諸佛只言自知一大藏教詮注不及是故靈山百千萬衆獨許迦葉親聞黃梅七百高僧衣鉢分付行者豈是汝等貪淫愚執勝負為能夫出家者須稟丈夫決烈之志截斷兩頭歸家穩坐然後大開門戶運出自己家財接待往來賑濟孤露方有少分報佛深恩若不然者無有是處以拂子擇禪床一下遂布謝云云上堂説妙談玄乃大平之姦賊行棒行喝為亂世之英雄英雄姦賊棒喝玄妙皆為剩物黃檗門下總用不著且道黃檗門下尋常用箇甚麼喝一喝上堂時人住處我不住時人行處我不行於此了然明的旨須會全身入火坑以拂子畫一畫云臭煙熢㶿紅焰熾然眼未明者總在裏許從上古聖無非入生死坑中向無明火裏提有情汝等諸人且如何入若人入得可謂在火不燒在水不溺若入不得非但不能自利亦乃不能利他既不能自利利他圓頂方袍殊無利益良久召大衆衆舉首師曰牛頭出馬頭回上堂衆集久之師曰嘉魚在深處幽鳥立多時便下座上堂撞鐘鐘鳴擊鼓鼓響大衆殷勤問訊同安端然合掌這箇是世法那箇是佛法咄上堂有一人朝看華嚴暮觀般若晝夜精勤無有暫瑕有一人不參禪不論議拖箇破席日裏睡於此二人同到黃龍一人有為一人無為安下那一箇即是良久曰功德天黑暗女有智主人二俱不受上堂心王不妄動六國一時通罷拈三尺劒休弄一張弓擊禪床下座上堂大覺世尊道我今為汝保任此事終不虗也汝等當勤精進行此三昧師曰精進即不無諸人作麼生是三昧遂曰迦葉糞掃衣價直百千萬輪王髻中寶不直半文錢以拂子一擊下座僧問一不去二不住請師道曰高祖殿前樊噲怒云恁麼則今日得遇和尚也曰仰面看天不見天問德山棒臨濟喝直至如今少人拈掇請師拈掇曰千鈞之弩不為鼷鼠而發機云作宗師今朝有在師便喝僧禮拜師曰五湖衲子一錫禪人未到同安不妨疑著問舊歲已去新歲到來不涉二途乞師指示曰東方甲乙木問如何是黃龍境曰昨日方到此未曾子細看云如何是境中人曰長者長短者短師燕坐次有僧侍立師顧視久之曰百千三昧無量妙門作一句説與汝汝還信否云和尚誠言安敢不信師指其左曰過這邊來僧將趨師喝曰隨聲逐色有甚了期出去一僧聞之師趨入師復理前語問之亦云安敢不信師又指左曰過這邊來僧堅立不往師喝曰汝來親近我反不聽我語出去室中舉手問僧我手何似佛手垂足曰我腳何似驢腳人人盡有生緣上座生緣在何處學者莫有契其旨叢林目之為黃龍三關脫有酬者師未嘗可否人莫涯其意有問其故師曰已過關者掉臂徑去安知有關吏從吏問可否此未透關者也熙寧二年三月十六日上堂辭衆説偈語見續燈至十七日飯四祖慧日兩專使已趺坐寢室前大衆環擁良久而化七日闍維得五色設利塔千山之前嶂閲世六十八坐五十夏大觀四年春諡曰普覺袁州楊岐方會禪師郡之宜春人續燈曰衡陽非族冷氏少警敏及冠不事筆硯繫名征商課最坐不職乃宵遁入九峰恍若舊遊眷不忍去遂落髮續燈曰依九峰勤禪師或道吾和尚每閲經心融神會能折節扣參老宿慈明自南源徙道吾石霜師皆佐之總院事依之雖久然未有省發每咨參明曰庫司事繁且去他日又問明語如前或謂曰監寺異時兒孫遍天下去何用忙為有一老嫗近寺而居人莫之測所謂慈明婆也明乘間必至彼一日雨作知明將往師偵之小徑既見遂搊住云這老漢今日須與我説不説打你去明曰監寺知是般事便休語未卒師大悟即於泥途拜之起問狹路相逢時如何明曰你且嚲避我要去那裏去師歸來日具威儀詣方丈禮謝明呵曰未在一日當參粥罷久之不聞撾鼓師問行者今日當參何不擊鼓云和尚出未歸師徑往婆處見明執㸑婆煮粥師曰和尚今日當參大衆久待何以不歸明曰你下得一轉語即歸下不得各自東西師以笠子蓋頭上行數步明大喜遂與同歸自是明每山行師輒瞰其出雖晚必擊鼓集衆明遽還怒曰少叢林暮而升座何從得此規繩師云汾陽晚參也何謂非規繩乎今叢林三八念誦罷猶參者此其原也又一日明升堂師出問云幽鳥語喃喃辭雲入峰亂時如何曰我行荒草裏汝又入深村云官不容針更借一問明便喝師云好喝明又喝師亦喝明連喝兩喝師禮拜明曰此事是箇人方能擔荷師拂袖便行明移興化師辭歸九峯陸沈金穀而萍賓道俗迎居楊岐次遷雲蓋受請語見續燈上堂曰霧長空風生大野百草枯木作師子吼演説摩訶大般若三世諸佛在你諸人腳跟下轉大法輪若也會得功不浪施若也不會莫道楊岐山勢嶮前頭更有最高峰上堂景色乍晴物情舒泰舉步也千身彌勒動用也隨處釋迦文殊普賢總在這裏衆中有不受人謾底便道楊岐和麩糴麵然雖如是布袋裏盛錐子上堂有句無句如藤倚樹文殊維摩撒手歸去楊岐恁麼道也是看錮鏴更有後語不得錯舉上堂只箇心心心是佛十方世界最靈物釋迦老子説夢三世諸佛説夢且問諸人還曾作夢麼若也作夢向半夜裏道將一句來良久曰人間縱有真消息偷向楊岐説夢看參上堂薄福住楊岐年來氣力衰寒風凋敗葉猶喜故人歸囉唻哩拈上死柴頭且向無煙火上堂釋迦老子初生時周行七步目顧四方一手指天一手指地今時衲僧盡皆打模畫樣便道天上天下唯我獨尊雲蓋不惜性命亦為諸人打箇樣子遂曰陽氣發時無硬地晚參示衆一切智通無障礙拈起拄杖曰向汝諸人面前逞神通去也擲下曰直得乾坤震裂山嶽搖動會麼不見道一切智智清淨拍禪床曰三十年後莫道楊岐龍頭蛇尾僧問撥雲見日時如何曰東方來者東方坐問師唱誰家曲宗風嗣阿誰曰隔江打鼓不聞聲云興化的子臨濟親孫曰今日因齊慶贊問如何是祖師西來意曰簷頭不負書問少林面壁意旨如何曰西天人不會唐言問天得一以清地得一以寧衲僧得一堪作甚麼曰鉢盂口向天室中問僧栗棘蓬你作麼生吞金剛圈你作麼生跳一日三暫到相看師問三人同行必有一智提起坐具曰參頭上座喚這箇作甚麼云坐具曰真箇那云是師復曰喚作甚麼云坐具師顧視左右曰參頭却具眼問第二人欲行千里一步為初如何是最初一句云到和尚這裏爭敢出手師以手劃一劃僧云了師展兩手僧擬議師曰了問第三人近離甚處云南源曰楊岐今日被上座勘破且坐喫茶問僧雲深路僻高駕何來曰天無四壁曰踏破多少草鞋僧便喝師曰一喝兩喝後作麼生云看這老和尚著忙曰拄杖不在且坐喫茶問僧敗葉堆雲朝離何處云觀音曰觀音腳跟下一句作麼生道云適來相見了也曰相見底事作麼生僧無對師曰第二上座代參頭道看亦無對曰彼此相鈍置慈明忌辰設齋衆集師至真前以兩手揑拳安頭上以坐具一畫打一圓相便燒香退身三步作女人拜首座云休揑怪師曰首座作麼生云和尚休揑怪曰兔子喫牛嬭第二座近前打一圓相便燒香亦退身三步作女人拜師近前作聽勢座擬議師打一掌曰這漆桶也亂做興化孜禪師遷化孜嗣神鼎諲僧至下遺書師問世尊入滅槨示隻趺和尚歸真有何相示僧無語師槌胸一下曰蒼天蒼天皇祐改元示寂事迹未詳壽五十八隆興府大寧道寬禪師上堂拈拄杖曰前佛性命後佛紀綱總在這裏如今用去也為雲為雨為瑞為祥利人利天出生入死他方世界出沒卷舒若也通身是口説不能盡通身是眼照不能窮一念相應利那萬劫上堂從上來事非從佛得不向祖求丈夫稟性本自天真動止合儀去來無著如魚在水任性浮沈似鳥飛空俱無礙如斯説話誰是知音良久曰一氣不言含有象萬靈何處謝無私僧問既是一真法界為甚麼却有千差萬別曰根深葉茂云未審還出得這箇也無曰弄巧成拙問作止任滅教中四病後學之流如何趣向曰巧匠運斤斧斫木不抨繩問丹霞燒木佛院主為甚麼眉鬚墮落曰賊不打貧兒家問飲光尊者見世尊拈花因甚麼微笑曰忍俊不禁有僧造師之室問如何是露地白牛師以火筯插火爐中曰會麼云不會曰頭不欠尾不剩師在同安日時有僧問既是同安為甚麼却有病僧化去曰布施不如還却債隆興府翠岩可真禪師未詳旅里以遍參自負叢林號為真點胸後至慈明明見乃問如何是佛法大意云無雲生嶺上有月落波心明叱曰頭白齒黃猶作這箇見解師悚然求指示明曰汝問我師理前語問之明震聲曰無雲生嶺上有月落波心乃於言下大法頓明住翠岩時推為天下法窟上堂曰不見一法是大過患山河大地日月星辰色空明暗不是一法拈起拄杖曰凡夫見拄杖喚作拄杖聲聞人見拄杖認得頑空撥無拄杖菩薩人見拄杖幾曾挂牙齒飢來喫飯困來打睡寒來向火熱則取涼不見道一切智智清淨恁麼説話笑破土地鼻孔上堂捫空無迹追響無聞釋迦達磨貶向他方文殊普賢權為小使汝等諸人向甚麼處安身立命所以道也有權也有實也有明也有暗也有照也有用也有賓也有主放過一著何不道取乃喝一喝卓拄杖一下下座上堂舉僧問巴陵如何是道巴陵云明眼人落井又問寶應如何是道寶應云五鳳樓前又問首山如何是道首山云腳下泥深三尺此三轉語一句壁立千仞一句陸地行船一句賓主交參諸人莫有揀得者麼出來道看如無且行羅漢慈破結賊故行菩薩慈安衆生故行如來慈得如相故上堂聲不雜聲色不雜色何哉鐘聲無鼓響鼓聲無鐘響拈起拄杖云這箇豈不是色聲在甚麼處聲不到耳色何從眼眼色耳音聲萬法自成辨夜來觀音勢至菩薩二人論功到翠巖所輒與他一判三十年後依而行之上堂舉龍牙頌云學道如鑽火逢煙未肯休直待金星現歸家始到頭神鼎云學道如鑽火逢煙即便休莫待金星現燒腳又燒頭師曰若論頓也龍牙正在半途若論漸也神鼎猶少悟在於此復且如何諸仁者今年多落葉幾處掃歸家上堂上不在天下不在地中不在人拈起拄杖曰如今在翠巖手中作無邊身菩薩諸人還見麼若見果不見如來頂相若不見今日當巡寮問訊僧問如何是學人著力句曰千日斫柴一日燒云如何是學人親切處曰渾家送上渡頭船問如何是道曰出門便見云如何是道中人曰擔枷過狀問如何是祖師西來意曰深耕淺種問如何是佛法大意曰五通賢聖云學人不會曰舌至梵天問如何是學人轉身處曰一堵墻百堵調室中問僧魯祖當日見僧來參何故便面壁衆下語不契師作偈曰坐斷千山與萬山勸人除却是非難池陽近日無消息果中當年不目觀餘語具續燈治平改元師將入滅示疾甚勞苦席藁于地轉側不少休哲侍者垂泣曰平生呵佛罵祖今何為乃爾師熟視呵曰汝亦作此見解耶即起趺坐呼侍者燒香煙起遂示寂潭州道吾真禪師上堂曰拗折稱衡將甚麼定丘兩拈却鉢盂匙筯將甚麼喫粥喫飯不如向三家村裏東卜西卜忽然卜著脫却鼻孔上堂師子兒哮吼龍馬駒𨁝跳古佛鏡中明三山孤月皎遂作舞下座上堂若據祖令到這裏盡須茫然放老僧一線且向眉毛裏東西上堂普化明打暗打布袋橫撒竪撒石室行者踏碓因甚忘却下腳上堂古今日月依舊山河若明得去十方薄伽梵一路涅槃門若明不得謗斯經故獲罪如是上堂舉洞山道五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇胡猻夜簸錢老僧即不然三面狸奴腳踏月兩頭白牯手拏煙戴冠碧兔立庭柏脫殼烏龜飛上天老僧葛藤盡被汝諸人破了也洞山老人甚是奇特雖然如是只行得三步四步且不過七跳八跳且道殽訛在甚麼處老僧今日不惜眉毛一時布施良久曰叮嚀損君德無言真有功任從滄海變終不為君通僧問凝然便會時如何曰老鼠尾上帶研槌問如何是真如體曰夜叉屈膝眼睛黑云如何是真如用曰金剛杵打鐵山摧問如何是常照曰針鋒上須彌云如何是寂照曰眉毛裏海水云如何是本來照曰草鞋裏𨁝跳僧退師曰寂照常照本來照草鞋底下常𨁝跳更會針鋒上須彌眉毛中水常渺渺隆興府景德惟政禪師後住百丈上堂曰打動法鼓微塵諸佛列在面前未審諸人還見也未若道見眼裏生華若道不見眸中有翳離此二途道將一句來若也擬議商量咄這障蔽魔王上堂岩頭和尚用三文錢索得箇妻只解撈蝦摝蜆要且不解生男育女直至如今門風斷絶大衆要識奯公妻麼景德今日不惜唇吻與你諸人注破蓬鬢荊叉世所希布裙猶是嫁時衣上堂天台普請人人知有南嶽遊山又作麼生會則燈籠笑你不會則有眼如盲僧問牛頭未見四祖時為甚麼百鳥銜華獻曰有錢千里通云見後為甚麼不銜華曰無錢隔壁聾問達磨未來時如何曰六六三十六云來後如何曰九九八十一問如何是祖師西來意曰木耳樹頭生問一切法是佛法意旨如何曰一重山下一重人問以然如然時如何曰枯木不逢春云以然不然時如何曰穿靴水上行問如何是不來相而來曰雲生嶺上云如何是不見相而見曰水出高源問上行下斆未是作家背楚投吳方為達士豈不是和尚語曰是云父財子用也曰汝試用看僧擬議師便打大愚守芝禪師法嗣平江府瑞光月禪師僧問俱胝一指意旨如何曰月落三更穿市過龍華齊嶽禪師法嗣湖州西余師子淨端禪師或出洞庭月下本郡人也遺其氏始見弄師子發明心要往見龍華蒙印可遂旋里合綵為師子皮時被之因號端師子丞相章公慕其道躬請開法吳山化風盛播受請日問答已乃曰彌勒真彌勒分身千百億時時示時人時人自不識衆中還有識得底麼出來通箇消息若無為蛇畫足去也大衆為甚麼不識只為太近衆生久流轉生死蓋為日用而不知未登真覺常處夢鄉古人道昨夜得箇夢夢見一團空今朝擬説夢舉頭又見空山僧亦得一夢與古人不同夜來夢見土地向山僧道來日野翁先生諸人入山請和尚住持壽聖禪剎況和尚平生不曾行腳焉可住持山僧却向土地道禪得之在心何勞廣走若是真師子兒生下便能哮吼土地却問如何是真師子兒豈不見永嘉道師子兒衆隨後三歲便能大哮吼若是野干逐法王百年妖怪虗開口也大奇也大奇讀書山上師子兒數年長臥深林裏今朝徐步出巖扉露牙爪展毛衣雙睛晃晃迸光輝碧眼胡僧猶不識土地山精焉得知夢中被山僧拄杖子打一下忽然不見大衆不須久立伏惟珍重開堂日僧官宣疏至推倒回頭躍翻不托七軸之蓮經未誦一聲之漁父先聞師止之遂登座拈香祝聖罷引聲吟曰本是瀟湘一釣客自西自東自南北大衆雜然稱善師顧笑曰諦觀法王法法王法如是便下座上堂二月二禪翁有何謂春風觸目百華開公子王孫日日醺醺醉唯有殿前陳朝檜不入時人意禪家流只這是莫思慮坦然齋後一甌茶長連床上伸腳睡咄到華亭衆請上堂靈山師子雲間哮吼佛法無可商量不如打箇筋斗便下座僧問羚羊未挂角時如何曰怕云既是善知識因何却怕曰山僧不曾見恁麼差異畜生師病牙久不愈一日忽謂衆曰明日打筋斗去衆以為戲言書曰端師子太慵懶未死牙齒先壞爛二時伴衆赴堂粥飯都趕不辨如今得死是便宜長眠百事皆不管第一不著看官第二不著喫粥飯至五鼓果趨寂壽七十有二琅瑘廣照慧覺禪師法嗣紹興府薑山方禪師上堂曰穿雲不渡水渡水不穿雲乾坤把定不把定虗空放行不放行橫三竪四乍離乍合將長補短即不問汝諸人飯是米做一句要且難道良久曰私事不得官酬上堂不是道得道不得諸方盡把為奇特寒山燒火滿頭灰笑罵豐干這老賊僧問如何是一塵入正受曰蛇銜老鼠尾云如何是諸塵三昧起曰鱉咬釣魚竿云恁麼則東西不辨南北不分去也曰堂前一碗夜明燈簾外數莖青瘦竹問諸佛未出世時如何曰不識酒望子云出世後如何曰釣魚船上贈三椎問如何是不動尊曰單著布衫穿市過云學人未曉曰騎驢踏破洞庭波云透過三級浪專聽一聲雷曰伸手不見掌云還許學人進向也無曰踏地告虗空云雷門之下布鼓難鳴曰八華毬子上不用繡紅旗云三十年後此話大行師便打問蓮華未出水時如何曰穿針嫌眼小云出水後如何曰盡日展愁眉問奔流渡刃疾焰過風未審薑山門下還許借借也無曰天寒日短夜更長云錦帳繡鴛鴦行人難得見曰髑髏裏面氣衝天僧召云和尚師曰雞頭鳳尾云諸方泥裏洗薑山畫將來曰薑山今日為客且望闍梨善傳然雖如是不得放過便打福州白鹿顯端禪師僧問如何是無相佛曰灘頭石師子云意旨如何曰有心江上住不怕浪淘沙問凝然湛寂時如何曰不是闍梨安身立命處云如何是學人安身立命處曰雲有出山勢水無投澗聲寧國府興教坦禪師永嘉牛氏子業打銀因淬礪瓶器有省即出家披削謁廣照於琅瑘機語頓契後依天衣懷禪師懷時住興教擢為第一座懷受他請乃聞府乞師繼之受請日有雪竇化土省宗出問諸佛未出世人人鼻孔遼天出世後為甚麼杳無消息曰雞足山中鳳凜然云未在更道曰三十棒寄打雪竇僧禮拜師曰新興教今日失利便下座有本小異江州歸宗可宣禪師漢州人也壯為僧即出峽依廣照一語忽投羣疑頓息照可之未幾令分座淨空居士郭功甫過門問道與厚及師領歸宗時功甫任南昌尉俄郡守恚師不為禮捃甚遂作書寄功甫曰某世緣尚有六年奈州主抑逼當棄餘喘託生公願無見阻功甫閲書驚喜且頷之中夜其妻夢間見師入其寢失聲曰此不是和尚來處功甫撼而問之妻詳以告呼燈取書示之相笑不已遂孕及生乃名宣老期年記問如昔至三歲白雲端禪師抵其家始見之曰吾姪來也端云與和尚相別幾年宣倒指曰四年矣蓋與相別一年方死云甚處相別曰白蓮莊上云以何為驗曰爹爹媽媽明日請和尚齋忽聞推車聲端問門外是甚麼聲宣以手作推車勢端云過後如何曰平地兩條溝果年六周無疾而逝餘語未見所出嘉興府長水子講師郡之嘉興人也自落䰂誦楞嚴不輟從洪敏法師講至動靜二相了然不生有省謂敏曰敲空擊木一云擊竹尚落筌蹄舉目揚眉已成懷議去此言端方契斯旨敏拊而證之然欲探禪源罔知攸往聞琅瑘道重當世即趨其席值上堂次出問清淨本然云何忽生山河大地瑘憑陵答曰清淨本然云何忽生山河大地師領悟禮謝曰願侍巾瓶瑘謂曰汝宗不振久矣宜厲志扶持報佛恩德勿以殊宗為分也乃如教再拜以辭後住長水承稟日顧四衆曰道非言象得禪非擬議知會意通宗曾無別致由是二宗仰之嘗疏楞嚴等經盛行於世青原第十一世雲門五世天衣振宗義懷禪師法嗣東京慧林圓照宗本禪師常之無錫人也族管氏體貌厖碩所事淳厚年十九往姑蘇承天依永安道升禪師報舂炊不自疲厭遇升入室隨衆咨參升曰道者竭力如此有少勞乎師曰若捨一法不名滿足菩提實欲此生身證何勞之有升陰奇之越十年剃染受具又巾侍三載請辭遊方至池陽謁天衣於景德衣舉天親從彌勒內宮而下無著問云人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審説甚麼法天親云只是説這箇法如何是這箇法久而開悟一日室中問師即心即佛時如何云殺人放火有甚麼難於是名播寰宇漕使李公復圭命師開法瑞光法席日盛武林守陳公襄以承天興教二剎命師擇居蘇人擁道遮留又以淨慈堅請移文諭道俗曰借師三年為此植福不敢久占道俗始從元豐五年神宗皇帝下詔闢相國寺六十四院為八禪二律驛召師為慧林第一祖既至上遣使問勞閲三日傳宣就寺之三門為士民演法翌日召對延和殿賜坐師即盤足加趺擬仆上亟令近臣益以錦座二隻事見師行實及無為居士楊傑真贊神宗登遐命入福寧殿説法以老乞歸林下得旨任便雲遊州郡不得抑令住持擊鼓辭衆説偈曰本是無家客那堪任意遊順風加櫓棹船子下楊州既出都城王公貴人送者車騎相屬師臨別誨之曰歲月不可把玩老病不與人期唯勤修勿怠是真相為聞者莫不感涕晚居靈岩其嗣法傳道者百餘人上堂曰洪音一剖震動乾坤法令施行萬機頓削聖凡路絶佛祖情忘當此之時東西不辨南北不分從教千古萬古黑漫漫填溝塞壑無人會卓拄杖下座上堂嶮峻無過雞足峰行人到此路難通唯恐祖師門下客不移毫末到其中參上堂問也無妨答亦無咎何也得之不為先失之不為後若達此宗豈論空有千聖從來也只寧任他鳥兔爭頭走成住壞空彈指間得失是非唯一口咄上堂姑蘇臺畔不話春秋衲僧面前豈論玄妙只可著衣喫飯玩水看山夜見星晝見日兩手扶犂水過膝靈山授記只如斯歷劫何曾異今日上堂於一毫端現寶王剎坐微塵裏轉大法輪拈起拄杖曰這箇是塵作麼生説箇轉法輪底道理山僧今日不惜眉毛與汝諸人説破拈起也海水騰波須彌岌峇放下也四海晏清乾坤肅靜敢問諸人且道拈起即是放下即是當斷不斷兩重公案擊禪床下座上元日僧問千燈互照𮈔竹交音正恁麼時佛法在甚麼處曰謝布施云莫便是和尚為人處也無曰大似不齋來問上是天下是地未審中間是甚麼物曰山河大地云恁麼則謝師答話曰大地山河云和尚何得瞞人曰却是老僧罪過問如何是祖師西來意曰韓信臨朝云中下之流如何領會曰伏尸萬里云早知今日事悔不忌當初曰三皇冢上草離離問春風吹古樹殘日下前山如何是不遷義曰青山誰管你間事白日中自有人問師唱誰家曲宗風嗣阿誰曰調古神清風自高貌悴骨剛人不顧云恁麼則薦福的子雪竇親孫也曰想得未知落處問如何是露地白牛曰放出無尋處問適來消息從何而得曰合問知師久蘊囊中寶今日當場略借看曰何必如此元符二年十二月二十八日沐浴而臥門弟子環列請偈乞強起安坐以化道俗師熟視曰癡子我尋常尚懶作偈今日特地圖箇甚麼尋常要臥便臥不可今日特地坐也索筆大書曰後事付守榮擲筆憨睡而逝士庶獻最後供者彌月還然敕全身塔於寺之上方閲世八十坐夏五十二諡法空塔曰瑞光續燈曰坐亡其異迹見僧寶傳北京天鉢文慧重元禪師上堂曰若據宗乘正令莫不動用全威如聖輪王寶劒飛空誰是不賓之者是以王道平平和風扇物使羣貢獻萬里梯航六合澄清狼煙永息於是四魔絶迹九類亡機即且置作麼生是動用全威底道理驀拈拄杖橫按曰休休動不如靜靠拄杖下座上堂古今天地萬象森然歲歲秋收冬藏人人道我總會還端的也無直饒端的比他雞足峰前是甚麼間事良久曰今朝十月初旬天寒不得普請參僧問如何是禪曰入籠入檻僧拊掌師曰跳得出是好手僧擬議師曰了問學人上來請師舉唱曰善財別後誰相訪樓閣門開竟日間云恁麼則定光金地遙招手智者江陵暗點頭曰大衆喚覺言僧著問如何是觸目之機曰摩斯吒落水云謝師答話曰鼻孔不存問昨日雨今日晴於曹溪路上成得箇甚麼邊事曰昨日雨今日晴紹興府天章元善禪師上堂曰君問西來意馬師踏水潦若認一毛頭何曾知起倒劫火才洞然愚夫覓乾草寧知明眼人為君長懊惱僧問如何是最初句曰末後問將來云為甚麼如此曰先行不到云入水見長人也曰秦皇擊缶臨安府佛日智才禪師上堂曰諸禪德還知麼山僧生身父母一時喪了直是無依倚處以手捶𮌎曰蒼天蒼天復顧大衆良久曰你等諸人也是鐵打心肝便下座上堂舉柏樹子話師曰趙州庭柏説與禪客黑漆屏風松欏亮隔僧問如何是無為曰山前雪半消云請師方便曰水聲轉嗚咽無為軍佛足處祥禪師僧問大悲千手眼如何是正眼曰暗裏施文彩明中不見蹤云學人為甚麼不見曰杲日當空盲人摸地問如何是般若體曰琉璃殿裏隱寒燈云如何是般若用曰活卓卓地問一色無變異喚作露地白牛還端的也無曰頭角生也云頭角未生時如何曰不要犯人苗稼平江府明因慧贇禪師上堂拈拄杖橫按曰若恁麼去直得天無二日國無二王釋迦老子飲氣吞聲一大藏教如蟲蝕木設使鑽仰不及正是無孔鐵鎚假饒信手拈來也是殘羹餿飯一時吐却方有少分相應更乃墮在空亡依舊是鬼家活計要會麼雨後始知山色翠事難方顯丈夫心卓拄杖下座興化軍西臺其辨禪師上堂舉臨濟無位真人話師召大衆曰臨濟老漢尋常一條脊梁硬似鐵及乎到這裏大似日中迷路眼見空華直饒道無位真人是乾屎橛正是泥龜曳尾其僧只知季夏極熱不知仲冬嚴寒若據當時合著得甚麼語塞斷天下人舌頭西臺只恁麼休去又乃眼不見為淨不免出一隻手狼藉去也臨濟一擔西臺一堆一擔一堆分付阿誰從教撒向諸方去笑殺當年老古錐臨安府法雨慧源禪師僧問如何是最初一句曰梁王不識云如何是末後一句曰達磨渡江紹興府淨衆梵言首座示衆曰説法有所得斯則野干鳴説法無所得是名師子吼古德恁麼道大似掩耳偷鈴何故説有説無盡是野干鳴諸人要識師子吼麼咄報本有蘭禪師法嗣福州中際可遵禪師郡之梁氏子上堂曰八萬四千深法門門門有路超乾坤如何箇箇踏不著只為蜈蚣太多腳不唯多腳亦多口釘觜鐵舌徒增醜拈椎竪拂泥洗泥揚眉瞬目籠中雞要知佛祖不到處門掩落華春鳥啼上堂昨夜四更起來呵呵大笑不歇幸然好一覺睡霜鍾撞作兩橛上堂野外桃華爭爛熳亭前柏樹葉婆娑世人莫作尋常見多少英雄不奈何邢州開元法明上座依報本未久深得法忍後歸里事落魄多嗜酒呼盧每大醉唱柳詞數闋日以為常鄉民侮之召齋則拒召飲則從如是者十餘年咸指曰醉和尚一日謂寺衆曰吾明旦當行汝等無他往衆竊笑之翌晨攝衣就座大呼曰吾去矣聽吾一偈衆聞奔視明乃曰平生醉裏顛蹶醉裏却有分別今宵酒醒何處楊柳岸曉風殘月言訖寂然撼之已委蛻矣衆盡禮以葬之雲居曉舜禪師法嗣建康府蔣山佛慧法泉禪師世號泉萬卷者上堂曰古人恁麼南禪不恁麼古人不恁麼南禪却恁麼大衆還委悉麼王婆衫子短李四帽簷長聖節上堂拈拄杖擊法座一下曰以此功德祝延聖壽便下座上堂智人欲識南禪路門前有箇長松樹腳下分明不較多無奈行人恁麼去莫恁去急回顧樓臺煙鎖鐘鳴處雪下上堂召大衆曰還有過得此色者麼良久曰文殊笑普賢嗔眼裏無筋一世貧相逢盡道休官去林下何曾見一人上堂快人一言快馬一鞭若更眼睛定動未免紙裏麻纏腳下是地頭上是天不信但看八九月紛紛黃葉滿山川僧問白雲本無心為風出巖谷時如何曰晴作雨備問如何是祖師西來意曰髮長僧貌醜云未審意旨如何曰閉戶怕天寒問久雨不晴時如何曰白日無間人云未曉玄言乞師直指曰看看便是春問南禪結夏為甚麼却在蔣山解曰衆流逢海盡云恁麼則事同一家也曰夢裏到家鄉問蓮華未出水時如何曰西瞿耶尼云出水後如何曰泗州大聖問如何是衲僧行履處曰甲不開倉問二祖立雪齊腰意旨如何曰三年逢一閏云為甚麼付法傳衣曰村酒足人酤明州天童淡交禪師上堂曰也大奇也大差十箇指頭八箇罅由來多少分明不用鑽龜打瓦便下座僧問臨雲閣聳太白峰高到這裏如何進步曰但尋荒草際莫問白雲深云未審如何話會曰寒山逢拾得兩箇一時癡云向上宗乘又且如何舉唱曰前言不及後語廣因擇要禪師法嗣福州妙峰如璨禪師上堂曰今朝是如來降生之節天下緇流莫不以香湯灌沐共報洪恩為甚麼教中却道如來者無所從來既是無所從來不知降生底是誰試請道看若道得其恩自報若道不得明年四月八還是驀頭澆智海正覺本逸禪師法嗣福州大中海印德隆禪師上堂曰法無異法道無別道時時逢見釋迦處處撞著達磨放步即交肩開口即咬破不咬破大小大上堂夫欲智拔先須定動拈拄杖卓一下曰唵囌嚧㗭唎娑婆訶歸堂喫茶上堂觸境無滯底為甚麼擡頭不起田地穩密底為甚麼下腳不得譬如天王賜與華屋雖獲大宅要因門入門聻樊噲踏開真主出巨靈擡手錦鱗噴參上堂平旦寅曉何人處處彌陀佛家家觀世音月裏麒麟看北斗向陽子一邊青僧問夜半正明天曉不露如何是不露底事曰日落月未上云恁麼則五天唱不起漢地和難齊曰方人以己云鐵狗吠開巖上月泥牛觸破嶺頭雲曰元來猶在云可謂不落今時句如在白雲中曰崔崔嵬嵬霄漢半開云全因今日去也曰且喜闍梨瞥地問寒來暑往日居月諸心地未明乞師指示曰臂長衫袖短腳瘦草鞋寬云莫便是和尚為人處也無曰日午遊都市天明往華山青原第十一世洞山七世投子義青禪師法嗣東京天寧芙蓉道楷禪師沂之沂水人族崔氏自幼舉辟穀隱伊陽山後遊京師籍名術臺寺試法華得度具戒趨淮西謁投子於海會乃問佛祖言句如家常茶飯離此之外別有為人言句也無曰汝道寰中天子敕還假堯舜禹湯也無師欲進語青以拂子𢷾師口曰汝發意來早有三十棒也師即開悟再拜便行青曰且來闍梨師不顧青曰汝到不疑之地耶師以手掩耳後還沂上居馬鞍山元豐壬戌時年四十道俗迎處仙洞次遷招提龍門又徙大陽大洪皆一時名卿巨公為之勸請自是洞上之風大行西北崇寧三年詔住京師淨因大觀改元敕移天寧上堂曰喚作一句已是埋沒宗風曲為今時通途消耗所以借功明位用在體處借位明功體在用處若也體用雙明如門扇兩開不得向兩扇上著意不見新豐老子道峰巒秀異鶴不停機靈木迢然鳳無依倚直得功成不處電火難追擬議之間長途萬里上堂良久曰青山常運步石女夜生兒便下座上堂入道之徑內虗外靜如水澄凝萬象光映不沈不浮萬法自如所以道火不待日而熱風不待月而涼堅石處水天瞽猶光明暗自爾乾濕同方若能如是岩前枯木半夜開華木女擕籃清風月下石人舞袖共賀太平野老謳歌知音者和於斯明得何必重登塔廟再見文殊道在目前一時參取上堂假言唱道落在今時設使無舌人解語無腳人能行要且未能與那一人相應還會麼龍吟徒側耳虎嘯謾沈吟僧問如何是兼帶之語曰妙用全施該世界木人間步火中來云如何是和尚家風曰衆人皆見云未審見箇其麼曰東壁打西壁問如何是無縫塔曰白雲籠嶽頂終不露崔嵬二年春開封尹李公孝壽奏師道行卓冠叢林宜有褒顯即賜紫方袍號定照禪師內臣持敕命至師迎謝曰某辭父母出家時嘗陳重誓不為利名專誠學道用資九族苟渝願心當棄身命父母以此聽許今若不守本志竊寵光則佛法親盟背矣於是修表具辭復降旨京尹堅俾授之師確守不回以拒命坐罪奉旨下棘寺與從輕寺吏聞有司欲徙淄州有司曰有疾與免刑及吏問之師曰無疾吏云何有灸瘢耶曰昔者疾今日愈吏令思之曰已悉厚意但妄非所安乃恬然就刑而行從之者如歸市師以法語施之獲益尤衆靈源清禪師評曰夫楷公大士也其建志立行當素有根本豈悠悠者之所能知因贊其像曰惟唐正觀靈潤投歡匪移所守能適其安乃曰此行略有三益一酬往譴二順厭生三成大行今日淄州楷公亦云嚴天大雪始見松筠媚草天華亦成造化苟竊世榮實辜恩者師抵淄川僦居學者愈親明年冬敕令自便庵於芙蓉湖心道俗川湊僅數百人日食粥一杯故多引去政和七年冬賜額曰華嚴禪寺八年五月十四日索筆書偈付侍僧曰吾年七十六世緣今已足生不愛天堂死不怕地獄撒手橫身三界外騰騰任運何拘束移時乃逝隨州大洪第一世報恩禪師衛之黎陽人族劉氏而劉氏世皆碩儒師未冠舉方略擢上第後厭塵境請于朝乞謝簪紱為僧上從其請遂遊心祖道至投子未久即悟心要子曰汝再來人也宜自護持辭謁諸名宿皆蒙印可丞相韓公縝慕師道望請開法於西京之少林未幾大洪革律為禪神宗親灑宸翰改賜今額詔師居之上堂曰五五二十五案山雷主山雨明眼衲僧莫教錯舉上堂若向這裏説即心即佛大似頭上安頭若説非心非佛何異迷頭認影賞箇名安箇字定箇是立箇非向甚麼處見達磨祖師然雖如此放一線道別有商量諸仁者是復誰是非復誰非是非杳絶分明萬機會麼前是官不容針後是私通車馬於斯明得晝見日夜見星於斯不明有寒暑兮促君壽有鬼神兮妬君福上堂如斯話會誰是知音直饒向一句下千眼頓開端的有幾箇是迷逢達磨諸人要識達磨祖師麼乃舉手作揑勢曰達磨祖師鼻孔在少林手裏放開去也從教此土西天説黃道黑欺胡謾漢若不放過不消一揑有人要與祖師作主便請出來與少林相見還有麼良久曰果然問祖師西來九年面壁最後一句請師舉唱曰面黑眼睛白師嘗設百問以問學者其略曰假使百千劫所作業不忘為甚麼一稱南無佛罪滅河沙劫又作此相曰森羅萬像總在其中具眼禪人請試甄別師素與無盡居士張公商英友善無盡數以書問儒釋大要師隨問以答之無盡問曰清涼疏第三卷西域邪見不出四見此方儒道亦不出此四見如莊老計自然為因能生萬物即是邪因易曰太極生兩儀大極為因亦是邪因若謂一陰一陽之謂道能生萬物亦是邪因若計一為虗無則是無因今疑老子自然與西天外道自然不同何以言之老子曰常無欲以觀其妙常有欲以觀其徼無欲則常有徼則已入其道矣謂之邪因豈有説乎易曰一陰一陽之謂道陰陽不測之謂神神也者妙萬物而為言寂然不動感而遂通天下之故今乃破陰陽變易之道為邪因撥去不測之神豈有説乎望紙後批示以斷疑網故也師答曰西域外道宗多途要其會歸不出有無四見而已謂有見無見亦有亦無見非有非無見也蓋不即一心為道則道非我有故名外道不即諸法是心則法隨見異故名邪見如謂之有有則有無如謂之無無則無有有無則有見競生無有則無見斯起若亦有亦無見非有非無見亦猶是也夫不能離諸見則無以明自心無以明自心則不能知正道矣故經云言詞所説法小智妄分別不能了自心云何知正道又云有見即為垢此則未為見遠離於諸見如是乃見佛以此論之邪正異途正由見悟殊致故也故清涼以莊老計道法自然能生萬物易謂太極生兩儀一陰一陽之謂道以自然太極為因一陰一陽為道能生萬物則是邪因計一為虗無則是無因嘗試論之夫三界唯心萬緣一致心生故法生心滅故法滅推而廣之彌綸萬有而非有統而會之究竟寂滅而非無非無亦非非無非有亦非非有四執既亡百非斯遣則自然因緣皆為戲論虗無真實俱是假名矣至若謂太極陰陽能生萬物常無常有斯為衆妙之門陰陽不測是謂無方之神雖聖人設教示悟多方然既異一心寧非四見何以明之蓋虗無為道道則是無若自然若太極若一陰一陽為道道即是有常無常有則是亦無亦有陰陽不測則是非有非無先儒或謂妙萬物謂之神則非物物物則亦是無故西天諸大論師皆以心外有法為外道萬法唯心為正宗蓋以心為宗則諸見自亡言雖或異未足以為異也心外有法則諸見競生言雖或同未足以為同也雖然儒道聖人固非不知之乃存而不論耳良以未即明指一心為萬法之宗雖或言之猶不論也如西天外道皆大權菩薩示化之所施為橫生諸見曲盡異端以明佛法是為正道此其所以為聖人之道順逆皆宗非思議之所能知矣故古人有言緣昔真宗未至孔子且以繫心今知理有所歸不應猶執權教然知權之為權未必知權也知權之為實斯知權矣是亦周孔老莊設教立言之本意一大事因緣之所成始所成終也然則三教一心同途異轍究竟道宗本無言説非維摩大士孰能知此意也沂州洞山雲禪師上堂曰秋風卷地夜雨翻空可中別有清涼箇裏更無熱惱是誰活計到者方知才落見聞即居途路且道到家後如何任運獨行無伴侶不居正位不居偏長安福應文禪師上堂曰明明百草頭明明祖師意直下便承當錯認弓為矢惺惺底築著磕著懵懂底和泥合水龜毛拂這塞虗空兔角杖撑天拄地日射珊瑚林知心能幾幾以拂子擊禪床下座音釋願音願贇於倫切捷疾葉切楷口駭切齠音迢鑾盧丸切諟音是𤑫音蓬㶿滿沒切噲音快掇都括切鼷音奚囉音羅唻來皆切抨披耕切駒音俱𨁝音孛尿奴弔切奯音豁靴許戈切胝丁尼切晃戶廣切醺音熏羚音靈慵常容切淬取內切礪音厲捃居運切媽音馬䰂音采懊烏皓切欏音羅餿音搜罅虗詐切灌音貫囌音蘇嚧音盧㗭音悉唎音利聻尼止切音卑沂魚衣切瘢蒲官切磕克盍切縝之忍切懵母總切
