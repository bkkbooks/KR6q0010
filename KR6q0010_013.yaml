body:
  text: 平江府報恩光孝禪寺臣僧正受編青原第十四世洞山十世天童宏智正覺禪師法嗣慶元府雪竇聞庵嗣宗禪師徽城人族陳氏幼業經圓具冠依妙湛慧禪師詰問次釋然契悟慧以麈尾付之後謁宏智蒙印可其道愈尊出住普照徙善權翠巖遷雪竇上堂曰人人有箇鼻孔唯有善權無鼻孔為甚麼無二十年前被人掣落了也人人有兩箇眼睛唯有善權無眼睛為甚麼無被人木槵子換却了也人人有箇髑髏唯有善權無髑髏為甚麼無借人作屎杓了也召大眾曰鼻孔又無眼睛又無髑髏又無諸人還識善權麼若也不識是諸人埋沒善權其或未然更聽一頌㵎底泥牛金貼面山頭石女著真紅繫驢橛上生芝草不是雲靄香爐峰上堂空劫田地歷歷分明域外風光堂堂不隱憑祖父舊年書契付兒孫今日耕鋤箇中道種不枯直下靈苗秀實功中得妙自然活計興隆足下無私方信本無滲漏得力底須知來處飽參底切忌顢頇若能步步不迷即是吾家眷屬上堂翠巖不是不說只為無箇時節今朝快便難逢一句為君剖決露柱本是木頭秤鎚只是生鐵諸人若到諸方莫道山僧饒舌上堂少林坐庾嶺行書偈傳衣成戰爭庾嶺行少林坐得髓安心成話墮兩家公案未曾圓後代兒孫作殃禍這殃禍可煞大天下衲僧透不過僧問眼若不睡諸夢自除如何是不睡底眼曰論劫不曾開云為甚麼論劫不曾開曰不顧一切問如何是道曰雨多根脚爛日盛鬢毛焦云如何是道中人曰冰肌明似玉雪體瑩如珠問如何是大通智勝佛曰半夜紅輪耀大地森羅萬象一時明云如何是十劫坐道場曰大地紅塵起虗空不展顏云如何是佛法不現前曰陶潛醉石今猶在五柳陰中不變春問如何是常在底人曰石裏無星火拶著便光生云如何是不在底人曰翻身直透千峰外更不回頭望故關云未審此人如何親近曰白雲路斷無消息佛祖從來不得名問蓮華未出水時如何曰沒却儞鼻孔云出水後如何曰穿著儞眼睛問如何是返本還源事曰泥牛入土云如何是禪曰強詞奪正理云如何是正法眼曰烏豆二十三年十月朔示微恙初三與得法上足翠巖宗靜言別泊然而逝是月十三日塔全身於寺之西南隅常州善權法智禪師陝府人族栢氏壯於西京聖果寺祝髮習華嚴棄謁南陽謹次參洪峰智踰十年無所證後於宏智言下豁然出住善權次居金粟上堂曰明月高懸未照前雪眉人凭玉欄干夜深雨過風雷息客散雲樓酒椀乾上堂三界無法何處求心驚虵入草飛鳥出林雨過山堂秋夜靜市聲終不到孤岑隨州大洪法為禪師天台鮑氏子上堂曰法身無相不可以音聲求妙道忘言豈可以文字會縱使超佛越祖猶落堦梯直饒說妙談玄終挂唇齒須是功勳不犯影迹不留枯木寒岩更無津潤幻人木馬情識皆空方能垂手入鄽轉身異類不見道無漏國中留不住却來煙塢臥寒沙上堂舉香嚴上樹話乃曰緣𩯭紅裙窈窕娘百華園裏採蚕桑三三兩兩羞人見偷眼戲他年少郎真州長蘆琳禪師上堂拈拄杖曰其宗也離心意識其旨也超去來今離心意識故品萬類不見差殊超去來今故盡十方更無滲漏當頭不犯徹底無依悟向朕兆未生已前用在功勳不犯之處平常活計不用躊蹰擬議之間即沒交涉臨安府淨慈自得慧暉禪師會稽上虞人族張氏幼依澄照道凝年十二染削進具甫二十扣真歇於長蘆微有所證旋里謁宏智智舉當明中有暗不以暗相遇當暗中有明不以明相覩問之語不契初夜定回往聖僧前燒香而宏智適至師見之頓明前話次日入室智舉堪嗟去日顏如玉却嘆回時𩯭似霜詰之師曰其入離其出微自爾問答無滯智許為室中真子紹興丁巳待制仇公悆請開法補陀徙萬壽及吉祥雪竇淳熈三年勑補淨慈上堂曰朔風凜凜掃寒林葉落歸根露赤心萬派朝宗船到岸六窗虗映芥投針本成現莫他尋性地閑閑耀古今戶外凍消春色動四山渾作木龍吟上堂釋迦老子窮理盡性金口敷宣一代時教珠回玉轉被人喚作拭不淨故紙達磨祖師以一乘法直指單傳面壁九年不立文字被人喚作壁觀婆羅門且道作麼生行履免被傍人指注去衲帔蒙頭萬事休此時山僧都不會上堂舉風幡話師曰風幡動處著得箇眼即是上座風幡動處失却箇眼即是風幡其或未然不是風幡不是心衲僧徒自強錐針岩房雨過昏煙淨臥聽凉風生竹林七年秋退歸雪竇晦藏明覺塔十年仲冬二十九日中夜沐浴書偈而逝窆全身於中峰號雙塔世壽八十有七僧臘七十有五慶元府瑞岩石窻法恭禪師郡之奉化人族林氏於棲真院下髮受具往延慶講下一夕誦蓮經至父母所生眼悉見三千界時聞風刺椶櫚葉聲欻然有省棄依天童始明大事凡當世弘法者悉往咨決之出住能仁次補光孝瑞巖上堂曰春風楊柳眉春禽弄百舌一片祖師心兩處俱漏泄不動步還家習漏頓消滅時投玉線芒曉貫金針穴深固實幽遠無人孰辨別慚愧可憐生頭頭皆合轍不念阿彌陀南無乾屎橛無智癡人前第一不得說上堂頭祖纔始陞堂百丈卷席歸去不是拾得寒山有理也無雪處上堂見得徹用時親相逢盡是箇中人望空雨寶休誇富無地容錐未是貧踏著秤磓硬似鐵八兩元來是半斤上堂舉世尊生下一手指天一手指地云天上天下唯我獨尊師曰五天一隻蓬蒿箭攪動支那百萬兵不得雲門行正令幾乎錯認定盤星襄陽府石門清凉法真禪師劒門人也後住萬壽上堂曰柳色含煙春光逈秀一峰孤峻萬卉爭芳白雲淡泞已無心滿目青山元不動漁翁垂鈎一溪寒雪未曾消野渡無人萬古碧潭清似鏡賓中有主拄杖橫挑日月輪主中有賓踏破草鞋赤脚走直得賓主互顯殺活自由理事混融正偏不滯入荒田不揀信手拈來草且道如何委悉塵中雖有隱身術爭似全身入帝鄉慶元府光孝了堂思徹禪師上堂曰羊頭車子推明月沒底船兒載曉風一句頓超情量外道無南北與西東所以劫前消息非口耳之所傳格外真規豈思量之能解須知佛佛祖祖了無一法為人子子孫孫直下全身荷負既已萬機寢削自然一糝不留湛湛之波碧水冷涵於秋色靈靈之照霽天淨洗於冰輪宛轉旁參叶通兼帶夢手推開玉戶飜身撥動機輪正令纔行又見一陽萌動化功密運俄驚三世變遷雖則默爾無言爭奈熾然當說無遷無變今朝拈置一邊有故有新且道如何話會諸人還委悉麼羣陰消剝盡來日是雲長蘆真歇清了禪師法嗣真州長蘆妙覺慧悟禪師上堂曰盡大地是箇解脫門把手拽不肯入雪峰老漢抑逼人作麼既到這裏為甚麼鼻孔在別人手裏良久曰貪觀天上月失却手中橈僧問鴈過長空影沉寒水鴈無遺蹤之意水無沉影之心遠端的也無曰蘆華兩岸雪江水一天秋云便恁麼去時如何曰鴈過長空聻僧擬議師曰靈利衲子福州龜山義初禪師上堂曰久默斯要不務速說釋迦老子寐語作麼我今為汝保任斯事終不虗也大似壓良為賤既不恁麼畢竟如何白雲籠嶽頂翠色轉崔嵬建康府保寧興譽禪師上堂曰步入道場影涵宗鑑粲粲星羅霽夜英英華吐春時木人密運化機絲毫不爽石女全提空印文彩未彰且道不一不異無去無來合作麼生體悉的的縱橫皆妙用阿儂元不異中來真州北山法通禪師上堂曰吞盡三世底為甚麼開口不得照破四天下底為甚麼開眼不得作麼生得十成通暢去金針雙鏁備叶露隱全該僧問斷言語絕思惟處乞師指示曰滴水不入石慶元府天童宗珏禪師上堂曰劫前運步世外橫身妙契不可以意到真證不可以言傳直得虗靜斂氛白雲向寒巖而斷靈光破暗明月隨夜船而來正恁麼時作麼生履踐偏正不曾離本位縱橫那涉語因緣僧問如何是道曰十字街頭休斫額大洪慧照慶預禪師法嗣臨江軍慧力悟禪師上堂曰一切聲是佛聲簷前雨滴響冷冷一切色是佛色覿面相呈諱不得便恁麼若為明碧天雲外月華清福州雪峰慧深首座示眾曰未得入頭應切切入頭已得須教徹雖然得入本無無莫守無無無間歇照聞乃曰深兄說禪若此惜福緣不勝耳一日普說罷揮偈辭眾以筆一拍手竟不收而化天封子歸禪師法嗣江州東林通理禪師上堂曰峰頂駕鐵船三更日輪果心閑不自明落葉知誰掃等閑摘箇鄭州梨放手元是青州棗天衣法聰禪師法嗣平江府慧日法安禪師本郡人也僧問如何是和尚為人一句曰狗走抖擻口云意旨如何曰猴愁摟摗頭溫州護國欽禪師上堂曰有句無句明來暗去活捉生擒捷書露布如藤倚樹物以類聚海外人參川中附子樹倒藤枯切忌名模句歸何處囌嚧囌嚧呵呵大笑破鏡不照大地茫茫一任𨁝跳無為軍吉祥元實禪師高郵人也自到天衣蚤夜精勤而脇不席一日偶失笑喧眾衣擯之中夜宿田里覩星月粲然有省曉歸趨方丈衣見乃問洞山五位君臣如何話會云我這裏一位也無衣令參堂謂侍僧曰這漢却有箇見處奈不識宗旨何入室次衣預令行者五人分序而立師至俱召云實上座於是密契奧旨述偈曰一位纔彰五位分君臣叶處紫雲屯夜明簾卷無私照金殿重重顯至尊衣稱善後住吉祥道宣知藏久侍天衣無所契衣叱之宣忘寢食者月餘一夕聞巡臾鈴聲忽猛省曰住住一聲直透青霄路寒潭月皎有誰知泥牛觸折珊瑚樹衣聞命職堂司後住投子凡有所問以拂子作搖鈴勢南嶽第十五世臨濟十一世黃龍四世勝因戲魚咸青禪師法嗣漣水軍萬壽夢庵普信禪師後住蔣山上堂曰殘雪既消盡春風日漸多若將時節會佛法又如何且道時節因緣與佛法道理是同是別良久曰無影樹栽人不見開華結果自馨香上堂空生岩中宴坐諸天空裏雨華山僧高陞此座諸人如何領會若委悉得去八部不言而自會其或未然賣心求得又何榮平江府慧日默庵興道禪師上堂曰同雲欲雪未雲愛日似暉不暉寒雀啾啾閙籬落朔風冽冽舞簾帷要會韶陽親切句今朝覿面為提撒卓拄杖下座廣德軍光孝果慜禪師德安桃源人上堂舉南泉斬猫兒話乃曰南泉提起下刀誅六臂修羅救得無設使兩堂俱道得也應流血滿街衢雪峰有需禪師法嗣福州雪峰毬堂慧忠禪師上堂曰真覺彈廣陵散欽山唱菩薩蠻總被岩頭教壞山僧今日輪須彌槌擊虗空鼓聲萬歲樂唱萬年歡且道被阿誰教壞少林澄九鼎浪動百華新上堂終日忙忙那事無妨作麼生是那事良久曰心不負人面無慚色天童普交禪師法嗣慶元府蓬萊圓禪師不知何許人住山三十年足不越閫道俗尊仰之師有偈曰新縫紙被烘來暖一覺安眠到五更聞得上方鐘鼓動又添一日在浮生餘語未見圓通圓機道旻禪師法嗣江州圓通冲真密印通慧守慧禪師上堂曰但知今日復明日不覺前秋與後秋平步坦然歸故里却乘好月過滄洲咦不是苦心人不知隆興府黃龍道觀禪師上堂曰古人道眼色耳聲萬法成辦儞諸人為甚麼從朝至暮諸法不相到遂喝曰牽牛入儞鼻孔禍不入慎家之門明招法鏡文慧禪師法嗣揚州石塔宣祕禮禪師上堂曰奪不奪縱有餘臨岐不分袂富貴却蕭疎句裏不曾舒慷慨禹門先自透金魚上堂舉百丈野狐話乃曰不是翻濤手徒誇跨海鯨由基方撚鏃枝上眾猿驚一日上堂至座前師搊一僧上法座僧慞惺欲走師遂指座曰這棚子若牽一頭驢上去他亦須就上屙在汝諸人因甚麼却不肯以拄杖一時趕散顧侍者曰嶮僧問山河大地與自己是同是別曰長亭凉夜月多為客鋪舒云謝師答話曰綱大難為鳥綸稠始得魚僧作舞歸眾師曰長江為硯墨頻寫斷交書上封佛心才禪師法嗣福州普賢元素禪師建寧人也開堂日示眾曰拈華微笑猶乖量外之機斷臂安心何異捉月之見設使萬機休罷千聖不携還同待兔守株未是通方達士明眼漢沒窠臼高高處觀之不足低低處平之有餘神光照徹大千萬有全歸掌握大機大用草偃風行全暗全明超情離見所以道神光不昧萬古徽猷入此門來莫存知解知解既泯真智現前八字打開分明顯示竪起拂子曰還見麼於斯見得言語路絕取捨情忘了非生佛未分豈是威音那畔權實俱備照用雙行流出自己𮌎襟要且不從人得既不從人得正當今日祝延聖壽一句作麼生道良久曰四海浪平龍睡穩萬年松在祝融峰上堂未開口時先分付擬思量處隔千山莫言佛法無多子未透玄關也大難只如玄關作麼生透喝一喝上堂南泉道我十八上便解作活計囊無繫蟻之絲厨乏聚蠅之糝趙州道我十八上便解破家散宅南頭買賤北頭賣貴檢點將來好與三十棒且放過一著何故曾為宕子偏憐客自愛貪杯惜醉人福州鼓山山堂僧洵禪師郡之長溪阮氏子上堂曰盡力道不得底句和盲勃塑瞎一時推出來餿飯泥茶爐總不恁麼天高東南地傾西北這三轉語天下衲僧跳不出莫有跳得出底麼喝一喝卓拄杖下座上堂黃檗手中六十棒不會佛法的的大意却較些子大愚肋下築三拳便道黃檗佛法無多子鈍置殺人須知有一人大棒驀頭打他不回頭老拳劈面槌他亦不顧且道是誰福州鼓山師子祖珍禪師興化林氏子上堂曰大道只在目前要且目前難覩欲識大道真體不離聲色言語卓拄杖曰這箇是聲竪起拄杖曰這箇是色喚甚麼作大道真體直饒向這裏見得也是鄭州出曹門上堂尋牛須訪跡學道貴無心跡在牛還在無心道易尋竪起拂子曰這箇是跡牛在甚麼處直饒見得頭角分明鼻孔也在法石手裏上堂舉僧問投子月未圓時如何曰吞却三箇四箇云圓後如何曰吐却七箇八箇師曰投子和尚雖然善能吞吐要且未知月之所在或問鼓山月未圓時如何只對他道天上有星皆拱北圓後如何人間無水不朝東僧問趙州遶禪床一匝轉藏已竟此理如何曰𦘕龍看頭𦘕虵看尾云婆子道比來請轉全藏為甚麼只轉得半藏此意又且如何曰人無遠慮必有近憂未審甚處是轉半藏處曰不是知音者徒勞話歲寒浮山法真禪師法嗣峨嵋靈岩徽禪師僧問文殊是七佛之師未審誰是文殊之師曰金沙灘頭馬郎婦黃龍通照德逢禪師法嗣饒州薦福常庵擇崇禪師寧國府人也行實未詳上堂舉僧問古德生死到來如何免得曰柴鳴竹𪹼驚人耳僧云不會德曰家犬聲獰夜不休諸人要會麼柴鳴竹𪹼驚人耳大洋海底紅塵起家犬聲獰夜不休陸地行船三萬里堅牢地神笑呵呵須彌山王眼覰鼻把手東行却向西南山聲應北山裏千手大悲開眼看無量慈悲是誰底良久曰頭長脚短少喜多嗔上堂西山青無謂情洪井碧無涓滴西山人見曷親西山事無可似若是靈利底舉著便知懵懂者付與德山臨濟擲拂子下座一日上堂顧問侍者曰還記得昨日因緣麼云記不得復顧問大眾曰還記得麼眾無對竪起拂子曰還記得麼良久曰也忘却了也三處不成一亦非有諸人不會方言露柱且莫開口以拂子擊禪床下座天寧長靈守卓禪師法嗣慶元府育王無示分諶禪師溫之永嘉人族張氏年十六禮崇德慧微落髮微持律刻苦嘗然身燈為佛事師見曰大丈夫當明佛祖意以光明照大千何區區於此辭謁徑山悟佛鑑懃晚依長靈餘八載悉得其道宣和六年太師劉公正夫捨臨安第為顯寧寺請師出世未幾擢蘆山瑞岩育王法道大振上堂曰出西天入東土雲從龍風從虎一任諸方點頭舉拂子曰只如這箇順行三千倒行八百又作麼生辨若也辨得橫按鏌鎁全正令若辨不得百千年後與人看上堂尺頭有寸鑑者猶稀秤尾無星且莫錯認若欲定古今輕重較佛祖短長但請於中著一雙眼果能一尺還他十寸八兩元是半斤自然內外和平家國無事山僧今日已是兩手分付汝等諸人還肯信受奉行也無尺量刀剪遍世間誌公不是閑和尚上堂文殊智普賢行多年曆日德山棒臨濟喝亂世英雄汝等諸人穿僧堂入佛殿還知嶮過鐵圍關麼忽然踏著釋迦頂𩕳磕著聖僧額頭不免一場禍事上堂我若說有你為有礙我若說無你為無礙我若橫說你又跨不過我若竪說你又跳不出若欲叢林平貼大家無事不如推倒育王且道育王如何推得倒去召大眾曰著力著力復曰苦哉苦哉育王被人推倒了也還有路見不平拔劒相為底麼若無山僧不免自倒自起擊拂子下座師性剛毅蒞眾有古法時以諶鐵面稱之紹興十八年五月十三示寂於無異堂後七日塔全軀於烏石庵之左閱世六十有九坐夏五十有四湖州道場普明慧琳禪師七閩福清人上堂曰有漏笊籬無漏木杓庭白牡丹檻紅芍藥因思九年面壁人到頭不識這一著且道作麼生是這一著以拄杖擊禪床下座上堂一即多多即一毗盧頂上明如日也無一也無多現成公案沒殽訛拈起舊來氈拍板明時共唱太平歌湖州道場無傳居慧禪師本郡人族吳氏幼師景德寺宗省十九中經選授僧服從南屏妙慧習教觀越十年易服依長蘆淨照最久晚至長靈未幾總院事一日擬食醦豏豁然有省亟造方丈陳所入靈詰之師呈偈曰打破多年赤肉團大千俱現一毫端縱橫妙用無多子妙用縱橫總一般乃蒙印可靈沒師還里謁天聖琳禪師琳命首眾說法復退席令主盟後移靈石何山道場上堂曰鍾馗醉裏唱凉州小妹門前只點頭巡海夜叉相見後大家拍手上高樓大眾若會得去鏁却天下人舌頭若會不得將謂老僧別有奇特上堂百尺竿頭弄影戲不唯瞞你又瞞天自笑平生岐路上投老歸來沒一錢上堂舉臨濟示眾云一人在高高峰頂無出身之路一人在十字街頭亦無向背且道那箇在前那箇在後師曰更有一人不在高高峰頂亦不在十字街頭臨濟老漢因甚不知便下座紹興辛未九月二十四日示微疾而終壽七十五夏五十六臨安府顯寧松堂圓智禪師上堂曰蘆華白蓼華江溪邊脩竹碧煙籠閑雲抱幽石玉露滴岩叢昨夜烏龜變作鼈今朝水牯悟圓通咄湖州烏回唯庵範禪師上堂曰塵劫已前事堂堂無背面動靜莫能該舒卷快如電莫道凡不知佛也覰不見決定在何處合取這兩片薦不薦更為諸人通一線良久曰天下太平皇風永扇上堂舉僧問趙州至道無難唯嫌揀擇是時人窠窟否曰曾有人問老僧直得五年分踈不下大眾趙州具頂門眼向擊石火裏分緇素閃電光中明縱奪為甚麼却五年分踈不下還委悉麼易分雪裏粉難辨墨中煤溫州本寂靈光文觀禪師郡之瑞安人族葉氏年十九依白岩慧通二十得度游方謁長靈於天寧因看栢樹子頌有省靈歿旋里庵居二紀待制王公輝守郡請開法本寂上堂曰過去諸如來斯門已成就好事不如無現在諸菩薩今各入圓明好事不如無未來修學人當依如是法好事不如無還知麼除却華山陣處士何人不帶是非行參上堂舉罽賓國王斬師子尊者雪竇拈云作家君王天然有在師曰路見不平當與雪屈雪竇只解據款結案要且不知尊者不曾被斬淳熈五年正月二十六日端坐而逝壽九十六臘七十七黃龍山堂震禪師法嗣常德府德山無諍慧初禪師靖江府人也自見山堂得大受用三據寶坊眾所宗仰上堂顧眎大眾曰見麼在天成象在地成形在日月為晦為朔在四時為寒為暑致之以雷霆潤之以風雨且道在衲僧分上又作麼生一趯趯翻四大海一拳拳倒須彌山佛祖位中留不住又吹漁笛汨羅灣上堂九月二十五聚頭相共舉瞎却正法眼拈却雲門普德山不會說禪贏得村歌社舞阿呵呵邏囉哩遂作舞勢下座萬年雪巢法一禪師法嗣嘉興府報恩法常首座開封人丞相薛居正之裔宣和十年依長沙益陽華嚴元軾禪師下髮徧依叢社於首楞嚴經深入義海自湖湘至萬年謁雪巢機契命掌牋翰淳熈初抵報恩室中唯一矮榻餘無長物庚子九月中語寺僧曰一月後不復留此十月二十一往方丈謁飯將曉書漁父詞於室門就榻收足而逝詞曰此事楞嚴嘗露布梅華雪月交光處一笑寥寥空萬古風甌語逈然銀漢橫天宇蝶夢南華方栩栩斑斑誰跨豐干虎而今忘却來時路江山暮天涯目送鴻飛去嶽山祖庵主法嗣盧山廷慶叔禪師僧問多子塔前共談何事曰一回相見一回老能得幾時為弟兄僧禮拜師曰唐興今日失利信相正覺宗顯禪師法嗣成都府金繩文禪師僧問如何是大道之源曰黃河九曲云如何是不犯之令曰鐵虵鑽不入僧擬議師入打泐潭典牛天游禪師法嗣臨安府徑山塗毒智䇿禪師天台人族陳氏十六依護國楚光授方服首謁國清光禪師次謁育王諶萬壽智後於雲居聞板聲契入抵雲岩岩見然之游時住雲岩留歲餘告別岩送以偈尋首眾大溈歸里聞法黃岩之普澤繼歷數剎淳熙戊申冬詔居徑山上堂曰著意忘懷掘地深埋空洞無象髑髏妄想譬如兩鏡相照中間早已立象直饒東㵎水流西㵎水南山燒炭北山紅到這裏正好喫棒為甚如此我王庫內無如是刀上堂舉教中道若以色見我以音聲求我是人行邪道不能見如來然雖恁麼正是捕得老鼠打破油甕懷禪師道你眼在甚麼處雖則識破釋迦老子爭奈拈䭔䑛指若是塗毒即不然色見聲求也不妨百華影裏繡鴛鴦自從識得金針後一任風吹滿袖香紹熙壬子秋七月示疾至二十七辰初說偈而逝八月二日塔全身於東麓壽七十六臘六十音釋珏音角嚚音銀旻音民洵音荀陝音閃窈音杳窕徒了切會音檜悆余庶切泞直與切糝桑感切摟音棲摗速侯切郵音尤搊楚尤切懵莫孔切蒞音利豏胡斬切馗音逵汩手筆切栩音雨
