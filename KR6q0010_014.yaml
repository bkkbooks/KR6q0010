body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十五世臨濟十一世楊岐四世東京天寧佛果圓悟克勤禪師法嗣卷上潭州大溈佛性法泰禪師漢州人族季氏冠為大僧習南山教久而遊方機契五祖後於圓悟語下頓明大法出住鼎之德山邵之西湖及谷山道吾勑居大溈賜號佛性上堂曰推真真無有相窮妄妄無有形真妄兩無所有廓然露出眼睛眼睛既露見箇甚麼曉日爍開巖畔雪朔風吹綻蠟梅華上堂涅槃無異路方便有多門拈起拄杖曰看看山僧拄杖子一口吸盡西江水東海鯉魚𨁝跳上三十三天帝釋忿怒把須彌山一摑粉碎堅牢地神合掌讚歡曰諦觀法王法法王法如是以拄杖擊禪床下座上堂今朝正月已半是處燈火撩亂滿城羅綺駢闐交互往來遊玩文殊走入閙籃中普賢端坐高樓看且道觀音在甚麼處震天椎畫鼓聒地奏笙歌上堂渺渺邈邈十方該括坦坦蕩蕩絶形絶相目欲視而睛枯口欲談而詞喪文殊普賢全無伎倆臨濟德山不妨提唱龜吞陝府鐵牛蛇咬嘉州大像赫得東海鯉魚直至如今肚脹嘻上堂火雲燒田苗泉源絶流注娑竭大龍王不知在何處以拄杖擊禪床曰在這裏看看南山起雲北山下雨老僧更為震雷聲助發威光令遠布乃高聲曰閧弄閧弄上堂得念失念無非解脫是甚麼語話成法破法皆名涅槃料掉沒交涉智慧愚癡通為般若顢頇佛性菩薩外道所成就法皆是菩提猶較些子然雖如是也是楊廣失駱駝上堂德山棒下金沙異臨濟喝中賓主分到此若無真正眼可憐辜負本來人喝一喝拍禪床下座上堂欲識佛去處只這語聲是咄傅大士不識好惡以昭昭靈靈教壞人家男女被志公和尚一喝曰大士莫作是説別更道看大士復説偈曰空手把鋤頭步行騎水牛人從橋上過橋流水不流志公呵呵大笑曰前頭由似可末後更愁人上堂憶昔遊方日獲得二種物一是金剛鎚一是千聖骨持行宇宙中氣岸高突兀如是三十年用之為準則而今年老矣二物知何物擲下金剛鎚擊碎千聖骨拋向四衢道不能更惜得任意過浮生指南將作北呼龜以為鱉喚豆以為粟從他明眼人笑我無繩墨僧問理隨事變該萬有而一片虗凝事逐理融等千差而咸歸實際如何是理法界曰山河大地云如何是事法界曰萬象森羅云如何是理事無礙法界曰東西南北云如何是事事無礙法界曰上下四維問如何是十身調御投子下禪床立未審意旨如何曰腳跟下七穿八穴鄧州丹霞佛智蓬庵端裕禪師吳越王之裔六世祖安守會稽因家焉師生而挺嶷眉目淵秀十四驅烏於大善寺十八得度受具往依淨慈法真一禪師未幾偶僧擊露柱曰你何不説禪師聞微省去謁龍門遠甘露卓泐潭祥皆以頴邁見推晚見圓悟於鐘阜一日悟問誰知正法眼藏向這瞎驢邊滅却即今是滅不滅云請和尚合取口好曰此猶未出常情師擬對悟擊之師頓去所滯嘗述偈自通侍悟居天寧命典記室尋分座道聲藹著京西憲王公請開法丹霞次遷虎丘徑山謝事徇平江道俗之請庵于西華閲數稔勑居建康保寧後移蘇城萬壽及閩中賢沙壽山西禪復被旨補靈隱慈寧皇太后幸韋王第召師演法賜金襴僧伽梨乞歸西華紹興戊辰秋四明育王遣使固邀月餘始就上堂曰德山入門便棒多向皮袋裏埋蹤臨濟入門便喝總在聲塵中出沒若是英靈衲子直須足下風生超越古今途轍拈拄杖卓一下喝一喝曰只這箇何似生若喚作棒喝瞌睡未省不喚作棒喝未識德山臨濟畢竟如何復卓一下曰總不得動著上堂盡大地是沙門眼遍十方是自己光為甚麼東弗于逮打鼓西瞿耶尼不聞南瞻部洲點燈北單越暗坐直饒向箇裏道得十全猶是光影裏活計𢷾拂子曰百雜碎了也作麼生是出身一路擲下拂子曰參上堂頂一著佛祖不知若玄機尚戢影草未彰通身有透關眼也照不著若過這邊來正按金剛寶王放出踞地師子許你挨拶一步地雖然已是頭角不全即今莫有疾焰過風者麼喝曰甚麼處去也復喝一喝下座上堂動則影現覺則冰生直饒不動不覺猶是秦時𨍏輅鑽到這裏便須千差密照萬戶俱開毫端撥轉機輪命脈不沉毒海有時覺如湛水有時動若星飛有時動覺俱忘有時照用自在且道正恁麼時是動是覺是照是用還有人區分得出麼鐵牛橫古路觸著骨毛寒上堂易填巨壑難滿漏巵若有操持了無難易拈却大地寬綽有餘放出纖毫礙塞無路忽若不拈不放向甚麼處履踐同誠共休戚飲水亦須肥僧問如何是賓中賓曰你是田厙奴云如何是賓中主曰相逢猶莽鹵云如何是主中賓曰劒氣爍愁雲云如何是主中主曰敲骨打髓師蒞衆色必凜然寢食不背衆唱道無倦紹興庚午十月初示微疾至十七夜書偈付主事曰吾小休至五鼓起坐首座法全請遺訓師曰盡此心意以道相資語絶而逝火後目睛齒舌不壞其地發光終夕得設利者無算踰月不絶黃冠羅肇常平日問道於師適外歸獨無所獲道念勤切方與客食咀噍間若有物吐哺則設利也大如菽色若琥珀好事者持去遂再拜於闍維所聞香奩有聲亟開所獲如前而差紅潤門人奉遺骨分塔於鄮峰西華壽六十有六夏四十有八諡曰大悟塔名寶勝建康府華藏密印安民禪師嘉定人族朱氏初講楞嚴於成都為義學所歸時圓悟居昭覺師往扣悟令看國師三喚侍者之語趙州云如人暗中書字字雖不成文彩已彰那裏是文彩已彰處但恁麼參取有本小異後因悟普説僧出請問十玄談云只如古人道問君心印作何顏意旨如何悟曰文彩已彰師於言下有省悟未之許一日造室白悟曰和尚休舉語待某説看悟諾之師曰尋常拈槌竪拂豈不是經中道一切世界諸所有相皆即菩提妙明真心悟笑曰你元來在這裏作活計師又曰下喝敲床時豈不是返聞聞自性性成無上道悟曰你豈不見經中道妙性圓明離諸名相本來無有世界衆生師釋然悟出蜀居夾山師罷講侍行值悟為衆夜參舉古帆未挂因緣師聞未領遂求決悟曰你問我師舉前話悟曰庭前柏樹子師即洞明謂悟曰古人道如一滴投於巨壑殊不知大海投於一滴悟笑曰奈這漢何未幾令分座悟説偈曰懶誇四分與楞嚴按下雲頭子細參不學亮公親馬祖還如德嶠訪龍潭七年往返來昭覺三載翱翔上碧巖今日煩充第一座百華藂裏現優曇後謁佛鑒於蔣山鑒問佛果有不曾亂為人説底句曾與你説麼師曰合取狗口鑒震聲云不是這箇道理師曰無人奪你鹽茶袋亂叫作甚麼鑒云佛果若不為你道我為你説師曰和尚疑時退院別參去鑒呵呵大笑鑒入滅圓悟繼席未幾師開法保寧遷華藏旋里領中峰上堂曰衆賣華兮獨賣松青青顏色不如紅算來終不與時合歸去來兮翠靄中可笑古人恁麼道大似逃峰赴壑避溺投火爭如隨分到尺八五分钁頭邊討一箇半箇雖然如是保寧半箇也不要何故富嫌千口少貧恨一身多上堂呵佛罵祖須是德山作家渡馬渡驢還他趙州手段瞎驢滅却正法眼藏利動君子聾人不用二種語言慣鈎鯨鯢集雲峰下四藤條雙明雙暗大愚肋底築三下同死同生祖佛未興已前向上人提撕此事羚羊挂角之後仙陀客奪鼓掣旗露刃藏鋒作師子哮吼裂破祖師印掃蕩衲僧蹤硬如兜羅綿軟似南賓鐵摩竭陀國水泄不通少室峰前親行此令所以定光招手智者點頭可謂良馬不窺鞭側耳知人意還會麼三面狸奴手捉月兩頭白牯腳拏煙戴冠碧兔立庭柏脫殼烏龜飛上天冬夜示衆舉玉泉皓和尚云雪雪片片不別下到臘月再從來年正月二月三月四月五月六月七月八月九月十月依前不歇凍殺餓殺免教胡説亂説師曰不是罵人亦非贊嘆高出臨濟德山不似雲居羅漢且道玉泉意旨作麼生良久曰但得雪消去自然春到來師後示寂於本山闍維設利頗賸細民穴地尺許皆得之尤光明瑩潔心舌亦不壞眉州象耳山袁覺禪師眉山人族袁氏幼於傳燈院試所習得度始名圓覺郡守填綾牒誤以圓作袁守慊然戲謂師云一字名可乎師笑曰一字已多郡守異之具戒後即出蜀謁五祖自海會宗龍門遠皆未得其津涯又謁闡提照於寶峰久之值照入寂往侍石門政執役數秋親承記莂時圓悟道望傾一時師曳杖欲一見石門徒衆顧師云兄既有得自宜縫炊巾何區區復行邁耶師曰不然我是則所往無礙弗應守株于此師至蔣山適悟被旨居天寧遂往大溈依佛性頃之入室陳所見性云汝忒煞遠在然知其為法器俾充侍者掌賓客師每侍性性必舉法華開示悟入四字令下語又云直待我竪點頭時汝方是也偶不識被斥制中無依寓俗士家一日誦法華至亦後不知何者是火何者為舍乃豁然制罷歸省性見首肯之圓悟再得旨住雲居師至彼以所得白悟悟呵云本是淨地屙屎作麼師所疑頓釋紹興丁巳眉之象耳虗席郡守謂此道場久為蟊螣囊橐非名流勝士莫能起廢諸禪舉師應聘嘗語客曰東坡云我持此石歸袖中有東海山谷云慧崇煙雨蘆鴈坐我瀟湘洞庭欲喚扁舟歸去傍人謂是丹青此禪髓也又曰我敲床竪拂時釋迦老子孔夫子都齊立在下風有舉此語似佛海遠禪師遠曰此覺老語也我此間即不恁麼成都府昭覺徹庵道元禪師綿之巴以人族鄧氏幼於降寂寺圓具東遊謁大別心道禪師因看廓然無聖之語忽失笑曰達磨元來在這裏道譽之往參佛鑒佛眼蒙賞識後依圓悟於金山以所見告悟弗之許高宗皇帝駕幸維揚召悟説法賜號圓悟又賜侍僧十人紫衣師與焉圓悟詔住雲居師從之雖有信入終以梗胸之物未去為疑會悟問參徒生死到來時如何僧云香臺子笑和尚次問師汝作麼生云草賊大敗悟曰有人問你時如何師擬答悟憑陵曰草賊大敗師即徹證圓悟以拳擊之師拊掌大笑悟曰汝見甚麼便如此云毒拳未報永劫不忘悟歸照親命首衆悟將順世以師繼席機語未見平江府虎丘紹隆禪師和之含山人也九歲謝覩居佛慧院踰六年得度受具又五年荷包謁長蘆淨照信禪師得其大略有傳圓悟語至者師讀之嘆曰想酢生液雖未澆腸沃胃要且使人慶快第恨未聆謦咳耳遂由寶峰依湛堂客黃龍叩死心其機語妙出一時即至夾山聞悟移道林師隨往一日入室悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼云見曰頭上安頭師聞脫然契證悟叱曰見箇甚麼云竹密不妨流水過悟肯之自此且且不忘二十年盡圓悟之妙歸邑繼住城西開聖建炎之擾乃結廬銅峰之下郡守尚書李公光延居彰教四年徙虎丘道化益盛上堂曰凡有展托盡落今時不展不托墮坑落塹直饒風吹不入雨灑不著檢點將來自救不了豈不見道直似澄潭月影靜夜鍾聲隨扣擊以無虧觸波瀾而不散此猶是生死岸頭事拈拄杖畫一畫曰盡斷賢沙老漢許多葛藤點頭石不覺拊掌大笑且道笑箇甚麼腦後見腮莫與往來上堂百鳥不來春又暄憑欄溢目水連天無心還似今宵月照見三千與大千上堂摩竭陀國親行此令拈拄杖卓一下曰大盡三十日小盡二十九上堂眼裏不著砂耳裏不著水堪笑老俱胝無端竪一指諸禪德且道誰是解笑者還會麼閙市拶出憍尸迦吃嘹舌頭三千里上堂不犯之令明古今風月靈機常獨耀萬象悉澄徹更説甚麼正法眼藏瞎驢邊滅無計較中翻成計較無途轍中翻成途轍一時與你截斷稱鎚硬似鐵別別八月秋何處熱上堂有佛處不得住上無攀仰無佛處急走過下絶己躬從來無向背本自絶羅籠出門撞著須菩提寸草不生千萬里自是長觜鳥休言芳樹不棲謾自説禪説道摩斯吒直饒心挂樹頭未免身沉海底莫動著動著三十棒且置休夏自恣一句作麼生道青山淥水元依舊明月清風共一家僧問為國開堂一句作麼生道曰一願皇帝萬歲二願重臣千秋云只如生佛未興時一著落在甚麼處曰吾常於此切云官不容針更借一問時如何曰據虎頭收虎尾云中間事作麼生曰草繩自縛漢云毗婆尸佛早留心直至如今不得妙曰幾行巖下路少見白頭人問九旬禁足意旨如何曰理長即就云只如六根不具底人還禁得也無曰穿過鼻孔云學人今日小出大遇曰降將不斬云恁麼則和尚放某逐便也曰停囚長智問雪峰道盡大地撮來如粟米粒大拋向而前漆桶不快打鼓普請看未審此意如何曰一畝之地三蛇九鼠云乞師再垂指示曰海口難宣問如何是大道真源曰和泥合水云便恁麼去時如何曰截斷草鞋跟問如何是佛法的的大意曰蛇頭生角問古人到這裏因甚麼不肯住曰老僧也恁麼云忽然一刀兩段時如何曰平地神仙問萬機休罷千聖不携時如何曰未足觀光云還有奇特事也無曰獨坐大雄峰紹興丙辰感微疾白衆曰當以首座宗達承院事請於郡從之乃書偈而逝五月八日也塔全軀於寺之西南隅住世六十有五坐夏四十有五眉州中巖華嚴祖覺禪師嘉之龍遊人族楊氏世業儒父洪有大名後居眉師生而偉異少為書生志齊昌黎嘗著文大排釋教忽患贅瘡醫莫愈乃自悔從彌勒慧目能禪師疾瘳然右膝不舉師因手書華嚴合論畢夜感異夢且即捨杖步趨心意快然因習誦一日誦至現相品曰佛身無有生而能示出生法性如虗空諸佛於中住遂悟旨趣四衆命講不輟大觀庚寅師佐慧目來居中巖政和乙未春得度明年成都師周公燾俾朝請李隲制疏以照覺寺命師大敞講筵師詞辨橫放若決江河衆所歆歎適南堂靜禪師過門謂師曰觀公講説獨步西南惜未解離文字相耳儻問道方外即今之周金剛也師欣然罷講南至荊渚會丞相張公商英撰峩眉寺記證辨舊文誤以賢首位等普賢修書破之復著三聖圓融論四篇公讀之撫几稱善乃曰師果不爾負可往蔣山依佛果老發明向上關棙他日豈易量哉師如其言徑至鍾阜一日入室悟舉羅山垂語問之師罔措夙夜數年有省述偈曰家住孤峰頂長年半掩門自嗟身已老活計付兒孫悟為印可次日見之悟曰昨日公案作麼生師佇思悟呵逐之又五載莫能領解辭之廬山於棲賢寺閲浮山圓鑑禪師削執論遂大悟方知佛果鉗鎚妙密作偈寄悟曰出林依舊入蓬蒿天網恢恢不可逃誰信業緣無避處歸來不怕語聲高悟大喜持以示衆曰覺華嚴徹矣悟歸蜀再住昭覺適師亦西還命掌箋記令嗣座力辭隱峩眉之南埵撰佛祖紀傳六百卷將成復出峽探索遺逸以彌縫之初抵長沙丞相張公浚力以智度請開法堅臥不起公諭曰師以固守為志節豈從上傳持此道者乃爾用心耶師翻然就之法席大盛如三佛時癸亥八月謝院事入浙以華嚴要訣并録大藏不備載者傳入海東又欲通箋經旨償所志願復泝流西歸部使者大監榮公以成都信相延之未幾移瓦屋開善僅二年前卭守史公堪顧中巖久不振乃移文漕使迎師主之師欣從凡於槌拂之下未嘗有倦色故道俗覩之者無虗時上堂曰炅光洞耀逈脫根塵大用現前不存軌則一見便見擬議則差起意推求便成剩法所以祖師道圓同太虗無欠無餘良由取捨所以不如若能取捨俱忘觸目無滯拈來便用立處皆真譬如擲劒揮空不論及之不及若更推尋玄妙扸出精明病在鑽穴索空撥波求水念念忘本步步迷源借使窮究萬法始末洞明未契本源但名假法喚作從門入者不是家珍直得大地山河無絲毫過患先要得個入門方知性海圓澄萬有俱備無有一法從外而入未有一法從內而出直饒如此猶是無風匝匝之波乃至萬緣俱喪表裏一如三際十方坦然平等聊且得箇轉身句子尚在半途更須掃蕩玄機盡却聖解即偏而常正猶如鶴在銀籠即正而常偏大似龍銜異寶萬年松徑白雪漫漫異草寒巖未嘗顧戀尚坐一色喚作貼肉汗衫教中謂之解脫坑亦名寂滅病須是不稟威音佛透出未生前不挂萬年衣不坐空王殿視本來人如破草履見佛祖似生冤家不入異類中不行無間路雖然恁麼奇特猶未是渠儂極則處不見道不見一色始是半提更須知有全提時節始得我若全提去法堂前定是草深一丈盡大地道絶人稀諸禪德快須著些精彩豈可取次承當他時異日只成自誤山僧恁麼道還有知落處底麼良久曰夜行人只貪明月不覺和衣渡水寒上堂一塵起大地收一葉落天下秋懸須彌於諸人鼻孔上著大海於諸人眼睛中得則得只是未知有向上一竅在古人事不獲已垂一言半句只要教人會去殊不知向好肉上剜瘡豈況舉古明今遠照近用大似嚼飯餧嬰兒有甚麼用處所以雲門道西天二十八祖唐土六祖盡乾坤大地天下老和尚總在拄杖頭上直饒會得倜儻分明放過你去只在半途若不放過盡是野狐精去還委悉麼燕市屠牛春色好鈎齊元在直鈎中到虎丘請上堂某逢歒手雖有行而難藏月到天心得無遮而自在欲行向上路須得同參證明方可脫體提持全機出沒更不必優遊性海入理深談只知語妙意玄切恐渾身泥水又不欲破三作五換斗移星免使家醜外揚教他傍觀者哂且不敢正偏回互隱密全該正按則理事雙忘言思路絶傍提則龍吟枯木韻出青霄又恐劒已化龍刻舟無益亦不敢説四種料簡列四主賓一句具三玄一玄具三要一喝分賓主照用一時行自知是已陳芻狗靈龜負圖只欲説句裏明機風前有路未語先分付用處絶蹤由終是野鴈見人意已先改更説言無展事語不投機承言者喪滯句者迷不犯波瀾迢然自異不立窠臼遍界難藏大似滯殼迷封日中逃影擊禪床一下曰今日一齊打破更不用這箇間家具別有騎聲蓋色越格超宗底一著子不免對衆拈出舉拂子曰還見麼海山幸有任公子一鈎曾連十二鼇上堂舉石霜和尚遷化衆請首座繼鍾住持虔侍者所問公案師曰宗師行處如火消冰透過是非關全機亡得喪盡道首座滯在一色侍者知見超師可謂體妙失宗全迷向背殊不知首座如鷺鷀立雪品類不齊侍者似鳳翥丹霄不縈金鎖一人高高山頂立一人深深海底行各自隨方而來同會九重城裏而今要識此二人麼竪起拂子曰龍臥碧潭風凜凜垂下拂子曰鶴歸霄漢背摩天僧問最初威音王末後婁至佛未審最初參見甚麼人曰家在大梁城更問長安路云只如德山擔疏鈔行腳意在甚麼處曰拶破你眼睛云與和尚悟華嚴宗旨相去幾何云同途不同轍云昔日德山今朝和尚曰夕陽西去水東流問世尊拈華當為何事曰揭開腦蓋云爭奈迦葉微笑何曰情知你落第二頭云恁麼則載斷腳跟曰猶自不知羞問如何是一喝如金剛王寶劒曰血濺梵天云如何是一喝如踞地師子曰驚殺野狐狸云如何是一喝如探竿影草曰驗得你骨出云如何是一喝不作一喝用曰直須識取把針人莫道鴛鴦好毛羽問如何是荊南境曰千里雲濤三峽嶮一帆風浪五湖寬云如何是境中人曰直諫豈無唐獨座英雄宜有眷髯翁云人境已蒙師指示高提祖印事如何曰巡海夜叉頭戴角電光石火莫踟蹰僧禮拜師曰更須透過未生前問如何是正中偏曰更深垂却夜明簾云如何是偏中正曰天曉賊人投古井云如何是正中來曰百卉乘春在處開云如何是兼中至曰雨雪交加無處避云如何是兼中到曰兩頭截斷無依倚心法雙忘始得玄紹興庚午孟夏示少恙至五月朔晨起衆衲環擁求末後句師撝之曰吾平生口過不少今尚何言去去吾將少憩焉遂瞑目而逝三日慈客儼如火浴後獲設利有大如蚌珠五色者莫計塔于院之東師以踐履無玷而嚴於授受宣撫邵公溥給事馮公楫與數十勝流皆以師事之閲世六十四坐夏三十五潭州福嚴文演禪師成都新繁人族楊氏年十八依廣孝子安為僧登戒住習經論久之謁正法明禪師聞舉雲門胡餅話有省後見圓悟始極法源初住智度晚遷福嚴上堂曰當陽坐斷凡聖迹絶隨手放開天回地轉直得日月交互虎嘯龍吟頭頭物物耳聞目視安立諦上是箇甚麼還委悉麼阿斯吒咄上堂等間地明白不思量現成前佛後佛於此指注不及天下衲僧計較不就制遏不住逈脫情塵唯自肯方親全機放下一向靠將去上無佛祖可依下無自己可據如大虗空更無執礙直是炟赫地不昧一切得這些巴鼻子了便乃應用無窮然亦須隨手揑破始得何故大紅爐中不容點雪僧問如何是定林正主曰坐斷天下人舌頭云未審如何親近曰覷著則瞎問學人上來請師相見曰三要印開云功不浪施也曰見箇甚麼云賓主儼然曰望空啓告紹興丙子十一月二十六端坐忽集耆舊囑以後事書偈罷喝一喝擲筆而逝壽六十五臘四十八闍維獲設利五色同靈骨藏于院之三生塔平江府西山明因曇玩禪師溫之樂清人族黃氏妙齡披削遍參叢社宣和庚子回至鐘阜適朝廷易僧為德士師與同志數人入頭陀巖食松自處久之圓悟被旨居是山親至巖所令去鬚髮及悟詔補京師天寧與師俱往命掌香水海未幾因舉桴擊鼓頓明大法悟默識之室中凡有所問皆對曰莫理會故流輩咸以莫理會稱之皇叔齊安郡王乞旨請開法明因次遷寶華上堂曰你有一對眼我也有一對眼汝若瞞還自瞞汝若成佛作祖老僧無汝底分汝若做驢做馬老僧救汝不得一日衆檀越入山請師上堂説偈曰我無長處名虗出謝汝殷勤特地來明因無法堪分付謾把山門為汝開僧問和尚未見圓悟時如何曰莫理會云見後如何曰莫理會云見與未見時如何曰莫理會莫理會紹興二十三年謝事居四明雪竇明覺塔所皇叔欲奏回象軾竟以疾辭之明年歸寂顯異特甚故不詳録平江府虎丘雪庭元淨禪師雙溪人也上堂曰要行便行要坐便坐六處神通是箇甚麼把定時一物不為放行時殺人放火忽有箇衲僧出來道這無面目漢不要亂做雪庭只向伊道將謂無人證明上堂知有底人過萬年如同一日不知有者過一日如同萬年不見死心和尚道山僧行腳三十餘年以九十日為一夏增一日也不得減一日也不得取不得捨不得不可得中只麼得翠雲見處又且不然山僧行腳三十來年誰管他一日九十日也無得也無不得處處當來見彌勒且道彌勒在甚麼處金風吹滿水落葉滿長安上堂説得須是見得見得又須説得見得説不得落在陰界見解偏枯説得見不得落在時機墮在毒海若是翠雲門下直饒説得見得好與三十棒説不得見不得也好與三十棒翠雲恁麼道也好與三十棒遂高聲召大衆曰嶮上堂日日日東出日日日西沒是時人知有自古自今如麻似粟忽然捩轉話頭亦不從東出亦不從西沒且道從甚麼處出沒若是透關底人聞恁麼道定知五里牌在郭門外若是透不過者往往道半山熱瞞人僧問如何是到家一句曰坐觀成敗問不與萬法為侶者是甚麼人曰遠親不如近鄰云待汝一口吸盡西江水即向汝道又作麼生曰近鄰不如遠親問亡僧遷化向甚麼處去曰糞堆頭云意旨如何曰築著磕著懷安軍雲頂𠁼庵宗正禪師潼川郪縣人上堂拈拄杖卓一下曰聞處絶聞竪起曰見處絶見風動塵起垛生招箭未恁麼已前分明成兩片德山橫按絶商量黃檗用時機掣電大千沙界一毛頭手眼通身無背面咄衢州天寧訥堂梵思禪師蘇臺人族朱氏年二十一去髮受具遊師席往來佛鑑佛眼會下有年晚依圓悟徹證後七坐道場上堂曰躍翻生死海踏倒涅槃岸世上無活人黃泉無死漢遂拈拄杖曰訥堂今日拄杖子有分付處也還有承當得者麼試出來擔荷看有麼有麼良久擲拄杖下座上堂知有底也喫粥喫飯不知有底也喫粥喫飯如何直下驗得他有之與無是之與非邪之與正若驗不出參學事大遠在喝一喝下座上堂山僧是楊岐四世孫這老漢有箇三腳驢子弄蹄行公案雖人人舉得只是不知落處山僧不惜眉毛為諸人下箇注腳乃曰八角磨盤空裏走嶽州君山佛照覺禪師上堂曰是即徹底是從來脫體先天地非即徹底非萬別千差共一機是也是不著非也非不及此時佛祖從何立曉天霜重泄真機一顆圓明色非色既非色且道是箇甚麼妙體全標處分明只自知上堂舉古者道仰之彌高鑽之彌堅瞻之在前忽焉在後諸人還識得麼若也不識為你注破仰之彌高不隔絲毫要津把斷佛祖難逃鑽之彌堅真體自然鳥啼華笑在碧巖前瞻之在前非正非偏十方坐斷威鎮大千忽焉在後一場漏逗堪笑雲門藏身北斗咄平江府寶華顯禪師本郡人也上堂曰喫粥了也頭上安頭洗鉢盂去為蛇畫足更問如何自納敗闕良久高聲召大衆衆舉首師曰歸堂喫茶上堂禪莫參道休學歇意忘機常廓落現成公案早周遮只箇無心已穿鑿直饒坐斷未生前難透山僧錯錯錯紹興府東山覺禪師後住因聖上堂曰三通鼓罷諸人各各上來擬待理會祖師西來意還知劒去久矣麼設使直下悟去也是斬頭覓活東山事不獲已且向第二頭鞠拶看以手拍禪床下座上堂花爛熳景暄妍休説壺中別有天百草頭邊如薦得東高三丈西闊八寸上堂東弗于代與西瞿耶尼鬪額會麼你諸人猶自不知鉢盂口向天在上堂滿口道不得偶爾成文良久曰喫棒得也未上堂老演師翁道説心説性老僧這裏是惡口山僧道若是教外別傳乃是當的帝都丁上堂舉昔廣額屠兒日殺千羊一日至佛所揚下屠刀云我是千佛一數世尊云如是如是今時叢林將謂廣額過去是一佛權現屠兒日殺千羊如此見廣額且喜沒交涉又曰廣額正是箇殺人不眨眼底漢揚下屠刀立地成佛且喜沒交涉又道廣額揚下屠刀云我是千佛一數這一佛多少分明且喜沒交涉要識廣額麼夾路桃華風雨後馬蹄何處避殘紅音釋𠁼音伊頵於倫切挺音鋌嶷魚力切摵沙獲切𨍏音鐸輅盧各切誤作轢巵音支厙音舍謦去挺切咳音慨蒞音利咀才與切噍才笑切菽音叔奩音廉鄮音茂髀房禮切嶠音轎贅之芮切瘳音抽敞昌兩切歆許金切埵音朵浚音峻泝音素薿音擬卭渠容切剜一九切倜音剔翥韋恕切髯女監切
