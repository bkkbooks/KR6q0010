body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十六世臨濟十二世楊岐五世大溈月庵善果禪師法嗣荊門軍玉泉窮谷宗璉禪師合郡雲門人族董氏兒時有異言幼師廣化了達試法華凡兩奏名恩乃及剃染登戒之成都大慈講習往參信相昌禪師值上堂僧問法法不隱藏古今常顯露如何是顯露底法曰山河大地師聞微有得出關謁鹿苑業文殊道佛性泰皆未釋所滯往扣月庵於道吾隨居福嚴每舉雲門放洞山三頓棒話詰之語不契一日普請擔采至彌陀嶺倦甚去簷噓之忽大悟拊掌笑曰快活快活亟歸擬白月庵庵見來乃曰信吾不賺汝師禮謝於是命首衆説法衲子踵隨竟晦迹南嶽二十年居思大三生藏亦久因號璉三生會上封虗席潭帥龍圖劉公昉力挽開法未幾引退復住報恩福嚴及龍王玉泉開堂日問答已乃曰衲僧向人天衆前一問一答一擒一縱一卷一舒一挨一拶須是具金剛眼睛始得若是念話之流君向西秦我之東魯於宗門中殊無所益這一段事不在有言不在無言不礙有言不礙無言古人垂一言半句正如國家兵器不得已而用之橫説竪説只要控人入處其實不在言句上今時人不能一徑徹證根源只以語言文字而為至道一句來一句去喚作禪道喚作向上向下謂之菩提涅槃謂之祖師巴鼻正似鄭州出曹門從上宗師會中往往真箇以行腳為事底才有疑處便對衆決擇只一句下見諦明白造佛祖直指不傳之宗與諸有情盡未來際同得同證猶未是泊頭處豈是空開脣皮胡言漢語來所以南院示衆云諸方只具啐同時眼不具啐同時用時有僧問如何是啐同時用院曰作家不啐啐同時失僧云猶是學人問處院曰如何是你問處僧云失院便打其僧不契後至雲門會中因二僧舉此話一僧云當時南院棒折那其僧忽悟即回南院院已遷化時風穴作維那問曰你是問先師啐同時話底僧那云是穴曰你當時如何云我當時如在燈影裏行穴曰你會也大衆暗穿玉線密度金針如水入水似金博金敢問大衆啐同時是親切處因甚却失若也會得堪報不報之恩共助無為之化便可橫身宇宙獨步大方若跳不出依前只在架子下上堂拈拄杖曰破無明暗截生死流度三有城泛無為海須是識這箇始得遂召大衆曰喚作拄杖則觸不喚作拄杖則皆若也識得荊棘林中撒手是非海裏橫身脫或未然普賢乘白象土宿跨泥牛參上堂一切數句非數句與吾靈覺何交涉師曰永嘉恁麼道大似含元殿上更覔長安殊不知有水皆含月無山不帶雲雖然如是三十年後趙婆酤醋上堂舉溈山問仰山仲冬嚴寒即不問運推移事若何仰山進前三步溈曰知子答這話不得時香嚴旁立云某偏答得這話溈理前話問之嚴亦進前三步溈山曰賴過寂子不會師曰問既一般答亦相似為甚麼肯一不肯一要識溈山麼腳踏西溪流去水手持南嶽寄來書上堂宗乘一唱殊途絶萬別千差俱泯滅通身是口難分雪金剛腦後三斤鐵好大哥上堂舉麻谷持錫到章敬又到南泉師曰是是放出南山真鱉鼻不是不是勒回千里追風驥終成敗壞可憐生塞斷咽喉無出氣無出氣有巴鼻趙州東壁挂葫蘆堪笑維摩談不二僧問保壽開堂三聖推出一僧保壽便打意旨如何曰利動君子云惟復棒頭有眼惟復見機而作曰獼猴繫露柱云只如三聖道你恁麼為人瞎却鎮州一城人眼又作麼生曰錦上鋪華又一重問行腳逢人時如何曰一不成二不是云行腳不逢人時如何曰虎咬大蟲云只如慈明道釣絲絞水意作麼生曰水浸鋼石卯問三聖道我逢人即出出則不為人意旨如何曰兵行詭道云興化道我逢人即不出出則便為人又作麼生曰綿裹稱鎚問不落因果為甚麼墮野狐身曰廬山五老峯云不昧因果為甚麼脫野狐身曰南嶽三生藏云只如不落不昧未審是同是別曰倚天長劒逼人寒問北斗裏藏身時如何曰從地涌出云便恁麼去時如何曰波斯讀梵書問初生孩子還具六識也無趙州道急水上打毬子意旨如何曰兩手扶犂水過膝云只如僧又問投子急水上打毬子意旨如何云念念不停流又作麼生曰水晶甕裏浸波斯問楊岐道三腳驢子弄蹄行意旨如何曰過蓬州了便到巴州問有句無句如藤倚樹時如何曰昨夜祝融生兩角云樹倚藤枯句歸何處曰今朝突兀又麼光云只如溈山呵呵大笑又作麼生曰海水逆流云羅山道道吾是箇館驛裏撮馬糞漢又且如何曰衣穿肉露問文殊是七佛之師為甚麼出女子定不得曰閙處莫出頭云罔明為甚麼却出得曰放屁合著大石調云一等是箇時節為甚麼有出得出不得曰這裏有人教唆詞訟問達磨未來時如何曰雲籠嶽頂云來後如何曰雨灑瀟湘問世尊拈華迦葉微笑意旨如何曰路窮山轉云冤有頭債有主曰囌嚧囌嚧云忽然百萬大衆一時笑時如何曰你見箇甚麼僧禮拜師曰賺殺一船人問如何是佛法大意曰騎牛穿市過云學人買鐵得金曰父南子北紹興庚辰十二月二十三日集衆出衣盂令於寺南建二窣堵一以存吾報身劫灰之餘一以奉四衆靈骨書偈而逝七日闍維獲設利五色衆咸得之以正月二十四歸骨奉藏焉壽六十四臘四十一潭州大溈行禪師上堂曰不是心不是佛不是物且道是箇甚麼不在內不在外不在中間畢竟在甚麼處苦苦有口説不得無家何處歸上堂橫拄杖曰你等諸人若向這裏會去如紀信登九龍之輦不向這裏會去似項羽失千里烏騅饒你總不恁麼落在無事閣裏若向這裏撥得一路轉得身吐得氣山僧與你拄杖子遂靠拄杖下座上堂舉僧問趙州路逢達道人不將語默對未審將甚麼對州云人從陳州來不得許州信師曰滿滿彎弓射不著長長揮劒斫無痕堪笑日月不到處箇中別是一乾坤潭州道林淵禪師上堂曰節近端午乍晴乍雨帶纍達磨眼睛特地和泥合土二祖不會承當雪庭枉受辛苦引得後代兒孫各自開張門戶或放南山毒蛇或作玄沙猛虎雪峰連輥三毬禾山一味打鼓山僧檢點將來盡是葛藤露布爭如喫飯著衣此外更無佛祖畢竟如何阿嫂便是大哥妻師姑元是女人做僧問鍾未鳴鼓未響托鉢向甚麼處去德山便低頭歸方丈意旨如何曰奔雷迸火云巖頭道這老漢未會末後句在又作麼生曰相隨來也云巖頭密啓其意未審那裏是他密啓處曰萬年松在祝融峰云然雖如是只得三年三年後果遷化還端的也無曰嚤呢噠唎吽𠷑吒紹興二十三年五月七日上堂拈拄杖示衆曰離却聲色言語道將一句來衆無對師曰動靜聲色外時人不肯對世間出世間畢竟使誰會言訖倚杖而逝隨州大洪老衲祖證禪師潭之瀏陽潘氏子上堂曰萬象之中獨露身如何説箇獨露底道理竪起拂子曰到江吳地盡隔岸越山多僧問雲門問僧光明寂照遍河沙豈不是張拙秀才語僧云是門云話墮也未審那裏是這僧話墮處曰鮎魚上竹竿問離却言句請師直指師竪起拂子僧云還有向上事也無曰有云如何是向上事曰速禮三拜隆興府石亭野庵璇禪師上堂曰喫粥了也未趙州無忌諱更令洗鉢盂太煞沒巴鼻悟去由來不丈夫這僧那免受塗糊有指示無指示韶石四楞渾拓地入地獄如箭射雲岫清風生大廈相逢携手上高峰作者應須辨真假真假分若為論午夜寒蟾出海門隆興府泐潭山堂德淳禪師信之上饒人上堂曰俱胝一指頭一毛九牛華嶽連天碧黃河徹底流截却指急回眸青篛笠前無限事緑蓑衣底一時休常州宜興保安復庵可封禪師三山玉融林氏子上堂曰天寬地大風清月白此是海宇清平底時節衲僧家等間問著十箇有五雙知有只如夜半華嚴池吞却楊子江開明橋撞倒平山塔是汝諸人還知麼若也知去試向非非想天道將一句來其或未知擲下拂子曰須是山僧拂子始得上堂舉雲門問僧光明寂照遍河沙豈不是張拙秀才語僧云是門云話墮也師曰向道莫行山下路果聞猿叫斷腸聲潭州石霜宗鑑禪師上堂曰送舊年迎新歲動用不離光影內澄輝湛湛夜堂寒借問諸人會不會若也會增瑕纇若不會依前昧與君指箇截流機白雲更在青山外雲居法如禪師法嗣太平州隱靜圓極彥岑禪師台城人也上堂曰韓信打關未免傷鋒犯手張良燒棧大似曳尾靈龜既然席卷三秦要且未能囊弓裹革煙塵自靜我國晏然四海九州盡歸皇化自然牛間馬放風以時雨以時五穀熟萬民安大家齊唱村田樂月落參橫夜向闌上堂今朝八月初五好事分明為舉嶺頭漠漠秋雲樹底鳴鳩喚雨昨夜東海鯉魚吞却南山猛虎雖然有照有用畢竟無賓無主唯有文殊普賢住住我識得你上堂舉正堂辨和尚室中問學者蚯蚓為甚麼化為百合師曰客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉鄂州報恩成禪師上堂曰秋雨乍寒汝等諸人青州布衫成就也未良久喝曰雲溪今日冷處著一把火便下座道場正堂明辨禪師法嗣平江府覺報清禪師上堂舉僧問雲門如何是諸佛出身處門云東山水上行師曰諸佛出身處東山水上行石壓笋斜出岸懸華倒生湖州何山然首座姑蘇人也侍正堂之久入室次堂問貓兒為甚麼偏愛捉老鼠曰物見主眼卓竪堂欣然因命分座淳熙初終於此山白楊法順禪師法嗣吉州青原如禪師僧問達磨未來時如何曰生鐵鑄崑崙云來後如何曰五彩畫門神淨居尼慧溫法嗣溫州淨居尼無相大師法燈上堂拈拄杖卓曰觀音出普賢入文殊水上穿靴立擡頭子過新羅石火電光追不及咄南嶽第十七世臨濟十三世黃龍六世萬年心聞曇賁禪師法嗣溫州龍鳴在庵賢禪師上堂舉崇壽示衆云識得凳子周匝有餘雲門道識得凳子天地懸殊師曰崇壽老漢坐殺天下人雲門大師走殺天下人龍鳴即不然識得凳子四腳著地要坐便坐要起便起潭州大溈咦庵鑑禪師會稽人也上堂曰木落霜空天寒水冷釋迦老子無處藏身拆東籬補西壁撞著不空見菩薩請示念佛三昧也甚奇怪却向道金色光明雲參退喫茶去上堂老胡開一條路甚生徑直只云歇即菩提性淨明心不從人得後人不得其門一向奔馳南北往復東西極歲窮年無箇歇處諸人還歇得麼休休上堂舉晦堂和尚一日問僧甚處來云南雄州曰出來作甚麼云尋訪尊宿曰不如歸鄉好云未審和尚令某歸鄉意旨如何曰鄉裏三錢買一片魚鮓如手掌大師曰寧可碎身如微塵終不瞎箇師僧眼晦堂較些子有般漢便道熟處難忘有甚共語處南嶽第十七世臨濟十三世楊岐六世西禪懶庵鼎需禪師法嗣福州鼓山本庵安永禪師閩縣人族吳氏弱冠依安國慈濟為苾芻未幾謁懶庵於雲門一日入室庵曰不問有言不問無言世尊良久不得向世尊良久處會隨後便喝條然契悟作禮曰不因今日問爭喪目前機庵許之及徙怡山命師首衆閲二年庵將順寂以大慧所傳磨衲授之囑令剪拂學者安撫尚書張公澄請師繼席不數月拂袖雲門庵乾道甲申郡師大資王公之望從衆衲請居乾元遷黃檗又三年移鼓山上堂曰要明箇事須是具擊石火閃電光底手段方能嶮峻崖頭全身放捨白雲深處得大安居如其地覔金針直下腦門須逆裂到這裏假饒見機而變不犯鋒鋩全身獨脫猶涉泥水只如本分全提一句又作麼生道擊拂子曰淬出七星光燦爛解拈天下任橫行上堂布網垂鈎闊長江不繫舟水寒魚不食特地過滄洲恁麼舉似著甚來由半夜黑風翻大海直得波濤絶點流上堂拈拄杖曰臨濟小廝兒未曾當頭道著今日全身放憨也要諸人知有遂擲拄杖下座上堂舉睦州示衆云諸人未得箇入處須得箇入處既得箇入處不得忘却老僧師曰恁麼説話面皮厚多少木庵則不然諸人未得箇入處須得箇入處既得箇入處直須揚下入處始得僧問須彌頂上翻身倒卓時如何曰未曾見毛頭星現云恁麼則傾湫倒嶽去也曰莫亂做僧便喝師曰雷聲浩大雨點全無南劒州劒門安分庵主號分禪少與木庵同肄業安國後依懶庵未有深證辭謁徑山大慧禪師行次江于仰瞻宮闕聞街司喝侍郎來釋然大悟作偈曰幾年箇事挂𮌎懷問盡諸方眼不開肝膽此時俱決盡一聲江上侍郎來徑回西禪懶庵迎之付以伽梨自爾不規所寓後庵居劒門化被嶺表學者從之所作偈頌走手而成凡千餘首盛行於世示衆曰這一片田地汝等諸人且道天地未分已前在甚麼處直下徹去已是鈍置分上座不少了也更若擬議思量何啻白雲萬里驀拈拄杖打散大衆示衆上至諸佛下及衆生性命總在山僧手裏撿點將來有沒量罪過山僧亦有沒量罪過還有檢點得出者麼卓拄杖一下曰冤有頭債有主遂左顧右視曰自出洞來無敵手得饒人處且饒人示衆十五日已前天上有星皆拱北十五日已後人間無水不朝東已前已後總拈却到處鄉談各不同屈指曰一二三四五六七八九十十一十二十三十四諸兄弟且道今日是幾良久曰本店買賣分文不賖東禪蒙庵思嶽禪師法嗣福州鼓山宗逮禪師上堂曰世尊道應如是知如是見如是信解不生法相遂喝曰至本無瑕却有瑕開善密庵道謙禪師法嗣建寧府仙州山吳十三道人者每以己事扣諸禪及開善歸結茅於其左遂往給侍紹興庚申三月八日夜適然啓悟占偈呈善曰元來無縫罅觸著便光輝既是千金寶何須彈雀兒善答曰焠地折時真慶快死生凡聖盡平沉仙州山下呵呵笑不負相期宿昔心東林卍庵道顏禪師法嗣荊南府公安遁庵祖珠禪師南平人也依卍庵之久一日入室次庵問僧云如何是佛麻師聞頓契有偈曰機前一句子用處不留情如撞幢子弩箭箭中紅心後開法公安四衆歸仰上堂曰不是心不是佛不是物瀝盡野狐涎耀翻山鬼窟平田淺草裏露出焦尾大蟲大虗寥廓中放出遼天俊鶻阿呵呵露風骨等間拈出衆人前畢竟分明是何物咄咄上堂玉露垂青草金風動白蘋一聲寒鴈叫喚起未惶人上堂燕子深談實相善説法要可惜玄沙老人漏泄向上一竅自從一見桃華後直至如今更不疑禪客相逢只彈指此心能有幾人知大衆這兩箇老漢一人撥動天關一人掀翻地軸山僧輒爾效顰敢繼渠儂高躅蒼鷹爪下分餐猛虎口中奪肉一句當機千足萬足君不見古人有言兮逢船便渡得路便行要會箇中意日午打三更拍禪床下座汀州報恩法演禪師果州人也上堂舉俱胝竪指師曰佳人睡起懶梳頭把得金叉插便休大抵還他肌骨好不塗紅粉自風流教心晦庵彌光禪師法嗣泉州法石中庵慧空禪師贛城贛縣人族蔡氏少為書生年三十六投郡之觀音院下髮往依仰山祖禪師有省次參翠巖廣照燈禪師燈與語鋒投俾典翰墨辭謁大慧於徑山宿疑盡去屬慧貶衡陽遂入問見鼓山圭淨衆嶽皆蒙印可後抵教忠一日入室聞舉女子出定話擬踵門忽大悟乃曰自携瓶去沽村酒却著衫來作主人忠曰中間底是阿誰師禮拜便出忠哂之紹興己巳會忠移住龜山以師繼席後遷大安及崇福乾道丁亥謝事寓雪峰東庵洋嶼雲門庚申春泉守龍學王公十朋挽居法石受請日上堂曰雲門山中劄硬寨已是經年洋嶼江頭未見有毛頭星出現舉手攀南斗回身倚北辰等間拋出東山暗號驗盡天下野狐當機覿面不相饒喝下跛驢成隊走是以藥山道未有長行而不住未有長住而不行欲益無所益欲為無所為宜作舟航無久住此咄古人大似以隋珠彈雀用趙璧抵烏恁麼要續如來正法大似鄭州出曹門且道雲門庵主今日赴法石請為人底句作麼生道八十翁翁輥繡毬直從洋嶼江心過春日上堂拈拄杖卓一下曰先打春牛頭又卓一下曰後打春牛尾驚起虗空入藕絲裏釋迦無路潛蹤彌勒急走千里文殊却知落處撫掌大笑歡喜且道他歡喜箇甚麼春風昨夜入門來便見千華生碓觜上堂舉芭蕉示衆曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子師曰要識芭蕉用處麼更將歸去夢説與欲行人上堂千家樓閣一霎祕風只知襟袖涼生不覺園林落葉於斯薦得觸處全真其或未然且作寒溫相見上堂舉金剛經云佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心要會麼春風得意馬蹄疾一日看盡長安華僧問先佛垂範禁足安居未審是何宗旨曰琉璃鉢門托須彌僧便喝師便打問知師久韞囊中寶大衣臨筵乞借看曰猛虎畫蛾眉云今日小出大遇也曰劒去久矣不須刻舟云只如真覺示衆道南山有條鱉鼻蛇汝等諸人切須好看未審此意如何曰黑雲遮古路云長慶道今日堂中大有人喪身失命意作麼生曰抱劒入桑林云只如雲門將拄杖攛向雪峰面前峰作怕勢又且如何曰一家有事百家忙云玄沙道用南山作麼聻曰也要大家知云古人恁麼提持成得甚麼邊事曰兩兩三三成羣作隊問禾山四打鼓意旨如何曰下下打著云打著後如何曰不在鼓聲中頭頭皆漏泄云雪峰見僧來連輥出三箇毬子又且如何曰兄弟添十字云學人未曉乞師再指曰退步思量愁殺人淳熙甲午春偶微恙寶文傳公自得赴漕江左聞而省之值師偃息即召曰和尚惺惺著師應曰已與侍郎相見了也傳曰一釣便上師曰也不可放過傳謂侍僧曰誰言渠病師曰雪上加霜翊日剃沐更衣書偈已端然坐亡乃三月二十三日也闍維數珠不壞獲設利五色窆于東山之鉢那塔壽六十九臘四十有三臨安府淨慈混源曇密禪師天台人族盧氏年十二去家師資福道榮十六圓具習台教棄依大慧於徑山未幾往謁雪巢一此庵元入門留東西禪無省遂之泉南教忠求決於晦庵俾悅衆會解事歸前資偶舉香嚴擊竹因緣豁然契悟述偈呈庵與賢沙未徹語詰之無滯庵曰子今始可見妙喜矣即禮辭至梅陽服勤四載乾道辛卯出住苕溪上方次遷台城紫籜鴻福萬年淳熙甲辰夏詔居淨慈上堂諸佛出世打劫殺人祖師西來吹風放火古今善知識佛口蛇心天下衲僧自投籠檻莫有天然氣槩特達丈夫為宗門出一隻手主張佛法者麼良久曰設有也須斬為三段上堂德山小參不答話千古叢林成話霸問話者三十棒慣能説訶説夯時有僧出的能破的德山便打風流儒雅某甲話也未問頭上著枷腳下著匣你是那裏人一回相見一傷神新羅人把手笑欣欣未踏船舷好與三十棒依前相廝誑混源今日恁麼批判責情好與三十棒且道是賞是罰具參學眼者試請辨看戊申十二月望偈書入寂壽六十九臘五十四西禪此庵守淨禪師法嗣福州乾元宗頴禪師上堂卓拄杖曰性燥漢只在一槌遂靠拄杖曰靈利人不勞再舉而今莫有靈利底麼良久比擬張麟兔亦不遇天童應庵曇華禪師法嗣慶元府天童密庵咸傑禪師七閩福清人也上堂曰牛頭橫説竪説不知有向上關捩子有般漆桶輩東西不辨南北不分便問如何是向上關捩子何異開眼尿床華藏有一轉語不在向上向下千手大悲摸索不著雨寒無處曬眼今日普請布施大衆良久曰達磨大師無當門齒上堂世尊不説説拗曲作直迦葉不聞聞望空啓告馬祖即心即佛懸羊頭賣狗肉趙州勘庵主貴買賤賣分文不直只如文殊是七佛之師因甚出女子定不得河天月暈魚分子槲葉風微塵養茸上堂卓拄杖曰迷時只迷這箇復卓一下曰悟時只悟這箇迷悟雙忘糞掃堆頭重添榼𢶍莫有向東涌西沒全機獨脫處道得一句底麼若道不得華藏自道去也擲拄杖曰三十年後上堂舉死心和尚示衆云一人所在要須到半人所在也須到無人所在亦須親到一回召大衆曰三邊一箭收功後四海何愁不太平南書記者三山人久依應庵於趙州狗子無佛生話豁然契悟有偈曰狗子無佛性羅睺星入命不是打殺人被人殺打定庵見喜其脫略紹興末終於歸宗道場無庵法全禪師法嗣常州華藏伊庵有權禪師上堂曰今朝結却布袋口明眼衲僧莫亂走心行滅處解翻身噴嚏也成師子吼栴檀林任馳驟剔起眉毛頂上生剜肉成瘡露家醜上堂禪禪無黨無偏迷時千里隔悟在口皮邊大溈行禪師法嗣常德府德山涓禪師潼川人也上堂橫拄杖曰一二三四五六七七六五四三二一循環逆順數將來數到未來無盡日因七見一見一亡七踏破大虗空鐵牛也汗出絶氣息無蹤迹擲拄杖曰更須放下這箇始是參學事畢上堂見見之時見非是見見猶離見見不能及遂喝曰鯨吞海水盡露出珊瑚枝衆中忽有衲僧出來道長老休寐語却許伊具一雙眼上堂拈拄杖曰有時奪人不奪境拄杖子七縱八橫有時奪境不奪人山僧七顛八倒有時人境兩俱奪拄杖子與山僧削迹吞聲有時人境俱不奪卓拄杖曰伴我行千里携君過萬山忽若撞著臨濟大師時如何師喝曰未明心地印難透祖師關雙林用禪師法嗣婺州三峰卯禪師上堂舉野狐話曰不落不昧誣人之罪不昧不落無繩自縛可憐柳絮隨春風有時自西還自東音釋玿音韶遁音鈍音鬼昉音倣騅音錐瀏音留纇盧對切參音森焠七內切肄羊至切贛音紺霎山洽切韞音蘊籜音託槲音斛嚏音帝
