body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十三世臨濟九世黃龍二世黃龍寶覺晦堂祖心禪師法嗣隆興府黃龍死心悟新禪師韶之曲江人以慶曆三年二月二十九日生於黃氏有紫肉羃左肩右袒如僧伽梨狀白光照室襁褓而未甞號啼稍長頴脫壯依佛陀院德修祝髮進具已謂朋舊曰為僧當慕世出世法安可汩汩於鄉井中遂杖笠游方熈寧八年至黃龍謁晦堂堂竪拳問曰喚作拳頭則觸不喚作拳頭則背汝喚作甚麼師罔措經二年方領解然尚談辯無所牴牾堂患之偶與語至其銳堂遽曰住住說食豈能飽人師窘乃云某到此弓折箭盡望和尚慈悲指箇安樂處堂曰一塵飛而翳天一芥墮而翳地安樂處政忌上座許多骨董直須死却無量劫來全心乃可耳師趨出一日默坐下板聞知事撫行者而迅雷忽震即大悟趨見晦堂忘納其屨即自譽曰天下人總是參得底禪某是悟得底堂笑曰選佛得甲科何可當也因號死心叟執侍扶翊凡一十八秋不自疲厭始命分座後徧登諸老之門機語超絕元祐七年出住雲岩紹聖四年徙翠岩政和初居黃龍上堂曰深固幽遠無人能到釋迦老子到不到若到因甚麼無人若不到誰道幽遠上堂祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是金果早朝猿摘去玉華晚後鳳㘅歸上堂德山入門便棒臨濟入門便喝也是作賊人心虗雲岩入門亦不棒亦不喝且道用箇甚麼幾度敲門招不出翻身直入裏頭看上堂行脚高人解開布袋放下鉢囊去却藥忌一人所在須到半人所在須到無人所在也須親到上堂拗折拄杖將甚麼登山渡水拈却鉢盂匙筯將甚麼喫粥喫飯不如向十字街頭東卜西卜忽然卜著是你諸人有彩若卜不著也怪雲岩不得上堂文殊騎師子普賢騎象王釋迦老子足躡紅蓮且道黃龍騎箇甚麼良久曰近來年老一步是一步上堂有時破二作三有時會三歸一有時三一混同有時不落數量且道甚麼處是黃龍為人處良久曰珍重上堂麤言及細語皆歸第一義你這一隊溺床鬼子三生六十劫也未夢見第一義在上堂古人道藏人不藏照藏照不藏人人照俱藏人照俱不藏後來舉者甚多明者極少黃龍今日不惜眉毛與你諸人說破藏人不藏照鷺鶿立雪非同色藏照不藏人明月蘆華不似他人照俱藏了了了時無可了人照俱不藏玄玄玄處亦須呵復曰會麼殷勤為唱玄中曲空裏蟾光撮得麼上堂清珠下於濁水濁水不得不清念佛投於亂心亂心不得不佛佛既不亂濁水自清濁水既清功歸何所良久曰幾度黑風翻大海未曾聞道釣舟傾僧問如何是四大毒虵曰地水火風云如何是地水火風曰四大毒虵云學人未曉乞師方便曰一大既爾四大同問弓箭在手智刃當鋒龍虎陣圓請師相見曰敗將不斬云恁麼則銅柱近標脩水側鐵關高鏁鳳凰峰曰不到烏江未肯休云若然者七擒七縱正令全提曰棺木裏瞠眼僧禮拜師曰苦苦問承師有言老僧今夏向黃龍潭內下三百六十箇釣筒未曾遇著箇錦鱗紅尾為復是鈎頭不妙為復是香餌難尋曰雨過竹風清雲開山岳露云恁麼則已得真人好消息人間天上更無疑曰是鈎頭不妙是香餌難尋云出身猶可易脫體道應難曰亂統禪和如麻似粟問如何是黃龍接人句曰開口要罵人云罵底是接人句驗人一句又作麼生曰但識取罵人問如何是先照後用曰清風拂明月云如何是先用後照曰明月拂清風云如何是照用同時曰清風明月云如何是照用不同時曰非清風而無明月云若然者龍岫清風藏不得西安明月却相容曰貧無達士將金濟病有閑人說藥方室中問僧月晦之陰以五色彩著於瞑中令百千萬人夜視其色寧有辨其青黃亦白者麼僧無語師代曰箇箇是盲人又問僧大乘宗旨如何領會僧無對師曰譬如死人手執利刃截死人頭來呈似吾吾即許汝其為人若此至於去廣化神祠犧牷之祀碎雲岩輪藏碣之陰擲陳公妻孥記寂音留難皆師無作之功而致然也故道場嚴淨魔外革心不敢窺其藩籬政和五年春偶謂侍者曰今年有一件好事人莫之知眾罔測是歲十二月十三日就照默堂為法弟靈源清禪師置食次答故人書系之以頌是日巡寮薄暮小參勸諭學徒詞旨曲折仍說偈曰說時七顛八倒默時落二落三為報五湖禪客心王自在休參十四日下白石莊自書其閣曰安心并題脊記食和羅飯如常時食畢偃息日晡從者請歸師曰大千為家何以歸為眾譁然議云師臥不起殆病乎呼醫僧化冲至將診師叱之知藏慧宣云和尚到這裏且宜警省師曰川藞苴莫亂道言訖趺坐而化舁歸至法堂端嚴如在三日入龕遠近士庶嗚咽瞻仰以手探懷肌體尚暖二十二日茶毗眾得設利五色雪後有過其區所者獲之尤甚塔于晦堂丈室之北州壽七十有二夏臘四十有六隆興府黃龍佛壽靈源惟清禪師南州武寧人族陳氏方齠入學日誦千言風神瑩徹吾伊異比丘見之熟眎曰此兒苦海法船也以出家白其父母父母聽之去依戒律師年十七為大僧往謁延恩安禪師安指參寶覺師至黃龍雖與眾作息而問答茫然偶閱玄沙語倦即經行步促遺履俯取之乃大悟以告寶覺覺曰從緣入者永無退失於是名卿宿衲師友之屢以名山見邀堅不許淮南漕朱公京以舒之太平力請乃屑就道俗爭迎之次遷黃龍上堂曰鼓聲纔動大眾雲臻無限天機一時漏泄不辜正眼便合歸堂更待繁詞沈埋宗旨縱謂釋迦不出世四十九年說達磨不西來少林有妙訣修山主也似萬里望鄉關又道若人識祖佛當處便超越直饒恁麼悟入親切去更有轉身一路勘過了打以拂子擊禪床一下下座上堂江月照松風吹永夜清宵更是誰霧露雲霞遮不得箇中猶道不如歸復何歸荷葉團團團似鏡菱角尖尖尖似錐上堂三世諸佛不知有恩無重報狸奴白怙却知有功不浪施明大用曉大機絕蹤跡不思議歸去好無人知衝開碧落松千尺截斷紅塵水一溪上堂至道無難唯嫌揀擇但莫憎愛洞然明白祖師恁麼說話瞎却天下人眼識是非別緇素底衲僧到這裏如何辨明未能行到水窮處難解坐看雲起時師既託疾告閑居昭默堂十有五年頹坐一室而天下莫屈其高致然念宗徒墮在見聞嘗謂曰今之學者所造不能脫生死者病在甚麼處在偷心未死然非其罪乃師家之罪也如漢高帝紿韓信而殺之信雖曰死其心果死乎古之學者言下脫生死効在甚麼處在偷心已死然非學者自能實師家鉗錘妙密也如梁武帝御太殿見侯景不動聲氣而景之心已枯竭無餘然諸方所說非不美麗要知如趙昌𦘕華逼真非真華矣政和七年九月十八日食罷掩室門召以栖首座敘說決別起浴更衣以手指頂侍僧為淨髮安坐趨寂前十日作無生常住真歸告銘及遺訓數百言誡藏骨於海會示生死不與眾隔也門弟子不敢違其誡克奉之云隆興府泐潭草堂善清禪師南雄保昌人族何氏少依香雲寺法思元豐四年試經得度初謁大溈喆禪師次趨晦堂之席堂問不是風動不是幡動如何師佇思堂打出頃之再詣乞指南時有貓旁伏因謂師曰子見彼欲搏鼠乎雙目不瞬四足踞地首尾一直擬無不中子誠能如是心無異緣則六根自靜默默究之萬不失一師於是向來義學一掃無餘堂器許之政和乙未出住黃龍後居曹疎二山復移泐潭上堂曰色心不異彼我無差竪起拂子曰若喚作拂子入地獄如箭不喚作拂子有眼如盲直饒透脫兩頭也是黑牛臥死水上堂舉阿難問迦葉世尊傳金襴外別傳何法迦葉召阿難阿難應諾迦葉曰倒却門前剎竿著師曰剎竿未倒穿却諸人髑髏換却諸人眼睛剎竿倒後向甚麼處見釋迦老子參上堂法眼道識得凳子周匝有餘雲門道識得凳子天地懸殊雪竇道澤廣藏山狸能伏豹師曰三箇漢總是依他作解明昧兩岐不脫見聞如水中月黃龍即不然逼塞乾坤內開張日月新上堂湛水無波漚從風激風停漚滅水靜涵虗正當恁麼時設有燕金塞海蚊蚋搖山赬尾金鱗優游自適如今莫有辨浮沈識深淺垂輪擲釣者麼有即出來相見如無且歸巖下去同看月圓時上堂舉浮山遠和尚云欲得英俊麼仍須四事俱備方顯宗師蹊徑何謂也一者祖師巴鼻二者具金剛眼睛三者有師子爪牙四者得衲僧殺活拄杖得此四事方可縱橫變態任運卷舒高聳人天壁立千仞儻不如是守死善道者敗軍之兆何故棒打石人貴論實事是以到這裏得不脩江耿耿大野雲凝綠竹凝煙青山鏁翠風雲一致水月齊觀一句該通已彰殘朽師曰黃龍今日出世時當末季佛法澆漓不用祖師巴鼻不用金剛眼睛不用師子爪牙不用殺活拄杖只有一枝拂子以為蹊徑亦能縱橫變態任運卷舒亦能高聳人天壁立千仞有時逢強即弱有時遇貴即賤拈起則羣魔屏跡佛祖潛蹤放下則合水和泥聖凡同轍且道拈起好放下好竿頭絲線從君弄不犯清波意自殊僧問牛頭未見四祖時如何曰京三卞四云見後如何曰灰頭土面云畢竟如何曰一場懡㦬紹興壬戌上元後示微恙晦日出衣槖唱鬻書偈遺眾日將昳傳言諸寮可罷且謁逮夜漏盡三問侍者頗向曉否少選泊然而化眾哀慕火後睛舌堅淨如故設利明瑩大如珠顆其徒合靈骨塔於晦堂之側壽八十六臘六十二溫州護國寄堂景新禪師郡之樂清人族陳氏於崇德寺得度習台教游万謁三祖宗禪師宗器之後依晦堂始有深造堂一日竪拳擬問師亦竪拳曰是得皮是得髓堂笑而稱善大觀二年溫守章公憑請住江心普寂次居西山上堂曰有處若有瞎却天下人眼無處若無失却衲僧鼻孔古今成現不用針錐紫胡半夜高聲捉賊維那只得旁觀丹霞白日要見國師侍者但知其一且道本分相見合作麼生陌路相逢舜若多切忌額頭汗如雨上堂三界無法何處求心欲知護國當陽句且看門前竹一林僧問古曲無音韻如何和得齊曰石女著枷鏁云全非今日事只在未生前曰山僧不答這話云為甚麼不答曰有甚救處問我手何似佛手曰天空無四壁云我脚何似驢脚曰聞時九鼎重見後一毫輕云黃龍正派流入永嘉也曰勺卜聽虗聲紹興己未示寂塔于西山漳州保福本權禪師臨漳人也性質直而勇於道乃於晦堂舉拳處徹證根源機辯捷出山谷黃太史初有所入問晦堂此中誰可與語堂曰漳州權師方督役開田山谷同晦堂往致問曰直歲還知露柱生兒麼曰是男是女谷擬議師揮之堂謂曰不得無禮師曰這木頭不打更待何時谷大笑後歸里陸沈山寺郭功甫倅漳過山谷谷力稱彼有權道者深得晦堂之道公宜見之郭抵郡訪尋人無識者後得之命住保福上堂舉寒山偈曰吾心似秋月碧潭清皎潔無物堪比倫教我如何說老僧即不然吾心似燈籠點火內外紅有物堪比倫來朝日出東傳者以為笑黃龍死心見之歎曰權兄提唱若此誠不負先師所付囑也竟終於保福泗州龜山曉津禪師閩之連江人歷參宗匠機契未投晚依晦堂堂舉德山小參不答話闢之師聞脫然頴悟留侍日久初說法於西京石壁次徙龜山上堂曰摩竭掩室盡大地人被他熱瞞毗耶杜詞金毛師子敗闕不少便恁麼去大似停橈舉棹且向灣內泊船而今莫有喚不回頭底麼擔板禪和如麻似粟上堂田地穩密過犯彌天灼然擡脚不起神通游戲無瘡自傷特地下脚不得且道過在甚麼處具參學眼底出來共相理論要見本分家山不支岐路莫只管自家點頭蹉過歲月他時異日頂上一椎莫言不道崇寧三年八月十四日泊然而逝舒州天柱修靜禪師歲旦上堂曰北帝收威東君布政律初標於四氣爻已動於三陽山川無索寞之容草木有芬芳之意玉簪墜簷而河冰漸冸錦字橫漢而寒鴈將回熈熈萬里盡含春誰悟毗盧真境界大眾若向這裏悟徹去則許汝應時納祐與世均休踞兔角床握龜毛拂或縱或奪或晦或明饒益羣生得大自在若也未悟依例奔波添一歲滿身塵土傍人門吉州青原惟信禪師上堂曰老僧三十年前未參禪時見山是山見水是水及至後來親見知識有箇入處見山不是山見水不是水而今得箇休歇處依前見山只是山見水只是水大眾這三般見解是同是別有人緇素得出許汝親見老僧鄂州黃龍智明禪師上堂南北一訣斬釘截鐵切忌思量翻成途轍一日上堂眾纔集師乃曰不可更開眼說夢去也便下座僧問世尊說法魔界傾頹和尚開堂有何祥瑞曰一夜落華雨滿城流水香成都府海雲法琮禪師上堂亞身曰一雨灑乾坤我這裏為甚麼不濕便下座潭州道吾仲圓禪師上堂曰不是心不是佛不是物古人恁麼道譬如管中窺豹但見一斑設或入林不動草入水不動波亦如騎馬向冰凌上行若是射雕手何不向虵頭上措痒具正眼者試辨看良久曰鴛鴦繡出自金針漢州三聖繼昌禪師彭之九隴人族黎氏自少出關至黃龍即有趣入久之乃盡所疑歸住三聖遷雲居上堂曰木佛不度火甘露臺前逢達磨惆悵洛陽人未來面壁九年空冷坐金佛不度爐坐歎勞生走道途不向華山圓上看豈知潘閬倒騎驢泥佛不度水一道靈光照天地堪羨玄沙老古錐不要南山看鼈鼻上堂舉趙州訪二庵主師曰五陵公子爭誇富百衲高僧不厭貧近來世俗多顛倒只重衣衫不顧人舒州龍門純禪師上堂曰有箇漢自從曠大劫無住亦無依上無片瓦蓋頭下無寸土立足且道十二時中在甚麼處安身立命若也知得朝到西天暮歸唐土東林照覺總禪師法嗣隆興府泐潭應乾禪師上堂曰靈光洞輝逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛古人恁麼道殊不知是箇坑穽貼肉汗衫脫不去過不得直須如師子兒壁立千仞方能勦絕去然雖如是也是布袋裏老鵶拍禪床下座廬山開先廣鑑行英禪師東溪閑居示眾曰聯絡藤蘿一徑行窮始到松門籬畔野華不艶堂前流水非喧午飯龍離鐵鉢夜深月落金盆此是真修行處何人得意忘言靈山河沙聖眾黃梅七百高僧悟華曉稱迦葉傳衣夜喚盧能心自本來不有法道得了何曾齋後釅茶三盞叢林一任喧騰僧問如何是祖師西來意曰君山點破洞庭湖云意旨如何曰白浪四邊繞紅塵何處來問如何是道曰良田萬頃僧云不會師曰春不耕秋無望隆興府黃龍法鏡可僊禪師嚴陵陳氏子於長壽寺得度元豐間說法圓通次遷石霜黃龍僧問如何是佛法大意曰寸釘牛刀云學人不會曰參取不會底臨江軍慧力可昌禪師初自黃龍會中去依照覺獲證微密逾二十年出居慧力上堂曰佛法根源非正信妙智不能悟入祖師關鍵非大悲重願何以開通具信智則權實雙行如金在鑛全悲願則善惡可辨似月離雲大眾只如父母未生時許多譬喻向甚麼處吐露良久曰十語九中不如一默僧問如何是末後一句曰少林依位立馬祖喝嫌低云三十年後專為流通曰也不得草草問承師有言忍別三徵高臥者慚為一請便行人就中還有殽訛也無曰有人斷得許伊具眼云大眾臨筵乞師不吝師便打紹興府象田梵卿禪師嘉興華亭人族錢氏幼慧靜秉志純實弱冠投超果寺德強披削初游講聚後易服謁圓通秀又謁投子青久之青入滅往依照覺頓契機語歸省親道俗迎居白牛海慧遷永嘉靈峰及會稽象田上堂曰春已暮落華紛紛下紅雨南北行人歸不歸千林萬林鳴杜宇我無家兮何處歸十方剎土奚相依老夫有箇真消息昨夜三更月在池上堂佛法到此命若懸絲異目超宗亦難承紹竪起拂子曰賴有這箇堪作流通於此得便見三世諸佛向燈籠露柱裏轉大法輪六趣眾生於鐵圍山得聞法要聲非聲見色非色隨異類四生各得解脫如斯舉唱非但埋沒宗風亦乃平沈自已且道如何得不犯令去拍禪床下座僧問大悲菩薩用許多手眼作甚麼曰富嫌千口少云畢竟如何是正眼曰從來共住不知名問寒風乍起衲子開爐忽憶丹霞燒木佛因何院主落眉鬚曰張公喫酒李公醉云為復是逢強即弱為復是妙用神通曰堂中聖僧却諳此事問海慧有屠龍之劒欲借一觀時如何師以拄杖橫按示之僧便喝師擲下拄杖僧無語師曰這死蝦蟆問有佛處不得住無佛處急走過意旨如何曰穿靴衣錦云此外還更有也無曰緊帩草鞋問牛頭未見四祖時如何曰醯酸蚋聚云見後如何曰家破人亡問久響白牛未審牛在甚麼處曰掘地覔天云爭奈目前露逈逈地曰切忌見鬼云莫是和尚為人處麼曰會則直下承當不會則一任顛倒政和六年九月中休說偈曰五陰山頭乘駿馬一鞭䇿起疾如飛臨行莫問棲真處南北東西隨處歸言訖脫然坐逝四眾蟻至觀其容止安詳歎未曾有隆興府上藍希肇禪師僧問古者道修證即不無污染即不得未審是何宗旨曰不可更說道理去也云莫便是和尚為人處麼曰狂狗趂塊云只如禁足護生得何果報曰一月普現一切水云恁麼則他家得自由也曰好箇師僧却恁麼去慧圓上座開封酸棗于氏子世業農少依邑之建福寺德光為師性椎魯然勤渠祖道堅坐不臥居數歲得度出游廬山至東林每以己事請問朋輩見其貌陋舉止乖踈皆戲侮之一日行殿庭中忽足顛而仆了然開悟作偈俾行者書於壁曰這一交這一交萬兩黃金也合消頭上笠腰下包清風明月杖頭挑即日離東林眾傳至照覺覺大喜曰衲子參究若此善不可加令人迹其所往竟無知者大慧武庫謂證悟顓語非也黃檗真覺惟勝禪師法嗣成都府昭覺紹覺純白禪師上堂曰寒便向火熱即搖扇飢時喫飯困來打眠所以趙州庭前栢香岩嶺後松栽來無別用只要引清風且道畢竟事作麼生甲子乙丑海中金丙寅丁卯爐中火開元子琦禪師法嗣泉州尊勝有朋講師郡之南安人族蔣氏年二十試經中選下髮多歷教肆嘗疏楞嚴維摩等經學者宗之每疑祖師直指之道故多與禪衲游一日謁琦禪師於承天跡未及閫心忽領悟琦出遂問座主來作甚麼云不敢貴耳賤目曰老老大大何必如是云自是者不長曰朝看華巖夜讀般若則不問如何是當今一句云日輪正當午曰閑言語更道來云平生伏忠信今日任風波然雖如是只如和尚恁麼道有甚麼交涉須要新戒草鞋穿曰這裏且放你過忽遇達磨問你作麼生道朋便喝琦曰這座主今日見老僧氣衝午斗朋曰再犯不容琦撫掌大笑自爾師資契投後開法興福宣和六年九月二十一日說偈無疾而終雲蓋守智禪師法嗣湖州道場十同法如禪師衢之江山人族徐氏自開法五遷巨剎上堂曰知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物釋迦老子和身放倒後代兒孫如何接續要會麼通玄不是人間世滿目青山何處尋福州寶壽最樂禪師古田人也上堂曰諸佛不真實說法度羣生菩薩有智慧見性不分明白雲無心意灑為世間雨大地不含情能長諸草木若也會得猶存知解若也不會墮在無記去此二途如何即是海闊難藏月山深分外寒紹興府石佛解空慧明禪師僧問如何是寶相境曰三生鑿成云如何是境中人曰一佛二菩薩音釋瑃春椿襁居雨切褓音保溺與尿同瞠音鐺犧許羈切牷音全孥音奴藞盧下切苴七下切舁音餘齠音條鬻音育琮藏宗切勦子小切作剿非
