body:
  text: 平江府報恩光孝禪寺臣僧正受編南嶽第十三世臨濟九世黃龍二世泐潭真淨雲庵克文禪師法嗣隆興府兜率從悅禪師贛城人族熊氏兒時多病父母許為僧即愈悔而又病乃依郡西普圓院德嵩年十五下髮十六進具學止觀於賢法師賢曰子法船也吾學不足以成子當斆善財遍參知識由是多歷法社抵洞山一日入室於爭鋒之際倐然領悟後遊湖湘學者歸之俄領徒至鹿苑有清素首座者年逾八旬晦藏絶交往師食蜜漬荔子次素偶過門師謂曰此老兒鄉果也可同餉素曰自先師亡後不食此久矣曰先師為誰素曰慈明師聞駭然遂饋以餘果而日親之素忽問子所見何人曰洞山文和尚又問文所見何人曰黃龍老南素曰南匾頭見先師不久後來法道大振如此師益疑即持香展拜素避席曰吾雖侍先師十有三年以福鮮不許為人月餘師固請素曰以子勤渠致我違先師記子平生知解試以語我師具通所見素曰可以入佛而不能入魔曰何謂入魔素曰豈不見古人道末後一句始到牢關纍月始蒙印可素戒之曰文所示子者皆正知正見吾雖為子點破使子受用自在恐子離文太早不能盡其道他日切勿嗣吾元祐改元師首衆棲賢洪帥待制熊公伯通以兜率力挽開法而禪侶雲集上堂曰常居物外度清時牛上橫將竹笛吹一曲自幽山自緑此情不與白雲知慶快諸禪德翻思范蠡謾泛滄波因念陳摶空眠大華何曾夢見浪得高名實未神遊間漂野迹既然如此具眼衲僧莫道龍安非他是己好上堂拈一放一何得何失前三後三誰聖誰凡因思黃龍昔到慈明處吞盡玄微眉卓竪是何人是何人軟時歡喜硬時嗔咄一日漕使無盡居士張公商英按部過分寧請五院長老就雲巖説法師最後登座橫拄杖曰適來諸善知識橫拈竪放直立斜拋換步移身藏頭露角既於學士面前各納敗闕未免喫兜率手中痛棒到這裏不由甘與不甘何故見事不平爭忍得衲僧正令自當行卓拄杖下座上堂無法亦無心無心復何捨要真盡屬真要假全歸假平地上行船虗空裏走馬九年面壁人有口還如啞參上堂兜率雖無定度不踏聖賢舊路有時捩轉雙睛幾箇眉毛卓竪咄上堂夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止欲識佛去處只這語聲是諸禪客大小大傅大士只會抱橋柱澡洗把纜放船印板上打將來模子裏脫將去豈知道本色衲僧塞除佛祖窟打破玄妙門跳出斷常坑不依清淨界都無一物獨奮雙拳海上橫行建家立國有一般漢也要向百尺竿頭凝然端坐洎乎翻身之際捨命不得豈不見雲門大師道知是般事拈放一邊直須擺動精神著些筋骨向混沌未剖已前薦得猶是鈍漢那堪更於他人舌頭上咂啖淡味終無了日諸禪客要會麼剔起眉毛有甚難分明不見一毫端風吹碧落浮雲盡月上青山玉一團喝一喝下座僧問提兵統將須憑帝主虎符領衆匡徒密佩祖師心印如何是祖師心印曰滿口道不得云只這箇別更有曰莫將支遁鶴喚作右軍鵝問如何是兜率境曰一水挪藍色千峰削玉青云如何是境中人曰七凹八凸無人見百手千頭只自知室中設三關語以驗學者其一曰撥草瞻風只圖見性即今上人性在甚麼處其二曰識得自性方脫生死眼光落地時作麼生脫其三曰脫得生死便知去處四大分離向甚麼處去六年十一月三日浴訖集衆坐定囑纍已説偈曰四十有八聖凡盡殺不是英雄龍安路滑奄然而化其徒遵師遺誡欲火葬捐骨江中得法弟子無盡居士張公遣使持祭且曰老師於祖宗門下有大道力不可使來者無所起敬俾塔於龍安之乳峰臘三十有三大觀中諡曰真寂東京法雲佛照杲禪師自妙年遊方謁圓通璣禪師入室次璣舉僧問投子大死底人却活時如何子云不許夜行投明須到意作麼生師曰恩大難酬璣大喜命師首衆至晚為衆秉拂機遲而訥衆笑之師有赧色次日於僧堂點茶師慚甚因觸茶瓢墜地見瓢跳乃得應機三昧後依真淨一日讀祖師偈曰心同虗空界示等虗空法證得虗空時無是無非法豁然大悟後謂人曰我於紹聖三年十一月二十一日悟得方寸禪出住歸宗久之詔居淨因上堂曰西來祖印教外別傳非大根器不能證入其證入者不被文字語言所轉聲色是非所迷亦無雲門臨濟之殊趙州德山之異所以唱道須明有語中無語無語中有語若向這裏薦得可謂終日著衣未嘗挂一縷絲終日喫飯未嘗咬一粒米直是呵佛罵祖有甚麼過雖然如是欲得不招無間業莫謗如來正法輪喝一喝下座上堂拈拄杖曰歸宗會斬蛇禾山解打鼓萬象與森羅皆從這裏去擲下柱杖曰歸堂喫茶師以力參深到語不入時每示衆嘗舉老僧熙寧八年文帳在鳳翔府供申當年崩了華山四十里壓倒八十村人家汝輩後生茄子瓠子幾時知得或問云寶華王座上因甚麼一向世諦師曰癡人佛性豈有二種耶僧問達磨西來傳箇甚麼曰周秦漢魏問如何是透法身句北斗裏藏身意旨如何曰赤心片片云若是學人即不然曰汝又作麼生云昨夜擡頭看北斗依稀却似點糖糕曰但念水草餘無所知桂州壽寧善資禪師上堂曰若論此事如鴉鐵牛無下口處無用心處更向言中問覓句下尋思縱饒卜度將來翻成戲論邊事殊不知本來具足直下分明佛及衆生纖毫不立尋常向諸人道凡夫具足聖人法凡夫不知聖人具足凡夫法聖人不會聖人若會即同凡夫凡夫若知即是聖人然則凡聖一致名相互陳不識本源迷其真覺所以逐境生心徇情附物苟能一念情忘自然真常體露良久曰便請薦取南嶽祝融上封慧和禪師上堂曰未升此猊座已前盡大地人成佛已畢更有何法可説更有何生可利況菩提煩惱本自寂然生死涅槃猶如昨夢門庭施設誑呼小兒方便門開羅紋結角於衲僧面前皆成幻惑且道衲僧有甚麼長處拈起拄杖曰孤根自有擎天勢不比尋常曲彔枝卓拄杖下座筠州五峰淨覺本禪師上堂僧問寶座既升願聞舉唱曰雲裏梅華火裏開云莫便是為人處也無曰井底紅塵已漲天問同聲相應時如何曰鵓鳩樹上啼云同氣相求時如何曰猛虎巖前嘯問一進一退時如何曰腳在肚下云如何是不動尊曰行住坐臥永州太平安禪師上堂以拄杖卓一下曰還會麼空王佛已前之事太平今日一時漏泄了也還委悉麼一大藏教未常切著佛之一字尚污心田豈況其餘若也未然且聽太平葛藤擲拄杖下座潭州報慈進英禪師上堂曰報慈有一公案諸方未曾結斷幸遇改旦拈出各請高著眼看遂躍下一隻鞋云還知麼達磨西歸時提攜在身畔上堂與麼上來猛虎出林與麼下去毒蛇入草不上不下日輪杲杲喝曰瀟湘江上碧溶溶出門便是長安道筠州洞山至乾禪師潭之瀏陽人嘗謁真淨於歸宗令看狗子無佛性話一夕危坐聞鐘鳴了然悟達後住洞山上堂曰洞山不會談禪不會説道只是飢來喫飯困來打眠你諸人必然別有長處試出來盡力道一句看有麼有麼良久曰睦州道底隆興府泐潭湛堂文準禪師興元唐固人族梁氏師襁褓中見佛像輒笑甫八齡不喜酒胾偶金仙寺虗普乞食至家師譍門酬酢有老成相乃辭親從普普授以法華一日輒記元豐以籍名先後試所集師雖甚精主司以年幼不得度陝西經略范公一日過普次與師語大悅欲携與俱師辭曰登山求玉入海求珠人各有志本行學道世好非素心范即為剃染往依梁山乘禪師乘呵曰驅烏未受戒敢學佛乘師捧手曰壇場是戒耶三疊羯磨是戒耶阿闍梨是戒耶乘大驚師曰雖然敢不受教遂登具於唐安律師繼遊成都講聚倡諸部綱目遽棄曰吾不求甚解法師曇演拊師曰真棟梁材也南方有亞聖大士若溈山真如九峰真淨者宜往求之竟與同學志恭詣溈山久之不契造九峰見真淨於投老庵淨問曰甚處來云興元府曰近離甚處云大仰曰夏在甚處云溈山淨展手曰我手何似佛手師惘然淨叱曰適來祗對句句無絲毫差錯靈明天真才説箇佛手便成隔礙病在甚麼處云不會曰一切現成更教誰會服勤十載所往必隨紹聖三年真淨移居石門衆益盛凡衲子扣問但瞑目危坐無所示見來學則往治蔬圃率以為常師謂恭曰老漢無意於法道乎一日舉杖決渠水濺衣因大悟淨詬曰此中乃敢用藞苴耶自此迹愈晦而名益著顯謨李公景直守豫章請開法雲岩未幾移居泐潭上堂曰五九四十五聖人作而萬物覩秦時𨍏輅鑽頭尖漢祖殿前樊噲怒曾聞黃鶴樓崔皓題詩在上頭晴川歷歷漢陽戍芳草萋萋鸚鵡洲可知禮也君子務本本立而道生道生一一生二二生三三生萬物驀拈拄杖起身立云大衆寶峰何似孔夫子良久曰酒逢知己飲詩向會人吟卓拄杖下座上堂劄久雨不晴直得五老峯頭黑雲靉靆洞庭湖裏白浪滔天雲門大師忍俊不禁向佛殿裏燒香三門頭合掌禱祝呪願願黃梅石女生兒子母團圓少室無角鐵牛常甘水草喝一喝曰有甚麼交涉顧衆曰不因楊得意爭見馬相如上堂混元未判一氣岑寂不聞有天地玄黃宇宙洪荒日月盈昃秋收冬藏正當恁麼時也好箇時節叵耐雪峰老漢却向虗空裏釘橛輥三箇木毬直至後人構占不上便見溈山水牯牛一向膽大心粗長沙大蟲到處咬人家豬狗雖然無禮難容而今且放過一著孝經序云朕聞上古其風朴略山前華堯民解元且喜尊候安樂參上堂今朝臘月十夜來天落雪群峰極目高低白緑竹青松難辨別必是來年蠶麥熟張公李公皆欣悅皆欣悅鼓腹謳歌笑不徹把得雲簫撩亂吹依稀有如楊柳枝又不覺手之舞之足之蹈之左之右之喝曰禪客相逢只彈指此心能有幾人知上堂大陽門下日日三秋明月堂前時時九夏洞山和尚只解夜半捉烏雞殊不知驚起鄰家睡寶峰相席打令告諸禪德也好冷處著把火咄上堂古人道不看經不念佛看經念佛是何物自從識得轉經人舉拂子曰龍藏賢聖都一拂師以拂子拂一拂曰諸禪德正當恁麼時且道雲岩土地向甚麼處安身立命擲下拂子以兩手握拳叩齒曰萬靈千里千靈萬聖上堂僧問承教有言若有一人發真歸源十方虗空悉皆消殞未審此理如何師遂展掌點指曰子丑寅卯辰巳午未一羅二土三水四金五太陽六太陰七計都今日計都星入巨蟹宮寶峰不打這鼓笛便下座問教意即且致未審如何是祖意曰煙村三月裏別是一家春問寒食因悲郭外春墅田無處不傷神林間壘壘添新冢半是去年來哭人這事且拈放一邊如何是道曰蒼天蒼天云學人特伸請益曰十字街頭吹尺八村酸冷酒兩三循問一法若有毗盧墮在凡夫萬法若無普賢失其境界去此二途請師一決曰大黃甘草云此猶是學人疑處曰放待冷時看問向上一路千聖不傳未審如何云向上一路曰行到水窮處坐看雲起時云為甚麼不傳曰家家有路透長安云只如衲僧門下畢竟作麼生曰放你三十棒師自浙回泐潭謁深禪師尋命分座聞有悟侍者見所擲㸑餘有省詣方丈通所悟深喝出因喪志自經於延壽堂廁後出沒無時衆憚之師聞中夜特往登溷方脫衣悟即提淨水至師曰待我脫衣脫罷悟復至未幾悟供籌子師滌淨已召接淨桶去悟擬接師執其手問曰汝是悟侍者那悟曰諾師曰是當時在知客寮見掉下火柴頭有箇悟處底麼參禪學道只要知箇本命元辰下落處汝剗地作此去就汝在藏殿移首座鞋豈不是汝當時悟得底又在知客寮移他枕子豈不是汝當時悟得底汝每夜在此提水度籌豈不是汝當時悟得底因甚麼不知下落却在這裏惱亂大衆師猛推之索然如倒壘甓由此無復見者政和五年夏師臥病進藥者令忌毒物師不從之有問其故曰病有自性乎云病無自性曰既無自性則毒物寧有心哉以空納空吾未嘗顛倒汝輩一何昏迷十月二十二日更衣説偈而化世壽五十有五僧臘三十有六闍維得設利晶圓光潔道俗千餘人皆獲之睛齒數珠不壞塔于南山之陽德安府文殊宣能禪師上堂曰石鞏箭祕魔叉直下會得眼裏空華堪悲堪笑少林客暗携隻履渡流沙僧問如何是祖師燈曰四生無不照一點任君看廬山慧日文雅禪師受請日僧問向上宗乘乞師不吝曰拄杖正開封云小出大遇也曰放過即不可便打筠州洞山梵言禪師太平州人也上堂曰吾心似秋月碧潭清皓潔無物堪比倫教我如何説寒山子勞而無功更有箇拾得道不識這箇意修行徒苦辛恁麼説話自救不了常尋拈糞箕把掃帚掣風掣顛猶較些子直饒是文殊普賢再出若到洞山門下一時分付與直歲燒火底燒火掃地底掃地前廊後架切忌攙匙亂筯豐干老人更不饒舌參退喫茶上堂一生二二生三遏捺不住廓周沙界德靈直上妙峰善財却入樓閣新婦騎驢阿家牽山青水緑桃華紅李華白一塵一佛土一葉一釋迦乃合掌曰不審諸佛子今辰改旦季春極暄起居輕利安樂行否少間專到諸寮問訊不勞久立上堂臘月二十日一年將欲盡萬里未歸人大衆總是他鄉之客還有返本還源者麼擊拂子曰門前殘雪日輪消室內紅塵遣誰掃上堂有一物上拄天下拄地若也築著磕著便乃轉凡成聖超佛越祖衲僧一動一靜舉足下足須彌屹屹土上加泥咄解夏上堂應緣數剎皆居山寺唯此夏天寧偶當藩府長沙要會之地天寧賴國法禁制庶幾僧人可居每戒禪徒各須禁足吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝大衆若謂舉首楞嚴經却非自恣之日也參僧問如何是祖師西來意曰真鍮不博金云莫便是和尚為人處也無曰幾處松聲似爾聲云爭奈一言已出曰猶欠注腳在問幸值作家相見擬伸一問時如何曰青山不擬白雲飛云可謂伯牙與子期不是間相識曰重説偈言云爭奈流水有知音曰也是剜肉作瘡問如何是一真法界曰杲日照長空云如何是無量妙門曰海嶽鎮乾坤云得聞於未聞也曰波斯摸大象問梵王請佛天雨四華太守請師有何祥瑞曰柳條垂宿雨華藥綻初晴一日上堂有二僧齊出一僧禮拜一僧便問得用便用時如何曰伊蘭作旃檀之樹云有意氣時添意氣不風流處也風流曰甘露乃蒺䔧之園平江府寶華佛慈普鑑禪師本郡人族周氏齠齔不茹葷依景德寺清智下髮十七遊方初謁覺印英禪師不契遂扣真淨之室淨舉石霜虔侍者話問之釋然契悟作偈曰枯木無華幾度秋斷雲猶拄樹梢頭自從鬪折泥牛角直至如今水逆流淨肯之命侍巾鉢晚徇衆開法寶華次移高峰上堂曰參禪別無奇特只要當人命根斷疑情脫千眼頓開如大洋海底輥一輪赫日上升天門照破四天之下萬別千差一時明了便能握金剛王寶劒七縱八橫受用自在豈不快哉其或見諦不真影像倣佛尋言逐句受人指呼驢年得快活去不如屏淨塵緣竪起脊梁骨著些精彩究教七穿八穴百了千當向水邊林下長養聖胎亦不枉受人天供養然雖如是臥雲門下有箇鐵門限更須猛著氣力跳過始得擬議之間墮坑落塹以拂子擊禪床下座上堂月圓伏惟三世諸佛狸奴白牯各各起居萬福時中淡薄無可相延切希寬抱老水牯牛近日亦自多病多惱不甘水草遇著暖日和風當下和身便倒教渠拽把牽犂直是搖頭擺腦可憐萬頃良田一時變為荒草紹興甲子八月十日書數紙以戒門弟子莞爾而逝筠州九峰希廣禪師遊方日謁雲蓋智和尚乃問興化打克賓維那意旨如何智下禪床展兩手吐舌示之師打一坐具智曰此是風力所轉又問石霜琳禪師琳曰儞意作麼生師亦打一坐具琳曰好一坐具只是不知落處又問真淨淨曰儞意作麼生師復打一坐具淨曰他打儞也打師於言下大悟淨因有頌曰丈夫當斷不自斷興化為人徹底漢已後從教眼自開棒了罰錢趂出院後住九峰衲子宗仰筠州黃檗泉禪師上堂以拂子擊禪床曰一槌打透無盡藏一切珍寶吾皆有拈來普濟貧乏人免使波吒路邊走遂喝曰誰是貧乏者有本小異筠州清涼寂音慧洪禪師郡之新昌人族彭氏續僧寶傳誤作喻年十四父母俱亡乃依三峰靘禪師為童子日記數千言覽群書殆盡靘器之十九試經於東京天王寺得度從宣祕講成實唯識論逾四年棄謁真淨於歸宗淨遷石門師隨至淨患其深聞之弊每舉玄沙未徹之語發其疑凡有所對淨曰你又説道理耶一日頓脫所疑述偈示同學曰靈雲一見不再見紅白枝枝不著華叵耐釣魚船上客却來平地摝魚蝦淨見為助喜命掌記室未久去謁諸老皆蒙賞音由是名振叢林顯謨朱公彥請開法於北禪景德後住清涼示衆舉首楞嚴如來語阿難曰汝應嗅此爐中旃檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生旃檀木生於汝鼻為生於空阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非旃檀云何鼻中有旃檀氣稱汝聞香當於鼻入鼻中出香説聞非義若生於空空性常恆香應常在何藉爐中爇此枯木若生於木則此香質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠四十里內云何已聞是故當知香鼻與聞俱無處所即嗅與香二處虗妄本非因緣非自然性師曰入此鼻觀親證無生又大智度論問曰聞者云何聞用耳根聞耶用耳識聞耶用意識聞耶若耳根聞耳根無覺識知故不能聞若耳識聞耳識一念故不能分別不應聞若意識聞意識亦不能聞何以故先五識識五塵然後意識識意識不能識現在五塵唯識過去未來五塵若意識能識現在五塵者盲聾人亦應識聲色何以故意識不破故師曰究此聞塵則合本妙既證無生又合本妙舉竟是何境界良久曰白猿已叫千岩晚碧縷初橫萬字爐住景德日僧問南有南景德北有北景德德即不問如何是景曰頸在項上崇寧二年會無盡居士張公於峽之善溪張嘗自謂得龍安悅禪師末後句叢林畏與語因夜話及之曰可惜雲庵不知此事師問所以張曰商英頃自金陵酒宮移知豫章過歸宗見之欲為點破方敘悅末後句未卒此老大怒罵曰此吐血禿下脫空妄語不得信既見其盛怒更不欲敘之師笑曰相公但識龍安口傳末後句而真藥現前不能辨也張大驚起執師手曰老師真有此意耶曰疑則別參乃取家藏雲庵頂相展拜贊之書以授師其詞曰雲庵綱宗能用能照天鼓希聲不落凡調冷面嚴眸神光獨耀孰傳其真覿面為肖前悅後洪如融如肇大慧禪師處衆日嘗親依之每歡其妙悟辨慧建炎二年五月示寂于同安壽五十有八臘四十太尉郭公天民奏賜椹服號寶覺圓明所著僧寶傳三十卷僧史十二卷智證十卷志林十卷楞嚴尊頂法論十卷法華合論七卷圓覺證義二卷金剛法源論一卷起信解義一卷易注三卷林間録二卷冷齋十卷禁臠二卷文字禪三十卷甘露集三十卷衢州超化靜禪師上堂聲前認得已涉廉纖句下承當猶為鈍漢電光石火尚在遲疑點著不來橫尸萬里良久曰有甚用處咄南嶽石頭懷志菴主婺之金華人族吳氏年十四師智慧院寶稱二十二試所習落髮肄講十二年宿學敬慕嘗欲會通諸宗正一代時教有禪者問曰杜順乃賢首宗祖師也談法身則曰懷州牛喫禾益州馬腹脹此偈合歸天台何義耶志無對即出遊方晚至洞山謁真淨問古人一喝不作一喝用意旨如何淨叱之志趨出淨笑呼曰浙子齋後遊山好志忽領悟久之辭去淨曰子所造雖逸格惜緣不勝耳因識其意自爾諸方力命出世師却之庵居二十年不與世接士夫踵門略不顧有偈曰萬機休罷付癡憨蹤迹時容野鹿參不脫麻衣拳作枕幾生夢在緑蘿庵或問住山多年有何旨趣曰山中住獨掩柴門無別趣三塊柴頭品字煨不用援毫文彩露崇寧改元冬曳杖造龍安人莫之留明年六月晦問侍僧日早暮云已夕矣遂笑曰夢境相逢我睡已覺汝但莫負叢林即是報佛恩德言訖示寂於最樂堂茶毗收骨塔于乳峰之下壽六十四夏四十三婺州雙溪印首座自見真淨徹證宗猷歸遁雙溪一日偶書曰折腳鐺兒謾自煨飯餘長是坐堆堆一從近日生涯拙百鳥銜華去不來又以觸衣碎甚作偈曰不挂寸絲方免寒何須特地裊長竿而今落落零零也七佛之名甚處安雲居元祐禪師法嗣亳州白藻清儼禪師信之玉山人僧問楊廣失槖駝到處無人見未審是甚麼人得見師以拂子約曰退後退後妨他別人所問云畢竟落在甚麼處曰可煞不識好惡便打臨江軍慧力崇教禪師僧問佛力法力即不問如何是慧力曰推倒人我山扶起菩提樹云菩提本無樹和尚向甚麼處下手曰田厙奴信州永豐慧月庵主縣之丘氏子丱歲出家於明心寺得度自機契雲居熟遊湘漢暨歸永豐或處巖谷或居市鄽令鄉民稱丘師伯凡有所問以莫曉答之一日語邑人曰吾明日行腳去汝等可來相送於是賮路者畢集月笑不已衆問其故即書偈曰丘師伯莫曉寂寂明皎皎日午打三更誰人打得了投筆而逝石霜琳禪師法嗣𭐱府臥龍思順禪師綿州人也上堂僧問我手何似佛手曰潘閬倒騎驢云我腳何似驢腳曰白雲深處居云人人有箇生緣如何是和尚生緣曰九九八十一僧禮拜師乃曰我手何似佛手覿面相呈已了頂門眼若未開切忌隨他亂走我腳何似驢腳擬議思量已錯要見宗師端的薦取頭上一著人人有箇生緣分明只在目前迦葉嶺頭雲起澗下緑水潺潺仰山行偉禪師法嗣襄陽府谷隱靜顯禪師僧問覿面相呈事若何曰清風來不盡云通上徹下絲毫不納也曰明月照無私問文彩既彰願聞舉唱曰巡海夜叉頭戴角云祇園五葉華開處不屬東君別是春曰重疊關山路問一鏃破三關即不問道人相見時如何曰賊身已露泐潭洪英禪師法嗣南嶽法輪齊添禪師上堂良久曰性靜情逸遂喝曰心動神疲顧左右曰守真志滿拈拄杖曰逐物意移召衆曰見怪不怪其怪自壞僧問學人上來乞師指示曰汝適來聞鼓聲麼云聞曰還我話頭來僧禮拜師曰令人疑著泉州慧明雲禪師僧問般若海中如何為人曰雲開銀漢逈云畢竟如何曰棒頭見血問毗婆尸佛早留心直至如今不得妙意旨如何曰醜拙不堪當潭州大溈齊恂禪師僧問玉兔不懷胎特牛為甚麼生兒曰著槽廠去黃龍元肅禪師法嗣袁州仰山清簡禪師僧問集雲峰下分明事請師分付四藤條曰趙州八十方行腳云得恁麼不知時節曰行到南泉即便休隆興府九仙齊輔禪師蜀之閬苑人丞相陳公堯叟之孫也幼聰敏趣向異倫輩年二十四得度學於成都講聚會真覺勝禪師與之議論指令南遊元豐間出峽遍迹祖闈後造黃龍之室龍見乃問古人見桃華悟道子作麼生云只可背摩霄漢不可入他蘆葦曰為甚麼玄沙道敢保老兄未徹云却請和尚一處道看曰也須親切始得然只如從上諸聖以心傳心更無別法汝還知麼師於言下徹證崇寧丙戌開法九仙上堂以拄杖畫一畫曰會麼真俗雙泯二諦猶存空有兩亡一塵不立尋言逐語有甚了期何也性相無以攝其門色心不能到其境遂卓拄杖喝一喝下座上堂百丈開田説大義仰山夢裏起白椎靈照笊籬只五文千載之下並光輝蓬蓬茸茸師子出窟雍雍籠籠猛虎截峰更若不會擾擾匆匆僧問昨夜三更木馬嘶碧眼胡僧特地疑今朝善法堂前見元是金毛師子兒文彩已彰願聞法要曰青山作畫屏流水清行止云承師磊落驚人句意氣風光滿座生曰一鶚落長空白雲千萬里問踏翻海水未為奇特如何是奇特事曰久向紅霞居不出若非清世見應難宣和庚子九月十日示化嘉州月珠祖鑑禪師因僧請筆其語要師曰達磨西來單傳心印曹溪六祖不識一字今日諸方出世語句如山重增繩索乃拍禪床曰於斯薦得猶是鈍根若也未然白雲深處從君臥切忌寒猿中夜啼華光恭禪師法嗣郴州萬壽第一代念禪師歲旦上堂曰往復無際動靜一源含有德以還空越無私而逈出昔日日今日日照無兩明昔日風今日風鼓無兩動昔日雨今日雨澤無兩潤於其中間覔去來相而不可得何故自他心起起處無蹤自我心忘忘無滅迹大衆若向這裏會去與天地而同根共萬物為一體若也未明山僧為你重重頌出元正一古佛家風從此出不勞向上用工夫歷劫何曾異今日元正二寂寥冷淡無滋味趙州相喚喚茶來剔起眉毛須瞥地元正三上來稽首各和南若問香山山上事靈源一派碧如藍遂喝一喝下座上堂香山一路本無遮護虎嘯龍吟蟬噪高樹皇相山頭風起高須彌頂上華重吐咦僧問龍華聖會肇啓茲辰未審彌勒世尊現居何處曰豬肉案頭云既是彌勒世尊為甚麼却在豬肉案頭曰不是弄潮人莫入洪波裏云畢竟事又且如何曰番人不繫腰問曙色未分人盡望月圓當午意如何曰龍蛇混雜凡聖同居云未審還有祖師意也無曰碧潭秋夜冷明月印滄洲云學人未曉其言請師端的曰蔡倫池內石馬猶存以拂子擊禪床曰會麼云不會曰毗婆尸佛早留心直至如今不得妙圓通圓璣禪師法嗣台州真如戒香禪師興化林氏子上堂曰孟冬改旦時天寒葉落歸根露遠山不是見聞生滅法當頭莫作見聞看臨安府法慧無竭淨曇禪師嘉興崇德人久住名藍晚居法慧上堂曰本自深山臥白雲偶然來此寄間身莫來問我禪兼道我是喫飯屙屎人上堂拈拄杖曰經無量劫枉受沈倫育王今日淨地掃塵三十年後莫錯怪人卓拄杖下座紹興丙寅夏或云乙丑遍辭朝貴歸付院事四衆擁視揮扇久之書偈曰這漢從來沒縫罅五十六年成話霸今朝死去見閻王劒樹刀山得人怕遂打一圓相曰嗄一任諸方鑽龜打瓦收足而化太師秦公檜施千緡以助襄事火後設利如霰門人持骨歸四明之阿育王山建堂奉藏焉三祖法宗禪師法嗣寧國府光孝惟爽禪師上堂曰今朝六月旦一年已過半奉報參玄人識取娘生面娘生面薦不薦鷺鷥飛入碧波中抖擻一團銀繡線祐聖法𡨢禪師法嗣潭州道林了一禪師四明人族臧氏自發明後鷹舉四方至祐聖投誠入室聖舉拂子問曰雲歸山水歸海且道祐聖拂子歸甚麼處云銀蟾才散彩萬類盡瞻光曰且喜沒交涉云便唱還鄉曲高歌樂太平也曰何不道春來華競吐秋去葉凋零云謝指示曰老僧未曾開口云伯牙與子期不是間相識便禮拜自爾師資契合大觀初出住南嶽大明遷智度及道林政和四年二月十五日説偈而終音釋𭐱音逵毫音泊𡨢音居郴丑林切贛音紺饋音匱瀏音留胾側史切皓音晧戌傷遇切扶歷切鞏音拱莞胡官切靘千定切肄羊至切厙音舍
