body:
  text: 平江府報恩光孝禪寺臣僧正受編拈古蔣山佛慧泉禪師二則舉巴陵示衆祖師道不是風動不是幡動既不是風幡向甚麼處著有人與祖師作主出來與巴陵相見雪竇道風動幡動既是風幡向甚麼處著有人與巴陵作主出來與雪竇相見師曰要知二尊宿落處麼蔣山為你説箇譬喻一似箇人家祖上從來極有涯業有二兄弟各各鬪使大者使五百小者使一貫日往月來鬪使不已遂將祖父涯業一時蕩盡纍他子孫無安身立命處忽有一親友見其子孫孤露遂將伊家祖上宅舍借伊居止其間子孫須思舊時祖業如何却屬他人須作方便討得當時契書方為究竟若趂目前過日得即得未免住在他人屋下大衆蔣山為你説譬喻了也且問諸人作何方便討得當時契書舉僧問夾山境話法眼云云師曰諸禪德法眼和尚話墮也不知若不喚作境待喚作甚麼既不能截斷兩頭致令後代兒孫遞相咬嚼便道天地同根萬物一體心外無法法外無心種種計較一似夢中説夢相似豈知鬼子母失却愛兒無處尋蹤森沙神倒被蛇纏眼中出血翠巖真禪師三則舉盤山似地擎山云云師曰盤山力盡神疲也是望雲上樹還知有不歷諸聖階梯獨超物外者麼師遂大笑舉德山托鉢師曰巖頭德山一狀領過雪峰一千五百人善知識地在舉寶應示衆云欲得易會麼第一莫將問來問問在答處答在問處你若擬議老僧在你腳底師曰寶應只解把住翠巖即不然寒山倒地拾得扶起豐干禮拜不見文殊更有觀音菩薩魚行酒肆且不識主人翁乃卓拄杖一下白雲端禪師三則舉僧問洞山亡僧遷化向甚麼處去曰火後一莖茅師曰白雲即不然亡僧遷化向甚麼處去只向道墻壁有耳舉甘贄行者接待有僧曰行者接待不易贄曰譬如餧驢餧馬琅瑘覺和尚云快把飯來師曰琅瑘雖有不犯之令若是白雲即不然譬如餧驢餧馬但對道願行者常似今日舉龍牙偈曰一切名山到因腳辛苦多年與襪著而今年老不能行手裏把箇破木杓師曰龍牙老人可謂熟處難忘保寧勇禪師二則舉雪峰示衆云南山有一條鱉鼻蛇汝等諸人切須好看長慶云云師拈起拄杖召曰大衆喪身失命了也舉無著遇文殊喫茶次文殊擡起玻璃盞曰南方還有這箇麼師代以手指口黃龍晦堂心禪師二則舉世尊拈華迦葉微笑師曰直下穿過髑髏已是換却眼睛臨危不在悚然向甚麼處見釋迦老子舉莊宗云朕恢復中原收得一寶只是無人酬價興化云云師曰興化一期見機而作爭奈埋沒伊一朝天子當時若但向道蚌蛤之珠收得也無用處教伊向後別有生涯免得遞相鈍置而今若有問上座又作麼生酬價泐潭真淨雲庵文禪師三則舉三聖道我逢人即出出則不為人興化道我逢人即不出出則便為人師曰看這兩箇老古錐竊得臨濟些子活計各自分疆列界氣衝宇宙使明眼衲僧只得好笑諸禪德且道笑作甚麼還知落處麼若知一任七顛八倒若不知且向三聖興化葛藤裏咬嚼舉三聖問雪峰透網金鱗以何為食師曰俊哉俊哉快活快活恰似一隻子莫驚著保寧即不然透網金鱗以何為食待你出網來即向你道待他道一千五百人善知識話頭也不識但拽拄杖打出三門外復曰也好快活恰似一隻虎莫動著諸禪德且道保寧快活何似三聖快活莫有快活底漢麼出來定當看良久喝曰把手拽不住舉臺山路上有一婆子凡有僧問臺山路向甚麼處去云驀直去僧擬行婆云好箇阿師又恁麼去也問曰遊臺山者憧憧往來莫知其數未有一人不被伊瞞唯有趙州一日謂衆曰臺山下婆子被老僧勘破了也大衆雖然不受伊瞞若點檢來也好喫婆子手中棒且道趙州過在甚麼處若知趙州過處方解不受人瞞歸宗門下莫有不受人瞞底麼咄大溈真如哲禪師二則舉芭蕉拄杖子話師曰大溈即不然你有拄杖子我奪却你拄杖子你無拄杖子我與你拄杖子大溈既然如是諸人還用得也未若人用得德山先鋒臨濟後令若也用不得且還本主舉世尊一日見文殊在門外立乃云文殊文殊何不入來文殊曰我不見一法在門外何以教我入門師代曰吾不如汝法雲圓通秀禪師二則舉首楞嚴經云十方薄伽梵一路涅槃門師以手空中一畫喝曰九流於是乎交歸衆聖於是乎冥會乃知新羅高麗南番日本西天此土十方世界一切人民盡在諸人鼻孔裏叫叫閙閙東頭買賤西頭賣貴諸人還聞麼若不聞還我耳朵來舉雲門問僧光明寂照遍河沙豈不是張拙秀才語僧云是雲門云話墮也師曰甚處是話墮處忽有人問法雲如何是祖師西來意只對伊道話墮也還會麼具眼底辨取智海正覺逸禪師二則舉夾山偈曰明明無悟法悟法即迷人長伸兩腳睡無偽亦無真師曰諸禪德此乃療久戀寶所者病之妙藥未到化城之土切忌錯服服之則耆婆拱手醫王皺眉舉趙州示衆云老僧有時將一枝草作丈六金身有時將丈六金身作一枝草五峰云我有時將拄杖子作三世諸佛有時將三世諸佛作拄杖子師曰此二尊宿一時熱發亂語狂言指神話鬼智海即不然有時將丈六金身喚作丈六金身胸題卍字或佩圓光合掌讚嘆曰容顏甚奇妙光明照十方我適曾供養今復還親近有時將拄杖子喚作拄杖子不長不短不直不曲亦讚嘆曰楖栗出匡頂萬中無一枝得來為至寶行坐鎮相隨只如山僧恁麼道還塞得諸方口麼自曰塞不得又曰為甚麼塞不得青山只解磨今古流水何曾洗是非上方益禪師三則舉趙州洗鉢盂話師曰趙州不唯瞎却這僧眼直得南北叢林盡向鉢盂上作活計當時幸好箇喫茶去不解道得舉臨濟上堂云我在先師處三度喫六十棒如篙枝拂相似云云師曰照用之機不無臨濟要且打得箇皮下無血底這僧當初若會才見云誰為我下手但云貧兒思舊債待伊拈棒却向道自己雖然急他人未肯忙直饒臨濟令行也是拗曲作直舉趙州訪二庵主因緣師曰避得風雷重遭霹靂五祖演禪師六則舉教中道若有一人發真歸源十方虗空悉皆消殞雙泉即不然若有一人發真歸源十方虗空築著磕著舉梁武帝問達磨如何是聖諦第一義曰廓然無聖帝云對朕者誰曰不識又僧問六祖黃梅意旨甚麼人得曰會佛法人得云和尚還得否曰不得云和尚為甚麼不得曰我不會佛法師曰大小大祖師問著底便是不識不會為甚麼却兒孫遍地復曰一人傳虗萬人傳實舉靈雲見桃華悟道玄沙未徹師曰説甚麼諦當更參三十始得舉僧請益琅瑘清淨本然云何忽生山河大地曰清淨本然云何忽生山河大地其僧悟去師曰金屑雖貴落眼成翳舉國師無縫塔師曰前面是真珠瑪瑙後面是瑪瑙真珠東邊是觀音勢至西邊是普賢文殊中間有一首幡被風吹著道胡盧胡盧舉趙州狗子無佛性師曰大衆你諸人作麼生會老僧尋常只舉無字便休你若透得這一箇字天下人不奈何你諸人作麼生透還有透得徹底麼有則便出來道看我也不要你道有也不要你道無也不要你道不有不無你作麼生道黃龍死心新禪師四則舉僧問夾山如何是相似句曰荷葉團團團似鏡菱角尖尖尖似錐復曰會麼云不會曰風吹柳絮毛毬走雨打梨花蛺蝶飛師曰夾山詹前捧日未是高明狹路分岐寧同大轍要會相似句麼白鷺沙汀立蘆華相對開舉多福一叢竹師曰斜即任斜曲即任曲喚甚麼作多福一叢竹舉僧問雲門樹凋葉落時如何曰體露金風師曰大小雲門境上縛殺雲巖即不然樹凋葉落時如何珊瑚枝枝撑著月舉南泉問黃檗甚麼處去云擇菜去曰將甚麼擇檗竪起刀子泉曰只解作客不解作主師曰精金百鍊本分鉗鎚往往今時師僧將黃檗南泉只作擇菜會却兜率真寂悅禪師一則舉曹山一日入僧堂向火次僧云今日好寒曰須知有不寒者云誰是不寒者山策火示之僧云莫道無人好山拋下火僧云某到這裏却不會山曰日照寒潭明更明師曰這僧雖行合行不行之路未免草裏藏身曹山有應不應却應之機爭奈爐邊露影這兩箇不解端然向火寧免挂後人齒牙若嚼不破須信言中有味若嚼得破方知舌上無鹽既然如是兜率何曾踏著古人腳跟遂喝一喝泐潭祥禪師二則舉祖師道心隨萬境轉轉處實能幽隨流認得性無喜亦無憂師曰鴈過霜秋山含紅樹文殊與普賢二人爭功未分勝負遂喝曰却被寶峰一喝依舊安家立業舉雲門一日示衆將拂子摵一下云這裏得箇入處揑怪去也日本國裏説禪三十三天上有箇人出來喚云吽吽特厙兒師曰後來叢林道雲門腳跟不點地誡實苦哉寶峰道日本國人説禪得困却來寶峰拄杖頭上歇息要為大宋人説法還聞麼良久曰矢上加尖雪峰祖燈璿禪師一則舉日出連山月圓當戶不是無身不欲全露師曰大衆龍牙山裏無眼毒龍從前行腳不曾性僺道得一句及于住院盡力只道得一半山僧今日為混沌畫眉去也良久曰放憨作麼泐潭湛堂準禪師五則舉藥山問雲巖師子師曰藥山雲巖鈍置殺人兩子父弄一箇師子也弄不出若是準上座只消獨自弄拽得來拈頭作尾拈尾作頭轉兩箇金睛攫幾鈎鐵爪吼一聲直令百里內猛獸潛蹤滿空裏飛禽亂墜準上座未弄師子請大衆高著眼先看做一箇定場以拄杖擲下云箇中消息子能有幾人知喝一喝舉永嘉道直截根源佛所印摘葉尋枝我不能師遂拈拄杖卓一下曰大小直截或有箇秀才出來道雲巖長老你佛法得恁麼簡易即向伊道田厙奴你豈不聞孝經序云朕聞上古其風朴略舉雪峰低頭歸庵師曰大衆雪峰是會末後句不會末後句若道會巖頭又道當初悔不向他道末後句若道不會因甚而今兒孫遍天遍地雖與我同條生不與我同條死末後句巖頭為劈頭説破也未免有些殽訛久參先德一舉便知後學初機莫道不疑好舉仰山羅漢騰空而至師曰諸禪德可惜仰山放過這漢當時若是寶峰便與擒住須教維那僧堂前撞鍾集衆責狀趕出況佛法不當人情伊既稱羅漢我生已盡梵行已立為甚麼不歸家穩坐只管遊山玩水參舉雲門拈世尊生下一手指天一手指地師曰雲門大師只知其一不知其二只道我一朝權在手看取令行時殊不知盡法無民準上座即不然待這老子才生下來未行未開口之時向伊面前結一道金匱藏魂印一禁禁定教這老子言詞路絶心行處滅不唯使釋迦老子自家得人安樂處亦乃使十方法界衆生一切安樂諸禪德且道雲門是準上座是若道雲門是準上座又何用別説若道雲門非不可將佛法作得失是非會也若不作得失是非會又是顢頇佛性儱侗真如且道畢竟作麼生莫言佛法無多子不是苦心人不知咄太平佛鑑勤禪師六則舉溈山與僧語次僧云大好雨曰甚麼處是好處僧無語溈却曰大好雨僧云甚麼處是好處溈乃指雨示之僧又無語溈曰何得大智而默師曰溈山尋常眼放電光到這裏却著賊也不知山僧不是抑強扶弱黨理不黨親且道那裏是著賊處若於此檢點得出便能騎賊馬追賊奪賊槍殺賊若檢點不出凡有言説皆是與賊過梯智海今日路見不平與諸人并贓捉獲擲下拂子曰諸人各自認取臟物舉溈山同陸侍御入僧堂陸問如許多僧為復是喫粥飯僧為復是參禪僧曰亦不是喫粥飯僧亦不是參禪僧云在此作甚麼曰侍御自問取他看師曰溈山元來小膽被這俗官一問直得手忙腳亂閉戶開門若是老僧即不然大開門戶放伊入來此是參禪僧喫粥飯僧向伊道是喫粥飯了參禪僧侍伊眼睛定動便與木槵子換却教伊做箇惺惺歷歷底侍御若處廟堂之高則致君為堯舜之君或在江湖之上則致民為堯舜之民豈不快哉乃呈起數珠曰諸人還見這箇麼良久曰此是老僧來京師換得底諸人各自歸堂摸索看舉三平參石鞏平後舉似大顛曰既是活人箭為甚麼向弓弦上辨三平無語顛曰三十年來要人舉此話也難得師曰大小三平元來只是箇死漢若非死漢又覓甚麼活人箭石鞏龍頭蛇尾矢在弦上又却不發當時若便與一箭那裏得來大顛作死馬醫醫之不瘥從他掘地深埋且如智海恁麼批判古今還有過也無細雨灑華千點淚淡煙籠竹一堆愁舉谷山問秀溪聲色純真時如何曰碗鳴作麼山從東過西立溪曰若不恁麼則禍生山却從西過東立溪下禪床行三五步山把住云聲色純真又作麼生溪打一掌山云百年後要箇人下茶也無溪曰要谷山老漢作麼山大笑師舉了呵呵大笑曰也大好笑有甚好笑處樓前巧燕雙雙語林內嬌鶯對對飛因看古人無義語等間又得一聯詩舉南泉示衆曰文殊普賢昨夜三更起佛見法見趙州出衆云云師曰大似無手人行拳無口人叫喚無手人掩著無口人口無口人咬著無手人手恁麼會得方知道法性不動動遍三界之中至理無言言滿四天之下若也不會紅塵飛碧海白浪湧青岑舉披雲去看天仙才入方丈仙便問未見東越老時作麼生為物曰只見雲生碧嶂焉知月落寒潭云只恁麼也難得曰莫是未見時麼仙便喝雲展兩手仙云錯怪人者有甚麼限雲掩耳便出仙云死却這漢平生也師曰喻似敵手下碁雖則著著不落別處其奈須有輸贏既有輸贏便成勝負要得兩無傷損麼待天仙道死却這漢平生也便好向道元來是錯怪人天仙却好展兩手便得始終一貫頭尾雙全雖然如是你諸人各各摸索腰下斧柄看天寧佛果圓悟勤禪師四則舉文殊菩薩問維摩居士云我等各自説已云何是仁者所説不二法門師曰這一轉語叢林話會不少有道默然有道良久有道不對要且摸索不著直得其聲如雷普驚群動自古及今前聖後聖所説法門只向維摩片時之間一時顯現且道正當恁麼時作箇甚麼得見維摩舉古者道護生須是殺殺盡始安居要會箇中意鐵船水上浮師曰且道殺箇甚麼殺衆生物命凡夫見解殺六賊煩惱座主見解殺佛殺祖大闡提人見解衲僧分上畢竟殺箇甚麼舉雪峰示衆云盡大地撮來如粟米粒大師曰絶天維立地紀未足稱奇擘太華逗黃河亦非敏手若向箇裏得透便可以撒驪龍窟明珠噴旃檀林香氣豈不快哉山僧今日不避泥水放一線道乃拈拄杖曰還見雪峰麼卓拄杖曰劄舉興化見同參師曰辨王庫刀振塗毒鼓掣電未足以擬其迅震雷未足以方其威可謂善驅耕夫之牛能奪飢人之食只如主賓互換有照有用有權有實則且置甚處是興化將手向伊面前畫兩遭若這裏洞明可以荷負臨濟正法眼藏如或泥水未分未免瞎驢大隊龍門佛眼遠禪師二則舉趙州訪二庵主師曰庵主一般竪起拳頭趙州何故肯一箇不肯一箇且道得失在甚麼處趙州自起自倒勘破多少阿師庵主坐斷要津過了幾多寒暑要識趙州麼拍禪床右角曰識取趙州要識二庵主麼拍禪床左角曰識取庵主還有人點檢得失處出底麼易開終始口難保歲寒心舉洗鉢盂話師曰大衆山僧今朝喫粥也洗鉢盂只是不悟既是為善知識為甚麼却不悟還會麼豈可喚鐘作甕終不指鹿為馬善人難犯水銀無假冷地忽然破管取一時放下大隨南堂靜禪師四則舉昔有秀才造無鬼論論成才放筆有鬼現身斫手謂秀才曰你爭奈我何五祖道我當時若見便以手作鵓鳩觜向伊道谷呱呱師曰秀才雖知無鬼而不知鬼之所以無五祖先師雖知鬼之所以無而不能掃蹤滅迹若是大隨即不然待他斫手道你爭奈我何只向道閻直饒是大力鬼王也教伊頭破作七分如阿黎樹枝且道是那箇閻字舉德山示衆云今夜小參不答話問話者三十棒師曰要見德山麼悟須千聖頭邊坐用向三塗底下行要見法眼麼關中猛將要見圓明麼塞外將軍要見新羅僧麼但摘果子喫莫管樹曲彔要見南堂麼分明記取舉似作家舉僧問智門如何是般若體話師曰古人是則是答得太高生山僧即不恁麼如何是般若體一一米如何是般若用七擒七縱舉僧問雲門不起一念還有過也無門云須彌山師曰南堂即不然或有人問不起一念還有過也無只向他道劄九仙清禪師二則舉雲門示衆拈起拄杖云拄杖子化為龍吞却乾坤了也山河大地甚處得來師曰大衆會麼雲門大師讚歎拄杖子有出沒神通卷舒妙用擲須彌於他界塞滿虗空大地不容塵纖毫無立處這老漢一期逞俊不顧危亡只知拄杖子吞却乾坤不知拄杖子向何處著如今莫有為雲門救得拄杖子者麼若無天寧自下手去也提起拄杖曰探水卓破金鼇頭撥雲敲折老虎腳復卓一下舉雪峰問德山從上宗乘學人還有分也無德山打一棒曰道甚麼師曰如今若有問光孝從上宗乘學人還有分也無光孝也不下禪床也不拈拄杖也不劈脊打只向他道窮鬼子不要忙少你一分不得然雖如是癡人面前不得説夢崇覺空禪師一則舉藥山小參不點燈示衆曰我有一句子待特牛生兒即向汝道時有僧出云特牛生兒也自是和尚不道山曰把火來其僧便歸衆師曰藥山三寸甚密爭奈被這僧下一粒巴豆直得心肝五臟一時吐出直饒討得火來也是半夜天明淨因蹣庵成禪師二則舉柏樹子話師曰蘇武不拜韓信臨朝恁麼會得十萬迢迢舉黃龍三關話師曰我手何似佛手龍蛇易辨我腳何似驢腳衲子難瞞人人有箇生緣舉頭天外看誰是箇中人須知瞞庵更有一關黃龍老漢亦透不得如何是瞞庵一關遂喝一喝拍禪床一下淨慈月堂昌禪師二則舉僧問投子月未圓時如何師曰投子只知得路便行不覺渾身泥水瑞光即不然月未圓時如何布施不如還却債圓後如何借婆裙子拜婆年舉趙州洗銷盂雲門拈之云云師曰雲門盡誠收拾特地打翻育王見處也要諸人共知敢謂大小趙州死在這僧手裏大溈佛性泰禪師七則舉楞嚴曰一人發真歸源十方虗空悉皆消殞後來五祖和尚道一人發真歸源十方虗空築著磕著若是德山即不然一人發真歸源十方虗空只是十方虗空舉耽源問忠國師百年後有人問極則事如何祗對國師曰幸自可憐生須要箇護身符子作麼師曰大小耽源被國師一坐直至而今起不得若是德山要且不然待伊道幸自可憐生須要箇護身符子作麼只對他道暗中為照燭嶮處作津梁舉興化示衆云我見你諸人前廊也喝後廊也喝云云師曰驅耕夫牛奪飢人食擊碎明月珠敲出鳳凰髓可謂富貴中富貴風流中風流藹藹嘉聲迄今未已敢問大衆只如興化道未曾向紫羅帳裏撒真珠作麼生會或若總道咄我也知你跳不出舉僧問地藏如何是佛法的的大意曰山前麥熟也未又問青原如何是佛法的的大意曰廬陵米作麼價師曰平常心地穩密家風隨時應用越格超宗於斯薦得麥裏有麵若也不會米裏有蟲舉僧問六祖黃梅意旨甚麼人得師曰破布裹真珠識者方知是寶爛泥藏棘刺踏著方乃驚人諸人還見祖師麼倒騎白額虎突出衆人前舉教中道是法住法位世間相常住師召大衆曰那箇是常住底法良久曰始逢黃葉落又見一陽生舉阿育王設三萬大阿羅漢會時上座一位無人王問此位何以無人有海意尊者白王曰有賓頭盧尊者親見佛來故留此位須臾尊者從空而下便就座王曰承聞尊者親見佛來是否尊者以兩手撥開眉曰會麼王曰不會尊者曰阿耨達池龍王請佛齋貧道是時亦與其數師曰阿育王雖飯三萬大阿羅漢要且不識賓頭盧尊者阿育王既已不識諸人還識也無若也不識山僧為諸人指出乃拈拄杖下禪床立曰作麼徑山大慧普覺杲禪師六則舉僧問洞山寒暑到來如何回避曰何不向無寒暑處去云如何是無寒暑處曰寒時寒殺闍梨熱時熱殺闍梨又僧問一老宿時節恁麼熱向甚處回避曰向鑊湯爐炭裏云只如鑊湯爐炭裏如何回避曰衆苦不能到師曰二老宿一人在寒暑裏垂手一人在寒暑外垂手寒暑裏垂手者不見有寒暑之相寒暑外垂手者通身是寒暑徑山恁麼道諸人還辨明得麼若辨明得南天台北五臺若辨明不得今日熱如昨日舉興化打克賓維那雲居舜和尚拈云大冶精金應無變色其奈興化令行太嚴不是克賓維那也大難承當總似而今泛泛之徒翻轉面皮多少時也師曰雲居恁麼道未免拗曲作直徑山即不然要作臨濟炟赫兒孫直須翻轉面皮始得舉提婆達多在地獄中受罪師曰既無出分又無入分喚甚麼作釋迦老子喚甚麼作提婆達多喚甚麼作地獄還委悉麼自携瓶去沽村酒却著衫來作主人舉讓和尚遣僧問馬祖云作麼生祖云自從胡亂後三十年不少鹽醬師曰雲門即不然夜夢不祥書門大吉舉無著見文殊師曰徑山當時若見即向他道和尚如此住持直是不易舉龍牙頌云一切名山到因腳白雲端和尚拈云龍牙老人可謂熟處難忘師曰白雲恁麼道大似以已方人杲上座即不然家貧難辨素食事忙不及草書淨因枯木成禪師二則舉僧問洞山寒暑到來如何回避師曰衆中商量道這僧問既落偏洞山答歸正位其僧言中知旨却入正來洞山却從偏去如斯商量不唯謗瀆先聖亦乃屈沈自己不見道聞衆生解意下丹青目前雖美久蘊成病大凡行腳高士欲窮此事先須識取上祖正法眼藏其餘佛祖言教是甚麼熱碗鳴聲雖然如是敢問諸人畢竟作麼生是無寒暑處還會麼玉樓巢翡翠金殿鎖鴛鴦舉南禪師示衆曰達磨西來十萬里少林冷坐八九年唯有神光知此意專伸三拜不虗傳後代兒孫忘正覺棄本逐末尚邪言直到臘月三十日一身負債入黃泉師曰奇哉諸禪德本分宗師一言半句如箭中的功不浪施以衲僧正眼觀之大似將方木逗於圓孔何故大凡稱提此事如刀斫水似手捫風兩不相傷彼此無礙香山恁麼説話大似以圓木逗於方孔且道如何得恰好去諸人還知也未佛殿上刎高聲大笑笑罷曰塵世勞生早晚休隨波逐浪謾悠悠如今林下安禪客幾箇無心得到頭乃喝曰且莫以己方人護國此庵元禪師一則舉世尊生下一手指天一手指地雲門云云師曰今時有般説快意話底便道當時若不是雲門誰敢恁麼道殊不知雲門落在黃面老子圈䙡裏直至而今跳不出若向這裏得透不唯識得釋迦老子亦乃破雲門腳跟其或未然山僧更為你下箇注腳貪他一杯酒失却滿船魚西禪懶庵需禪師二則華馬祖踏倒水潦師曰大小大水潦喫人拳躍了却道我悟悟甚麼屎及乎起來更不識羞猶道我向一毛頭上識得根源且莫揑目生華住山後告衆曰自從一喫馬師踏直至如今笑不休且道笑箇甚麼舉臨濟問院主糴米師曰院主一喝電卷雷奔山摧地裂典座禮拜雲收雨散月白風清然雖恁麼因甚總喫痛棒不見道臥龍才奮迅丹鳳亦翱翔大溈月庵果禪師二則舉趙州訪二庵主師曰泣露千般草吟風一樣松為甚麼肯一不肯一若向這裏見得釋迦不先彌勒不後坐斷要津天長地久苟或未然月庵老人為諸人下箇注腳良久曰若不如是爭知如是舉話墮話師曰雲門大師張慢天網撈龍打鳳這僧不覺入他陷穽中落他圈䙡裏若是福嚴即不然才見伊舉道豈不是張拙秀才語但向道未到雲門不妨疑著然雖如是也是賊過後張弓何山佛燈珣禪師一則舉疏山壽塔師曰疏山傾囊答謝其奈尺頭有寸這僧只知造塔元來稱尾無星大嶺三文兩鏹支破不難慧曰若作這僧待疏山恁麼道但對曰某甲今日功不浪施著得箇語免被三文兩鏹擾亂一生不教疏山外揚家醜只如臘月蓮華龜毛三尺又且如何要會麼待你諸人造塔成就即向你道烏巨雪堂行禪師四則舉僧問雲門如何是驚人句門云響師曰雲門答這僧話不得便休却鼓粥飯氣以當平生舉雪竇示衆云大施門開無壅塞忽有箇衲僧出來雪竇退身七百里何故臨危不悚人後有老宿道大施門開無壅塞忽有箇衲僧出來兩手分付何故心不負人面無慚色師曰西山今日亦開大施門忽有箇衲僧出來三十棒一棒也不較何故許人一物千金不移舉懷禪師示衆云無手人能行拳無舌人能解語忽若無手人打無舌人教無舌人道箇甚麼白雲端和尚道未舉步時末上一步踏著未開口時最初一句道著師曰二老宿向諸人面皮上寫却一本曆日了也若更眼目定動髑髏前鬼神無數舉僧問雲門樹凋葉落時如何曰躰露金風死心和尚道大小雲門大師境上縛殺有問死心樹凋葉落時如何只對道珊瑚枝枝撑著月師曰大小死心句裏縛殺大溈牧庵忠禪師一則舉長生問靈雲混沌未分話師曰二尊宿發明本分大事可謂如切如瑳如琢如磨不妨端的檢點將來大似貼肉汗衫未能脫躰致使有般漢隨語生解便向混沌未分時生計較打破鏡處説道理驢年解悟去若據牧庵見處説甚麼混沌分與未分打鏡破與不破直饒向露柱懷胎處會得正是片雲點太清諸仁者還委悉麼良久曰待虗空落地時却向你道西禪此庵淨禪師二則舉教中道佛滅度後其為善知識者總是見佛來後來歸宗和尚道其為善知識者亦不可輕慢師曰歸宗恁麼道大似新婦怕阿家未免隨他舌頭轉殊不知其為善知識者只是箇瞎漢所覩善知識者如夙世冤家便好剜却眼睛掀却腦蓋雖然如是未足酬恩舉志公令人傳語思大後來白雲端和尚道思大恁麼説話大似釘樁搖櫓有甚快活新怡山即不然青山忽憶便歸去浮世要看還下來靈隱佛海遠禪師二則舉興化見同參師曰摳衣問道肝膽相傾及至掀翻鼻孔倒轉槍旗為甚麼一家不知一家事是則這僧勢不兩立興化禍不單行這一頓痛棒架閣來久矣而今拄杖子在老僧手裏無有不了底公案即今目前燈籠露柱大地山河豈不是同參築著磕著底豈不是同參又參見阿誰喝一喝曰汲水已歸林下去待船猶立渡頭沙復卓拄杖一下舉真淨和尚示衆云天地與我同根萬物與我同體腳頭腳底橫三竪四北俱盧洲火發燒却帝釋眉毛東海龍王忍痛不禁轟一聲霹靂直得傾湫倒嶽雲暗長空十字街頭廖胡子醉中驚覺起來拊掌呵呵大笑云筠陽城中近來少賊乃拈拄杖云賊賊師曰是則一場賣弄不少爭奈鼻孔眼睛各有主在何故葛藤堆裏作竊未當白拈酒店門前拾遺不是正賊時東廊下偶犬吠師呼行者探門前有甚客來大衆皆回首師曰要見正賊麼遂哨指一聲搖手下座天童應庵華禪師五則舉大愚芝和尚示衆大家相聚喫莖虀若喚作一莖虀入地獄如箭射師曰好語要且無來處有人辨得出與你一兩金舉六祖曰不是風動不是幡動仁者心動師曰一盲引衆盲相牽入火坑舉僧問興化四方八面來時如何曰打中間底僧禮拜化曰大衆興化昨日赴箇村齋回至中路值一陳狂風暴雨却向古廟裏避得過師曰我見燈明佛本光瑞如此舉僧問雲門不起一念還有過也無門云須彌山師曰雲門道得不妨諦當要且落在第二頭明果即不然忽有人問不起一念還有過也無只對道致將一問來舉靈雲見桃華悟道玄沙云諦當甚諦當敢保老兄未徹在雪峰云備頭陀何不遍參去沙云達磨不來東土二祖不往西天師曰百鳥不來春又老不知誰是到庵人舉慈明示衆曰一切賢聖皆以無為法而有差別前是案山後是主山且道無為法在甚麼處良久曰向下文長付在來日師曰天童也著一隻眼一切賢聖皆以無為法而有差別東弗于逮西瞿耶尼南瞻部洲北單越到處去來不如在此道場正堂辨禪師一則舉達磨初見梁武帝帝問如何是聖諦第一義云廓然無聖曰對朕者誰云不識帝不契遂渡江至魏達磨去後志公問云陛下還識此人否帝曰不識志公云此是觀音大士傳佛心印帝悔遣使去取志公云莫道陛下遣使去取盍國人去他亦不回師曰後來有般漢道以年曆考之志公圓寂已十四年矣豈有前頭事耶當時雪竇渾不考詳師笑曰從古至今未有一人明得苦哉佛陀耶殊不知雪竇乃於頌古首篇立此一大因緣要見古人明悟正脈者布幔天大網待稱意之魚歲月滋深益見蝦魚小蟹多少明眼衲僧髑髏被渠穿過山僧忍俊不禁為諸人露箇消息利刀割肉瘡猶合惡語傷人恨不消只見國清才子貴那知家富小兒驕教忠晦庵光禪師一則舉雪峰在鼇山成道師曰只如巖頭道一一從自己𮌎襟流出且道雪峰前三次悟還從自己𮌎襟流出也無若從自己𮌎襟流出又道未穩在若不從自己𮌎襟流出又從甚麼處得來莫有斷得出底麼若斷得出不唯雪峰鼇山成道盡大地有情齊成正覺若斷不出説甚麼鼇山成道直饒少室傳心也未夢見在東禪蒙庵嶽禪師一則舉古澗寒泉師曰雪峯不從口入松柏千年青不入時人意趙州云死牡丹一日紅滿城公子醉開善密庵謙禪師二則舉祕魔擎叉霍山往訪師曰祕魔尋常氣宇如王不消一揑便見四稜塌地且作麼生免得他道三千里外賺我來然雖如是殊不知霍山三千里外已死在祕魔叉下了也具眼者辨取舉洞山冬夜與泰首座喫果子次真如拈云這箇果子莫道泰首座不得喫三世諸佛也不敢正眼著師曰洞山倚勢欺人真如隨風倒施今夜忽有人問山僧有一物上拄天下拄地常在動用中動用中收不得未審過在甚麼處拈起果子便喫何故下坡不走快便難逢東林卍庵顏禪師四則舉慈明水盆話師曰和尚今日供養家親那又以手揶揄便作女人拜舉慈明冬至日榜僧堂前作此相申題其右曰若人識得不離四威儀中首座一見謂衆云和尚今日放參師曰鐵輪天子下閻浮急急如律令勑攝又曰首座向八八六十四卦中定吉凶舉橫眸看梵字彈舌念真言吹火長尖觜柴生滿竈煙師曰大愚老人經事多矣舉玄沙聞燕子聲師召大衆曰玄沙恁麼道不是苦心人不知玉泉窮谷璉禪師二則舉雲門話墮師曰權衡祖道號令宗乘須是雲門老人諸方扶強不扶弱璉上座扶弱不扶強當時若作這僧待他雲門大師道光明寂照遍河沙豈不是張拙秀才語只對道和尚也不謬為大善知識教他雲門進也無門退也無門非但截斷雲門腳跟亦與天下衲僧出氣雖然如是只如雲門道話墮也意作麼生良久曰諦觀萬法交羅處一一塵中更有誰舉僧問洞山如何是佛曰麻三斤師曰天無四壁地絶八荒向甚麼處與洞山相見咄國清簡堂機禪師三則舉僧問廣德周和尚教中道阿逸多不斷煩惱不修禪定佛記此人成佛無疑未審此理如何曰鹽又盡炭又無僧曰鹽盡炭無時如何曰愁人莫向愁人説説向愁人愁殺人師曰這老子艱難起家至老慳澀雖然如是畢竟也是看窟竉著楔山僧即不然一尺絹搗練一杯酒上樓是則是孤窮且要自張聲勢忽有人問教中道阿逸多不斷煩惱不修禪定佛記此人成佛無疑未審此理如何只向他道大底還他肌骨好不塗紅粉自風流未審意旨如何更向他道驢事未去馬事到來舉雪峯山裏有一僧往庵髮長不剃以木杓舀水凡有人問如何是祖師西來意曰溪深杓柄長雪峯聞得乃曰也奇怪一日潛地帶剃刀與侍者同去見之峰曰道得即不剃你頭僧便將水洗頭峰便與剃却師曰這僧大似諸葛亮隱於草廬先主三顧方起且道起後成得箇甚麼邊事利劒拂開天地靜霜刀才動斗牛寒舉興化示衆曰今日不用如何若何便請單刀直入興化為你證明時有旻德長老出衆禮拜便喝化亦喝德又喝化亦喝德便禮拜化曰旻德今日較二十棒若是別人一棒也少不得為他旻德會一喝不作一喝用師曰臨濟這一路踏得開步驟闊用者如鴆毒飲者如醍醐用者似醍醐飲者似鴆毒始有説話分興化旻德恁麼敷揚遞相鈍置所謂養子不及父家門一世衰臨濟一宗掃土而盡隱靜今日若更拈頭接尾轉見不堪遂顧大衆曰你總在這裏作箇甚麼以拄杖一時趕散復喝一喝天童密庵傑禪師一則舉明招到昭慶有度上座問云羅山尋常道諸方盡是飯唯有羅山是白飯兄從羅山來却展手云白飯請些子招打兩掌度云將謂是白飯元來是飯招曰癡人棒打不死度至夜舉似諸禪客次招近前曰不審度云今日便是這上座下兩掌有瑫上座云不用下掌就裏許作麼生道招曰就裏許也道道瑫無對招曰是你諸人一時縛作一束倒卓放尿躂下來日相見珍重師曰尋常向諸人道終日在洪波浩渺中舀水相潑渾身無一點濕是他明踏著這些子自然用出來間間地惜乎鋒頭少鋭引得許多葛藤若是華藏見他道將謂是白飯元來是飯連腮更與兩掌且教這僧疑三十年資壽尼無著妙總一則舉文殊請維摩談不二法門總曰當時好與一喝維摩老人若下得這一喝可謂針起膏肓之疾重布龍蛇之陳非但文殊讚歎不及亦免使後人向鬼窟裏作活計要見維摩端的處麼臂長衫袖短腳瘦草鞋寬音釋贄音至憧音衝閻音閬瑳七何切𭃰一丸切揶音耶揄音臾楔音屑舀以沼切充小切
